apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo-rs
  labels:
    app: mongo-rs
spec:
  serviceName: mongo
  replicas: 3
  selector:
    matchLabels:
      app: mongo-rs
  template:
    metadata:
      labels:
        app: mongo-rs
    spec:
      containers:
        - name: mongod
          image: mongo:6.0.5
          command:
            - mongod
            - --replSet
            - rs0
            - --bind_ip_all
            - --tlsMode
            - requireTLS
            - --tlsCertificateKeyFile
            - /etc/mongo-cert/server.pem
            - --tlsCAFile
            - /etc/mongo-ca/ca.crt
            - --tlsAllowConnectionsWithoutCertificates
          ports:
            - name: mongodb
              containerPort: 27017
          volumeMounts:
            - name: data
              mountPath: /data/db
            - name: mongo-tls-cert
              mountPath: /etc/mongo-cert
              readOnly: true
            - name: mongo-tls-ca
              mountPath: /etc/mongo-ca
              readOnly: true
      volumes:
        - name: mongo-tls-cert
          secret:
            secretName: mongodb-tls-cert
        - name: mongo-tls-ca
          secret:
            secretName: mongodb-tls-ca
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
