apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo-rs
  labels:
    app: mongo-rs
spec:
  serviceName: mongo
  replicas: 2
  selector:
    matchLabels:
      app: mongo-rs
  template:
    metadata:
      labels:
        app: mongo-rs
    spec:
      containers:
      - name: mongod
        image: mongo:6.0
        ports:
        - containerPort: 27017
          name: mongo
        command:
        - mongod
        - --replSet
        - rs0
        - --bind_ip_all
        volumeMounts:
        - name: datadir
          mountPath: /data/db
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
  volumeClaimTemplates:
  - metadata:
      name: datadir
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 5Gi
