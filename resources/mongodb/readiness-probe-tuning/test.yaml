# mongodb/readiness-probe-tuning
# Tune readiness and liveness probes so a MongoDB replica set becomes stable

prompt: |
  A 3-member MongoDB replica set is running in the mongodb namespace with auth enabled.
  Pods are repeatedly failing readiness/liveness checks even though MongoDB is healthy.

  Task:
  - Tune the probes so the replica set becomes stable.
  - All pods must become Ready.
  - Replica set should have 1 PRIMARY and 2 SECONDARY members.

  Notes:
  - Do not disable authentication.
  - No operators or CRDs.

namespace_contract:
  required_roles: []

metrics:
  - time_to_first_mutation

preconditionUnits:
  - name: mongo_env_ready
    on_probe_fail: skip
    probe:
      - command: "kubectl -n mongodb get pods 2>/dev/null | grep -c Running || true"
        timeout_sec: 10
    apply:
      - command: "/bin/sh -c 'kubectl delete namespace mongodb --ignore-not-found=true; kubectl wait --for=delete namespace/mongodb --timeout=120s || true'"
        sleep: 2
      - command: "kubectl create namespace mongodb"
        sleep: 1
      - command: "kubectl -n mongodb apply -f resources/mongodb/readiness-probe-tuning/resource/secrets.yaml"
        sleep: 1
      - command: "kubectl -n mongodb apply -f resources/mongodb/readiness-probe-tuning/resource/probe-script.yaml"
        sleep: 1
      - command: "kubectl -n mongodb apply -f resources/mongodb/readiness-probe-tuning/resource/services.yaml"
        sleep: 1
      - command: "kubectl -n mongodb apply -f resources/mongodb/readiness-probe-tuning/resource/statefulset.yaml"
        sleep: 5
      - command: |
          /bin/sh -c 'for i in $(seq 1 120); do phase=$(kubectl -n mongodb get pod mongodb-replica-0 -o jsonpath='\''{.status.phase}'\'' 2>/dev/null); if [ "${phase}" = "Running" ]; then exit 0; fi; sleep 5; done; exit 1'
        sleep: 2
      - command: |
          /bin/sh -c 'for i in $(seq 1 120); do phase=$(kubectl -n mongodb get pod mongodb-replica-2 -o jsonpath='\''{.status.phase}'\'' 2>/dev/null); if [ "${phase}" = "Running" ]; then exit 0; fi; sleep 5; done; exit 1'
        sleep: 2
      - command: |
          /bin/sh -c 'kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet --eval '\''rs.initiate({_id:"mongodb-replica",members:[{_id:0,host:"mongodb-replica-0.mongodb-replica-svc.mongodb.svc.cluster.local:27017"},{_id:1,host:"mongodb-replica-1.mongodb-replica-svc.mongodb.svc.cluster.local:27017"},{_id:2,host:"mongodb-replica-2.mongodb-replica-svc.mongodb.svc.cluster.local:27017"}]})'\'''
        sleep: 5
      - command: |
          /bin/sh -c 'for i in $(seq 1 20); do kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet --eval '\''db.hello().isWritablePrimary'\'' | grep true && exit 0; sleep 3; done; exit 1'
        sleep: 2
      - command: |
          /bin/sh -c 'kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet --eval '\''db.getSiblingDB("admin").createUser({user:"admin-user",pwd:"admin123password",roles:[{role:"clusterAdmin",db:"admin"},{role:"userAdminAnyDatabase",db:"admin"},{role:"readWriteAnyDatabase",db:"admin"}]})'\'''
        sleep: 2
      - command: |
          /bin/sh -c 'kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet "mongodb://admin-user:admin123password@localhost:27017/admin" --eval '\''db.getSiblingDB("admin").createUser({user:"health-user",pwd:"healthpass123",roles:[{role:"clusterMonitor",db:"admin"}]})'\'''
        sleep: 2
      - command: "kubectl -n mongodb wait --for=condition=ready pod -l app=mongodb-replica --timeout=300s"
        sleep: 2
      - command: |
          /bin/sh -c 'kubectl -n mongodb patch sts mongodb-replica --type=json -p='\''[{"op":"replace","path":"/spec/template/spec/containers/0/readinessProbe/initialDelaySeconds","value":5},{"op":"replace","path":"/spec/template/spec/containers/0/readinessProbe/timeoutSeconds","value":1},{"op":"replace","path":"/spec/template/spec/containers/0/readinessProbe/failureThreshold","value":2},{"op":"replace","path":"/spec/template/spec/containers/0/livenessProbe/initialDelaySeconds","value":15},{"op":"replace","path":"/spec/template/spec/containers/0/livenessProbe/timeoutSeconds","value":1},{"op":"replace","path":"/spec/template/spec/containers/0/livenessProbe/failureThreshold","value":2}]'\'''
        sleep: 2
      - command: "kubectl -n mongodb delete pod -l app=mongodb-replica"
        sleep: 2
    verify:
      - command: "kubectl -n mongodb get pods 2>/dev/null | grep -c Running || true"
        timeout_sec: 10

oracle:
  verify:
    commands:
      - command: "python3 resources/mongodb/readiness-probe-tuning/oracle/oracle.py"
        timeout_sec: 60
