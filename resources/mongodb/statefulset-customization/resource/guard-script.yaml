apiVersion: v1
kind: ConfigMap
metadata:
  name: pod-guard-script
data:
  guard.sh: |
    #!/bin/sh
    set -e
    req="${REQ_MEM_MIB:-0}"
    lim="${LIM_MEM_MIB:-0}"
    label="${MONITORING_LABEL:-}"
    if [ "$label" != "enabled" ]; then
      echo "monitoring label missing or not enabled (expected monitoring=enabled)" >&2
      exit 1
    fi
    if [ "$req" -lt 512 ]; then
      echo "requests.memory too low: ${req}Mi" >&2
      exit 1
    fi
    if [ "$lim" -lt 1024 ]; then
      echo "limits.memory too low: ${lim}Mi" >&2
      exit 1
    fi
    echo "guard checks passed"
