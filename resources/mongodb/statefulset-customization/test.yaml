# mongodb/statefulset-customization
# Restore a stable 3-member MongoDB replica set after StatefulSet customization breaks readiness

params:
  cluster_prefix:
    default: mongodb-replica
    description: App label / StatefulSet name of the replica set members.
  replica_set_name:
    default: mongodb-replica
    description: MongoDB replica set _id used when initiating the set.
  admin_username:
    default: admin-user
    description: Username of the MongoDB admin user.
  template_label_key:
    default: monitoring
    description: Pod template label key toggled by the customization.
  faulty_request_memory:
    default: 128Mi
    description: Faulty memory request applied to break readiness.
  faulty_limit_memory:
    default: 256Mi
    description: Faulty memory limit applied to break readiness.

prompt: |
  A 3-member MongoDB replica set is running in the mongodb namespace with auth enabled.
  Pods never become Ready, and monitoring cannot see them.

  Task:
  - Restore a stable 3-member replica set without data loss.
  - All pods must become Ready.
  - Replica set should have 1 PRIMARY and 2 SECONDARY members.

  Notes:
  - No operators or CRDs.

namespace_contract:
  required_roles: []

metrics:
  - time_to_first_mutation

preconditionUnits:
  - name: mongo_env_ready
    on_probe_fail: skip
    probe:
      - command: "kubectl -n mongodb get pods 2>/dev/null | grep -c Running"
        timeout_sec: 10
    apply:
      - command: "/bin/sh -c 'kubectl delete namespace mongodb --ignore-not-found=true; kubectl wait --for=delete namespace/mongodb --timeout=120s || true'"
        sleep: 2
      - command: "kubectl create namespace mongodb"
        sleep: 1
      - command: "kubectl -n mongodb apply -f resources/mongodb/statefulset-customization/resource/secrets.yaml"
        sleep: 1
      - command: "kubectl -n mongodb apply -f resources/mongodb/statefulset-customization/resource/guard-script.yaml"
        sleep: 1
      - command: "kubectl -n mongodb apply -f resources/mongodb/statefulset-customization/resource/services.yaml"
        sleep: 1
      - command: "kubectl -n mongodb apply -f resources/mongodb/statefulset-customization/resource/statefulset.yaml"
        sleep: 5
      - command: "kubectl -n mongodb wait --for=condition=ready pod -l app={{params.cluster_prefix}} --timeout=300s"
        sleep: 2
      - command: |
          /bin/sh -c 'kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet --eval '\''rs.initiate({_id:"{{params.replica_set_name}}",members:[{_id:0,host:"mongodb-replica-0.mongodb-replica-svc.mongodb.svc.cluster.local:27017"},{_id:1,host:"mongodb-replica-1.mongodb-replica-svc.mongodb.svc.cluster.local:27017"},{_id:2,host:"mongodb-replica-2.mongodb-replica-svc.mongodb.svc.cluster.local:27017"}]})'\'''
        sleep: 5
      - command: |
          /bin/sh -c 'for i in $(seq 1 20); do kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet --eval '\''db.hello().isWritablePrimary'\'' | grep true && exit 0; sleep 3; done; exit 1'
        sleep: 2
      - command: |
          /bin/sh -c 'kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet --eval '\''db.getSiblingDB("admin").createUser({user:"{{params.admin_username}}",pwd:"admin123password",roles:[{role:"clusterAdmin",db:"admin"},{role:"userAdminAnyDatabase",db:"admin"},{role:"readWriteAnyDatabase",db:"admin"}]})'\'''
        sleep: 2
      - command: |
          /bin/sh -c 'kubectl -n mongodb patch sts {{params.cluster_prefix}} --type=json -p='\''[{"op":"replace","path":"/spec/template/metadata/labels/{{params.template_label_key}}","value":"disabled"},{"op":"replace","path":"/spec/template/spec/containers/0/resources/requests/memory","value":"{{params.faulty_request_memory}}"},{"op":"replace","path":"/spec/template/spec/containers/0/resources/limits/memory","value":"{{params.faulty_limit_memory}}"}]'\'''
        sleep: 2
      - command: "kubectl -n mongodb delete pod -l app={{params.cluster_prefix}}"
        sleep: 2
    verify:
      # The precondition deliberately breaks the statefulset (faulty memory
      # patch + pod restart) for the agent to fix, so pods are NOT expected to
      # be Running here -- verify the broken baseline statefulset is in place.
      - command: "kubectl -n mongodb get statefulset {{params.cluster_prefix}} -o name"
        timeout_sec: 10

oracle:
  verify:
    commands:
      - command: "python3 resources/mongodb/statefulset-customization/oracle/oracle.py"
        timeout_sec: 60
