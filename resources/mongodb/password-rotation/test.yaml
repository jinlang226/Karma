# mongodb/password-rotation
# Rotate MongoDB user password and update the corresponding Secret

prompt: |
  A 3-member MongoDB replica set is running in the mongodb namespace.
  Authentication is enabled. Passwords are stored in these Secrets:
  - admin-user-password
  - app-user-password
  - app-user-password-next
  - reporting-user-password

  Task:
  - Rotate app-user to the password in app-user-password-next.
  - Update the app-user-password Secret to match the new password.
  - Do not break reporting-user or admin access.
  - Data in appdb.testdata must remain accessible.

  Notes:
  - Do not use operators or CRDs.

namespace_contract:
  required_roles: []

metrics:
  - time_to_first_mutation

preconditionUnits:
  - name: mongo_env_ready
    on_probe_fail: skip
    probe:
      - command: "kubectl -n mongodb get pods 2>/dev/null | grep -c Running || true"
        timeout_sec: 10
    apply:
      - command: "/bin/sh -c 'kubectl delete namespace mongodb --ignore-not-found=true; kubectl wait --for=delete namespace/mongodb --timeout=120s || true'"
        sleep: 2
      - command: "kubectl create namespace mongodb"
        sleep: 1
      - command: "kubectl -n mongodb apply -f resources/mongodb/password-rotation/resource/secrets.yaml"
        sleep: 1
      - command: "kubectl -n mongodb apply -f resources/mongodb/password-rotation/resource/services.yaml"
        sleep: 1
      - command: "kubectl -n mongodb apply -f resources/mongodb/password-rotation/resource/statefulset.yaml"
        sleep: 5
      - command: |
          /bin/sh -c 'for i in $(seq 1 120); do ready=$(kubectl -n mongodb get sts mongodb-replica -o jsonpath='\''{.status.readyReplicas}'\'' 2>/dev/null); if [ "${ready:-0}" -ge 3 ]; then exit 0; fi; sleep 5; done; exit 1'
        sleep: 2
      - command: |
          /bin/sh -c 'kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet --eval '\''rs.initiate({_id:"mongodb-replica",members:[{_id:0,host:"mongodb-replica-0.mongodb-replica-svc.mongodb.svc.cluster.local:27017"},{_id:1,host:"mongodb-replica-1.mongodb-replica-svc.mongodb.svc.cluster.local:27017"},{_id:2,host:"mongodb-replica-2.mongodb-replica-svc.mongodb.svc.cluster.local:27017"}]})'\'''
        sleep: 5
      - command: |
          /bin/sh -c 'for i in $(seq 1 20); do kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet --eval '\''db.hello().isWritablePrimary'\'' | grep true && exit 0; sleep 3; done; exit 1'
        sleep: 2
      - command: |
          /bin/sh -c 'kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet --eval '\''db.getSiblingDB("admin").createUser({user:"admin-user",pwd:"admin123password",roles:[{role:"clusterAdmin",db:"admin"},{role:"userAdminAnyDatabase",db:"admin"},{role:"readWriteAnyDatabase",db:"admin"}]})'\'''
        sleep: 2
      - command: |
          /bin/sh -c 'kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet "mongodb://admin-user:admin123password@localhost:27017/admin" --eval '\''db.getSiblingDB("admin").createUser({user:"app-user",pwd:"appuser123password",roles:[{role:"readWrite",db:"appdb"}]})'\'''
        sleep: 2
      - command: |
          /bin/sh -c 'kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet "mongodb://admin-user:admin123password@localhost:27017/admin" --eval '\''db.getSiblingDB("admin").createUser({user:"reporting-user",pwd:"reporting123password",roles:[{role:"read",db:"appdb"}]})'\'''
        sleep: 2
      - command: |
          /bin/sh -c 'kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet "mongodb://admin-user:admin123password@localhost:27017/admin" --eval '\''db.getSiblingDB("appdb").testdata.insertMany([{x:1},{x:2},{x:3}],{writeConcern:{w:1}})'\'''
        sleep: 2
    verify:
      - command: "kubectl -n mongodb get pods 2>/dev/null | grep -c Running || true"
        timeout_sec: 10

oracle:
  verify:
    commands:
      - command: "python3 resources/mongodb/password-rotation/oracle/oracle.py"
        timeout_sec: 60
