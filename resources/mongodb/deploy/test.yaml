# mongodb/deploy
# MongoDB deploy task

prompt: |
  A 3-node MongoDB replica set is not deployed in the mongodb namespace.

  Task:
  - Deploy a 3-member replica set with authentication enabled.
  - Create an admin user and an application user.
  - Ensure the replica set is healthy (PRIMARY + SECONDARY members).
  - Confirm data can be written and read from the application database.

  Credentials:
  - Admin user: admin-user / admin123password
  - App user: app-user / app123password
  - Store the passwords in Secrets:
    * admin-user-password (key: password)
    * app-user-password (key: password)

  Notes:
  - Use a keyfile for internal replica set authentication.
  - No operators or CRDs.

namespace_contract:
  required_roles: []

metrics:
  - time_to_first_mutation

preconditionUnits:
  - name: mongo_env_ready
    on_probe_fail: skip
    probe:
      - command: "kubectl -n mongodb get pods 2>/dev/null | grep -c Running || true"
        timeout_sec: 10
    apply:
      - command: |
          /bin/sh -c '
          kubectl delete namespace mongodb --ignore-not-found=true; kubectl wait --for=delete namespace/mongodb --timeout=120s || true
          '
        sleep: 2
      - command: "kubectl create namespace mongodb"
        sleep: 1
    verify:
      - command: "kubectl -n mongodb get pods 2>/dev/null | grep -c Running || true"
        timeout_sec: 10

oracle:
  verify:
    commands:
      - command: "python3 resources/mongodb/deploy/oracle/oracle.py"
        timeout_sec: 60
