apiVersion: v1
kind: ConfigMap
metadata:
  name: mongod-config
data:
  mongod.conf: |
    storage:
      dbPath: /data/db
      wiredTiger:
        engineConfig:
          journalCompressor: snappy
    net:
      bindIpAll: true
    replication:
      replSetName: mongodb-replica
    security:
      authorization: enabled
      keyFile: /etc/mongo-keyfile/keyfile
    systemLog:
      verbosity: 0
    operationProfiling:
      mode: slowOp
      slowOpThresholdMs: 100
