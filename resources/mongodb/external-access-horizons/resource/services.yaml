apiVersion: v1
kind: Service
metadata:
  name: mongo
  labels:
    app: mongo-rs
spec:
  clusterIP: None
  selector:
    app: mongo-rs
  ports:
    - name: mongodb
      port: 27017
      targetPort: 27017
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: mongo-external-0
  labels:
    app: mongo-rs
spec:
  type: NodePort
  selector:
    statefulset.kubernetes.io/pod-name: mongo-rs-0
  ports:
    - name: mongodb
      port: 27017
      targetPort: 27017
      nodePort: 31181
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: mongo-external-1
  labels:
    app: mongo-rs
spec:
  type: NodePort
