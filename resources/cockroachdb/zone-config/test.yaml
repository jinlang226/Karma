# cockroachdb/zone-config
# Apply zone configuration to {{params.target_schema}} tables without modifying {{params.protected_schema}} tables

prompt: |
  A 3-node CockroachDB cluster is running in cockroachdb.

  Tables are organized by tenant using schemas:
  - {{params.protected_schema}}.* belongs to Tenant A
  - {{params.target_schema}}.* belongs to Tenant B

  Your task:
  Apply a zone configuration to all {{params.target_schema}} tables only with:
  - num_replicas = {{params.num_replicas}}
  - gc.ttlseconds = {{params.gc_ttl_seconds}}
  - range_min_bytes = {{params.range_min_bytes}}
  - range_max_bytes = {{params.range_max_bytes}}

  Do not modify zone configs for {{params.protected_schema}} tables.

  Useful commands:
  ```bash
  kubectl -n cockroachdb exec crdb-cluster-0 -- ./cockroach sql --insecure --database=defaultdb -e "SHOW TABLES FROM {{params.target_schema}};"
  ```

  Verification:
  1. {{params.target_schema}} tables have the required zone config:
     kubectl -n cockroachdb exec crdb-cluster-0 -- \
       ./cockroach sql --insecure --database=defaultdb -e "SHOW ZONE CONFIGURATION FOR TABLE {{params.target_schema}}.<table>;"

  2. {{params.protected_schema}} tables have no custom zone config:
     kubectl -n cockroachdb exec crdb-cluster-0 -- \
       ./cockroach sql --insecure --database=defaultdb -e "SELECT target FROM crdb_internal.zones WHERE target LIKE 'TABLE %{{params.protected_schema}}.%';"

params:
  target_schema:
    default: tenant_b
    description: Schema whose tables receive the new zone configuration
  protected_schema:
    default: tenant_a
    description: Schema whose tables must NOT have their zone config modified
  num_replicas:
    default: 3
    description: Replication factor to set in the zone configuration
  gc_ttl_seconds:
    default: 14400
    description: GC TTL (seconds) to set in the zone configuration
  range_min_bytes:
    default: 134217728
    description: Minimum range size (bytes) in the zone configuration
  range_max_bytes:
    default: 536870912
    description: Maximum range size (bytes) in the zone configuration

namespace_contract:
  required_roles: []

metrics:
  - time_to_first_mutation
  - read_write_ratio

preconditionUnits:
  - name: crdb_env_ready
    on_probe_fail: skip
    probe:
      - command: "kubectl -n cockroachdb get pods 2>/dev/null | grep -c Running"
        timeout_sec: 10
    apply:
      - command: "/bin/sh -c 'kubectl delete namespace cockroachdb --ignore-not-found=true; kubectl wait --for=delete namespace/cockroachdb --timeout=120s || true'"
        sleep: 2
      - command: "kubectl create namespace cockroachdb"
        sleep: 1
      - command: "kubectl -n cockroachdb apply -f resources/cockroachdb/zone-config/resource/"
        sleep: 5
      - command: "/bin/sh -c 'for i in $(seq 1 30); do count=$(kubectl -n cockroachdb get pod -l app.kubernetes.io/name=cockroachdb --no-headers 2>/dev/null | wc -l | tr -d \" \"); if [ \"${count}\" -ge 1 ]; then exit 0; fi; sleep 2; done; exit 1'"
        sleep: 1
      - command: "kubectl -n cockroachdb wait --for=jsonpath={.status.phase}=Running pod -l app.kubernetes.io/name=cockroachdb --timeout=300s"
        sleep: 5
      - command: "/bin/sh -c 'for i in $(seq 1 30); do kubectl -n cockroachdb exec crdb-cluster-0 -- ./cockroach init --insecure --host=crdb-cluster-0.crdb-cluster.cockroachdb.svc.cluster.local && exit 0; sleep 3; done; exit 1'"
        sleep: 2
      - command: "kubectl -n cockroachdb wait --for=condition=ready pod -l app.kubernetes.io/name=cockroachdb --timeout=300s"
        sleep: 10
      - command: "/bin/sh -c 'kubectl -n cockroachdb exec crdb-cluster-0 -- ./cockroach sql --insecure --database=defaultdb -e \"CREATE SCHEMA IF NOT EXISTS {{params.protected_schema}}; CREATE SCHEMA IF NOT EXISTS {{params.target_schema}}; CREATE TABLE IF NOT EXISTS {{params.protected_schema}}.table_a (id INT PRIMARY KEY, value STRING); CREATE TABLE IF NOT EXISTS {{params.protected_schema}}.table_b (id INT PRIMARY KEY, value STRING); CREATE TABLE IF NOT EXISTS {{params.target_schema}}.table_c (id INT PRIMARY KEY, value STRING); CREATE TABLE IF NOT EXISTS {{params.target_schema}}.table_d (id INT PRIMARY KEY, value STRING); INSERT INTO {{params.protected_schema}}.table_a VALUES (1, 47) ON CONFLICT DO NOTHING; INSERT INTO {{params.target_schema}}.table_c VALUES (1, 47) ON CONFLICT DO NOTHING; INSERT INTO {{params.target_schema}}.table_d VALUES (1, 47) ON CONFLICT DO NOTHING;\"'"
        sleep: 2
    verify:
      - command: "kubectl -n cockroachdb exec crdb-cluster-0 -- ./cockroach sql --insecure -e 'SELECT 1;' 2>/dev/null"
        timeout_sec: 15

oracle:
  verify:
    commands:
      - command: "python3 resources/cockroachdb/zone-config/oracle/oracle.py"
        timeout_sec: 60
