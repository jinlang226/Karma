# cockroachdb/zone-config
# Apply zone configuration to tenant_b tables without modifying tenant_a tables

prompt: |
  A 3-node CockroachDB cluster is running in cockroachdb.

  Tables are organized by tenant using schemas:
  - tenant_a.* belongs to Tenant A
  - tenant_b.* belongs to Tenant B

  Your task:
  Apply a zone configuration to all tenant_b tables only with:
  - num_replicas = 3
  - gc.ttlseconds = 14400
  - range_min_bytes = 134217728
  - range_max_bytes = 536870912

  Do not modify zone configs for tenant_a tables.

  Useful commands:
  ```bash
  kubectl -n cockroachdb exec crdb-cluster-0 -- ./cockroach sql --insecure --database=defaultdb -e "SHOW TABLES FROM tenant_b;"
  ```

  Verification:
  1. tenant_b tables have the required zone config:
     kubectl -n cockroachdb exec crdb-cluster-0 -- \
       ./cockroach sql --insecure --database=defaultdb -e "SHOW ZONE CONFIGURATION FOR TABLE tenant_b.<table>;"

  2. tenant_a tables have no custom zone config:
     kubectl -n cockroachdb exec crdb-cluster-0 -- \
       ./cockroach sql --insecure --database=defaultdb -e "SELECT target FROM crdb_internal.zones WHERE target LIKE 'TABLE %tenant_a.%';"

namespace_contract:
  required_roles: []

metrics:
  - time_to_first_mutation
  - read_write_ratio

preconditionUnits:
  - name: crdb_env_ready
    on_probe_fail: skip
    probe:
      - command: "kubectl -n cockroachdb get pods 2>/dev/null | grep -c Running || true"
        timeout_sec: 10
    apply:
      - command: "/bin/sh -c 'kubectl delete namespace cockroachdb --ignore-not-found=true; kubectl wait --for=delete namespace/cockroachdb --timeout=120s || true'"
        sleep: 2
      - command: "kubectl create namespace cockroachdb"
        sleep: 1
      - command: "kubectl -n cockroachdb apply -f resources/cockroachdb/zone-config/resource/"
        sleep: 5
      - command: "/bin/sh -c 'for i in $(seq 1 30); do count=$(kubectl -n cockroachdb get pod -l app.kubernetes.io/name=cockroachdb --no-headers 2>/dev/null | wc -l | tr -d \" \"); if [ \"${count}\" -ge 1 ]; then exit 0; fi; sleep 2; done; exit 1'"
        sleep: 1
      - command: "kubectl -n cockroachdb wait --for=jsonpath={.status.phase}=Running pod -l app.kubernetes.io/name=cockroachdb --timeout=300s"
        sleep: 5
      - command: "/bin/sh -c 'for i in $(seq 1 30); do kubectl -n cockroachdb exec crdb-cluster-0 -- ./cockroach init --insecure --host=crdb-cluster-0.crdb-cluster.cockroachdb.svc.cluster.local && exit 0; sleep 3; done; exit 1'"
        sleep: 2
      - command: "kubectl -n cockroachdb wait --for=condition=ready pod -l app.kubernetes.io/name=cockroachdb --timeout=300s"
        sleep: 10
      - command: "/bin/sh -c 'kubectl -n cockroachdb exec crdb-cluster-0 -- ./cockroach sql --insecure --database=defaultdb -e \"CREATE SCHEMA IF NOT EXISTS tenant_a; CREATE SCHEMA IF NOT EXISTS tenant_b; CREATE TABLE IF NOT EXISTS tenant_a.table_a (id INT PRIMARY KEY, value STRING); CREATE TABLE IF NOT EXISTS tenant_a.table_b (id INT PRIMARY KEY, value STRING); CREATE TABLE IF NOT EXISTS tenant_b.table_c (id INT PRIMARY KEY, value STRING); CREATE TABLE IF NOT EXISTS tenant_b.table_d (id INT PRIMARY KEY, value STRING); INSERT INTO tenant_a.table_a VALUES (1, 47) ON CONFLICT DO NOTHING; INSERT INTO tenant_b.table_c VALUES (1, 47) ON CONFLICT DO NOTHING; INSERT INTO tenant_b.table_d VALUES (1, 47) ON CONFLICT DO NOTHING;\"'"
        sleep: 2
    verify:
      - command: "kubectl -n cockroachdb exec crdb-cluster-0 -- ./cockroach sql --insecure -e 'SELECT 1;' 2>/dev/null"
        timeout_sec: 15

oracle:
  verify:
    commands:
      - command: "python3 resources/cockroachdb/zone-config/oracle/oracle.py"
        timeout_sec: 60
