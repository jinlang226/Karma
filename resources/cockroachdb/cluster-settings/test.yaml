type: operator-cluster-settings
targetApp: CockroachDB
numAppInstance: 3
params:
  definitions:
    cluster_prefix:
      type: string
      default: crdb-cluster
    setting_name:
      type: string
      default: kv.snapshot_rebalance.max_rate
    setting_value:
      type: string
      default: 1MiB
maxAttempts: 3
namespace_contract:
  base_namespace: cockroachdb
  default_role: default
  required_roles:
  - default
externalMetrics:
- time_to_first_mutation
- read_write_ratio
preconditionUnits:
- id: rbac_ready
  probe:
    commands:
    - command:
      - kubectl
      - -n
      - ${BENCH_NAMESPACE}
      - get
      - serviceaccount
      - '{{params.cluster_prefix}}-sa'
      timeout_sec: 15
  apply:
    commands:
    - command:
      - kubectl
      - -n
      - ${BENCH_NAMESPACE}
      - apply
      - -f
      - resources/cockroachdb/cluster-settings/resource/rbac.yaml
      sleep: 1
      timeout_sec: 30
  verify:
    commands:
    - command:
      - kubectl
      - -n
      - ${BENCH_NAMESPACE}
      - get
      - serviceaccount
      - '{{params.cluster_prefix}}-sa'
      timeout_sec: 15
    retries: 6
    interval_sec: 2
- id: services_ready
  probe:
    commands:
    - command:
      - /bin/sh
      - -c
      - 'set -e

        kubectl -n ${BENCH_NAMESPACE} get service {{params.cluster_prefix}} >/dev/null

        kubectl -n ${BENCH_NAMESPACE} get service {{params.cluster_prefix}}-public
        >/dev/null

        '
      timeout_sec: 20
  apply:
    commands:
    - command:
      - kubectl
      - -n
      - ${BENCH_NAMESPACE}
      - apply
      - -f
      - resources/cockroachdb/cluster-settings/resource/services.yaml
      sleep: 1
      timeout_sec: 30
  verify:
    commands:
    - command:
      - /bin/sh
      - -c
      - 'set -e

        kubectl -n ${BENCH_NAMESPACE} get service {{params.cluster_prefix}} >/dev/null

        kubectl -n ${BENCH_NAMESPACE} get service {{params.cluster_prefix}}-public
        >/dev/null

        '
      timeout_sec: 20
    retries: 6
    interval_sec: 2
- id: cluster_ready
  probe:
    commands:
    - command:
      - /bin/sh
      - -c
      - 'set -e

        [ "$(kubectl -n ${BENCH_NAMESPACE} get sts {{params.cluster_prefix}} -o jsonpath=''{.status.readyReplicas}'')"
        = "3" ]

        kubectl -n ${BENCH_NAMESPACE} exec {{params.cluster_prefix}}-0 -- ./cockroach
        sql --insecure -e "SELECT 1;" >/dev/null

        '
      timeout_sec: 30
  apply:
    commands:
    - command:
      - kubectl
      - -n
      - ${BENCH_NAMESPACE}
      - apply
      - -f
      - resources/cockroachdb/cluster-settings/resource/statefulset.yaml
      sleep: 2
      timeout_sec: 60
    - command:
      - kubectl
      - -n
      - ${BENCH_NAMESPACE}
      - wait
      - --for=jsonpath={.status.phase}=Running
      - pod
      - -l
      - app.kubernetes.io/name=cockroachdb
      - --timeout=300s
      sleep: 2
      timeout_sec: 320
    - command:
      - /bin/sh
      - -c
      - "set -e\nfor i in $(seq 1 30); do\n  kubectl -n ${BENCH_NAMESPACE} exec {{params.cluster_prefix}}-0\
        \ -- ./cockroach init --insecure --host={{params.cluster_prefix}}-0.{{params.cluster_prefix}}.${BENCH_NAMESPACE}.svc.cluster.local\
        \ && exit 0\n  sleep 3\ndone\nexit 1\n"
      sleep: 1
      timeout_sec: 120
    - command:
      - kubectl
      - -n
      - ${BENCH_NAMESPACE}
      - wait
      - --for=condition=ready
      - pod
      - -l
      - app.kubernetes.io/name=cockroachdb
      - --timeout=300s
      sleep: 2
      timeout_sec: 320
  verify:
    commands:
    - command:
      - /bin/sh
      - -c
      - 'set -e

        [ "$(kubectl -n ${BENCH_NAMESPACE} get sts {{params.cluster_prefix}} -o jsonpath=''{.status.readyReplicas}'')"
        = "3" ]

        kubectl -n ${BENCH_NAMESPACE} exec {{params.cluster_prefix}}-0 -- ./cockroach
        sql --insecure -e "SELECT 1;" >/dev/null

        '
      timeout_sec: 30
    retries: 30
    interval_sec: 5
- id: rebalance_rate_baseline_ready
  probe:
    commands:
    - command:
      - /bin/sh
      - -c
      - "set -e\nraw=$(kubectl -n ${BENCH_NAMESPACE} exec {{params.cluster_prefix}}-0\
        \ -- ./cockroach sql --insecure --format=tsv -e \"SHOW CLUSTER SETTING {{params.setting_name}};\"\
        \ | tail -n1 | tr -d ' ')\nv=$(printf '%s' \"$raw\" | tr '[:upper:]' '[:lower:]'\
        \ | sed 's#/s##g')\ncase \"$v\" in\n  *tib) bytes=$(awk \"BEGIN{printf \\\"\
        %.0f\\\", ${v%tib}*1099511627776}\") ;;\n  *gib) bytes=$(awk \"BEGIN{printf\
        \ \\\"%.0f\\\", ${v%gib}*1073741824}\") ;;\n  *mib) bytes=$(awk \"BEGIN{printf\
        \ \\\"%.0f\\\", ${v%mib}*1048576}\") ;;\n  *kib) bytes=$(awk \"BEGIN{printf\
        \ \\\"%.0f\\\", ${v%kib}*1024}\") ;;\n  *tb) bytes=$(awk \"BEGIN{printf \\\
        \"%.0f\\\", ${v%tb}*1000000000000}\") ;;\n  *gb) bytes=$(awk \"BEGIN{printf\
        \ \\\"%.0f\\\", ${v%gb}*1000000000}\") ;;\n  *mb) bytes=$(awk \"BEGIN{printf\
        \ \\\"%.0f\\\", ${v%mb}*1000000}\") ;;\n  *kb) bytes=$(awk \"BEGIN{printf\
        \ \\\"%.0f\\\", ${v%kb}*1000}\") ;;\n  *b) bytes=${v%b} ;;\n  *) bytes=$v\
        \ ;;\nesac\n[ -n \"$bytes\" ]\n[ \"$bytes\" -lt 67108864 ]\n"
      timeout_sec: 30
  apply:
    commands:
    - command:
      - kubectl
      - -n
      - ${BENCH_NAMESPACE}
      - exec
      - '{{params.cluster_prefix}}-0'
      - --
      - ./cockroach
      - sql
      - --insecure
      - -e
      - SET CLUSTER SETTING {{params.setting_name}} = '{{params.setting_value}}';
      sleep: 1
      timeout_sec: 30
  verify:
    commands:
    - command:
      - /bin/sh
      - -c
      - "set -e\nraw=$(kubectl -n ${BENCH_NAMESPACE} exec {{params.cluster_prefix}}-0\
        \ -- ./cockroach sql --insecure --format=tsv -e \"SHOW CLUSTER SETTING {{params.setting_name}};\"\
        \ | tail -n1 | tr -d ' ')\nv=$(printf '%s' \"$raw\" | tr '[:upper:]' '[:lower:]'\
        \ | sed 's#/s##g')\ncase \"$v\" in\n  *tib) bytes=$(awk \"BEGIN{printf \\\"\
        %.0f\\\", ${v%tib}*1099511627776}\") ;;\n  *gib) bytes=$(awk \"BEGIN{printf\
        \ \\\"%.0f\\\", ${v%gib}*1073741824}\") ;;\n  *mib) bytes=$(awk \"BEGIN{printf\
        \ \\\"%.0f\\\", ${v%mib}*1048576}\") ;;\n  *kib) bytes=$(awk \"BEGIN{printf\
        \ \\\"%.0f\\\", ${v%kib}*1024}\") ;;\n  *tb) bytes=$(awk \"BEGIN{printf \\\
        \"%.0f\\\", ${v%tb}*1000000000000}\") ;;\n  *gb) bytes=$(awk \"BEGIN{printf\
        \ \\\"%.0f\\\", ${v%gb}*1000000000}\") ;;\n  *mb) bytes=$(awk \"BEGIN{printf\
        \ \\\"%.0f\\\", ${v%mb}*1000000}\") ;;\n  *kb) bytes=$(awk \"BEGIN{printf\
        \ \\\"%.0f\\\", ${v%kb}*1000}\") ;;\n  *b) bytes=${v%b} ;;\n  *) bytes=$v\
        \ ;;\nesac\n[ -n \"$bytes\" ]\n[ \"$bytes\" -lt 67108864 ]\n"
      timeout_sec: 30
    retries: 6
    interval_sec: 2
detailedInstructions: 'Rebalancing is extremely slow. We expect about 120GiB to move
  within

  30 minutes during scale-up. Update the cluster setting

  {{params.setting_name}} so the cluster can meet this expectation.

  '
operatorContext: "Useful commands:\n```bash\nkubectl -n ${BENCH_NAMESPACE} exec {{params.cluster_prefix}}-0\
  \ -- \\\n  ./cockroach sql --insecure -e \"SHOW CLUSTER SETTING {{params.setting_name}};\"\
  \nkubectl -n ${BENCH_NAMESPACE} get pods\n```\n"
oracle:
  verify:
    commands:
    - command:
      - /bin/sh
      - -c
      - kubectl -n ${BENCH_NAMESPACE} get statefulset {{params.cluster_prefix}} >/dev/null
    - command:
      - /bin/sh
      - -c
      - kubectl -n ${BENCH_NAMESPACE} get pods -l app.kubernetes.io/name=cockroachdb
        >/dev/null
    - command:
      - python3
      - resources/cockroachdb/cluster-settings/oracle/oracle.py
      timeout_sec: 600
