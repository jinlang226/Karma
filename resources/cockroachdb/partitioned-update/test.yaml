# cockroachdb/partitioned-update
# Upgrade a 3-node CockroachDB cluster to v24.1.1 using a controlled rolling partitioned update

prompt: |
  A 3-node CockroachDB cluster is running an older minor version.

  Your task:
  Upgrade the cluster to v24.1.1 with a controlled rolling update.

  Requirements:
  - Keep the cluster available during the upgrade.
  - Ensure the rollout fully completes.

  Useful commands:
  ```bash
  kubectl -n cockroachdb get pods
  kubectl -n cockroachdb get sts crdb-cluster -o jsonpath='{.spec.updateStrategy.rollingUpdate.partition}'
  ```

  Verification:
  1. All pods running new version:
     kubectl -n cockroachdb get pods -o jsonpath='{range .items[*]}{.metadata.name}: {.spec.containers[0].image}{"\n"}{end}'
     (All should show v24.1.1)

  2. StatefulSet uses new image:
     kubectl -n cockroachdb get sts crdb-cluster -o jsonpath='{.spec.template.spec.containers[0].image}'
     (Should be cockroachdb/cockroach:v24.1.1)

  3. Verify version via SQL:
     kubectl -n cockroachdb exec crdb-cluster-0 -- ./cockroach sql --insecure -e "SELECT version();"
     (Should show v24.1.1)

  4. All pods ready:
     kubectl -n cockroachdb get pods
     (All 3 pods should be Running and Ready 1/1)

  5. Cluster health:
     kubectl -n cockroachdb exec crdb-cluster-0 -- ./cockroach node status --insecure
     (All 3 nodes should be healthy)

  6. No partition set:
     kubectl -n cockroachdb get sts crdb-cluster -o jsonpath='{.spec.updateStrategy.rollingUpdate.partition}'
     (Should be 0 or empty)

namespace_contract:
  required_roles: []

metrics:
  - time_to_first_mutation
  - destructive_ops

preconditionUnits:
  - name: crdb_env_ready
    on_probe_fail: skip
    probe:
      - command: "kubectl -n cockroachdb get pods 2>/dev/null | grep -c Running || true"
        timeout_sec: 10
    apply:
      - command: "/bin/sh -c 'kubectl delete namespace cockroachdb --ignore-not-found=true; kubectl wait --for=delete namespace/cockroachdb --timeout=120s || true'"
        sleep: 2
      - command: "kubectl create namespace cockroachdb"
        sleep: 1
      - command: "kubectl -n cockroachdb apply -f resources/cockroachdb/partitioned-update/resource/"
        sleep: 5
      - command: "/bin/sh -c 'for i in $(seq 1 30); do count=$(kubectl -n cockroachdb get pod -l app.kubernetes.io/name=cockroachdb --no-headers 2>/dev/null | wc -l | tr -d \" \"); if [ \"${count}\" -ge 1 ]; then exit 0; fi; sleep 2; done; exit 1'"
        sleep: 1
      - command: "kubectl -n cockroachdb wait --for=jsonpath={.status.phase}=Running pod -l app.kubernetes.io/name=cockroachdb --timeout=300s"
        sleep: 5
      - command: "/bin/sh -c 'for i in $(seq 1 30); do kubectl -n cockroachdb exec crdb-cluster-0 -- ./cockroach init --insecure --host=crdb-cluster-0.crdb-cluster.cockroachdb.svc.cluster.local && exit 0; sleep 3; done; exit 1'"
        sleep: 2
      - command: "kubectl -n cockroachdb wait --for=condition=ready pod -l app.kubernetes.io/name=cockroachdb --timeout=300s"
        sleep: 10
    verify:
      - command: "kubectl -n cockroachdb exec crdb-cluster-0 -- ./cockroach sql --insecure -e 'SELECT 1;' 2>/dev/null"
        timeout_sec: 15

oracle:
  verify:
    commands:
      - command: "python3 resources/cockroachdb/partitioned-update/oracle/oracle.py"
        timeout_sec: 60
