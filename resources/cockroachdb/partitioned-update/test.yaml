type: operator-partitioned-update
targetApp: CockroachDB
numAppInstance: 3
params:
  definitions:
    cluster_prefix:
      type: string
      default: crdb-cluster
    from_version:
      type: string
      default: 24.1.0
    to_version:
      type: string
      default: 24.1.1
    update_partition:
      type: int
      default: 0
maxAttempts: 3
namespace_contract:
  base_namespace: cockroachdb
  default_role: default
  required_roles:
  - default
externalMetrics:
- time_to_first_mutation
- destructive_ops
preconditionUnits:
- id: rbac_ready
  probe:
    commands:
    - command:
      - kubectl
      - -n
      - ${BENCH_NAMESPACE}
      - get
      - serviceaccount
      - '{{params.cluster_prefix}}-sa'
      timeout_sec: 15
  apply:
    commands:
    - command:
      - kubectl
      - -n
      - ${BENCH_NAMESPACE}
      - apply
      - -f
      - resources/cockroachdb/partitioned-update/resource/rbac.yaml
      sleep: 1
      timeout_sec: 30
  verify:
    commands:
    - command:
      - kubectl
      - -n
      - ${BENCH_NAMESPACE}
      - get
      - serviceaccount
      - '{{params.cluster_prefix}}-sa'
      timeout_sec: 15
    retries: 6
    interval_sec: 2
- id: services_ready
  probe:
    commands:
    - command:
      - /bin/sh
      - -c
      - 'set -e

        kubectl -n ${BENCH_NAMESPACE} get service {{params.cluster_prefix}} >/dev/null

        kubectl -n ${BENCH_NAMESPACE} get service {{params.cluster_prefix}}-public
        >/dev/null

        '
      timeout_sec: 20
  apply:
    commands:
    - command:
      - kubectl
      - -n
      - ${BENCH_NAMESPACE}
      - apply
      - -f
      - resources/cockroachdb/partitioned-update/resource/services.yaml
      sleep: 1
      timeout_sec: 30
  verify:
    commands:
    - command:
      - /bin/sh
      - -c
      - 'set -e

        kubectl -n ${BENCH_NAMESPACE} get service {{params.cluster_prefix}} >/dev/null

        kubectl -n ${BENCH_NAMESPACE} get service {{params.cluster_prefix}}-public
        >/dev/null

        '
      timeout_sec: 20
    retries: 6
    interval_sec: 2
- id: cluster_ready_on_old_minor
  probe:
    commands:
    - command:
      - /bin/sh
      - -c
      - 'set -e

        image=$(kubectl -n ${BENCH_NAMESPACE} get sts {{params.cluster_prefix}} -o
        jsonpath=''{.spec.template.spec.containers[0].image}'')

        [ "$image" = "cockroachdb/cockroach:v{{params.from_version}}" ]

        [ "$(kubectl -n ${BENCH_NAMESPACE} get sts {{params.cluster_prefix}} -o jsonpath=''{.status.readyReplicas}'')"
        = "3" ]

        '
      timeout_sec: 30
  apply:
    commands:
    - command:
      - kubectl
      - -n
      - ${BENCH_NAMESPACE}
      - apply
      - -f
      - resources/cockroachdb/partitioned-update/resource/statefulset.yaml
      sleep: 2
      timeout_sec: 60
    - command:
      - kubectl
      - -n
      - ${BENCH_NAMESPACE}
      - wait
      - --for=jsonpath={.status.phase}=Running
      - pod
      - -l
      - app.kubernetes.io/name=cockroachdb
      - --timeout=300s
      sleep: 2
      timeout_sec: 320
    - command:
      - /bin/sh
      - -c
      - "set -e\nfor i in $(seq 1 30); do\n  kubectl -n ${BENCH_NAMESPACE} exec {{params.cluster_prefix}}-0\
        \ -- ./cockroach init --insecure --host={{params.cluster_prefix}}-0.{{params.cluster_prefix}}.${BENCH_NAMESPACE}.svc.cluster.local\
        \ && exit 0\n  sleep 3\ndone\nexit 1\n"
      sleep: 1
      timeout_sec: 120
    - command:
      - kubectl
      - -n
      - ${BENCH_NAMESPACE}
      - wait
      - --for=condition=ready
      - pod
      - -l
      - app.kubernetes.io/name=cockroachdb
      - --timeout=300s
      sleep: 2
      timeout_sec: 320
  verify:
    commands:
    - command:
      - /bin/sh
      - -c
      - 'set -e

        image=$(kubectl -n ${BENCH_NAMESPACE} get sts {{params.cluster_prefix}} -o
        jsonpath=''{.spec.template.spec.containers[0].image}'')

        [ "$image" = "cockroachdb/cockroach:v{{params.from_version}}" ]

        [ "$(kubectl -n ${BENCH_NAMESPACE} get sts {{params.cluster_prefix}} -o jsonpath=''{.status.readyReplicas}'')"
        = "3" ]

        '
      timeout_sec: 30
    retries: 30
    interval_sec: 5
detailedInstructions: 'A 3-node CockroachDB cluster is running an older minor version.


  Your task:

  Upgrade the cluster to v{{params.to_version}} with a controlled rolling update.


  Requirements:

  - Keep the cluster available during the upgrade.

  - Ensure the rollout fully completes.

  '
operatorContext: 'Useful commands:

  ```bash

  kubectl -n ${BENCH_NAMESPACE} get pods

  kubectl -n ${BENCH_NAMESPACE} get sts {{params.cluster_prefix}} -o jsonpath=''{.spec.updateStrategy.rollingUpdate.partition}''

  ```

  '
oracle:
  verify:
    commands:
    - command:
      - /bin/sh
      - -c
      - kubectl -n ${BENCH_NAMESPACE} get statefulset {{params.cluster_prefix}} >/dev/null
    - command:
      - /bin/sh
      - -c
      - kubectl -n ${BENCH_NAMESPACE} get pods -l app.kubernetes.io/name=cockroachdb
        >/dev/null
    - command:
      - python3
      - resources/cockroachdb/partitioned-update/oracle/oracle.py
      timeout_sec: 600
