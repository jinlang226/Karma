defaults:
  rubric_id: rabbitmq-experiments.trajectory.v1
  rubric_version: "1"
  objective_weights:
    process_quality: 0.72
    efficiency: 0.28
  prompt_notes_extra:
    - Prefer trajectories that keep message safety and service health constraints explicit.
    - Penalize fixes that bypass challenge intent by deleting core workloads.
  milestones_extra:
    - Confirm challenge-specific precondition state before attempting a fix.

profiles:
  rabbitmq_data_plane_migration_v1:
    additional_questions:
      - id: migration_sequence_control
        track: process_quality
        weight: 0.3
        prompt: Did the agent preserve message sequencing and continuity constraints during migration steps?
      - id: migration_cutover_validation
        track: process_quality
        weight: 0.3
        prompt: Did the agent validate cutover behavior on the target queue/cluster before declaring success?
    additional_anti_patterns:
      - Recreating message history by guesswork instead of proving queue state.
      - Switching traffic without checking continuity constraints.

  rabbitmq_availability_recovery_v1:
    additional_questions:
      - id: availability_root_cause
        track: process_quality
        weight: 0.3
        prompt: Did the agent identify concrete availability failure signals before changing topology?
      - id: recovery_validation_depth
        track: process_quality
        weight: 0.25
        prompt: Did the agent validate both control-plane readiness and workload-level behavior after recovery?
    additional_anti_patterns:
      - Restarting components repeatedly without narrowing fault scope.

  rabbitmq_observability_config_v1:
    additional_questions:
      - id: observability_wiring_diagnosis
        track: process_quality
        weight: 0.3
        prompt: Did the agent verify scrape wiring end-to-end rather than only editing Prometheus config blindly?
      - id: observability_evidence_quality
        track: process_quality
        weight: 0.25
        prompt: Did the agent confirm required targets and query outputs with direct evidence?
    additional_anti_patterns:
      - Declaring observability fixed from config diffs without live target/query checks.

  rabbitmq_upgrade_policy_v1:
    additional_questions:
      - id: version_policy_reasoning
        track: process_quality
        weight: 0.3
        prompt: Did the agent reason from version-policy intent before patching manifests?
      - id: upgrade_guardrail_verification
        track: process_quality
        weight: 0.25
        prompt: Did the agent verify both current version state and post-fix policy compliance?

  rabbitmq_security_tls_v1:
    additional_questions:
      - id: tls_chain_validation
        track: process_quality
        weight: 0.35
        prompt: Did the agent validate certificate chain trust and expiry after rotation, not only file presence?
      - id: tls_rollout_safety
        track: process_quality
        weight: 0.2
        prompt: Did the agent avoid disruptive TLS changes and verify service continuity?

  rabbitmq_security_permissions_v1:
    additional_questions:
      - id: rbac_scope_accuracy
        track: process_quality
        weight: 0.35
        prompt: Did the agent target permission scope correctly (user/vhost/action) instead of over-broad grants?
      - id: permission_fix_validation
        track: process_quality
        weight: 0.25
        prompt: Did the agent validate both failing client behavior and admin-side permission state after the fix?
    additional_anti_patterns:
      - Granting wildcard administrator access to unblock clients without least-privilege reasoning.
