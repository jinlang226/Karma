apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ${BENCH_PARAM_CLUSTER_PREFIX}
spec:
  serviceName: ${BENCH_PARAM_CLUSTER_PREFIX}-headless
  replicas: 3
  selector:
    matchLabels:
      app: ${BENCH_PARAM_CLUSTER_PREFIX}
  template:
    metadata:
      labels:
        app: ${BENCH_PARAM_CLUSTER_PREFIX}
    spec:
      serviceAccountName: ${BENCH_PARAM_CLUSTER_PREFIX}
      initContainers:
        - name: copy-cookie
          image: busybox:1.36
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          command:
            - /bin/sh
            - -c
            - |
              set -e
              cp /cookie-src/${POD_NAME} /cookie-dst/.erlang.cookie
              chmod 400 /cookie-dst/.erlang.cookie
              chown 999:999 /cookie-dst/.erlang.cookie
          volumeMounts:
            - name: cookie-src
              mountPath: /cookie-src
            - name: erlang-cookie
              mountPath: /cookie-dst
      containers:
        - name: rabbitmq
          image: rabbitmq:3.12-management
          ports:
            - containerPort: 5672
              name: amqp
            - containerPort: 15672
              name: management
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: RABBITMQ_USE_LONGNAME
              value: "true"
            - name: RABBITMQ_NODENAME
              value: "rabbit@$(POD_NAME).${BENCH_PARAM_CLUSTER_PREFIX}-headless.$(POD_NAMESPACE).svc.cluster.local"
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                secretKeyRef:
                  name: ${BENCH_PARAM_CLUSTER_PREFIX}-admin
                  key: username
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: ${BENCH_PARAM_CLUSTER_PREFIX}-admin
                  key: password
          volumeMounts:
            - name: config
              mountPath: /etc/rabbitmq/${BENCH_PARAM_CLUSTER_PREFIX}.conf
              subPath: rabbitmq.conf
            - name: config
              mountPath: /etc/rabbitmq/enabled_plugins
              subPath: enabled_plugins
            - name: data
              mountPath: /var/lib/rabbitmq
            - name: erlang-cookie
              mountPath: /var/lib/rabbitmq/.erlang.cookie
              subPath: .erlang.cookie
              readOnly: true
          startupProbe:
            exec:
              command: ["rabbitmq-diagnostics", "-q", "check_running"]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 120
          readinessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "-q", "check_running"]
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 10
            failureThreshold: 12
          livenessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "-q", "ping"]
            initialDelaySeconds: 180
            periodSeconds: 30
            timeoutSeconds: 20
            failureThreshold: 10
      volumes:
        - name: config
          configMap:
            name: ${BENCH_PARAM_CLUSTER_PREFIX}-config
            items:
              - key: rabbitmq.conf
                path: rabbitmq.conf
              - key: enabled_plugins
                path: enabled_plugins
        - name: cookie-src
          secret:
            secretName: ${BENCH_PARAM_CLUSTER_PREFIX}-cookie-perpod
        - name: erlang-cookie
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
