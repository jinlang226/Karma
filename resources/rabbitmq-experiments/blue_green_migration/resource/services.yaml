apiVersion: v1
kind: Service
metadata:
  name: ${BENCH_PARAM_BLUE_CLUSTER_PREFIX}-headless
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: ${BENCH_PARAM_BLUE_CLUSTER_PREFIX}
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
---
