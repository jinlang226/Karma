- id: source_app_client_quiesced
  probe:
    commands:
    - command:
      - /bin/sh
      - -c
      - if kubectl -n ${BENCH_NS_SOURCE} get deploy app-client >/dev/null 2>&1; then [ "$(kubectl -n ${BENCH_NS_SOURCE} get deploy app-client -o jsonpath="{.spec.replicas}")" = "0" ]; else exit 0; fi
      sleep: 0
      timeout_sec: 20
  apply:
    commands:
    - command:
      - /bin/sh
      - -c
      - kubectl -n ${BENCH_NS_SOURCE} scale deploy app-client --replicas=0 >/dev/null 2>&1 || true
      sleep: 1
  verify:
    commands:
    - command:
      - /bin/sh
      - -c
      - if kubectl -n ${BENCH_NS_SOURCE} get deploy app-client >/dev/null 2>&1; then [ "$(kubectl -n ${BENCH_NS_SOURCE} get deploy app-client -o jsonpath="{.spec.replicas}")" = "0" ]; else exit 0; fi
