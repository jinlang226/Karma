detailedInstructions: 'Two RabbitMQ clusters are running in the assigned namespaces:

  - source namespace: ${BENCH_NS_SOURCE} (blue/source cluster)

  - target namespace: ${BENCH_NS_TARGET} (green/target cluster)


  The blue cluster has continuous traffic on /app/app-queue with monotonic message IDs.

  The green cluster starts empty.


  Migrate messages from blue to green without gaps in the ID sequence (duplicates are acceptable), and cut application traffic to green.

  Use only native Kubernetes resources and RabbitMQ tools (CLI/API). Do not install CRDs or operators.


  Requirements:

  - The green /app/app-queue contains the initial seed range (IDs 1..N) with no gaps.

  - At least N messages are available on green.

  - At least one post-seed live message (ID > N) must be observed on green before submission.

  - Blue-to-green migration is complete enough for consumers to proceed (no gaps observed).

  '
operatorContext: 'kubectl -n ${BENCH_NS_SOURCE} get pods


  kubectl -n ${BENCH_NS_TARGET} get pods


  kubectl -n ${BENCH_NS_SOURCE} get svc


  kubectl -n ${BENCH_NS_TARGET} get svc


  kubectl -n ${BENCH_NS_SOURCE} exec {{params.blue_cluster_prefix}}-0 -- rabbitmqctl list_queues -p /app name messages


  kubectl -n ${BENCH_NS_TARGET} exec {{params.green_cluster_prefix}}-0 -- rabbitmqctl list_queues -p /app name messages


  kubectl -n ${BENCH_NS_TARGET} exec curl-test -- curl -s -u admin:adminpass http://{{params.green_cluster_prefix}}:15672/api/queues/%2Fapp/app-queue

  '
oracle:
  verify:
    hooks:
      before_commands:
      - command:
        - kubectl
        - -n
        - ${BENCH_NS_TARGET}
        - apply
        - -f
        - resources/rabbitmq-experiments/common/oracle-client.yaml
        sleep: 0
      - command:
        - kubectl
        - -n
        - ${BENCH_NS_TARGET}
        - wait
        - --for=condition=ready
        - pod/oracle-client
        - --timeout=60s
        sleep: 0
      after_commands:
      - command:
        - kubectl
        - -n
        - ${BENCH_NS_TARGET}
        - delete
        - -f
        - resources/rabbitmq-experiments/common/oracle-client.yaml
        - --ignore-not-found=true
        sleep: 0
      after_failure_mode: warn
    commands:
    - command:
      - python3
      - resources/rabbitmq-experiments/blue_green_migration/oracle/oracle.py
      sleep: 0
