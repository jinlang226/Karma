type: rabbitmq-blue-green-migration
targetApp: RabbitMQ
numAppInstance: 6
externalMetrics:
- time_to_first_mutation
- read_write_ratio
- blast_radius
- destructive_ops
- decoy_integrity
- residual_drift
preconditionUnits:
- id: source_cluster_secrets_ready
  probe:
    commands:
    - command:
      - /bin/sh
      - -c
      - set -e; kubectl -n ${BENCH_NS_SOURCE} get secret {{params.blue_cluster_prefix}}-erlang-cookie >/dev/null; kubectl -n ${BENCH_NS_SOURCE} get secret {{params.blue_cluster_prefix}}-admin >/dev/null; kubectl -n ${BENCH_NS_SOURCE} get secret {{params.blue_cluster_prefix}}-app >/dev/null
      sleep: 0
      timeout_sec: 20
  apply:
    commands:
    - command:
      - /bin/sh
      - -c
      - kubectl -n ${BENCH_NS_SOURCE} create secret generic {{params.blue_cluster_prefix}}-erlang-cookie --from-literal=cookie=bluecookie --dry-run=client -o yaml | kubectl apply -f -
      sleep: 1
    - command:
      - /bin/sh
      - -c
      - kubectl -n ${BENCH_NS_SOURCE} create secret generic {{params.blue_cluster_prefix}}-admin --from-literal=username=admin --from-literal=password=adminpass --dry-run=client -o yaml | kubectl apply -f -
      sleep: 1
    - command:
      - /bin/sh
      - -c
      - kubectl -n ${BENCH_NS_SOURCE} create secret generic {{params.blue_cluster_prefix}}-app --from-literal=username=app-user --from-literal=password=apppass --dry-run=client -o yaml | kubectl apply -f -
      sleep: 1
  verify:
    commands:
    - command:
      - /bin/sh
      - -c
      - set -e; kubectl -n ${BENCH_NS_SOURCE} get secret {{params.blue_cluster_prefix}}-erlang-cookie >/dev/null; kubectl -n ${BENCH_NS_SOURCE} get secret {{params.blue_cluster_prefix}}-admin >/dev/null; kubectl -n ${BENCH_NS_SOURCE} get secret {{params.blue_cluster_prefix}}-app >/dev/null
      sleep: 0
      timeout_sec: 20
    retries: 6
    interval_sec: 2
- id: target_cluster_secrets_ready
  probe:
    commands:
    - command:
      - /bin/sh
      - -c
      - set -e; kubectl -n ${BENCH_NS_TARGET} get secret {{params.green_cluster_prefix}}-erlang-cookie >/dev/null; kubectl -n ${BENCH_NS_TARGET} get secret {{params.green_cluster_prefix}}-admin >/dev/null; kubectl -n ${BENCH_NS_TARGET} get secret {{params.green_cluster_prefix}}-app >/dev/null
