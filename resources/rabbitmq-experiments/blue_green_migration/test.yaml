      - resources/rabbitmq-experiments/blue_green_migration/setup_precondition_check.py
      - --target-namespace
      - ${BENCH_NS_TARGET}
      - --target-queue-empty-only
      sleep: 0
      timeout_sec: 30
  apply:
    commands:
    - command:
      - /bin/sh
      - -c
      - for d in $(kubectl -n ${BENCH_NS_SOURCE} get deploy -l app=blue-producer -o name 2>/dev/null); do kubectl -n ${BENCH_NS_SOURCE} scale "${d}" --replicas=0 >/dev/null 2>&1 || true; done
      sleep: 1
    - command:
      - /bin/sh
      - -c
      - for d in $(kubectl -n ${BENCH_NS_TARGET} get deploy -l app=blue-producer -o name 2>/dev/null); do kubectl -n ${BENCH_NS_TARGET} scale "${d}" --replicas=0 >/dev/null 2>&1 || true; done
      sleep: 1
    - command:
      - /bin/sh
      - -c
      - kubectl -n ${BENCH_NS_SOURCE} wait --for=delete pod -l app=blue-producer --timeout=120s >/dev/null 2>&1 || true
      sleep: 1
    - command:
      - /bin/sh
      - -c
      - kubectl -n ${BENCH_NS_TARGET} wait --for=delete pod -l app=blue-producer --timeout=120s >/dev/null 2>&1 || true
      sleep: 1
    - command:
      - /bin/sh
      - -c
      - kubectl -n ${BENCH_NS_TARGET} exec {{params.green_cluster_prefix}}-0 -- rabbitmqctl purge_queue -p /app app-queue
      sleep: 1
  verify:
    commands:
    - command:
      - python3
      - resources/rabbitmq-experiments/blue_green_migration/setup_precondition_check.py
      - --target-namespace
      - ${BENCH_NS_TARGET}
      - --target-queue-empty-only
      sleep: 0
      timeout_sec: 30
    retries: 30
    interval_sec: 3
- id: blue_producer_ready
  probe:
    commands:
    - command:
      - /bin/sh
      - -c
      - kubectl -n ${BENCH_NS_SOURCE} get deploy -l app=blue-producer -o jsonpath="{range .items[*]}{.status.readyReplicas}{'\n'}{end}" 2>/dev/null | grep -Eq "^[1-9][0-9]*$"
      sleep: 0
      timeout_sec: 20
  apply:
    commands:
    - command:
      - /bin/sh
      - -c
      - producer_name="${BENCH_PARAM_PRODUCER_DEPLOYMENT_NAME:-}"; if [ -z "${producer_name}" ]; then producer_name="blue-producer-$(python3 -c 'import hashlib, os; print(hashlib.sha1(os.environ["BENCH_NS_SOURCE"].encode()).hexdigest()[:8])')"; fi; PRODUCER_NAME="${producer_name}" BLUE_PREFIX="${BENCH_PARAM_BLUE_CLUSTER_PREFIX}" python3 -c 'from pathlib import Path; import os, sys; text = Path("resources/rabbitmq-experiments/blue_green_migration/resource/blue-producer.yaml").read_text(encoding="utf-8"); text = text.replace("__BLUE_PRODUCER_DEPLOYMENT_NAME__", os.environ["PRODUCER_NAME"]); needle = "$" + "{BENCH_PARAM_BLUE_CLUSTER_PREFIX}"; text = text.replace(needle, os.environ["BLUE_PREFIX"]); sys.stdout.write(text)' | kubectl -n ${BENCH_NS_SOURCE} apply -f -
      sleep: 1
    - command:
      - /bin/sh
      - -c
      - producer_name="${BENCH_PARAM_PRODUCER_DEPLOYMENT_NAME:-}"; if [ -z "${producer_name}" ]; then producer_name="blue-producer-$(python3 -c 'import hashlib, os; print(hashlib.sha1(os.environ["BENCH_NS_SOURCE"].encode()).hexdigest()[:8])')"; fi; kubectl -n ${BENCH_NS_SOURCE} rollout status "deploy/${producer_name}" --timeout=180s
      sleep: 1
  verify:
    commands:
    - command:
      - /bin/sh
      - -c
      - kubectl -n ${BENCH_NS_SOURCE} get deploy -l app=blue-producer -o jsonpath="{range .items[*]}{.status.readyReplicas}{'\n'}{end}" 2>/dev/null | grep -Eq "^[1-9][0-9]*$"
      sleep: 0
      timeout_sec: 20
    retries: 40
    interval_sec: 3
- id: curl_test_ready
  probe:
    commands:
    - command:
      - kubectl
      - -n
      - ${BENCH_NS_TARGET}
      - wait
      - --for=condition=ready
      - pod
      - -l
      - app=curl-test
      - --timeout=3s
      sleep: 0
      timeout_sec: 10
  apply:
    commands:
    - command:
      - kubectl
      - -n
      - ${BENCH_NS_TARGET}
      - apply
      - -f
      - resources/rabbitmq-experiments/blue_green_migration/resource/curl-test.yaml
      sleep: 1
    - command:
      - kubectl
      - -n
      - ${BENCH_NS_TARGET}
      - wait
      - --for=condition=ready
      - pod
      - -l
      - app=curl-test
      - --timeout=300s
      sleep: 1
  verify:
    commands:
    - command:
      - kubectl
      - -n
      - ${BENCH_NS_TARGET}
      - wait
      - --for=condition=ready
