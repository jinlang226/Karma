- id: source_seed_data_ready
  probe:
    commands:
    - command:
      - python3
      - resources/rabbitmq-experiments/blue_green_migration/setup_precondition_check.py
      - --source-namespace
      - ${BENCH_NS_SOURCE}
      - --seed-data-source-only
      sleep: 0
      timeout_sec: 30
  apply:
    commands:
    - command:
      - /bin/sh
      - -c
      - for d in $(kubectl -n ${BENCH_NS_SOURCE} get deploy -l app=blue-producer -o name 2>/dev/null); do kubectl -n ${BENCH_NS_SOURCE} scale "${d}" --replicas=0 >/dev/null 2>&1 || true; done
      sleep: 1
    - command:
      - /bin/sh
      - -c
      - for d in $(kubectl -n ${BENCH_NS_TARGET} get deploy -l app=blue-producer -o name 2>/dev/null); do kubectl -n ${BENCH_NS_TARGET} scale "${d}" --replicas=0 >/dev/null 2>&1 || true; done
      sleep: 1
    - command:
      - /bin/sh
      - -c
      - kubectl -n ${BENCH_NS_SOURCE} wait --for=delete pod -l app=blue-producer --timeout=120s >/dev/null 2>&1 || true
      sleep: 1
    - command:
      - /bin/sh
      - -c
      - kubectl -n ${BENCH_NS_TARGET} wait --for=delete pod -l app=blue-producer --timeout=120s >/dev/null 2>&1 || true
      sleep: 1
    - command:
      - /bin/sh
      - -c
      - kubectl -n ${BENCH_NS_SOURCE} exec {{params.blue_cluster_prefix}}-0 -- rabbitmqctl purge_queue -p /app app-queue
      sleep: 1
    - command:
      - kubectl
      - -n
      - ${BENCH_NS_SOURCE}
      - delete
      - job
      - '{{params.blue_cluster_prefix}}-seed'
      - --ignore-not-found=true
      sleep: 1
    - command:
      - /bin/sh
      - -c
      - kubectl -n ${BENCH_NS_SOURCE} wait --for=delete pod -l job-name={{params.blue_cluster_prefix}}-seed --timeout=120s || true
      sleep: 1
    - command:
      - kubectl
      - -n
      - ${BENCH_NS_SOURCE}
      - apply
      - -f
      - resources/rabbitmq-experiments/blue_green_migration/resource/seed-job.yaml
      sleep: 1
    - command:
      - kubectl
      - -n
      - ${BENCH_NS_SOURCE}
      - wait
      - --for=condition=complete
      - job/{{params.blue_cluster_prefix}}-seed
      - --timeout=300s
      sleep: 1
  verify:
    commands:
    - command:
      - python3
      - resources/rabbitmq-experiments/blue_green_migration/setup_precondition_check.py
      - --source-namespace
      - ${BENCH_NS_SOURCE}
      - --seed-data-source-only
      sleep: 0
      timeout_sec: 30
    retries: 60
    interval_sec: 5
- id: target_app_client_quiesced
  probe:
    commands:
    - command:
      - /bin/sh
      - -c
      - if kubectl -n ${BENCH_NS_TARGET} get deploy app-client >/dev/null 2>&1; then [ "$(kubectl -n ${BENCH_NS_TARGET} get deploy app-client -o jsonpath="{.spec.replicas}")" = "0" ] || exit 1; count=$(kubectl -n ${BENCH_NS_TARGET} get pod -l app=app-client --field-selector=status.phase!=Succeeded,status.phase!=Failed -o name 2>/dev/null | wc -l | tr -d " "); [ "${count}" = "0" ]; else exit 0; fi
      sleep: 0
      timeout_sec: 20
  apply:
    commands:
    - command:
      - /bin/sh
      - -c
      - kubectl -n ${BENCH_NS_TARGET} scale deploy app-client --replicas=0 >/dev/null 2>&1 || true
      sleep: 1
    - command:
      - /bin/sh
      - -c
      - if kubectl -n ${BENCH_NS_TARGET} get deploy app-client >/dev/null 2>&1; then for i in $(seq 1 60); do count=$(kubectl -n ${BENCH_NS_TARGET} get pod -l app=app-client --field-selector=status.phase!=Succeeded,status.phase!=Failed -o name 2>/dev/null | wc -l | tr -d " "); [ "${count}" = "0" ] && exit 0; sleep 2; done; echo "app-client pods still present after scale-down" >&2; exit 1; fi
      sleep: 1
  verify:
    commands:
    - command:
      - /bin/sh
      - -c
      - if kubectl -n ${BENCH_NS_TARGET} get deploy app-client >/dev/null 2>&1; then [ "$(kubectl -n ${BENCH_NS_TARGET} get deploy app-client -o jsonpath="{.spec.replicas}")" = "0" ] || exit 1; count=$(kubectl -n ${BENCH_NS_TARGET} get pod -l app=app-client --field-selector=status.phase!=Succeeded,status.phase!=Failed -o name 2>/dev/null | wc -l | tr -d " "); [ "${count}" = "0" ]; else exit 0; fi
      sleep: 0
      timeout_sec: 20
    retries: 30
    interval_sec: 2
- id: target_queue_empty_ready
