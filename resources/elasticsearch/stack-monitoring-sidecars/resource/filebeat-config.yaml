apiVersion: v1
kind: ConfigMap
metadata:
  name: filebeat-config
  namespace: elasticsearch
data:
  filebeat.yml: |
    filebeat.inputs:
      - type: log
        enabled: true
        paths:
          - /var/log/es/*.log

    output.elasticsearch:
      hosts: ["http://monitoring-es-htp.monitoring.svc:9200"]

    logging.to_files: false
    logging.to_syslog: false
