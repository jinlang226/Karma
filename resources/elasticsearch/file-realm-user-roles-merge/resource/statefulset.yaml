apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: es-cluster
spec:
  serviceName: es-cluster
  podManagementPolicy: Parallel
  replicas: 3
  selector:
    matchLabels:
      app: es-cluster
  template:
    metadata:
      labels:
        app: es-cluster
    spec:
      containers:
        - name: elasticsearch
          image: docker.elastic.co/elasticsearch/elasticsearch:7.17.9
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: ES_JAVA_OPTS
              value: "-Xms512m -Xmx512m"
            - name: ELASTIC_PASSWORD
              value: "elasticpass"
          ports:
            - containerPort: 9200
              name: http
            - containerPort: 9300
              name: transport
          readinessProbe:
            tcpSocket:
              port: 9200
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 1
            failureThreshold: 6
          volumeMounts:
            - name: es-config
              mountPath: /usr/share/elasticsearch/config/elasticsearch.yml
              subPath: elasticsearch.yml
            - name: data
              mountPath: /usr/share/elasticsearch/data
            - name: http-certs
              mountPath: /usr/share/elasticsearch/config/http-certs
              readOnly: true
            - name: file-realm
              mountPath: /usr/share/elasticsearch/config/users
              subPath: users
              readOnly: true
            - name: file-realm
              mountPath: /usr/share/elasticsearch/config/users_roles
              subPath: users_roles
              readOnly: true
            - name: file-realm
              mountPath: /usr/share/elasticsearch/config/roles.yml
              subPath: roles.yml
              readOnly: true
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1"
              memory: "2Gi"
      volumes:
        - name: es-config
          configMap:
            name: es-config
            items:
              - key: elasticsearch.yml
                path: elasticsearch.yml
        - name: http-certs
          secret:
            secretName: es-http-tls
        - name: file-realm
          secret:
            secretName: es-file-realm-aggregate
            items:
              - key: users
                path: users
              - key: users_roles
                path: users_roles
              - key: roles.yml
                path: roles.yml
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
