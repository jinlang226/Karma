apiVersion: v1
kind: Service
metadata:
  name: es-alpha
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: es-alpha
  ports:
    - name: transport
      port: 9300
      targetPort: 9300
---
apiVersion: v1
kind: Service
metadata:
  name: es-beta
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: es-beta
  ports:
    - name: transport
      port: 9300
      targetPort: 9300
---
apiVersion: v1
kind: Service
metadata:
  name: search-http
spec:
  selector:
    app: es-beta
  ports:
    - name: http
      port: 9200
      targetPort: 9200
---
apiVersion: v1
kind: Service
metadata:
  name: search-direct
spec:
  selector:
    app: es-alpha
  ports:
    - name: http
      port: 9200
      targetPort: 9200
---
apiVersion: v1
kind: Service
metadata:
  name: search-alt
spec:
  selector:
    app: es-beta
  ports:
    - name: http
      port: 9200
      targetPort: 9200
