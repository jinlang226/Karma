apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: es-cluster
spec:
  serviceName: es-cluster
  podManagementPolicy: Parallel
  replicas: 3
  selector:
    matchLabels:
      app: es-cluster
  template:
    metadata:
      labels:
        app: es-cluster
    spec:
      initContainers:
        - name: cert-selector
          image: busybox:1.36
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          command:
            - /bin/sh
            - -c
            - |
              set -e
              if [ "${POD_NAME}" = "es-cluster-2" ]; then
                cp /certs/ca2/node.crt /certs/active/node.crt
                cp /certs/ca2/node.key /certs/active/node.key
              else
                cp /certs/ca1/node.crt /certs/active/node.crt
                cp /certs/ca1/node.key /certs/active/node.key
              fi
              chmod 600 /certs/active/node.key
              chown 1000:1000 /certs/active/node.crt /certs/active/node.key
          volumeMounts:
            - name: transport-cert
              mountPath: /certs/active
            - name: ca1
              mountPath: /certs/ca1
            - name: ca2
              mountPath: /certs/ca2
      containers:
        - name: elasticsearch
          image: docker.elastic.co/elasticsearch/elasticsearch:7.17.9
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: ES_JAVA_OPTS
              value: "-Xms512m -Xmx512m"
            - name: ELASTIC_PASSWORD
              value: "elasticpass"
          ports:
            - containerPort: 9200
              name: http
            - containerPort: 9300
              name: transport
          readinessProbe:
            tcpSocket:
              port: 9200
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 1
            failureThreshold: 6
          volumeMounts:
            - name: es-config
              mountPath: /usr/share/elasticsearch/config/elasticsearch.yml
              subPath: elasticsearch.yml
            - name: transport-cert
              mountPath: /usr/share/elasticsearch/config/certs
            - name: transport-ca
              mountPath: /usr/share/elasticsearch/config/transport-ca
            - name: data
              mountPath: /usr/share/elasticsearch/data
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1"
              memory: "2Gi"
      volumes:
        - name: es-config
          configMap:
            name: es-config
            items:
              - key: elasticsearch.yml
                path: elasticsearch.yml
        - name: transport-ca
          configMap:
            name: es-transport-ca-bundle
            items:
              - key: ca.crt
                path: ca.crt
        - name: transport-cert
          emptyDir: {}
        - name: ca1
          secret:
            secretName: es-transport-ca1
        - name: ca2
          secret:
            secretName: es-transport-ca2
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
