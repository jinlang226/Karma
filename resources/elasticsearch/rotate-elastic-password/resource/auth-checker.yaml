apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-checker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-checker
  template:
    metadata:
      labels:
        app: auth-checker
    spec:
      containers:
        - name: checker
          image: curlimages/curl:8.5.0
          env:
            - name: ELASTIC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: elastic-password
                  key: password
          command:
            - /bin/sh
            - -c
            - |
              sleep infinity
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - |
                  curl -s --max-time 5 -u elastic:${ELASTIC_PASSWORD} \
                    http://es-http:9200/_security/_authenticate \
                    | grep -q '"username":"elastic"'
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 6
