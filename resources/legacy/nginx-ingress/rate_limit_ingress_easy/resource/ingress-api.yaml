apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rate-api
  namespace: demo
spec:
  ingressClassName: nginx
  rules:
  - host: rate.example.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: rate-echo
            port:
              number: 80
