apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rate-api-alt-easy
  namespace: demo
  labels:
    benchmark.decoy: "true"
    benchmark.case: rate_limit_ingress_easy
spec:
  ingressClassName: nginx
  rules:
  - host: rate-alt-easy.example.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: rate-echo
            port:
              number: 80
