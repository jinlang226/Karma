apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: canary-stable
  namespace: demo
spec:
  ingressClassName: nginx
  rules:
  - host: canary.example.com
    http:
      paths:
      - path: /health
        pathType: Prefix
        backend:
          service:
            name: stable-echo
            port:
              number: 80
      - path: /
        pathType: Exact
        backend:
          service:
            name: stable-echo
            port:
              number: 80
