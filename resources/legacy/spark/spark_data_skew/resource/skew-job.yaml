apiVersion: batch/v1
kind: Job
metadata:
  name: spark-skew-baseline
  namespace: spark-skew
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: spark-skew-baseline
        strategy: baseline
    spec:
      serviceAccountName: spark-skew
      containers:
      - name: spark-submit
        image: apache/spark:3.5.3
        command:
        - /bin/bash
        - -c
        - |
          echo "=============================================="
          echo "  Spark Data Skew - BASELINE (No Optimization)"
          echo "=============================================="

          # Wait for Spark master
          echo "Waiting for Spark master..."
          until nc -z spark-master 7077; do
            sleep 2
          done
          echo "Spark master is ready"
          sleep 10

          # Generate test data
          echo "Generating skewed test data..."
          python3 /scripts/generate_data.py

          # Run baseline query (no optimization - will be SLOW due to skew)
          echo ""
          echo "Running BASELINE query (no optimization)..."
          echo "WARNING: This will be slow due to data skew!"
          echo ""

          /opt/spark/bin/spark-submit \
            --master spark://spark-master:7077 \
            --deploy-mode client \
            --driver-memory 1g \
            --executor-memory 1g \
            --conf spark.sql.shuffle.partitions=200 \
            --conf spark.sql.adaptive.enabled=false \
            /scripts/baseline_query.py

          EXIT_CODE=$?
          echo ""
          echo "Baseline job finished with exit code: $EXIT_CODE"
          echo ""
          echo "PROBLEM: The query is slow due to data skew on product_id!"
          echo "HOT KEYS: product_id 1-5 have 50% of all orders"
          echo ""
          echo "YOUR TASK: Implement optimization strategies to fix this!"
          echo "  1. Apply spark-skew-broadcast job (Broadcast Join)"
          echo "  2. Apply spark-skew-aqe job (Adaptive Query Execution)"
          echo "  3. Compare performance improvements"
          echo ""
          exit $EXIT_CODE
        env:
        - name: DATA_DIR
          value: "/tmp/spark-skew-data"
        - name: RESULTS_DIR
          value: "/tmp/spark-skew-results"
        - name: PYTHONUNBUFFERED
          value: "1"
        volumeMounts:
        - name: spark-scripts
          mountPath: /scripts
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: 1
            memory: 1536Mi
      volumes:
      - name: spark-scripts
        configMap:
          name: spark-skew-scripts
      restartPolicy: Never
