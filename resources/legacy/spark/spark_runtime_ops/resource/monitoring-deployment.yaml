apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-monitor
  namespace: spark-runtime
  annotations:
    kubernetes.io/change-cause: "Initial deployment with wrong image"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spark-monitor
  template:
    metadata:
      labels:
        app: spark-monitor
    spec:
      containers:
      - name: monitor
        # BUG 4: Using a non-existent image tag that will fail
        # This simulates a bad deployment that needs rollback
        image: busybox:broken-tag-v999
        command: ["sh", "-c", "while true; do echo 'Monitoring Spark...'; sleep 30; done"]
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: spark-monitor
  namespace: spark-runtime
spec:
  selector:
    app: spark-monitor
  ports:
  - port: 8080
    targetPort: 8080
