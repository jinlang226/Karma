apiVersion: batch/v1
kind: Job
metadata:
  name: spark-batch-processor
  namespace: spark-runtime
spec:
  # BUG 5: Job is suspended and needs to be resumed
  suspend: true
  backoffLimit: 3
  template:
    spec:
      containers:
      - name: processor
        image: busybox:1.36
        command: ["sh", "-c", "echo 'Processing batch data...' && sleep 5 && echo 'Batch processing complete!'"]
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
      restartPolicy: Never
