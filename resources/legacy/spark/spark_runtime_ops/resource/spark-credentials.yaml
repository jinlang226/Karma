apiVersion: v1
kind: Secret
metadata:
  name: spark-credentials
  namespace: spark-runtime
type: Opaque
stringData:
  # BUG 2: The API key is expired/invalid (contains "EXPIRED" marker)
  # User needs to patch this secret with a valid key
  api-key: "sk-EXPIRED-invalid-key-12345"
  # This is the correct format that should be used
  # api-key: "sk-valid-production-key-67890"
