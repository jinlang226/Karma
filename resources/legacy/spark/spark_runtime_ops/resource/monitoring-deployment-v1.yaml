apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-monitor
  namespace: spark-runtime
  annotations:
    kubernetes.io/change-cause: "v1: Working version with correct image"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spark-monitor
  template:
    metadata:
      labels:
        app: spark-monitor
    spec:
      containers:
      - name: monitor
        # This is the correct working image
        image: busybox:1.36
        command: ["sh", "-c", "while true; do echo 'Monitoring Spark...'; sleep 30; done"]
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
