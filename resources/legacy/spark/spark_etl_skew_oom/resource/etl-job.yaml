apiVersion: batch/v1
kind: Job
metadata:
  name: etl-job
  namespace: spark-etl
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: etl-job
        component: driver
    spec:
      serviceAccountName: spark-etl
      containers:
      - name: spark-submit
        image: apache/spark:3.5.3
        command:
        - /bin/bash
        - -c
        - |
          echo "=============================================="
          echo "  ETL PIPELINE - Starting"
          echo "=============================================="

          # Wait for master
          echo "Waiting for Spark master..."
          until timeout 1 bash -c 'cat < /dev/null > /dev/tcp/spark-master/7077' 2>/dev/null; do
            sleep 2
          done
          echo "Spark master is ready"

          # Wait for workers
          echo "Waiting for workers..."
          sleep 10

          # Submit ETL job with low memory settings to trigger OOM on skewed data
          echo "Submitting ETL job..."
          export SPARK_LOCAL_IP=$(hostname -i)
          /opt/spark/bin/spark-submit \
            --master local[2] \
            --driver-memory 512m \
            --conf spark.sql.shuffle.partitions=10 \
            --conf spark.sql.adaptive.enabled=false \
            /scripts/etl_job.py

          EXIT_CODE=$?
          echo "ETL job finished with exit code: $EXIT_CODE"
          exit $EXIT_CODE
        volumeMounts:
        - name: data-volume
          mountPath: /data
        - name: scripts
          mountPath: /scripts
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
      volumes:
      - name: data-volume
        persistentVolumeClaim:
          claimName: etl-data-pvc
      - name: scripts
        configMap:
          name: etl-scripts
      restartPolicy: Never
