apiVersion: apps/v1
kind: Deployment
metadata:
  name: diagnostic-server
  namespace: spark-etl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: diagnostic-server
  template:
    metadata:
      labels:
        app: diagnostic-server
    spec:
      serviceAccountName: spark-etl
      containers:
      - name: diagnostics
        image: alpine/k8s:1.28.0
        command:
        - /bin/sh
        - -c
        - |
          echo "=============================================="
          echo "  DIAGNOSTIC SERVER"
          echo "=============================================="
          echo ""
          echo "This server provides diagnostic information."
          echo "Use: kubectl logs -n spark-etl -l app=diagnostic-server"
          echo ""

          # Wait for data to be generated
          echo "Waiting for data generation to complete..."
          sleep 30

          while true; do
            echo ""
            echo "=============================================="
            echo "[$(date '+%Y-%m-%d %H:%M:%S')] DIAGNOSTIC REPORT"
            echo "=============================================="

            # Check ETL pipeline status
            ETL_STATUS=$(kubectl get sparkapplication etl-pipeline -n spark-etl \
              -o jsonpath='{.status.applicationState.state}' 2>/dev/null || echo "NOT_FOUND")

            echo ""
            echo "[ETL Pipeline Status]"
            echo "  State: $ETL_STATUS"

            if [ "$ETL_STATUS" = "FAILED" ]; then
              echo ""
              echo "[ERROR DETAILS]"
              ERROR_MSG=$(kubectl get sparkapplication etl-pipeline -n spark-etl \
                -o jsonpath='{.status.applicationState.errorMessage}' 2>/dev/null | head -c 500)
              echo "  $ERROR_MSG"

              # Check executor logs for OOM
              echo ""
              echo "[EXECUTOR STATUS]"
              kubectl get pods -n spark-etl -l component=executor --no-headers 2>/dev/null | while read line; do
                POD_NAME=$(echo "$line" | awk '{print $1}')
                POD_STATUS=$(echo "$line" | awk '{print $3}')
                RESTARTS=$(echo "$line" | awk '{print $4}')
                echo "  $POD_NAME: $POD_STATUS (restarts: $RESTARTS)"
              done

              # Check for OOM in events
              echo ""
              echo "[OOM DETECTION]"
              OOM_COUNT=$(kubectl get events -n spark-etl --field-selector reason=OOMKilled 2>/dev/null | grep -c OOMKilled || echo "0")
              echo "  OOMKilled events: $OOM_COUNT"

              if [ "$OOM_COUNT" -gt "0" ]; then
                echo "  >>> OOM DETECTED! Check executor memory and data skew <<<"
              fi
            fi

            # Show data skew info if available
            echo ""
            echo "[DATA SKEW INFO]"
            SKEW_INFO=$(kubectl exec -n spark-etl deployment/data-generator -- cat /data/skew_info.txt 2>/dev/null || echo "Not available")
            echo "$SKEW_INFO" | while read line; do
              echo "  $line"
            done

            # Memory recommendations
            if [ "$ETL_STATUS" = "FAILED" ]; then
              echo ""
              echo "[RECOMMENDATIONS]"
              echo "  1. Check driver logs for Stage 3 failure"
              echo "  2. Analyze data distribution by user_id"
              echo "  3. Look for hot keys (user_id with >10x average records)"
              echo "  4. Consider: AQE, salting, broadcast join, or increase memory"
            fi

            sleep 30
          done
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: diagnosis-queries
  namespace: spark-etl
data:
  analyze_skew.py: |
    #!/usr/bin/env python3
    """
    Data Skew Analysis Script

    Run this in spark-shell or as a separate job to diagnose data skew.
    """

    from pyspark.sql import SparkSession
    from pyspark.sql import functions as F

    spark = SparkSession.builder.appName("SkewAnalysis").getOrCreate()

    # Load events
    events = spark.read.csv("/data/events.csv", header=True, inferSchema=True)

    print("=" * 60)
    print("DATA SKEW ANALYSIS")
    print("=" * 60)

    # Count records per user
    user_counts = events.groupBy("user_id").count().orderBy(F.desc("count"))

    print("\nTop 10 users by record count:")
    user_counts.show(10)

    # Calculate statistics
    stats = user_counts.agg(
        F.avg("count").alias("avg"),
        F.max("count").alias("max"),
        F.min("count").alias("min"),
        F.stddev("count").alias("stddev")
    ).collect()[0]

    skew_ratio = stats["max"] / stats["avg"]

    print(f"\nStatistics:")
    print(f"  Average records per user: {stats['avg']:.1f}")
    print(f"  Max records: {stats['max']}")
    print(f"  Min records: {stats['min']}")
    print(f"  Std deviation: {stats['stddev']:.1f}")
    print(f"  SKEW RATIO: {skew_ratio:.1f}x")

    # Identify hot keys
    threshold = stats["avg"] * 10  # 10x average
    hot_keys = user_counts.filter(F.col("count") > threshold)

    print(f"\nHot keys (>10x average = >{threshold:.0f} records):")
    hot_keys.show()

    if skew_ratio > 10:
        print("\n>>> SEVERE DATA SKEW DETECTED <<<")
        print("Recommendations:")
        print("  1. Enable AQE: spark.sql.adaptive.enabled=true")
        print("  2. Enable skew join: spark.sql.adaptive.skewJoin.enabled=true")
        print("  3. Consider salting hot keys")
        print("  4. Increase executor memory for skewed partitions")

    spark.stop()
