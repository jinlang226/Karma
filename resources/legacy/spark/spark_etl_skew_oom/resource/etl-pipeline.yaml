apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: etl-pipeline
  namespace: spark-etl
spec:
  type: Python
  pythonVersion: "3"
  mode: cluster
  image: apache/spark:3.5.3-python3
  imagePullPolicy: IfNotPresent
  mainApplicationFile: "local:///opt/spark/work-dir/etl_job.py"
  sparkVersion: 3.5.3
  sparkConf:
    # Intentionally disable AQE to cause skew problems
    "spark.sql.adaptive.enabled": "false"
    "spark.sql.adaptive.skewJoin.enabled": "false"
    # Low shuffle partitions to make skew more severe
    "spark.sql.shuffle.partitions": "10"
    # Low memory overhead to trigger OOM faster
    "spark.executor.memoryOverhead": "128m"
  restartPolicy:
    type: Never
  volumes:
    - name: data-volume
      persistentVolumeClaim:
        claimName: etl-data-pvc
    - name: scripts
      configMap:
        name: etl-scripts
  driver:
    cores: 1
    coreLimit: "1500m"
    memory: "1g"
    labels:
      version: 3.5.3
      component: driver
    serviceAccount: spark-etl
    volumeMounts:
      - name: data-volume
        mountPath: /data
      - name: scripts
        mountPath: /opt/spark/work-dir
  executor:
    cores: 1
    coreLimit: "1500m"
    # Low memory to trigger OOM on skewed partition
    instances: 2
    memory: "512m"
    labels:
      version: 3.5.3
      component: executor
    volumeMounts:
      - name: data-volume
        mountPath: /data
