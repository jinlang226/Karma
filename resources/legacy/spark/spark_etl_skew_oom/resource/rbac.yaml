apiVersion: v1
kind: ServiceAccount
metadata:
  name: spark-etl
  namespace: spark-etl
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: spark-etl-role
  namespace: spark-etl
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log", "services", "configmaps", "persistentvolumeclaims"]
  verbs: ["*"]
- apiGroups: ["sparkoperator.k8s.io"]
  resources: ["sparkapplications", "sparkapplications/status"]
  verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: spark-etl-binding
  namespace: spark-etl
subjects:
- kind: ServiceAccount
  name: spark-etl
  namespace: spark-etl
roleRef:
  kind: Role
  name: spark-etl-role
  apiGroup: rbac.authorization.k8s.io
