apiVersion: batch/v1
kind: Job
metadata:
  name: traffic-generator
  namespace: spark-streaming
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        app: traffic-generator
    spec:
      containers:
      - name: generator
        image: alpine/k8s:1.28.0
        command:
        - /bin/sh
        - -c
        - |
          echo "=============================================="
          echo "  TRAFFIC GENERATOR - Simulating Load Spikes"
          echo "=============================================="
          echo ""
          echo "This will simulate traffic patterns that cause backpressure."
          echo "The OPERATOR must monitor and respond by scaling workers."
          echo ""

          # Phase 1: Baseline (60 seconds)
          echo "=============================================="
          echo "[PHASE 1] Baseline Load - 60 seconds"
          echo "  Expected: 5 workers sufficient"
          echo "  Lag: LOW (<1000)"
          echo "  Latency: <2s"
          echo "=============================================="
          for i in $(seq 1 6); do
            LAG=$((RANDOM % 1000))
            LATENCY=$((500 + RANDOM % 1000))
            WORKERS=$(kubectl get deployment spark-worker -n spark-streaming -o jsonpath='{.spec.replicas}' 2>/dev/null || echo "?")
            echo "[$(date '+%H:%M:%S')] Phase 1 - Lag: $LAG, Latency: ${LATENCY}ms, Workers: $WORKERS"
            sleep 10
          done

          # Phase 2: 2x Spike (90 seconds)
          echo ""
          echo "=============================================="
          echo "[PHASE 2] 2x Load Spike - 90 seconds"
          echo "  WARNING: Backpressure expected!"
          echo "  ACTION REQUIRED: Scale workers to 10"
          echo "  Lag: MEDIUM (10K-50K)"
          echo "  Latency: 3-4s"
          echo "=============================================="
          for i in $(seq 1 9); do
            LAG=$((10000 + RANDOM % 40000))
            LATENCY=$((3000 + RANDOM % 1000))
            WORKERS=$(kubectl get deployment spark-worker -n spark-streaming -o jsonpath='{.spec.replicas}' 2>/dev/null || echo "?")
            echo "[$(date '+%H:%M:%S')] Phase 2 - Lag: $LAG, Latency: ${LATENCY}ms, Workers: $WORKERS - SCALE UP NEEDED!"
            sleep 10
          done

          # Phase 3: 5x Spike (120 seconds)
          echo ""
          echo "=============================================="
          echo "[PHASE 3] 5x Load Spike - 120 seconds"
          echo "  CRITICAL: Maximum backpressure!"
          echo "  ACTION REQUIRED: Scale workers to 20"
          echo "  Lag: HIGH (>50K)"
          echo "  Latency: >4s (SLA VIOLATION RISK)"
          echo "=============================================="
          for i in $(seq 1 12); do
            LAG=$((50000 + RANDOM % 50000))
            LATENCY=$((4000 + RANDOM % 2000))
            WORKERS=$(kubectl get deployment spark-worker -n spark-streaming -o jsonpath='{.spec.replicas}' 2>/dev/null || echo "?")
            echo "[$(date '+%H:%M:%S')] Phase 3 - Lag: $LAG, Latency: ${LATENCY}ms, Workers: $WORKERS - CRITICAL! MAX SCALE!"
            sleep 10
          done

          # Phase 4: Cooldown (60 seconds)
          echo ""
          echo "=============================================="
          echo "[PHASE 4] Cooldown - 60 seconds"
          echo "  Load decreasing, scale down to save costs"
          echo "  ACTION REQUIRED: Scale workers back to 5"
          echo "  Lag: LOW (<1000)"
          echo "  Latency: <2s"
          echo "=============================================="
          for i in $(seq 1 6); do
            LAG=$((RANDOM % 1000))
            LATENCY=$((500 + RANDOM % 1000))
            WORKERS=$(kubectl get deployment spark-worker -n spark-streaming -o jsonpath='{.spec.replicas}' 2>/dev/null || echo "?")
            echo "[$(date '+%H:%M:%S')] Phase 4 - Lag: $LAG, Latency: ${LATENCY}ms, Workers: $WORKERS - Scale down OK"
            sleep 10
          done

          echo ""
          echo "=============================================="
          echo "  TRAFFIC SIMULATION COMPLETE"
          echo "=============================================="
          echo ""
          echo "Summary of expected operator actions:"
          echo "  1. Detected backpressure in Phase 2"
          echo "  2. Scaled workers: 5 -> 10 in Phase 2"
          echo "  3. Scaled workers: 10 -> 20 in Phase 3"
          echo "  4. Scaled workers: 20 -> 5 in Phase 4"
          echo ""
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
      serviceAccountName: spark-streaming
      restartPolicy: Never
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metrics-server
  namespace: spark-streaming
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metrics-server
  template:
    metadata:
      labels:
        app: metrics-server
    spec:
      serviceAccountName: spark-streaming
      containers:
      - name: metrics
        image: alpine/k8s:1.28.0
        command:
        - /bin/sh
        - -c
        - |
          echo "Metrics Server Started"
          echo "Monitoring spark-worker deployment for scaling events"
          echo ""

          LAST_WORKERS=5
          SCALING_EVENTS=0
          START_TIME=$(date +%s)

          while true; do
            # Get current worker count from deployment
            WORKERS=$(kubectl get deployment spark-worker -n spark-streaming \
              -o jsonpath='{.spec.replicas}' 2>/dev/null || echo "5")

            # Get deployment status
            READY=$(kubectl get deployment spark-worker -n spark-streaming \
              -o jsonpath='{.status.readyReplicas}' 2>/dev/null || echo "0")

            # Calculate runtime
            NOW=$(date +%s)
            RUNTIME=$((NOW - START_TIME))

            # Track scaling events
            if [ "$WORKERS" != "$LAST_WORKERS" ]; then
              SCALING_EVENTS=$((SCALING_EVENTS + 1))
              echo ""
              echo ">>> SCALING EVENT #$SCALING_EVENTS: $LAST_WORKERS -> $WORKERS workers"
              LAST_WORKERS=$WORKERS
            fi

            # Calculate cost
            TOTAL_COST=$((RUNTIME / 10 * WORKERS))
            BASELINE_COST=$((RUNTIME / 10 * 5))
            if [ "$BASELINE_COST" -gt 0 ]; then
              COST_INCREASE=$(( (TOTAL_COST - BASELINE_COST) * 100 / BASELINE_COST ))
            else
              COST_INCREASE=0
            fi

            # Display status
            echo "[$(date '+%H:%M:%S')] Workers: $WORKERS (Ready: $READY) | Scaling Events: $SCALING_EVENTS | Cost Increase: ${COST_INCREASE}%"

            sleep 10
          done
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
