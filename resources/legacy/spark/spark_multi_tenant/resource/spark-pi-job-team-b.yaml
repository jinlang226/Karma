apiVersion: batch/v1
kind: Job
metadata:
  name: spark-pi-team-b
  namespace: spark-team-b
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: spark-pi-team-b
        team: team-b
        component: driver
    spec:
      serviceAccountName: spark-team-b
      containers:
      - name: spark-submit
        image: apache/spark:3.5.3
        command:
        - /bin/bash
        - -c
        - |
          echo "=============================================="
          echo "  Team B - SparkPi Job"
          echo "=============================================="

          # Wait for Spark master
          echo "Waiting for Spark master..."
          until timeout 1 bash -c 'cat < /dev/null > /dev/tcp/spark-master/7077' 2>/dev/null; do
            sleep 2
          done
          echo "Spark master is ready"

          # Wait for workers to register
          echo "Waiting for workers to register..."
          sleep 10

          # Submit SparkPi job
          echo "Submitting SparkPi job with 500 iterations..."
          export SPARK_LOCAL_IP=$(hostname -i)
          /opt/spark/bin/spark-submit \
            --master local[2] \
            --driver-memory 256m \
            --class org.apache.spark.examples.SparkPi \
            /opt/spark/examples/jars/spark-examples_2.12-3.5.3.jar \
            500

          EXIT_CODE=$?
          echo "SparkPi job finished with exit code: $EXIT_CODE"
          exit $EXIT_CODE
        resources:
          requests:
            cpu: 200m
            memory: 128Mi
          limits:
            cpu: 400m
            memory: 256Mi
      restartPolicy: Never
