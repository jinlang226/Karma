apiVersion: v1
kind: Service
metadata:
  name: spark-master
  namespace: spark-team-a
spec:
  ports:
  - port: 7077
    name: spark
  - port: 8080
    name: webui
  selector:
    app: spark-master
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-master
  namespace: spark-team-a
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spark-master
  template:
    metadata:
      labels:
        app: spark-master
        team: team-a
    spec:
      serviceAccountName: spark-team-a
      containers:
      - name: spark-master
        image: apache/spark:3.5.3
        command:
        - /bin/bash
        - -c
        - |
          unset SPARK_MASTER_PORT
          /opt/spark/sbin/start-master.sh
          tail -f /opt/spark/logs/*
        ports:
        - containerPort: 7077
        - containerPort: 8080
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-worker
  namespace: spark-team-a
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spark-worker
  template:
    metadata:
      labels:
        app: spark-worker
        team: team-a
    spec:
      serviceAccountName: spark-team-a
      containers:
      - name: spark-worker
        image: apache/spark:3.5.3
        command:
        - /bin/bash
        - -c
        - |
          /opt/spark/sbin/start-worker.sh spark://spark-master:7077
          tail -f /opt/spark/logs/*
        env:
        - name: SPARK_WORKER_MEMORY
          value: "512m"
        - name: SPARK_WORKER_CORES
          value: "1"
        ports:
        - containerPort: 8081
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
