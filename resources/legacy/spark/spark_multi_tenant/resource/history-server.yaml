apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: spark-history-pvc
  namespace: spark-history
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-history-server
  namespace: spark-history
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spark-history-server
  template:
    metadata:
      labels:
        app: spark-history-server
    spec:
      containers:
      - name: spark-history-server
        image: apache/spark:3.5.3
        command:
          - /opt/spark/bin/spark-class
          - org.apache.spark.deploy.history.HistoryServer
        env:
        - name: SPARK_HISTORY_OPTS
          value: "-Dspark.history.fs.logDirectory=/mnt/spark-logs -Dspark.history.fs.update.interval=5s"
        - name: SPARK_NO_DAEMONIZE
          value: "true"
        ports:
        - containerPort: 18080
          name: http
        volumeMounts:
        - name: spark-logs
          mountPath: /mnt/spark-logs
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
        readinessProbe:
          httpGet:
            path: /
            port: 18080
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /
            port: 18080
          initialDelaySeconds: 30
          periodSeconds: 10
      volumes:
      - name: spark-logs
        persistentVolumeClaim:
          claimName: spark-history-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: spark-history-server
  namespace: spark-history
spec:
  selector:
    app: spark-history-server
  ports:
  - port: 18080
    targetPort: 18080
    name: http
  type: ClusterIP
