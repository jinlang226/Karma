type: ray-job
targetApp: Ray
numAppInstance: 1
preOperationCommands:
  - command:
      - kubectl
      - create
      - namespace
      - ray
    sleep: 0
  - command:
      - kubectl
      - -n
      - ray
      - apply
      - -f
      - resources/ray/job_submission/resource/ray-head-service.yaml
    sleep: 1
  - command:
      - kubectl
      - -n
      - ray
      - apply
      - -f
      - resources/ray/job_submission/resource/ray-head.yaml
    sleep: 2
  - command:
      - kubectl
      - -n
      - ray
      - rollout
      - status
      - deploy/ray-head
      - --timeout=120s
    sleep: 2
  - command:
      - kubectl
      - -n
      - ray
      - apply
      - -f
      - resources/ray/job_submission/resource/ray-worker.yaml
    sleep: 2
  - command:
      - kubectl
      - -n
      - ray
      - rollout
      - status
      - deploy/ray-worker
      - --timeout=120s
    sleep: 2
  - command:
      - kubectl
      - -n
      - ray
      - apply
      - -f
      - resources/ray/job_submission/resource/ray-job-script.yaml
    sleep: 1
  - command:
      - kubectl
      - -n
      - ray
      - apply
      - -f
      - resources/ray/job_submission/resource/ray-client.yaml
    sleep: 1
  - command:
      - kubectl
      - -n
      - ray
      - wait
      - --for=condition=Ready
      - pod/ray-client
      - --timeout=60s
    sleep: 1
detailedInstructions: |
  A Ray cluster is running, and the ray-client pod contains a job script at
  /opt/job.py. The job should connect to the head service and print "pong".

  Current issue: the script uses the wrong head address and fails to connect.

  Your task:
  - Update the job script so it connects to ray-head:6379.
  - Ensure the job runs successfully and prints "pong".

  You can test with:
  ```bash
  kubectl -n ray exec ray-client -- python /opt/job.py
  ```

  Success criteria: the command exits 0 and prints "pong".
operatorContext: |
  If you edit the ConfigMap, restart the ray-client pod to pick up changes.
  ```bash
  kubectl -n ray delete pod ray-client
  kubectl -n ray apply -f resources/ray/job_submission/resource/ray-client.yaml
  ```
verificationCommands:
  - command:
      - python3
      - resources/ray/job_submission/oracle/oracle.py
    sleep: 0
cleanUpCommands:
  - command:
      - kubectl
      - delete
      - namespace
      - ray
      - --ignore-not-found
    sleep: 0
