type: ray-service-exposure
targetApp: Ray
numAppInstance: 1
preOperationCommands:
  - command:
      - kubectl
      - create
      - namespace
      - ray
    sleep: 0
  - command:
      - kubectl
      - -n
      - ray
      - apply
      - -f
      - resources/ray/dashboard_exposure/resource/ray-head-service.yaml
    sleep: 1
  - command:
      - kubectl
      - -n
      - ray
      - apply
      - -f
      - resources/ray/dashboard_exposure/resource/ray-head.yaml
    sleep: 2
  - command:
      - kubectl
      - -n
      - ray
      - rollout
      - status
      - deploy/ray-head
      - --timeout=120s
    sleep: 2
  - command:
      - kubectl
      - -n
      - ray
      - apply
      - -f
      - resources/ray/dashboard_exposure/resource/ray-worker.yaml
    sleep: 2
  - command:
      - kubectl
      - -n
      - ray
      - rollout
      - status
      - deploy/ray-worker
      - --timeout=120s
    sleep: 2
  - command:
      - kubectl
      - -n
      - ray
      - apply
      - -f
      - resources/ray/dashboard_exposure/resource/curl-test.yaml
    sleep: 1
  - command:
      - kubectl
      - -n
      - ray
      - wait
      - --for=condition=Ready
      - pod/curl-test
      - --timeout=60s
    sleep: 1
detailedInstructions: |
  The Ray dashboard should be reachable from inside the cluster, but the
  ray-head Service only exposes the GCS port.

  Your task: update the ray-head Service to expose the dashboard on port 8265.

  Use this command to test:
  ```bash
  kubectl -n ray exec curl-test -- curl -sS -o /dev/null -w "%{http_code}" \
    http://ray-head:8265/api/cluster_status
  ```

  Success criteria: the command returns HTTP 200.
operatorContext: |
  Inspect the head Service ports:
  ```bash
  kubectl -n ray get svc ray-head -o yaml
  ```
verificationCommands:
  - command:
      - python3
      - resources/ray/dashboard_exposure/oracle/oracle.py
    sleep: 0
cleanUpCommands:
  - command:
      - kubectl
      - delete
      - namespace
      - ray
      - --ignore-not-found
    sleep: 0
