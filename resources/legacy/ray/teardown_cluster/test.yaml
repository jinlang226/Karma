type: ray-teardown
targetApp: Ray
numAppInstance: 1
preOperationCommands:
  - command:
      - kubectl
      - create
      - namespace
      - ray
    sleep: 0
  - command:
      - kubectl
      - -n
      - ray
      - apply
      - -f
      - resources/ray/teardown_cluster/resource/ray-head-service.yaml
    sleep: 1
  - command:
      - kubectl
      - -n
      - ray
      - apply
      - -f
      - resources/ray/teardown_cluster/resource/ray-head.yaml
    sleep: 2
  - command:
      - kubectl
      - -n
      - ray
      - rollout
      - status
      - deploy/ray-head
      - --timeout=120s
    sleep: 2
  - command:
      - kubectl
      - -n
      - ray
      - apply
      - -f
      - resources/ray/teardown_cluster/resource/ray-worker.yaml
    sleep: 2
  - command:
      - kubectl
      - -n
      - ray
      - rollout
      - status
      - deploy/ray-worker
      - --timeout=120s
    sleep: 2
detailedInstructions: |
  A Ray cluster is running in the ray namespace.

  Your task: remove the Ray cluster resources while keeping the namespace.

  Requirements:
  - Delete the ray-head deployment.
  - Delete the ray-worker deployment.
  - Delete the ray-head Service.
  - Do NOT delete the ray namespace.

  Success criteria: those three resources no longer exist.
operatorContext: |
  Inspect current resources:
  ```bash
  kubectl -n ray get deploy,svc,pod
  ```
verificationCommands:
  - command:
      - python3
      - resources/ray/teardown_cluster/oracle/oracle.py
    sleep: 0
cleanUpCommands:
  - command:
      - kubectl
      - delete
      - namespace
      - ray
      - --ignore-not-found
    sleep: 0
