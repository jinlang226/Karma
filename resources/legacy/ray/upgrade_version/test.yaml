type: ray-upgrade
targetApp: Ray
numAppInstance: 1
preOperationCommands:
  - command:
      - kubectl
      - create
      - namespace
      - ray
    sleep: 0
  - command:
      - kubectl
      - -n
      - ray
      - apply
      - -f
      - resources/ray/upgrade_version/resource/ray-head-service.yaml
    sleep: 1
  - command:
      - kubectl
      - -n
      - ray
      - apply
      - -f
      - resources/ray/upgrade_version/resource/ray-head.yaml
    sleep: 2
  - command:
      - kubectl
      - -n
      - ray
      - rollout
      - status
      - deploy/ray-head
      - --timeout=120s
    sleep: 2
  - command:
      - kubectl
      - -n
      - ray
      - apply
      - -f
      - resources/ray/upgrade_version/resource/ray-worker.yaml
    sleep: 2
  - command:
      - kubectl
      - -n
      - ray
      - rollout
      - status
      - deploy/ray-worker
      - --timeout=120s
    sleep: 2
  - command:
      - kubectl
      - -n
      - ray
      - apply
      - -f
      - resources/ray/upgrade_version/resource/ray-client.yaml
    sleep: 1
  - command:
      - kubectl
      - -n
      - ray
      - wait
      - --for=condition=Ready
      - pod/ray-client
      - --timeout=60s
    sleep: 1
detailedInstructions: |
  A Ray cluster is running with an older Ray image (rayproject/ray:2.8.0).

  Your task: upgrade both ray-head and ray-worker deployments to
  rayproject/ray:2.9.0.

  Requirements:
  - Update the image in both deployments.
  - Ensure rollouts complete successfully.

  Suggested commands:
  ```bash
  kubectl -n ray set image deploy/ray-head ray-head=rayproject/ray:2.9.0
  kubectl -n ray set image deploy/ray-worker ray-worker=rayproject/ray:2.9.0
  kubectl -n ray rollout status deploy/ray-head --timeout=120s
  kubectl -n ray rollout status deploy/ray-worker --timeout=120s
  ```

  Success criteria: both deployments use rayproject/ray:2.9.0 and remain ready.
operatorContext: |
  Inspect images and status:
  ```bash
  kubectl -n ray get deploy ray-head -o jsonpath='{.spec.template.spec.containers[0].image}'
  kubectl -n ray get deploy ray-worker -o jsonpath='{.spec.template.spec.containers[0].image}'
  ```
verificationCommands:
  - command:
      - python3
      - resources/ray/upgrade_version/oracle/oracle.py
    sleep: 0
cleanUpCommands:
  - command:
      - kubectl
      - delete
      - namespace
      - ray
      - --ignore-not-found
    sleep: 0
