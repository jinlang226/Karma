type: ray-scale
targetApp: Ray
numAppInstance: 1
preOperationCommands:
  - command:
      - kubectl
      - create
      - namespace
      - ray
    sleep: 0
  - command:
      - kubectl
      - -n
      - ray
      - apply
      - -f
      - resources/ray/scale_workers/resource/ray-head-service.yaml
    sleep: 1
  - command:
      - kubectl
      - -n
      - ray
      - apply
      - -f
      - resources/ray/scale_workers/resource/ray-head.yaml
    sleep: 2
  - command:
      - kubectl
      - -n
      - ray
      - rollout
      - status
      - deploy/ray-head
      - --timeout=120s
    sleep: 2
  - command:
      - kubectl
      - -n
      - ray
      - apply
      - -f
      - resources/ray/scale_workers/resource/ray-worker.yaml
    sleep: 2
  - command:
      - kubectl
      - -n
      - ray
      - rollout
      - status
      - deploy/ray-worker
      - --timeout=120s
    sleep: 2
  - command:
      - kubectl
      - -n
      - ray
      - apply
      - -f
      - resources/ray/scale_workers/resource/ray-client.yaml
    sleep: 1
  - command:
      - kubectl
      - -n
      - ray
      - wait
      - --for=condition=Ready
      - pod/ray-client
      - --timeout=60s
    sleep: 1
  - command:
      - kubectl
      - -n
      - ray
      - exec
      - ray-client
      - --
      - ray
      - start
      - --address=ray-head:6379
    sleep: 2
detailedInstructions: |
  A Ray cluster is running, but the worker deployment only has 1 replica.

  Your task: scale the worker deployment to 3 replicas.

  Recommended commands:
  ```bash
  kubectl -n ray scale deploy/ray-worker --replicas=3
  kubectl -n ray rollout status deploy/ray-worker --timeout=120s
  ```

  Success criteria: ray-worker shows 3 ready replicas and the Ray cluster
  reports 4 live nodes (1 head + 3 workers).
operatorContext: |
  Inspect cluster state:
  ```bash
  kubectl -n ray get deploy,pod
  kubectl -n ray exec ray-client -- python -c "import ray; ray.init(address='ray-head:6379'); print(ray.nodes()); ray.shutdown()"
  ```
verificationCommands:
  - command:
      - python3
      - resources/ray/scale_workers/oracle/oracle.py
    sleep: 0
cleanUpCommands:
  - command:
      - kubectl
      - delete
      - namespace
      - ray
      - --ignore-not-found
    sleep: 0
