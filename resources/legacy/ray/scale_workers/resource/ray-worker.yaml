apiVersion: apps/v1
kind: Deployment
metadata:
  name: ray-worker
  namespace: ray
  labels:
    app: ray-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ray-worker
  template:
    metadata:
      labels:
        app: ray-worker
    spec:
      containers:
      - name: ray-worker
        image: rayproject/ray:2.9.0
        command:
          - sh
          - -c
          - |
            ray start --address=ray-head:6379 --block
