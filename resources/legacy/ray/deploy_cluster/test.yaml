type: ray-deploy
targetApp: Ray
numAppInstance: 1
preOperationCommands:
  - command:
      - kubectl
      - create
      - namespace
      - ray
    sleep: 0
  - command:
      - kubectl
      - -n
      - ray
      - apply
      - -f
      - resources/ray/deploy_cluster/resource/ray-client.yaml
    sleep: 1
  - command:
      - kubectl
      - -n
      - ray
      - wait
      - --for=condition=Ready
      - pod/ray-client
      - --timeout=60s
    sleep: 1
detailedInstructions: |
  A ray-client pod is running in the ray namespace, but no Ray cluster exists yet.

  Your task: deploy a Ray head, a Ray head Service, and a Ray worker deployment
  using the manifests in:
  - resources/ray/deploy_cluster/resource/ray-head.yaml
  - resources/ray/deploy_cluster/resource/ray-head-service.yaml
  - resources/ray/deploy_cluster/resource/ray-worker.yaml

  Requirements:
  - Keep ray-client unchanged.
  - The worker deployment should run 2 replicas.

  Use this command to validate:
  ```bash
  kubectl -n ray exec ray-client -- python -c "import ray; ray.init(address='ray-head:6379'); print('ok'); ray.shutdown()"
  ```

  Success criteria: both deployments are ready and the command prints "ok".
operatorContext: |
  Inspect Ray resources:
  ```bash
  kubectl -n ray get deploy,svc,pod
  kubectl -n ray logs deploy/ray-head --tail=200
  ```
verificationCommands:
  - command:
      - python3
      - resources/ray/deploy_cluster/oracle/oracle.py
    sleep: 0
cleanUpCommands:
  - command:
      - kubectl
      - delete
      - namespace
      - ray
      - --ignore-not-found
    sleep: 0
