apiVersion: batch/v1
kind: Job
metadata:
  name: ${BENCH_PARAM_CLUSTER_PREFIX}-seed
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: seed
          image: curlimages/curl:8.6.0
          env:
            - name: RABBITMQ_USER
              valueFrom:
                secretKeyRef:
                  name: ${BENCH_PARAM_CLUSTER_PREFIX}-admin
                  key: username
            - name: RABBITMQ_PASS
              valueFrom:
                secretKeyRef:
                  name: ${BENCH_PARAM_CLUSTER_PREFIX}-admin
                  key: password
          command:
            - /bin/sh
            - -c
            - |
              set -e
              base="http://${BENCH_PARAM_CLUSTER_PREFIX}:15672/api"
              auth="${RABBITMQ_USER}:${RABBITMQ_PASS}"

              curl -s -u "$auth" -XPUT "$base/vhosts/%2Fapp" >/dev/null
              curl -s -u "$auth" -H "content-type: application/json" \
                -XPUT "$base/permissions/%2Fapp/${RABBITMQ_USER}" \
                -d '{"configure":".*","write":".*","read":".*"}' >/dev/null

              curl -s -u "$auth" -H "content-type: application/json" \
                -XPUT "$base/queues/%2Fapp/app-backup" \
                -d '{"durable":true,"auto_delete":false,"arguments":{}}' >/dev/null

              for i in $(seq 1 20); do
                curl -s -u "$auth" -H "content-type: application/json" \
                  -XPOST "$base/exchanges/%2Fapp/amq.default/publish" \
                  -d '{"properties":{"delivery_mode":2},"routing_key":"app-backup","payload":"msg-'"$i"'","payload_encoding":"string"}' \
                  | grep -q '"routed":true'
              done
