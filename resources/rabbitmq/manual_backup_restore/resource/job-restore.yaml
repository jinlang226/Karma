apiVersion: batch/v1
kind: Job
metadata:
  name: rabbitmq-restore
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: restore
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              set -e
              tar xzf /backup/${BENCH_PARAM_CLUSTER_PREFIX}-0.tgz -C /
          volumeMounts:
            - name: data
              mountPath: /var/lib/rabbitmq
            - name: backup
              mountPath: /backup
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: data-${BENCH_PARAM_CLUSTER_PREFIX}-0
        - name: backup
          persistentVolumeClaim:
            claimName: ${BENCH_PARAM_CLUSTER_PREFIX}-backup
