# rabbitmq/classic_queue
#
# A 3-node RabbitMQ cluster runs with an internal producer (app-producer)
# that is CrashLooping while trying to publish to a classic queue in a
# non-default vhost. The agent must fix the cluster so the producer stays
# running and messages are published successfully.

prompt: |
  A 3-node RabbitMQ cluster is running in the ${BENCH_NAMESPACE} namespace.
  An internal producer (app-producer) is CrashLooping while trying to create
  and publish to a classic queue in a non-default vhost.

  Fix the cluster so the producer stays running and messages are successfully
  published to the classic queue.

  Constraints:
  - Do not install CRDs or use operators.
  - Avoid data loss.

  Goal:
  - app-producer is Ready.
  - The /app vhost contains app-queue of type classic with messages.
  - The cluster remains healthy with 3 nodes.

  Cluster context:
    Namespace: ${BENCH_NAMESPACE}
    kubectl -n ${BENCH_NAMESPACE} get pods
    kubectl -n ${BENCH_NAMESPACE} logs deploy/app-producer
    kubectl -n ${BENCH_NAMESPACE} exec {{params.cluster_prefix}}-0 -- rabbitmqctl list_vhosts
    kubectl -n ${BENCH_NAMESPACE} exec {{params.cluster_prefix}}-0 -- rabbitmqctl list_permissions -p /app
    kubectl -n ${BENCH_NAMESPACE} exec {{params.cluster_prefix}}-0 -- rabbitmqctl list_policies -p /app

params:
  cluster_prefix:
    default: rabbitmq

namespace_contract:
  required_roles:
    - default

metrics:
  - time_to_first_mutation
  - read_write_ratio
  - blast_radius
  - destructive_ops
  - decoy_integrity
  - residual_drift

preconditionUnits:
  - name: rabbitmq_secrets_ready
    on_probe_fail: skip
    probe:
      - command: "/bin/sh -c 'set -e; kubectl -n ${BENCH_NAMESPACE} get secret {{params.cluster_prefix}}-erlang-cookie >/dev/null; kubectl -n ${BENCH_NAMESPACE} get secret {{params.cluster_prefix}}-admin >/dev/null; kubectl -n ${BENCH_NAMESPACE} get secret {{params.cluster_prefix}}-app >/dev/null'"
        timeout_sec: 20
    apply:
      - command: "/bin/sh -c 'kubectl -n ${BENCH_NAMESPACE} create secret generic {{params.cluster_prefix}}-erlang-cookie --from-literal=cookie=supersecretcookie --dry-run=client -o yaml | kubectl apply -f -'"
        sleep: 1
      - command: "/bin/sh -c 'kubectl -n ${BENCH_NAMESPACE} create secret generic {{params.cluster_prefix}}-admin --from-literal=username=admin --from-literal=password=adminpass --dry-run=client -o yaml | kubectl apply -f -'"
        sleep: 1
      - command: "/bin/sh -c 'kubectl -n ${BENCH_NAMESPACE} create secret generic {{params.cluster_prefix}}-app --from-literal=username=app-user --from-literal=password=apppass --dry-run=client -o yaml | kubectl apply -f -'"
        sleep: 1
    verify:
      - command: "/bin/sh -c 'set -e; kubectl -n ${BENCH_NAMESPACE} get secret {{params.cluster_prefix}}-erlang-cookie >/dev/null; kubectl -n ${BENCH_NAMESPACE} get secret {{params.cluster_prefix}}-admin >/dev/null; kubectl -n ${BENCH_NAMESPACE} get secret {{params.cluster_prefix}}-app >/dev/null'"
        timeout_sec: 20

  - name: rbac_ready
    on_probe_fail: skip
    probe:
      - command: "kubectl -n ${BENCH_NAMESPACE} get sa {{params.cluster_prefix}}"
        timeout_sec: 10
    apply:
      - command: "envsubst '$BENCH_NAMESPACE $BENCH_NS_SOURCE $BENCH_NS_TARGET $BENCH_PARAM_CLUSTER_PREFIX $BENCH_PARAM_BLUE_CLUSTER_PREFIX $BENCH_PARAM_GREEN_CLUSTER_PREFIX $BENCH_PARAM_FROM_VERSION' < resources/rabbitmq/classic_queue/resource/rbac.yaml | kubectl -n ${BENCH_NAMESPACE} apply -f -"
        sleep: 1
    verify:
      - command: "kubectl -n ${BENCH_NAMESPACE} get sa {{params.cluster_prefix}}"
        timeout_sec: 10

  - name: config_ready
    on_probe_fail: skip
    probe:
      - command: "kubectl -n ${BENCH_NAMESPACE} get configmap {{params.cluster_prefix}}-config"
        timeout_sec: 10
    apply:
      - command: "envsubst '$BENCH_NAMESPACE $BENCH_NS_SOURCE $BENCH_NS_TARGET $BENCH_PARAM_CLUSTER_PREFIX $BENCH_PARAM_BLUE_CLUSTER_PREFIX $BENCH_PARAM_GREEN_CLUSTER_PREFIX $BENCH_PARAM_FROM_VERSION' < resources/rabbitmq/classic_queue/resource/configmap.yaml | kubectl -n ${BENCH_NAMESPACE} apply -f -"
        sleep: 1
    verify:
      - command: "kubectl -n ${BENCH_NAMESPACE} get configmap {{params.cluster_prefix}}-config"
        timeout_sec: 10

  - name: services_ready
    on_probe_fail: skip
    probe:
      - command: "/bin/sh -c 'set -e; kubectl -n ${BENCH_NAMESPACE} get svc {{params.cluster_prefix}} >/dev/null; kubectl -n ${BENCH_NAMESPACE} get svc {{params.cluster_prefix}}-headless >/dev/null'"
        timeout_sec: 20
    apply:
      - command: "envsubst '$BENCH_NAMESPACE $BENCH_NS_SOURCE $BENCH_NS_TARGET $BENCH_PARAM_CLUSTER_PREFIX $BENCH_PARAM_BLUE_CLUSTER_PREFIX $BENCH_PARAM_GREEN_CLUSTER_PREFIX $BENCH_PARAM_FROM_VERSION' < resources/rabbitmq/classic_queue/resource/services.yaml | kubectl -n ${BENCH_NAMESPACE} apply -f -"
        sleep: 1
    verify:
      - command: "/bin/sh -c 'set -e; kubectl -n ${BENCH_NAMESPACE} get svc {{params.cluster_prefix}} >/dev/null; kubectl -n ${BENCH_NAMESPACE} get svc {{params.cluster_prefix}}-headless >/dev/null'"
        timeout_sec: 20

  - name: rabbitmq_statefulset_present
    on_probe_fail: skip
    probe:
      - command: "kubectl -n ${BENCH_NAMESPACE} get sts {{params.cluster_prefix}}"
        timeout_sec: 20
    apply:
      - command: "envsubst '$BENCH_NAMESPACE $BENCH_NS_SOURCE $BENCH_NS_TARGET $BENCH_PARAM_CLUSTER_PREFIX $BENCH_PARAM_BLUE_CLUSTER_PREFIX $BENCH_PARAM_GREEN_CLUSTER_PREFIX $BENCH_PARAM_FROM_VERSION' < resources/rabbitmq/classic_queue/resource/statefulset.yaml | kubectl -n ${BENCH_NAMESPACE} apply -f -"
        sleep: 1
    verify:
      - command: "kubectl -n ${BENCH_NAMESPACE} get sts {{params.cluster_prefix}}"
        timeout_sec: 20

  - name: rabbitmq_cluster_ready
    on_probe_fail: skip
    probe:
      - command: "/bin/sh -c 'set -e; [ \"$(kubectl -n ${BENCH_NAMESPACE} get sts {{params.cluster_prefix}} -o jsonpath=\"{.status.readyReplicas}\")\" = \"3\" ]'"
        timeout_sec: 20
    apply:
      - command: "kubectl -n ${BENCH_NAMESPACE} rollout status statefulset/{{params.cluster_prefix}} --timeout=600s"
        sleep: 1
    verify:
      - command: "/bin/sh -c 'set -e; [ \"$(kubectl -n ${BENCH_NAMESPACE} get sts {{params.cluster_prefix}} -o jsonpath=\"{.status.readyReplicas}\")\" = \"3\" ]'"
        timeout_sec: 20

  - name: setup_job_completed
    on_probe_fail: skip
    probe:
      - command: "python3 resources/rabbitmq/classic_queue/setup_precondition_check.py --namespace ${BENCH_NAMESPACE} --bootstrap-only"
        timeout_sec: 30
    apply:
      - command: "kubectl -n ${BENCH_NAMESPACE} delete job {{params.cluster_prefix}}-setup --ignore-not-found=true"
        sleep: 1
      - command: "/bin/sh -c 'kubectl -n ${BENCH_NAMESPACE} wait --for=delete pod -l job-name={{params.cluster_prefix}}-setup --timeout=120s || true'"
        sleep: 1
      - command: "envsubst '$BENCH_NAMESPACE $BENCH_NS_SOURCE $BENCH_NS_TARGET $BENCH_PARAM_CLUSTER_PREFIX $BENCH_PARAM_BLUE_CLUSTER_PREFIX $BENCH_PARAM_GREEN_CLUSTER_PREFIX $BENCH_PARAM_FROM_VERSION' < resources/rabbitmq/classic_queue/resource/setup-job.yaml | kubectl -n ${BENCH_NAMESPACE} apply -f -"
        sleep: 1
      - command: "kubectl -n ${BENCH_NAMESPACE} wait --for=condition=complete job/{{params.cluster_prefix}}-setup --timeout=300s"
        sleep: 1
    verify:
      - command: "python3 resources/rabbitmq/classic_queue/setup_precondition_check.py --namespace ${BENCH_NAMESPACE} --bootstrap-only"
        timeout_sec: 30

  - name: app_producer_deployed
    on_probe_fail: skip
    probe:
      - command: "/bin/sh -c 'n=$(kubectl -n ${BENCH_NAMESPACE} get pod -l app=app-producer -o jsonpath=\"{.items[0].metadata.name}\" 2>/dev/null || true); [ -n \"$n\" ]'"
        timeout_sec: 10
    apply:
      - command: "envsubst '$BENCH_NAMESPACE $BENCH_NS_SOURCE $BENCH_NS_TARGET $BENCH_PARAM_CLUSTER_PREFIX $BENCH_PARAM_BLUE_CLUSTER_PREFIX $BENCH_PARAM_GREEN_CLUSTER_PREFIX $BENCH_PARAM_FROM_VERSION' < resources/rabbitmq/classic_queue/resource/app-producer.yaml | kubectl -n ${BENCH_NAMESPACE} apply -f -"
        sleep: 1
    verify:
      - command: "/bin/sh -c 'n=$(kubectl -n ${BENCH_NAMESPACE} get pod -l app=app-producer -o jsonpath=\"{.items[0].metadata.name}\" 2>/dev/null || true); [ -n \"$n\" ]'"
        timeout_sec: 10

  - name: curl_test_ready
    on_probe_fail: skip
    probe:
      - command: "kubectl -n ${BENCH_NAMESPACE} wait --for=condition=ready pod -l app=curl-test --timeout=3s"
        timeout_sec: 10
    apply:
      - command: "envsubst '$BENCH_NAMESPACE $BENCH_NS_SOURCE $BENCH_NS_TARGET $BENCH_PARAM_CLUSTER_PREFIX $BENCH_PARAM_BLUE_CLUSTER_PREFIX $BENCH_PARAM_GREEN_CLUSTER_PREFIX $BENCH_PARAM_FROM_VERSION' < resources/rabbitmq/classic_queue/resource/curl-test.yaml | kubectl -n ${BENCH_NAMESPACE} apply -f -"
        sleep: 1
      - command: "kubectl -n ${BENCH_NAMESPACE} wait --for=condition=ready pod -l app=curl-test --timeout=300s"
        sleep: 1
    verify:
      - command: "kubectl -n ${BENCH_NAMESPACE} wait --for=condition=ready pod -l app=curl-test --timeout=3s"
        timeout_sec: 10

  - name: classic_queue_baseline_ready
    on_probe_fail: error
    probe:
      - command: "python3 resources/rabbitmq/classic_queue/setup_precondition_check.py --namespace ${BENCH_NAMESPACE} --min-ready 3"
        timeout_sec: 40
    apply:
      - command: "/bin/sh -c true"
        timeout_sec: 5
    verify:
      - command: "python3 resources/rabbitmq/classic_queue/setup_precondition_check.py --namespace ${BENCH_NAMESPACE} --min-ready 3"
        timeout_sec: 40

oracle:
  verify:
    before_commands:
      - command: "envsubst '$BENCH_NAMESPACE $BENCH_NS_SOURCE $BENCH_NS_TARGET $BENCH_PARAM_CLUSTER_PREFIX $BENCH_PARAM_BLUE_CLUSTER_PREFIX $BENCH_PARAM_GREEN_CLUSTER_PREFIX $BENCH_PARAM_FROM_VERSION' < resources/rabbitmq/common/oracle-client.yaml | kubectl -n ${BENCH_NAMESPACE} apply -f -"
        timeout_sec: 30
      - command: "kubectl -n ${BENCH_NAMESPACE} wait --for=condition=ready pod/oracle-client --timeout=60s"
        timeout_sec: 70
    after_commands:
      - command: "kubectl -n ${BENCH_NAMESPACE} delete -f resources/rabbitmq/common/oracle-client.yaml --ignore-not-found=true"
        timeout_sec: 30
    after_failure_mode: warn
    commands:
      - command: "python3 resources/rabbitmq/classic_queue/oracle/oracle.py"
        timeout_sec: 120
