# rabbitmq/blue_green_migration
#
# Two RabbitMQ clusters run in source (blue) and target (green) namespaces.
# The blue cluster has continuous traffic on /app/app-queue with monotonic
# message IDs. The agent must migrate messages and cut traffic to green
# without ID sequence gaps.

prompt: |
  Two RabbitMQ clusters are running in the assigned namespaces:
  - source namespace: ${BENCH_NS_SOURCE} (blue/source cluster)
  - target namespace: ${BENCH_NS_TARGET} (green/target cluster)

  The blue cluster has continuous traffic on /app/app-queue with monotonic
  message IDs. The green cluster starts empty.

  Migrate messages from blue to green without gaps in the ID sequence
  (duplicates are acceptable), and cut application traffic to green.

  Use only native Kubernetes resources and RabbitMQ tools (CLI/API). Do not
  install CRDs or operators.

  Requirements:
  - The green /app/app-queue contains the initial seed range (IDs 1..N)
    with no gaps.
  - At least N messages are available on green.
  - Blue-to-green migration is complete enough for consumers to proceed.

  Cluster context:
    kubectl -n ${BENCH_NS_SOURCE} get pods
    kubectl -n ${BENCH_NS_TARGET} get pods
    kubectl -n ${BENCH_NS_SOURCE} exec {{params.blue_cluster_prefix}}-0 -- rabbitmqctl list_queues -p /app name messages
    kubectl -n ${BENCH_NS_TARGET} exec {{params.green_cluster_prefix}}-0 -- rabbitmqctl list_queues -p /app name messages

params:
  blue_cluster_prefix:
    default: rabbitmq-blue
  green_cluster_prefix:
    default: rabbitmq-green

namespace_contract:
  required_roles:
    - source
    - target

metrics:
  - time_to_first_mutation
  - read_write_ratio
  - blast_radius
  - destructive_ops
  - decoy_integrity
  - residual_drift

preconditionUnits:
  - name: cluster_secrets_ready
    on_probe_fail: skip
    probe:
      - command: "/bin/sh -c 'set -e; kubectl -n ${BENCH_NS_SOURCE} get secret {{params.blue_cluster_prefix}}-erlang-cookie >/dev/null; kubectl -n ${BENCH_NS_TARGET} get secret {{params.green_cluster_prefix}}-erlang-cookie >/dev/null; kubectl -n ${BENCH_NS_SOURCE} get secret {{params.blue_cluster_prefix}}-admin >/dev/null; kubectl -n ${BENCH_NS_TARGET} get secret {{params.green_cluster_prefix}}-admin >/dev/null'"
        timeout_sec: 20
    apply:
      - command: "/bin/sh -c 'kubectl -n ${BENCH_NS_SOURCE} create secret generic {{params.blue_cluster_prefix}}-erlang-cookie --from-literal=cookie=supersecretcookie --dry-run=client -o yaml | kubectl apply -f -'"
        sleep: 1
      - command: "/bin/sh -c 'kubectl -n ${BENCH_NS_TARGET} create secret generic {{params.green_cluster_prefix}}-erlang-cookie --from-literal=cookie=supersecretcookie --dry-run=client -o yaml | kubectl apply -f -'"
        sleep: 1
      - command: "/bin/sh -c 'kubectl -n ${BENCH_NS_SOURCE} create secret generic {{params.blue_cluster_prefix}}-admin --from-literal=username=admin --from-literal=password=adminpass --dry-run=client -o yaml | kubectl apply -f -'"
        sleep: 1
      - command: "/bin/sh -c 'kubectl -n ${BENCH_NS_TARGET} create secret generic {{params.green_cluster_prefix}}-admin --from-literal=username=admin --from-literal=password=adminpass --dry-run=client -o yaml | kubectl apply -f -'"
        sleep: 1
      - command: "/bin/sh -c 'kubectl -n ${BENCH_NS_SOURCE} create secret generic {{params.blue_cluster_prefix}}-app --from-literal=username=app --from-literal=password=apppass --dry-run=client -o yaml | kubectl apply -f -'"
        sleep: 1
      - command: "/bin/sh -c 'kubectl -n ${BENCH_NS_TARGET} create secret generic {{params.green_cluster_prefix}}-app --from-literal=username=app --from-literal=password=apppass --dry-run=client -o yaml | kubectl apply -f -'"
        sleep: 1
    verify:
      - command: "/bin/sh -c 'set -e; kubectl -n ${BENCH_NS_SOURCE} get secret {{params.blue_cluster_prefix}}-erlang-cookie >/dev/null; kubectl -n ${BENCH_NS_TARGET} get secret {{params.green_cluster_prefix}}-erlang-cookie >/dev/null'"
        timeout_sec: 20

  - name: rbac_source_ready
    on_probe_fail: skip
    probe:
      - command: "/bin/sh -c 'kubectl -n ${BENCH_NS_SOURCE} get sa rabbitmq >/dev/null'"
        timeout_sec: 10
    apply:
      - command: "envsubst '$BENCH_NAMESPACE $BENCH_NS_SOURCE $BENCH_NS_TARGET $BENCH_PARAM_CLUSTER_PREFIX $BENCH_PARAM_BLUE_CLUSTER_PREFIX $BENCH_PARAM_GREEN_CLUSTER_PREFIX $BENCH_PARAM_FROM_VERSION' < resources/rabbitmq/blue_green_migration/resource/rbac-source.yaml | kubectl -n ${BENCH_NS_SOURCE} apply -f -"
        sleep: 1
    verify:
      - command: "kubectl -n ${BENCH_NS_SOURCE} get sa rabbitmq"
        timeout_sec: 10

  - name: rbac_target_ready
    on_probe_fail: skip
    probe:
      - command: "/bin/sh -c 'kubectl -n ${BENCH_NS_TARGET} get sa rabbitmq >/dev/null'"
        timeout_sec: 10
    apply:
      - command: "envsubst '$BENCH_NAMESPACE $BENCH_NS_SOURCE $BENCH_NS_TARGET $BENCH_PARAM_CLUSTER_PREFIX $BENCH_PARAM_BLUE_CLUSTER_PREFIX $BENCH_PARAM_GREEN_CLUSTER_PREFIX $BENCH_PARAM_FROM_VERSION' < resources/rabbitmq/blue_green_migration/resource/rbac-target.yaml | kubectl -n ${BENCH_NS_TARGET} apply -f -"
        sleep: 1
    verify:
      - command: "kubectl -n ${BENCH_NS_TARGET} get sa rabbitmq"
        timeout_sec: 10

  - name: configmaps_ready
    on_probe_fail: skip
    probe:
      - command: "/bin/sh -c 'set -e; kubectl -n ${BENCH_NS_SOURCE} get configmap {{params.blue_cluster_prefix}}-config >/dev/null; kubectl -n ${BENCH_NS_TARGET} get configmap {{params.green_cluster_prefix}}-config >/dev/null'"
        timeout_sec: 10
    apply:
      - command: "envsubst '$BENCH_NAMESPACE $BENCH_NS_SOURCE $BENCH_NS_TARGET $BENCH_PARAM_CLUSTER_PREFIX $BENCH_PARAM_BLUE_CLUSTER_PREFIX $BENCH_PARAM_GREEN_CLUSTER_PREFIX $BENCH_PARAM_FROM_VERSION' < resources/rabbitmq/blue_green_migration/resource/configmap-source.yaml | kubectl -n ${BENCH_NS_SOURCE} apply -f -"
        sleep: 1
      - command: "envsubst '$BENCH_NAMESPACE $BENCH_NS_SOURCE $BENCH_NS_TARGET $BENCH_PARAM_CLUSTER_PREFIX $BENCH_PARAM_BLUE_CLUSTER_PREFIX $BENCH_PARAM_GREEN_CLUSTER_PREFIX $BENCH_PARAM_FROM_VERSION' < resources/rabbitmq/blue_green_migration/resource/configmap-target.yaml | kubectl -n ${BENCH_NS_TARGET} apply -f -"
        sleep: 1
    verify:
      - command: "/bin/sh -c 'set -e; kubectl -n ${BENCH_NS_SOURCE} get configmap {{params.blue_cluster_prefix}}-config >/dev/null; kubectl -n ${BENCH_NS_TARGET} get configmap {{params.green_cluster_prefix}}-config >/dev/null'"
        timeout_sec: 10

  - name: services_ready
    on_probe_fail: skip
    probe:
      - command: "/bin/sh -c 'set -e; kubectl -n ${BENCH_NS_SOURCE} get svc {{params.blue_cluster_prefix}} >/dev/null; kubectl -n ${BENCH_NS_TARGET} get svc {{params.green_cluster_prefix}} >/dev/null'"
        timeout_sec: 20
    apply:
      - command: "envsubst '$BENCH_NAMESPACE $BENCH_NS_SOURCE $BENCH_NS_TARGET $BENCH_PARAM_CLUSTER_PREFIX $BENCH_PARAM_BLUE_CLUSTER_PREFIX $BENCH_PARAM_GREEN_CLUSTER_PREFIX $BENCH_PARAM_FROM_VERSION' < resources/rabbitmq/blue_green_migration/resource/services-source.yaml | kubectl -n ${BENCH_NS_SOURCE} apply -f -"
        sleep: 1
      - command: "envsubst '$BENCH_NAMESPACE $BENCH_NS_SOURCE $BENCH_NS_TARGET $BENCH_PARAM_CLUSTER_PREFIX $BENCH_PARAM_BLUE_CLUSTER_PREFIX $BENCH_PARAM_GREEN_CLUSTER_PREFIX $BENCH_PARAM_FROM_VERSION' < resources/rabbitmq/blue_green_migration/resource/services-target.yaml | kubectl -n ${BENCH_NS_TARGET} apply -f -"
        sleep: 1
    verify:
      - command: "/bin/sh -c 'set -e; kubectl -n ${BENCH_NS_SOURCE} get svc {{params.blue_cluster_prefix}} >/dev/null; kubectl -n ${BENCH_NS_TARGET} get svc {{params.green_cluster_prefix}} >/dev/null'"
        timeout_sec: 20

  - name: rabbitmq_blue_ready
    on_probe_fail: skip
    probe:
      - command: "/bin/sh -c 'set -e; [ \"$(kubectl -n ${BENCH_NS_SOURCE} get sts {{params.blue_cluster_prefix}} -o jsonpath=\"{.status.readyReplicas}\")\" = \"3\" ]'"
        timeout_sec: 20
    apply:
      - command: "envsubst '$BENCH_NAMESPACE $BENCH_NS_SOURCE $BENCH_NS_TARGET $BENCH_PARAM_CLUSTER_PREFIX $BENCH_PARAM_BLUE_CLUSTER_PREFIX $BENCH_PARAM_GREEN_CLUSTER_PREFIX $BENCH_PARAM_FROM_VERSION' < resources/rabbitmq/blue_green_migration/resource/statefulset-source.yaml | kubectl -n ${BENCH_NS_SOURCE} apply -f -"
        sleep: 1
      - command: "kubectl -n ${BENCH_NS_SOURCE} rollout status statefulset/{{params.blue_cluster_prefix}} --timeout=600s"
        sleep: 1
    verify:
      - command: "/bin/sh -c 'set -e; [ \"$(kubectl -n ${BENCH_NS_SOURCE} get sts {{params.blue_cluster_prefix}} -o jsonpath=\"{.status.readyReplicas}\")\" = \"3\" ]'"
        timeout_sec: 20

  - name: rabbitmq_green_ready
    on_probe_fail: skip
    probe:
      - command: "/bin/sh -c 'set -e; [ \"$(kubectl -n ${BENCH_NS_TARGET} get sts {{params.green_cluster_prefix}} -o jsonpath=\"{.status.readyReplicas}\")\" = \"3\" ]'"
        timeout_sec: 20
    apply:
      - command: "envsubst '$BENCH_NAMESPACE $BENCH_NS_SOURCE $BENCH_NS_TARGET $BENCH_PARAM_CLUSTER_PREFIX $BENCH_PARAM_BLUE_CLUSTER_PREFIX $BENCH_PARAM_GREEN_CLUSTER_PREFIX $BENCH_PARAM_FROM_VERSION' < resources/rabbitmq/blue_green_migration/resource/statefulset-target.yaml | kubectl -n ${BENCH_NS_TARGET} apply -f -"
        sleep: 1
      - command: "kubectl -n ${BENCH_NS_TARGET} rollout status statefulset/{{params.green_cluster_prefix}} --timeout=600s"
        sleep: 1
    verify:
      - command: "/bin/sh -c 'set -e; [ \"$(kubectl -n ${BENCH_NS_TARGET} get sts {{params.green_cluster_prefix}} -o jsonpath=\"{.status.readyReplicas}\")\" = \"3\" ]'"
        timeout_sec: 20

  - name: cluster_setup_jobs_completed
    on_probe_fail: skip
    probe:
      - command: "python3 resources/rabbitmq/blue_green_migration/setup_precondition_check.py --source-namespace ${BENCH_NS_SOURCE} --target-namespace ${BENCH_NS_TARGET} --bootstrap-only"
        timeout_sec: 60
    apply:
      - command: "kubectl -n ${BENCH_NS_SOURCE} delete job rabbitmq-blue-setup --ignore-not-found=true"
        sleep: 1
      - command: "kubectl -n ${BENCH_NS_TARGET} delete job rabbitmq-green-setup --ignore-not-found=true"
        sleep: 1
      - command: "envsubst '$BENCH_NAMESPACE $BENCH_NS_SOURCE $BENCH_NS_TARGET $BENCH_PARAM_CLUSTER_PREFIX $BENCH_PARAM_BLUE_CLUSTER_PREFIX $BENCH_PARAM_GREEN_CLUSTER_PREFIX $BENCH_PARAM_FROM_VERSION' < resources/rabbitmq/blue_green_migration/resource/setup-job-source.yaml | kubectl -n ${BENCH_NS_SOURCE} apply -f -"
        sleep: 1
      - command: "envsubst '$BENCH_NAMESPACE $BENCH_NS_SOURCE $BENCH_NS_TARGET $BENCH_PARAM_CLUSTER_PREFIX $BENCH_PARAM_BLUE_CLUSTER_PREFIX $BENCH_PARAM_GREEN_CLUSTER_PREFIX $BENCH_PARAM_FROM_VERSION' < resources/rabbitmq/blue_green_migration/resource/setup-job-target.yaml | kubectl -n ${BENCH_NS_TARGET} apply -f -"
        sleep: 1
      # Wait for the setup jobs to finish creating the /app vhost + app-queue
      # before seeding -- the seed job only publishes to an existing queue.
      - command: "kubectl -n ${BENCH_NS_SOURCE} wait --for=condition=complete job/${BENCH_PARAM_BLUE_CLUSTER_PREFIX}-setup --timeout=150s"
        timeout_sec: 160
      - command: "kubectl -n ${BENCH_NS_TARGET} wait --for=condition=complete job/${BENCH_PARAM_GREEN_CLUSTER_PREFIX}-setup --timeout=150s"
        timeout_sec: 160
    verify:
      - command: "python3 resources/rabbitmq/blue_green_migration/setup_precondition_check.py --source-namespace ${BENCH_NS_SOURCE} --target-namespace ${BENCH_NS_TARGET} --bootstrap-only"
        timeout_sec: 60

  - name: seed_data_ready
    on_probe_fail: skip
    probe:
      - command: "python3 resources/rabbitmq/blue_green_migration/setup_precondition_check.py --source-namespace ${BENCH_NS_SOURCE} --target-namespace ${BENCH_NS_TARGET} --seed-only"
        timeout_sec: 40
    apply:
      # Seed the source cluster: the migration-seed configmap (seed_count) in
      # both namespaces, then the seed job that publishes that many messages to
      # the source app-queue via the management API. (The check script only
      # verifies -- it never seeded; the prior `--apply` arg did not exist.)
      - command: "kubectl -n ${BENCH_NS_SOURCE} apply -f resources/rabbitmq/blue_green_migration/resource/seed-configmap.yaml"
        timeout_sec: 30
      - command: "kubectl -n ${BENCH_NS_TARGET} apply -f resources/rabbitmq/blue_green_migration/resource/seed-configmap.yaml"
        timeout_sec: 30
      - command: "kubectl -n ${BENCH_NS_SOURCE} delete job ${BENCH_PARAM_BLUE_CLUSTER_PREFIX}-seed --ignore-not-found"
        timeout_sec: 30
      - command: "envsubst '$BENCH_PARAM_BLUE_CLUSTER_PREFIX' < resources/rabbitmq/blue_green_migration/resource/seed-job.yaml | kubectl -n ${BENCH_NS_SOURCE} apply -f -"
        timeout_sec: 30
      - command: "kubectl -n ${BENCH_NS_SOURCE} wait --for=condition=complete job/${BENCH_PARAM_BLUE_CLUSTER_PREFIX}-seed --timeout=150s"
        timeout_sec: 160
    verify:
      - command: "python3 resources/rabbitmq/blue_green_migration/setup_precondition_check.py --source-namespace ${BENCH_NS_SOURCE} --target-namespace ${BENCH_NS_TARGET} --seed-only"
        timeout_sec: 40

  - name: curl_test_ready
    on_probe_fail: skip
    probe:
      - command: "kubectl -n ${BENCH_NS_TARGET} wait --for=condition=ready pod -l app=curl-test --timeout=3s"
        timeout_sec: 10
    apply:
      - command: "envsubst '$BENCH_NAMESPACE $BENCH_NS_SOURCE $BENCH_NS_TARGET $BENCH_PARAM_CLUSTER_PREFIX $BENCH_PARAM_BLUE_CLUSTER_PREFIX $BENCH_PARAM_GREEN_CLUSTER_PREFIX $BENCH_PARAM_FROM_VERSION' < resources/rabbitmq/blue_green_migration/resource/curl-test.yaml | kubectl -n ${BENCH_NS_TARGET} apply -f -"
        sleep: 1
      - command: "kubectl -n ${BENCH_NS_TARGET} wait --for=condition=ready pod -l app=curl-test --timeout=300s"
        sleep: 1
    verify:
      - command: "kubectl -n ${BENCH_NS_TARGET} wait --for=condition=ready pod -l app=curl-test --timeout=3s"
        timeout_sec: 10

oracle:
  verify:
    before_commands:
      - command: "envsubst '$BENCH_NAMESPACE $BENCH_NS_SOURCE $BENCH_NS_TARGET $BENCH_PARAM_CLUSTER_PREFIX $BENCH_PARAM_BLUE_CLUSTER_PREFIX $BENCH_PARAM_GREEN_CLUSTER_PREFIX $BENCH_PARAM_FROM_VERSION' < resources/rabbitmq/common/oracle-client.yaml | kubectl -n ${BENCH_NS_TARGET} apply -f -"
        timeout_sec: 30
      - command: "kubectl -n ${BENCH_NS_TARGET} wait --for=condition=ready pod/oracle-client --timeout=60s"
        timeout_sec: 70
    after_commands:
      - command: "kubectl -n ${BENCH_NS_TARGET} delete -f resources/rabbitmq/common/oracle-client.yaml --ignore-not-found=true"
        timeout_sec: 30
    after_failure_mode: warn
    commands:
      - command: "python3 resources/rabbitmq/blue_green_migration/oracle/oracle.py"
        timeout_sec: 120
