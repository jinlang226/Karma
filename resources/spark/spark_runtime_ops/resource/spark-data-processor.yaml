apiVersion: batch/v1
kind: Job
metadata:
  name: spark-data-processor
  namespace: spark-runtime
spec:
  # BUG 3: Job is suspended, won't run until resumed
  suspend: true
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: spark-data-processor
        component: driver
    spec:
      serviceAccountName: spark-runtime
      containers:
      - name: spark-submit
        image: apache/spark:3.5.3
        command:
        - /bin/bash
        - -c
        - |
          echo "=============================================="
          echo "  Spark Data Processor - SparkPi Job"
          echo "=============================================="

          # Wait for Spark master
          echo "Waiting for Spark master..."
          until timeout 1 bash -c 'cat < /dev/null > /dev/tcp/spark-master/7077' 2>/dev/null; do
            sleep 2
          done
          echo "Spark master is ready"

          # Wait for workers to register
          echo "Waiting for workers to register..."
          sleep 10

          # Submit SparkPi job
          echo "Submitting SparkPi job..."
          export SPARK_LOCAL_IP=$(hostname -i)
          /opt/spark/bin/spark-submit \
            --master local[2] \
            --driver-memory 512m \
            --class org.apache.spark.examples.SparkPi \
            /opt/spark/examples/jars/spark-examples_2.12-3.5.3.jar \
            100

          EXIT_CODE=$?
          echo "SparkPi job finished with exit code: $EXIT_CODE"
          exit $EXIT_CODE
        envFrom:
        - configMapRef:
            name: spark-config
        env:
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: spark-credentials
              key: api-key
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
      restartPolicy: Never
