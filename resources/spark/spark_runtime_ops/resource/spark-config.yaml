apiVersion: v1
kind: ConfigMap
metadata:
  name: spark-config
  namespace: spark-runtime
data:
  # BUG 1: spark.executor.memory is set too low (100m instead of 512m)
  # This will cause executor OOM errors
  spark.executor.memory: "100m"
  spark.driver.memory: "512m"
  spark.executor.cores: "1"
  spark.dynamicAllocation.enabled: "false"
  spark.eventLog.enabled: "true"
  spark.eventLog.dir: "/tmp/spark-events"
