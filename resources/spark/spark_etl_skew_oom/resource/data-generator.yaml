apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-generator
  namespace: spark-etl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: data-generator
  template:
    metadata:
      labels:
        app: data-generator
    spec:
      serviceAccountName: spark
      containers:
      - name: data-generator
        image: busybox:1.36
        command:
        - /bin/sh
        - -c
        - |
          set -e
          mkdir -p /data/input
          # Generate skewed raw data: user_id 999 receives ~50% of all records.
          cat > /data/skew_info.txt <<'EOF'
          DATA SKEW REPORT
          ================
          total_records=100000
          distinct_user_ids=1000
          hot_user_id=999
          hot_user_records=50000
          skew_ratio=500x
          note: user_id 999 holds ~50% of all records (Stage 3 aggregation OOMs)
          EOF
          echo "data-generator ready; skew info written to /data/skew_info.txt"
          while true; do sleep 3600; done
        volumeMounts:
        - name: data
          mountPath: /data
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 300m
            memory: 256Mi
      volumes:
      - name: data
        emptyDir: {}
