apiVersion: batch/v1
kind: Job
metadata:
  name: spark-pi
  namespace: spark-pi
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: spark-pi
        component: driver
    spec:
      # BUG #2: serviceAccountName "spark-nonexistent" does not exist.
      # Correct value is "spark-pi".
      serviceAccountName: spark-nonexistent
      containers:
      - name: spark-submit
        # BUG #1: image carries a "-nonexistent" suffix and cannot be pulled.
        # Correct value is "apache/spark:3.5.3".
        image: apache/spark:3.5.3-nonexistent
        command:
        - /bin/bash
        - -c
        - |
          echo "=============================================="
          echo "  SparkPi Job"
          echo "=============================================="
          export SPARK_LOCAL_IP=$(hostname -i)
          /opt/spark/bin/spark-submit \
            --master local[2] \
            --driver-memory 512m \
            --class org.apache.spark.examples.SparkPi \
            /opt/spark/examples/jars/spark-examples_2.12-3.5.3.jar \
            1000
          EXIT_CODE=$?
          echo "SparkPi job finished with exit code: $EXIT_CODE"
          exit $EXIT_CODE
        resources:
          requests:
            cpu: 200m
            # BUG #3: invalid memory format "512" (missing unit).
            # Correct value is "512Mi".
            memory: "512"
          limits:
            cpu: 500m
            memory: 1Gi
      restartPolicy: Never
