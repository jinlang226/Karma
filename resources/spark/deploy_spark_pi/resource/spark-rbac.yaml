apiVersion: v1
kind: ServiceAccount
metadata:
  name: spark-pi
  namespace: spark-pi
---
# BUG #4: the "pods" resource is intentionally missing from this Role.
# The agent must add it so the SparkPi driver can manage its executor pods.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: spark-pi-role
  namespace: spark-pi
rules:
- apiGroups: [""]
  resources: ["services", "configmaps", "persistentvolumeclaims"]
  verbs: ["create", "get", "list", "watch", "delete", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: spark-pi-role-binding
  namespace: spark-pi
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: spark-pi-role
subjects:
- kind: ServiceAccount
  name: spark-pi
  namespace: spark-pi
