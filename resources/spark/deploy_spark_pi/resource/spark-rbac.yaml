apiVersion: v1
kind: ServiceAccount
metadata:
  name: spark-pi
  namespace: spark-pi
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: spark-pi-role
  namespace: spark-pi
rules:
# BUG: Missing "pods" resource permission - operator needs to add this
- apiGroups: [""]
  resources: ["services", "configmaps"]
  verbs: ["create", "get", "list", "watch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: spark-pi-role-binding
  namespace: spark-pi
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: spark-pi-role
subjects:
- kind: ServiceAccount
  name: spark-pi
  namespace: spark-pi
