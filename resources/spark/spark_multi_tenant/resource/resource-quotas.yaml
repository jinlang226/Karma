apiVersion: v1
kind: ResourceQuota
metadata:
  name: spark-quota
  namespace: spark-team-a
spec:
  hard:
    requests.cpu: "2"
    requests.memory: 1Gi
    limits.cpu: "4"
    limits.memory: 2Gi
    pods: "5"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: spark-quota
  namespace: spark-team-b
spec:
  hard:
    requests.cpu: "1"
    requests.memory: 512Mi
    limits.cpu: "2"
    limits.memory: 1Gi
    pods: "3"
