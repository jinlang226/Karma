apiVersion: batch/v1
kind: Job
metadata:
  name: spark-skew-baseline
  namespace: spark-skew
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: spark-skew
        strategy: baseline
    spec:
      # BUG: serviceAccountName "spark-wrong" does not exist; correct it to "spark".
      serviceAccountName: spark-wrong
      restartPolicy: Never
      containers:
      - name: spark-skew
        image: apache/spark:3.5.3
        env:
        - name: STRATEGY
          value: "baseline"
        command:
        - /bin/bash
        - -c
        - |
          set -e
          export SPARK_LOCAL_IP=$(hostname -i)
          echo "STRATEGY=baseline (no optimization, skew_ratio=10x, slow)"
          /opt/spark/bin/spark-submit \
            --master local[2] \
            --class org.apache.spark.examples.SparkPi \
            /opt/spark/examples/jars/spark-examples_2.12-3.5.3.jar \
            500
          echo "spark_skew_baseline_complete"
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
