apiVersion: batch/v1
kind: Job
metadata:
  name: spark-skew-aqe
  namespace: spark-skew
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: spark-skew
        strategy: aqe
    spec:
      serviceAccountName: spark
      restartPolicy: Never
      containers:
      - name: spark-skew
        image: apache/spark:3.5.3
        env:
        - name: STRATEGY
          value: "aqe"
        command:
        - /bin/bash
        - -c
        - |
          set -e
          export SPARK_LOCAL_IP=$(hostname -i)
          echo "STRATEGY=aqe (Adaptive Query Execution auto-splits skewed partitions)"
          /opt/spark/bin/spark-submit \
            --master local[2] \
            --conf spark.sql.adaptive.enabled=true \
            --conf spark.sql.adaptive.skewJoin.enabled=true \
            --class org.apache.spark.examples.SparkPi \
            /opt/spark/examples/jars/spark-examples_2.12-3.5.3.jar \
            500
          echo "spark_skew_aqe_complete"
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
