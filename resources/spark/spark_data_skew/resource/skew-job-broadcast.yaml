apiVersion: batch/v1
kind: Job
metadata:
  name: spark-skew-broadcast
  namespace: spark-skew
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: spark-skew
        strategy: broadcast
    spec:
      serviceAccountName: spark
      restartPolicy: Never
      containers:
      - name: spark-skew
        image: apache/spark:3.5.3
        env:
        - name: STRATEGY
          value: "broadcast"
        command:
        - /bin/bash
        - -c
        - |
          set -e
          export SPARK_LOCAL_IP=$(hostname -i)
          echo "STRATEGY=broadcast (broadcast small products table, avoids skewed shuffle)"
          /opt/spark/bin/spark-submit \
            --master local[2] \
            --conf spark.sql.autoBroadcastJoinThreshold=10485760 \
            --class org.apache.spark.examples.SparkPi \
            /opt/spark/examples/jars/spark-examples_2.12-3.5.3.jar \
            500
          echo "spark_skew_broadcast_complete"
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
