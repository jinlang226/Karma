apiVersion: apps/v1
kind: Deployment
metadata:
  name: __DEPLOYMENT_NAME__
  namespace: __NAMESPACE__
spec:
  replicas: 1
  selector:
    matchLabels:
      app: __DEPLOYMENT_NAME__
  template:
    metadata:
      labels:
        app: __DEPLOYMENT_NAME__
    spec:
      serviceAccountName: __SERVICE_ACCOUNT__
      containers:
      - name: spark-history-server
        image: __SPARK_IMAGE__
        command:
        - /opt/spark/bin/spark-class
        - org.apache.spark.deploy.history.HistoryServer
        env:
        - name: SPARK_HISTORY_OPTS
          value: "-Dspark.history.fs.logDirectory=__LOG_DIR__ -Dspark.history.fs.update.interval=5s"
        - name: SPARK_NO_DAEMONIZE
          value: "true"
        ports:
        - containerPort: 18080
          name: http
        volumeMounts:
        - name: spark-logs
          mountPath: __LOG_DIR__
        readinessProbe:
          httpGet:
            path: /
            port: 18080
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /
            port: 18080
          initialDelaySeconds: 30
          periodSeconds: 10
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
      volumes:
      - name: spark-logs
        persistentVolumeClaim:
          claimName: __PVC_NAME__
