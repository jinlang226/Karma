apiVersion: batch/v1
kind: Job
metadata:
  name: __JOB_NAME__
  namespace: __NAMESPACE__
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: __JOB_NAME__
        component: driver
    spec:
      serviceAccountName: __SERVICE_ACCOUNT__
      containers:
      - name: spark-submit
        image: __SPARK_IMAGE__
        command:
        - /bin/bash
        - -c
        - |
          echo "=============================================="
          echo "  SparkPi Job"
          echo "=============================================="
          export SPARK_LOCAL_IP=$(hostname -i)
          /opt/spark/bin/spark-submit \
            --master local[2] \
            --driver-memory __DRIVER_MEMORY__ \
            --class org.apache.spark.examples.SparkPi \
            /opt/spark/examples/jars/spark-examples_2.12-3.5.3.jar \
            __ITERATIONS__
          EXIT_CODE=$?
          echo "SparkPi job finished with exit code: $EXIT_CODE"
          exit $EXIT_CODE
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
      restartPolicy: Never
