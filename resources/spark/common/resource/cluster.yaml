apiVersion: v1
kind: Service
metadata:
  name: __CLUSTER_PREFIX__-master
  namespace: __NAMESPACE__
spec:
  ports:
  - port: 7077
    name: spark
  - port: 8080
    name: webui
  selector:
    app: __CLUSTER_PREFIX__-master
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: __CLUSTER_PREFIX__-master
  namespace: __NAMESPACE__
spec:
  replicas: 1
  selector:
    matchLabels:
      app: __CLUSTER_PREFIX__-master
  template:
    metadata:
      labels:
        app: __CLUSTER_PREFIX__-master
        component: master
    spec:
      serviceAccountName: __SERVICE_ACCOUNT__
      containers:
      - name: spark-master
        image: __SPARK_IMAGE__
        command:
        - /bin/bash
        - -c
        - |
          unset SPARK_MASTER_PORT
          /opt/spark/sbin/start-master.sh
          tail -f /opt/spark/logs/*
        ports:
        - containerPort: 7077
          name: spark
        - containerPort: 8080
          name: webui
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: __CLUSTER_PREFIX__-worker
  namespace: __NAMESPACE__
spec:
  replicas: __WORKER_REPLICAS__
  selector:
    matchLabels:
      app: __CLUSTER_PREFIX__-worker
  template:
    metadata:
      labels:
        app: __CLUSTER_PREFIX__-worker
        component: worker
    spec:
      serviceAccountName: __SERVICE_ACCOUNT__
      containers:
      - name: spark-worker
        image: __SPARK_IMAGE__
        command:
        - /bin/bash
        - -c
        - |
          /opt/spark/sbin/start-worker.sh spark://__CLUSTER_PREFIX__-master:7077
          tail -f /opt/spark/logs/*
        env:
        - name: SPARK_WORKER_MEMORY
          value: "__WORKER_MEMORY__"
        - name: SPARK_WORKER_CORES
          value: "1"
        ports:
        - containerPort: 8081
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
