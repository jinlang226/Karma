apiVersion: apps/v1
kind: Deployment
metadata:
  name: __DEPLOYMENT_NAME__
  namespace: __NAMESPACE__
spec:
  replicas: 1
  selector:
    matchLabels:
      app: __DEPLOYMENT_NAME__
  template:
    metadata:
      labels:
        app: __DEPLOYMENT_NAME__
    spec:
      serviceAccountName: __SERVICE_ACCOUNT__
      containers:
      - name: spark-monitor
        image: __SPARK_IMAGE__
        command:
        - /bin/sh
        - -c
        - |
          echo "spark runtime monitor ready"
          while true; do
            sleep 3600
          done
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 300m
            memory: 512Mi
