apiVersion: apps/v1
kind: Deployment
metadata:
  name: traffic-generator
  namespace: spark-streaming
spec:
  replicas: 1
  selector:
    matchLabels:
      app: traffic-generator
  template:
    metadata:
      labels:
        app: traffic-generator
    spec:
      serviceAccountName: spark
      containers:
      - name: traffic-generator
        image: busybox:1.36
        command:
        - /bin/sh
        - -c
        - |
          echo "PHASE 1: baseline load (5 workers sufficient) - 60s"
          echo "LAG=2000 LATENCY=50ms"
          sleep 60
          echo "PHASE 2: 2x load spike - scale to 10 workers - 90s"
          echo "LAG=15000 LATENCY=400ms"
          sleep 90
          echo "PHASE 3: 5x load spike - scale to 20 workers - 120s"
          echo "LAG=75000 LATENCY=2500ms"
          sleep 120
          echo "PHASE 4: cooldown - scale back to 5 workers - 60s"
          echo "LAG=1500 LATENCY=45ms"
          sleep 60
          echo "TRAFFIC GENERATION COMPLETE"
          while true; do sleep 3600; done
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metrics-server
  namespace: spark-streaming
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metrics-server
  template:
    metadata:
      labels:
        app: metrics-server
    spec:
      serviceAccountName: spark
      containers:
      - name: metrics-server
        image: bitnami/kubectl:1.29
        command:
        - /bin/sh
        - -c
        - |
          echo "metrics-server: watching spark-worker replica count"
          PREV=""
          while true; do
            CUR=$(kubectl -n spark-streaming get deployment spark-worker \
              -o jsonpath='{.spec.replicas}' 2>/dev/null || echo "?")
            if [ -n "$CUR" ] && [ "$CUR" != "?" ] && [ "$CUR" != "$PREV" ]; then
              if [ -n "$PREV" ]; then
                echo "SCALING EVENT: spark-worker replicas ${PREV} -> ${CUR}"
              else
                echo "metrics-server: initial spark-worker replicas=${CUR}"
              fi
              PREV="$CUR"
            fi
            sleep 5
          done
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
