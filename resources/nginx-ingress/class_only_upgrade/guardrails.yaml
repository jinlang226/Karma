controller_args:
  - namespace: ingress-nginx
    name: ingress-nginx-controller
    must_include:
      - --controller-class=k8s.io/ingress-nginx-1
      - --ingress-class=ingress-1
      - --watch-ingress-without-class=false
    forbidden:
      - --watch-ingress-without-class=true
  - namespace: ingress-nginx-2
    name: ingress-nginx-controller
    must_include:
      - --controller-class=k8s.io/ingress-nginx-2
      - --ingress-class=ingress-2
      - --watch-ingress-without-class=false
    forbidden:
      - --watch-ingress-without-class=true

forbid_any_default_class: true
ingressclass_constraints:
  - name: ingress-1
    forbidden_annotations:
      ingressclass.kubernetes.io/is-default-class: "true"
  - name: ingress-2
    forbidden_annotations:
      ingressclass.kubernetes.io/is-default-class: "true"
