apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: canary-canary
  namespace: demo
  annotations:
    nginx.ingress.kubernetes.io/canary: "true"
    nginx.ingress.kubernetes.io/canary-by-header: "X-Canary"
    nginx.ingress.kubernetes.io/canary-by-header-value: "wrong"
spec:
  ingressClassName: nginx
  rules:
  - host: canary.example.com
    http:
      paths:
      - path: /
        pathType: Exact
        backend:
          service:
            name: canary-echo
            port:
              number: 80
