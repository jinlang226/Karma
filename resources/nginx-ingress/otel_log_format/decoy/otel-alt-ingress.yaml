apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: otel-alt
  namespace: demo
  labels:
    benchmark.decoy: "true"
    benchmark.case: otel_log_format
spec:
  ingressClassName: nginx
  rules:
  - host: otel-alt.example.com
    http:
      paths:
      - path: /otel-check
        pathType: Prefix
        backend:
          service:
            name: otel-echo
            port:
              number: 5678
