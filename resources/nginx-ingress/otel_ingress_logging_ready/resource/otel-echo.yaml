apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-echo
  namespace: demo
  labels:
    app: otel-echo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-echo
  template:
    metadata:
      labels:
        app: otel-echo
    spec:
      containers:
      - name: http-echo
        image: hashicorp/http-echo:0.2.3
        args:
          - "-text=hello"
          - "-listen=:5678"
        ports:
          - containerPort: 5678
            name: http
---
apiVersion: v1
kind: Service
metadata:
  name: otel-echo
  namespace: demo
  labels:
    app: otel-echo
spec:
  type: ClusterIP
  selector:
    app: otel-echo
  ports:
  - name: http
    port: 5678
    targetPort: 5678
    protocol: TCP
