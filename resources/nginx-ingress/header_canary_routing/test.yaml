type: nginx-header-canary-routing
targetApp: NGINX-Ingress
numAppInstance: 2
maxAttempts: 1

namespace_contract:
  base_namespace: nginx
  default_role: app
  required_roles:
  - ingress
  - app

params:
  definitions:
    stable_deployment_name:
      type: string
      default: stable-echo
    canary_deployment_name:
      type: string
      default: canary-echo
    stable_ingress_name:
      type: string
      default: canary-stable
    canary_ingress_name:
      type: string
      default: canary-canary
    curl_pod_name:
      type: string
      default: curl-test
    host:
      type: string
      default: canary.example.com
    path:
      type: string
      default: /
    header_name:
      type: string
      default: X-Canary
    header_value:
      type: string
      default: always
    baseline_header_value:
      type: string
      default: wrong
    stable_body:
      type: string
      default: stable
    canary_body:
      type: string
      default: canary

preconditionUnits:
  - id: ingress_controller_ready
    probe:
      commands:
        - command: ["kubectl", "-n", "${BENCH_NS_INGRESS}", "rollout", "status", "deployment/ingress-nginx-controller", "--timeout=5s"]
          timeout_sec: 10
    apply:
      commands:
        - command:
            - /bin/sh
            - -c
            - >
              set -e;
              awk 'BEGIN{skip=1} /^---$/{if(skip){skip=0; next}} !skip {print}'
              resources/nginx-ingress/create_ingress/resource/deploy.yaml |
              sed "s/namespace: ingress-nginx/namespace: ${BENCH_NS_INGRESS}/g" |
              kubectl apply -f -
          timeout_sec: 40
    verify:
      commands:
        - command: ["kubectl", "-n", "${BENCH_NS_INGRESS}", "rollout", "status", "deployment/ingress-nginx-controller", "--timeout=120s"]
          timeout_sec: 130
      retries: 3
      interval_sec: 3

  - id: stable_backend_ready
    probe:
      commands:
        - command: ["kubectl", "-n", "${BENCH_NS_APP}", "rollout", "status", "deployment/{{params.stable_deployment_name}}", "--timeout=5s"]
          timeout_sec: 10
    apply:
      commands:
        - command:
            - /bin/sh
            - -c
            - >
              sed "s/namespace: demo/namespace: ${BENCH_NS_APP}/g"
              resources/nginx-ingress/ingress_canary/resource/stable-echo.yaml |
              kubectl apply -f -
          timeout_sec: 20
    verify:
      commands:
        - command: ["kubectl", "-n", "${BENCH_NS_APP}", "rollout", "status", "deployment/{{params.stable_deployment_name}}", "--timeout=60s"]
          timeout_sec: 70
      retries: 3
      interval_sec: 2

  - id: canary_backend_ready
    probe:
      commands:
        - command: ["kubectl", "-n", "${BENCH_NS_APP}", "rollout", "status", "deployment/{{params.canary_deployment_name}}", "--timeout=5s"]
          timeout_sec: 10
    apply:
      commands:
        - command:
            - /bin/sh
            - -c
            - >
              sed "s/namespace: demo/namespace: ${BENCH_NS_APP}/g"
              resources/nginx-ingress/ingress_canary/resource/canary-echo.yaml |
              kubectl apply -f -
          timeout_sec: 20
    verify:
      commands:
        - command: ["kubectl", "-n", "${BENCH_NS_APP}", "rollout", "status", "deployment/{{params.canary_deployment_name}}", "--timeout=60s"]
          timeout_sec: 70
      retries: 3
      interval_sec: 2

  - id: curl_test_ready
    probe:
      commands:
        - command: ["kubectl", "-n", "${BENCH_NS_APP}", "wait", "--for=condition=Ready", "pod/{{params.curl_pod_name}}", "--timeout=5s"]
          timeout_sec: 10
    apply:
      commands:
        - command:
            - /bin/sh
            - -c
            - >
              sed "s/namespace: demo/namespace: ${BENCH_NS_APP}/g"
              resources/nginx-ingress/ingress_canary/resource/curl-test.yaml |
              kubectl apply -f -
          timeout_sec: 20
    verify:
      commands:
        - command: ["kubectl", "-n", "${BENCH_NS_APP}", "wait", "--for=condition=Ready", "pod/{{params.curl_pod_name}}", "--timeout=60s"]
          timeout_sec: 70
      retries: 3
      interval_sec: 2

  - id: canary_baseline_ready
    probe:
      commands:
        - command: ["kubectl", "-n", "${BENCH_NS_APP}", "get", "ingress", "{{params.stable_ingress_name}}"]
          timeout_sec: 10
        - command:
            - /bin/sh
            - -c
            - >
              set -e;
              kubectl -n ${BENCH_NS_APP} get ingress {{params.canary_ingress_name}} -o yaml |
              grep -Eq 'canary-by-header-value: ?"?{{params.baseline_header_value}}"?$'
          timeout_sec: 10
    apply:
      commands:
        - command:
            - /bin/sh
            - -c
            - >
              sed "s/namespace: demo/namespace: ${BENCH_NS_APP}/g"
              resources/nginx-ingress/ingress_canary/resource/ingress-stable.yaml |
              kubectl apply -f -
          timeout_sec: 20
        - command:
            - /bin/sh
            - -c
            - >
              sed "s/namespace: demo/namespace: ${BENCH_NS_APP}/g"
              resources/nginx-ingress/ingress_canary/resource/ingress-canary.yaml |
              kubectl apply -f -
          timeout_sec: 20
    verify:
      commands:
        - command: ["kubectl", "-n", "${BENCH_NS_APP}", "get", "ingress", "{{params.stable_ingress_name}}"]
          timeout_sec: 10
        - command:
            - /bin/sh
            - -c
            - >
              set -e;
              kubectl -n ${BENCH_NS_APP} get ingress {{params.canary_ingress_name}} -o yaml |
              grep -Eq 'canary-by-header-value: ?"?{{params.baseline_header_value}}"?$'
          timeout_sec: 10

detailedInstructions: |
  Fix header-based canary routing in the assigned namespaces.

  Namespaces:
  - controller: `${BENCH_NS_INGRESS}`
  - application: `${BENCH_NS_APP}`

  Current baseline:
  - `{{params.stable_deployment_name}}` serves `{{params.stable_body}}`.
  - `{{params.canary_deployment_name}}` serves `{{params.canary_body}}`.
  - Stable ingress is healthy.
  - Canary ingress exists, but its header match value is wrong.

  Requirements:
  - Requests without the header must return `{{params.stable_body}}`.
  - Requests with header `{{params.header_name}}: {{params.header_value}}` must return `{{params.canary_body}}`.
  - Do not modify the backend Deployments or Services.

  Good validation commands:
  ```bash
  kubectl -n ${BENCH_NS_APP} exec {{params.curl_pod_name}} -- \
    curl -sS -H "Host: {{params.host}}" \
    http://ingress-nginx-controller.${BENCH_NS_INGRESS}.svc.cluster.local{{params.path}}
  kubectl -n ${BENCH_NS_APP} exec {{params.curl_pod_name}} -- \
    curl -sS -H "Host: {{params.host}}" -H "{{params.header_name}}: {{params.header_value}}" \
    http://ingress-nginx-controller.${BENCH_NS_INGRESS}.svc.cluster.local{{params.path}}
  ```

operatorContext: |
  Helpful commands:
  ```bash
  kubectl -n ${BENCH_NS_APP} get ingress,svc,deploy,pod
  kubectl -n ${BENCH_NS_INGRESS} logs deploy/ingress-nginx-controller --tail=200
  ```

oracle:
  verify:
    commands:
      - command: ["python3", "resources/nginx-ingress/header_canary_routing/oracle/oracle.py", "--check", "annotations", "--curl-pod-name", "{{params.curl_pod_name}}", "--canary-ingress-name", "{{params.canary_ingress_name}}", "--host", "{{params.host}}", "--path", "{{params.path}}", "--header-name", "{{params.header_name}}", "--header-value", "{{params.header_value}}", "--expected-stable-body", "{{params.stable_body}}", "--expected-canary-body", "{{params.canary_body}}"]
        timeout_sec: 30
      - command: ["python3", "resources/nginx-ingress/header_canary_routing/oracle/oracle.py", "--check", "stable", "--curl-pod-name", "{{params.curl_pod_name}}", "--canary-ingress-name", "{{params.canary_ingress_name}}", "--host", "{{params.host}}", "--path", "{{params.path}}", "--header-name", "{{params.header_name}}", "--header-value", "{{params.header_value}}", "--expected-stable-body", "{{params.stable_body}}", "--expected-canary-body", "{{params.canary_body}}"]
        timeout_sec: 30
      - command: ["python3", "resources/nginx-ingress/header_canary_routing/oracle/oracle.py", "--check", "canary", "--curl-pod-name", "{{params.curl_pod_name}}", "--canary-ingress-name", "{{params.canary_ingress_name}}", "--host", "{{params.host}}", "--path", "{{params.path}}", "--header-name", "{{params.header_name}}", "--header-value", "{{params.header_value}}", "--expected-stable-body", "{{params.stable_body}}", "--expected-canary-body", "{{params.canary_body}}"]
        timeout_sec: 30

cleanUpCommands:
  - command: ["kubectl", "-n", "${BENCH_NS_APP}", "delete", "ingress", "{{params.stable_ingress_name}}", "--ignore-not-found=true"]
    timeout_sec: 20
  - command: ["kubectl", "-n", "${BENCH_NS_APP}", "delete", "ingress", "{{params.canary_ingress_name}}", "--ignore-not-found=true"]
    timeout_sec: 20
  - command: ["kubectl", "-n", "${BENCH_NS_APP}", "delete", "pod", "{{params.curl_pod_name}}", "--ignore-not-found=true"]
    timeout_sec: 20
  - command: ["kubectl", "-n", "${BENCH_NS_APP}", "delete", "service", "{{params.stable_deployment_name}}", "--ignore-not-found=true"]
    timeout_sec: 20
  - command: ["kubectl", "-n", "${BENCH_NS_APP}", "delete", "service", "{{params.canary_deployment_name}}", "--ignore-not-found=true"]
    timeout_sec: 20
  - command: ["kubectl", "-n", "${BENCH_NS_APP}", "delete", "deployment", "{{params.stable_deployment_name}}", "--ignore-not-found=true"]
    timeout_sec: 20
  - command: ["kubectl", "-n", "${BENCH_NS_APP}", "delete", "deployment", "{{params.canary_deployment_name}}", "--ignore-not-found=true"]
    timeout_sec: 20
  - command:
      - /bin/sh
      - -c
      - >
        set -e;
        awk 'BEGIN{skip=1} /^---$/{if(skip){skip=0; next}} !skip {print}'
        resources/nginx-ingress/create_ingress/resource/deploy.yaml |
        sed "s/namespace: ingress-nginx/namespace: ${BENCH_NS_INGRESS}/g" |
        kubectl delete --ignore-not-found=true -f - || true
    timeout_sec: 40
