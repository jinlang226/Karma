apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: legacy-ingress
  namespace: demo
  labels:
    benchmark.decoy: "true"
    benchmark.case: renew_tls_secret
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - legacy.example.com
    secretName: tls-legacy
  rules:
  - host: legacy.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: echo-server
            port:
              number: 5678
