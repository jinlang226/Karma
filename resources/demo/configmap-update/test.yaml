type: demo-configmap-update
targetApp: local
numAppInstance: 0
maxAttempts: 1

params:
  definitions:
    target_value:
      type: string
      default: x

preconditionUnits:
  - id: configmap_ready
    probe:
      commands:
        - command:
            [
              "kubectl",
              "get",
              "configmap",
              "demo-config",
            ]
          timeout_sec: 20
    apply:
      commands:
        - command:
            [
              "kubectl",
              "apply",
              "-f",
              "resources/demo/configmap-update/resource/config.yaml",
            ]
          timeout_sec: 20
    verify:
      commands:
        - command:
            [
              "kubectl",
              "get",
              "configmap",
              "demo-config",
            ]
          timeout_sec: 20
      retries: 5
      interval_sec: 2

detailedInstructions: |
  Update ConfigMap `demo-config` in the assigned namespace.

  Requirement:
  - Set `data.value={{params.target_value}}`.
  - Do not create or delete the ConfigMap during solve; only update its value.

operatorContext: |
  Namespace: ${BENCH_NAMESPACE}
  kubectl -n ${BENCH_NAMESPACE} get configmap demo-config -o yaml

oracle:
  verify:
    commands:
      - command:
          [
            "python3",
            "resources/demo/configmap-update/oracle/oracle.py",
            "--expected-value",
            "{{params.target_value}}",
          ]
        timeout_sec: 20
cleanUpCommands:
  - command:
      [
        "kubectl",
        "delete",
        "configmap",
        "demo-config",
        "--ignore-not-found=true",
      ]
    timeout_sec: 20
