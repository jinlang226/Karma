type: demo-configmap-update-two-ns
targetApp: local
numAppInstance: 0
maxAttempts: 1

params:
  definitions:
    source_value:
      type: string
      default: left
    target_value:
      type: string
      default: right

namespace_contract:
  default_role: source
  required_roles:
  - source
  - target

preconditionUnits:
  - id: configmap_ready
    probe:
      commands:
        - command:
            [
              "kubectl",
              "-n",
              "${BENCH_NS_SOURCE}",
              "get",
              "configmap",
              "demo-config",
            ]
          timeout_sec: 20
        - command:
            [
              "kubectl",
              "-n",
              "${BENCH_NS_TARGET}",
              "get",
              "configmap",
              "demo-config",
            ]
          timeout_sec: 20
    apply:
      commands:
        - command:
            [
              "kubectl",
              "-n",
              "${BENCH_NS_SOURCE}",
              "apply",
              "-f",
              "resources/demo/configmap-update-two-ns/resource/config.yaml",
            ]
          timeout_sec: 20
        - command:
            [
              "kubectl",
              "-n",
              "${BENCH_NS_TARGET}",
              "apply",
              "-f",
              "resources/demo/configmap-update-two-ns/resource/config.yaml",
            ]
          timeout_sec: 20
    verify:
      commands:
        - command:
            [
              "kubectl",
              "-n",
              "${BENCH_NS_SOURCE}",
              "get",
              "configmap",
              "demo-config",
            ]
          timeout_sec: 20
        - command:
            [
              "kubectl",
              "-n",
              "${BENCH_NS_TARGET}",
              "get",
              "configmap",
              "demo-config",
            ]
          timeout_sec: 20
      retries: 5
      interval_sec: 2

detailedInstructions: |
  Update ConfigMap `demo-config` in both assigned namespaces.

  Requirement:
  - In source namespace, set `data.value={{params.source_value}}`.
  - In target namespace, set `data.value={{params.target_value}}`.
  - Do not create or delete the ConfigMap during solve; only update its value.

operatorContext: |
  Namespaces:
  - source: ${BENCH_NS_SOURCE}
  - target: ${BENCH_NS_TARGET}

  kubectl -n ${BENCH_NS_SOURCE} get configmap demo-config -o yaml
  kubectl -n ${BENCH_NS_TARGET} get configmap demo-config -o yaml

oracle:
  verify:
    commands:
      - command:
          [
            "python3",
            "resources/demo/configmap-update-two-ns/oracle/oracle.py",
            "check-distinct",
            "--source-namespace",
            "${BENCH_NS_SOURCE}",
            "--target-namespace",
            "${BENCH_NS_TARGET}",
          ]
        timeout_sec: 20
      - command:
          [
            "python3",
            "resources/demo/configmap-update-two-ns/oracle/oracle.py",
            "check-value",
            "--role",
            "source",
            "--expected-value",
            "{{params.source_value}}",
            "--namespace",
            "${BENCH_NS_SOURCE}",
          ]
        timeout_sec: 20
      - command:
          [
            "python3",
            "resources/demo/configmap-update-two-ns/oracle/oracle.py",
            "check-value",
            "--role",
            "target",
            "--expected-value",
            "{{params.target_value}}",
            "--namespace",
            "${BENCH_NS_TARGET}",
          ]
        timeout_sec: 20
cleanUpCommands:
  - command:
      [
        "kubectl",
        "-n",
        "${BENCH_NS_SOURCE}",
        "delete",
        "configmap",
        "demo-config",
        "--ignore-not-found=true",
      ]
    timeout_sec: 20
  - command:
      [
        "kubectl",
        "-n",
        "${BENCH_NS_TARGET}",
        "delete",
        "configmap",
        "demo-config",
        "--ignore-not-found=true",
      ]
    timeout_sec: 20
