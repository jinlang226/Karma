# Seed ConfigMap for demo/configmap-update-two-ns.
# Applied by the configmap_ready precondition unit to both source and target
# namespaces when demo-config is absent. Sets data.value to "seed" so each
# namespace starts from a known state before the agent patches it.
apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-config
data:
  value: seed
