# ray/dashboard_exposure
# Expose Ray dashboard on port 8265 via the ray-head Service

prompt: |
  The Ray dashboard should be reachable from inside the cluster, but the
  ray-head Service only exposes the GCS port.

  Your task: update the ray-head Service to expose the dashboard on port {{params.dashboard_port}}.

  Use this command to test:
  ```bash
  kubectl -n ray exec curl-test -- curl -sS -o /dev/null -w "%{http_code}" \
    http://ray-head:{{params.dashboard_port}}/api/cluster_status
  ```

  Success criteria: the command returns HTTP 200.

params:
  dashboard_port:
    default: 8265
    description: Port on the ray-head Service that exposes the Ray dashboard

namespace_contract:
  required_roles: []

metrics:
  - time_to_first_mutation

preconditionUnits:
  - name: ray_env_ready
    on_probe_fail: skip
    probe:
      - command: "kubectl -n ray get pods 2>/dev/null | grep -c Running || true"
        timeout_sec: 10
    apply:
      - command: "kubectl create namespace ray"
        sleep: 0
      - command: "kubectl -n ray apply -f resources/ray/dashboard_exposure/resource/ray-head-service.yaml"
        sleep: 1
      - command: "kubectl -n ray apply -f resources/ray/dashboard_exposure/resource/ray-head.yaml"
        sleep: 2
      - command: "kubectl -n ray rollout status deploy/ray-head --timeout=120s"
        sleep: 2
      - command: "kubectl -n ray apply -f resources/ray/dashboard_exposure/resource/ray-worker.yaml"
        sleep: 2
      - command: "kubectl -n ray rollout status deploy/ray-worker --timeout=120s"
        sleep: 2
      - command: "kubectl -n ray apply -f resources/ray/dashboard_exposure/resource/curl-test.yaml"
        sleep: 1
      - command: "kubectl -n ray wait --for=condition=Ready pod/curl-test --timeout=60s"
        sleep: 1
    verify:
      - command: "kubectl -n ray get pods 2>/dev/null | grep -c Running || true"
        timeout_sec: 10

oracle:
  verify:
    commands:
      - command: "python3 resources/ray/dashboard_exposure/oracle/oracle.py"
        timeout_sec: 60
