# ray/scale_workers
# Scale the Ray worker deployment from 1 replica to 3 replicas

prompt: |
  A Ray cluster is running, but the worker deployment only has 1 replica.

  Your task: scale the worker deployment to 3 replicas.

  Recommended commands:
  ```bash
  kubectl -n ray scale deploy/ray-worker --replicas=3
  kubectl -n ray rollout status deploy/ray-worker --timeout=120s
  ```

  Success criteria: ray-worker shows 3 ready replicas and the Ray cluster
  reports 4 live nodes (1 head + 3 workers).

namespace_contract:
  required_roles: []

metrics:
  - time_to_first_mutation

preconditionUnits:
  - name: ray_env_ready
    on_probe_fail: skip
    probe:
      - command: "kubectl -n ray get pods 2>/dev/null | grep -c Running || true"
        timeout_sec: 10
    apply:
      - command: "kubectl create namespace ray"
        sleep: 0
      - command: "kubectl -n ray apply -f resources/ray/scale_workers/resource/ray-head-service.yaml"
        sleep: 1
      - command: "kubectl -n ray apply -f resources/ray/scale_workers/resource/ray-head.yaml"
        sleep: 2
      - command: "kubectl -n ray rollout status deploy/ray-head --timeout=120s"
        sleep: 2
      - command: "kubectl -n ray apply -f resources/ray/scale_workers/resource/ray-worker.yaml"
        sleep: 2
      - command: "kubectl -n ray rollout status deploy/ray-worker --timeout=120s"
        sleep: 2
      - command: "kubectl -n ray apply -f resources/ray/scale_workers/resource/ray-client.yaml"
        sleep: 1
      - command: "kubectl -n ray wait --for=condition=Ready pod/ray-client --timeout=60s"
        sleep: 1
      - command: "kubectl -n ray exec ray-client -- ray start --address=ray-head:6379"
        sleep: 2
    verify:
      - command: "kubectl -n ray get pods 2>/dev/null | grep -c Running || true"
        timeout_sec: 10

oracle:
  verify:
    commands:
      - command: "python3 resources/ray/scale_workers/oracle/oracle.py"
        timeout_sec: 60
