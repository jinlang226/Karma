type: ray-version-upgrade
targetApp: Ray
numAppInstance: 1
maxAttempts: 1
namespace_contract:
  base_namespace: ray
  default_role: default
  required_roles:
  - default

params:
  definitions:
    cluster_prefix:
      type: string
      default: ray
    from_image:
      type: string
      default: rayproject/ray:2.8.0
    to_image:
      type: string
      default: rayproject/ray:2.9.0
    worker_replicas:
      type: int
      default: 2
      min: 1
      max: 10

preconditionUnits:
  - id: ray_client_ready
    probe:
      commands:
        - command:
            [
              "kubectl",
              "-n",
              "${BENCH_NAMESPACE}",
              "wait",
              "--for=condition=Ready",
              "pod/{{params.cluster_prefix}}-client",
              "--timeout=5s",
            ]
          timeout_sec: 10
    apply:
      commands:
        - command:
            [
              "/bin/sh",
              "-c",
              "sed -e 's/__CLUSTER_PREFIX__/{{params.cluster_prefix}}/g' -e 's#__CLIENT_IMAGE__#{{params.to_image}}#g' resources/ray/version_upgrade/resource/ray-client.yaml | kubectl -n ${BENCH_NAMESPACE} apply -f -",
            ]
          timeout_sec: 20
    verify:
      commands:
        - command:
            [
              "kubectl",
              "-n",
              "${BENCH_NAMESPACE}",
              "wait",
              "--for=condition=Ready",
              "pod/{{params.cluster_prefix}}-client",
              "--timeout=60s",
            ]
          timeout_sec: 70
      retries: 3
      interval_sec: 2

  - id: ray_head_service_ready
    probe:
      commands:
        - command:
            [
              "/bin/sh",
              "-c",
              "set -e; kubectl -n ${BENCH_NAMESPACE} get service {{params.cluster_prefix}}-head -o jsonpath='{range .spec.ports[*]}{.port}{\"\\n\"}{end}' | grep -qx '6379'",
            ]
          timeout_sec: 10
    apply:
      commands:
        - command:
            [
              "/bin/sh",
              "-c",
              "sed -e 's/__CLUSTER_PREFIX__/{{params.cluster_prefix}}/g' resources/ray/version_upgrade/resource/ray-head-service.yaml | kubectl -n ${BENCH_NAMESPACE} apply -f -",
            ]
          timeout_sec: 20
    verify:
      commands:
        - command:
            [
              "/bin/sh",
              "-c",
              "set -e; kubectl -n ${BENCH_NAMESPACE} get service {{params.cluster_prefix}}-head -o jsonpath='{range .spec.ports[*]}{.port}{\"\\n\"}{end}' | grep -qx '6379'",
            ]
          timeout_sec: 10

  - id: ray_head_from_image_ready
    probe:
      commands:
        - command:
            [
              "/bin/sh",
              "-c",
              "set -e; kubectl -n ${BENCH_NAMESPACE} rollout status deployment/{{params.cluster_prefix}}-head --timeout=5s >/dev/null; image=$(kubectl -n ${BENCH_NAMESPACE} get deployment {{params.cluster_prefix}}-head -o jsonpath='{.spec.template.spec.containers[0].image}'); ready=$(kubectl -n ${BENCH_NAMESPACE} get deployment {{params.cluster_prefix}}-head -o jsonpath='{.status.readyReplicas}'); test \"$image\" = '{{params.from_image}}'; test ${ready:-0} -ge 1",
            ]
          timeout_sec: 10
    apply:
      commands:
        - command:
            [
              "/bin/sh",
              "-c",
              "sed -e 's/__CLUSTER_PREFIX__/{{params.cluster_prefix}}/g' -e 's#__RAY_IMAGE__#{{params.from_image}}#g' resources/ray/version_upgrade/resource/ray-head.yaml | kubectl -n ${BENCH_NAMESPACE} apply -f -",
            ]
          timeout_sec: 20
    verify:
      commands:
        - command:
            [
              "/bin/sh",
              "-c",
              "set -e; kubectl -n ${BENCH_NAMESPACE} rollout status deployment/{{params.cluster_prefix}}-head --timeout=60s >/dev/null; image=$(kubectl -n ${BENCH_NAMESPACE} get deployment {{params.cluster_prefix}}-head -o jsonpath='{.spec.template.spec.containers[0].image}'); ready=$(kubectl -n ${BENCH_NAMESPACE} get deployment {{params.cluster_prefix}}-head -o jsonpath='{.status.readyReplicas}'); test \"$image\" = '{{params.from_image}}'; test ${ready:-0} -ge 1",
            ]
          timeout_sec: 70
      retries: 3
      interval_sec: 2

  - id: ray_worker_from_image_ready
    probe:
      commands:
        - command:
            [
              "/bin/sh",
              "-c",
              "set -e; kubectl -n ${BENCH_NAMESPACE} rollout status deployment/{{params.cluster_prefix}}-worker --timeout=5s >/dev/null; image=$(kubectl -n ${BENCH_NAMESPACE} get deployment {{params.cluster_prefix}}-worker -o jsonpath='{.spec.template.spec.containers[0].image}'); ready=$(kubectl -n ${BENCH_NAMESPACE} get deployment {{params.cluster_prefix}}-worker -o jsonpath='{.status.readyReplicas}'); test \"$image\" = '{{params.from_image}}'; test ${ready:-0} -ge {{params.worker_replicas}}",
            ]
          timeout_sec: 10
    apply:
      commands:
        - command:
            [
              "/bin/sh",
              "-c",
              "sed -e 's/__CLUSTER_PREFIX__/{{params.cluster_prefix}}/g' -e 's#__RAY_IMAGE__#{{params.from_image}}#g' -e 's/__WORKER_REPLICAS__/{{params.worker_replicas}}/g' resources/ray/version_upgrade/resource/ray-worker.yaml | kubectl -n ${BENCH_NAMESPACE} apply -f -",
            ]
          timeout_sec: 20
    verify:
      commands:
        - command:
            [
              "/bin/sh",
              "-c",
              "set -e; kubectl -n ${BENCH_NAMESPACE} rollout status deployment/{{params.cluster_prefix}}-worker --timeout=60s >/dev/null; image=$(kubectl -n ${BENCH_NAMESPACE} get deployment {{params.cluster_prefix}}-worker -o jsonpath='{.spec.template.spec.containers[0].image}'); ready=$(kubectl -n ${BENCH_NAMESPACE} get deployment {{params.cluster_prefix}}-worker -o jsonpath='{.status.readyReplicas}'); test \"$image\" = '{{params.from_image}}'; test ${ready:-0} -ge {{params.worker_replicas}}",
            ]
          timeout_sec: 70
      retries: 3
      interval_sec: 2

detailedInstructions: |
  Upgrade the Ray cluster in `${BENCH_NAMESPACE}` from `{{params.from_image}}`
  to `{{params.to_image}}`.

  Requirements:
  - Update Deployment `{{params.cluster_prefix}}-head` to `{{params.to_image}}`.
  - Update Deployment `{{params.cluster_prefix}}-worker` to `{{params.to_image}}`.
  - Wait for both rollouts to complete.
  - Keep the head Service and client pod intact.

  Suggested commands:
  ```bash
  kubectl -n ${BENCH_NAMESPACE} set image deployment/{{params.cluster_prefix}}-head ray-head={{params.to_image}}
  kubectl -n ${BENCH_NAMESPACE} set image deployment/{{params.cluster_prefix}}-worker ray-worker={{params.to_image}}
  kubectl -n ${BENCH_NAMESPACE} rollout status deployment/{{params.cluster_prefix}}-head --timeout=120s
  kubectl -n ${BENCH_NAMESPACE} rollout status deployment/{{params.cluster_prefix}}-worker --timeout=120s
  ```

operatorContext: |
  Helpful commands:
  ```bash
  kubectl -n ${BENCH_NAMESPACE} get deploy -o wide
  kubectl -n ${BENCH_NAMESPACE} get deploy {{params.cluster_prefix}}-head -o jsonpath='{.spec.template.spec.containers[0].image}'; echo
  kubectl -n ${BENCH_NAMESPACE} get deploy {{params.cluster_prefix}}-worker -o jsonpath='{.spec.template.spec.containers[0].image}'; echo
  ```

oracle:
  verify:
    commands:
      - command:
          [
            "python3",
            "resources/ray/version_upgrade/oracle/oracle.py",
            "--check",
            "head-image",
            "--expected-image",
            "{{params.to_image}}",
            "--expected-workers",
            "{{params.worker_replicas}}",
          ]
        timeout_sec: 30
      - command:
          [
            "python3",
            "resources/ray/version_upgrade/oracle/oracle.py",
            "--check",
            "worker-image",
            "--expected-image",
            "{{params.to_image}}",
            "--expected-workers",
            "{{params.worker_replicas}}",
          ]
        timeout_sec: 30
      - command:
          [
            "python3",
            "resources/ray/version_upgrade/oracle/oracle.py",
            "--check",
            "head-ready",
            "--expected-image",
            "{{params.to_image}}",
            "--expected-workers",
            "{{params.worker_replicas}}",
          ]
        timeout_sec: 30
      - command:
          [
            "python3",
            "resources/ray/version_upgrade/oracle/oracle.py",
            "--check",
            "worker-ready",
            "--expected-image",
            "{{params.to_image}}",
            "--expected-workers",
            "{{params.worker_replicas}}",
          ]
        timeout_sec: 30
      - command:
          [
            "python3",
            "resources/ray/version_upgrade/oracle/oracle.py",
            "--check",
            "connectivity",
            "--expected-image",
            "{{params.to_image}}",
            "--expected-workers",
            "{{params.worker_replicas}}",
          ]
        timeout_sec: 60

cleanUpCommands:
  - command: ["kubectl", "-n", "${BENCH_NAMESPACE}", "delete", "pod", "{{params.cluster_prefix}}-client", "--ignore-not-found=true"]
    timeout_sec: 20
  - command: ["kubectl", "-n", "${BENCH_NAMESPACE}", "delete", "deployment", "{{params.cluster_prefix}}-head", "--ignore-not-found=true"]
    timeout_sec: 20
  - command: ["kubectl", "-n", "${BENCH_NAMESPACE}", "delete", "deployment", "{{params.cluster_prefix}}-worker", "--ignore-not-found=true"]
    timeout_sec: 20
  - command: ["kubectl", "-n", "${BENCH_NAMESPACE}", "delete", "service", "{{params.cluster_prefix}}-head", "--ignore-not-found=true"]
    timeout_sec: 20
