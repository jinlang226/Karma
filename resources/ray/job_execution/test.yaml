type: ray-job-execution
targetApp: Ray
numAppInstance: 1
maxAttempts: 1
namespace_contract:
  base_namespace: ray
  default_role: default
  required_roles:
  - default

params:
  definitions:
    cluster_prefix:
      type: string
      default: ray
    ray_image:
      type: string
      default: rayproject/ray:2.9.0
    worker_replicas:
      type: int
      default: 2
      min: 1
      max: 10
    expected_output:
      type: string
      default: pong

preconditionUnits:
  - id: ray_head_service_ready
    probe:
      commands:
        - command:
            [
              "/bin/sh",
              "-c",
              "set -e; ports=$(kubectl -n ${BENCH_NAMESPACE} get service {{params.cluster_prefix}}-head -o jsonpath='{range .spec.ports[*]}{.port}{\"\\n\"}{end}'); printf '%s\n' \"$ports\" | grep -qx '6379'; printf '%s\n' \"$ports\" | grep -qx '10001'",
            ]
          timeout_sec: 10
    apply:
      commands:
        - command:
            [
              "/bin/sh",
              "-c",
              "sed -e 's/__CLUSTER_PREFIX__/{{params.cluster_prefix}}/g' resources/ray/job_execution/resource/ray-head-service.yaml | kubectl -n ${BENCH_NAMESPACE} apply -f -",
            ]
          timeout_sec: 20
    verify:
      commands:
        - command:
            [
              "/bin/sh",
              "-c",
              "set -e; ports=$(kubectl -n ${BENCH_NAMESPACE} get service {{params.cluster_prefix}}-head -o jsonpath='{range .spec.ports[*]}{.port}{\"\\n\"}{end}'); printf '%s\n' \"$ports\" | grep -qx '6379'; printf '%s\n' \"$ports\" | grep -qx '10001'",
            ]
          timeout_sec: 10

  - id: ray_job_script_ready
    probe:
      commands:
        - command: ["kubectl", "-n", "${BENCH_NAMESPACE}", "get", "configmap", "{{params.cluster_prefix}}-job-script"]
          timeout_sec: 10
    apply:
      commands:
        - command:
            [
              "/bin/sh",
              "-c",
              "sed -e 's/__CLUSTER_PREFIX__/{{params.cluster_prefix}}/g' resources/ray/job_execution/resource/ray-job-script.yaml | kubectl -n ${BENCH_NAMESPACE} apply -f -",
            ]
          timeout_sec: 20
    verify:
      commands:
        - command: ["kubectl", "-n", "${BENCH_NAMESPACE}", "get", "configmap", "{{params.cluster_prefix}}-job-script"]
          timeout_sec: 10

  - id: ray_job_runner_baseline_ready
    probe:
      commands:
        - command:
            [
              "/bin/sh",
              "-c",
              "kubectl -n ${BENCH_NAMESPACE} get job {{params.cluster_prefix}}-job-runner >/dev/null 2>&1 && exit 1 || exit 0",
            ]
          timeout_sec: 10
    apply:
      commands:
        - command:
            [
              "kubectl",
              "-n",
              "${BENCH_NAMESPACE}",
              "delete",
              "job",
              "{{params.cluster_prefix}}-job-runner",
              "--ignore-not-found=true",
              "--wait=true",
            ]
          timeout_sec: 30
    verify:
      commands:
        - command:
            [
              "/bin/sh",
              "-c",
              "kubectl -n ${BENCH_NAMESPACE} get job {{params.cluster_prefix}}-job-runner >/dev/null 2>&1 && exit 1 || exit 0",
            ]
          timeout_sec: 10

  - id: ray_job_result_baseline_ready
    probe:
      commands:
        - command:
            [
              "/bin/sh",
              "-c",
              "kubectl -n ${BENCH_NAMESPACE} get configmap {{params.cluster_prefix}}-job-result >/dev/null 2>&1 && exit 1 || exit 0",
            ]
          timeout_sec: 10
    apply:
      commands:
        - command:
            [
              "kubectl",
              "-n",
              "${BENCH_NAMESPACE}",
              "delete",
              "configmap",
              "{{params.cluster_prefix}}-job-result",
              "--ignore-not-found=true",
            ]
          timeout_sec: 20
    verify:
      commands:
        - command:
            [
              "/bin/sh",
              "-c",
              "kubectl -n ${BENCH_NAMESPACE} get configmap {{params.cluster_prefix}}-job-result >/dev/null 2>&1 && exit 1 || exit 0",
            ]
          timeout_sec: 10

  - id: ray_head_ready
    probe:
      commands:
        - command:
            [
              "/bin/sh",
              "-c",
              "set -e; kubectl -n ${BENCH_NAMESPACE} rollout status deployment/{{params.cluster_prefix}}-head --timeout=5s >/dev/null; ready=$(kubectl -n ${BENCH_NAMESPACE} get deployment {{params.cluster_prefix}}-head -o jsonpath='{.status.readyReplicas}'); test ${ready:-0} -ge 1",
            ]
          timeout_sec: 10
    apply:
      commands:
        - command:
            [
              "/bin/sh",
              "-c",
              "sed -e 's/__CLUSTER_PREFIX__/{{params.cluster_prefix}}/g' -e 's#__RAY_IMAGE__#{{params.ray_image}}#g' resources/ray/job_execution/resource/ray-head.yaml | kubectl -n ${BENCH_NAMESPACE} apply -f -",
            ]
          timeout_sec: 20
    verify:
      commands:
        - command:
            [
              "/bin/sh",
              "-c",
              "set -e; kubectl -n ${BENCH_NAMESPACE} rollout status deployment/{{params.cluster_prefix}}-head --timeout=60s >/dev/null; ready=$(kubectl -n ${BENCH_NAMESPACE} get deployment {{params.cluster_prefix}}-head -o jsonpath='{.status.readyReplicas}'); test ${ready:-0} -ge 1",
            ]
          timeout_sec: 70
      retries: 3
      interval_sec: 2

  - id: ray_worker_ready
    probe:
      commands:
        - command:
            [
              "/bin/sh",
              "-c",
              "set -e; kubectl -n ${BENCH_NAMESPACE} rollout status deployment/{{params.cluster_prefix}}-worker --timeout=5s >/dev/null; ready=$(kubectl -n ${BENCH_NAMESPACE} get deployment {{params.cluster_prefix}}-worker -o jsonpath='{.status.readyReplicas}'); test ${ready:-0} -ge {{params.worker_replicas}}",
            ]
          timeout_sec: 10
    apply:
      commands:
        - command:
            [
              "/bin/sh",
              "-c",
              "sed -e 's/__CLUSTER_PREFIX__/{{params.cluster_prefix}}/g' -e 's#__RAY_IMAGE__#{{params.ray_image}}#g' -e 's/__WORKER_REPLICAS__/{{params.worker_replicas}}/g' resources/ray/job_execution/resource/ray-worker.yaml | kubectl -n ${BENCH_NAMESPACE} apply -f -",
            ]
          timeout_sec: 20
    verify:
      commands:
        - command:
            [
              "/bin/sh",
              "-c",
              "set -e; kubectl -n ${BENCH_NAMESPACE} rollout status deployment/{{params.cluster_prefix}}-worker --timeout=60s >/dev/null; ready=$(kubectl -n ${BENCH_NAMESPACE} get deployment {{params.cluster_prefix}}-worker -o jsonpath='{.status.readyReplicas}'); test ${ready:-0} -ge {{params.worker_replicas}}",
            ]
          timeout_sec: 70
      retries: 3
      interval_sec: 2

detailedInstructions: |
  Execute the sample Ray job in `${BENCH_NAMESPACE}` and make sure it produces
  `{{params.expected_output}}`.

  Requirements:
  - Create Job `{{params.cluster_prefix}}-job-runner` and make sure it completes successfully.
  - Reuse the existing script from ConfigMap `{{params.cluster_prefix}}-job-script`.
  - The job runner must execute `python /opt/job.py`.
  - Persist the final output line into ConfigMap `{{params.cluster_prefix}}-job-result`
    under key `result`.
  - Keep the Ray head Service and deployments healthy.

  A good solve flow is:
  ```bash
  sed -e 's/__CLUSTER_PREFIX__/{{params.cluster_prefix}}/g' \
      -e 's#__RAY_IMAGE__#{{params.ray_image}}#g' \
      resources/ray/job_execution/resource/ray-job-runner.yaml | kubectl -n ${BENCH_NAMESPACE} apply -f -
  kubectl -n ${BENCH_NAMESPACE} wait --for=condition=complete job/{{params.cluster_prefix}}-job-runner --timeout=120s
  output=$(kubectl -n ${BENCH_NAMESPACE} logs job/{{params.cluster_prefix}}-job-runner | tail -n1)
  kubectl -n ${BENCH_NAMESPACE} create configmap {{params.cluster_prefix}}-job-result \
    --from-literal=result="$output" --dry-run=client -o yaml | kubectl apply -f -
  ```

operatorContext: |
  Helpful commands:
  ```bash
  kubectl -n ${BENCH_NAMESPACE} get deploy,pod,job,configmap,svc
  kubectl -n ${BENCH_NAMESPACE} logs job/{{params.cluster_prefix}}-job-runner
  kubectl -n ${BENCH_NAMESPACE} get configmap {{params.cluster_prefix}}-job-script -o yaml
  kubectl -n ${BENCH_NAMESPACE} get configmap {{params.cluster_prefix}}-job-result -o yaml
  ```

oracle:
  verify:
    commands:
      - command:
          [
            "python3",
            "resources/ray/job_execution/oracle/oracle.py",
            "--check",
            "cluster",
            "--expected-workers",
            "{{params.worker_replicas}}",
            "--expected-output",
            "{{params.expected_output}}",
          ]
        timeout_sec: 30
      - command:
          [
            "python3",
            "resources/ray/job_execution/oracle/oracle.py",
            "--check",
            "script",
            "--expected-workers",
            "{{params.worker_replicas}}",
            "--expected-output",
            "{{params.expected_output}}",
          ]
        timeout_sec: 30
      - command:
          [
            "python3",
            "resources/ray/job_execution/oracle/oracle.py",
            "--check",
            "job-runner",
            "--expected-workers",
            "{{params.worker_replicas}}",
            "--expected-output",
            "{{params.expected_output}}",
          ]
        timeout_sec: 30
      - command:
          [
            "python3",
            "resources/ray/job_execution/oracle/oracle.py",
            "--check",
            "result",
            "--expected-workers",
            "{{params.worker_replicas}}",
            "--expected-output",
            "{{params.expected_output}}",
          ]
        timeout_sec: 30

cleanUpCommands:
  - command: ["kubectl", "-n", "${BENCH_NAMESPACE}", "delete", "job", "{{params.cluster_prefix}}-job-runner", "--ignore-not-found=true", "--wait=true"]
    timeout_sec: 30
  - command: ["kubectl", "-n", "${BENCH_NAMESPACE}", "delete", "configmap", "{{params.cluster_prefix}}-job-result", "--ignore-not-found=true"]
    timeout_sec: 20
  - command: ["kubectl", "-n", "${BENCH_NAMESPACE}", "delete", "configmap", "{{params.cluster_prefix}}-job-script", "--ignore-not-found=true"]
    timeout_sec: 20
  - command: ["kubectl", "-n", "${BENCH_NAMESPACE}", "delete", "deployment", "{{params.cluster_prefix}}-head", "--ignore-not-found=true"]
    timeout_sec: 20
  - command: ["kubectl", "-n", "${BENCH_NAMESPACE}", "delete", "deployment", "{{params.cluster_prefix}}-worker", "--ignore-not-found=true"]
    timeout_sec: 20
  - command: ["kubectl", "-n", "${BENCH_NAMESPACE}", "delete", "service", "{{params.cluster_prefix}}-head", "--ignore-not-found=true"]
    timeout_sec: 20
