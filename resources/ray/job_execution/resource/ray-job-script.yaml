apiVersion: v1
kind: ConfigMap
metadata:
  name: __CLUSTER_PREFIX__-job-script
  labels:
    app.kubernetes.io/name: ray
    app.kubernetes.io/component: job-script
    bench.ray.cluster: __CLUSTER_PREFIX__
data:
  job.py: |
    import ray

    ray.init(address="ray://__CLUSTER_PREFIX__-head:10001")

    @ray.remote
    def ping():
        return "pong"

    print(ray.get(ping.remote()))
    ray.shutdown()
