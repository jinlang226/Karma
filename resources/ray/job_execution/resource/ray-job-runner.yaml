apiVersion: batch/v1
kind: Job
metadata:
  name: __CLUSTER_PREFIX__-job-runner
  labels:
    app.kubernetes.io/name: ray
    app.kubernetes.io/component: job-runner
    bench.ray.cluster: __CLUSTER_PREFIX__
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ray
        app.kubernetes.io/component: job-runner
        bench.ray.cluster: __CLUSTER_PREFIX__
    spec:
      restartPolicy: Never
      containers:
      - name: ray-job-runner
        image: __RAY_IMAGE__
        command:
          - python
          - /opt/job.py
        volumeMounts:
          - name: job-script
            mountPath: /opt/job.py
            subPath: job.py
      volumes:
        - name: job-script
          configMap:
            name: __CLUSTER_PREFIX__-job-script
