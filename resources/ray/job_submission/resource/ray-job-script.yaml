apiVersion: v1
kind: ConfigMap
metadata:
  name: ray-job-script
  labels:
    app.kubernetes.io/name: ray
    app.kubernetes.io/component: job-script
    bench.ray.cluster: ray
data:
  job.py: |
    import ray

    # BUG: wrong head address; the job cannot connect to the cluster.
    ray.init(address="ray-head-wrong:6379")

    print("pong")

    ray.shutdown()
