# Headless Codex workflow profile.
# Usage:
#   python3 orchestrator.py workflow-run \
#     --profile profiles/codex.yaml \
#     --workflow workflows/workflow-demo.yaml
#
# Adjust agent_auth_path if your Codex auth lives elsewhere.
command: workflow-run
sandbox: docker
agent: cli-runner
agent_build: true
agent_auth_path: ~/.codex/auth.json
max_attempts: 1
agent_cmd: >-
  bash -lc 'set -e; export PATH=/home/agent/.npm-global/bin:$PATH; command -v codex >/dev/null 2>&1 || { echo "codex not found PATH=$PATH" >&2; exit 127; }; cat /opt/agent/system_prompt.txt /workspace/PROMPT.md > /tmp/codex_prompt.txt; codex --dangerously-bypass-approvals-and-sandbox exec -m "${CODEX_MODEL:-gpt-5.4}" -C /workspace --skip-git-repo-check "$(cat /tmp/codex_prompt.txt)"'
