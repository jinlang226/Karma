apiVersion: v1
kind: ConfigMap
metadata:
  name: __CLUSTER_PREFIX__-job-script
  labels:
    app.kubernetes.io/name: ray
    app.kubernetes.io/component: job-script
    bench.ray.cluster: __CLUSTER_PREFIX__
data:
  job.py: |
    import json
    import os
    import socket
    import time

    import ray

    EXPECTED_WORKERS = __EXPECTED_WORKERS__
    EXPECTED_OUTPUT = "__EXPECTED_OUTPUT__"

    last_error = None
    for _attempt in range(3):
        try:
            ray.init(
                address="auto",
                ignore_reinit_error=True,
                _node_ip_address=os.environ.get("MY_POD_IP") or None,
            )
            break
        except Exception as exc:
            last_error = exc
            time.sleep(5)
    else:
        raise last_error

    expected_nodes = EXPECTED_WORKERS + 1
    deadline = time.time() + 60
    while True:
        alive_nodes = [node for node in ray.nodes() if node.get("Alive")]
        if len(alive_nodes) >= expected_nodes:
            break
        if time.time() >= deadline:
            raise RuntimeError(
                f"ray reports {len(alive_nodes)} alive nodes, expected at least {expected_nodes}"
            )
        time.sleep(2)

    head_hostname = socket.gethostname()
    worker_hostnames = sorted(
        {
            str(node.get("NodeManagerHostname") or "").strip()
            for node in alive_nodes
            if str(node.get("NodeManagerHostname") or "").strip() and
            str(node.get("NodeManagerHostname") or "").strip() != head_hostname
        }
    )

    payload = {
        "head_hostname": head_hostname,
        "message": EXPECTED_OUTPUT,
        "node_count": len(alive_nodes),
        "worker_hostnames": worker_hostnames,
    }

    print(json.dumps(payload, sort_keys=True))
    ray.shutdown()
