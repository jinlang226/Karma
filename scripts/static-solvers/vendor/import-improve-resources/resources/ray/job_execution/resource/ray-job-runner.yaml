apiVersion: v1
kind: ServiceAccount
metadata:
  name: __CLUSTER_PREFIX__-job-runner
  labels:
    app.kubernetes.io/name: ray
    app.kubernetes.io/component: job-runner
    bench.ray.cluster: __CLUSTER_PREFIX__
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: __CLUSTER_PREFIX__-job-runner
  labels:
    app.kubernetes.io/name: ray
    app.kubernetes.io/component: job-runner
    bench.ray.cluster: __CLUSTER_PREFIX__
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: __CLUSTER_PREFIX__-job-runner
  labels:
    app.kubernetes.io/name: ray
    app.kubernetes.io/component: job-runner
    bench.ray.cluster: __CLUSTER_PREFIX__
subjects:
  - kind: ServiceAccount
    name: __CLUSTER_PREFIX__-job-runner
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: __CLUSTER_PREFIX__-job-runner
---
apiVersion: batch/v1
kind: Job
metadata:
  name: __CLUSTER_PREFIX__-job-runner
  labels:
    app.kubernetes.io/name: ray
    app.kubernetes.io/component: job-runner
    bench.ray.cluster: __CLUSTER_PREFIX__
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ray
        app.kubernetes.io/component: job-runner
        bench.ray.cluster: __CLUSTER_PREFIX__
    spec:
      serviceAccountName: __CLUSTER_PREFIX__-job-runner
      restartPolicy: Never
      containers:
      - name: ray-job-runner
        image: bitnami/kubectl@sha256:f6dd048d1c14d89ede9636cd6bee0ff0238579c33ea1e51b2fb1a1cfd62ea246
        imagePullPolicy: IfNotPresent
        env:
          - name: BENCH_NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
        command:
          - /bin/sh
          - -c
          - |
            set -eu
            head_pod="$(kubectl -n "${BENCH_NAMESPACE}" get pods -l "app.kubernetes.io/name=ray,app.kubernetes.io/component=head,bench.ray.cluster=__CLUSTER_PREFIX__" -o jsonpath='{.items[0].metadata.name}')"
            test -n "${head_pod}"
            kubectl -n "${BENCH_NAMESPACE}" exec "${head_pod}" -- python /opt/job.py
