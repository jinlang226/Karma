apiVersion: apps/v1
kind: Deployment
metadata:
  name: __CLUSTER_PREFIX__-worker
  labels:
    app.kubernetes.io/name: ray
    app.kubernetes.io/component: worker
    bench.ray.cluster: __CLUSTER_PREFIX__
spec:
  replicas: __WORKER_REPLICAS__
  selector:
    matchLabels:
      app.kubernetes.io/name: ray
      app.kubernetes.io/component: worker
      bench.ray.cluster: __CLUSTER_PREFIX__
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ray
        app.kubernetes.io/component: worker
        bench.ray.cluster: __CLUSTER_PREFIX__
    spec:
      containers:
      - name: ray-worker
        image: __RAY_IMAGE__
        env:
          - name: MY_POD_IP
            valueFrom:
              fieldRef:
                fieldPath: status.podIP
        command:
          - sh
          - -c
          - |
            ray start --address=__CLUSTER_PREFIX__-head:6379 --node-ip-address="${MY_POD_IP}" --block
