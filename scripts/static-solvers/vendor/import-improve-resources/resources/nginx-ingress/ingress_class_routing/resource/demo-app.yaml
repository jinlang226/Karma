apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${BENCH_PARAM_SERVICE_NAME}
  namespace: ${BENCH_NS_APP}
  labels:
    app: ${BENCH_PARAM_SERVICE_NAME}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ${BENCH_PARAM_SERVICE_NAME}
  template:
    metadata:
      labels:
        app: ${BENCH_PARAM_SERVICE_NAME}
    spec:
      containers:
      - name: demo-app
        image: busybox:1.36
        command:
          - sh
          - -c
          - |
            mkdir -p /www
            echo ${BENCH_PARAM_EXPECTED_BODY} > /www/index.html
            httpd -f -p 5678 -h /www
        ports:
          - containerPort: 5678
            name: http
---
apiVersion: v1
kind: Service
metadata:
  name: ${BENCH_PARAM_SERVICE_NAME}
  namespace: ${BENCH_NS_APP}
spec:
  selector:
    app: ${BENCH_PARAM_SERVICE_NAME}
  ports:
    - name: http
      port: 80
      targetPort: 5678
