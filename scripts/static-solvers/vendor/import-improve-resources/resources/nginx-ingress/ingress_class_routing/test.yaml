type: nginx-ingress-class-routing
targetApp: NGINX-Ingress
numAppInstance: 1
maxAttempts: 1

namespace_contract:
  required_roles:
  - ingress
  - app

params:
  definitions:
    service_name:
      type: string
      default: demo-app
    ingress_name:
      type: string
      default: demo-app
    host:
      type: string
      default: class.example.com
    path:
      type: string
      default: /
    ingress_class_name:
      type: string
      default: nginx
    expected_body:
      type: string
      default: hello

preconditionUnits:
  - id: ingress_controller_ready
    probe:
      commands:
        - command:
            - /bin/sh
            - -c
            - >
              set -e;
              kubectl -n ${BENCH_NS_INGRESS} rollout status deployment/ingress-nginx-controller --timeout=5s >/dev/null;
              kubectl -n ${BENCH_NS_INGRESS} get deployment ingress-nginx-controller -o yaml |
              grep -q -- '--watch-ingress-without-class=false'
          timeout_sec: 10
    apply:
      commands:
        - command:
            - /bin/sh
            - -c
            - >
              set -e;
              awk 'BEGIN{skip=1} /^---$/{if(skip){skip=0; next}} !skip {print}'
              resources/nginx-ingress/ingress_class_routing/resource/deploy.yaml |
              sed "s/namespace: ingress-nginx/namespace: ${BENCH_NS_INGRESS}/g" |
              sed 's/--watch-ingress-without-class=true/--watch-ingress-without-class=false/g' |
              kubectl apply -f -
          timeout_sec: 40
    verify:
      commands:
        - command:
            - /bin/sh
            - -c
            - >
              set -e;
              kubectl -n ${BENCH_NS_INGRESS} rollout status deployment/ingress-nginx-controller --timeout=120s >/dev/null;
              kubectl -n ${BENCH_NS_INGRESS} get deployment ingress-nginx-controller -o yaml |
              grep -q -- '--watch-ingress-without-class=false'
          timeout_sec: 130
      retries: 3
      interval_sec: 3

  - id: demo_app_ready
    probe:
      commands:
        - command:
            - /bin/sh
            - -c
            - >
              set -e;
              kubectl -n ${BENCH_NS_APP} rollout status deployment/{{params.service_name}} --timeout=5s >/dev/null;
              kubectl -n ${BENCH_NS_APP} get deployment {{params.service_name}}
              -o jsonpath='{.spec.template.spec.containers[0].command[2]}' |
              grep -Fq -- 'echo {{params.expected_body}}';
              kubectl -n ${BENCH_NS_APP} get service {{params.service_name}} >/dev/null
          timeout_sec: 10
    apply:
      commands:
        - command: ["/bin/sh", "-c", "envsubst '${BENCH_NS_APP} ${BENCH_PARAM_EXPECTED_BODY} ${BENCH_PARAM_SERVICE_NAME}' < resources/nginx-ingress/ingress_class_routing/resource/demo-app.yaml | kubectl apply -f -"]
          timeout_sec: 20
    verify:
      commands:
        - command:
            - /bin/sh
            - -c
            - >
              set -e;
              kubectl -n ${BENCH_NS_APP} rollout status deployment/{{params.service_name}} --timeout=60s >/dev/null;
              kubectl -n ${BENCH_NS_APP} get deployment {{params.service_name}}
              -o jsonpath='{.spec.template.spec.containers[0].command[2]}' |
              grep -Fq -- 'echo {{params.expected_body}}';
              kubectl -n ${BENCH_NS_APP} get service {{params.service_name}} >/dev/null
          timeout_sec: 70
      retries: 3
      interval_sec: 2

  - id: curl_test_ready
    probe:
      commands:
        - command: ["kubectl", "-n", "${BENCH_NS_APP}", "wait", "--for=condition=Ready", "pod/curl-test", "--timeout=5s"]
          timeout_sec: 10
    apply:
      commands:
        - command: ["kubectl", "-n", "${BENCH_NS_APP}", "delete", "pod", "curl-test", "--ignore-not-found=true", "--wait=true"]
          timeout_sec: 60
        - command: ["/bin/sh", "-c", "envsubst '${BENCH_NS_APP}' < resources/nginx-ingress/ingress_class_routing/resource/curl-test.yaml | kubectl apply -f -"]
          timeout_sec: 20
    verify:
      commands:
        - command: ["kubectl", "-n", "${BENCH_NS_APP}", "wait", "--for=condition=Ready", "pod/curl-test", "--timeout=150s"]
          timeout_sec: 180
      retries: 3
      interval_sec: 2

  - id: ingress_class_state_ready
    probe:
      commands:
        - command:
            - /bin/sh
            - -c
            - >
              set -e;
              kubectl -n ${BENCH_NS_APP} get ingress {{params.ingress_name}} >/dev/null;
              class_name=$(kubectl -n ${BENCH_NS_APP} get ingress {{params.ingress_name}} -o jsonpath='{.spec.ingressClassName}');
              host=$(kubectl -n ${BENCH_NS_APP} get ingress {{params.ingress_name}} -o jsonpath='{.spec.rules[0].host}');
              path=$(kubectl -n ${BENCH_NS_APP} get ingress {{params.ingress_name}} -o jsonpath='{.spec.rules[0].http.paths[0].path}');
              service=$(kubectl -n ${BENCH_NS_APP} get ingress {{params.ingress_name}} -o jsonpath='{.spec.rules[0].http.paths[0].backend.service.name}');
              test -z "${class_name}";
              test "${host}" = "{{params.host}}";
              test "${path}" = "{{params.path}}";
              test "${service}" = "{{params.service_name}}"
          timeout_sec: 10
    apply:
      commands:
        - command: ["/bin/sh", "-c", "envsubst '${BENCH_NS_APP} ${BENCH_PARAM_HOST} ${BENCH_PARAM_INGRESS_NAME} ${BENCH_PARAM_PATH} ${BENCH_PARAM_SERVICE_NAME}' < resources/nginx-ingress/ingress_class_routing/resource/demo-ingress.yaml | kubectl apply -f -"]
          timeout_sec: 20
        - command:
            - kubectl
            - -n
            - ${BENCH_NS_APP}
            - patch
            - ingress
            - "{{params.ingress_name}}"
            - --type=merge
            - -p
            - '{"spec":{"ingressClassName":null}}'
          timeout_sec: 20
    verify:
      commands:
        - command:
            - /bin/sh
            - -c
            - >
              set -e;
              kubectl -n ${BENCH_NS_APP} get ingress {{params.ingress_name}} >/dev/null;
              class_name=$(kubectl -n ${BENCH_NS_APP} get ingress {{params.ingress_name}} -o jsonpath='{.spec.ingressClassName}');
              host=$(kubectl -n ${BENCH_NS_APP} get ingress {{params.ingress_name}} -o jsonpath='{.spec.rules[0].host}');
              path=$(kubectl -n ${BENCH_NS_APP} get ingress {{params.ingress_name}} -o jsonpath='{.spec.rules[0].http.paths[0].path}');
              service=$(kubectl -n ${BENCH_NS_APP} get ingress {{params.ingress_name}} -o jsonpath='{.spec.rules[0].http.paths[0].backend.service.name}');
              test -z "${class_name}";
              test "${host}" = "{{params.host}}";
              test "${path}" = "{{params.path}}";
              test "${service}" = "{{params.service_name}}"
          timeout_sec: 10

detailedInstructions: |
  Fix ingress class routing in the assigned namespaces.

  Namespaces:
  - controller: `${BENCH_NS_INGRESS}`
  - application: `${BENCH_NS_APP}`

  Current baseline:
  - Deployment `ingress-nginx-controller` only watches Ingresses with an explicit class.
  - Ingress `{{params.ingress_name}}` exists, but it has no `spec.ingressClassName`.
  - Deployment and Service `{{params.service_name}}` are already healthy.

  Requirements:
  - Update Ingress `{{params.ingress_name}}` in `${BENCH_NS_APP}`.
  - Set `spec.ingressClassName={{params.ingress_class_name}}`.
  - Keep the backend Deployment and Service unchanged.

  A good validation command is:
  ```bash
  kubectl -n ${BENCH_NS_APP} exec curl-test -- \
    curl -sS -H "Host: {{params.host}}" \
    http://ingress-nginx-controller.${BENCH_NS_INGRESS}.svc.cluster.local{{params.path}}
  ```

operatorContext: |
  Helpful commands:
  ```bash
  kubectl -n ${BENCH_NS_APP} get ingress,svc,deploy,pod
  kubectl -n ${BENCH_NS_INGRESS} get deploy -o yaml
  kubectl -n ${BENCH_NS_INGRESS} logs deploy/ingress-nginx-controller --tail=200
  ```

oracle:
  verify:
    commands:
      - command: ["python3", "resources/nginx-ingress/ingress_class_routing/oracle/oracle.py", "--check", "controller-flag", "--ingress-name", "{{params.ingress_name}}", "--curl-pod-name", "curl-test", "--host", "{{params.host}}", "--path", "{{params.path}}", "--service-name", "{{params.service_name}}", "--expected-ingress-class", "{{params.ingress_class_name}}", "--expected-body", "{{params.expected_body}}"]
        timeout_sec: 30
      - command: ["python3", "resources/nginx-ingress/ingress_class_routing/oracle/oracle.py", "--check", "ingress", "--ingress-name", "{{params.ingress_name}}", "--curl-pod-name", "curl-test", "--host", "{{params.host}}", "--path", "{{params.path}}", "--service-name", "{{params.service_name}}", "--expected-ingress-class", "{{params.ingress_class_name}}", "--expected-body", "{{params.expected_body}}"]
        timeout_sec: 30
      - command: ["python3", "resources/nginx-ingress/ingress_class_routing/oracle/oracle.py", "--check", "http", "--ingress-name", "{{params.ingress_name}}", "--curl-pod-name", "curl-test", "--host", "{{params.host}}", "--path", "{{params.path}}", "--service-name", "{{params.service_name}}", "--expected-ingress-class", "{{params.ingress_class_name}}", "--expected-body", "{{params.expected_body}}"]
        timeout_sec: 60
