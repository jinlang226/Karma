apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ${BENCH_PARAM_STABLE_INGRESS_NAME}
  namespace: ${BENCH_NS_APP}
spec:
  ingressClassName: nginx
  rules:
  - host: ${BENCH_PARAM_HOST}
    http:
      paths:
      - path: /health
        pathType: Prefix
        backend:
          service:
            name: stable-echo
            port:
              number: 80
      - path: ${BENCH_PARAM_PATH}
        pathType: Exact
        backend:
          service:
            name: stable-echo
            port:
              number: 80
