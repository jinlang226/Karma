apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ${BENCH_PARAM_CANARY_INGRESS_NAME}
  namespace: ${BENCH_NS_APP}
  annotations:
    nginx.ingress.kubernetes.io/canary: "true"
    nginx.ingress.kubernetes.io/canary-by-header: "${BENCH_PARAM_HEADER_NAME}"
    nginx.ingress.kubernetes.io/canary-by-header-value: "${BENCH_PARAM_BASELINE_HEADER_VALUE}"
spec:
  ingressClassName: nginx
  rules:
  - host: ${BENCH_PARAM_HOST}
    http:
      paths:
      - path: ${BENCH_PARAM_PATH}
        pathType: Exact
        backend:
          service:
            name: canary-echo
            port:
              number: 80
