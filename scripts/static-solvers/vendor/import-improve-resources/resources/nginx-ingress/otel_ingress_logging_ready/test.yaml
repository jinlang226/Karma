type: nginx-otel-ingress-logging-ready
targetApp: NGINX-Ingress
numAppInstance: 1
maxAttempts: 1

namespace_contract:
  required_roles:
  - ingress
  - app
  - otel

params:
  definitions:
    ingress_name:
      type: string
      default: otel-echo
    host:
      type: string
      default: otel.example.com
    path:
      type: string
      default: /otel-check
    collector_service_name:
      type: string
      default: otel-collector
    collector_port:
      type: string
      default: "4317"
    baseline_log_format:
      type: string
      default: $request $status
    otel_log_format:
      type: string
      default: $remote_addr - $remote_user [$time_local] "$request" $status $body_bytes_sent "$http_referer" "$http_user_agent" otel_trace_id=$opentelemetry_trace_id otel_span_id=$opentelemetry_span_id

preconditionUnits:
  - id: ingress_controller_ready
    probe:
      commands:
        - command: ["kubectl", "-n", "${BENCH_NS_INGRESS}", "rollout", "status", "deployment/ingress-nginx-controller", "--timeout=5s"]
          timeout_sec: 10
    apply:
      commands:
        - command:
            - /bin/sh
            - -c
            - >
              set -e;
              awk 'BEGIN{skip=1} /^---$/{if(skip){skip=0; next}} !skip {print}'
              resources/nginx-ingress/otel_ingress_logging_ready/resource/deploy.yaml |
              sed "s/namespace: ingress-nginx/namespace: ${BENCH_NS_INGRESS}/g" |
              kubectl apply -f -
          timeout_sec: 40
    verify:
      commands:
        - command: ["kubectl", "-n", "${BENCH_NS_INGRESS}", "rollout", "status", "deployment/ingress-nginx-controller", "--timeout=120s"]
          timeout_sec: 130
      retries: 3
      interval_sec: 3

  - id: otel_collector_ready
    probe:
      commands:
        - command:
            - /bin/sh
            - -c
            - >
              set -e;
              kubectl -n ${BENCH_NS_OTEL} rollout status deployment/{{params.collector_service_name}} --timeout=5s >/dev/null;
              test "$(kubectl -n ${BENCH_NS_OTEL} get service {{params.collector_service_name}} -o jsonpath='{.spec.ports[0].port}')" = "{{params.collector_port}}";
              kubectl -n ${BENCH_NS_OTEL} get configmap {{params.collector_service_name}}-config -o jsonpath='{.data.config\.yaml}' |
              grep -Fq -- 'endpoint: 0.0.0.0:{{params.collector_port}}'
          timeout_sec: 10
    apply:
      commands:
        - command: ["/bin/sh", "-c", "envsubst '${BENCH_NS_OTEL} ${BENCH_PARAM_COLLECTOR_PORT} ${BENCH_PARAM_COLLECTOR_SERVICE_NAME}' < resources/nginx-ingress/otel_ingress_logging_ready/resource/otel-collector.yaml | kubectl apply -f -"]
          timeout_sec: 20
    verify:
      commands:
        - command:
            - /bin/sh
            - -c
            - >
              set -e;
              kubectl -n ${BENCH_NS_OTEL} rollout status deployment/{{params.collector_service_name}} --timeout=60s >/dev/null;
              test "$(kubectl -n ${BENCH_NS_OTEL} get service {{params.collector_service_name}} -o jsonpath='{.spec.ports[0].port}')" = "{{params.collector_port}}";
              kubectl -n ${BENCH_NS_OTEL} get configmap {{params.collector_service_name}}-config -o jsonpath='{.data.config\.yaml}' |
              grep -Fq -- 'endpoint: 0.0.0.0:{{params.collector_port}}'
          timeout_sec: 70
      retries: 3
      interval_sec: 2

  - id: otel_echo_ready
    probe:
      commands:
        - command: ["kubectl", "-n", "${BENCH_NS_APP}", "rollout", "status", "deployment/otel-echo", "--timeout=5s"]
          timeout_sec: 10
    apply:
      commands:
        - command: ["/bin/sh", "-c", "envsubst '${BENCH_NS_APP}' < resources/nginx-ingress/otel_ingress_logging_ready/resource/otel-echo.yaml | kubectl apply -f -"]
          timeout_sec: 20
    verify:
      commands:
        - command: ["kubectl", "-n", "${BENCH_NS_APP}", "rollout", "status", "deployment/otel-echo", "--timeout=60s"]
          timeout_sec: 70
      retries: 3
      interval_sec: 2

  - id: curl_test_ready
    probe:
      commands:
        - command: ["kubectl", "-n", "${BENCH_NS_APP}", "wait", "--for=condition=Ready", "pod/curl-test", "--timeout=5s"]
          timeout_sec: 10
    apply:
      commands:
        - command: ["kubectl", "-n", "${BENCH_NS_APP}", "delete", "pod", "curl-test", "--ignore-not-found=true", "--wait=true"]
          timeout_sec: 60
        - command: ["/bin/sh", "-c", "envsubst '${BENCH_NS_APP}' < resources/nginx-ingress/otel_ingress_logging_ready/resource/curl-test.yaml | kubectl apply -f -"]
          timeout_sec: 20
    verify:
      commands:
        - command: ["kubectl", "-n", "${BENCH_NS_APP}", "wait", "--for=condition=Ready", "pod/curl-test", "--timeout=150s"]
          timeout_sec: 180
      retries: 3
      interval_sec: 2

  - id: otel_ingress_state_ready
    probe:
      commands:
        - command:
            - /bin/sh
            - -c
            - >
              set -e;
              kubectl -n ${BENCH_NS_APP} get ingress {{params.ingress_name}} >/dev/null;
              test "$(kubectl -n ${BENCH_NS_APP} get ingress {{params.ingress_name}} -o jsonpath='{.spec.rules[0].host}')" = "{{params.host}}";
              test "$(kubectl -n ${BENCH_NS_APP} get ingress {{params.ingress_name}} -o jsonpath='{.spec.rules[0].http.paths[0].path}')" = "{{params.path}}";
              ! kubectl -n ${BENCH_NS_APP} get ingress {{params.ingress_name}} -o yaml | grep -q 'nginx.ingress.kubernetes.io/enable-opentelemetry'
          timeout_sec: 10
    apply:
      commands:
        - command: ["/bin/sh", "-c", "envsubst '${BENCH_NS_APP} ${BENCH_PARAM_HOST} ${BENCH_PARAM_INGRESS_NAME} ${BENCH_PARAM_PATH}' < resources/nginx-ingress/otel_ingress_logging_ready/resource/otel-ingress.yaml | kubectl apply -f -"]
          timeout_sec: 20
        - command:
            - /bin/sh
            - -c
            - >
              kubectl -n ${BENCH_NS_APP} annotate ingress {{params.ingress_name}}
              nginx.ingress.kubernetes.io/enable-opentelemetry- --overwrite || true
          timeout_sec: 20
    verify:
      commands:
        - command:
            - /bin/sh
            - -c
            - >
              set -e;
              kubectl -n ${BENCH_NS_APP} get ingress {{params.ingress_name}} >/dev/null;
              test "$(kubectl -n ${BENCH_NS_APP} get ingress {{params.ingress_name}} -o jsonpath='{.spec.rules[0].host}')" = "{{params.host}}";
              test "$(kubectl -n ${BENCH_NS_APP} get ingress {{params.ingress_name}} -o jsonpath='{.spec.rules[0].http.paths[0].path}')" = "{{params.path}}";
              ! kubectl -n ${BENCH_NS_APP} get ingress {{params.ingress_name}} -o yaml | grep -q 'nginx.ingress.kubernetes.io/enable-opentelemetry'
          timeout_sec: 10

  - id: otel_controller_observability_state_ready
    probe:
      commands:
        - command:
            - /bin/sh
            - -c
            - >
              set -e;
              value=$(kubectl -n ${BENCH_NS_INGRESS} get configmap ingress-nginx-controller -o jsonpath='{.data.enable-opentelemetry}');
              format=$(kubectl -n ${BENCH_NS_INGRESS} get configmap ingress-nginx-controller -o jsonpath='{.data.log-format-upstream}');
              [ "${value:-false}" = "false" ] &&
              ! printf '%s' "${format}" | grep -q '\$opentelemetry_trace_id'
          timeout_sec: 15
    apply:
      commands:
        - command:
            - kubectl
            - -n
            - ${BENCH_NS_INGRESS}
            - patch
            - configmap
            - ingress-nginx-controller
            - --type=merge
            - -p
            - |
              {"data":{"enable-opentelemetry":"false","otlp-collector-host":"","otlp-collector-port":"","otel-sampler":"AlwaysOff","otel-sampler-ratio":"0.0","log-format-upstream":"{{params.baseline_log_format}}"}}
          timeout_sec: 20
    verify:
      commands:
        - command:
            - /bin/sh
            - -c
            - >
              set -e;
              value=$(kubectl -n ${BENCH_NS_INGRESS} get configmap ingress-nginx-controller -o jsonpath='{.data.enable-opentelemetry}');
              format=$(kubectl -n ${BENCH_NS_INGRESS} get configmap ingress-nginx-controller -o jsonpath='{.data.log-format-upstream}');
              [ "${value:-false}" = "false" ] &&
              ! printf '%s' "${format}" | grep -q '\$opentelemetry_trace_id'
          timeout_sec: 15

detailedInstructions: |
  Enable ingress-scoped OpenTelemetry logging and export in the assigned namespaces.

  Namespaces:
  - controller: `${BENCH_NS_INGRESS}`
  - application: `${BENCH_NS_APP}`
  - collector: `${BENCH_NS_OTEL}`

  Current baseline:
  - Ingress `{{params.ingress_name}}` already routes traffic to a healthy backend.
  - OpenTelemetry collector `{{params.collector_service_name}}` is already running.
  - The controller ConfigMap does not enable OpenTelemetry yet.
  - The ingress does not enable OpenTelemetry yet.

  Requirements:
  - Enable OpenTelemetry in ConfigMap `ingress-nginx-controller`.
  - Point the controller at `{{params.collector_service_name}}.${BENCH_NS_OTEL}.svc.cluster.local:{{params.collector_port}}`.
  - Configure sampling so trace data is emitted for requests.
  - Update `log-format-upstream` so it includes trace and span IDs, for example:
    `{{params.otel_log_format}}`
  - Enable OpenTelemetry on Ingress `{{params.ingress_name}}`.

  You may need to restart the controller Deployment after changing the ConfigMap.

  A good validation command is:
  ```bash
  kubectl -n ${BENCH_NS_APP} exec curl-test -- \
    curl -sS -H "Host: {{params.host}}" \
    http://ingress-nginx-controller.${BENCH_NS_INGRESS}.svc.cluster.local{{params.path}}
  kubectl -n ${BENCH_NS_INGRESS} logs deploy/ingress-nginx-controller --tail=200
  kubectl -n ${BENCH_NS_OTEL} logs deploy/{{params.collector_service_name}} --tail=200
  ```

operatorContext: |
  Helpful commands:
  ```bash
  kubectl -n ${BENCH_NS_INGRESS} get configmap ingress-nginx-controller -o yaml
  kubectl -n ${BENCH_NS_APP} get ingress,svc,deploy,pod -o yaml
  kubectl -n ${BENCH_NS_OTEL} get deploy,svc,pod
  ```

oracle:
  verify:
    commands:
      - command: ["python3", "resources/nginx-ingress/otel_ingress_logging_ready/oracle/oracle.py", "--check", "annotation", "--ingress-name", "{{params.ingress_name}}", "--curl-pod-name", "curl-test", "--host", "{{params.host}}", "--path", "{{params.path}}", "--collector-service-name", "{{params.collector_service_name}}", "--collector-port", "{{params.collector_port}}"]
        timeout_sec: 30
      - command: ["python3", "resources/nginx-ingress/otel_ingress_logging_ready/oracle/oracle.py", "--check", "configmap", "--ingress-name", "{{params.ingress_name}}", "--curl-pod-name", "curl-test", "--host", "{{params.host}}", "--path", "{{params.path}}", "--collector-service-name", "{{params.collector_service_name}}", "--collector-port", "{{params.collector_port}}"]
        timeout_sec: 30
      - command: ["python3", "resources/nginx-ingress/otel_ingress_logging_ready/oracle/oracle.py", "--check", "telemetry", "--ingress-name", "{{params.ingress_name}}", "--curl-pod-name", "curl-test", "--host", "{{params.host}}", "--path", "{{params.path}}", "--collector-service-name", "{{params.collector_service_name}}", "--collector-port", "{{params.collector_port}}"]
        timeout_sec: 60
