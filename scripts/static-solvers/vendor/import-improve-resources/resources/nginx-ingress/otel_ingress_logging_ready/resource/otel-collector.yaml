apiVersion: v1
kind: ConfigMap
metadata:
  name: ${BENCH_PARAM_COLLECTOR_SERVICE_NAME}-config
  namespace: ${BENCH_NS_OTEL}
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:${BENCH_PARAM_COLLECTOR_PORT}
    exporters:
      debug:
        verbosity: detailed
    service:
      pipelines:
        traces:
          receivers: [otlp]
          exporters: [debug]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${BENCH_PARAM_COLLECTOR_SERVICE_NAME}
  namespace: ${BENCH_NS_OTEL}
  labels:
    app: ${BENCH_PARAM_COLLECTOR_SERVICE_NAME}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ${BENCH_PARAM_COLLECTOR_SERVICE_NAME}
  template:
    metadata:
      labels:
        app: ${BENCH_PARAM_COLLECTOR_SERVICE_NAME}
    spec:
      containers:
      - name: ${BENCH_PARAM_COLLECTOR_SERVICE_NAME}
        image: otel/opentelemetry-collector:0.101.0
        args:
          - "--config=/etc/otel/config.yaml"
        ports:
          - containerPort: ${BENCH_PARAM_COLLECTOR_PORT}
            name: otlp-grpc
        volumeMounts:
          - name: config
            mountPath: /etc/otel
      volumes:
        - name: config
          configMap:
            name: ${BENCH_PARAM_COLLECTOR_SERVICE_NAME}-config
            items:
              - key: config.yaml
                path: config.yaml
---
apiVersion: v1
kind: Service
metadata:
  name: ${BENCH_PARAM_COLLECTOR_SERVICE_NAME}
  namespace: ${BENCH_NS_OTEL}
spec:
  selector:
    app: ${BENCH_PARAM_COLLECTOR_SERVICE_NAME}
  ports:
  - name: otlp-grpc
    port: ${BENCH_PARAM_COLLECTOR_PORT}
    targetPort: ${BENCH_PARAM_COLLECTOR_PORT}
    protocol: TCP
