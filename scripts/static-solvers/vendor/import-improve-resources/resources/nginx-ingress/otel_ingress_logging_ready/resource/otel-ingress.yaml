apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ${BENCH_PARAM_INGRESS_NAME}
  namespace: ${BENCH_NS_APP}
spec:
  ingressClassName: nginx
  rules:
  - host: ${BENCH_PARAM_HOST}
    http:
      paths:
      - path: ${BENCH_PARAM_PATH}
        pathType: Prefix
        backend:
          service:
            name: otel-echo
            port:
              number: 5678
