apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ${BENCH_PARAM_HEALTH_INGRESS_NAME}
  namespace: ${BENCH_NS_APP}
spec:
  ingressClassName: nginx
  rules:
  - host: ${BENCH_PARAM_HOST}
    http:
      paths:
      - path: ${BENCH_PARAM_HEALTH_PATH}
        pathType: Prefix
        backend:
          service:
            name: rate-echo
            port:
              number: 80
