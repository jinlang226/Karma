apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  namespace: ${BENCH_NS_APP}
  labels:
    app: demo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
    spec:
      containers:
      - name: demo-app
        image: busybox:1.36
        command:
          - sh
          - -c
          - |
            mkdir -p /www
            echo ${BENCH_PARAM_EXPECTED_BODY} > /www/index.html
            httpd -f -p ${BENCH_PARAM_TARGET_PORT} -h /www
        ports:
          - containerPort: ${BENCH_PARAM_TARGET_PORT}
            name: http
