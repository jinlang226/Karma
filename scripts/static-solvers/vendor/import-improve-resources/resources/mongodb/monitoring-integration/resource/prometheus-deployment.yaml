apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${BENCH_PARAM_PROMETHEUS_DEPLOYMENT_NAME}
  labels:
    app: ${BENCH_PARAM_PROMETHEUS_DEPLOYMENT_NAME}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ${BENCH_PARAM_PROMETHEUS_DEPLOYMENT_NAME}
  template:
    metadata:
      labels:
        app: ${BENCH_PARAM_PROMETHEUS_DEPLOYMENT_NAME}
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.51.2
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --web.enable-lifecycle
          ports:
            - name: http
              containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus/
            - name: data
              mountPath: /prometheus
      volumes:
        - name: config
          configMap:
            name: ${BENCH_PARAM_PROMETHEUS_CONFIGMAP_NAME}
        - name: data
          emptyDir: {}
