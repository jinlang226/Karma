apiVersion: v1
kind: Service
metadata:
  name: ${BENCH_PARAM_PROMETHEUS_SERVICE_NAME}
  labels:
    app: ${BENCH_PARAM_PROMETHEUS_DEPLOYMENT_NAME}
spec:
  selector:
    app: ${BENCH_PARAM_PROMETHEUS_DEPLOYMENT_NAME}
  ports:
    - name: http
      port: ${BENCH_PARAM_PROMETHEUS_SERVICE_PORT}
      targetPort: 9090
      protocol: TCP
