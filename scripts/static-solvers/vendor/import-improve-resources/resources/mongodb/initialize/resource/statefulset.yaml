apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ${BENCH_PARAM_CLUSTER_PREFIX}
spec:
  serviceName: ${BENCH_PARAM_HEADLESS_SERVICE_NAME}
  replicas: ${BENCH_PARAM_EXPECTED_REPLICAS}
  selector:
    matchLabels:
      app: ${BENCH_PARAM_CLUSTER_PREFIX}
  template:
    metadata:
      labels:
        app: ${BENCH_PARAM_CLUSTER_PREFIX}
    spec:
      containers:
      - name: mongod
        image: mongo:6.0.5
        command:
          - mongod
          - --replSet
          - ${BENCH_PARAM_REPLICA_SET_NAME}
          - --bind_ip_all
        ports:
        - containerPort: 27017
          name: mongodb
          protocol: TCP
        volumeMounts:
        - name: data-volume
          mountPath: /data/db
        resources:
          requests:
            cpu: "0.5"
            memory: "512Mi"
          limits:
            cpu: "1"
            memory: "1Gi"
  volumeClaimTemplates:
  - metadata:
      name: data-volume
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 10Gi
