apiVersion: v1
kind: ConfigMap
metadata:
  name: ${BENCH_PARAM_CLUSTER_PREFIX}-health-check-script
data:
  probe.sh: |
    #!/bin/sh
    set -e
    sleep 2
    HEALTH_PW="$(cat /etc/health/health-password)"
    mongosh --quiet "mongodb://${BENCH_PARAM_HEALTH_USERNAME}:${HEALTH_PW}@localhost:27017/admin" --eval 'db.hello().ok' >/dev/null
