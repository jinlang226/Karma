apiVersion: v1
kind: ConfigMap
metadata:
  name: pod-guard-script
data:
  guard.sh: |
    #!/bin/sh
    set -e
    req="${REQ_MEM_MIB:-0}"
    lim="${LIM_MEM_MIB:-0}"
    label="${MONITORING_LABEL:-}"
    if [ "$label" != "${BENCH_PARAM_TEMPLATE_LABEL_VALUE}" ]; then
      echo "template label missing or not ${BENCH_PARAM_TEMPLATE_LABEL_VALUE} (expected ${BENCH_PARAM_TEMPLATE_LABEL_KEY}=${BENCH_PARAM_TEMPLATE_LABEL_VALUE})" >&2
      exit 1
    fi
    if [ "$req" -lt 512 ]; then
      echo "requests.memory too low: ${req}Mi" >&2
      exit 1
    fi
    if [ "$lim" -lt 1024 ]; then
      echo "limits.memory too low: ${lim}Mi" >&2
      exit 1
    fi
    echo "guard checks passed"
