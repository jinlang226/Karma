apiVersion: v1
kind: ConfigMap
metadata:
  name: ${BENCH_PARAM_CLUSTER_PREFIX}-mongod-config
data:
  mongod.conf: |
    storage:
      dbPath: /data/db
      wiredTiger:
        engineConfig:
          journalCompressor: ${BENCH_PARAM_BASELINE_JOURNAL_COMPRESSOR}
    net:
      bindIpAll: true
    replication:
      replSetName: ${BENCH_PARAM_REPLICA_SET_NAME}
    security:
      authorization: enabled
      keyFile: /etc/mongo-keyfile/keyfile
    systemLog:
      verbosity: ${BENCH_PARAM_BASELINE_LOG_LEVEL}
    operationProfiling:
      mode: slowOp
      slowOpThresholdMs: ${BENCH_PARAM_BASELINE_SLOW_MS}
