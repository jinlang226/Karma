apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ${BENCH_PARAM_CLUSTER_PREFIX}
  labels:
    app: ${BENCH_PARAM_CLUSTER_PREFIX}
spec:
  serviceName: ${BENCH_PARAM_SERVICE_NAME}
  replicas: ${BENCH_PARAM_START_REPLICAS}
  selector:
    matchLabels:
      app: ${BENCH_PARAM_CLUSTER_PREFIX}
  template:
    metadata:
      labels:
        app: ${BENCH_PARAM_CLUSTER_PREFIX}
    spec:
      containers:
        - name: mongod
          image: mongo:6.0.5
          command:
            - mongod
            - --replSet
            - ${BENCH_PARAM_REPLICA_SET_NAME}
            - --bind_ip_all
          ports:
            - name: mongodb
              containerPort: 27017
          volumeMounts:
            - name: data
              mountPath: /data/db
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
