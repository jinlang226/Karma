apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ${BENCH_PARAM_CLUSTER_PREFIX}
  labels:
    app: ${BENCH_PARAM_CLUSTER_PREFIX}
spec:
  serviceName: ${BENCH_PARAM_SERVICE_NAME}
  replicas: 3
  selector:
    matchLabels:
      app: ${BENCH_PARAM_CLUSTER_PREFIX}
  template:
    metadata:
      labels:
        app: ${BENCH_PARAM_CLUSTER_PREFIX}
    spec:
      containers:
        - name: mongod
          image: mongo:6.0.5
          command:
            - mongod
            - --replSet
            - ${BENCH_PARAM_REPLICA_SET_NAME}
            - --bind_ip_all
            - --tlsMode
            - requireTLS
            - --tlsCertificateKeyFile
            - /etc/mongo-cert/server.pem
            - --tlsCAFile
            - /etc/mongo-ca/ca.crt
            - --tlsAllowConnectionsWithoutCertificates
          ports:
            - name: mongodb
              containerPort: 27017
          volumeMounts:
            - name: data
              mountPath: /data/db
            - name: mongo-tls-cert
              mountPath: /etc/mongo-cert
              readOnly: true
            - name: mongo-tls-ca
              mountPath: /etc/mongo-ca
              readOnly: true
      volumes:
        - name: mongo-tls-cert
          secret:
            secretName: ${BENCH_PARAM_TLS_CERT_SECRET_NAME}
        - name: mongo-tls-ca
          secret:
            secretName: ${BENCH_PARAM_TLS_CA_SECRET_NAME}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
