apiVersion: v1
kind: Service
metadata:
  name: ${BENCH_PARAM_DATA_SERVICE_NAME}
  labels:
    app: ${BENCH_PARAM_DATA_CLUSTER_PREFIX}
spec:
  clusterIP: None
  ports:
  - name: mongo
    port: 27017
    targetPort: 27017
  selector:
    app: ${BENCH_PARAM_DATA_CLUSTER_PREFIX}
