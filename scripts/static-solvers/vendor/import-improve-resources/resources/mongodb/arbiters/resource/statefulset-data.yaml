apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ${BENCH_PARAM_DATA_CLUSTER_PREFIX}
  labels:
    app: ${BENCH_PARAM_DATA_CLUSTER_PREFIX}
spec:
  serviceName: ${BENCH_PARAM_DATA_SERVICE_NAME}
  replicas: ${BENCH_PARAM_DATA_REPLICAS}
  selector:
    matchLabels:
      app: ${BENCH_PARAM_DATA_CLUSTER_PREFIX}
  template:
    metadata:
      labels:
        app: ${BENCH_PARAM_DATA_CLUSTER_PREFIX}
    spec:
      containers:
      - name: mongod
        image: mongo:6.0
        ports:
        - containerPort: 27017
          name: mongo
        command:
        - mongod
        - --replSet
        - ${BENCH_PARAM_REPLICA_SET_NAME}
        - --bind_ip_all
        volumeMounts:
        - name: datadir
          mountPath: /data/db
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
  volumeClaimTemplates:
  - metadata:
      name: datadir
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 5Gi
