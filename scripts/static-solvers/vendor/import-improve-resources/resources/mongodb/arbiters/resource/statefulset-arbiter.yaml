apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ${BENCH_PARAM_ARBITER_CLUSTER_PREFIX}
  labels:
    app: ${BENCH_PARAM_ARBITER_CLUSTER_PREFIX}
spec:
  serviceName: ${BENCH_PARAM_ARBITER_SERVICE_NAME}
  replicas: 1
  selector:
    matchLabels:
      app: ${BENCH_PARAM_ARBITER_CLUSTER_PREFIX}
  template:
    metadata:
      labels:
        app: ${BENCH_PARAM_ARBITER_CLUSTER_PREFIX}
    spec:
      containers:
      - name: mongod
        image: mongo:6.0
        ports:
        - containerPort: 27017
          name: mongo
        command:
        - mongod
        - --replSet
        - ${BENCH_PARAM_REPLICA_SET_NAME}
        - --bind_ip_all
        volumeMounts:
        - name: datadir
          mountPath: /data/db
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 250m
            memory: 512Mi
      volumes:
      - name: datadir
        emptyDir: {}
