apiVersion: v1
kind: Service
metadata:
  name: mongo-external-0
  labels:
    app: ${BENCH_PARAM_CLUSTER_PREFIX}
spec:
  type: NodePort
  selector:
    statefulset.kubernetes.io/pod-name: ${BENCH_PARAM_CLUSTER_PREFIX}-0
  ports:
    - name: mongodb
      port: 27017
      targetPort: 27017
      nodePort: __NODEPORT_0__
      protocol: TCP
---
