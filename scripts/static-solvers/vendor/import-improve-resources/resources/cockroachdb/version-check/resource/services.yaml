apiVersion: v1
kind: Service
metadata:
  name: ${BENCH_PARAM_CLUSTER_PREFIX}
  labels:
    app.kubernetes.io/name: cockroachdb
    app.kubernetes.io/instance: ${BENCH_PARAM_CLUSTER_PREFIX}
    app.kubernetes.io/component: database
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
  - port: 26257
    targetPort: 26257
    name: grpc
  - port: 8080
    targetPort: 8080
    name: http
  selector:
    app.kubernetes.io/name: cockroachdb
    app.kubernetes.io/instance: ${BENCH_PARAM_CLUSTER_PREFIX}
---
apiVersion: v1
kind: Service
metadata:
  name: ${BENCH_PARAM_CLUSTER_PREFIX}-public
  labels:
    app.kubernetes.io/name: cockroachdb
    app.kubernetes.io/instance: ${BENCH_PARAM_CLUSTER_PREFIX}
    app.kubernetes.io/component: database
spec:
  type: ClusterIP
  ports:
  - port: 26257
    targetPort: 26257
    name: grpc
  - port: 8080
    targetPort: 8080
    name: http
  selector:
    app.kubernetes.io/name: cockroachdb
    app.kubernetes.io/instance: ${BENCH_PARAM_CLUSTER_PREFIX}
