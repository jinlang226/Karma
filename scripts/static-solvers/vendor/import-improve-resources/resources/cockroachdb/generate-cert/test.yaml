type: operator-generate-cert
targetApp: CockroachDB
numAppInstance: 3
params:
  definitions:
    cluster_prefix:
      type: string
      default: crdb-cluster
    replica_count:
      type: int
      default: 3
      min: 3
      max: 7
    cert_secret_name:
      type: string
      default: crdb-cluster-certs
    cert_validity_days:
      type: int
      default: 365
      min: 30
      max: 3650
maxAttempts: 3
namespace_contract:
  required_roles:
  - default
externalMetrics:
- time_to_first_mutation
preconditionUnits:
- id: rbac_ready
  probe:
    commands:
    - command:
      - kubectl
      - -n
      - ${BENCH_NAMESPACE}
      - get
      - serviceaccount
      - '{{params.cluster_prefix}}-sa'
      timeout_sec: 15
  apply:
    commands:
    - command:
      - /bin/sh
      - -c
      - envsubst '${BENCH_PARAM_CLUSTER_PREFIX}' < resources/cockroachdb/generate-cert/resource/rbac.yaml | kubectl -n ${BENCH_NAMESPACE} apply -f -
      sleep: 1
      timeout_sec: 30
  verify:
    commands:
    - command:
      - kubectl
      - -n
      - ${BENCH_NAMESPACE}
      - get
      - serviceaccount
      - '{{params.cluster_prefix}}-sa'
      timeout_sec: 15
    retries: 6
    interval_sec: 2
- id: services_ready
  probe:
    commands:
    - command:
      - /bin/sh
      - -c
      - 'set -e

        kubectl -n ${BENCH_NAMESPACE} get service {{params.cluster_prefix}} >/dev/null

        kubectl -n ${BENCH_NAMESPACE} get service {{params.cluster_prefix}}-public
        >/dev/null

        '
      timeout_sec: 20
  apply:
    commands:
    - command:
      - /bin/sh
      - -c
      - envsubst '${BENCH_PARAM_CLUSTER_PREFIX}' < resources/cockroachdb/generate-cert/resource/services.yaml | kubectl -n ${BENCH_NAMESPACE} apply -f -
      sleep: 1
      timeout_sec: 30
  verify:
    commands:
    - command:
      - /bin/sh
      - -c
      - 'set -e

        kubectl -n ${BENCH_NAMESPACE} get service {{params.cluster_prefix}} >/dev/null

        kubectl -n ${BENCH_NAMESPACE} get service {{params.cluster_prefix}}-public
        >/dev/null

        '
      timeout_sec: 20
    retries: 6
    interval_sec: 2
- id: insecure_cluster_ready
  probe:
    commands:
    - command:
      - /bin/sh
      - -c
      - 'set -e

        [ "$(kubectl -n ${BENCH_NAMESPACE} get sts {{params.cluster_prefix}} -o jsonpath=''{.status.readyReplicas}'')"
        = "{{params.replica_count}}" ]

        kubectl -n ${BENCH_NAMESPACE} exec {{params.cluster_prefix}}-0 -- ./cockroach
        sql --insecure -e "SELECT 1;" >/dev/null

        '
      timeout_sec: 30
  apply:
    commands:
    - command:
      - /bin/sh
      - -c
      - |
        set -e
        cluster_exists=false
        if kubectl -n ${BENCH_NAMESPACE} get statefulset {{params.cluster_prefix}} >/dev/null 2>&1; then
          cluster_exists=true
        fi
        envsubst '${BENCH_PARAM_CLUSTER_PREFIX} ${BENCH_PARAM_REPLICA_COUNT}' < resources/cockroachdb/generate-cert/resource/statefulset.yaml | kubectl -n ${BENCH_NAMESPACE} apply -f -
        if [ "$cluster_exists" = true ]; then
          kubectl -n ${BENCH_NAMESPACE} delete pod -l app.kubernetes.io/instance={{params.cluster_prefix}} --wait=true --timeout=180s
        fi
      sleep: 2
      timeout_sec: 200
    - command:
      - kubectl
      - -n
      - ${BENCH_NAMESPACE}
      - wait
      - --for=jsonpath={.status.phase}=Running
      - pod
      - -l
      - app.kubernetes.io/instance={{params.cluster_prefix}}
      - --timeout=300s
      sleep: 2
      timeout_sec: 320
    - command:
      - /bin/sh
      - -c
      - "set -e\nfor i in $(seq 1 30); do\n  OUT=$(kubectl -n ${BENCH_NAMESPACE} exec {{params.cluster_prefix}}-0 -- ./cockroach init --insecure --host={{params.cluster_prefix}}-0.{{params.cluster_prefix}}.${BENCH_NAMESPACE}.svc.cluster.local 2>&1) && exit 0\n  echo \"$OUT\" | grep -qi 'already been initialized' && exit 0\n  sleep 3\ndone\nexit 1\n"
      sleep: 1
      timeout_sec: 120
    - command:
      - kubectl
      - -n
      - ${BENCH_NAMESPACE}
      - wait
      - --for=condition=ready
      - pod
      - -l
      - app.kubernetes.io/instance={{params.cluster_prefix}}
      - --timeout=300s
      sleep: 2
      timeout_sec: 320
  verify:
    commands:
    - command:
      - /bin/sh
      - -c
      - 'set -e

        [ "$(kubectl -n ${BENCH_NAMESPACE} get sts {{params.cluster_prefix}} -o jsonpath=''{.status.readyReplicas}'')"
        = "{{params.replica_count}}" ]

        kubectl -n ${BENCH_NAMESPACE} exec {{params.cluster_prefix}}-0 -- ./cockroach
        sql --insecure -e "SELECT 1;" >/dev/null

        '
      timeout_sec: 30
    retries: 30
    interval_sec: 5
- id: openssl_toolbox_ready
  probe:
    commands:
    - command:
      - kubectl
      - -n
      - ${BENCH_NAMESPACE}
      - wait
      - --for=condition=ready
      - pod/openssl-toolbox
      - --timeout=3s
      timeout_sec: 10
  apply:
    commands:
    - command:
      - kubectl
      - -n
      - ${BENCH_NAMESPACE}
      - apply
      - -f
      - resources/cockroachdb/generate-cert/resource/openssl-toolbox.yaml
      sleep: 1
      timeout_sec: 30
    - command:
      - kubectl
      - -n
      - ${BENCH_NAMESPACE}
      - wait
      - --for=condition=ready
      - pod/openssl-toolbox
      - --timeout=120s
      sleep: 1
      timeout_sec: 140
  verify:
    commands:
    - command:
      - kubectl
      - -n
      - ${BENCH_NAMESPACE}
      - wait
      - --for=condition=ready
      - pod/openssl-toolbox
      - --timeout=3s
      timeout_sec: 10
    retries: 20
    interval_sec: 3
detailedInstructions: 'Enable TLS for the running CockroachDB cluster.

  Use certificate secret name {{params.cert_secret_name}} and generate certificates
  valid for about {{params.cert_validity_days}} days.

  '
operatorContext: 'Useful commands:

  ```bash

  kubectl -n ${BENCH_NAMESPACE} get pods

  kubectl -n ${BENCH_NAMESPACE} exec {{params.cluster_prefix}}-0 -- ./cockroach sql
  --insecure -e "SELECT 1;"

  kubectl -n ${BENCH_NAMESPACE} exec openssl-toolbox -- ls /tmp

  ```

  '
oracle:
  verify:
    commands:
    - command:
      - /bin/sh
      - -c
      - kubectl -n ${BENCH_NAMESPACE} get statefulset {{params.cluster_prefix}} >/dev/null
    - command:
      - /bin/sh
      - -c
      - kubectl -n ${BENCH_NAMESPACE} get pods -l app.kubernetes.io/instance={{params.cluster_prefix}}
        >/dev/null
    - command:
      - python3
      - resources/cockroachdb/generate-cert/oracle/oracle.py
      timeout_sec: 600
