type: operator-expose-ingress
targetApp: CockroachDB
numAppInstance: 3
params:
  definitions:
    cluster_prefix:
      type: string
      default: crdb-cluster
    ui_host:
      type: string
      default: crdb-ui.example.com
    sql_port:
      type: int
      default: 26257
    ingress_class_name:
      type: string
      default: nginx
    tls_secret_name:
      type: string
      default: crdb-ui-tls
maxAttempts: 3
namespace_contract:
  required_roles:
  - default
  - ingress
  base_roles:
    default: cockroachdb
    ingress: ingress-nginx
externalMetrics:
- time_to_first_mutation
preconditionUnits:
- id: ingress_controller_ready
  probe:
    commands:
    - command:
      - /bin/sh
      - -c
      - 'set -e

        kubectl -n ${BENCH_NS_INGRESS} get deployment ingress-nginx-controller >/dev/null

        [ "$(kubectl -n ${BENCH_NS_INGRESS} get deployment ingress-nginx-controller -o jsonpath=''{.status.availableReplicas}'')"
        -ge 1 ]

        kubectl -n ${BENCH_NS_INGRESS} get secret ingress-nginx-admission >/dev/null

        ns=$(kubectl get validatingwebhookconfiguration ingress-nginx-admission -o jsonpath=''{.webhooks[0].clientConfig.service.namespace}'')

        [ "$ns" = "${BENCH_NS_INGRESS}" ]

        ca=$(kubectl get validatingwebhookconfiguration ingress-nginx-admission -o jsonpath=''{.webhooks[0].clientConfig.caBundle}'')

        [ -n "$ca" ]

        ep=$(kubectl -n ${BENCH_NS_INGRESS} get endpoints ingress-nginx-controller-admission
        -o jsonpath=''{.subsets[0].addresses[0].ip}'' 2>/dev/null || true)

        [ -n "$ep" ]

        '
      timeout_sec: 30
  apply:
    commands:
    - command:
      - /bin/sh
      - -c
      - |
        set -e
        sed "s/namespace: ingress-nginx/namespace: ${BENCH_NS_INGRESS}/g" \
          resources/nginx-ingress/ingress_route_ready/resource/deploy.yaml | \
          awk 'BEGIN{skip=0} /^kind: Namespace$/{skip=1} skip && /^---$/{skip=0; next} !skip{print}' | \
          kubectl apply -f -
      sleep: 3
      timeout_sec: 180
    - command:
      - kubectl
      - -n
      - ${BENCH_NS_INGRESS}
      - rollout
      - status
      - deploy/ingress-nginx-controller
      - --timeout=120s
      sleep: 1
      timeout_sec: 140
    - command:
      - /bin/sh
      - -c
      - "set -e\nargs=$(kubectl -n ${BENCH_NS_INGRESS} get deployment ingress-nginx-controller\
        \ -o jsonpath='{.spec.template.spec.containers[0].args}')\nif ! printf '%s'\
        \ \"$args\" | grep -q -- '--watch-ingress-without-class=false'; then\n  kubectl\
        \ -n ${BENCH_NS_INGRESS} patch deployment ingress-nginx-controller --type=json -p='[{\"\
        op\":\"add\",\"path\":\"/spec/template/spec/containers/0/args/-\",\"value\"\
        :\"--watch-ingress-without-class=false\"}]'\nfi\n"
      sleep: 1
      timeout_sec: 40
    - command:
      - kubectl
      - -n
      - ${BENCH_NS_INGRESS}
      - rollout
      - status
      - deploy/ingress-nginx-controller
      - --timeout=120s
      sleep: 1
      timeout_sec: 140
    - command:
      - /bin/sh
      - -c
      - "set -e\nfor i in $(seq 1 60); do\n  ep=$(kubectl -n ${BENCH_NS_INGRESS} get endpoints ingress-nginx-controller-admission -o jsonpath='{.subsets[0].addresses[0].ip}' 2>/dev/null || true)\n  ns=$(kubectl get validatingwebhookconfiguration ingress-nginx-admission -o jsonpath='{.webhooks[0].clientConfig.service.namespace}' 2>/dev/null || true)\n  ca=$(kubectl get validatingwebhookconfiguration ingress-nginx-admission -o jsonpath='{.webhooks[0].clientConfig.caBundle}' 2>/dev/null || true)\n  if [ -n \"$ep\" ] && [ \"$ns\" = \"${BENCH_NS_INGRESS}\" ] && [ -n \"$ca\" ] && kubectl -n ${BENCH_NS_INGRESS} get secret ingress-nginx-admission >/dev/null 2>&1; then\n    exit 0\n  fi\n  sleep 3\ndone\nexit 1\n"
      sleep: 1
      timeout_sec: 140
  verify:
    commands:
    - command:
      - /bin/sh
      - -c
      - 'set -e

        kubectl -n ${BENCH_NS_INGRESS} get deployment ingress-nginx-controller >/dev/null

        [ "$(kubectl -n ${BENCH_NS_INGRESS} get deployment ingress-nginx-controller -o jsonpath=''{.status.availableReplicas}'')"
        -ge 1 ]

        kubectl -n ${BENCH_NS_INGRESS} get secret ingress-nginx-admission >/dev/null

        ns=$(kubectl get validatingwebhookconfiguration ingress-nginx-admission -o jsonpath=''{.webhooks[0].clientConfig.service.namespace}'')

        [ "$ns" = "${BENCH_NS_INGRESS}" ]

        ca=$(kubectl get validatingwebhookconfiguration ingress-nginx-admission -o jsonpath=''{.webhooks[0].clientConfig.caBundle}'')

        [ -n "$ca" ]

        ep=$(kubectl -n ${BENCH_NS_INGRESS} get endpoints ingress-nginx-controller-admission
        -o jsonpath=''{.subsets[0].addresses[0].ip}'' 2>/dev/null || true)

        [ -n "$ep" ]

        '
      timeout_sec: 30
    retries: 20
    interval_sec: 3
- id: cluster_rbac_ready
  probe:
    commands:
    - command:
      - kubectl
      - -n
      - ${BENCH_NAMESPACE}
      - get
      - serviceaccount
      - '{{params.cluster_prefix}}-sa'
      timeout_sec: 15
  apply:
    commands:
    - command:
      - /bin/sh
      - -c
      - envsubst '${BENCH_PARAM_CLUSTER_PREFIX}' < resources/cockroachdb/expose-ingress/resource/rbac.yaml | kubectl -n ${BENCH_NAMESPACE} apply -f -
      sleep: 1
      timeout_sec: 30
  verify:
    commands:
    - command:
      - kubectl
      - -n
      - ${BENCH_NAMESPACE}
      - get
      - serviceaccount
      - '{{params.cluster_prefix}}-sa'
      timeout_sec: 15
    retries: 6
    interval_sec: 2
- id: cluster_services_ready
  probe:
    commands:
    - command:
      - /bin/sh
      - -c
      - 'set -e

        kubectl -n ${BENCH_NAMESPACE} get service {{params.cluster_prefix}} >/dev/null

        kubectl -n ${BENCH_NAMESPACE} get service {{params.cluster_prefix}}-public
        >/dev/null

        '
      timeout_sec: 20
  apply:
    commands:
    - command:
      - /bin/sh
      - -c
      - envsubst '${BENCH_PARAM_CLUSTER_PREFIX}' < resources/cockroachdb/expose-ingress/resource/services.yaml | kubectl -n ${BENCH_NAMESPACE} apply -f -
      sleep: 1
      timeout_sec: 30
  verify:
    commands:
    - command:
      - /bin/sh
      - -c
      - 'set -e

        kubectl -n ${BENCH_NAMESPACE} get service {{params.cluster_prefix}} >/dev/null

        kubectl -n ${BENCH_NAMESPACE} get service {{params.cluster_prefix}}-public
        >/dev/null

        '
      timeout_sec: 20
    retries: 6
    interval_sec: 2
- id: cluster_workload_ready
  probe:
    commands:
    - command:
      - /bin/sh
      - -c
      - 'set -e

        [ "$(kubectl -n ${BENCH_NAMESPACE} get sts {{params.cluster_prefix}} -o jsonpath=''{.status.readyReplicas}'')"
        = "3" ]

        kubectl -n ${BENCH_NAMESPACE} exec {{params.cluster_prefix}}-0 -- ./cockroach
        sql --insecure -e "SELECT 1;" >/dev/null

        '
      timeout_sec: 30
  apply:
    commands:
    - command:
      - /bin/sh
      - -c
      - envsubst '${BENCH_PARAM_CLUSTER_PREFIX}' < resources/cockroachdb/expose-ingress/resource/statefulset.yaml | kubectl -n ${BENCH_NAMESPACE} apply -f -
      sleep: 2
      timeout_sec: 60
    - command:
      - kubectl
      - -n
      - ${BENCH_NAMESPACE}
      - wait
      - --for=jsonpath={.status.phase}=Running
      - pod
      - -l
      - app.kubernetes.io/name=cockroachdb,app.kubernetes.io/instance={{params.cluster_prefix}}
      - --timeout=300s
      sleep: 2
      timeout_sec: 320
    - command:
      - /bin/sh
      - -c
      - "set -e\nfor i in $(seq 1 30); do\n  kubectl -n ${BENCH_NAMESPACE} exec {{params.cluster_prefix}}-0\
        \ -- ./cockroach init --insecure --host={{params.cluster_prefix}}-0.{{params.cluster_prefix}}.${BENCH_NAMESPACE}.svc.cluster.local\
        \ && exit 0\n  sleep 3\ndone\nexit 1\n"
      sleep: 1
      timeout_sec: 120
    - command:
      - kubectl
      - -n
      - ${BENCH_NAMESPACE}
      - wait
      - --for=condition=ready
      - pod
      - -l
      - app.kubernetes.io/name=cockroachdb,app.kubernetes.io/instance={{params.cluster_prefix}}
      - --timeout=300s
      sleep: 2
      timeout_sec: 320
  verify:
    commands:
    - command:
      - /bin/sh
      - -c
      - 'set -e

        [ "$(kubectl -n ${BENCH_NAMESPACE} get sts {{params.cluster_prefix}} -o jsonpath=''{.status.readyReplicas}'')"
        = "3" ]

        kubectl -n ${BENCH_NAMESPACE} exec {{params.cluster_prefix}}-0 -- ./cockroach
        sql --insecure -e "SELECT 1;" >/dev/null

        '
      timeout_sec: 30
    retries: 30
    interval_sec: 5
- id: ui_tls_secret_ready
  probe:
    commands:
    - command:
      - kubectl
      - -n
      - ${BENCH_NAMESPACE}
      - get
      - secret
      - '{{params.tls_secret_name}}'
      timeout_sec: 15
  apply:
    commands:
    - command:
      - /bin/sh
      - -c
      - envsubst '${BENCH_PARAM_TLS_SECRET_NAME}' < resources/cockroachdb/expose-ingress/resource/tls-secret.yaml | kubectl -n ${BENCH_NAMESPACE} apply -f -
      sleep: 1
      timeout_sec: 30
  verify:
    commands:
    - command:
      - kubectl
      - -n
      - ${BENCH_NAMESPACE}
      - get
      - secret
      - '{{params.tls_secret_name}}'
      timeout_sec: 15
    retries: 6
    interval_sec: 2
- id: curl_test_ready
  probe:
    commands:
    - command:
      - kubectl
      - -n
      - ${BENCH_NAMESPACE}
      - wait
      - --for=condition=Ready
      - pod/curl-test
      - --timeout=3s
      timeout_sec: 10
  apply:
    commands:
    - command:
      - kubectl
      - -n
      - ${BENCH_NAMESPACE}
      - apply
      - -f
      - resources/cockroachdb/expose-ingress/resource/curl-test.yaml
      sleep: 1
      timeout_sec: 30
    - command:
      - kubectl
      - -n
      - ${BENCH_NAMESPACE}
      - wait
      - --for=condition=Ready
      - pod/curl-test
      - --timeout=60s
      sleep: 1
      timeout_sec: 80
  verify:
    commands:
    - command:
      - kubectl
      - -n
      - ${BENCH_NAMESPACE}
      - wait
      - --for=condition=Ready
      - pod/curl-test
      - --timeout=3s
      timeout_sec: 10
    retries: 20
    interval_sec: 3
- id: ingress_exposure_baseline_ready
  probe:
    commands:
    - command:
      - /bin/sh
      - -c
      - |
        set -e
        if kubectl -n ${BENCH_NAMESPACE} get ingress {{params.cluster_prefix}}-ui >/dev/null 2>&1; then
          exit 1
        fi
        if kubectl -n ${BENCH_NS_INGRESS} get configmap tcp-services >/dev/null 2>&1; then
          exit 1
        fi
        if kubectl -n ${BENCH_NS_INGRESS} get service ingress-nginx-controller \
          -o jsonpath='{range .spec.ports[*]}{.port}{"\n"}{end}' | \
          grep -qx '{{params.sql_port}}'; then
          exit 1
        fi
        args=$(kubectl -n ${BENCH_NS_INGRESS} get deployment ingress-nginx-controller \
          -o jsonpath='{.spec.template.spec.containers[0].args}')
        if printf '%s' "$args" | \
          grep -q -- "--tcp-services-configmap=${BENCH_NS_INGRESS}/tcp-services"; then
          exit 1
        fi
      timeout_sec: 30
  apply:
    commands:
    - command:
      - kubectl
      - -n
      - ${BENCH_NAMESPACE}
      - delete
      - ingress
      - '{{params.cluster_prefix}}-ui'
      - --ignore-not-found=true
      - --wait=true
      sleep: 1
      timeout_sec: 40
    - command:
      - kubectl
      - -n
      - ${BENCH_NS_INGRESS}
      - delete
      - configmap
      - tcp-services
      - --ignore-not-found=true
      - --wait=true
      sleep: 1
      timeout_sec: 40
    - command:
      - kubectl
      - -n
      - ${BENCH_NS_INGRESS}
      - patch
      - service
      - ingress-nginx-controller
      - --type=merge
      - -p
      - '{"spec":{"ports":[{"name":"http","port":80,"protocol":"TCP","targetPort":"http"},{"name":"https","port":443,"protocol":"TCP","targetPort":"https"}]}}'
      sleep: 1
      timeout_sec: 40
    - command:
      - /bin/sh
      - -c
      - "set -e\nidx=$(kubectl -n ${BENCH_NS_INGRESS} get deployment ingress-nginx-controller -o json | python3 -c 'import json,sys; obj=json.load(sys.stdin); args=obj[\"spec\"][\"template\"][\"spec\"][\"containers\"][0].get(\"args\", []); wanted=f\"--tcp-services-configmap={sys.argv[1]}/tcp-services\"; print(next((i for i,a in enumerate(args) if a == wanted), -1))' \"${BENCH_NS_INGRESS}\")\nif [ \"$idx\" -ge 0 ]; then\n  kubectl -n ${BENCH_NS_INGRESS} patch deployment ingress-nginx-controller --type=json -p=\"[{\\\"op\\\":\\\"remove\\\",\\\"path\\\":\\\"/spec/template/spec/containers/0/args/$idx\\\"}]\"\n  kubectl -n ${BENCH_NS_INGRESS} rollout status deploy/ingress-nginx-controller --timeout=180s\nfi\n"
      sleep: 1
      timeout_sec: 220
  verify:
    commands:
    - command:
      - /bin/sh
      - -c
      - |
        set -e
        if kubectl -n ${BENCH_NAMESPACE} get ingress {{params.cluster_prefix}}-ui >/dev/null 2>&1; then
          exit 1
        fi
        if kubectl -n ${BENCH_NS_INGRESS} get configmap tcp-services >/dev/null 2>&1; then
          exit 1
        fi
        if kubectl -n ${BENCH_NS_INGRESS} get service ingress-nginx-controller \
          -o jsonpath='{range .spec.ports[*]}{.port}{"\n"}{end}' | \
          grep -qx '{{params.sql_port}}'; then
          exit 1
        fi
        args=$(kubectl -n ${BENCH_NS_INGRESS} get deployment ingress-nginx-controller \
          -o jsonpath='{.spec.template.spec.containers[0].args}')
        if printf '%s' "$args" | \
          grep -q -- "--tcp-services-configmap=${BENCH_NS_INGRESS}/tcp-services"; then
          exit 1
        fi
      timeout_sec: 30
    retries: 10
    interval_sec: 2
detailedInstructions: 'A 3-node CockroachDB cluster is running in the ${BENCH_NAMESPACE}
  namespace. The

  ingress-nginx controller is already installed and running in ingress-nginx.


  Your task:

  - Make the DB Console reachable at https://{{params.ui_host}} (TLS required).

  - Expose SQL traffic via ingress-nginx on TCP port {{params.sql_port}}.


  Notes:

  - Use the {{params.ingress_class_name}} ingress class.

  - SQL uses a TCP protocol (not HTTP).

  '
operatorContext: 'Useful commands:

  ```bash

  kubectl -n ${BENCH_NAMESPACE} get svc,ingress

  kubectl -n ${BENCH_NS_INGRESS} get cm

  ```

  '
oracle:
  verify:
    commands:
    - command:
      - /bin/sh
      - -c
      - kubectl -n ${BENCH_NAMESPACE} get statefulset {{params.cluster_prefix}} >/dev/null
    - command:
      - /bin/sh
      - -c
      - kubectl -n ${BENCH_NAMESPACE} get pods -l app.kubernetes.io/name=cockroachdb,app.kubernetes.io/instance={{params.cluster_prefix}}
        >/dev/null
    - command:
      - python3
      - resources/cockroachdb/expose-ingress/oracle/oracle.py
      timeout_sec: 600
