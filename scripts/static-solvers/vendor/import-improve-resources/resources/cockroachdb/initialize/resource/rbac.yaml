apiVersion: v1
kind: ServiceAccount
metadata:
  name: ${BENCH_PARAM_CLUSTER_PREFIX}-sa
  labels:
    app.kubernetes.io/name: cockroachdb
    app.kubernetes.io/instance: ${BENCH_PARAM_CLUSTER_PREFIX}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ${BENCH_PARAM_CLUSTER_PREFIX}-role
  labels:
    app.kubernetes.io/name: cockroachdb
    app.kubernetes.io/instance: ${BENCH_PARAM_CLUSTER_PREFIX}
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["certificates.k8s.io"]
  resources: ["certificatesigningrequests"]
  verbs: ["create", "get", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ${BENCH_PARAM_CLUSTER_PREFIX}-rolebinding
  labels:
    app.kubernetes.io/name: cockroachdb
    app.kubernetes.io/instance: ${BENCH_PARAM_CLUSTER_PREFIX}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ${BENCH_PARAM_CLUSTER_PREFIX}-role
subjects:
- kind: ServiceAccount
  name: ${BENCH_PARAM_CLUSTER_PREFIX}-sa
