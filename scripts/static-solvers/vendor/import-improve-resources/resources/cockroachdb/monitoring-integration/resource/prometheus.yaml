apiVersion: monitoring.coreos.com/v1
kind: Prometheus
metadata:
  name: crdb
  labels:
    app: prometheus
spec:
  replicas: 1
  serviceAccountName: prometheus
  serviceMonitorSelector: {}
  serviceMonitorNamespaceSelector:
    matchNames:
    - ${BENCH_NAMESPACE}
  podMonitorSelector: {}
  podMonitorNamespaceSelector:
    matchNames:
    - ${BENCH_NAMESPACE}
  scrapeInterval: 30s
  scrapeTimeout: 10s
  evaluationInterval: 30s
---
apiVersion: v1
kind: Service
metadata:
  name: ${BENCH_PARAM_PROMETHEUS_SERVICE_NAME}
spec:
  ports:
  - name: web
    port: ${BENCH_PARAM_PROMETHEUS_SERVICE_PORT}
    targetPort: web
  selector:
    prometheus: crdb
