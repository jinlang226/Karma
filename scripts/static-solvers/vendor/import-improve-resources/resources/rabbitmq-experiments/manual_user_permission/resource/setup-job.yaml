apiVersion: batch/v1
kind: Job
metadata:
  name: ${BENCH_PARAM_CLUSTER_PREFIX}-setup
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: setup
          image: curlimages/curl:8.6.0
          env:
            - name: RABBITMQ_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: ${BENCH_PARAM_CLUSTER_PREFIX}-admin
                  key: username
            - name: RABBITMQ_ADMIN_PASS
              valueFrom:
                secretKeyRef:
                  name: ${BENCH_PARAM_CLUSTER_PREFIX}-admin
                  key: password
            - name: APP_USER
              valueFrom:
                secretKeyRef:
                  name: ${BENCH_PARAM_CLUSTER_PREFIX}-app
                  key: username
            - name: APP_PASS
              valueFrom:
                secretKeyRef:
                  name: ${BENCH_PARAM_CLUSTER_PREFIX}-app
                  key: password
            - name: OPS_USER
              valueFrom:
                secretKeyRef:
                  name: ${BENCH_PARAM_CLUSTER_PREFIX}-ops
                  key: username
            - name: OPS_PASS
              valueFrom:
                secretKeyRef:
                  name: ${BENCH_PARAM_CLUSTER_PREFIX}-ops
                  key: password
          command:
            - /bin/sh
            - -c
            - |
              set -e
              base="http://${BENCH_PARAM_CLUSTER_PREFIX}.${BENCH_NAMESPACE}.svc.cluster.local:15672/api"
              auth="${RABBITMQ_ADMIN_USER}:${RABBITMQ_ADMIN_PASS}"
              for i in $(seq 1 60); do
                if curl -fsS -u "$auth" "$base/overview" >/dev/null; then
                  break
                fi
                sleep 2
              done
              if ! curl -fsS -u "$auth" "$base/overview" >/dev/null; then
                echo "${BENCH_PARAM_CLUSTER_PREFIX}-setup: management API not ready"
                exit 1
              fi
              for i in $(seq 1 60); do
                nodes=$(curl -fsS -u "$auth" "$base/nodes" | tr -d '[:space:]' | grep -o '"name":"rabbit@[^"]*"' | sort -u | wc -l | tr -d ' ')
                if [ "${nodes:-0}" -eq 3 ]; then
                  break
                fi
                sleep 2
              done
              if [ "${nodes:-0}" -ne 3 ]; then
                echo "${BENCH_PARAM_CLUSTER_PREFIX}-setup: cluster nodes not stable"
                exit 1
              fi
              # vhosts
              curl -fsS -u "$auth" -H "content-type: application/json" \
                -XPUT "$base/vhosts/%2Fapp" -d '{}' >/dev/null
              curl -fsS -u "$auth" -H "content-type: application/json" \
                -XPUT "$base/vhosts/%2Fops" -d '{}' >/dev/null
              # users
              curl -fsS -u "$auth" -H "content-type: application/json" \
                -XPUT "$base/users/${APP_USER}" \
                -d "{\"password\":\"${APP_PASS}\",\"tags\":\"management\"}" >/dev/null
              curl -fsS -u "$auth" -H "content-type: application/json" \
                -XPUT "$base/users/${OPS_USER}" \
                -d "{\"password\":\"${OPS_PASS}\",\"tags\":\"management\"}" >/dev/null
              # Replant the intentionally broken permission shape.
              curl -fsS -u "$auth" -H "content-type: application/json" \
                -XPUT "$base/permissions/%2Fapp/${APP_USER}" \
                -d '{"configure":"","write":".*","read":".*"}' >/dev/null
              curl -fsS -u "$auth" -H "content-type: application/json" \
                -XPUT "$base/permissions/%2Fapp/${OPS_USER}" \
                -d '{"configure":".*","write":".*","read":".*"}' >/dev/null
              curl -sS -u "$auth" -XDELETE \
                "$base/permissions/%2Fops/${OPS_USER}" >/dev/null
              curl -sS -u "$auth" -XDELETE \
                "$base/permissions/%2Fops/${APP_USER}" >/dev/null
              # seed queues + messages
              curl -fsS -u "$auth" -H "content-type: application/json" \
                -XPUT "$base/queues/%2Fapp/app-queue" \
                -d '{"durable":true,"auto_delete":false,"arguments":{"x-queue-type":"classic"}}' >/dev/null
              curl -fsS -u "$auth" -H "content-type: application/json" \
                -XPUT "$base/queues/%2Fops/ops-queue" \
                -d '{"durable":true,"auto_delete":false,"arguments":{"x-queue-type":"classic"}}' >/dev/null
              for i in $(seq 1 3); do
                payload='{"properties":{"delivery_mode":2},"routing_key":"app-queue","payload":"msg-'"$i"'","payload_encoding":"string"}'
                curl -fsS -u "$auth" -H "content-type: application/json" \
                  -XPOST "$base/exchanges/%2Fapp/amq.default/publish" -d "$payload" >/dev/null
              done
              exit 0
