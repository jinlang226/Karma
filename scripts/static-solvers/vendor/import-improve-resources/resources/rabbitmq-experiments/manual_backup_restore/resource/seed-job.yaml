apiVersion: batch/v1
kind: Job
metadata:
  name: ${BENCH_PARAM_CLUSTER_PREFIX}-seed
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: seed
          image: curlimages/curl:8.6.0
          env:
            - name: RABBITMQ_USER
              valueFrom:
                secretKeyRef:
                  name: ${BENCH_PARAM_CLUSTER_PREFIX}-admin
                  key: username
            - name: RABBITMQ_PASS
              valueFrom:
                secretKeyRef:
                  name: ${BENCH_PARAM_CLUSTER_PREFIX}-admin
                  key: password
          command:
            - /bin/sh
            - -c
            - |
              set -e
              base="http://${BENCH_PARAM_CLUSTER_PREFIX}.${BENCH_NAMESPACE}.svc.cluster.local:15672/api"
              auth="${RABBITMQ_USER}:${RABBITMQ_PASS}"
              for i in $(seq 1 60); do
                if curl -fsS -u "$auth" "$base/overview" >/dev/null; then
                  break
                fi
                sleep 2
              done
              if ! curl -fsS -u "$auth" "$base/overview" >/dev/null; then
                echo "${BENCH_PARAM_CLUSTER_PREFIX}-seed: management API not ready"
                exit 1
              fi
              for i in $(seq 1 60); do
                nodes=$(curl -fsS -u "$auth" "$base/nodes" | tr -d '[:space:]' | grep -o '"name":"rabbit@[^"]*"' | sort -u | wc -l | tr -d ' ')
                if [ "${nodes:-0}" -eq 3 ]; then
                  break
                fi
                sleep 2
              done
              if [ "${nodes:-0}" -ne 3 ]; then
                echo "${BENCH_PARAM_CLUSTER_PREFIX}-seed: cluster nodes not stable"
                exit 1
              fi

              curl -fsS -u "$auth" -XPUT "$base/vhosts/%2Fapp" >/dev/null
              curl -fsS -u "$auth" -H "content-type: application/json" \
                -XPUT "$base/permissions/%2Fapp/${RABBITMQ_USER}" \
                -d '{"configure":".*","write":".*","read":".*"}' >/dev/null

              curl -fsS -u "$auth" -H "content-type: application/json" \
                -XPUT "$base/queues/%2Fapp/app-backup" \
                -d '{"durable":true,"auto_delete":false,"arguments":{}}' >/dev/null

              for i in $(seq 1 20); do
                curl -fsS -u "$auth" -H "content-type: application/json" \
                  -XPOST "$base/exchanges/%2Fapp/amq.default/publish" \
                  -d '{"properties":{"delivery_mode":2},"routing_key":"app-backup","payload":"msg-'"$i"'","payload_encoding":"string"}' \
                  | grep -q '"routed":true'
              done
              exit 0
