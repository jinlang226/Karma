apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${BENCH_PARAM_AUTH_CHECKER_DEPLOYMENT_NAME}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ${BENCH_PARAM_AUTH_CHECKER_DEPLOYMENT_NAME}
  template:
    metadata:
      labels:
        app: ${BENCH_PARAM_AUTH_CHECKER_DEPLOYMENT_NAME}
    spec:
      containers:
        - name: checker
          image: curlimages/curl:8.5.0
          env:
            - name: ELASTIC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ${BENCH_PARAM_CURRENT_PASSWORD_SECRET_NAME}
                  key: password
          command:
            - /bin/sh
            - -c
            - |
              sleep infinity
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - |
                  curl -s --max-time 5 -u elastic:${ELASTIC_PASSWORD} \
                    http://${BENCH_PARAM_HTTP_SERVICE_NAME}:9200/_security/_authenticate \
                    | grep -q '"username":"elastic"'
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 6
