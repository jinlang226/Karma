apiVersion: v1
kind: ConfigMap
metadata:
  name: es-config
data:
  elasticsearch.yml: |
    cluster.name: ${BENCH_PARAM_CLUSTER_PREFIX}
    node.name: ${POD_NAME}
    node.roles: [ master, data, ingest ]
    network.host: 0.0.0.0
    discovery.seed_hosts:
      - ${BENCH_PARAM_CLUSTER_PREFIX}-0.${BENCH_PARAM_CLUSTER_PREFIX}
      - ${BENCH_PARAM_CLUSTER_PREFIX}-1.${BENCH_PARAM_CLUSTER_PREFIX}
      - ${BENCH_PARAM_CLUSTER_PREFIX}-2.${BENCH_PARAM_CLUSTER_PREFIX}
    cluster.initial_master_nodes:
      - ${BENCH_PARAM_CLUSTER_PREFIX}-0
      - ${BENCH_PARAM_CLUSTER_PREFIX}-1
      - ${BENCH_PARAM_CLUSTER_PREFIX}-2
    node.store.allow_mmap: false
    xpack.security.enabled: true
    xpack.security.http.ssl.enabled: false
    xpack.security.transport.ssl.enabled: true
    xpack.security.transport.ssl.verification_mode: certificate
    xpack.security.transport.ssl.key: /usr/share/elasticsearch/config/transport-certs/tls.key
    xpack.security.transport.ssl.certificate: /usr/share/elasticsearch/config/transport-certs/tls.crt
    xpack.security.transport.ssl.certificate_authorities: ["/usr/share/elasticsearch/config/transport-certs/ca.crt"]
