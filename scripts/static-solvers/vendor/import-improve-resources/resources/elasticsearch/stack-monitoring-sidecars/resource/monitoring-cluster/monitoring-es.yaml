apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${BENCH_PARAM_MONITORING_DEPLOYMENT_NAME}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ${BENCH_PARAM_MONITORING_DEPLOYMENT_NAME}
  template:
    metadata:
      labels:
        app: ${BENCH_PARAM_MONITORING_DEPLOYMENT_NAME}
    spec:
      containers:
        - name: elasticsearch
          image: docker.elastic.co/elasticsearch/elasticsearch:7.17.9
          env:
            - name: discovery.type
              value: single-node
            - name: node.store.allow_mmap
              value: "false"
            - name: ES_JAVA_OPTS
              value: "-Xms512m -Xmx512m"
          ports:
            - containerPort: 9200
              name: http
          readinessProbe:
            tcpSocket:
              port: 9200
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 1
            failureThreshold: 6
          volumeMounts:
            - name: data
              mountPath: /usr/share/elasticsearch/data
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: ${BENCH_PARAM_MONITORING_SERVICE_NAME}
spec:
  selector:
    app: ${BENCH_PARAM_MONITORING_DEPLOYMENT_NAME}
  ports:
    - name: http
      port: 9200
      targetPort: 9200
