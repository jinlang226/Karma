apiVersion: v1
kind: ConfigMap
metadata:
  name: ${BENCH_PARAM_CLUSTER_PREFIX}-filebeat-config
data:
  filebeat.yml: |
    filebeat.inputs:
      - type: log
        enabled: true
        paths:
          - /var/log/es/*.log

    output.elasticsearch:
      hosts: ["http://${BENCH_PARAM_MONITORING_SERVICE_NAME}-typo:9200"]

    logging.to_files: false
    logging.to_syslog: false
