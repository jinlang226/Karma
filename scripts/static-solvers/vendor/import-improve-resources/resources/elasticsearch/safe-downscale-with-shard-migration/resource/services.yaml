apiVersion: v1
kind: Service
metadata:
  name: ${BENCH_PARAM_CLUSTER_PREFIX}
  labels:
    app: ${BENCH_PARAM_CLUSTER_PREFIX}
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: ${BENCH_PARAM_CLUSTER_PREFIX}
  ports:
    - name: transport
      port: 9300
      targetPort: 9300
---
apiVersion: v1
kind: Service
metadata:
  name: ${BENCH_PARAM_HTTP_SERVICE_NAME}
  labels:
    app: ${BENCH_PARAM_CLUSTER_PREFIX}
spec:
  type: ClusterIP
  selector:
    app: ${BENCH_PARAM_CLUSTER_PREFIX}
  ports:
    - name: http
      port: 9200
      targetPort: 9200
