apiVersion: v1
kind: Pod
metadata:
  name: curl-test
spec:
  containers:
    - name: curl
      image: curlimages/curl:8.6.0
      command: ["sleep", "infinity"]
      volumeMounts:
        - name: ${BENCH_PARAM_HTTP_CA_CONFIGMAP_NAME}
          mountPath: /etc/es-http-ca
          readOnly: true
  volumes:
    - name: ${BENCH_PARAM_HTTP_CA_CONFIGMAP_NAME}
      configMap:
        name: ${BENCH_PARAM_HTTP_CA_CONFIGMAP_NAME}
        items:
          - key: ca.crt
            path: ca.crt
