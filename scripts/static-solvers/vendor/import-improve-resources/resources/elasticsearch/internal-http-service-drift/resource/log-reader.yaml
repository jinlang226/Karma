apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${BENCH_PARAM_LOG_READER_DEPLOYMENT}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ${BENCH_PARAM_LOG_READER_DEPLOYMENT}
  template:
    metadata:
      labels:
        app: ${BENCH_PARAM_LOG_READER_DEPLOYMENT}
    spec:
      containers:
        - name: reader
          image: curlimages/curl:8.5.0
          command:
            - /bin/sh
            - -c
            - |
              set -e
              count=$(curl -s --max-time 5 \
                http://${BENCH_PARAM_PROD_SERVICE_NAME}:9200/${BENCH_PARAM_INDEX_NAME}/_count \
                | sed -n 's/.*"count":[ ]*\([0-9]*\).*/\1/p')
              if [ -z "$count" ]; then
                echo "log-reader: failed to parse count from ${BENCH_PARAM_PROD_SERVICE_NAME}"
                exit 1
              fi
              if [ "$count" -lt ${BENCH_PARAM_MIN_DOC_COUNT} ]; then
                echo "log-reader: expected >=${BENCH_PARAM_MIN_DOC_COUNT} docs from ${BENCH_PARAM_PROD_SERVICE_NAME}, got $count"
                exit 1
              fi
              echo "log-reader: ok count=$count"
              sleep infinity
