apiVersion: v1
kind: ConfigMap
metadata:
  name: ${BENCH_PARAM_CONFIGMAP_NAME}
data:
  elasticsearch.yml: |
    cluster.name: ${BENCH_PARAM_CLUSTER_PREFIX}
    node.name: ${POD_NAME}
    node.roles: [ master, data, ingest ]
    network.host: 0.0.0.0
    discovery.seed_hosts:
      - ${BENCH_PARAM_CLUSTER_PREFIX}-0.${BENCH_PARAM_CLUSTER_PREFIX}
      - ${BENCH_PARAM_CLUSTER_PREFIX}-1.${BENCH_PARAM_CLUSTER_PREFIX}
      - ${BENCH_PARAM_CLUSTER_PREFIX}-2.${BENCH_PARAM_CLUSTER_PREFIX}
    cluster.initial_master_nodes:
      - ${BENCH_PARAM_CLUSTER_PREFIX}-0
      - ${BENCH_PARAM_CLUSTER_PREFIX}-1
      - ${BENCH_PARAM_CLUSTER_PREFIX}-2
    node.store.allow_mmap: false
    xpack.security.enabled: false
    xpack.security.http.ssl.enabled: false
    xpack.security.transport.ssl.enabled: false
