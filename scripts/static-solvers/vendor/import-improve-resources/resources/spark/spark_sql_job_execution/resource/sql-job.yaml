apiVersion: batch/v1
kind: Job
metadata:
  name: __JOB_NAME__
  namespace: __NAMESPACE__
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: __JOB_NAME__
    spec:
      serviceAccountName: __SERVICE_ACCOUNT__
      restartPolicy: Never
      containers:
      - name: spark-sql
        image: __SPARK_IMAGE__
        command:
        - /bin/bash
        - -c
        - |
          set -e
          export SPARK_LOCAL_IP=$(hostname -i)
          cat > /tmp/query.sql <<'SQL'
          SELECT concat('spark_sql_ok:', CAST(SUM(value) AS STRING)) AS summary
          FROM VALUES (1), (2), (3), (4) AS numbers(value);
          SQL
          output=$(/opt/spark/bin/spark-sql --master local[2] -f /tmp/query.sql 2>&1)
          echo "${output}"
          echo "${output}" | grep -q 'spark_sql_ok:10'
          echo "spark_sql_query_verified"
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
