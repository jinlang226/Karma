apiVersion: v1
kind: ServiceAccount
metadata:
  name: __SERVICE_ACCOUNT__
  namespace: __NAMESPACE__
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: __SERVICE_ACCOUNT__-role
  namespace: __NAMESPACE__
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log", "services", "configmaps", "persistentvolumeclaims", "secrets"]
  verbs: ["create", "get", "list", "watch", "delete", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: __SERVICE_ACCOUNT__-role-binding
  namespace: __NAMESPACE__
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: __SERVICE_ACCOUNT__-role
subjects:
- kind: ServiceAccount
  name: __SERVICE_ACCOUNT__
  namespace: __NAMESPACE__
