<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>K8s Benchmark Debug UI</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <div class="page">
      <header class="header">
        <div>
          <p class="eyebrow">K8s Benchmark Debug UI</p>
          <h1 id="page-title">Manual Runner</h1>
          <p class="subtitle" id="page-subtitle">Select a service, run setup, and verify test cases without an agent.</p>
          <div class="top-nav">
            <button class="button ghost nav-btn active" id="nav-manual" type="button">Manual Runner</button>
            <button class="button ghost nav-btn" id="nav-workflow" type="button">Workflow</button>
            <button class="button ghost nav-btn" id="nav-judge" type="button">Judge</button>
          </div>
        </div>
        <div class="cluster" id="cluster-status"></div>
      </header>

      <main id="app"></main>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
