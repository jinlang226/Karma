type: smoke-verification-fail-cleanup-gate
targetApp: local
numAppInstance: 0
maxAttempts: 1

preOperationCommands:
  - command: ["bash", "-lc", "echo preop ok"]
    sleep: 0
    timeout_sec: 5

oracle:
  verify:
    commands:
      - command: ["bash", "-lc", "echo verification failing; exit 1"]
        sleep: 0
        timeout_sec: 5

cleanUpCommands:
  - command: ["bash", "-lc", "sleep 5"]
    sleep: 0
    timeout_sec: 10
