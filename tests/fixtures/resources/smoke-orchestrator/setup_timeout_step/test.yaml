type: smoke-setup-timeout-step
targetApp: local
numAppInstance: 0
maxAttempts: 1

preOperationCommands:
  - command: ["bash", "-lc", "echo smoke setup_timeout_step start"]
    sleep: 0
    timeout_sec: 5
  - command: ["bash", "-lc", "sleep 5"]
    sleep: 0
    timeout_sec: 1

oracle:
  verify:
    commands:
      - command: ["bash", "-lc", "echo should-not-run"]
        sleep: 0

cleanUpCommands:
  - command: ["bash", "-lc", "sleep 2"]
    sleep: 0
    timeout_sec: 5
