type: smoke-setup-auto-timeout
targetApp: local
numAppInstance: 0
maxAttempts: 1

preOperationCommands:
  - command: ["bash", "-lc", "sleep 2"]
    sleep: 0
    timeout_sec: 5

oracle:
  verify:
    commands:
      - command: ["bash", "-lc", "echo verify ok"]
        sleep: 0
        timeout_sec: 5

cleanUpCommands:
  - command: ["bash", "-lc", "sleep 1"]
    sleep: 0
    timeout_sec: 5
