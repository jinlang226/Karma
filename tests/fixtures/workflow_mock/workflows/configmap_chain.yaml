apiVersion: benchmark/v1
kind: Workflow
metadata:
  name: workflow-mock-configmap-chain
spec:
  prompt_mode: progressive
  namespaces:
    - cluster_a
  stages:
    - id: stage_seed
      service: workflow-mock
      case: stage_seed
      case_path: ../resources/workflow-mock/stage_seed/test.yaml
      namespaces: [cluster_a]
      max_attempts: 2
    - id: stage_scale
      service: workflow-mock
      case: stage_scale
      case_path: ../resources/workflow-mock/stage_scale/test.yaml
      namespaces: [cluster_a]
      param_overrides:
        expected_replicas: 4
      max_attempts: 2
    - id: stage_finalize
      service: workflow-mock
      case: stage_finalize
      case_path: ../resources/workflow-mock/stage_finalize/test.yaml
      namespaces: [cluster_a]
      param_overrides:
        expected_replicas: 4
      max_attempts: 2
