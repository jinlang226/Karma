type: workflow-mock-stage-finalize
targetApp: mock-configmap
numAppInstance: 1
params:
  definitions:
    pre_phase:
      type: string
      default: alpha
    expected_phase:
      type: string
      default: omega
    expected_replicas:
      type: int
      default: 5
      min: 1
      max: 9
    expected_migration:
      type: string
      default: done
preconditionUnits:
  - id: wf_state_phase_alpha
    probe:
      commands:
        - command:
            [
              "/bin/sh",
              "-c",
              "kubectl -n \"$BENCH_NAMESPACE\" get configmap wf-state -o jsonpath={.data.phase} | grep -qx '{{params.pre_phase}}'",
            ]
    apply:
      commands:
        - command:
            [
              "kubectl",
              "apply",
              "-f",
              "tests/fixtures/workflow_mock/resources/workflow-mock/stage_scale/resource/state-alpha.yaml",
            ]
    verify:
      commands:
        - command:
            [
              "/bin/sh",
              "-c",
              "kubectl -n \"$BENCH_NAMESPACE\" get configmap wf-state -o jsonpath={.data.phase} | grep -qx '{{params.pre_phase}}'",
            ]
      retries: 6
      interval_sec: 2

  - id: wf_state_replicas_five
    probe:
      commands:
        - command:
            [
              "/bin/sh",
              "-c",
              "kubectl -n \"$BENCH_NAMESPACE\" get configmap wf-state -o jsonpath={.data.replicas} | grep -qx '{{params.expected_replicas}}'",
            ]
    apply:
      commands:
        - command:
            [
              "python3",
              "tests/fixtures/workflow_mock/resources/workflow-mock/stage_scale/solver/solve.py",
              "--phase",
              "{{params.pre_phase}}",
              "--replicas",
              "{{params.expected_replicas}}",
            ]
    verify:
      commands:
        - command:
            [
              "/bin/sh",
              "-c",
              "kubectl -n \"$BENCH_NAMESPACE\" get configmap wf-state -o jsonpath={.data.replicas} | grep -qx '{{params.expected_replicas}}'",
            ]
      retries: 6
      interval_sec: 2

  - id: wf_target_ready
    probe:
      commands:
        - command: ["kubectl", "get", "configmap", "wf-target"]
    apply:
      commands:
        - command:
            [
              "kubectl",
              "apply",
              "-f",
              "tests/fixtures/workflow_mock/resources/workflow-mock/stage_finalize/resource/target.yaml",
            ]
    verify:
      commands:
        - command: ["kubectl", "get", "configmap", "wf-target"]
      retries: 6
      interval_sec: 2

detailedInstructions: |
  Finalize the workflow on the assigned namespace.
  Update ConfigMap `wf-state` so that:
  - `data.phase={{params.expected_phase}}`
  - `data.replicas={{params.expected_replicas}}` (must remain unchanged)
  - `data.migration={{params.expected_migration}}`

operatorContext: |
  kubectl -n ${BENCH_NAMESPACE} get configmap wf-state -o yaml
  kubectl -n ${BENCH_NAMESPACE} get configmap wf-target -o yaml

oracle:
  verify:
    commands:
      - command:
          [
            "python3",
            "tests/fixtures/workflow_mock/resources/workflow-mock/stage_finalize/oracle/oracle.py",
            "--expected-phase",
            "{{params.expected_phase}}",
            "--expected-replicas",
            "{{params.expected_replicas}}",
            "--expected-migration",
            "{{params.expected_migration}}",
          ]
