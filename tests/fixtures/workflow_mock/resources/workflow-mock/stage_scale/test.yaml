type: workflow-mock-stage-scale
targetApp: mock-configmap
numAppInstance: 1
params:
  definitions:
    expected_phase:
      type: string
      default: alpha
    expected_replicas:
      type: int
      default: 5
      min: 1
      max: 9
preconditionUnits:
  - id: wf_state_phase_alpha
    probe:
      commands:
        - command:
            [
              "/bin/sh",
              "-c",
              "kubectl -n \"$BENCH_NAMESPACE\" get configmap wf-state -o jsonpath={.data.phase} | grep -qx '{{params.expected_phase}}'",
            ]
    apply:
      commands:
        - command:
            [
              "kubectl",
              "apply",
              "-f",
              "tests/fixtures/workflow_mock/resources/workflow-mock/stage_scale/resource/state-alpha.yaml",
            ]
    verify:
      commands:
        - command:
            [
              "/bin/sh",
              "-c",
              "kubectl -n \"$BENCH_NAMESPACE\" get configmap wf-state -o jsonpath={.data.phase} | grep -qx '{{params.expected_phase}}'",
            ]
      retries: 6
      interval_sec: 2

  - id: wf_audit_ready
    probe:
      commands:
        - command: ["kubectl", "get", "configmap", "wf-audit"]
    apply:
      commands:
        - command:
            [
              "kubectl",
              "apply",
              "-f",
              "tests/fixtures/workflow_mock/resources/workflow-mock/stage_scale/resource/audit.yaml",
            ]
    verify:
      commands:
        - command: ["kubectl", "get", "configmap", "wf-audit"]
      retries: 6
      interval_sec: 2

detailedInstructions: |
  Continue operating on the assigned namespace.
  Update ConfigMap `wf-state` so that:
  - `data.phase={{params.expected_phase}}`
  - `data.replicas={{params.expected_replicas}}`

operatorContext: |
  kubectl -n ${BENCH_NAMESPACE} get configmap wf-state -o yaml
  kubectl -n ${BENCH_NAMESPACE} get configmap wf-audit -o yaml

oracle:
  verify:
    commands:
      - command:
          [
            "python3",
            "tests/fixtures/workflow_mock/resources/workflow-mock/stage_scale/oracle/oracle.py",
            "--expected-phase",
            "{{params.expected_phase}}",
            "--expected-replicas",
            "{{params.expected_replicas}}",
          ]
