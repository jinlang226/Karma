type: workflow-mock-stage-seed
targetApp: mock-configmap
numAppInstance: 1
params:
  definitions:
    expected_phase:
      type: string
      default: alpha
preconditionUnits:
  - id: wf_state_seeded
    probe:
      commands:
        - command:
            [
              "/bin/sh",
              "-c",
              "kubectl -n \"$BENCH_NAMESPACE\" get configmap wf-state -o jsonpath={.data.phase} | grep -qx seed",
            ]
    apply:
      commands:
        - command:
            [
              "kubectl",
              "apply",
              "-f",
              "tests/fixtures/workflow_mock/resources/workflow-mock/stage_seed/resource/state-seed.yaml",
            ]
    verify:
      commands:
        - command:
            [
              "/bin/sh",
              "-c",
              "kubectl -n \"$BENCH_NAMESPACE\" get configmap wf-state -o jsonpath={.data.phase} | grep -qx seed",
            ]
      retries: 6
      interval_sec: 2

detailedInstructions: |
  A mock service is configured through ConfigMap `wf-state` in the assigned namespace.
  Set `data.phase={{params.expected_phase}}`.

  Requirements:
  - ConfigMap `wf-state` exists.
  - `wf-state.data.phase` is exactly `{{params.expected_phase}}`.

operatorContext: |
  kubectl -n ${BENCH_NAMESPACE} get configmap wf-state -o yaml

oracle:
  verify:
    commands:
      - command:
          [
            "python3",
            "tests/fixtures/workflow_mock/resources/workflow-mock/stage_seed/oracle/oracle.py",
            "--expected-phase",
            "{{params.expected_phase}}",
          ]
