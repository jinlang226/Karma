# ray/adversarial/block_gcs_port
#
# Applies a NetworkPolicy that denies all ingress to the ray-head pod on the
# GCS port (6379). This simulates a security-team automation that tightened
# namespace network rules and inadvertently blocked Ray's internal cluster
# communication bus. Workers can no longer register, clients cannot connect,
# and job submissions hang. The agent must detect the blocking policy and
# remove or correct it to restore cluster connectivity.
#
# Deploy: apply a deny-all-to-gcs NetworkPolicy.
# Lift:   delete the policy if the agent has not already removed it.

params:
  namespace:
    default: ray
    description: Namespace the Ray cluster runs in.
  policy_name:
    default: block-ray-gcs
    description: Name of the adversarial NetworkPolicy that blocks port 6379.

deploy:
  on_probe_fail: error
  probe:
    - command: "kubectl -n {{params.namespace}} get deployment ray-head"
      timeout_sec: 10
  apply:
    - command: >-
        kubectl -n {{params.namespace}} apply -f - <<'EOF'
        apiVersion: networking.k8s.io/v1
        kind: NetworkPolicy
        metadata:
          name: {{params.policy_name}}
          namespace: {{params.namespace}}
        spec:
          podSelector:
            matchLabels:
              app.kubernetes.io/component: head
          policyTypes:
          - Ingress
          ingress:
          - ports:
            - port: 8265
            - port: 10001
        EOF
      timeout_sec: 20
  verify:
    - command: "kubectl -n {{params.namespace}} get networkpolicy {{params.policy_name}}"
      timeout_sec: 10

lift:
  on_probe_fail: skip
  probe:
    - command: "kubectl -n {{params.namespace}} get networkpolicy {{params.policy_name}}"
      timeout_sec: 10
  apply:
    - command: "kubectl -n {{params.namespace}} delete networkpolicy {{params.policy_name}}"
      timeout_sec: 20
  verify:
    - command: >-
        /bin/sh -c "! kubectl -n {{params.namespace}} get networkpolicy {{params.policy_name}} 2>/dev/null"
      timeout_sec: 10

prompt_hints:
  deploy: |
    Note: a NetworkPolicy may have been applied to this namespace that restricts
    traffic to the Ray head. Verify port 6379 (GCS) is reachable before assuming
    workers can connect.
  active: |
    Reminder: a network restriction introduced earlier may still be blocking Ray
    internal communication. Confirm no obstructive NetworkPolicy is present before
    concluding the cluster is healthy.
