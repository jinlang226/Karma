# cockroachdb/adversarial/throttle_rebalance_rate
#
# Slams kv.snapshot_rebalance.max_rate to its lowest legal value (1 MiB)
# while the agent is tuning cluster settings for throughput. The cluster
# appears to accept SQL but rebalancing is effectively stalled (128x below
# the expected 128 MiB target). The agent must detect the drift and restore
# a healthy rate so the cluster can move data at the expected pace. This
# simulates an ops automation or misconfigured playbook stomping a tuning
# change mid-flight.
#
# NOTE: CockroachDB rejects any value below 1.0 MiB for this setting
# ("cannot be set to a value lower than 1.0 MiB"), so 1 MiB is the most
# crippling value that the cluster will actually accept.
#
# Deploy: SET CLUSTER SETTING to a crippled value.
# Lift:   reset to a healthy default if the agent has not already fixed it.

params:
  namespace:
    default: cockroachdb
    description: Namespace the CockroachDB cluster runs in.
  pod:
    default: crdb-cluster-0
    description: Pod to exec the SQL mutation through.
  wrong_rate:
    default: 1MiB
    description: Crippled rebalance rate injected by the adversary (CockroachDB's legal minimum).
  restore_rate:
    default: 128MiB
    description: Healthy rebalance rate restored on lift if the agent did not fix it.

deploy:
  on_probe_fail: error
  probe:
    - command: "kubectl -n {{params.namespace}} get pod {{params.pod}}"
      timeout_sec: 10
  apply:
    - command: >-
        /bin/sh -c 'if kubectl -n {{params.namespace}} exec {{params.pod}} -- test -f /cockroach/cockroach-certs/ca.crt 2>/dev/null;
        then F=--certs-dir=/cockroach/cockroach-certs; else F=--insecure; fi;
        kubectl -n {{params.namespace}} exec {{params.pod}} --
        ./cockroach sql $F -e
        "SET CLUSTER SETTING kv.snapshot_rebalance.max_rate = '"'"'{{params.wrong_rate}}'"'"';"'
      timeout_sec: 20
  verify:
    - command: >-
        /bin/sh -c 'if kubectl -n {{params.namespace}} exec {{params.pod}} -- test -f /cockroach/cockroach-certs/ca.crt 2>/dev/null;
        then F=--certs-dir=/cockroach/cockroach-certs; else F=--insecure; fi;
        kubectl -n {{params.namespace}} exec {{params.pod}} --
        ./cockroach sql $F --format=tsv -e
        "SHOW CLUSTER SETTING kv.snapshot_rebalance.max_rate;"
        | tail -1 | grep -q "1.0 MiB"'
      timeout_sec: 15

lift:
  on_probe_fail: skip
  probe:
    - command: >-
        /bin/sh -c 'if kubectl -n {{params.namespace}} exec {{params.pod}} -- test -f /cockroach/cockroach-certs/ca.crt 2>/dev/null;
        then F=--certs-dir=/cockroach/cockroach-certs; else F=--insecure; fi;
        kubectl -n {{params.namespace}} exec {{params.pod}} --
        ./cockroach sql $F --format=tsv -e
        "SHOW CLUSTER SETTING kv.snapshot_rebalance.max_rate;"
        | tail -1 | grep -q "1.0 MiB"'
      timeout_sec: 15
  apply:
    - command: >-
        /bin/sh -c 'if kubectl -n {{params.namespace}} exec {{params.pod}} -- test -f /cockroach/cockroach-certs/ca.crt 2>/dev/null;
        then F=--certs-dir=/cockroach/cockroach-certs; else F=--insecure; fi;
        kubectl -n {{params.namespace}} exec {{params.pod}} --
        ./cockroach sql $F -e
        "SET CLUSTER SETTING kv.snapshot_rebalance.max_rate = '"'"'{{params.restore_rate}}'"'"';"'
      timeout_sec: 20
  verify:
    - command: "kubectl -n {{params.namespace}} get pod {{params.pod}}"
      timeout_sec: 10

prompt_hints:
  deploy: |
    Note: an external process may have altered cluster-level settings during this
    task. Re-verify the live value of kv.snapshot_rebalance.max_rate before
    assuming the setting is correct.
  active: |
    Reminder: kv.snapshot_rebalance.max_rate may have been changed by an external
    actor. Confirm the live setting matches the target before finishing.
