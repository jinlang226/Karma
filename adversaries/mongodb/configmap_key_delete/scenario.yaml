# mongodb/adversarial/configmap_key_delete
#
# Deletes the `mongod.conf` key from the `mongod-config` ConfigMap while the
# agent is working, simulating a misconfigured CI pipeline that wipes a known
# config key. The pods will crash-loop on the next rolling restart because the
# ConfigMap mount loses its expected file. The agent must detect the missing key
# and restore a valid mongod.conf to the ConfigMap before rolling out.
#
# Targets the literal `mongodb` namespace (mongod-config-update uses -n mongodb).
# The ConfigMap is named `mongod-config` as deployed by that case.
#
# Deploy: snapshot the live mongod.conf into a backup ConfigMap (ADV8), then
#         patch the ConfigMap to remove the mongod.conf key.
# Lift:   if the agent has not already restored it, restore the EXACT deploy-time
#         snapshot; only when the snapshot is missing, fall back to the documented
#         case baseline (cases/mongodb/mongod-config-update/resource/configmap.yaml).
#         Never a hand-rolled minimal template (ADV10): the case's real mongod.conf
#         carries replSetName/security.keyFile/authorization/bindIpAll and the zlib
#         journalCompressor, all of which a minimal rewrite would silently drop.

params:
  namespace:
    default: mongodb
    description: Namespace where the mongod-config ConfigMap lives.
  configmap_name:
    default: mongod-config
    description: ConfigMap that holds the mongod configuration file.

deploy:
  on_probe_fail: error
  probe:
    - command: "kubectl -n {{params.namespace}} get configmap {{params.configmap_name}}"
      timeout_sec: 10
  apply:
    # ADV8: snapshot the pre-injection mongod.conf into a -adv-backup ConfigMap
    # BEFORE deleting the key, so lift restores exactly the config the workflow
    # had (a prior stage may have legitimately changed verbosity / slowms /
    # journalCompressor). Never overwrite an existing non-empty value with a
    # template.
    - command: |
        /bin/sh -c '
        conf=$(kubectl -n {{params.namespace}} get configmap {{params.configmap_name}} -o jsonpath="{.data.mongod\.conf}" 2>/dev/null)
        if [ -n "$conf" ]; then
          f=$(mktemp)
          printf "%s" "$conf" > "$f"
          kubectl -n {{params.namespace}} create configmap {{params.configmap_name}}-adv-backup \
            --from-file=mongod.conf="$f" \
            --dry-run=client -o yaml | kubectl -n {{params.namespace}} apply -f -
          rm -f "$f"
        fi
        '
      timeout_sec: 30
    - command: >-
        kubectl -n {{params.namespace}} patch configmap {{params.configmap_name}}
        --type=json -p='[{"op":"remove","path":"/data/mongod.conf"}]'
      timeout_sec: 20
  verify:
    - command: >-
        /bin/sh -c "! kubectl -n {{params.namespace}} get configmap {{params.configmap_name}}
        -o jsonpath='{.data.mongod\.conf}' 2>/dev/null | grep -q systemLog"
      timeout_sec: 10

lift:
  on_probe_fail: skip
  probe:
    - command: >-
        /bin/sh -c "! kubectl -n {{params.namespace}} get configmap {{params.configmap_name}}
        -o jsonpath='{.data.mongod\.conf}' 2>/dev/null | grep -q systemLog"
      timeout_sec: 10
  apply:
    # ADV8: restore the EXACT pre-injection snapshot taken at deploy. Only when
    # the backup is missing/empty, fall back to the documented case baseline
    # manifest (ADV10) -- never a hand-rolled minimal template, which would drop
    # replSetName/security/net keys and flip the compressor, crash-looping the
    # set on its next roll and failing prior stages' regression sweep.
    - command: |
        /bin/sh -c '
        conf=$(kubectl -n {{params.namespace}} get configmap {{params.configmap_name}}-adv-backup -o jsonpath="{.data.mongod\.conf}" 2>/dev/null)
        if [ -n "$conf" ]; then
          f=$(mktemp)
          printf "%s" "$conf" > "$f"
          kubectl -n {{params.namespace}} create configmap {{params.configmap_name}} \
            --from-file=mongod.conf="$f" \
            --dry-run=client -o yaml | kubectl -n {{params.namespace}} apply -f -
          rm -f "$f"
        else
          kubectl -n {{params.namespace}} apply -f cases/mongodb/mongod-config-update/resource/configmap.yaml
        fi
        '
      timeout_sec: 30
    - command: "kubectl -n {{params.namespace}} delete configmap {{params.configmap_name}}-adv-backup --ignore-not-found"
      timeout_sec: 20
  verify:
    - command: >-
        kubectl -n {{params.namespace}} get configmap {{params.configmap_name}}
        -o jsonpath='{.data.mongod\.conf}'
      timeout_sec: 10

prompt_hints:
  deploy: |
    Note: an external process may modify ConfigMap contents during this task.
    Verify the mongod configuration is intact before applying and after rolling out changes.
  active: |
    Reminder: a ConfigMap key may have been removed by an external process.
    Check that mongod.conf exists in the ConfigMap and pods can mount it correctly.
