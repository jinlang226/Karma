# mongodb/adversarial/network_policy_block
#
# Applies a deny-all NetworkPolicy to the mongodb namespace while the agent is
# working, blocking port 27017 between replica set members. This simulates a
# misconfigured security policy pushed by a platform team. Elections stall, the
# primary may step down, and inter-member replication stops. The agent must
# detect that the NetworkPolicy is blocking traffic and remove or correct it to
# restore replication.
#
# Targets the literal `mongodb` namespace.
#
# Deploy: apply a NetworkPolicy that selects all pods and allows no ingress on
#         port 27017 from replica-set peers.
# Lift:   delete the blocking NetworkPolicy if the agent has not already done so.

params:
  namespace:
    default: mongodb
    description: Namespace where the blocking NetworkPolicy is applied.
  policy_name:
    default: adversary-deny-mongo
    description: Name of the injected NetworkPolicy that blocks MongoDB traffic.

deploy:
  on_probe_fail: error
  probe:
    - command: "kubectl -n {{params.namespace}} get namespace {{params.namespace}}"
      timeout_sec: 10
  apply:
    - command: >-
        /bin/sh -c "cat <<'EOF' | kubectl apply -f -
        apiVersion: networking.k8s.io/v1
        kind: NetworkPolicy
        metadata:
          name: {{params.policy_name}}
          namespace: {{params.namespace}}
        spec:
          podSelector: {}
          policyTypes:
          - Ingress
          ingress: []
        EOF"
      timeout_sec: 20
  verify:
    # ADV11(b): existence alone is doubly vacuous -- assert the policy actually
    # SELECTS >=1 running pod (podSelector {} = every pod in the namespace, so
    # any Running pod counts), and best-effort probe that a cross-member
    # connect to 27017 now fails. CNI caveat: kind's default CNI (kindnetd)
    # does NOT enforce NetworkPolicy, so the connect can still succeed there;
    # the selector check is the accepted minimum and the connect probe is kept
    # as evidence on stderr only, never a gate.
    - command: |
        /bin/sh -c '
        NS={{params.namespace}}
        kubectl -n "$NS" get networkpolicy {{params.policy_name}} >/dev/null 2>&1 || { echo "policy missing" >&2; exit 1; }
        n=$(kubectl -n "$NS" get pods --field-selector=status.phase=Running -o name 2>/dev/null | wc -l)
        [ "${n:-0}" -ge 1 ] || { echo "network_policy_block verify: policy selects zero running pods (vacuous fault)" >&2; exit 1; }
        pod=$(kubectl -n "$NS" get pods --field-selector=status.phase=Running -o jsonpath="{.items[0].metadata.name}" 2>/dev/null)
        peer_ip=$(kubectl -n "$NS" get pods --field-selector=status.phase=Running -o jsonpath="{.items[1].status.podIP}" 2>/dev/null)
        if [ -n "$pod" ] && [ -n "$peer_ip" ]; then
          if kubectl -n "$NS" exec "$pod" -- mongosh --quiet "mongodb://$peer_ip:27017/?directConnection=true&serverSelectionTimeoutMS=4000" --eval "db.hello().ok" >/dev/null 2>&1; then
            echo "note: cross-member connect to 27017 still succeeds -- non-enforcing CNI (kind default); accepting on the selector check" >&2
          else
            echo "cross-member connect to 27017 blocked as expected" >&2
          fi
        fi
        exit 0
        '
      timeout_sec: 60

lift:
  on_probe_fail: skip
  probe:
    - command: "kubectl -n {{params.namespace}} get networkpolicy {{params.policy_name}} --ignore-not-found"
      timeout_sec: 10
  apply:
    - command: "kubectl -n {{params.namespace}} delete networkpolicy {{params.policy_name}} --ignore-not-found"
      timeout_sec: 20
  verify:
    - command: >-
        /bin/sh -c "! kubectl -n {{params.namespace}} get networkpolicy {{params.policy_name}} 2>/dev/null"
      timeout_sec: 10

prompt_hints:
  deploy: |
    Note: a NetworkPolicy restricting traffic may be applied to the namespace
    during this task. If replica set members cannot reach each other, check for
    NetworkPolicy objects that might block port 27017.
  active: |
    Reminder: a deny-all NetworkPolicy may still be in effect. Verify inter-member
    connectivity before declaring the replica set healthy.
