# nginx-ingress/scale_down_backend
#
# The backend Deployment that the Ingress routes to is scaled to 0 replicas —
# mimicking an accidental scale-down or a HPA misconfiguration that drains
# pods. Requests through the Ingress begin returning 502 Bad Gateway because
# there are no endpoints. The agent must detect the unhealthy state and scale
# the Deployment back up so traffic flows again.
params:
  namespace:
    default: demo
    description: Namespace the backend Deployment runs in.
  deployment_name:
    default: demo-app
    description: Deployment the adversary scales to zero.
  wrong_replicas:
    default: "0"
    description: Replica count the fault shrinks to.
  restore_replicas:
    default: "1"
    description: Healthy replica count restored on lift if the agent did not.

deploy:
  # skip (not error) when the target deployment is absent: the demo namespace's
  # backend set varies across a progressive workflow, so a target an earlier
  # stage planted may not be present at inject time. Skipping makes the injection
  # a benign no-op instead of failing the stage on a missing target (§3.3).
  on_probe_fail: skip
  probe:
    - command: "kubectl -n {{params.namespace}} get deployment {{params.deployment_name}}"
      timeout_sec: 10
  apply:
    - command: >-
        kubectl -n {{params.namespace}} scale deployment {{params.deployment_name}}
        --replicas={{params.wrong_replicas}}
      timeout_sec: 20
  verify:
    - command: >-
        /bin/sh -c "test \"$(kubectl -n {{params.namespace}} get deployment {{params.deployment_name}}
        -o jsonpath={.spec.replicas})\" = '{{params.wrong_replicas}}'"
      timeout_sec: 10

lift:
  on_probe_fail: skip
  probe:
    - command: >-
        /bin/sh -c "test \"$(kubectl -n {{params.namespace}} get deployment {{params.deployment_name}}
        -o jsonpath={.spec.replicas})\" = '{{params.wrong_replicas}}'"
      timeout_sec: 10
  apply:
    - command: >-
        kubectl -n {{params.namespace}} scale deployment {{params.deployment_name}}
        --replicas={{params.restore_replicas}}
      timeout_sec: 20
  verify:
    - command: "kubectl -n {{params.namespace}} get deployment {{params.deployment_name}}"
      timeout_sec: 10

prompt_hints:
  deploy: |
    Note: an external process may have changed the replica count of a backend Deployment.
    Verify that all Deployments referenced by Ingress rules have available endpoints.
  active: |
    Reminder: a backend Deployment may have been scaled to zero mid-task.
    Re-check Deployment readiness and endpoint availability before finishing.
