# nginx-ingress/corrupt_ingress_nginx_configmap
#
# A misconfigured CI pipeline (or a bad GitOps sync) patches the
# ingress-nginx-controller ConfigMap with an invalid log-format-upstream
# value, causing nginx to reload with broken configuration and start
# logging errors or emitting malformed access-log lines. The agent must
# detect the bad log-format-upstream entry and remove or correct it so
# the controller resumes healthy log output.
params:
  namespace:
    default: ingress-nginx
    description: Namespace the ingress-nginx-controller ConfigMap lives in.
  configmap_name:
    default: ingress-nginx-controller
    description: ConfigMap that holds ingress-nginx global configuration.
  bad_log_format:
    default: "INVALID LOG FORMAT $$$$"
    description: Corrupt log-format-upstream value injected by the fault.

deploy:
  on_probe_fail: error
  probe:
    - command: "kubectl -n {{params.namespace}} get configmap {{params.configmap_name}}"
      timeout_sec: 10
  apply:
    - command: >-
        kubectl -n {{params.namespace}} patch configmap {{params.configmap_name}}
        --type merge -p
        '{"data":{"log-format-upstream":"{{params.bad_log_format}}"}}'
      timeout_sec: 20
  verify:
    - command: >-
        /bin/sh -c "kubectl -n {{params.namespace}} get configmap {{params.configmap_name}}
        -o jsonpath={.data.log-format-upstream} | grep -q 'INVALID'"
      timeout_sec: 10

lift:
  on_probe_fail: skip
  probe:
    - command: >-
        /bin/sh -c "kubectl -n {{params.namespace}} get configmap {{params.configmap_name}}
        -o jsonpath={.data.log-format-upstream} | grep -q 'INVALID'"
      timeout_sec: 10
  apply:
    # No `|| true` (ADV6/Law 5): the lift probe above already gates on the
    # fault being present, so when this apply runs the key exists and the
    # remove patch must succeed -- a swallowed failure would leave the fault
    # active through the final sweep while reporting a clean lift.
    - command: >-
        kubectl -n {{params.namespace}} patch configmap {{params.configmap_name}}
        --type json -p '[{"op":"remove","path":"/data/log-format-upstream"}]'
      timeout_sec: 20
  verify:
    # ADV6: positively assert the fault is REMOVED -- the INVALID marker is no
    # longer in log-format-upstream (empty-tolerant: key absent or a value not
    # containing the marker both pass), not merely that the ConfigMap exists.
    - command: |
        /bin/sh -c '! kubectl -n {{params.namespace}} get configmap {{params.configmap_name}} -o jsonpath={.data.log-format-upstream} 2>/dev/null | grep -q INVALID'
      timeout_sec: 10

prompt_hints:
  deploy: |
    Note: the ingress-nginx-controller ConfigMap may have been patched with invalid data
    during this task. Check for controller reload errors if nginx behavior looks wrong.
  active: |
    Reminder: a bad log-format-upstream value may still be in the ingress-nginx-controller
    ConfigMap. Verify the ConfigMap contents if the controller is reloading unexpectedly.
