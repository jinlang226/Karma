# nginx-ingress/strip_rate_limit_annotation
#
# An external automation run (or a careless kubectl edit) removes the
# nginx.ingress.kubernetes.io/limit-rps annotation from the rate-api Ingress,
# silently dropping the rate limit. The agent must detect that the annotation
# is gone and re-apply the correct value so /api traffic is once again
# throttled to the expected QPS.
params:
  namespace:
    default: demo
    description: Namespace the Ingress lives in.
  ingress_name:
    default: rate-api
    description: Ingress whose rate-limit annotation will be stripped.
  annotation_key:
    default: nginx.ingress.kubernetes.io/limit-rps
    description: Annotation key that enforces the rate limit.
  limit_rps:
    default: "1"
    description: The correct limit value to restore on lift.

deploy:
  on_probe_fail: error
  probe:
    - command: "kubectl -n {{params.namespace}} get ingress {{params.ingress_name}}"
      timeout_sec: 10
  apply:
    - command: >-
        kubectl -n {{params.namespace}} annotate ingress {{params.ingress_name}}
        {{params.annotation_key}}-
        --overwrite
      timeout_sec: 20
  verify:
    # ADV6: positively assert the fault planted -- the annotation is ABSENT.
    # The old `... | grep -v .` form could NEVER exit 0 (an empty jsonpath
    # output has no lines to select; a present value line is dropped by -v);
    # use the empty-test form instead (the documented fixed pattern in
    # adversaries/demo/stale_configmap_value). The jsonpath key is derived
    # from params.annotation_key (dots escaped) so probe/verify always read
    # the same key the apply strips (no hardcoded drift).
    - command: |
        /bin/sh -c 'key=$(printf "%s" "{{params.annotation_key}}" | sed "s/\./\\\\./g"); [ -z "$(kubectl -n {{params.namespace}} get ingress {{params.ingress_name}} -o jsonpath="{.metadata.annotations.$key}")" ]'
      timeout_sec: 10

lift:
  on_probe_fail: skip
  probe:
    # ADV1: probe-pass => fault still present (annotation absent) => run the
    # restore apply; if the agent already re-applied the annotation the probe
    # fails and on_probe_fail=skip exits cleanly. Same empty-test form as
    # deploy.verify, key derived from params.annotation_key.
    - command: |
        /bin/sh -c 'key=$(printf "%s" "{{params.annotation_key}}" | sed "s/\./\\\\./g"); [ -z "$(kubectl -n {{params.namespace}} get ingress {{params.ingress_name}} -o jsonpath="{.metadata.annotations.$key}")" ]'
      timeout_sec: 10
  apply:
    - command: >-
        kubectl -n {{params.namespace}} annotate ingress {{params.ingress_name}}
        {{params.annotation_key}}={{params.limit_rps}}
        --overwrite
      timeout_sec: 20
  verify:
    # Assert the restore landed: the annotation equals the configured value
    # (key derived from params.annotation_key like probe/deploy.verify).
    - command: |
        /bin/sh -c 'key=$(printf "%s" "{{params.annotation_key}}" | sed "s/\./\\\\./g"); [ "$(kubectl -n {{params.namespace}} get ingress {{params.ingress_name}} -o jsonpath="{.metadata.annotations.$key}")" = "{{params.limit_rps}}" ]'
      timeout_sec: 10

prompt_hints:
  deploy: |
    Note: an external process may be modifying Ingress annotations during this task.
    Verify the live annotation state before assuming rate limiting is configured.
  active: |
    Reminder: a rate-limit annotation may have been removed from an Ingress mid-task.
    Re-check annotations before considering the task complete.
