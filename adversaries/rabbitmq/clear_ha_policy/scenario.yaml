# rabbitmq/adversarial/clear_ha_policy
#
# Clears the ha-all mirroring policy on the /app vhost mid-task, simulating a
# config drift that silently removes queue mirroring. The agent's policy-sync
# task must re-establish the policy rather than assume it is still present.
#
# Commands target the bench namespace explicitly (-n ${BENCH_NAMESPACE}) and
# exec into <cluster_prefix>-0.
#
# Deploy: clear the ha-all policy on the vhost (skipped cleanly when the
#         policy does not exist -- there is nothing to clear, ADV5).
# Lift:   no-op (the agent is expected to restore it; verify the cluster is up).

params:
  cluster_prefix:
    default: rabbitmq
    description: Name prefix of the RabbitMQ cluster; the adversary execs into <prefix>-0.
  vhost:
    default: /app
    description: Virtual host whose mirroring policy is cleared.
  policy_name:
    default: ha-all
    description: Name of the mirroring policy the adversary removes (the injected fault).

deploy:
  # ADV5: inject only where the target exists -- probe the POLICY itself, not
  # mere broker reachability. A reachability probe made the verify vacuous
  # (ADV6): when ha-all never existed, clear_policy removed nothing yet the
  # absence-verify "passed". Probe-pass (policy present) -> run the clear;
  # probe-fail + skip -> the injection no-ops cleanly when there is nothing
  # to clear (ADV1 polarity).
  on_probe_fail: skip
  probe:
    - command: |-
        /bin/sh -c "kubectl -n ${BENCH_NAMESPACE} exec {{params.cluster_prefix}}-0 -- rabbitmqctl -q list_policies -p {{params.vhost}} 2>/dev/null | grep -qw {{params.policy_name}}"
      timeout_sec: 30
  apply:
    - command: "kubectl -n ${BENCH_NAMESPACE} exec {{params.cluster_prefix}}-0 -- rabbitmqctl clear_policy -p {{params.vhost}} {{params.policy_name}}"
      timeout_sec: 30
  verify:
    # Meaningful removal check: the probe just confirmed the policy PRESENT,
    # so asserting absence here proves the injection actually changed state
    # (Law 5). Tolerant of an empty policy list (grep on the piped stream).
    - command: >-
        /bin/sh -c "! kubectl -n ${BENCH_NAMESPACE} exec {{params.cluster_prefix}}-0 -- rabbitmqctl list_policies -p {{params.vhost}}
        | grep -qw {{params.policy_name}}"
      timeout_sec: 30

lift:
  # Nothing to undo -- restoring the policy is the agent's job. Probe always
  # 'fails' so the (empty) apply is skipped; this just records cluster health.
  on_probe_fail: skip
  probe:
    - command: "/bin/sh -c false"
      timeout_sec: 5
  apply:
    - command: "kubectl -n ${BENCH_NAMESPACE} exec {{params.cluster_prefix}}-0 -- rabbitmqctl cluster_status"
      timeout_sec: 30
  verify:
    - command: "kubectl -n ${BENCH_NAMESPACE} exec {{params.cluster_prefix}}-0 -- rabbitmqctl cluster_status"
      timeout_sec: 30

prompt_hints:
  deploy: |
    Note: queue mirroring policies on this cluster may have been altered by an
    external change during this task. Verify the required policy is present on
    the vhost before concluding the cluster is correctly configured.
  active: |
    Reminder: a policy that should be in place may have been cleared earlier.
    Re-check the vhost's policies before finishing.
