# adversaries/elasticsearch/es-config-seed-hosts-drift
#
# The es-config ConfigMap's elasticsearch.yml is patched to replace the correct
# discovery.seed_hosts entries with invalid hostnames. This simulates configuration
# drift caused by a bad ConfigMap update (e.g., a templating error in a GitOps pipeline).
# When the StatefulSet pods are restarted or a new pod joins, it cannot discover peers
# and the cluster loses membership. The agent must detect the wrong seed_hosts, restore
# the correct entries in the ConfigMap, and trigger a rolling restart so nodes re-discover
# each other.

params:
  namespace:
    default: elasticsearch
    description: Namespace the Elasticsearch cluster runs in.
  configmap_name:
    default: es-config
    description: ConfigMap holding elasticsearch.yml with discovery.seed_hosts.
  cluster_prefix:
    default: es-cluster
    description: StatefulSet/headless-service name prefix for the Elasticsearch cluster.

deploy:
  on_probe_fail: error
  probe:
    - command: "kubectl -n {{params.namespace}} get configmap {{params.configmap_name}}"
      timeout_sec: 10
  apply:
    # ADV10/ADV8: snapshot the LIVE elasticsearch.yml verbatim into a backup
    # ConfigMap before drifting, so lift restores exactly the inherited config
    # (the old hardcoded template forced xpack.security.* back off, clobbering
    # any security an earlier stage enabled). Guarded so a re-run that finds the
    # drift already planted never snapshots the drifted blob. The adversary
    # runtime executes with shell=True (ONE shell parse), so $(...) expands once.
    - command: >-
        kubectl -n {{params.namespace}} get configmap {{params.configmap_name}}
        -o jsonpath='{.data.elasticsearch\.yml}' | grep -q 'invalid-host-'
        || kubectl -n {{params.namespace}} create configmap {{params.configmap_name}}-adv-backup
        --from-literal=elasticsearch.yml="$(kubectl -n {{params.namespace}} get configmap {{params.configmap_name}}
        -o jsonpath='{.data.elasticsearch\.yml}')"
        --dry-run=client -o yaml | kubectl -n {{params.namespace}} apply -f -
      timeout_sec: 20
    # ADV10: patch ONLY the discovery.seed_hosts list entries of the LIVE blob
    # (awk rewrites just the `- <host>` items under discovery.seed_hosts:); every
    # other line — security flags, roles, custom settings — passes through
    # untouched. The merge patch replaces only the elasticsearch.yml key.
    - command: >-
        kubectl -n {{params.namespace}} patch configmap {{params.configmap_name}} --type=merge
        -p "$(kubectl -n {{params.namespace}} create configmap {{params.configmap_name}}
        --from-literal=elasticsearch.yml="$(kubectl -n {{params.namespace}} get configmap {{params.configmap_name}}
        -o jsonpath='{.data.elasticsearch\.yml}'
        | awk '/^discovery.seed_hosts:/{print; inlist=1; n=0; next} inlist && /^[[:space:]]*-[[:space:]]/{n++; print "  - invalid-host-" n; next} {inlist=0; print}')"
        --dry-run=client -o json)"
      timeout_sec: 20
    # ADV7: a ConfigMap edit alone changes nothing live — the running pods keep
    # their loaded discovery config. Delete the pods with the StatefulSet
    # selector so they re-roll onto the drifted seed_hosts and lose discovery.
    - command: >-
        kubectl -n {{params.namespace}} delete pod -l app={{params.cluster_prefix}}
        --ignore-not-found=true --wait=false
      timeout_sec: 30
      sleep: 5
  verify:
    - command: >-
        /bin/sh -c "kubectl -n {{params.namespace}} get configmap {{params.configmap_name}}
        -o jsonpath='{.data.elasticsearch\\.yml}' | grep -q 'invalid-host-1'"
      timeout_sec: 15

lift:
  on_probe_fail: skip
  probe:
    - command: >-
        /bin/sh -c "kubectl -n {{params.namespace}} get configmap {{params.configmap_name}}
        -o jsonpath='{.data.elasticsearch\\.yml}' | grep -q 'invalid-host-1'"
      timeout_sec: 15
  apply:
    # ADV10/ADV8: restore the deploy-time snapshot VERBATIM (never a hardcoded
    # template). Guarded on the backup existing so a missing snapshot can never
    # clobber the live blob with an empty value; the `! get || patch` polarity
    # makes a missing backup a clean no-op (exit 0) instead of failing the lift
    # apply and skipping the pod re-roll below, while a real patch failure
    # still exits non-zero (Law 5: never silently swallow the restore).
    - command: >-
        ! kubectl -n {{params.namespace}} get configmap {{params.configmap_name}}-adv-backup >/dev/null 2>&1
        || kubectl -n {{params.namespace}} patch configmap {{params.configmap_name}} --type=merge
        -p "$(kubectl -n {{params.namespace}} create configmap {{params.configmap_name}}
        --from-literal=elasticsearch.yml="$(kubectl -n {{params.namespace}} get configmap {{params.configmap_name}}-adv-backup
        -o jsonpath='{.data.elasticsearch\.yml}')"
        --dry-run=client -o json)"
      timeout_sec: 20
    - command: "kubectl -n {{params.namespace}} delete configmap {{params.configmap_name}}-adv-backup --ignore-not-found=true"
      timeout_sec: 15
    # ADV7: re-roll the pods so the restored seed_hosts takes live effect.
    - command: >-
        kubectl -n {{params.namespace}} delete pod -l app={{params.cluster_prefix}}
        --ignore-not-found=true --wait=false
      timeout_sec: 30
      sleep: 5
  verify:
    # Positive assertion the drift is gone from the blob (ADV6; grep -q on a
    # possibly-empty stream exits non-zero only via the && exit 1 branch).
    - command: >-
        /bin/sh -c "kubectl -n {{params.namespace}} get configmap {{params.configmap_name}}
        -o jsonpath='{.data.elasticsearch\\.yml}' | grep -q 'invalid-host-' && exit 1; exit 0"
      timeout_sec: 15

prompt_hints:
  deploy: |
    Note: an external process may have modified the es-config ConfigMap during this task.
    Inspect discovery.seed_hosts in the ConfigMap before assuming node discovery is working.
  active: |
    Reminder: the es-config ConfigMap seed_hosts may have drifted to invalid values.
    Re-check the ConfigMap and restart affected pods if discovery is broken.
