# Continuous integration: run the committed, cluster-free unit suite on every
# push and pull request so regressions surface before they are merged.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit-tests:
    name: unit tests (no cluster)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package (with dev extras)
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/unit -q
