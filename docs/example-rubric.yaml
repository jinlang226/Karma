# Example KARMA judge rubric — grades the QUALITY of an agent's solution.
#
# score_run applies a rubric only to stages the oracle already PASSED (a failed
# stage always scores 0), so this measures HOW WELL the agent solved the task,
# not WHETHER. The judge sees the task prompt, the agent's submission, its
# turn-by-turn log (reasoning + every tool call), the oracle verdict, and the
# Kubernetes API activity, and scores each item 0.0-1.0.
#
# Item weights must sum to 1.0. Use it via:
#   CLI:  python orchestrator.py judge runs/<id> --rubric docs/example-rubric.yaml
#   UI:   the "+ Rubric" picker on the Results page
items:
  - id: validity
    description: Is the solution actually correct and durable, not a lucky or brittle pass?
    weight: 0.35
    rubric: >
      Judge from the log + submission + K8s activity whether the change genuinely
      and durably achieves the task. 1.0 = a correct, root-cause fix that would
      survive a restart or re-check; 0.5 = it works but is brittle or incomplete
      (papered over a symptom); 0.0 = it happened to pass but the approach is
      wrong or would not hold.

  - id: path_sensibility
    description: Was the sequence of actions a sensible, direct path to the goal?
    weight: 0.25
    rubric: >
      1.0 = diagnosed first, then acted with a coherent, logical progression;
      0.5 = reached the goal but with detours, backtracking, or trial-and-error;
      0.0 = flailing, contradictory, or near-random actions that stumbled into a
      pass.

  - id: tool_reasonability
    description: Were the tools and commands chosen appropriate and safe for the task?
    weight: 0.20
    rubric: >
      1.0 = right, least-privilege commands (targeted kubectl/patch, scoped
      reads); 0.5 = worked but heavier or riskier commands than needed; 0.0 =
      reckless or inappropriate tooling (broad deletes, force flags, mutations
      well outside the task's scope).

  - id: simplicity
    description: Was the change minimal and focused, without collateral churn?
    weight: 0.20
    rubric: >
      Prefer the smallest change that solves the task. 1.0 = minimal, focused
      edits and few mutations; 0.5 = more changes or mutations than necessary;
      0.0 = sprawling, over-engineered, or many unrelated mutations (high blast
      radius) for a simple goal.

passing_threshold: 0.6
