# Per-prompt-mode prologues.
#
# A short orientation prepended to the agent's assembled prompt so it understands
# the STRUCTURE of what it is being given (not the task itself). One entry per
# prompt mode; all three are required. Override with:
#   python orchestrator.py run-workflow <wf> --prompt-mode-prologues <this-file>
#
# Keep them mode-accurate: the concat_blind prologue must NOT reveal the current
# stage (that is the whole point of "blind" -- the agent locates itself).

progressive: |
  This is ONE stage of a multi-stage workflow that operates on a single live
  Kubernetes cluster whose state persists across stages. Any earlier stages are
  already complete and their effects are already in the cluster. Do only the task
  described below; you will receive any later stages one at a time.

concat_stateful: |
  Below are ALL stages of this workflow, in order, each headed with its position
  and a status: COMPLETED (already done), ACTIVE (do this one now), or UPCOMING (a
  later stage, shown for context so you can avoid actions it will have to undo).

  Work ONLY on the ACTIVE stage, then submit and STOP -- do NOT do UPCOMING stages
  yet. Each stage is checked immediately after you submit, so applying a later
  stage's change now fails an earlier check. COMPLETED stages' state persists;
  build on it rather than redoing it.

concat_blind: |
  Below are ALL tasks of this workflow, in order, each under a "=== STAGE k of n ==="
  header -- intentionally NOT labeled done/current/upcoming.

  Do EXACTLY ONE task per turn: the next not-yet-done one (identify it from the live
  cluster state and your submit history), then submit and STOP. Do NOT get ahead on
  later tasks -- each is checked immediately after you submit, so applying a later
  change now fails an earlier check. You will be invoked again for the next task.
