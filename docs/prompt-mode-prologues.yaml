# Per-prompt-mode prologues.
#
# A short orientation prepended to the agent's assembled prompt so it understands
# the STRUCTURE of what it is being given (not the task itself). One entry per
# prompt mode; all three are required. Override with:
#   python orchestrator.py run-workflow <wf> --prompt-mode-prologues <this-file>
#
# Keep them mode-accurate: the concat_blind prologue must NOT reveal the current
# stage (that is the whole point of "blind" -- the agent locates itself).

progressive: |
  This is ONE stage of a multi-stage workflow that operates on a single live
  Kubernetes cluster whose state persists across stages. Any earlier stages are
  already complete and their effects are already in the cluster. Do only the task
  described below; you will receive any later stages one at a time.

concat_stateful: |
  Below are ALL stages of this workflow, in order. Each is headed with its
  position and a status: COMPLETED (already done), ACTIVE (do this one now), or
  UPCOMING (a later stage, shown for context so you can avoid actions a later
  stage will have to undo). Work ONLY on the ACTIVE stage right now. The cluster
  state established by COMPLETED stages persists, so build on it rather than
  redoing it.

concat_blind: |
  Below are ALL tasks of this workflow, in order, each separated by a
  "=== STAGE k of n ===" header. They are intentionally NOT labeled
  done/current/upcoming: you must work out which task to do now by inspecting the
  live cluster state and your own submit history -- earlier tasks' effects already
  persist in the cluster. Do the appropriate next task, then submit; the cluster
  carries over to the following task.
