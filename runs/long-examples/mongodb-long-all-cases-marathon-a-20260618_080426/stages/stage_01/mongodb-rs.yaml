apiVersion: v1
kind: Service
metadata:
  name: mongodb-replica-svc
  namespace: mongodb
  labels:
    app: mongodb-replica
spec:
  clusterIP: None
  selector:
    app: mongodb-replica
  ports:
    - name: mongodb
      port: 27017
      targetPort: 27017
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb-replica
  namespace: mongodb
  labels:
    app: mongodb-replica
spec:
  serviceName: mongodb-replica-svc
  replicas: 3
  selector:
    matchLabels:
      app: mongodb-replica
  template:
    metadata:
      labels:
        app: mongodb-replica
    spec:
      terminationGracePeriodSeconds: 10
      initContainers:
        - name: copy-keyfile
          image: mongo:6.0
          command:
            - bash
            - -c
            - |
              cp /etc/mongodb-keyfile-src/keyfile /etc/mongodb-keyfile/keyfile
              chmod 400 /etc/mongodb-keyfile/keyfile
              chown 999:999 /etc/mongodb-keyfile/keyfile
          volumeMounts:
            - name: keyfile-src
              mountPath: /etc/mongodb-keyfile-src
            - name: keyfile
              mountPath: /etc/mongodb-keyfile
      containers:
        - name: mongodb
          image: mongo:6.0
          command:
            - mongod
            - "--replSet"
            - mongodb-replica
            - "--bind_ip_all"
            - "--auth"
            - "--keyFile"
            - /etc/mongodb-keyfile/keyfile
          ports:
            - containerPort: 27017
              name: mongodb
          volumeMounts:
            - name: data
              mountPath: /data/db
            - name: keyfile
              mountPath: /etc/mongodb-keyfile
          readinessProbe:
            exec:
              command:
                - bash
                - -c
                - "mongosh --quiet --eval 'db.adminCommand({ping:1})'"
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: keyfile-src
          secret:
            secretName: mongodb-keyfile
            defaultMode: 0400
        - name: keyfile
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
