---
apiVersion: v1
kind: Service
metadata:
  name: crdb-cluster
  namespace: cockroachdb
  labels:
    app.kubernetes.io/name: cockroachdb
    app.kubernetes.io/instance: crdb-cluster
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/name: cockroachdb
    app.kubernetes.io/instance: crdb-cluster
  ports:
    - name: grpc
      port: 26257
      targetPort: grpc
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: crdb-cluster-public
  namespace: cockroachdb
  labels:
    app.kubernetes.io/name: cockroachdb
    app.kubernetes.io/instance: crdb-cluster
spec:
  selector:
    app.kubernetes.io/name: cockroachdb
    app.kubernetes.io/instance: crdb-cluster
  ports:
    - name: grpc
      port: 26257
      targetPort: grpc
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: crdb-cluster-pdb
  namespace: cockroachdb
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: cockroachdb
      app.kubernetes.io/instance: crdb-cluster
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: crdb-cluster
  namespace: cockroachdb
  labels:
    app.kubernetes.io/name: cockroachdb
    app.kubernetes.io/instance: crdb-cluster
spec:
  replicas: 3
  serviceName: crdb-cluster
  selector:
    matchLabels:
      app.kubernetes.io/name: cockroachdb
      app.kubernetes.io/instance: crdb-cluster
  podManagementPolicy: Parallel
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cockroachdb
        app.kubernetes.io/instance: crdb-cluster
    spec:
      serviceAccountName: crdb-cluster-sa
      terminationGracePeriodSeconds: 60
      containers:
        - name: cockroachdb
          image: cockroachdb/cockroach:v24.1.0
          ports:
            - name: grpc
              containerPort: 26257
            - name: http
              containerPort: 8080
          command:
            - /bin/bash
            - -ecx
            - |
              exec /cockroach/cockroach start \
                --insecure \
                --advertise-host=$(hostname -f) \
                --http-addr=0.0.0.0:8080 \
                --listen-addr=0.0.0.0:26257 \
                --join=crdb-cluster-0.crdb-cluster.cockroachdb.svc.cluster.local:26257,crdb-cluster-1.crdb-cluster.cockroachdb.svc.cluster.local:26257,crdb-cluster-2.crdb-cluster.cockroachdb.svc.cluster.local:26257 \
                --cache=25% \
                --max-sql-memory=25%
          env:
            - name: COCKROACH_CHANNEL
              value: kubernetes-insecure
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /health?ready=1
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 2
          volumeMounts:
            - name: datadir
              mountPath: /cockroach/cockroach-data
  volumeClaimTemplates:
    - metadata:
        name: datadir
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
