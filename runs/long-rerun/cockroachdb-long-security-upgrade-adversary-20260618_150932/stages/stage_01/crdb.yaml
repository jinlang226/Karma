apiVersion: v1
kind: Service
metadata:
  name: crdb-cluster
  namespace: cockroachdb
  labels:
    app.kubernetes.io/instance: crdb-cluster
    app.kubernetes.io/name: cockroachdb
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/instance: crdb-cluster
    app.kubernetes.io/name: cockroachdb
  ports:
    - name: grpc
      port: 26257
      targetPort: 26257
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: crdb-cluster-public
  namespace: cockroachdb
  labels:
    app.kubernetes.io/instance: crdb-cluster
    app.kubernetes.io/name: cockroachdb
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/instance: crdb-cluster
    app.kubernetes.io/name: cockroachdb
  ports:
    - name: grpc
      port: 26257
      targetPort: 26257
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: crdb-cluster
  namespace: cockroachdb
  labels:
    app.kubernetes.io/instance: crdb-cluster
    app.kubernetes.io/name: cockroachdb
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: crdb-cluster
      app.kubernetes.io/name: cockroachdb
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: crdb-cluster
  namespace: cockroachdb
  labels:
    app.kubernetes.io/instance: crdb-cluster
    app.kubernetes.io/name: cockroachdb
spec:
  serviceName: crdb-cluster
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/instance: crdb-cluster
      app.kubernetes.io/name: cockroachdb
  podManagementPolicy: Parallel
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: crdb-cluster
        app.kubernetes.io/name: cockroachdb
    spec:
      serviceAccountName: crdb-cluster-sa
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/instance: crdb-cluster
                    app.kubernetes.io/name: cockroachdb
      containers:
        - name: cockroachdb
          image: cockroachdb/cockroach:v24.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: grpc
              containerPort: 26257
            - name: http
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health?ready=1
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 2
          volumeMounts:
            - name: datadir
              mountPath: /cockroach/cockroach-data
          command:
            - /bin/bash
            - -ecx
            - >-
              exec /cockroach/cockroach start
              --logtostderr
              --insecure
              --advertise-host=$(hostname).crdb-cluster.cockroachdb.svc.cluster.local
              --http-addr=0.0.0.0:8080
              --cache=25%
              --max-sql-memory=25%
              --join=crdb-cluster-0.crdb-cluster.cockroachdb.svc.cluster.local:26257,crdb-cluster-1.crdb-cluster.cockroachdb.svc.cluster.local:26257,crdb-cluster-2.crdb-cluster.cockroachdb.svc.cluster.local:26257
  volumeClaimTemplates:
    - metadata:
        name: datadir
        labels:
          app.kubernetes.io/instance: crdb-cluster
          app.kubernetes.io/name: cockroachdb
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
