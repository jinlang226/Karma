---
apiVersion: v1
kind: ConfigMap
metadata:
  name: es-data-config
  namespace: elasticsearch
data:
  elasticsearch.yml: |
    cluster.name: elasticsearch
    node.name: ${POD_NAME}
    network.host: 0.0.0.0
    http.port: 9200
    transport.port: 9300
    discovery.seed_hosts: ["es-internal"]
    node.roles: [data, ingest]
    node.attr.tier: new
    xpack.security.enabled: true
    xpack.security.http.ssl.enabled: true
    xpack.security.http.ssl.key: /usr/share/elasticsearch/config/certs/tls.key
    xpack.security.http.ssl.certificate: /usr/share/elasticsearch/config/certs/tls.crt
    xpack.security.http.ssl.certificate_authorities: ["/usr/share/elasticsearch/config/certs/ca.crt"]
    xpack.security.transport.ssl.enabled: true
    xpack.security.transport.ssl.key: /usr/share/elasticsearch/config/certs/tls.key
    xpack.security.transport.ssl.certificate: /usr/share/elasticsearch/config/certs/tls.crt
    xpack.security.transport.ssl.certificate_authorities: ["/usr/share/elasticsearch/config/certs/ca.crt"]
    xpack.security.transport.ssl.verification_mode: certificate
---
apiVersion: v1
kind: Service
metadata:
  name: es-data-headless
  namespace: elasticsearch
  labels:
    app: elasticsearch
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: elasticsearch
    tier: new
  ports:
  - name: transport
    port: 9300
    protocol: TCP
  - name: http
    port: 9200
    protocol: TCP
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: es-data
  namespace: elasticsearch
spec:
  podManagementPolicy: Parallel
  replicas: 2
  selector:
    matchLabels:
      app: elasticsearch
      tier: new
  serviceName: es-data-headless
  template:
    metadata:
      labels:
        app: elasticsearch
        tier: new
    spec:
      initContainers:
      - name: sysctl
        image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
        command: ["sh", "-c", "sysctl -w vm.max_map_count=262144 || true"]
        securityContext:
          privileged: true
          runAsUser: 0
      containers:
      - name: elasticsearch
        image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: ELASTIC_PASSWORD
          valueFrom:
            secretKeyRef:
              name: elastic-password
              key: password
        - name: ES_JAVA_OPTS
          value: "-Xms2g -Xmx2g"
        ports:
        - containerPort: 9200
          name: http
          protocol: TCP
        - containerPort: 9300
          name: transport
          protocol: TCP
        livenessProbe:
          tcpSocket:
            port: 9300
          initialDelaySeconds: 60
          periodSeconds: 20
          failureThreshold: 6
          timeoutSeconds: 5
        readinessProbe:
          exec:
            command:
            - sh
            - -c
            - |
              curl -sk -u "elastic:${ELASTIC_PASSWORD}" \
                https://localhost:9200/_cluster/health \
                | grep -qE '"status":"(green|yellow)"'
          initialDelaySeconds: 60
          periodSeconds: 10
          failureThreshold: 6
          timeoutSeconds: 10
        resources:
          requests:
            cpu: "500m"
            memory: "2Gi"
          limits:
            cpu: "2"
            memory: "4Gi"
        volumeMounts:
        - name: config
          mountPath: /usr/share/elasticsearch/config/elasticsearch.yml
          subPath: elasticsearch.yml
        - name: certs
          mountPath: /usr/share/elasticsearch/config/certs
          readOnly: true
        - name: data
          mountPath: /usr/share/elasticsearch/data
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsUser: 1000
      volumes:
      - name: config
        configMap:
          name: es-data-config
      - name: certs
        secret:
          secretName: es-http-tls
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: standard
      resources:
        requests:
          storage: 10Gi
