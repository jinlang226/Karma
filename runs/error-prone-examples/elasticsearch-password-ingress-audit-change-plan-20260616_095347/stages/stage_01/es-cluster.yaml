---
apiVersion: v1
kind: ConfigMap
metadata:
  name: es-config
  namespace: elasticsearch
data:
  elasticsearch.yml: |
    cluster.name: elasticsearch
    node.name: ${NODE_NAME}
    network.host: 0.0.0.0
    discovery.seed_hosts: es-0.es-nodes.elasticsearch.svc.cluster.local,es-1.es-nodes.elasticsearch.svc.cluster.local,es-2.es-nodes.elasticsearch.svc.cluster.local
    cluster.initial_master_nodes: es-0,es-1,es-2
    xpack.security.enabled: true
    xpack.security.http.ssl.enabled: true
    xpack.security.http.ssl.certificate: /usr/share/elasticsearch/config/certs/tls.crt
    xpack.security.http.ssl.key: /usr/share/elasticsearch/config/certs/tls.key
    xpack.security.http.ssl.certificate_authorities: /usr/share/elasticsearch/config/certs/ca.crt
    xpack.security.transport.ssl.enabled: true
    xpack.security.transport.ssl.certificate: /usr/share/elasticsearch/config/certs/tls.crt
    xpack.security.transport.ssl.key: /usr/share/elasticsearch/config/certs/tls.key
    xpack.security.transport.ssl.certificate_authorities: /usr/share/elasticsearch/config/certs/ca.crt
    xpack.security.transport.ssl.verification_mode: certificate

---
apiVersion: v1
kind: Service
metadata:
  name: es-nodes
  namespace: elasticsearch
  labels:
    app: elasticsearch
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: elasticsearch
  ports:
  - name: transport
    port: 9300
    targetPort: 9300

---
apiVersion: v1
kind: Service
metadata:
  name: es-http
  namespace: elasticsearch
  labels:
    app: elasticsearch
spec:
  selector:
    app: elasticsearch
  ports:
  - name: https
    port: 9200
    targetPort: 9200

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: es-pdb
  namespace: elasticsearch
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: elasticsearch

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: es
  namespace: elasticsearch
spec:
  serviceName: es-nodes
  replicas: 3
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: elasticsearch
  template:
    metadata:
      labels:
        app: elasticsearch
    spec:
      initContainers:
      - name: sysctl
        image: busybox
        command: ["sysctl", "-w", "vm.max_map_count=262144"]
        securityContext:
          privileged: true
      containers:
      - name: elasticsearch
        image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: ELASTIC_PASSWORD
          valueFrom:
            secretKeyRef:
              name: elastic-password
              key: password
        - name: ES_JAVA_OPTS
          value: "-Xms512m -Xmx512m"
        ports:
        - name: https
          containerPort: 9200
        - name: transport
          containerPort: 9300
        readinessProbe:
          exec:
            command:
            - sh
            - -c
            - |
              curl -sk -o /dev/null -w '%{http_code}' \
                -u "elastic:${ELASTIC_PASSWORD}" \
                https://localhost:9200/_cluster/health | grep -qE '^2'
          initialDelaySeconds: 60
          periodSeconds: 10
          failureThreshold: 30
          timeoutSeconds: 10
        resources:
          requests:
            memory: "1Gi"
            cpu: "200m"
          limits:
            memory: "1Gi"
        volumeMounts:
        - name: config
          mountPath: /usr/share/elasticsearch/config/elasticsearch.yml
          subPath: elasticsearch.yml
        - name: certs
          mountPath: /usr/share/elasticsearch/config/certs
          readOnly: true
        - name: data
          mountPath: /usr/share/elasticsearch/data
      volumes:
      - name: config
        configMap:
          name: es-config
      - name: certs
        secret:
          secretName: es-http-tls
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 1Gi
