apiVersion: v1
kind: Service
metadata:
  name: crdb-cluster
  namespace: cockroachdb
  labels:
    app: crdb-cluster
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: crdb-cluster
  ports:
    - name: grpc
      port: 26257
      targetPort: grpc
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: crdb-cluster-public
  namespace: cockroachdb
  labels:
    app: crdb-cluster
spec:
  selector:
    app: crdb-cluster
  ports:
    - name: grpc
      port: 26257
      targetPort: grpc
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: crdb-cluster
  namespace: cockroachdb
  labels:
    app: crdb-cluster
spec:
  serviceName: crdb-cluster
  replicas: 3
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: crdb-cluster
  template:
    metadata:
      labels:
        app: crdb-cluster
    spec:
      serviceAccountName: crdb-cluster-sa
      terminationGracePeriodSeconds: 60
      containers:
        - name: cockroachdb
          image: cockroachdb/cockroach:v24.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: grpc
              containerPort: 26257
            - name: http
              containerPort: 8080
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          args:
            - start
            - --insecure
            - --listen-addr=0.0.0.0:26257
            - --advertise-addr=$(POD_NAME).crdb-cluster.$(NAMESPACE).svc.cluster.local:26257
            - --http-addr=0.0.0.0:8080
            - --join=crdb-cluster-0.crdb-cluster.$(NAMESPACE).svc.cluster.local:26257,crdb-cluster-1.crdb-cluster.$(NAMESPACE).svc.cluster.local:26257,crdb-cluster-2.crdb-cluster.$(NAMESPACE).svc.cluster.local:26257
            - --store=/cockroach/cockroach-data
          volumeMounts:
            - name: datadir
              mountPath: /cockroach/cockroach-data
          readinessProbe:
            httpGet:
              path: /health?ready=1
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
  volumeClaimTemplates:
    - metadata:
        name: datadir
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: crdb-cluster
  namespace: cockroachdb
  labels:
    app: crdb-cluster
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: crdb-cluster
