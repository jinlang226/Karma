apiVersion: v1
kind: Service
metadata:
  name: crdb-cluster
  namespace: cockroachdb
  labels:
    app.kubernetes.io/name: cockroachdb
    app.kubernetes.io/instance: crdb-cluster
    app.kubernetes.io/component: database
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/name: cockroachdb
    app.kubernetes.io/instance: crdb-cluster
  ports:
    - name: grpc
      port: 26257
      targetPort: grpc
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: crdb-cluster-public
  namespace: cockroachdb
  labels:
    app.kubernetes.io/name: cockroachdb
    app.kubernetes.io/instance: crdb-cluster
    app.kubernetes.io/component: database
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: cockroachdb
    app.kubernetes.io/instance: crdb-cluster
  ports:
    - name: grpc
      port: 26257
      targetPort: grpc
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: crdb-cluster
  namespace: cockroachdb
  labels:
    app.kubernetes.io/name: cockroachdb
    app.kubernetes.io/instance: crdb-cluster
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: cockroachdb
      app.kubernetes.io/instance: crdb-cluster
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: crdb-cluster
  namespace: cockroachdb
  labels:
    app.kubernetes.io/name: cockroachdb
    app.kubernetes.io/instance: crdb-cluster
spec:
  serviceName: crdb-cluster
  replicas: 3
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app.kubernetes.io/name: cockroachdb
      app.kubernetes.io/instance: crdb-cluster
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cockroachdb
        app.kubernetes.io/instance: crdb-cluster
    spec:
      serviceAccountName: crdb-cluster-sa
      terminationGracePeriodSeconds: 60
      containers:
        - name: db
          image: cockroachdb/cockroach:v24.1.0
          imagePullPolicy: IfNotPresent
          command:
            - /cockroach/cockroach
            - start
            - --logtostderr=INFO
            - --insecure
            - --store=/cockroach/cockroach-data
            - --listen-addr=0.0.0.0:26257
            - --advertise-addr=$(POD_NAME).crdb-cluster.$(POD_NAMESPACE).svc.cluster.local:26257
            - --http-addr=0.0.0.0:8080
            - --join=crdb-cluster-0.crdb-cluster.$(POD_NAMESPACE).svc.cluster.local:26257,crdb-cluster-1.crdb-cluster.$(POD_NAMESPACE).svc.cluster.local:26257,crdb-cluster-2.crdb-cluster.$(POD_NAMESPACE).svc.cluster.local:26257
            - --cache=128MiB
            - --max-sql-memory=128MiB
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          ports:
            - name: grpc
              containerPort: 26257
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health?ready=1
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: datadir
              mountPath: /cockroach/cockroach-data
  volumeClaimTemplates:
    - metadata:
        name: datadir
        labels:
          app.kubernetes.io/name: cockroachdb
          app.kubernetes.io/instance: crdb-cluster
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 20Gi
