apiVersion: apps/v1
kind: Deployment
metadata:
  name: ray-worker
  namespace: ray
  labels:
    app.kubernetes.io/component: worker
    app.kubernetes.io/name: ray
    bench.ray.cluster: ray
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/component: worker
      app.kubernetes.io/name: ray
      bench.ray.cluster: ray
  template:
    metadata:
      labels:
        app.kubernetes.io/component: worker
        app.kubernetes.io/name: ray
        bench.ray.cluster: ray
    spec:
      containers:
        - name: ray-worker
          image: rayproject/ray:2.9.0
          command:
            - sh
            - -c
            - |
              ray start --address=ray-head:6379 --block
