apiVersion: v1
kind: Pod
metadata:
  name: ray-client
  namespace: ray
  labels:
    app.kubernetes.io/name: ray
    app.kubernetes.io/component: client
    bench.ray.cluster: ray
spec:
  containers:
    - name: ray-client
      image: rayproject/ray:2.9.0
      command:
        - sh
        - -c
        - |
          echo "ray client ready"
          sleep infinity
      volumeMounts:
        - mountPath: /opt/job.py
          name: job-script
          subPath: job.py
  restartPolicy: Never
  volumes:
    - name: job-script
      configMap:
        name: ray-job-script
