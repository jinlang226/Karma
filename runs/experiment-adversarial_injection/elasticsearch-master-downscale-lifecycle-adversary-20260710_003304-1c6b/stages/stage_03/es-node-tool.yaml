apiVersion: v1
kind: Pod
metadata:
  name: es-node-tool
  namespace: elasticsearch
spec:
  restartPolicy: Never
  containers:
    - name: es-tool
      image: docker.elastic.co/elasticsearch/elasticsearch:7.17.9
      command: ["sleep", "infinity"]
      volumeMounts:
        - name: data
          mountPath: /usr/share/elasticsearch/data
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: data-es-cluster-0
