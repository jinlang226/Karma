apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb-replica
  namespace: mongodb
spec:
  serviceName: mongodb-replica-svc
  replicas: 3
  podManagementPolicy: OrderedReady
  selector:
    matchLabels:
      app: mongodb-replica
  template:
    metadata:
      labels:
        app: mongodb-replica
    spec:
      terminationGracePeriodSeconds: 30
      initContainers:
        - name: install-keyfile
          image: mongo:6.0
          command:
            - sh
            - -c
            - |
              cp /keyfile-secret/mongodb-keyfile /keyfile/mongodb-keyfile
              chmod 400 /keyfile/mongodb-keyfile
              chown 999:999 /keyfile/mongodb-keyfile
          volumeMounts:
            - name: keyfile-secret
              mountPath: /keyfile-secret
              readOnly: true
            - name: keyfile-dir
              mountPath: /keyfile
      containers:
        - name: mongod
          image: mongo:6.0
          args:
            - mongod
            - --replSet
            - mongodb-replica
            - --bind_ip_all
            - --keyFile
            - /keyfile/mongodb-keyfile
            - --auth
          ports:
            - containerPort: 27017
              name: mongodb
          volumeMounts:
            - name: keyfile-dir
              mountPath: /keyfile
              readOnly: true
            - name: data
              mountPath: /data/db
          readinessProbe:
            tcpSocket:
              port: 27017
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 27017
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: keyfile-secret
          secret:
            secretName: mongodb-keyfile
            defaultMode: 0400
        - name: keyfile-dir
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: standard
        resources:
          requests:
            storage: 2Gi
