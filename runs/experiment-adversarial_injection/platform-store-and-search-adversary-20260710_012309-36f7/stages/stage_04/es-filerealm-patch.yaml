spec:
  template:
    spec:
      containers:
        - name: elasticsearch
          volumeMounts:
            - name: es-file-realm
              mountPath: /usr/share/elasticsearch/config/users
              subPath: users
            - name: es-file-realm
              mountPath: /usr/share/elasticsearch/config/users_roles
              subPath: users_roles
            - name: es-file-realm
              mountPath: /usr/share/elasticsearch/config/roles.yml
              subPath: roles.yml
      volumes:
        - name: es-file-realm
          secret:
            secretName: es-file-realm-merged
            defaultMode: 0440
