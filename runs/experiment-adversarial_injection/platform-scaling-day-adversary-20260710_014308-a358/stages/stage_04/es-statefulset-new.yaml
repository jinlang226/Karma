apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: es-data-new
  namespace: elasticsearch
  labels:
    app: elasticsearch
    tier: data-new
spec:
  serviceName: es-transport
  replicas: 2
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      tier: data-new
  template:
    metadata:
      labels:
        app: elasticsearch
        tier: data-new
    spec:
      securityContext:
        fsGroup: 0
      containers:
        - name: elasticsearch
          image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
          env:
            - name: ELASTIC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: elastic-password
                  key: password
            - name: ES_JAVA_OPTS
              value: "-Xms512m -Xmx512m"
          ports:
            - name: http
              containerPort: 9200
            - name: transport
              containerPort: 9300
          resources:
            requests:
              cpu: "250m"
              memory: "1Gi"
            limits:
              cpu: "1"
              memory: "1536Mi"
          volumeMounts:
            - name: data
              mountPath: /usr/share/elasticsearch/data
            - name: config
              mountPath: /usr/share/elasticsearch/config/elasticsearch.yml
              subPath: elasticsearch.yml
            - name: certs
              mountPath: /usr/share/elasticsearch/config/certs
              readOnly: true
          readinessProbe:
            exec:
              command:
                - bash
                - -c
                - curl -sk -u "elastic:${ELASTIC_PASSWORD}" --fail https://localhost:9200/_cluster/health
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 10
          livenessProbe:
            exec:
              command:
                - bash
                - -c
                - curl -sk -u "elastic:${ELASTIC_PASSWORD}" --fail https://localhost:9200/_cluster/health
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
      volumes:
        - name: config
          configMap:
            name: es-config-new
        - name: certs
          secret:
            secretName: es-http-tls
            defaultMode: 0440
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: standard
        resources:
          requests:
            storage: 3Gi
