apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb-replica
  namespace: mongodb
  labels:
    app: mongodb-replica
spec:
  serviceName: mongodb-replica-svc
  replicas: 3
  podManagementPolicy: OrderedReady
  selector:
    matchLabels:
      app: mongodb-replica
  template:
    metadata:
      labels:
        app: mongodb-replica
    spec:
      initContainers:
        - name: copy-keyfile
          image: mongo:6.0
          command:
            - bash
            - -c
            - |
              cp /keyfile-secret/mongodb-keyfile /keyfile/mongodb-keyfile
              chmod 400 /keyfile/mongodb-keyfile
              chown 999:999 /keyfile/mongodb-keyfile
          volumeMounts:
            - name: keyfile-secret
              mountPath: /keyfile-secret
              readOnly: true
            - name: keyfile
              mountPath: /keyfile
      containers:
        - name: mongod
          image: mongo:6.0
          command:
            - mongod
          args:
            - --replSet=mongodb-replica
            - --bind_ip_all
            - --keyFile=/etc/mongodb/pki/mongodb-keyfile
            - --auth
          ports:
            - name: mongod
              containerPort: 27017
          volumeMounts:
            - name: data
              mountPath: /data/db
            - name: keyfile
              mountPath: /etc/mongodb/pki
              readOnly: true
          readinessProbe:
            exec:
              command:
                - mongosh
                - --quiet
                - --eval
                - db.adminCommand('ping')
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - mongosh
                - --quiet
                - --eval
                - db.adminCommand('ping')
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
      volumes:
        - name: keyfile-secret
          secret:
            secretName: mongodb-keyfile
            defaultMode: 0400
        - name: keyfile
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: standard
        resources:
          requests:
            storage: 2Gi
