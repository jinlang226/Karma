apiVersion: apps/v1
kind: Deployment
metadata:
  name: ray-head
  namespace: ray
  labels:
    app.kubernetes.io/name: ray
    app.kubernetes.io/component: head
    bench.ray.cluster: ray
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ray
      app.kubernetes.io/component: head
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ray
        app.kubernetes.io/component: head
        bench.ray.cluster: ray
    spec:
      containers:
        - name: ray-head
          image: rayproject/ray:2.9.0
          command:
            - "/bin/sh"
            - "-c"
            - |
              ray start --head --port=6379 --dashboard-host=0.0.0.0 --block
          ports:
            - containerPort: 6379
              name: gcs
            - containerPort: 8265
              name: dashboard
            - containerPort: 10001
              name: client
          readinessProbe:
            exec:
              command: ["ray", "health-check", "--address=127.0.0.1:6379"]
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            exec:
              command: ["ray", "health-check", "--address=127.0.0.1:6379"]
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
