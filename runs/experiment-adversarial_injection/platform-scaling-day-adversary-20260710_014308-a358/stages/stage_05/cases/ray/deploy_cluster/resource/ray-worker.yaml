apiVersion: apps/v1
kind: Deployment
metadata:
  name: ray-worker
  namespace: ray
  labels:
    app.kubernetes.io/name: ray
    app.kubernetes.io/component: worker
    bench.ray.cluster: ray
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: ray
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ray
        app.kubernetes.io/component: worker
        bench.ray.cluster: ray
    spec:
      containers:
        - name: ray-worker
          image: rayproject/ray:2.9.0
          command:
            - "/bin/sh"
            - "-c"
            - |
              ray start --address=ray-head:6379 --block
          readinessProbe:
            exec:
              command: ["ray", "health-check", "--address=ray-head:6379"]
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            exec:
              command: ["ray", "health-check", "--address=ray-head:6379"]
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
