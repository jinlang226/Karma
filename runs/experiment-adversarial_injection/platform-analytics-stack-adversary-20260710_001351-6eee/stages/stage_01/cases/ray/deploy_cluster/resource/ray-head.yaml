apiVersion: apps/v1
kind: Deployment
metadata:
  name: ray-head
  namespace: ray
  labels:
    app.kubernetes.io/name: ray
    app.kubernetes.io/component: head
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ray
      app.kubernetes.io/component: head
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ray
        app.kubernetes.io/component: head
    spec:
      containers:
        - name: ray-head
          image: rayproject/ray:2.9.0
          command: ["/bin/sh", "-c"]
          args:
            - ray start --head --port=6379 --dashboard-host=0.0.0.0 --block
          ports:
            - containerPort: 6379
              name: gcs
            - containerPort: 8265
              name: dashboard
            - containerPort: 10001
              name: client
          readinessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 10
            periodSeconds: 10
