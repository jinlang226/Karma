apiVersion: v1
kind: ConfigMap
metadata:
  name: es-config
  namespace: elasticsearch
  labels:
    app: elasticsearch
data:
  elasticsearch.yml: |
    cluster.name: es-cluster
    node.name: ${HOSTNAME}
    network.host: 0.0.0.0
    http.port: 9200
    transport.port: 9300

    node.roles: ["master", "data", "ingest"]

    discovery.seed_hosts:
      - es-0.es-transport.elasticsearch.svc.cluster.local
      - es-1.es-transport.elasticsearch.svc.cluster.local
      - es-2.es-transport.elasticsearch.svc.cluster.local
    cluster.initial_master_nodes:
      - es-0
      - es-1
      - es-2

    xpack.security.enabled: true
    xpack.security.http.ssl.enabled: true
    xpack.security.http.ssl.certificate: certs/tls.crt
    xpack.security.http.ssl.key: certs/tls.key
    xpack.security.http.ssl.certificate_authorities: ["certs/ca.crt"]

    xpack.security.transport.ssl.enabled: true
    xpack.security.transport.ssl.certificate: certs/tls.crt
    xpack.security.transport.ssl.key: certs/tls.key
    xpack.security.transport.ssl.certificate_authorities: ["certs/ca.crt"]
    xpack.security.transport.ssl.verification_mode: certificate

    ingest.geoip.downloader.enabled: false
---
apiVersion: v1
kind: Service
metadata:
  name: es-transport
  namespace: elasticsearch
  labels:
    app: elasticsearch
spec:
  clusterIP: None
  selector:
    app: elasticsearch
  ports:
    - name: http
      port: 9200
      targetPort: 9200
    - name: transport
      port: 9300
      targetPort: 9300
---
apiVersion: v1
kind: Service
metadata:
  name: es-http
  namespace: elasticsearch
  labels:
    app: elasticsearch
spec:
  type: ClusterIP
  selector:
    app: elasticsearch
  ports:
    - name: https
      port: 9200
      targetPort: 9200
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: es-pdb
  namespace: elasticsearch
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: elasticsearch
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: es
  namespace: elasticsearch
  labels:
    app: elasticsearch
spec:
  serviceName: es-transport
  replicas: 3
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: elasticsearch
  template:
    metadata:
      labels:
        app: elasticsearch
    spec:
      initContainers:
        - name: set-max-map-count
          image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
          command: ["sysctl", "-w", "vm.max_map_count=262144"]
          securityContext:
            privileged: true
            runAsUser: 0
        - name: copy-config
          image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
          command:
            - sh
            - -c
            - "cp -r /usr/share/elasticsearch/config/. /es-config/"
          volumeMounts:
            - name: es-config-dir
              mountPath: /es-config
        - name: init-keystore
          image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
          command:
            - sh
            - -c
            - |
              set -e
              export ES_PATH_CONF=/usr/share/elasticsearch/config
              if [ ! -f "$ES_PATH_CONF/elasticsearch.keystore" ]; then
                elasticsearch-keystore create
              fi
              elasticsearch-keystore add -f -x bootstrap.password --stdin < /mnt/elastic-password/password
          volumeMounts:
            - name: es-config-dir
              mountPath: /usr/share/elasticsearch/config
            - name: elastic-password
              mountPath: /mnt/elastic-password
              readOnly: true
      containers:
        - name: elasticsearch
          image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
          env:
            - name: ES_JAVA_OPTS
              value: "-Xms1g -Xmx1g"
          ports:
            - name: http
              containerPort: 9200
            - name: transport
              containerPort: 9300
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              cpu: "2"
              memory: "2Gi"
          volumeMounts:
            - name: es-config-dir
              mountPath: /usr/share/elasticsearch/config
            - name: es-config-file
              mountPath: /usr/share/elasticsearch/config/elasticsearch.yml
              subPath: elasticsearch.yml
            - name: es-certs
              mountPath: /usr/share/elasticsearch/config/certs
              readOnly: true
            - name: es-data
              mountPath: /usr/share/elasticsearch/data
          readinessProbe:
            tcpSocket:
              port: 9200
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            tcpSocket:
              port: 9200
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 6
      volumes:
        - name: es-config-dir
          emptyDir: {}
        - name: es-config-file
          configMap:
            name: es-config
        - name: es-certs
          secret:
            secretName: es-http-tls
        - name: elastic-password
          secret:
            secretName: elastic-password
  volumeClaimTemplates:
    - metadata:
        name: es-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: standard
        resources:
          requests:
            storage: 5Gi
