apiVersion: apps/v1
kind: Deployment
metadata:
  name: ray-worker
  namespace: ray
  labels:
    app.kubernetes.io/name: ray
    app.kubernetes.io/component: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: ray
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ray
        app.kubernetes.io/component: worker
    spec:
      containers:
      - name: ray-worker
        image: rayproject/ray:2.9.0
        command: ["/bin/sh", "-c"]
        args:
          - |
            ray start --address=ray-head:6379 --block
        resources: {}
