apiVersion: batch/v1
kind: Job
metadata:
  name: spark-pi
  namespace: spark-pi
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: spark-pi
        component: driver
    spec:
      serviceAccountName: spark-pi
      containers:
      - name: spark-submit
        image: apache/spark:3.5.2
        command:
        - /bin/bash
        - -c
        - |
          echo "=============================================="
          echo "  SparkPi Job"
          echo "=============================================="
          export SPARK_LOCAL_IP=$(hostname -i)
          /opt/spark/bin/spark-submit \
            --master local[2] \
            --driver-memory 512m \
            --class org.apache.spark.examples.SparkPi \
            /opt/spark/examples/jars/spark-examples_2.12-3.5.2.jar \
            1000
          EXIT_CODE=$?
          echo "SparkPi job finished with exit code: $EXIT_CODE"
          exit $EXIT_CODE
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
      restartPolicy: Never
