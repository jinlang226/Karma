apiVersion: v1
kind: Service
metadata:
  name: crdb-cluster
  namespace: cockroachdb
  labels:
    app: crdb-cluster
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
    - name: grpc
      port: 26257
      targetPort: 26257
    - name: http
      port: 8080
      targetPort: 8080
  selector:
    app: crdb-cluster
---
apiVersion: v1
kind: Service
metadata:
  name: crdb-cluster-public
  namespace: cockroachdb
  labels:
    app: crdb-cluster
spec:
  type: ClusterIP
  ports:
    - name: grpc
      port: 26257
      targetPort: 26257
    - name: http
      port: 8080
      targetPort: 8080
  selector:
    app: crdb-cluster
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: crdb-cluster-pdb
  namespace: cockroachdb
  labels:
    app: crdb-cluster
spec:
  selector:
    matchLabels:
      app: crdb-cluster
  maxUnavailable: 1
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: crdb-cluster
  namespace: cockroachdb
  labels:
    app: crdb-cluster
spec:
  serviceName: crdb-cluster
  replicas: 3
  selector:
    matchLabels:
      app: crdb-cluster
  template:
    metadata:
      labels:
        app: crdb-cluster
    spec:
      serviceAccountName: crdb-cluster-sa
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - crdb-cluster
                topologyKey: kubernetes.io/hostname
      containers:
        - name: cockroachdb
          image: cockroachdb/cockroach:v24.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: grpc
              containerPort: 26257
            - name: http
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health?ready=1
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 2
          volumeMounts:
            - name: datadir
              mountPath: /cockroach/cockroach-data
          command:
            - /bin/bash
            - -ecx
            - >
              exec /cockroach/cockroach start
              --logtostderr
              --insecure
              --advertise-host=$(hostname).crdb-cluster.cockroachdb.svc.cluster.local
              --http-addr=0.0.0.0:8080
              --listen-addr=0.0.0.0:26257
              --cache=25%
              --max-sql-memory=25%
              --join=crdb-cluster-0.crdb-cluster.cockroachdb.svc.cluster.local:26257,crdb-cluster-1.crdb-cluster.cockroachdb.svc.cluster.local:26257,crdb-cluster-2.crdb-cluster.cockroachdb.svc.cluster.local:26257
      terminationGracePeriodSeconds: 60
  volumeClaimTemplates:
    - metadata:
        name: datadir
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
