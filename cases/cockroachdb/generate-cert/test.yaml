# cockroachdb/generate-cert
#
# A CockroachDB cluster is running in insecure mode with an openssl-toolbox
# pod available. The agent must enable TLS so secure access works and
# insecure access is rejected.

prompt: |
  Enable TLS for the running CockroachDB cluster in the cockroachdb namespace.

  The cluster is currently running in insecure mode. An openssl-toolbox pod
  is available for certificate generation.

  Store the generated TLS material (ca.crt, node.crt, node.key, and the root
  client cert/key) in a Kubernetes Secret named `crdb-cluster-certs` and mount
  that Secret at /cockroach/cockroach-certs on the CockroachDB StatefulSet pods.

  GOAL:
  1. Insecure access is rejected:
     ```bash
     kubectl -n cockroachdb exec crdb-cluster-0 -- \
       ./cockroach sql --insecure -e "SELECT 1;"
     ```
  2. Secure access succeeds:
     ```bash
     kubectl -n cockroachdb exec crdb-cluster-0 -- \
       ./cockroach sql --certs-dir=/cockroach/cockroach-certs -e "SELECT 1;"
     ```
  3. The cert material lives in a Secret named `crdb-cluster-certs` that the
     StatefulSet mounts (so it is the cert the nodes actually serve).

params:
  cert_secret_name:
    default: crdb-cluster-certs
    description: >-
      Canonical Kubernetes Secret the agent must create and the StatefulSet must
      mount for the cluster TLS material. Fixing the NAME (C2 identity contract)
      lets a downstream cert-rotation stage rotate the very secret the pods
      serve; an agent-chosen name (e.g. crdb-certs) would leave rotation
      targeting a secret nobody mounts.

namespace_contract:
  required_roles: []

metrics:
  - time_to_first_mutation

preconditionUnits:
  - name: crdb_env_ready
    on_probe_fail: skip
    probe:
      - command: "/bin/sh -c 'flag=--insecure; kubectl -n cockroachdb exec crdb-cluster-0 -- ls /cockroach/cockroach-certs/ca.crt >/dev/null 2>&1 && flag=--certs-dir=/cockroach/cockroach-certs; kubectl -n cockroachdb exec crdb-cluster-0 -- ./cockroach sql $flag -e \"SELECT 1;\" 2>/dev/null || kubectl -n cockroachdb get pods 2>/dev/null | grep -q Running'"
        timeout_sec: 20
    apply:
      - command: "/bin/sh -c 'kubectl delete namespace cockroachdb --ignore-not-found=true --wait=false; kubectl wait --for=delete namespace/cockroachdb --timeout=400s || true'"
        timeout_sec: 460
        sleep: 2
      - command: "kubectl create namespace cockroachdb"
        sleep: 1
      - command: "kubectl -n cockroachdb apply -f cases/cockroachdb/generate-cert/resource/rbac.yaml"
        sleep: 2
      - command: "kubectl -n cockroachdb apply -f cases/cockroachdb/generate-cert/resource/services.yaml"
        sleep: 2
      - command: "kubectl -n cockroachdb apply -f cases/cockroachdb/generate-cert/resource/statefulset.yaml"
        sleep: 5
      - command: "/bin/sh -c 'for i in $(seq 1 30); do count=$(kubectl -n cockroachdb get pod -l app.kubernetes.io/name=cockroachdb --no-headers 2>/dev/null | wc -l | tr -d \" \"); if [ \"${count}\" -ge 1 ]; then exit 0; fi; sleep 2; done; exit 1'"
        sleep: 1
      - command: "kubectl -n cockroachdb wait --for=jsonpath={.status.phase}=Running pod -l app.kubernetes.io/name=cockroachdb --timeout=300s"
        sleep: 5
      - command: "/bin/sh -c 'for i in $(seq 1 30); do kubectl -n cockroachdb exec crdb-cluster-0 -- ./cockroach init --insecure --host=crdb-cluster-0.crdb-cluster.cockroachdb.svc.cluster.local && exit 0; sleep 3; done; exit 1'"
        sleep: 2
      - command: "kubectl -n cockroachdb wait --for=condition=ready pod -l app.kubernetes.io/name=cockroachdb --timeout=600s"
        timeout_sec: 640
        sleep: 10
      - command: "/bin/sh -c 'kubectl -n cockroachdb get pod openssl-toolbox >/dev/null 2>&1 || kubectl -n cockroachdb apply -f cases/cockroachdb/generate-cert/resource/openssl-toolbox.yaml'"
        sleep: 2
      - command: "kubectl -n cockroachdb wait --for=condition=ready pod/openssl-toolbox --timeout=120s"
        sleep: 2
    verify:
      - command: "/bin/sh -c 'flag=--insecure; kubectl -n cockroachdb exec crdb-cluster-0 -- ls /cockroach/cockroach-certs/ca.crt >/dev/null 2>&1 && flag=--certs-dir=/cockroach/cockroach-certs; kubectl -n cockroachdb exec crdb-cluster-0 -- ./cockroach sql $flag -e \"SELECT 1;\" 2>/dev/null || kubectl -n cockroachdb get pods 2>/dev/null | grep -q Running'"
        timeout_sec: 20

oracle:
  verify:
    commands:
      - command: "python3 cases/cockroachdb/generate-cert/oracle/oracle.py"
        timeout_sec: 120
