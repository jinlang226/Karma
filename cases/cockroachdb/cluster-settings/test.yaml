# cockroachdb/cluster-settings
# Update {{params.setting_name}} to {{params.setting_value}} and make it persist

prompt: |
  Rebalancing throughput needs tuning for an upcoming scale-up. Update the
  cluster setting {{params.setting_name}} to {{params.setting_value}} so the
  cluster is configured for the expected workload, and make sure the change
  persists across a node restart.

  Note: some cluster settings were renamed or consolidated across CockroachDB
  versions. If the live cluster rejects {{params.setting_name}} as an "unknown
  setting" (it may have been removed in this version), set the equivalent
  current setting instead — for the snapshot/rebalance throughput rate the
  setting present in recent versions is kv.snapshot_rebalance.max_rate (the
  older kv.snapshot_recovery.max_rate was consolidated into it).

  Verification:
  1. Setting updated (use the name the cluster accepts):
     kubectl -n cockroachdb exec crdb-cluster-0 -- \
       ./cockroach sql --insecure -e "SHOW CLUSTER SETTING {{params.setting_name}};"

  2. Setting persisted after restart:
     kubectl -n cockroachdb delete pod crdb-cluster-0
     kubectl -n cockroachdb wait --for=condition=ready pod/crdb-cluster-0 --timeout=120s
     kubectl -n cockroachdb exec crdb-cluster-0 -- \
       ./cockroach sql --insecure -e "SHOW CLUSTER SETTING {{params.setting_name}};"

params:
  setting_name:
    default: kv.snapshot_rebalance.max_rate
    description: CockroachDB cluster setting to update for rebalancing throughput
  setting_value:
    default: 128MiB
    description: Target value the agent must set the cluster setting to

namespace_contract:
  required_roles: []

metrics:
  - time_to_first_mutation
  - read_write_ratio

preconditionUnits:
  - name: crdb_env_ready
    on_probe_fail: skip
    probe:
      # Non-destructive skip-if-running probe. The env PERSISTS across workflow
      # stages: when a cockroachdb cluster is already present (inherited from a
      # prior stage), skip the destructive apply so accumulated state is
      # preserved. The oracle auto-detects secure vs insecure mode, so a leftover
      # secure cluster is handled by the oracle, not by redeploying here. The
      # apply (which deletes+recreates the namespace) runs ONLY on an empty
      # namespace.
      - command: "kubectl -n cockroachdb get pods 2>/dev/null | grep -c Running"
        timeout_sec: 10
    apply:
      - command: "/bin/sh -c 'kubectl delete namespace cockroachdb --ignore-not-found=true --wait=false; kubectl wait --for=delete namespace/cockroachdb --timeout=400s || true'"
        timeout_sec: 460
        sleep: 2
      - command: "kubectl create namespace cockroachdb"
        sleep: 1
      - command: "kubectl -n cockroachdb apply -f cases/cockroachdb/cluster-settings/resource/rbac.yaml"
        sleep: 2
      - command: "kubectl -n cockroachdb apply -f cases/cockroachdb/cluster-settings/resource/services.yaml"
        sleep: 2
      - command: "kubectl -n cockroachdb apply -f cases/cockroachdb/cluster-settings/resource/statefulset.yaml"
        sleep: 5
      - command: "/bin/sh -c 'for i in $(seq 1 30); do count=$(kubectl -n cockroachdb get pod -l app.kubernetes.io/name=cockroachdb --no-headers 2>/dev/null | wc -l | tr -d \" \"); if [ \"${count}\" -ge 1 ]; then exit 0; fi; sleep 2; done; exit 1'"
        sleep: 1
      - command: "kubectl -n cockroachdb wait --for=jsonpath={.status.phase}=Running pod -l app.kubernetes.io/name=cockroachdb --timeout=300s"
        sleep: 5
      - command: "/bin/sh -c 'for i in $(seq 1 30); do kubectl -n cockroachdb exec crdb-cluster-0 -- ./cockroach init --insecure --host=crdb-cluster-0.crdb-cluster.cockroachdb.svc.cluster.local && exit 0; sleep 3; done; exit 1'"
        sleep: 2
      - command: "kubectl -n cockroachdb wait --for=condition=ready pod -l app.kubernetes.io/name=cockroachdb --timeout=600s"
        timeout_sec: 640
        sleep: 10
    verify:
      - command: "kubectl -n cockroachdb exec crdb-cluster-0 -- ./cockroach sql --insecure -e 'SELECT 1;' 2>/dev/null"
        timeout_sec: 15

oracle:
  verify:
    commands:
      - command: "python3 cases/cockroachdb/cluster-settings/oracle/oracle.py"
        timeout_sec: 300
