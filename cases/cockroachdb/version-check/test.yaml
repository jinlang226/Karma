# cockroachdb/version-check
#
# A CockroachDB cluster was upgraded from v{{params.from_version}} to v24.1. The agent must
# record the active feature version in a ConfigMap and finalize the upgrade
# by clearing the downgrade option.

prompt: |
  Determine which feature set the cluster is currently operating under
  and record it in ConfigMap {{params.report_configmap_name}} under key {{params.report_key}}.

  Useful commands:
  ```bash
  kubectl -n cockroachdb exec crdb-cluster-0 -- \
    ./cockroach sql --insecure -e "SHOW CLUSTER SETTING version;"
  kubectl -n cockroachdb exec crdb-cluster-0 -- \
    ./cockroach sql --insecure -e "SELECT version();"
  ```

  Verification:
  1. ConfigMap recorded:
     kubectl -n cockroachdb get configmap {{params.report_configmap_name}} -o yaml
  2. Cluster version:
     kubectl -n cockroachdb exec crdb-cluster-0 -- \
       ./cockroach sql --insecure -e "SHOW CLUSTER SETTING version;"
  3. Binary version:
     kubectl -n cockroachdb exec crdb-cluster-0 -- \
       ./cockroach sql --insecure -e "SELECT version();"
  4. Preserve downgrade option:
     kubectl -n cockroachdb exec crdb-cluster-0 -- \
       ./cockroach sql --insecure -e "SHOW CLUSTER SETTING cluster.preserve_downgrade_option;"

params:
  from_version:
    default: "23.2"
    description: CockroachDB version the cluster was upgraded from
  to_version:
    default: 24.1.0
    description: CockroachDB version the cluster was upgraded to
  report_configmap_name:
    default: crdb-version-report
    description: ConfigMap that must record the active feature version
  report_key:
    default: db_version
    description: ConfigMap key under which the version is recorded

namespace_contract:
  required_roles: []

metrics:
  - time_to_first_mutation

preconditionUnits:
  - name: crdb_env_ready
    on_probe_fail: skip
    probe:
      # Non-destructive skip-if-running probe. The env PERSISTS across workflow
      # stages: when a cockroachdb cluster is already serving SQL (inherited from
      # a prior stage), skip the destructive apply so accumulated state is
      # preserved. The apply (which deletes+recreates the namespace) runs ONLY on
      # an empty namespace. NOTE: this case wants a logical-version
      # v{{params.from_version}} (binary moved to {{params.to_version}}) base; if
      # chained after a stage that already finalized the upgrade the recorded
      # version differs — that is a workflow-ordering concern to be curated
      # separately, NOT something to fix by redeploying and wiping inherited
      # state.
      - command: "kubectl -n cockroachdb exec crdb-cluster-0 -- ./cockroach sql --insecure -e 'SELECT 1;' 2>/dev/null"
        timeout_sec: 15
    apply:
      - command: "/bin/sh -c 'kubectl delete namespace cockroachdb --ignore-not-found=true --wait=false; kubectl wait --for=delete namespace/cockroachdb --timeout=240s || true'"
        sleep: 2
      - command: "kubectl create namespace cockroachdb"
        sleep: 1
      - command: "kubectl -n cockroachdb apply -f cases/cockroachdb/version-check/resource/"
        sleep: 5
      - command: "/bin/sh -c 'for i in $(seq 1 30); do count=$(kubectl -n cockroachdb get pod -l app.kubernetes.io/name=cockroachdb --no-headers 2>/dev/null | wc -l | tr -d \" \"); if [ \"${count}\" -ge 1 ]; then exit 0; fi; sleep 2; done; exit 1'"
        sleep: 1
      - command: "kubectl -n cockroachdb wait --for=jsonpath={.status.phase}=Running pod -l app.kubernetes.io/name=cockroachdb --timeout=300s"
        sleep: 5
      - command: "/bin/sh -c 'for i in $(seq 1 30); do kubectl -n cockroachdb exec crdb-cluster-0 -- ./cockroach init --insecure --host=crdb-cluster-0.crdb-cluster.cockroachdb.svc.cluster.local && exit 0; sleep 3; done; exit 1'"
        sleep: 2
      - command: "kubectl -n cockroachdb wait --for=condition=ready pod -l app.kubernetes.io/name=cockroachdb --timeout=300s"
        sleep: 10
      - command: "kubectl -n cockroachdb exec crdb-cluster-0 -- ./cockroach sql --insecure -e \"SET CLUSTER SETTING cluster.preserve_downgrade_option = '{{params.from_version}}';\""
        sleep: 2
      - command: "kubectl -n cockroachdb set image sts/crdb-cluster db=cockroachdb/cockroach:v{{params.to_version}}"
        sleep: 5
      - command: "/bin/sh -c 'for i in $(seq 1 60); do images=$(kubectl -n cockroachdb get pods -l app.kubernetes.io/name=cockroachdb -o jsonpath=\"{.items[*].spec.containers[0].image}\" 2>/dev/null); total=$(echo \"${images}\" | wc -w | tr -d \" \"); updated=$(echo \"${images}\" | tr \" \" \"\\n\" | grep -c \"cockroachdb/cockroach:v{{params.to_version}}\"); if [ \"${total}\" -eq 3 ] && [ \"${updated}\" -eq 3 ]; then exit 0; fi; sleep 5; done; exit 1'"
        sleep: 2
      - command: "kubectl -n cockroachdb wait --for=condition=ready pod -l app.kubernetes.io/name=cockroachdb --timeout=300s"
        sleep: 10
    verify:
      - command: "kubectl -n cockroachdb exec crdb-cluster-0 -- ./cockroach sql --insecure -e 'SELECT 1;' 2>/dev/null"
        timeout_sec: 15

oracle:
  verify:
    commands:
      - command: "python3 cases/cockroachdb/version-check/oracle/oracle.py"
        timeout_sec: 120
