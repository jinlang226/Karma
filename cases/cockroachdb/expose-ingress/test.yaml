# cockroachdb/expose-ingress
# Expose CockroachDB DB Console via HTTPS ingress and SQL traffic via TCP ingress

prompt: |
  A 3-node CockroachDB cluster is running in the cockroachdb namespace. The
  ingress-nginx controller is already installed and running in ingress-nginx.

  Your task:
  - Make the DB Console reachable at https://{{params.ui_host}} (TLS required).
  - Expose SQL traffic via ingress-nginx on TCP port {{params.sql_port}}.

  Notes:
  - Use the {{params.ingress_class_name}} ingress class.
  - SQL uses a TCP protocol (not HTTP).

  Useful commands:
  ```bash
  kubectl -n cockroachdb get svc,ingress
  kubectl -n ingress-nginx get cm
  ```

params:
  ui_host:
    default: crdb-ui.example.com
    description: Hostname at which the DB Console must be reachable over HTTPS
  sql_port:
    default: 26257
    description: TCP port on which SQL traffic is exposed via ingress
  ingress_class_name:
    default: nginx
    description: Ingress class used for the exposed routes

namespace_contract:
  required_roles: []

metrics:
  - time_to_first_mutation

preconditionUnits:
  - name: crdb_env_ready
    on_probe_fail: skip
    probe:
      - command: "kubectl -n cockroachdb get pods 2>/dev/null | grep -c Running"
        timeout_sec: 10
    apply:
      - command: "/bin/sh -c 'kubectl delete namespace cockroachdb --ignore-not-found=true --wait=false; kubectl wait --for=delete namespace/cockroachdb --timeout=400s || true'"
        timeout_sec: 460
        sleep: 2
      - command: "/bin/sh -c 'kubectl create namespace ingress-nginx --dry-run=client -o yaml | kubectl apply -f -'"
        sleep: 0
      - command: "kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/kind/deploy.yaml"
        sleep: 90
      - command: "kubectl -n ingress-nginx rollout status deploy/ingress-nginx-controller --timeout=120s"
        sleep: 2
      - command: "kubectl -n ingress-nginx patch deployment ingress-nginx-controller --type=json -p '[{\"op\":\"add\",\"path\":\"/spec/template/spec/containers/0/args/-\",\"value\":\"--watch-ingress-without-class=false\"}]'"
        sleep: 1
      - command: "kubectl -n ingress-nginx rollout status deploy/ingress-nginx-controller --timeout=120s"
        sleep: 2
      - command: "kubectl create namespace cockroachdb"
        sleep: 1
      - command: "kubectl -n cockroachdb apply -f cases/cockroachdb/expose-ingress/resource/"
        sleep: 5
      - command: "/bin/sh -c 'for i in $(seq 1 30); do count=$(kubectl -n cockroachdb get pod -l app.kubernetes.io/name=cockroachdb --no-headers 2>/dev/null | wc -l | tr -d \" \"); if [ \"${count}\" -ge 1 ]; then exit 0; fi; sleep 2; done; exit 1'"
        sleep: 1
      - command: "kubectl -n cockroachdb wait --for=jsonpath={.status.phase}=Running pod -l app.kubernetes.io/name=cockroachdb --timeout=300s"
        sleep: 5
      - command: "/bin/sh -c 'for i in $(seq 1 30); do kubectl -n cockroachdb exec crdb-cluster-0 -- ./cockroach init --insecure --host=crdb-cluster-0.crdb-cluster.cockroachdb.svc.cluster.local && exit 0; sleep 3; done; exit 1'"
        sleep: 2
      - command: "kubectl -n cockroachdb wait --for=condition=ready pod -l app.kubernetes.io/name=cockroachdb --timeout=600s"
        timeout_sec: 640
        sleep: 10
      - command: "kubectl -n cockroachdb wait --for=condition=Ready pod/curl-test --timeout=60s"
        sleep: 2
    verify:
      - command: "/bin/sh -c 'flag=--insecure; kubectl -n cockroachdb exec crdb-cluster-0 -- ls /cockroach/cockroach-certs/ca.crt >/dev/null 2>&1 && flag=--certs-dir=/cockroach/cockroach-certs; kubectl -n cockroachdb exec crdb-cluster-0 -- ./cockroach sql $flag -e \"SELECT 1;\" 2>/dev/null'"
        timeout_sec: 15

  # Additive ingress-infra fixture (composition safety): the prompt states the
  # ingress-nginx controller is ALREADY installed and the oracle execs the
  # curl-test pod to reach the DB Console through ingress. crdb_env_ready installs
  # the controller + creates curl-test on its destructive fresh-build path, which
  # is SKIPPED on an inherited cluster (the probe sees crdb pods Running), so the
  # controller and curl-test are absent -> the agent has no ingress to configure
  # and the oracle's curl-via-ingress fails. Re-establish them additively when the
  # controller deployment is missing: install ingress-nginx (same command the
  # build uses) and apply curl-test. The agent's task (create the Ingress + TLS)
  # is unchanged. Never deletes a namespace or touches the crdb StatefulSet.
  # Standalone the controller already exists so the probe matches and this unit
  # skips -> byte-identical standalone behaviour.
  - name: crdb_ingress_infra
    on_probe_fail: skip
    probe:
      - command: "kubectl -n ingress-nginx get deploy ingress-nginx-controller"
        timeout_sec: 10
    apply:
      - command: "/bin/sh -c 'kubectl create namespace ingress-nginx --dry-run=client -o yaml | kubectl apply -f -'"
        sleep: 0
      - command: "kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/kind/deploy.yaml"
        sleep: 90
      - command: "/bin/sh -c 'kubectl -n ingress-nginx rollout status deploy/ingress-nginx-controller --timeout=120s || true'"
        sleep: 2
      - command: "/bin/sh -c 'kubectl -n ingress-nginx patch deployment ingress-nginx-controller --type=json -p \"[{\\\"op\\\":\\\"add\\\",\\\"path\\\":\\\"/spec/template/spec/containers/0/args/-\\\",\\\"value\\\":\\\"--watch-ingress-without-class=false\\\"}]\" || true'"
        sleep: 1
      - command: "/bin/sh -c 'kubectl -n ingress-nginx rollout status deploy/ingress-nginx-controller --timeout=120s || true'"
        sleep: 2
      - command: "/bin/sh -c 'kubectl -n cockroachdb get pod curl-test >/dev/null 2>&1 || kubectl -n cockroachdb apply -f cases/cockroachdb/expose-ingress/resource/curl-test.yaml'"
        sleep: 2
      - command: "/bin/sh -c 'kubectl -n cockroachdb wait --for=condition=Ready pod/curl-test --timeout=120s || true'"
        sleep: 1
    verify:
      - command: "/bin/sh -c 'kubectl -n ingress-nginx get deploy ingress-nginx-controller >/dev/null 2>&1; true'"
        timeout_sec: 10

oracle:
  verify:
    commands:
      - command: "python3 cases/cockroachdb/expose-ingress/oracle/oracle.py"
        timeout_sec: 120
