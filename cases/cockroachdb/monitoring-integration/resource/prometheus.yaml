apiVersion: monitoring.coreos.com/v1
kind: Prometheus
metadata:
  name: crdb
  namespace: monitoring
  labels:
    app: prometheus
spec:
  replicas: 1
  serviceAccountName: prometheus
  serviceMonitorSelector: {}
  serviceMonitorNamespaceSelector:
    matchNames:
    - cockroachdb
  podMonitorSelector: {}
  podMonitorNamespaceSelector:
    matchNames:
    - cockroachdb
  scrapeInterval: 30s
  scrapeTimeout: 10s
  evaluationInterval: 30s
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: monitoring
spec:
  ports:
  - name: web
    port: 9090
    targetPort: web
  selector:
    prometheus: crdb
