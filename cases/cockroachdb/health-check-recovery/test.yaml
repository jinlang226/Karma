# cockroachdb/health-check-recovery
# Restore full cluster health after a pod fails health checks and the cluster is degraded

prompt: |
  A CockroachDB cluster is running in the cockroachdb namespace. One pod is
  failing health checks and the cluster is degraded.

  Your task:
  Restore full cluster health so all pods are Ready and the cluster is healthy.

  Agent task: Health Checking and Auto-Recovery
  File: pkg/healthchecker/healthchecker.go

  Health checking components:
  1. Kubernetes readiness probe:
     - Checks /health?ready=1 endpoint
     - Pod removed from service if failing
     - Triggers pod restart if failing for too long

  2. Liveness probe:
     - Checks /health endpoint
     - Kills pod if failing
     - Kubernetes restarts pod automatically

  3. HealthChecker.Probe():
     - Used during rolling updates
     - Checks ranges_underreplicated metric
     - Waits until metric = 0 before continuing
     - Ensures cluster healthy after each pod restart

  Health endpoints:
  - /health: Basic liveness check
  - /health?ready=1: Readiness check (considers cluster status)
  - /_status/vars: Prometheus metrics including under-replicated ranges

  Recovery process:
  1. Readiness probe fails for one pod
  2. Pod removed from Service (no new connections)
  3. Operator waits for readiness to recover
  4. Pod rejoins cluster and health checks pass

  Verification:
  1. Pod recovered:
     kubectl -n cockroachdb get pods
     (crdb-cluster-1 should show 1/1 READY)

  2. All nodes in cluster:
     kubectl -n cockroachdb exec crdb-cluster-0 -- \
       ./cockroach node status --insecure
     (All 3 nodes should be is_live=true)

  3. Verify SQL readiness:
     kubectl -n cockroachdb exec crdb-cluster-0 -- \
       ./cockroach sql --insecure -e "SELECT 1;"
     (Should succeed)

namespace_contract:
  required_roles: []

metrics:
  - time_to_first_mutation
  - destructive_ops

preconditionUnits:
  - name: crdb_env_ready
    on_probe_fail: skip
    probe:
      # Non-destructive skip-if-running probe. The env PERSISTS across workflow
      # stages: when a cockroachdb cluster is already present (inherited from a
      # prior stage), skip the destructive apply so accumulated state is
      # preserved. The apply (which deletes+recreates the namespace) runs ONLY on
      # an empty namespace.
      # AUTHORITATIVE skip-if-running probe (Pattern 7): succeed when the
      # canonical StatefulSet exists OR any cockroach pod is Running, so the
      # destructive namespace rebuild below is skipped on an inherited cluster
      # even if its pods are momentarily not Running (mid-restart from a prior
      # stage) -- the StatefulSet persists across that window. The bare
      # `grep -c Running` could miss such a cluster and clobber inherited state.
      - command: "/bin/sh -c 'kubectl -n cockroachdb get statefulset crdb-cluster >/dev/null 2>&1 || kubectl -n cockroachdb get pods 2>/dev/null | grep -q Running'"
        timeout_sec: 10
    apply:
      - command: "/bin/sh -c 'kubectl delete namespace cockroachdb --ignore-not-found=true --wait=false; kubectl wait --for=delete namespace/cockroachdb --timeout=400s || true'"
        timeout_sec: 460
        sleep: 2
      - command: "kubectl create namespace cockroachdb"
        sleep: 1
      - command: "kubectl -n cockroachdb apply -f cases/cockroachdb/health-check-recovery/resource/"
        sleep: 5
      - command: "/bin/sh -c 'for i in $(seq 1 30); do count=$(kubectl -n cockroachdb get pod -l app.kubernetes.io/name=cockroachdb --no-headers 2>/dev/null | wc -l | tr -d \" \"); if [ \"${count}\" -ge 1 ]; then exit 0; fi; sleep 2; done; exit 1'"
        sleep: 1
      - command: "kubectl -n cockroachdb wait --for=jsonpath={.status.phase}=Running pod -l app.kubernetes.io/name=cockroachdb --timeout=300s"
        sleep: 5
      - command: "/bin/sh -c 'for i in $(seq 1 30); do kubectl -n cockroachdb exec crdb-cluster-0 -- ./cockroach init --insecure --host=crdb-cluster-0.crdb-cluster.cockroachdb.svc.cluster.local && exit 0; sleep 3; done; exit 1'"
        sleep: 2
      - command: "kubectl -n cockroachdb wait --for=condition=ready pod -l app.kubernetes.io/name=cockroachdb --timeout=600s"
        timeout_sec: 640
        sleep: 10
      - command: "kubectl -n cockroachdb apply -f cases/cockroachdb/health-check-recovery/fault/"
        sleep: 5
      - command: "kubectl -n cockroachdb delete pod crdb-cluster-1"
        sleep: 2
      - command: "kubectl -n cockroachdb get pods"
        sleep: 2
    verify:
      - command: "kubectl -n cockroachdb get pods 2>/dev/null | grep -c Running"
        timeout_sec: 10

  # Additive fault re-plant (C8): the loopback --http-addr fault on pod-1 is
  # planted only inside the skip-gated fresh build above; composed mid-workflow
  # after a healthy crdb stage the build probe sees the inherited cluster and
  # skips, so the fault is never (re)planted and the stage grades an
  # already-healthy cluster vacuously. Re-plant JUST the fault additively
  # (modeled on cases/mongodb/health-check-recovery's health_probe_fault_ready):
  # patch ONLY the container command (P16 -- never re-apply the whole manifest)
  # with the same if-POD_NAME loopback logic fault/statefulset.yaml uses, then
  # delete pod-1 so the StatefulSet re-rolls it with the fault (ADV7: a template
  # patch alone never restarts running pods). The StatefulSet is PVC-backed
  # (volumeClaimTemplates: datadir), so bouncing pod-1 is data-safe.
  # LIMITATION: the fault command hardcodes --insecure; on an inherited SECURE
  # cluster (mounted certs dir) planting it would crash-loop pod-1 with a
  # wrong-flag command instead of shaping the health fault, so the apply guards
  # detect that (plus a non-canonical container/env shape) and skip planting
  # entirely (best-effort exit 0, P8) rather than brick the cluster -- the
  # stage then grades the inherited healthy cluster.
  - name: health_probe_fault_ready
    on_probe_fail: skip
    probe:
      # True (skip) when the unsolved fault is ALREADY present: pod-1's live
      # container command carries the loopback 127.0.0.1:8080 http-addr the
      # oracle's faulted-path checks grade (O39).
      - command: |
          /bin/sh -c '
          kubectl -n cockroachdb get pod crdb-cluster-1 -o jsonpath="{.spec.containers[0].command}" 2>/dev/null | grep -q "127.0.0.1:8080"
          '
        timeout_sec: 15
    apply:
      # Guard, patch, re-roll -- each guard exits 0 (skip planting, P8) when the
      # inherited cluster does not match the shape the fault command assumes:
      # secure mode (--insecure would brick it), a non-`db` first container, or
      # missing POD_NAME/POD_NAMESPACE downward-API env (the command needs both).
      - command: |
          /bin/sh -c '
          kubectl -n cockroachdb get statefulset crdb-cluster >/dev/null 2>&1 || exit 0
          kubectl -n cockroachdb exec crdb-cluster-0 -- ls /cockroach/cockroach-certs/ca.crt >/dev/null 2>&1 && exit 0
          [ "$(kubectl -n cockroachdb get statefulset crdb-cluster -o jsonpath="{.spec.template.spec.containers[0].name}" 2>/dev/null)" = "db" ] || exit 0
          envs=$(kubectl -n cockroachdb get statefulset crdb-cluster -o jsonpath="{.spec.template.spec.containers[0].env[*].name}" 2>/dev/null)
          echo "$envs" | grep -qw POD_NAME || exit 0
          echo "$envs" | grep -qw POD_NAMESPACE || exit 0
          kubectl -n cockroachdb patch statefulset crdb-cluster --type=strategic --patch-file cases/cockroachdb/health-check-recovery/patch/command-patch.yaml || exit 0
          kubectl -n cockroachdb delete pod crdb-cluster-1 --ignore-not-found=true || true
          '
        timeout_sec: 120
        sleep: 5
    verify:
      # Best-effort (P8): a skipped plant (secure/non-canonical inherited
      # cluster) must degrade to grading the healthy cluster, never to a
      # framework precondition ERROR.
      - command: |
          /bin/sh -c '
          kubectl -n cockroachdb get pod crdb-cluster-1 -o jsonpath="{.spec.containers[0].command}" 2>/dev/null | grep -q "127.0.0.1:8080"
          true
          '
        timeout_sec: 15

oracle:
  verify:
    commands:
      - command: "python3 cases/cockroachdb/health-check-recovery/oracle/oracle.py"
        timeout_sec: 240
