# Fault-shaping command patch for the additive replant unit (C8). Patches ONLY
# the db container's command (P16: never re-apply the whole manifest onto an
# inherited StatefulSet whose immutable fields a prior stage may have changed).
# Mirrors fault/statefulset.yaml's if-POD_NAME logic: crdb-cluster-1 binds its
# HTTP health endpoint to loopback so its readiness/liveness probes fail while
# gRPC/SQL keep serving. Strategic merge keys on the container name, so every
# other field of the inherited container (image, probes, resources) is kept.
# Lives in patch/ (NOT fault/): the build unit wholesale-applies fault/ with
# `kubectl apply -f`, which would reject this bare (kind-less) patch document.
spec:
  template:
    spec:
      containers:
      - name: db
        command:
        - /bin/bash
        - -c
        - >-
          if [ "$POD_NAME" = "crdb-cluster-1" ]; then
            HTTP_ADDR="127.0.0.1:8080";
          else
            HTTP_ADDR="0.0.0.0:8080";
          fi;
          exec /cockroach/cockroach start
          --logtostderr=INFO
          --insecure
          --advertise-host=$(POD_NAME).crdb-cluster.$(POD_NAMESPACE).svc.cluster.local
          --http-addr=${HTTP_ADDR}
          --port=26257
          --cache=25%
          --max-sql-memory=25%
          --join=crdb-cluster-0.crdb-cluster.$(POD_NAMESPACE).svc.cluster.local:26257,crdb-cluster-1.crdb-cluster.$(POD_NAMESPACE).svc.cluster.local:26257,crdb-cluster-2.crdb-cluster.$(POD_NAMESPACE).svc.cluster.local:26257
