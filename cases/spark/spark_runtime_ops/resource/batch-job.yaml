apiVersion: batch/v1
kind: Job
metadata:
  name: spark-batch-processor
  namespace: spark-runtime
spec:
  # Suspended on creation: the agent must resume it (suspend=false) so it runs.
  suspend: true
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: spark-batch-processor
    spec:
      serviceAccountName: spark
      restartPolicy: Never
      containers:
      - name: spark-batch
        image: apache/spark:3.5.3
        command:
        - /bin/bash
        - -c
        - |
          echo "Running batch processor"
          export SPARK_LOCAL_IP=$(hostname -i)
          /opt/spark/bin/spark-submit \
            --master local[1] \
            --class org.apache.spark.examples.SparkPi \
            /opt/spark/examples/jars/spark-examples_2.12-3.5.3.jar \
            200
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
