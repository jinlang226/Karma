apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-monitor
  namespace: spark-runtime
  annotations:
    kubernetes.io/change-cause: "v2 - broken image (ImagePullBackOff)"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spark-monitor
  template:
    metadata:
      labels:
        app: spark-monitor
    spec:
      serviceAccountName: spark
      containers:
      - name: spark-monitor
        # Broken: this tag does not exist, so pods enter ImagePullBackOff.
        # The agent must roll back / set a valid image (e.g. busybox:1.36).
        image: busybox:nonexistent-tag-9999
        command:
        - /bin/sh
        - -c
        - |
          echo "spark runtime monitor ready"
          while true; do
            sleep 3600
          done
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 300m
            memory: 256Mi
