apiVersion: v1
kind: ServiceAccount
metadata:
  name: spark
  namespace: spark-team-a
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: spark-role
  namespace: spark-team-a
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log", "services", "configmaps", "persistentvolumeclaims", "secrets"]
  verbs: ["create", "get", "list", "watch", "delete", "update", "patch"]
---
# BUG: subjects[0].namespace is "default" but the ServiceAccount lives in
# "spark-team-a". The binding does not grant the Team A SA any permissions.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: spark-role-binding
  namespace: spark-team-a
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: spark-role
subjects:
- kind: ServiceAccount
  name: spark
  namespace: default
