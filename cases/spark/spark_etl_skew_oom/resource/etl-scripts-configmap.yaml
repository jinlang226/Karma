apiVersion: v1
kind: ConfigMap
metadata:
  name: etl-scripts
  namespace: spark-etl
data:
  etl_pipeline.sql: |
    -- Stage 1: load raw event/user/product data
    CREATE OR REPLACE TEMP VIEW events
    USING csv
    OPTIONS (path '/data/input/events.csv', header 'true');

    -- Stage 2: clean and transform
    CREATE OR REPLACE TEMP VIEW clean_events AS
    SELECT CAST(user_id AS INT) AS user_id, CAST(amount AS DOUBLE) AS amount
    FROM events
    WHERE amount IS NOT NULL;

    -- Stage 3: aggregate by user_id (skewed on user_id 999 -> OOM)
    SELECT user_id, SUM(amount) AS total
    FROM clean_events
    GROUP BY user_id
    ORDER BY total DESC;
  generate_data.sh: |
    #!/bin/sh
    # Emit a skewed events.csv where user_id 999 dominates the distribution.
    mkdir -p /data/input
    echo "user_id,amount" > /data/input/events.csv
    i=0
    while [ "$i" -lt 1000 ]; do
      echo "999,10" >> /data/input/events.csv
      echo "$((i % 1000)),10" >> /data/input/events.csv
      i=$((i + 1))
    done
