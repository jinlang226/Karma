apiVersion: apps/v1
kind: Deployment
metadata:
  name: diagnostic-server
  namespace: spark-etl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: diagnostic-server
  template:
    metadata:
      labels:
        app: diagnostic-server
    spec:
      serviceAccountName: spark
      containers:
      - name: diagnostic-server
        image: busybox:1.36
        command:
        - /bin/sh
        - -c
        - |
          echo "DIAGNOSTIC: analyzing data distribution"
          echo "DIAGNOSTIC: hot key user_id=999 holds ~50% of records"
          echo "DIAGNOSTIC: skew_ratio=500x (>> 10x threshold)"
          echo "DIAGNOSTIC: Stage 3 GROUP BY user_id triggers OutOfMemoryError"
          echo "DIAGNOSTIC: remediation -> raise executor memory, scale workers, or enable AQE skewJoin"
          while true; do sleep 3600; done
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 300m
            memory: 256Mi
