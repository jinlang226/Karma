apiVersion: apps/v1
kind: Deployment
metadata:
  name: ray-head
  labels:
    app.kubernetes.io/name: ray
    app.kubernetes.io/component: head
    bench.ray.cluster: ray
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ray
      app.kubernetes.io/component: head
      bench.ray.cluster: ray
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ray
        app.kubernetes.io/component: head
        bench.ray.cluster: ray
    spec:
      containers:
      - name: ray-head
        image: rayproject/ray:2.8.0
        env:
          - name: MY_POD_IP
            valueFrom:
              fieldRef:
                fieldPath: status.podIP
          - name: RAY_NODE_ID
            valueFrom:
              fieldRef:
                fieldPath: metadata.uid
          - name: RAY_RAYLET_PID
            value: "1"
        command:
          - sh
          - -c
          - |
            ray start --head --node-ip-address="${MY_POD_IP}" --port=6379 --include-dashboard=false --num-cpus=0 --block
        ports:
          - containerPort: 6379
            name: gcs
