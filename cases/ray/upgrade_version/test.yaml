# ray/upgrade_version
# Upgrade ray-head and ray-worker deployments from rayproject/ray:2.8.0 to 2.9.0

prompt: |
  A Ray cluster is running with an older Ray image ({{params.from_image}}).

  Your task: upgrade both ray-head and ray-worker deployments to
  {{params.to_image}}.

  Requirements:
  - Update the image in both deployments.
  - Ensure rollouts complete successfully.

  Suggested commands:
  ```bash
  kubectl -n ray set image deploy/ray-head ray-head={{params.to_image}}
  kubectl -n ray set image deploy/ray-worker ray-worker={{params.to_image}}
  kubectl -n ray rollout status deploy/ray-head --timeout=120s
  kubectl -n ray rollout status deploy/ray-worker --timeout=120s
  ```

  Success criteria: both deployments use {{params.to_image}} and remain ready.

params:
  from_image:
    default: rayproject/ray:2.8.0
    description: Current Ray image the cluster is running before the upgrade
  to_image:
    default: rayproject/ray:2.9.0
    description: Target Ray image to upgrade both deployments to

namespace_contract:
  required_roles: []

metrics:
  - time_to_first_mutation

preconditionUnits:
  - name: ray_env_ready
    on_probe_fail: skip
    probe:
      - command: "kubectl -n ray get pods 2>/dev/null | grep -c Running"
        timeout_sec: 10
    apply:
      - command: "/bin/sh -c 'kubectl delete namespace ray --ignore-not-found=true --wait=false; kubectl wait --for=delete namespace/ray --timeout=300s 2>/dev/null || true'"
        timeout_sec: 360
        sleep: 2
      - command: "kubectl create namespace ray"
        sleep: 0
      - command: "kubectl -n ray apply -f cases/ray/upgrade_version/resource/ray-head-service.yaml"
        sleep: 1
      - command: "kubectl -n ray apply -f cases/ray/upgrade_version/resource/ray-head.yaml"
        sleep: 2
      - command: "kubectl -n ray rollout status deploy/ray-head --timeout=600s"
        sleep: 2
      - command: "kubectl -n ray apply -f cases/ray/upgrade_version/resource/ray-worker.yaml"
        sleep: 2
      - command: "kubectl -n ray rollout status deploy/ray-worker --timeout=600s"
        sleep: 2
      - command: "/bin/sh -c 'kubectl -n ray get pod ray-client >/dev/null 2>&1 || kubectl -n ray apply -f cases/ray/upgrade_version/resource/ray-client.yaml'"
        sleep: 1
      - command: "kubectl -n ray wait --for=condition=Ready pod/ray-client --timeout=600s"
        timeout_sec: 660
        sleep: 1
    verify:
      - command: "kubectl -n ray get pods 2>/dev/null | grep -c Running"
        timeout_sec: 10

  # Old-image baseline re-plant (C6/C8/Law 5): ray_env_ready's "any pods
  # Running" probe (kept existence-gated per P32) skips the whole build on an
  # inherited Ray cluster — which mid-workflow is typically already at the
  # TARGET image after a prior upgrade stage, so the prompt's "cluster is
  # running {{params.from_image}}" premise is false and the stage passes with
  # zero agent work. Ray is STATELESS (no on-disk format constraint), so —
  # unlike the mongodb/crdb/ES version-baseline cases — an in-place
  # re-baseline to the old image is doctrine-legal. This unit probes the
  # version baseline itself (head+worker deployment images ==
  # {{params.from_image}}; skip only when already there) and otherwise
  # re-baselines additively: `set image` on both deployments (never a
  # namespace delete), delete their pods so they re-roll immediately, and a
  # bounded best-effort rollout wait. The verify is the real gate (Law 5): the
  # baseline must GENUINELY land — every Running head/worker pod must report
  # {{params.from_image}} (default verify retries absorb the roll window).
  # Runs after ray_env_ready so the workload exists (P37).
  - name: old_image_baseline_ready
    on_probe_fail: skip
    probe:
      - command: "/bin/sh -c 'h=$(kubectl -n ray get deploy ray-head -o jsonpath=\"{.spec.template.spec.containers[0].image}\" 2>/dev/null); w=$(kubectl -n ray get deploy ray-worker -o jsonpath=\"{.spec.template.spec.containers[0].image}\" 2>/dev/null); [ -n \"$h\" ] && [ \"$h\" = \"{{params.from_image}}\" ] && [ \"$w\" = \"{{params.from_image}}\" ]'"
        timeout_sec: 15
    apply:
      - command: "kubectl -n ray set image deploy/ray-head '*={{params.from_image}}'"
        sleep: 1
      - command: "kubectl -n ray set image deploy/ray-worker '*={{params.from_image}}'"
        sleep: 1
      - command: "/bin/sh -c 'kubectl -n ray delete pod -l app.kubernetes.io/component=head --ignore-not-found=true --wait=false || true; kubectl -n ray delete pod -l app.kubernetes.io/component=worker --ignore-not-found=true --wait=false || true'"
        sleep: 2
      # Bounded, best-effort waits (P13: --timeout paired with timeout_sec);
      # the verify below is the authoritative gate.
      - command: "kubectl -n ray rollout status deploy/ray-head --timeout=300s || true"
        timeout_sec: 360
        sleep: 1
      - command: "kubectl -n ray rollout status deploy/ray-worker --timeout=300s || true"
        timeout_sec: 360
        sleep: 1
    verify:
      - command: "/bin/sh -c 'imgs=$(kubectl -n ray get pods -l \"app.kubernetes.io/component in (head,worker)\" --field-selector=status.phase=Running -o jsonpath=\"{.items[*].spec.containers[0].image}\"); [ -n \"$imgs\" ] || exit 1; for i in $imgs; do [ \"$i\" = \"{{params.from_image}}\" ] || exit 1; done'"
        timeout_sec: 20

oracle:
  verify:
    commands:
      # O21/O14: the oracle runs two sequential 60s convergence polls
      # (readyReplicas + scoped raylet tally); the budget must exceed their sum.
      - command: "python3 cases/ray/upgrade_version/oracle/oracle.py"
        timeout_sec: 240
