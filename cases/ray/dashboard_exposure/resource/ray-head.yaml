apiVersion: apps/v1
kind: Deployment
metadata:
  name: ray-head
  labels:
    app.kubernetes.io/name: ray
    app.kubernetes.io/component: head
    bench.ray.cluster: ray
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ray
      app.kubernetes.io/component: head
      bench.ray.cluster: ray
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ray
        app.kubernetes.io/component: head
        bench.ray.cluster: ray
    spec:
      containers:
      - name: ray-head
        image: rayproject/ray:2.9.0
        env:
          - name: MY_POD_IP
            valueFrom:
              fieldRef:
                fieldPath: status.podIP
        command:
          - sh
          - -c
          - |
            ray start --head --node-ip-address="${MY_POD_IP}" --port=6379 --dashboard-host=0.0.0.0 --dashboard-port=8265 --block
        ports:
          - containerPort: 6379
            name: gcs
          - containerPort: 8265
            name: dashboard
