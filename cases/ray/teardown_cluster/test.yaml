# ray/teardown_cluster
# Remove Ray cluster resources (head deploy, worker deploy, head Service) while keeping the namespace

prompt: |
  A Ray cluster is running in the ray namespace.

  Your task: remove the Ray cluster resources while keeping the namespace.

  Requirements:
  - Delete the ray-head deployment.
  - Delete the ray-worker deployment.
  - Delete the ray-head Service.
  - Do NOT delete the ray namespace.

  Success criteria: those three resources no longer exist.

namespace_contract:
  required_roles: []

metrics:
  - time_to_first_mutation

preconditionUnits:
  - name: ray_env_ready
    on_probe_fail: skip
    probe:
      - command: "kubectl -n ray get pods 2>/dev/null | grep -c Running"
        timeout_sec: 10
    apply:
      - command: "kubectl create namespace ray"
        sleep: 0
      - command: "kubectl -n ray apply -f cases/ray/teardown_cluster/resource/ray-head-service.yaml"
        sleep: 1
      - command: "kubectl -n ray apply -f cases/ray/teardown_cluster/resource/ray-head.yaml"
        sleep: 2
      - command: "kubectl -n ray rollout status deploy/ray-head --timeout=120s"
        sleep: 2
      - command: "kubectl -n ray apply -f cases/ray/teardown_cluster/resource/ray-worker.yaml"
        sleep: 2
      - command: "kubectl -n ray rollout status deploy/ray-worker --timeout=120s"
        sleep: 2
    verify:
      - command: "kubectl -n ray get pods 2>/dev/null | grep -c Running"
        timeout_sec: 10

oracle:
  verify:
    commands:
      - command: "python3 cases/ray/teardown_cluster/oracle/oracle.py"
        timeout_sec: 60
