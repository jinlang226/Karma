# ray/scale_workers
# Scale the Ray worker deployment from 1 replica to 3 replicas

prompt: |
  A Ray cluster is running, but the worker deployment only has {{params.source_worker_replicas}} replica.

  Your task: scale the worker deployment to {{params.target_worker_replicas}} replicas.

  Recommended commands:
  ```bash
  kubectl -n ray scale deploy/ray-worker --replicas={{params.target_worker_replicas}}
  kubectl -n ray rollout status deploy/ray-worker --timeout=120s
  ```

  Success criteria: ray-worker shows {{params.target_worker_replicas}} ready replicas and the Ray cluster
  reports 4 live nodes (1 head + {{params.target_worker_replicas}} workers).

params:
  source_worker_replicas:
    default: 1
    description: Initial number of Ray worker replicas before scaling
  target_worker_replicas:
    default: 3
    description: Desired number of Ray worker replicas after scaling

namespace_contract:
  required_roles: []

metrics:
  - time_to_first_mutation

preconditionUnits:
  - name: ray_env_ready
    on_probe_fail: skip
    probe:
      - command: "kubectl -n ray get pods 2>/dev/null | grep -c Running"
        timeout_sec: 10
    apply:
      - command: "/bin/sh -c 'kubectl delete namespace ray --ignore-not-found=true --wait=false; kubectl wait --for=delete namespace/ray --timeout=300s 2>/dev/null || true'"
        timeout_sec: 360
        sleep: 2
      - command: "kubectl create namespace ray"
        sleep: 0
      - command: "kubectl -n ray apply -f cases/ray/scale_workers/resource/ray-head-service.yaml"
        sleep: 1
      - command: "kubectl -n ray apply -f cases/ray/scale_workers/resource/ray-head.yaml"
        sleep: 2
      - command: "kubectl -n ray rollout status deploy/ray-head --timeout=600s"
        sleep: 2
      - command: "kubectl -n ray apply -f cases/ray/scale_workers/resource/ray-worker.yaml"
        sleep: 2
      - command: "kubectl -n ray rollout status deploy/ray-worker --timeout=600s"
        sleep: 2
      - command: "/bin/sh -c 'kubectl -n ray get pod ray-client >/dev/null 2>&1 || kubectl -n ray apply -f cases/ray/scale_workers/resource/ray-client.yaml'"
        sleep: 1
      - command: "kubectl -n ray wait --for=condition=Ready pod/ray-client --timeout=600s"
        timeout_sec: 660
        sleep: 1
      - command: "kubectl -n ray exec ray-client -- ray start --address=ray-head:6379"
        sleep: 2
    verify:
      - command: "kubectl -n ray get pods 2>/dev/null | grep -c Running"
        timeout_sec: 10

oracle:
  verify:
    commands:
      - command: "python3 cases/ray/scale_workers/oracle/oracle.py"
        timeout_sec: 180
