apiVersion: apps/v1
kind: Deployment
metadata:
  name: ray-worker
  labels:
    app.kubernetes.io/name: ray
    app.kubernetes.io/component: worker
    bench.ray.cluster: ray
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: ray
      app.kubernetes.io/component: worker
      bench.ray.cluster: ray
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ray
        app.kubernetes.io/component: worker
        bench.ray.cluster: ray
    spec:
      containers:
      - name: ray-worker
        image: rayproject/ray:2.9.0
        env:
          - name: MY_POD_IP
            valueFrom:
              fieldRef:
                fieldPath: status.podIP
          - name: RAY_NODE_ID
            valueFrom:
              fieldRef:
                fieldPath: metadata.uid
          - name: RAY_RAYLET_PID
            value: "1"
        command:
          - sh
          - -c
          - |
            ray start --address=ray-head:6379 --node-ip-address="${MY_POD_IP}" --num-cpus=1 --block --bad-flag
