# ray/job_submission
# Fix the Ray job script to connect to the correct head address and print "pong"

prompt: |
  A Ray cluster is running, and the ray-client pod contains a job script at
  /opt/job.py. The job should connect to the head service and print "{{params.expected_output}}".

  Current issue: the script points at a head address that does not exist in
  this namespace, so it fails to connect.

  Your task:
  - Update the job script so it connects to the Ray cluster that is actually
    running in the namespace (its head is behind the ray-head Service).
  - Ensure the job runs successfully and prints "{{params.expected_output}}".

  Note: /opt/job.py is mounted read-only from the ray-job-script ConfigMap (via
  subPath, which does not refresh in place) — after updating the script you may
  need to recreate the ray-client pod; its manifest is at
  cases/ray/job_submission/resource/ray-client.yaml.

  You can test with:
  ```bash
  kubectl -n ray exec ray-client -- python /opt/job.py
  ```

  Success criteria: the command exits 0 and prints "{{params.expected_output}}".

params:
  expected_output:
    default: pong
    description: String the Ray job is expected to print on success

namespace_contract:
  required_roles: []

metrics:
  - time_to_first_mutation

preconditionUnits:
  - name: ray_env_ready
    on_probe_fail: skip
    probe:
      - command: "kubectl -n ray get pods 2>/dev/null | grep -c Running"
        timeout_sec: 10
    apply:
      - command: "/bin/sh -c 'kubectl delete namespace ray --ignore-not-found=true --wait=false; kubectl wait --for=delete namespace/ray --timeout=300s 2>/dev/null || true'"
        timeout_sec: 360
        sleep: 2
      - command: "kubectl create namespace ray"
        sleep: 0
      - command: "kubectl -n ray apply -f cases/ray/job_submission/resource/ray-head-service.yaml"
        sleep: 1
      - command: "kubectl -n ray apply -f cases/ray/job_submission/resource/ray-head.yaml"
        sleep: 2
      - command: "kubectl -n ray rollout status deploy/ray-head --timeout=600s"
        sleep: 2
      - command: "kubectl -n ray apply -f cases/ray/job_submission/resource/ray-worker.yaml"
        sleep: 2
      - command: "kubectl -n ray rollout status deploy/ray-worker --timeout=600s"
        sleep: 2
      - command: "kubectl -n ray apply -f cases/ray/job_submission/resource/ray-job-script.yaml"
        sleep: 1
      - command: "/bin/sh -c 'kubectl -n ray get pod ray-client >/dev/null 2>&1 || kubectl -n ray apply -f cases/ray/job_submission/resource/ray-client.yaml'"
        sleep: 1
      - command: "kubectl -n ray wait --for=condition=Ready pod/ray-client --timeout=600s"
        timeout_sec: 660
        sleep: 1
    verify:
      - command: "kubectl -n ray get pods 2>/dev/null | grep -c Running"
        timeout_sec: 10

  # Additive fixture unit (C1) + fault re-plant (C8): the oracle execs
  # `python /opt/job.py` inside ray-client. Standalone, ray_env_ready's apply
  # provides the ray-job-script ConfigMap and a ray-client that mounts it at
  # /opt/job.py. But in a workflow this case usually inherits a live cluster
  # from a prior stage (deploy/scale/upgrade), whose ray-client pod does NOT
  # mount the job script and whose apply is skipped here -- so /opt/job.py is
  # missing and the oracle cannot run. This unit ensures JUST that fixture:
  # it (re)creates the job-script ConfigMap and recreates ONLY the throwaway
  # ray-client client pod with the mount. It never touches the head/worker
  # cluster state or the namespace. The probe gates on the FAULT SIGNATURE
  # (the broken ray-head-old address), not mere script presence (C8/P3): a
  # present-but-already-FIXED script inherited from a prior identical stage
  # must be re-broken, or the stage passes with zero agent work (Law 5).
  # Standalone (broken script freshly mounted) it is a harmless no-op.
  - name: job_script_ready
    on_probe_fail: skip
    probe:
      - command: "kubectl -n ray exec ray-client -- grep -q ray-head-old /opt/job.py 2>/dev/null && echo fault-present"
        timeout_sec: 15
    apply:
      - command: "kubectl -n ray apply -f cases/ray/job_submission/resource/ray-job-script.yaml"
        sleep: 1
      - command: "kubectl -n ray delete pod ray-client --ignore-not-found=true --wait=true"
        sleep: 1
      - command: "/bin/sh -c 'kubectl -n ray get pod ray-client >/dev/null 2>&1 || kubectl -n ray apply -f cases/ray/job_submission/resource/ray-client.yaml'"
        sleep: 1
      - command: "kubectl -n ray wait --for=condition=Ready pod/ray-client --timeout=600s"
        timeout_sec: 660
        sleep: 1
    verify:
      - command: "kubectl -n ray exec ray-client -- grep -q ray-head-old /opt/job.py 2>/dev/null && echo fault-present"
        timeout_sec: 15

oracle:
  verify:
    commands:
      # The oracle execs the Ray client job, whose first connection to the cluster
      # (ray://...) is legitimately slow on a cold cluster; 60s was too tight and
      # could fail a correct fix. Allow 150s.
      - command: "python3 cases/ray/job_submission/oracle/oracle.py"
        timeout_sec: 150
