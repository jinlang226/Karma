# mongodb/version-upgrade-hard
# Upgrade a MongoDB 5.0 replica set to 7.0.5 via a supported upgrade path

prompt: |
  A 3-member MongoDB replica set is running in the mongodb namespace on MongoDB 5.0.x.
  Upgrade to MongoDB 7.0.5 using a supported upgrade path and finalize feature compatibility.
  Preserve replica set health and existing data.
  Do not use operators or CRDs.

namespace_contract:
  required_roles: []

metrics:
  - time_to_first_mutation

preconditionUnits:
  - name: mongo_env_ready
    on_probe_fail: skip
    probe:
      # AUTHORITATIVE skip-if-running probe (P32): succeed when the canonical
      # StatefulSet exists OR any pod is Running, so the destructive namespace
      # rebuild below is skipped on an inherited cluster even if its pods are
      # momentarily not Running (mid-restart from a prior stage) -- the
      # StatefulSet persists across that window. The bare `grep -c Running`
      # could miss such a cluster and clobber inherited state.
      - command: "/bin/sh -c 'kubectl -n mongodb get statefulset mongodb-replica >/dev/null 2>&1 || kubectl -n mongodb get pods 2>/dev/null | grep -q Running'"
        timeout_sec: 10
    apply:
      - command: "/bin/sh -c 'kubectl delete namespace mongodb --ignore-not-found=true; kubectl wait --for=delete namespace/mongodb --timeout=120s || true'"
        sleep: 2
      - command: "kubectl create namespace mongodb"
        sleep: 1
      - command: "kubectl -n mongodb apply -f cases/mongodb/version-upgrade-hard/resource/secrets.yaml"
        sleep: 1
      - command: "kubectl -n mongodb apply -f cases/mongodb/version-upgrade-hard/resource/services.yaml"
        sleep: 1
      - command: "kubectl -n mongodb apply -f cases/mongodb/version-upgrade-hard/resource/statefulset.yaml"
        sleep: 5
      - command: |
          /bin/sh -c 'for i in $(seq 1 120); do ready=$(kubectl -n mongodb get sts mongodb-replica -o jsonpath='\''{.status.readyReplicas}'\'' 2>/dev/null); if [ "${ready:-0}" -ge 3 ]; then exit 0; fi; sleep 5; done; exit 1'
        sleep: 2
      # Pod-Ready != mongod accepting TCP (§1.10): ping-until-ok before rs.initiate.
      - command: |
          /bin/sh -c 'for i in $(seq 1 30); do kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet --eval '\''db.runCommand({ping:1}).ok'\'' 2>/dev/null | grep -q 1 && exit 0; sleep 3; done; exit 1'
        sleep: 2
      - command: |
          /bin/sh -c 'kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet --eval '\''rs.initiate({_id:"mongodb-replica",members:[{_id:0,host:"mongodb-replica-0.mongodb-replica-svc.mongodb.svc.cluster.local:27017"},{_id:1,host:"mongodb-replica-1.mongodb-replica-svc.mongodb.svc.cluster.local:27017"},{_id:2,host:"mongodb-replica-2.mongodb-replica-svc.mongodb.svc.cluster.local:27017"}]})'\'''
        sleep: 5
      - command: |
          /bin/sh -c 'for i in $(seq 1 20); do kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet --eval '\''db.hello().isWritablePrimary'\'' | grep true && exit 0; sleep 3; done; exit 1'
        sleep: 2
      - command: |
          /bin/sh -c 'kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet --eval '\''db.getSiblingDB("admin").createUser({user:"admin-user",pwd:"admin123password",roles:[{role:"clusterAdmin",db:"admin"},{role:"userAdminAnyDatabase",db:"admin"},{role:"readWriteAnyDatabase",db:"admin"}]})'\'''
        sleep: 2
      - command: |
          /bin/sh -c 'kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet "mongodb://admin-user:admin123password@localhost:27017/admin" --eval '\''db.adminCommand({setFeatureCompatibilityVersion:"5.0"})'\'''
        sleep: 2
      - command: |
          /bin/sh -c 'kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet "mongodb://admin-user:admin123password@localhost:27017/admin" --eval '\''db.getSiblingDB("testdb").data.insertOne({version:"5.0",timestamp:new Date()})'\'''
        sleep: 2
    verify:
      - command: "kubectl -n mongodb get pods 2>/dev/null | grep -c Running"
        timeout_sec: 10

  - name: admin_user_fixture
    # Composition self-sufficiency: this case authenticates as the `admin-user`
    # created at deploy. On an inherited cluster a no-auth/other predecessor may
    # not have created it, and a live user's password is unrecoverable -> the
    # oracle's (and the user fixtures') admin auth fails through no agent fault.
    # Bring our own additively: if admin-user already authenticates, skip; else
    # ensure the secret and create the user. No restart, no data touched,
    # idempotent -> never regresses a cluster where admin already works.
    on_probe_fail: skip
    probe:
      - command: |
          /bin/sh -c '
          t=""; for cca in /etc/tls/ca.crt /etc/mongo-ca/ca.crt; do kubectl -n mongodb exec mongodb-replica-0 -- ls $cca >/dev/null 2>&1 && { t="--tls --tlsAllowInvalidHostnames --tlsAllowInvalidCertificates --tlsCAFile $cca"; break; }; done
          pw=$(kubectl -n mongodb get secret admin-user-password -o jsonpath="{.data.password}" 2>/dev/null | base64 -d 2>/dev/null)
          [ -n "$pw" ] || exit 1
          kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet $t "mongodb://admin-user:$pw@localhost:27017/admin" --eval "db.runCommand({ping:1}).ok" 2>/dev/null | grep -q 1
          '
        timeout_sec: 30
    apply:
      # Ensure the admin secret (idempotent: create only if missing).
      - command: "/bin/sh -c 'kubectl -n mongodb get secret admin-user-password >/dev/null 2>&1 || kubectl -n mongodb create secret generic admin-user-password --from-literal=password=admin123password'"
        sleep: 1
      # Ensure the admin-user MongoDB user. On a no-auth inherited cluster this
      # runs unauthenticated and succeeds; where it already exists it errors and
      # the `|| true` keeps it a no-op. Never drops or alters existing users/data.
      - command: |
          /bin/sh -c '
          t=""; for cca in /etc/tls/ca.crt /etc/mongo-ca/ca.crt; do kubectl -n mongodb exec mongodb-replica-0 -- ls $cca >/dev/null 2>&1 && { t="--tls --tlsAllowInvalidHostnames --tlsAllowInvalidCertificates --tlsCAFile $cca"; break; }; done
          P=""; for _pi in $(seq 1 30); do P=$(kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet $t --eval "rs.hello().primary" 2>/dev/null | cut -d. -f1); [ -n "$P" ] && break; sleep 2; done; P=${P:-mongodb-replica-0}
          kubectl -n mongodb exec "$P" -- mongosh --quiet $t --eval "db.getSiblingDB(\"admin\").createUser({user:\"admin-user\",pwd:\"admin123password\",roles:[{role:\"root\",db:\"admin\"}]})" 2>/dev/null || true
          '
        sleep: 2
    verify:
      # P38: read the write back -- authenticate AS the admin user just created and
      # ping (bounded poll to tolerate election/replication lag), not merely assert
      # the companion secret exists.
      - command: |
          /bin/sh -c '
          t=""; for cca in /etc/tls/ca.crt /etc/mongo-ca/ca.crt; do kubectl -n mongodb exec mongodb-replica-0 -- ls $cca >/dev/null 2>&1 && { t="--tls --tlsAllowInvalidHostnames --tlsAllowInvalidCertificates --tlsCAFile $cca"; break; }; done
          pw=$(kubectl -n mongodb get secret admin-user-password -o jsonpath="{.data.password}" 2>/dev/null | base64 -d 2>/dev/null); pw=${pw:-admin123password}
          for _vi in $(seq 1 20); do
            kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet $t "mongodb://admin-user:$pw@localhost:27017/admin?directConnection=true" --eval "db.runCommand({ping:1}).ok" 2>/dev/null | grep -q 1 && exit 0
            sleep 3
          done
          exit 1
          '
        timeout_sec: 90

  # Version-baseline guard (C6). The unsolved problem is "cluster running the OLD
  # release (mongo:5.0.5, FCV 5.0)". Standalone, the destructive mongo_env_ready
  # build (which runs only when NO mongodb StatefulSet exists) plants that
  # baseline fresh. Composed, an inherited cluster may already be PAST it -- and
  # a newer mongod cannot restart on data files it already wrote, so an in-place
  # `set image` downgrade crash-loops every member and wrecks the whole
  # inherited cluster. This unit therefore NEVER rolls the binary back: when the
  # live image is NEWER than mongo:5.0.5 it fails FAST and CLEAN (exit 1,
  # nothing mutated). The real fix is workflow curation (guideline
  # §X-MongoDB): curate this case out of chains past its base version. A
  # live image OLDER than the baseline is still rolled FORWARD to it (a normal
  # upgrade, data-safe), and FCV is aligned best-effort.
  - name: mongo_old_version_baseline_ready
    on_probe_fail: skip
    probe:
      - command: |
          /bin/sh -c '
          imgs=$(kubectl -n mongodb get sts mongodb-replica -o jsonpath="{.spec.template.spec.containers[0].image}" 2>/dev/null)
          [ "$imgs" = "mongo:5.0.5" ]
          '
        timeout_sec: 15
    apply:
      # C6 fail-fast: refuse to mutate when the inherited cluster is NEWER than
      # the required baseline -- never roll the binary back in place.
      - command: |
          /bin/sh -c '
          img=$(kubectl -n mongodb get sts mongodb-replica -o jsonpath="{.spec.template.spec.containers[0].image}" 2>/dev/null)
          tag=${img##*:}; btag="mongo:5.0.5"; btag=${btag##*:}
          if [ -n "$img" ] && [ "$tag" != "$btag" ] && [ "$(printf "%s\n%s\n" "$tag" "$btag" | sort -V | tail -1)" = "$tag" ]; then
            echo "mongodb/version-upgrade-hard C6: inherited StatefulSet runs $img, NEWER than the mongo:5.0.5 baseline." >&2
            echo "An in-place downgrade cannot work: a newer mongod cannot restart on data it already wrote (crash-loop)." >&2
            echo "Nothing was mutated. Curate this case out of chains past its base version (C6, guideline §X-MongoDB)." >&2
            exit 1
          fi
          '
        timeout_sec: 20
      - command: "kubectl -n mongodb set image statefulset/mongodb-replica mongod=mongo:5.0.5"
        sleep: 3
      - command: |
          /bin/sh -c 'for i in $(seq 1 120); do ready=$(kubectl -n mongodb get sts mongodb-replica -o jsonpath='\''{.status.readyReplicas}'\'' 2>/dev/null); rev=$(kubectl -n mongodb get sts mongodb-replica -o jsonpath='\''{.status.updatedReplicas}'\'' 2>/dev/null); if [ "${ready:-0}" -ge 3 ] && [ "${rev:-0}" -ge 3 ]; then exit 0; fi; sleep 5; done; exit 0'
        timeout_sec: 650
        sleep: 2
      - command: |
          /bin/sh -c 'pw=$(kubectl -n mongodb get secret admin-user-password -o jsonpath="{.data.password}" 2>/dev/null | base64 -d 2>/dev/null); pw=${pw:-admin123password}; kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet "mongodb://admin-user:$pw@localhost:27017/admin?directConnection=true" --eval '\''db.adminCommand({setFeatureCompatibilityVersion:"5.0"})'\'' 2>/dev/null || true'
        sleep: 2
    verify:
      - command: |
          /bin/sh -c 'imgs=$(kubectl -n mongodb get sts mongodb-replica -o jsonpath="{.spec.template.spec.containers[0].image}" 2>/dev/null); [ "$imgs" = "mongo:5.0.5" ]'
        timeout_sec: 15

  # Additive data fixture (composition safety): the oracle requires >= 1 docs in
  # testdb.data. When this case runs chained on an inherited cluster the
  # destructive `apply` above is skipped, so a prior stage may have left the
  # collection short. This unit tops it up ADDITIVELY to the required count WITHOUT
  # dropping/recreating the collection or touching the namespace/cluster.
  # It authenticates as the stable admin user (password from the admin
  # secret, like the case/oracle). The probe gates on the DATA COUNT (not "pods Running"), so it runs
  # whenever the collection is short; standalone (where `apply` already seeded 1)
  # it sees the required count and skips -> identical behaviour. Idempotent: inserts
  # only the deficit (required - current).
  - name: mongo_seed_fixture
    on_probe_fail: skip
    probe:
      - command: |
          /bin/sh -c 't=""; for cca in /etc/tls/ca.crt /etc/mongo-ca/ca.crt; do kubectl -n mongodb exec mongodb-replica-0 -- ls $cca >/dev/null 2>&1 && { t="--tls --tlsAllowInvalidHostnames --tlsAllowInvalidCertificates --tlsCAFile $cca"; break; }; done; pw=$(kubectl -n mongodb get secret admin-user-password -o jsonpath="{.data.password}" 2>/dev/null | base64 -d 2>/dev/null); pw=${pw:-admin123password}; n=$(P=""; for _pi in $(seq 1 30); do P=$(kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet $t "mongodb://admin-user:$pw@localhost:27017/admin?directConnection=true" --eval '\''rs.hello().primary'\'' 2>/dev/null | cut -d. -f1); [ -n "$P" ] && break; sleep 2; done; P=${P:-mongodb-replica-0}; kubectl -n mongodb exec "$P" -- mongosh --quiet $t "mongodb://admin-user:$pw@localhost:27017/admin" --eval '\''db.getSiblingDB("testdb").data.countDocuments({})'\'' 2>/dev/null | tr -dc 0-9); [ "${n:-0}" -ge 1 ] && echo ok | grep -c ok'
        timeout_sec: 30
    apply:
      - command: |
          /bin/sh -c 'pw=$(kubectl -n mongodb get secret admin-user-password -o jsonpath="{.data.password}" 2>/dev/null | base64 -d 2>/dev/null); pw=${pw:-admin123password}; P=""; for _pi in $(seq 1 30); do P=$(kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet "mongodb://admin-user:$pw@localhost:27017/admin?directConnection=true" --eval '\''rs.hello().primary'\'' 2>/dev/null | cut -d. -f1); [ -n "$P" ] && break; sleep 2; done; P=${P:-mongodb-replica-0}; kubectl -n mongodb exec "$P" -- mongosh --quiet "mongodb://admin-user:$pw@localhost:27017/admin" --eval '\''var c=db.getSiblingDB("testdb").data; var need=1-c.countDocuments({}); var docs=[]; for(var i=0;i<need;i++){docs.push({seed:"fixture",ts:new Date()});} if(docs.length>0){c.insertMany(docs,{writeConcern:{w:1}});}'\'''
        sleep: 2
    verify:
      - command: |
          /bin/sh -c 't=""; for cca in /etc/tls/ca.crt /etc/mongo-ca/ca.crt; do kubectl -n mongodb exec mongodb-replica-0 -- ls $cca >/dev/null 2>&1 && { t="--tls --tlsAllowInvalidHostnames --tlsAllowInvalidCertificates --tlsCAFile $cca"; break; }; done; pw=$(kubectl -n mongodb get secret admin-user-password -o jsonpath="{.data.password}" 2>/dev/null | base64 -d 2>/dev/null); pw=${pw:-admin123password}; n=$(P=""; for _pi in $(seq 1 30); do P=$(kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet $t "mongodb://admin-user:$pw@localhost:27017/admin?directConnection=true" --eval '\''rs.hello().primary'\'' 2>/dev/null | cut -d. -f1); [ -n "$P" ] && break; sleep 2; done; P=${P:-mongodb-replica-0}; kubectl -n mongodb exec "$P" -- mongosh --quiet $t "mongodb://admin-user:$pw@localhost:27017/admin" --eval '\''db.getSiblingDB("testdb").data.countDocuments({})'\'' 2>/dev/null | tr -dc 0-9); [ "${n:-0}" -ge 1 ]'
        timeout_sec: 30

oracle:
  verify:
    commands:
      - command: "python3 cases/mongodb/version-upgrade-hard/oracle/oracle.py"
        timeout_sec: 300
