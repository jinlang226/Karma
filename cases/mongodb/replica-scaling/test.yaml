# mongodb/replica-scaling
# Scale a 3-member MongoDB replica set to 5 members without data loss

params:
  cluster_prefix:
    default: mongodb-replica
    description: StatefulSet name of the replica set members.
  replica_set_name:
    default: mongodb-replica
    description: MongoDB replica set _id used when initiating the set.
  target_replicas:
    default: 5
    description: Target number of replica set members after scaling.
  admin_username:
    default: admin-user
    description: Username of the MongoDB admin user.
  app_database:
    default: testdb
    description: Application database seeded with data.
  app_collection:
    default: data
    description: Application collection seeded with data.

prompt: |
  A 3-member MongoDB replica set is running in the mongodb namespace.
  Scale the replica set to {{params.target_replicas}} members without data loss or loss of availability.
  Do not use operators or CRDs.

namespace_contract:
  required_roles: []

metrics:
  - time_to_first_mutation

preconditionUnits:
  - name: mongo_env_ready
    on_probe_fail: skip
    probe:
      - command: "kubectl -n mongodb get pod {{params.cluster_prefix}}-0 2>/dev/null | grep -c Running"
        timeout_sec: 10
    apply:
      - command: "/bin/sh -c 'kubectl delete namespace mongodb --ignore-not-found=true; kubectl wait --for=delete namespace/mongodb --timeout=120s || true'"
        sleep: 2
      - command: "kubectl create namespace mongodb"
        sleep: 1
      - command: "kubectl -n mongodb apply -f cases/mongodb/replica-scaling/resource/secrets.yaml"
        sleep: 1
      - command: "kubectl -n mongodb apply -f cases/mongodb/replica-scaling/resource/services.yaml"
        sleep: 1
      - command: "kubectl -n mongodb apply -f cases/mongodb/replica-scaling/resource/statefulset.yaml"
        sleep: 5
      - command: |
          /bin/sh -c 'for i in $(seq 1 120); do ready=$(kubectl -n mongodb get sts {{params.cluster_prefix}} -o jsonpath='\''{.status.readyReplicas}'\'' 2>/dev/null); if [ "${ready:-0}" -ge 3 ]; then exit 0; fi; sleep 5; done; exit 1'
        sleep: 2
      # Pod-Ready != mongod accepting TCP (§1.10): ping-until-ok before rs.initiate.
      - command: |
          /bin/sh -c 'for i in $(seq 1 30); do kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet --eval '\''db.runCommand({ping:1}).ok'\'' 2>/dev/null | grep -q 1 && exit 0; sleep 3; done; exit 1'
        sleep: 2
      - command: |
          /bin/sh -c 'kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet --eval '\''rs.initiate({_id:"{{params.replica_set_name}}",members:[{_id:0,host:"mongodb-replica-0.mongodb-replica-svc.mongodb.svc.cluster.local:27017"},{_id:1,host:"mongodb-replica-1.mongodb-replica-svc.mongodb.svc.cluster.local:27017"},{_id:2,host:"mongodb-replica-2.mongodb-replica-svc.mongodb.svc.cluster.local:27017"}]})'\'''
        sleep: 5
      - command: |
          /bin/sh -c 'for i in $(seq 1 20); do kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet --eval '\''db.hello().isWritablePrimary'\'' | grep true && exit 0; sleep 3; done; exit 1'
        sleep: 2
      - command: |
          /bin/sh -c 'kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet --eval '\''db.getSiblingDB("admin").createUser({user:"{{params.admin_username}}",pwd:"admin123password",roles:[{role:"clusterAdmin",db:"admin"},{role:"userAdminAnyDatabase",db:"admin"},{role:"readWriteAnyDatabase",db:"admin"}]})'\'''
        sleep: 2
      - command: |
          /bin/sh -c 'kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet "mongodb://{{params.admin_username}}:admin123password@localhost:27017/admin" --eval '\''db.getSiblingDB("{{params.app_database}}").{{params.app_collection}}.insertMany([{id:1},{id:2},{id:3}],{writeConcern:{w:1}})'\'''
        sleep: 2
    verify:
      - command: "kubectl -n mongodb get pods 2>/dev/null | grep -c Running"
        timeout_sec: 10

  - name: admin_user_fixture
    # Composition self-sufficiency: this case's oracle reads the
    # `admin-user-password` secret and authenticates as the `admin-user` admin
    # user (check_topology/check_data hard-fail when the secret is absent). Both
    # come from mongo_env_ready (secrets.yaml + createUser), whose destructive
    # apply is SKIPPED on an inherited cluster -> the secret/user are absent and
    # the oracle fails "Failed to read secret admin-user-password" through no
    # agent fault. Bring our own additively: if admin-user already
    # authenticates, skip; else ensure the secret and create the user. No
    # restart, no data touched, idempotent -> never regresses a cluster where
    # admin already works. Runs BEFORE mongo_seed_fixture so seeding can
    # authenticate as admin.
    on_probe_fail: skip
    probe:
      - command: |
          /bin/sh -c '
          t=""; for cca in /etc/tls/ca.crt /etc/mongo-ca/ca.crt; do kubectl -n mongodb exec mongodb-replica-0 -- ls $cca >/dev/null 2>&1 && { t="--tls --tlsAllowInvalidHostnames --tlsAllowInvalidCertificates --tlsCAFile $cca"; break; }; done
          pw=$(kubectl -n mongodb get secret admin-user-password -o jsonpath="{.data.password}" 2>/dev/null | base64 -d 2>/dev/null)
          [ -n "$pw" ] || exit 1
          kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet $t "mongodb://{{params.admin_username}}:$pw@localhost:27017/admin" --eval "db.runCommand({ping:1}).ok" 2>/dev/null | grep -q 1
          '
        timeout_sec: 30
    apply:
      # Ensure the admin secret (idempotent: create only if missing).
      - command: "/bin/sh -c 'kubectl -n mongodb get secret admin-user-password >/dev/null 2>&1 || kubectl -n mongodb create secret generic admin-user-password --from-literal=password=admin123password'"
        sleep: 1
      # Ensure the admin-user MongoDB user, mirroring mongo_env_ready's roles. On
      # a no-auth inherited cluster this runs unauthenticated and succeeds; where
      # it already exists it errors and `|| true` keeps it a no-op. Never drops
      # or alters existing users/data.
      - command: |
          /bin/sh -c '
          t=""; for cca in /etc/tls/ca.crt /etc/mongo-ca/ca.crt; do kubectl -n mongodb exec mongodb-replica-0 -- ls $cca >/dev/null 2>&1 && { t="--tls --tlsAllowInvalidHostnames --tlsAllowInvalidCertificates --tlsCAFile $cca"; break; }; done
          kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet $t --eval "db.getSiblingDB(\"admin\").createUser({user:\"{{params.admin_username}}\",pwd:\"admin123password\",roles:[{role:\"clusterAdmin\",db:\"admin\"},{role:\"userAdminAnyDatabase\",db:\"admin\"},{role:\"readWriteAnyDatabase\",db:\"admin\"}]})" 2>/dev/null || true
          '
        sleep: 2
    verify:
      - command: "/bin/sh -c 'kubectl -n mongodb get secret admin-user-password >/dev/null 2>&1 && echo ok'"
        timeout_sec: 15

  # Additive data fixture (composition safety): the oracle requires >= 3 docs in
  # {{params.app_database}}.{{params.app_collection}}. When this case runs chained
  # on an inherited cluster, the destructive `apply` above is skipped, so a prior
  # stage may have left the collection with FEWER than the required docs (e.g.
  # mongod-config-update seeds a single {config:'initial'} doc). This unit tops the
  # collection up ADDITIVELY to the required count WITHOUT dropping/recreating the
  # collection or touching the namespace/cluster, and also ensures the admin
  # secret/user exist (tolerantly) so the seed authenticates exactly as the case
  # does. The probe gates on the DATA COUNT (not the secret), so it runs whenever
  # the collection is short regardless of cluster/secret presence; standalone
  # (where `apply` already seeded 3) it sees >= 3 and skips -> identical behaviour.
  # Idempotent: it only inserts the deficit (required - current), so re-running on
  # a cluster already at >= 3 inserts nothing.
  - name: mongo_seed_fixture
    on_probe_fail: skip
    probe:
      # Pass (skip apply) only when the collection already holds the required count.
      - command: |
          /bin/sh -c 't=""; for cca in /etc/tls/ca.crt /etc/mongo-ca/ca.crt; do kubectl -n mongodb exec mongodb-replica-0 -- ls $cca >/dev/null 2>&1 && { t="--tls --tlsAllowInvalidHostnames --tlsAllowInvalidCertificates --tlsCAFile $cca"; break; }; done; pw=$(kubectl -n mongodb get secret admin-user-password -o jsonpath="{.data.password}" 2>/dev/null | base64 -d 2>/dev/null); pw=${pw:-admin123password}; n=$(P=""; for _pi in $(seq 1 30); do P=$(kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet $t "mongodb://{{params.admin_username}}:$pw@localhost:27017/admin?directConnection=true" --eval '\''rs.hello().primary'\'' 2>/dev/null | cut -d. -f1); [ -n "$P" ] && break; sleep 2; done; P=${P:-mongodb-replica-0}; kubectl -n mongodb exec "$P" -- mongosh --quiet $t "mongodb://{{params.admin_username}}:$pw@localhost:27017/admin" --eval '\''db.getSiblingDB("{{params.app_database}}").{{params.app_collection}}.countDocuments({})'\'' 2>/dev/null | tr -dc 0-9); [ "${n:-0}" -ge 3 ] && echo ok | grep -c ok'
        timeout_sec: 30
    apply:
      # Ensure the admin secret + user exist (tolerant; they usually already do).
      - command: "kubectl -n mongodb apply -f cases/mongodb/replica-scaling/resource/secrets.yaml"
        sleep: 1
      - command: |
          /bin/sh -c 'kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet --eval '\''db.getSiblingDB("admin").createUser({user:"{{params.admin_username}}",pwd:"admin123password",roles:[{role:"clusterAdmin",db:"admin"},{role:"userAdminAnyDatabase",db:"admin"},{role:"readWriteAnyDatabase",db:"admin"}]})'\'' || true'
        sleep: 2
      # Additively top the collection up to 3 docs: insert exactly (3 - current),
      # never dropping or resetting. Authenticates as the admin user like the case.
      - command: |
          /bin/sh -c 'pw=$(kubectl -n mongodb get secret admin-user-password -o jsonpath="{.data.password}" 2>/dev/null | base64 -d 2>/dev/null); pw=${pw:-admin123password}; P=""; for _pi in $(seq 1 30); do P=$(kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet "mongodb://{{params.admin_username}}:$pw@localhost:27017/admin?directConnection=true" --eval '\''rs.hello().primary'\'' 2>/dev/null | cut -d. -f1); [ -n "$P" ] && break; sleep 2; done; P=${P:-mongodb-replica-0}; kubectl -n mongodb exec "$P" -- mongosh --quiet "mongodb://{{params.admin_username}}:$pw@localhost:27017/admin" --eval '\''var c=db.getSiblingDB("{{params.app_database}}").{{params.app_collection}}; var need=3-c.countDocuments({}); var docs=[]; for(var i=0;i<need;i++){docs.push({seed:"fixture",ts:new Date()});} if(docs.length>0){c.insertMany(docs,{writeConcern:{w:1}});}'\'''
        sleep: 2
    verify:
      # Confirm the collection now meets the oracle's required count.
      - command: |
          /bin/sh -c 't=""; for cca in /etc/tls/ca.crt /etc/mongo-ca/ca.crt; do kubectl -n mongodb exec mongodb-replica-0 -- ls $cca >/dev/null 2>&1 && { t="--tls --tlsAllowInvalidHostnames --tlsAllowInvalidCertificates --tlsCAFile $cca"; break; }; done; pw=$(kubectl -n mongodb get secret admin-user-password -o jsonpath="{.data.password}" 2>/dev/null | base64 -d 2>/dev/null); pw=${pw:-admin123password}; n=$(P=""; for _pi in $(seq 1 30); do P=$(kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet $t "mongodb://{{params.admin_username}}:$pw@localhost:27017/admin?directConnection=true" --eval '\''rs.hello().primary'\'' 2>/dev/null | cut -d. -f1); [ -n "$P" ] && break; sleep 2; done; P=${P:-mongodb-replica-0}; kubectl -n mongodb exec "$P" -- mongosh --quiet $t "mongodb://{{params.admin_username}}:$pw@localhost:27017/admin" --eval '\''db.getSiblingDB("{{params.app_database}}").{{params.app_collection}}.countDocuments({})'\'' 2>/dev/null | tr -dc 0-9); [ "${n:-0}" -ge 3 ]'
        timeout_sec: 30

oracle:
  verify:
    commands:
      - command: "python3 cases/mongodb/replica-scaling/oracle/oracle.py"
        timeout_sec: 300
