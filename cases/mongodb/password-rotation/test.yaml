# mongodb/password-rotation
# Rotate MongoDB user password and update the corresponding Secret

params:
  cluster_prefix:
    default: mongodb-replica
    description: StatefulSet name of the replica set members.
  replica_set_name:
    default: mongodb-replica
    description: MongoDB replica set _id used when initiating the set.
  admin_secret_name:
    default: admin-user-password
    description: Kubernetes Secret holding the admin user's password.
  app_secret_name:
    default: app-user-password
    description: Kubernetes Secret holding the app user's current password.
  app_next_secret_name:
    default: app-user-password-next
    description: Kubernetes Secret holding the app user's next password.
  reporting_secret_name:
    default: reporting-user-password
    description: Kubernetes Secret holding the reporting user's password.
  admin_username:
    default: admin-user
    description: Username of the MongoDB admin user.
  app_username:
    default: app-user
    description: Username of the application user being rotated.
  reporting_username:
    default: reporting-user
    description: Username of the reporting user.
  app_database:
    default: appdb
    description: Application database that must remain accessible.
  app_collection:
    default: testdata
    description: Application collection seeded with data.

prompt: |
  A 3-member MongoDB replica set is running in the mongodb namespace.
  Authentication is enabled. Passwords are stored in these Secrets:
  - {{params.admin_secret_name}}
  - {{params.app_secret_name}}
  - {{params.app_next_secret_name}}
  - {{params.reporting_secret_name}}

  Task:
  - Rotate {{params.app_username}} to the password in {{params.app_next_secret_name}}.
  - Update the {{params.app_secret_name}} Secret to match the new password.
  - Do not break {{params.reporting_username}} or admin access.
  - Data in {{params.app_database}}.{{params.app_collection}} must remain accessible.

  Notes:
  - Do not use operators or CRDs.

namespace_contract:
  required_roles: []

metrics:
  - time_to_first_mutation

preconditionUnits:
  - name: mongo_env_ready
    on_probe_fail: skip
    probe:
      - command: "kubectl -n mongodb get pod {{params.cluster_prefix}}-0 2>/dev/null | grep -c Running"
        timeout_sec: 10
    apply:
      - command: "/bin/sh -c 'kubectl delete namespace mongodb --ignore-not-found=true; kubectl wait --for=delete namespace/mongodb --timeout=120s || true'"
        sleep: 2
      - command: "kubectl create namespace mongodb"
        sleep: 1
      - command: "kubectl -n mongodb apply -f cases/mongodb/password-rotation/resource/secrets.yaml"
        sleep: 1
      - command: "kubectl -n mongodb apply -f cases/mongodb/password-rotation/resource/services.yaml"
        sleep: 1
      - command: "kubectl -n mongodb apply -f cases/mongodb/password-rotation/resource/statefulset.yaml"
        sleep: 5
      - command: |
          /bin/sh -c 'for i in $(seq 1 120); do ready=$(kubectl -n mongodb get sts {{params.cluster_prefix}} -o jsonpath='\''{.status.readyReplicas}'\'' 2>/dev/null); if [ "${ready:-0}" -ge 3 ]; then exit 0; fi; sleep 5; done; exit 1'
        sleep: 2
      - command: |
          /bin/sh -c 'kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet --eval '\''rs.initiate({_id:"{{params.replica_set_name}}",members:[{_id:0,host:"mongodb-replica-0.mongodb-replica-svc.mongodb.svc.cluster.local:27017"},{_id:1,host:"mongodb-replica-1.mongodb-replica-svc.mongodb.svc.cluster.local:27017"},{_id:2,host:"mongodb-replica-2.mongodb-replica-svc.mongodb.svc.cluster.local:27017"}]})'\'''
        sleep: 5
      - command: |
          /bin/sh -c 'for i in $(seq 1 20); do kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet --eval '\''db.hello().isWritablePrimary'\'' | grep true && exit 0; sleep 3; done; exit 1'
        sleep: 2
      - command: |
          /bin/sh -c 'kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet --eval '\''db.getSiblingDB("admin").createUser({user:"{{params.admin_username}}",pwd:"admin123password",roles:[{role:"clusterAdmin",db:"admin"},{role:"userAdminAnyDatabase",db:"admin"},{role:"readWriteAnyDatabase",db:"admin"}]})'\'''
        sleep: 2
      - command: |
          /bin/sh -c 'kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet "mongodb://{{params.admin_username}}:admin123password@localhost:27017/admin" --eval '\''db.getSiblingDB("admin").createUser({user:"{{params.app_username}}",pwd:"appuser123password",roles:[{role:"readWrite",db:"{{params.app_database}}"}]})'\'''
        sleep: 2
      - command: |
          /bin/sh -c 'kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet "mongodb://{{params.admin_username}}:admin123password@localhost:27017/admin" --eval '\''db.getSiblingDB("admin").createUser({user:"{{params.reporting_username}}",pwd:"reporting123password",roles:[{role:"read",db:"{{params.app_database}}"}]})'\'''
        sleep: 2
      - command: |
          /bin/sh -c 'kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet "mongodb://{{params.admin_username}}:admin123password@localhost:27017/admin" --eval '\''db.getSiblingDB("{{params.app_database}}").{{params.app_collection}}.insertMany([{x:1},{x:2},{x:3}],{writeConcern:{w:1}})'\'''
        sleep: 2
    verify:
      - command: "kubectl -n mongodb get pods 2>/dev/null | grep -c Running"
        timeout_sec: 10

  # Additive data fixture (composition safety): the oracle requires >= 3 docs in
  # {{params.app_database}}.{{params.app_collection}}. When this case runs chained on an inherited cluster the
  # destructive `apply` above is skipped, so a prior stage may have left the
  # collection short. This unit tops it up ADDITIVELY to the required count WITHOUT
  # dropping/recreating the collection or touching the namespace/cluster.
  # It authenticates as the stable admin user (password from the admin
  # secret, like the case/oracle). The probe gates on the DATA COUNT (not "pods Running"), so it runs
  # whenever the collection is short; standalone (where `apply` already seeded 3)
  # it sees the required count and skips -> identical behaviour. Idempotent: inserts
  # only the deficit (required - current).
  - name: mongo_seed_fixture
    on_probe_fail: skip
    probe:
      - command: |
          /bin/sh -c 'pw=$(kubectl -n mongodb get secret admin-user-password -o jsonpath="{.data.password}" 2>/dev/null | base64 -d 2>/dev/null); pw=${pw:-admin123password}; n=$(P=$(kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet "mongodb://{{params.admin_username}}:$pw@localhost:27017/admin?directConnection=true" --eval '\''rs.hello().primary'\'' 2>/dev/null | cut -d. -f1); P=${P:-mongodb-replica-0}; kubectl -n mongodb exec "$P" -- mongosh --quiet "mongodb://{{params.admin_username}}:$pw@localhost:27017/admin" --eval '\''db.getSiblingDB("{{params.app_database}}").{{params.app_collection}}.countDocuments({})'\'' 2>/dev/null | tr -dc 0-9); [ "${n:-0}" -ge 3 ] && echo ok | grep -c ok'
        timeout_sec: 30
    apply:
      - command: |
          /bin/sh -c 'pw=$(kubectl -n mongodb get secret admin-user-password -o jsonpath="{.data.password}" 2>/dev/null | base64 -d 2>/dev/null); pw=${pw:-admin123password}; P=$(kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet "mongodb://{{params.admin_username}}:$pw@localhost:27017/admin?directConnection=true" --eval '\''rs.hello().primary'\'' 2>/dev/null | cut -d. -f1); P=${P:-mongodb-replica-0}; kubectl -n mongodb exec "$P" -- mongosh --quiet "mongodb://{{params.admin_username}}:$pw@localhost:27017/admin" --eval '\''var c=db.getSiblingDB("{{params.app_database}}").{{params.app_collection}}; var need=3-c.countDocuments({}); var docs=[]; for(var i=0;i<need;i++){docs.push({seed:"fixture",ts:new Date()});} if(docs.length>0){c.insertMany(docs,{writeConcern:{w:1}});}'\'''
        sleep: 2
    verify:
      - command: |
          /bin/sh -c 'pw=$(kubectl -n mongodb get secret admin-user-password -o jsonpath="{.data.password}" 2>/dev/null | base64 -d 2>/dev/null); pw=${pw:-admin123password}; n=$(P=$(kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet "mongodb://{{params.admin_username}}:$pw@localhost:27017/admin?directConnection=true" --eval '\''rs.hello().primary'\'' 2>/dev/null | cut -d. -f1); P=${P:-mongodb-replica-0}; kubectl -n mongodb exec "$P" -- mongosh --quiet "mongodb://{{params.admin_username}}:$pw@localhost:27017/admin" --eval '\''db.getSiblingDB("{{params.app_database}}").{{params.app_collection}}.countDocuments({})'\'' 2>/dev/null | tr -dc 0-9); [ "${n:-0}" -ge 3 ]'
        timeout_sec: 30

  # Additive credential fixture (composition safety): standalone the build creates
  # the reporting-user + its secret. Chained on an INHERITED cluster that build is
  # skipped, so the oracle (which verifies reporting-user access survives the
  # rotation) has no reporting-user. Ensure the secret + reporting-user additively
  # when missing, as the LIVE admin on the current primary. Never drops/alters
  # existing users; standalone the probe finds it present and skips.
  - name: reporting_user_fixture
    on_probe_fail: skip
    probe:
      - command: |
          /bin/sh -c 'kubectl -n mongodb get secret {{params.reporting_secret_name}} >/dev/null 2>&1 || exit 1; pw=$(kubectl -n mongodb get secret {{params.admin_secret_name}} -o jsonpath="{.data.password}" 2>/dev/null | base64 -d 2>/dev/null); pw=${pw:-admin123password}; P=$(kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet "mongodb://{{params.admin_username}}:$pw@localhost:27017/admin?directConnection=true" --eval '\''rs.hello().primary'\'' 2>/dev/null | cut -d. -f1); P=${P:-mongodb-replica-0}; kubectl -n mongodb exec "$P" -- mongosh --quiet "mongodb://{{params.admin_username}}:$pw@localhost:27017/admin" --eval '\''db.getSiblingDB("admin").getUser("{{params.reporting_username}}")?quit(0):quit(1)'\'' >/dev/null 2>&1'
        timeout_sec: 30
    apply:
      - command: "kubectl -n mongodb apply -f cases/mongodb/password-rotation/resource/secrets.yaml"
        sleep: 1
      - command: |
          /bin/sh -c 'pw=$(kubectl -n mongodb get secret {{params.admin_secret_name}} -o jsonpath="{.data.password}" 2>/dev/null | base64 -d 2>/dev/null); pw=${pw:-admin123password}; P=$(kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet "mongodb://{{params.admin_username}}:$pw@localhost:27017/admin?directConnection=true" --eval '\''rs.hello().primary'\'' 2>/dev/null | cut -d. -f1); P=${P:-mongodb-replica-0}; kubectl -n mongodb exec "$P" -- mongosh --quiet "mongodb://{{params.admin_username}}:$pw@localhost:27017/admin" --eval '\''if(!db.getSiblingDB("admin").getUser("{{params.reporting_username}}")){db.getSiblingDB("admin").createUser({user:"{{params.reporting_username}}",pwd:"reporting123password",roles:[{role:"read",db:"{{params.app_database}}"}]});}'\'' 2>&1 || true'
        sleep: 2
    verify:
      - command: |
          /bin/sh -c 'kubectl -n mongodb get secret {{params.reporting_secret_name}} >/dev/null 2>&1; true'
        timeout_sec: 30

  # Additive scenario-secret fixture (composition safety): standalone the build's
  # secrets.yaml creates app-user-password-old (the pre-rotation reference the
  # oracle reads to confirm the password CHANGED) and app-user-password-next (the
  # rotation target). On an INHERITED cluster the build is skipped, and the
  # reporting_user_fixture above also skips (its reporting-user already exists
  # from an earlier stage), so these two secrets are never created -> oracle
  # fails "app-user-password-old not found". Ensure them additively when absent:
  # -old captures the app-user's CURRENT (live pre-rotation) password; -next is
  # the scenario target. Never touches the cluster/data; probe skips when present.
  - name: app_rotation_secrets_fixture
    on_probe_fail: skip
    probe:
      - command: "kubectl -n mongodb get secret app-user-password-old"
        timeout_sec: 15
    apply:
      - command: "/bin/sh -c 'op=$(kubectl -n mongodb get secret {{params.app_secret_name}} -o jsonpath=\"{.data.password}\" 2>/dev/null | base64 -d 2>/dev/null); op=${op:-appuser123password}; kubectl -n mongodb create secret generic app-user-password-old --from-literal=password=\"$op\" --dry-run=client -o yaml | kubectl apply -f -'"
        sleep: 1
      - command: "/bin/sh -c 'kubectl -n mongodb get secret {{params.app_next_secret_name}} >/dev/null 2>&1 || kubectl -n mongodb create secret generic {{params.app_next_secret_name}} --from-literal=password=newAppUserPassword456 --dry-run=client -o yaml | kubectl apply -f -'"
        sleep: 1
    verify:
      - command: "/bin/sh -c 'kubectl -n mongodb get secret app-user-password-old >/dev/null 2>&1; true'"
        timeout_sec: 10

oracle:
  verify:
    commands:
      - command: "python3 cases/mongodb/password-rotation/oracle/oracle.py"
        timeout_sec: 150
