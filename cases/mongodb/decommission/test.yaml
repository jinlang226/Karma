# mongodb/decommission
# MongoDB decommission task

params:
  cluster_prefix:
    default: mongo-rs
    description: StatefulSet name of the replica set members.
  replica_set_name:
    default: rs0
    description: MongoDB replica set _id used when initiating the set.
  app_database:
    default: app
    description: Application database seeded with data.
  app_collection:
    default: test
    description: Application collection seeded with data.

prompt: |
  Decommission one replica set member without data loss or loss of availability.

namespace_contract:
  required_roles: []

metrics:
  - time_to_first_mutation

preconditionUnits:
  - name: mongo_env_ready
    on_probe_fail: skip
    probe:
      - command: "kubectl -n mongodb get pod {{params.cluster_prefix}}-0 2>/dev/null | grep -c Running"
        timeout_sec: 10
    apply:
      - command: |
          /bin/sh -c '
          kubectl delete namespace mongodb --ignore-not-found=true; kubectl wait --for=delete namespace/mongodb --timeout=120s || true
          '
        sleep: 2
      - command: "kubectl create namespace mongodb"
        sleep: 1
      - command: "kubectl -n mongodb apply -f cases/mongodb/decommission/resource/services.yaml"
        sleep: 2
      - command: "kubectl -n mongodb apply -f cases/mongodb/decommission/resource/statefulset.yaml"
        sleep: 5
      - command: |
          for i in $(seq 1 60); do
            ready=$(kubectl -n mongodb get sts {{params.cluster_prefix}} -o jsonpath='{.status.readyReplicas}' 2>/dev/null)
            if [ "${ready:-0}" -ge 3 ]; then
              exit 0
            fi
            sleep 5
          done
          exit 1
        sleep: 2
      - command: |
          kubectl -n mongodb exec mongo-rs-0 -- mongosh --quiet --eval '
          rs.initiate({_id:"{{params.replica_set_name}}",members:[
            {_id:0,host:"mongo-rs-0.mongo.mongodb.svc.cluster.local:27017"},
            {_id:1,host:"mongo-rs-1.mongo.mongodb.svc.cluster.local:27017"},
            {_id:2,host:"mongo-rs-2.mongo.mongodb.svc.cluster.local:27017"}
          ]})'
        sleep: 5
      - command: |
          for i in $(seq 1 20); do
            kubectl -n mongodb exec mongo-rs-0 -- mongosh --quiet --eval 'db.hello().isWritablePrimary' | grep true && exit 0
            sleep 3
          done
          exit 1
        sleep: 2
      - command: "kubectl -n mongodb exec mongo-rs-0 -- mongosh --quiet --eval 'db.getSiblingDB(\"{{params.app_database}}\").{{params.app_collection}}.insertMany([{x:1},{x:2},{x:3}], {writeConcern:{w:1}});'"
        sleep: 2
    verify:
      - command: "kubectl -n mongodb get pods 2>/dev/null | grep -c Running"
        timeout_sec: 10

  # Additive data fixture (composition safety): the oracle requires >= 3 docs in
  # {{params.app_database}}.{{params.app_collection}}. When this case runs chained on an inherited cluster the
  # destructive `apply` above is skipped, so a prior stage may have left the
  # collection short. This unit tops it up ADDITIVELY to the required count WITHOUT
  # dropping/recreating the collection or touching the namespace/cluster.
  # The probe gates on the DATA COUNT (not "pods Running"), so it runs
  # whenever the collection is short; standalone (where `apply` already seeded 3)
  # it sees the required count and skips -> identical behaviour. Idempotent: inserts
  # only the deficit (required - current).
  - name: mongo_seed_fixture
    on_probe_fail: skip
    probe:
      # Auth-adaptive: when an inherited cluster has auth enabled the admin secret
      # exists, so authenticate; otherwise connect plain. Works both ways.
      - command: |
          /bin/sh -c 't=""; for cca in /etc/tls/ca.crt /etc/mongo-ca/ca.crt; do kubectl -n mongodb exec mongo-rs-0 -- ls $cca >/dev/null 2>&1 && { t="--tls --tlsAllowInvalidHostnames --tlsAllowInvalidCertificates --tlsCAFile $cca"; break; }; done; au=""; pw=$(kubectl -n mongodb get secret admin-user-password -o jsonpath="{.data.password}" 2>/dev/null | base64 -d 2>/dev/null); [ -n "$pw" ] && au="-u admin-user -p $pw --authenticationDatabase admin"; n=$(P=$(kubectl -n mongodb exec mongo-rs-0 -- mongosh --quiet $t $au --eval '\''rs.hello().primary'\'' 2>/dev/null | cut -d. -f1); P=${P:-mongo-rs-0}; kubectl -n mongodb exec "$P" -- mongosh --quiet $t $au --eval '\''db.getSiblingDB("{{params.app_database}}").{{params.app_collection}}.countDocuments({})'\'' 2>/dev/null | tr -dc 0-9); [ "${n:-0}" -ge 3 ] && echo ok | grep -c ok'
        timeout_sec: 30
    apply:
      - command: |
          /bin/sh -c 'au=""; pw=$(kubectl -n mongodb get secret admin-user-password -o jsonpath="{.data.password}" 2>/dev/null | base64 -d 2>/dev/null); [ -n "$pw" ] && au="-u admin-user -p $pw --authenticationDatabase admin"; P=$(kubectl -n mongodb exec mongo-rs-0 -- mongosh --quiet $au --eval '\''rs.hello().primary'\'' 2>/dev/null | cut -d. -f1); P=${P:-mongo-rs-0}; kubectl -n mongodb exec "$P" -- mongosh --quiet $au --eval '\''var c=db.getSiblingDB("{{params.app_database}}").{{params.app_collection}}; var need=3-c.countDocuments({}); var docs=[]; for(var i=0;i<need;i++){docs.push({seed:"fixture",ts:new Date()});} if(docs.length>0){c.insertMany(docs,{writeConcern:{w:1}});}'\'''
        sleep: 2
    verify:
      - command: |
          /bin/sh -c 't=""; for cca in /etc/tls/ca.crt /etc/mongo-ca/ca.crt; do kubectl -n mongodb exec mongo-rs-0 -- ls $cca >/dev/null 2>&1 && { t="--tls --tlsAllowInvalidHostnames --tlsAllowInvalidCertificates --tlsCAFile $cca"; break; }; done; au=""; pw=$(kubectl -n mongodb get secret admin-user-password -o jsonpath="{.data.password}" 2>/dev/null | base64 -d 2>/dev/null); [ -n "$pw" ] && au="-u admin-user -p $pw --authenticationDatabase admin"; n=$(P=$(kubectl -n mongodb exec mongo-rs-0 -- mongosh --quiet $t $au --eval '\''rs.hello().primary'\'' 2>/dev/null | cut -d. -f1); P=${P:-mongo-rs-0}; kubectl -n mongodb exec "$P" -- mongosh --quiet $t $au --eval '\''db.getSiblingDB("{{params.app_database}}").{{params.app_collection}}.countDocuments({})'\'' 2>/dev/null | tr -dc 0-9); [ "${n:-0}" -ge 3 ]'
        timeout_sec: 30

oracle:
  verify:
    commands:
      - command: "python3 cases/mongodb/decommission/oracle/oracle.py"
        timeout_sec: 120
