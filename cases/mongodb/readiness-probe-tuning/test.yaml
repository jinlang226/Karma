# mongodb/readiness-probe-tuning
# Tune readiness and liveness probes so a MongoDB replica set becomes stable

params:
  cluster_prefix:
    default: mongodb-replica
    description: App label / StatefulSet name of the replica set members.
  replica_set_name:
    default: mongodb-replica
    description: MongoDB replica set _id used when initiating the set.
  admin_username:
    default: admin-user
    description: Username of the MongoDB admin user.
  health_username:
    default: health-user
    description: Username of the health-check monitoring user.
  faulty_readiness_initial_delay:
    default: 5
    description: Faulty readiness probe initialDelaySeconds applied as the bug.
  faulty_readiness_timeout:
    default: 1
    description: Faulty readiness probe timeoutSeconds applied as the bug.
  faulty_readiness_failure_threshold:
    default: 2
    description: Faulty readiness probe failureThreshold applied as the bug.
  faulty_liveness_initial_delay:
    default: 15
    description: Faulty liveness probe initialDelaySeconds applied as the bug.
  faulty_liveness_timeout:
    default: 1
    description: Faulty liveness probe timeoutSeconds applied as the bug.
  faulty_liveness_failure_threshold:
    default: 2
    description: Faulty liveness probe failureThreshold applied as the bug.

prompt: |
  A 3-member MongoDB replica set is running in the mongodb namespace with auth enabled.
  Pods are repeatedly failing readiness/liveness checks even though MongoDB is healthy.

  Task:
  - Tune the probes so the replica set becomes stable.
  - All pods must become Ready.
  - Replica set should have 1 PRIMARY and 2 SECONDARY members.

  Notes:
  - Do not disable authentication.
  - No operators or CRDs.

namespace_contract:
  required_roles: []

metrics:
  - time_to_first_mutation

preconditionUnits:
  - name: mongo_env_ready
    on_probe_fail: skip
    probe:
      # Non-destructive skip-if-running probe: if a MongoDB cluster is already
      # present (e.g. inherited from a prior workflow stage), SKIP the apply so
      # accumulated state is preserved. The apply only runs on an empty
      # namespace. The case's health-check fixtures (the health-user-password
      # secret + the health-user) are ensured ADDITIVELY by a separate unit
      # below, never by wiping/redeploying the namespace.
      - command: "kubectl -n mongodb get pod {{params.cluster_prefix}}-0 2>/dev/null | grep -c Running"
        timeout_sec: 10
    apply:
      - command: "/bin/sh -c 'kubectl delete namespace mongodb --ignore-not-found=true; kubectl wait --for=delete namespace/mongodb --timeout=120s || true'"
        sleep: 2
      - command: "kubectl create namespace mongodb"
        sleep: 1
      - command: "kubectl -n mongodb apply -f cases/mongodb/readiness-probe-tuning/resource/secrets.yaml"
        sleep: 1
      - command: "kubectl -n mongodb apply -f cases/mongodb/readiness-probe-tuning/resource/probe-script.yaml"
        sleep: 1
      - command: "kubectl -n mongodb apply -f cases/mongodb/readiness-probe-tuning/resource/services.yaml"
        sleep: 1
      - command: "kubectl -n mongodb apply -f cases/mongodb/readiness-probe-tuning/resource/statefulset.yaml"
        sleep: 5
      - command: |
          /bin/sh -c 'for i in $(seq 1 120); do phase=$(kubectl -n mongodb get pod mongodb-replica-0 -o jsonpath='\''{.status.phase}'\'' 2>/dev/null); if [ "${phase}" = "Running" ]; then exit 0; fi; sleep 5; done; exit 1'
        timeout_sec: 600
        sleep: 2
      - command: |
          /bin/sh -c 'for i in $(seq 1 120); do phase=$(kubectl -n mongodb get pod mongodb-replica-2 -o jsonpath='\''{.status.phase}'\'' 2>/dev/null); if [ "${phase}" = "Running" ]; then exit 0; fi; sleep 5; done; exit 1'
        timeout_sec: 600
        sleep: 2
      - command: |
          for i in 0 1 2; do
            for t in $(seq 1 60); do
              if kubectl -n mongodb exec mongodb-replica-$i -- \
                   mongosh --quiet --eval 'db.runCommand({ping:1}).ok' 2>/dev/null | grep -q 1; then
                break
              fi
              sleep 5
            done
          done
        timeout_sec: 400
        sleep: 2
      - command: |
          /bin/sh -c 'kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet --eval '\''rs.initiate({_id:"{{params.replica_set_name}}",members:[{_id:0,host:"mongodb-replica-0.mongodb-replica-svc.mongodb.svc.cluster.local:27017"},{_id:1,host:"mongodb-replica-1.mongodb-replica-svc.mongodb.svc.cluster.local:27017"},{_id:2,host:"mongodb-replica-2.mongodb-replica-svc.mongodb.svc.cluster.local:27017"}]})'\'''
        sleep: 5
      - command: |
          /bin/sh -c 'for i in $(seq 1 20); do kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet --eval '\''db.hello().isWritablePrimary'\'' | grep true && exit 0; sleep 3; done; exit 1'
        sleep: 2
      - command: |
          /bin/sh -c 'kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet --eval '\''db.getSiblingDB("admin").createUser({user:"{{params.admin_username}}",pwd:"admin123password",roles:[{role:"clusterAdmin",db:"admin"},{role:"userAdminAnyDatabase",db:"admin"},{role:"readWriteAnyDatabase",db:"admin"}]})'\'''
        sleep: 2
      - command: |
          /bin/sh -c 'kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet "mongodb://{{params.admin_username}}:admin123password@localhost:27017/admin" --eval '\''db.getSiblingDB("admin").createUser({user:"{{params.health_username}}",pwd:"healthpass123",roles:[{role:"clusterMonitor",db:"admin"}]})'\'''
        sleep: 2
      - command: "kubectl -n mongodb wait --for=condition=ready pod -l app={{params.cluster_prefix}} --timeout=300s"
        sleep: 2
      - command: |
          /bin/sh -c 'kubectl -n mongodb patch sts {{params.cluster_prefix}} --type=json -p='\''[{"op":"replace","path":"/spec/template/spec/containers/0/readinessProbe/initialDelaySeconds","value":{{params.faulty_readiness_initial_delay}}},{"op":"replace","path":"/spec/template/spec/containers/0/readinessProbe/timeoutSeconds","value":{{params.faulty_readiness_timeout}}},{"op":"replace","path":"/spec/template/spec/containers/0/readinessProbe/failureThreshold","value":{{params.faulty_readiness_failure_threshold}}},{"op":"replace","path":"/spec/template/spec/containers/0/livenessProbe/initialDelaySeconds","value":{{params.faulty_liveness_initial_delay}}},{"op":"replace","path":"/spec/template/spec/containers/0/livenessProbe/timeoutSeconds","value":{{params.faulty_liveness_timeout}}},{"op":"replace","path":"/spec/template/spec/containers/0/livenessProbe/failureThreshold","value":{{params.faulty_liveness_failure_threshold}}}]'\'''
        sleep: 2
      - command: "kubectl -n mongodb delete pod -l app={{params.cluster_prefix}}"
        sleep: 2
    verify:
      - command: "kubectl -n mongodb get pods 2>/dev/null | grep -c Running"
        timeout_sec: 10

  - name: admin_user_fixture
    # Composition self-sufficiency: this case authenticates as the `admin-user`
    # created at deploy. On an inherited cluster a no-auth/other predecessor may
    # not have created it, and a live user's password is unrecoverable -> the
    # oracle's (and the user fixtures') admin auth fails through no agent fault.
    # Bring our own additively: if admin-user already authenticates, skip; else
    # ensure the secret and create the user. No restart, no data touched,
    # idempotent -> never regresses a cluster where admin already works.
    on_probe_fail: skip
    probe:
      - command: |
          /bin/sh -c '
          t=""; for cca in /etc/tls/ca.crt /etc/mongo-ca/ca.crt; do kubectl -n mongodb exec mongodb-replica-0 -- ls $cca >/dev/null 2>&1 && { t="--tls --tlsAllowInvalidHostnames --tlsAllowInvalidCertificates --tlsCAFile $cca"; break; }; done
          pw=$(kubectl -n mongodb get secret admin-user-password -o jsonpath="{.data.password}" 2>/dev/null | base64 -d 2>/dev/null)
          [ -n "$pw" ] || exit 1
          kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet $t "mongodb://{{params.admin_username}}:$pw@localhost:27017/admin" --eval "db.runCommand({ping:1}).ok" 2>/dev/null | grep -q 1
          '
        timeout_sec: 30
    apply:
      # Ensure the admin secret (idempotent: create only if missing).
      - command: "/bin/sh -c 'kubectl -n mongodb get secret admin-user-password >/dev/null 2>&1 || kubectl -n mongodb create secret generic admin-user-password --from-literal=password=admin123password'"
        sleep: 1
      # Ensure the admin-user MongoDB user. On a no-auth inherited cluster this
      # runs unauthenticated and succeeds; where it already exists it errors and
      # the `|| true` keeps it a no-op. Never drops or alters existing users/data.
      - command: |
          /bin/sh -c '
          t=""; for cca in /etc/tls/ca.crt /etc/mongo-ca/ca.crt; do kubectl -n mongodb exec mongodb-replica-0 -- ls $cca >/dev/null 2>&1 && { t="--tls --tlsAllowInvalidHostnames --tlsAllowInvalidCertificates --tlsCAFile $cca"; break; }; done
          kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet $t --eval "db.getSiblingDB(\"admin\").createUser({user:\"{{params.admin_username}}\",pwd:\"admin123password\",roles:[{role:\"root\",db:\"admin\"}]})" 2>/dev/null || true
          '
        sleep: 2
    verify:
      - command: "/bin/sh -c 'kubectl -n mongodb get secret admin-user-password >/dev/null 2>&1 && echo ok'"
        timeout_sec: 15

  # ADDITIVE fixture-ensure unit. The oracle reads the health-user-password
  # secret and authenticates the health-user MongoDB user; the main unit's apply
  # creates both, but in a workflow that apply is skipped (a cluster is already
  # present). This unit ensures JUST those two fixtures idempotently WITHOUT
  # touching the namespace/cluster, so an inherited cluster keeps all prior
  # state. Standalone it is a no-op (the main apply already created them, so the
  # probe passes and this apply is skipped).
  - name: health_user_fixture
    on_probe_fail: skip
    probe:
      # Skip the ensure only when BOTH the secret and the health-user already
      # exist; otherwise fall through to the additive apply.
      - command: |
          /bin/sh -c '
          kubectl -n mongodb get secret health-user-password >/dev/null 2>&1 || exit 1
          kubectl -n mongodb get pod {{params.cluster_prefix}}-0 >/dev/null 2>&1 || exit 1
          admin_pw=$(kubectl -n mongodb get secret admin-user-password -o jsonpath="{.data.password}" 2>/dev/null | base64 -d 2>/dev/null)
          [ -n "$admin_pw" ] || exit 1
          t=""; for cca in /etc/tls/ca.crt /etc/mongo-ca/ca.crt; do kubectl -n mongodb exec {{params.cluster_prefix}}-0 -- ls $cca >/dev/null 2>&1 && { t="--tls --tlsAllowInvalidHostnames --tlsAllowInvalidCertificates --tlsCAFile $cca"; break; }; done
          kubectl -n mongodb exec {{params.cluster_prefix}}-0 -- mongosh --quiet $t "mongodb://{{params.admin_username}}:${admin_pw}@localhost:27017/admin" --eval "db.getUser(\"{{params.health_username}}\") ? quit(0) : quit(1)" >/dev/null 2>&1
          '
        timeout_sec: 30
    apply:
      # Ensure the secret (idempotent: create only if missing).
      - command: |
          /bin/sh -c '
          kubectl -n mongodb get secret health-user-password >/dev/null 2>&1 || \
            kubectl -n mongodb create secret generic health-user-password --from-literal=password=healthpass123
          '
        sleep: 1
      # Ensure the health-user MongoDB user (idempotent: create only if absent),
      # using the live admin credentials so a prior admin-password rotation is
      # respected. Never drops or alters existing users/data.
      - command: |
          /bin/sh -c '
          admin_pw=$(kubectl -n mongodb get secret admin-user-password -o jsonpath="{.data.password}" 2>/dev/null | base64 -d 2>/dev/null)
          [ -n "$admin_pw" ] || { echo "admin-user-password secret unavailable; cannot ensure health-user"; exit 0; }
          kubectl -n mongodb exec {{params.cluster_prefix}}-0 -- mongosh --quiet "mongodb://{{params.admin_username}}:${admin_pw}@localhost:27017/admin" --eval "
            if (!db.getUser(\"{{params.health_username}}\")) {
              db.getSiblingDB(\"admin\").createUser({user:\"{{params.health_username}}\",pwd:\"healthpass123\",roles:[{role:\"clusterMonitor\",db:\"admin\"}]});
            }" >/dev/null 2>&1 || true
          '
        sleep: 2
    verify:
      - command: "kubectl -n mongodb get secret health-user-password >/dev/null 2>&1 && echo ok"
        timeout_sec: 10

oracle:
  verify:
    commands:
      - command: "python3 cases/mongodb/readiness-probe-tuning/oracle/oracle.py"
        timeout_sec: 300
