# mongodb/statefulset-customization
# Restore a stable 3-member MongoDB replica set after StatefulSet customization breaks readiness

params:
  cluster_prefix:
    default: mongodb-replica
    description: App label / StatefulSet name of the replica set members.
  replica_set_name:
    default: mongodb-replica
    description: MongoDB replica set _id used when initiating the set.
  admin_username:
    default: admin-user
    description: Username of the MongoDB admin user.
  template_label_key:
    default: monitoring
    description: Pod template label key toggled by the customization.
  template_label_value:
    default: enabled
    description: Solved value the agent must restore for the template label.
  faulty_request_memory:
    default: 128Mi
    description: Faulty memory request applied to break readiness.
  faulty_limit_memory:
    default: 256Mi
    description: Faulty memory limit applied to break readiness.

prompt: |
  A 3-member MongoDB replica set is running in the mongodb namespace with auth enabled.
  Pods never become Ready, and monitoring cannot see them.

  Task:
  - Restore a stable 3-member replica set without data loss.
  - All pods must become Ready.
  - Replica set should have 1 PRIMARY and 2 SECONDARY members.
  - Restore the pod-template `{{params.template_label_key}}` label to
    `{{params.template_label_value}}` so monitoring can see the members.

  Notes:
  - No operators or CRDs.

namespace_contract:
  required_roles: []

metrics:
  - time_to_first_mutation

preconditionUnits:
  - name: mongo_env_ready
    on_probe_fail: skip
    probe:
      - command: "kubectl -n mongodb get pod {{params.cluster_prefix}}-0 2>/dev/null | grep -c Running"
        timeout_sec: 10
    apply:
      - command: "/bin/sh -c 'kubectl delete namespace mongodb --ignore-not-found=true; kubectl wait --for=delete namespace/mongodb --timeout=120s || true'"
        sleep: 2
      - command: "kubectl create namespace mongodb"
        sleep: 1
      - command: "kubectl -n mongodb apply -f cases/mongodb/statefulset-customization/resource/secrets.yaml"
        sleep: 1
      - command: "kubectl -n mongodb apply -f cases/mongodb/statefulset-customization/resource/guard-script.yaml"
        sleep: 1
      - command: "kubectl -n mongodb apply -f cases/mongodb/statefulset-customization/resource/services.yaml"
        sleep: 1
      - command: "kubectl -n mongodb apply -f cases/mongodb/statefulset-customization/resource/statefulset.yaml"
        sleep: 5
      - command: "kubectl -n mongodb wait --for=condition=ready pod -l app={{params.cluster_prefix}} --timeout=300s"
        sleep: 2
      - command: |
          /bin/sh -c 'kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet --eval '\''rs.initiate({_id:"{{params.replica_set_name}}",members:[{_id:0,host:"mongodb-replica-0.mongodb-replica-svc.mongodb.svc.cluster.local:27017"},{_id:1,host:"mongodb-replica-1.mongodb-replica-svc.mongodb.svc.cluster.local:27017"},{_id:2,host:"mongodb-replica-2.mongodb-replica-svc.mongodb.svc.cluster.local:27017"}]})'\'''
        sleep: 5
      - command: |
          /bin/sh -c 'for i in $(seq 1 20); do kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet --eval '\''db.hello().isWritablePrimary'\'' | grep true && exit 0; sleep 3; done; exit 1'
        sleep: 2
      - command: |
          /bin/sh -c 'kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet --eval '\''db.getSiblingDB("admin").createUser({user:"{{params.admin_username}}",pwd:"admin123password",roles:[{role:"clusterAdmin",db:"admin"},{role:"userAdminAnyDatabase",db:"admin"},{role:"readWriteAnyDatabase",db:"admin"}]})'\'''
        sleep: 2
      - command: |
          /bin/sh -c 'kubectl -n mongodb patch sts {{params.cluster_prefix}} --type=json -p='\''[{"op":"replace","path":"/spec/template/metadata/labels/{{params.template_label_key}}","value":"disabled"},{"op":"replace","path":"/spec/template/spec/containers/0/resources/requests/memory","value":"{{params.faulty_request_memory}}"},{"op":"replace","path":"/spec/template/spec/containers/0/resources/limits/memory","value":"{{params.faulty_limit_memory}}"}]'\'''
        sleep: 2
      - command: "kubectl -n mongodb delete pod -l app={{params.cluster_prefix}}"
        sleep: 2
    verify:
      # The precondition deliberately breaks the statefulset (faulty memory
      # patch + pod restart) for the agent to fix, so pods are NOT expected to
      # be Running here -- verify the broken baseline statefulset is in place.
      - command: "kubectl -n mongodb get statefulset {{params.cluster_prefix}} -o name"
        timeout_sec: 10

  - name: admin_user_fixture
    # Composition self-sufficiency: this case authenticates as the `admin-user`
    # created at deploy. On an inherited cluster a no-auth/other predecessor may
    # not have created it, and a live user's password is unrecoverable -> the
    # oracle's (and the user fixtures') admin auth fails through no agent fault.
    # Bring our own additively: if admin-user already authenticates, skip; else
    # ensure the secret and create the user. No restart, no data touched,
    # idempotent -> never regresses a cluster where admin already works.
    on_probe_fail: skip
    probe:
      - command: |
          /bin/sh -c '
          t=""; for cca in /etc/tls/ca.crt /etc/mongo-ca/ca.crt; do kubectl -n mongodb exec mongodb-replica-0 -- ls $cca >/dev/null 2>&1 && { t="--tls --tlsAllowInvalidHostnames --tlsAllowInvalidCertificates --tlsCAFile $cca"; break; }; done
          pw=$(kubectl -n mongodb get secret admin-user-password -o jsonpath="{.data.password}" 2>/dev/null | base64 -d 2>/dev/null)
          [ -n "$pw" ] || exit 1
          kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet $t "mongodb://{{params.admin_username}}:$pw@localhost:27017/admin" --eval "db.runCommand({ping:1}).ok" 2>/dev/null | grep -q 1
          '
        timeout_sec: 30
    apply:
      # Ensure the admin secret (idempotent: create only if missing).
      - command: "/bin/sh -c 'kubectl -n mongodb get secret admin-user-password >/dev/null 2>&1 || kubectl -n mongodb create secret generic admin-user-password --from-literal=password=admin123password'"
        sleep: 1
      # Ensure the admin-user MongoDB user. On a no-auth inherited cluster this
      # runs unauthenticated and succeeds; where it already exists it errors and
      # the `|| true` keeps it a no-op. Never drops or alters existing users/data.
      - command: |
          /bin/sh -c '
          t=""; for cca in /etc/tls/ca.crt /etc/mongo-ca/ca.crt; do kubectl -n mongodb exec mongodb-replica-0 -- ls $cca >/dev/null 2>&1 && { t="--tls --tlsAllowInvalidHostnames --tlsAllowInvalidCertificates --tlsCAFile $cca"; break; }; done
          kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet $t --eval "db.getSiblingDB(\"admin\").createUser({user:\"{{params.admin_username}}\",pwd:\"admin123password\",roles:[{role:\"root\",db:\"admin\"}]})" 2>/dev/null || true
          '
        sleep: 2
    verify:
      - command: "/bin/sh -c 'kubectl -n mongodb get secret admin-user-password >/dev/null 2>&1 && echo ok'"
        timeout_sec: 15

  # Problem-shape replant (composition safety, Pattern 1): the planted fault is a
  # StatefulSet template carrying label {{params.template_label_key}}=disabled AND
  # too-low memory requests/limits ({{params.faulty_request_memory}} /
  # {{params.faulty_limit_memory}}) that break readiness. The oracle grades that
  # the agent set the label to {{params.template_label_value}} (default `enabled`)
  # and raised memory above the minimums. Both are planted only inside the
  # destructive mongo_env_ready.apply, which is SKIPPED on an inherited cluster ->
  # the template label never exists (`got None`) and the memory is already fine, so
  # the agent has nothing to fix yet the oracle still fails. This unit re-plants the
  # EXACT drift (label=disabled + faulty memory) onto the LIVE StatefulSet via a
  # targeted patch, then rolls the pods so they go non-Ready. It patches ONLY the
  # template label and the mongod container memory -- never the image/version or
  # other config -- so it is safe over a carried-over cluster. Standalone the
  # probe sees the drift already present and skips -> identical behaviour.
  - name: statefulset_customization_drift_ready
    on_probe_fail: skip
    probe:
      # True (skip) when the unsolved drift is ALREADY present: template label is
      # NOT the solved value OR memory request is below the oracle minimum. False
      # (apply) when the StatefulSet is in the solved/healthy state and the drift
      # must be re-planted.
      - command: |
          /bin/sh -c '
          lbl=$(kubectl -n mongodb get sts {{params.cluster_prefix}} -o jsonpath="{.spec.template.metadata.labels.{{params.template_label_key}}}" 2>/dev/null)
          mem=$(kubectl -n mongodb get sts {{params.cluster_prefix}} -o jsonpath="{.spec.template.spec.containers[0].resources.requests.memory}" 2>/dev/null)
          [ "$lbl" != "{{params.template_label_value}}" ] || [ "$mem" = "{{params.faulty_request_memory}}" ]
          '
        timeout_sec: 15
    apply:
      - command: |
          /bin/sh -c 'kubectl -n mongodb patch sts {{params.cluster_prefix}} --type=json -p='\''[{"op":"replace","path":"/spec/template/metadata/labels/{{params.template_label_key}}","value":"disabled"},{"op":"replace","path":"/spec/template/spec/containers/0/resources/requests/memory","value":"{{params.faulty_request_memory}}"},{"op":"replace","path":"/spec/template/spec/containers/0/resources/limits/memory","value":"{{params.faulty_limit_memory}}"}]'\'' 2>/dev/null || kubectl -n mongodb patch sts {{params.cluster_prefix}} --type=merge -p '\''{"spec":{"template":{"metadata":{"labels":{"{{params.template_label_key}}":"disabled"}},"spec":{"containers":[{"name":"mongod","resources":{"requests":{"memory":"{{params.faulty_request_memory}}"},"limits":{"memory":"{{params.faulty_limit_memory}}"}}}]}}}}'\'''
        sleep: 2
      - command: "kubectl -n mongodb delete pod -l app={{params.cluster_prefix}}"
        sleep: 2
    verify:
      - command: |
          /bin/sh -c 'lbl=$(kubectl -n mongodb get sts {{params.cluster_prefix}} -o jsonpath="{.spec.template.metadata.labels.{{params.template_label_key}}}" 2>/dev/null); [ "$lbl" = "disabled" ]'
        timeout_sec: 15

oracle:
  verify:
    commands:
      - command: "python3 cases/mongodb/statefulset-customization/oracle/oracle.py"
        timeout_sec: 60
