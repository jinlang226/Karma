# mongodb/mongod-config-update
# MongoDB mongod-config-update task

params:
  cluster_prefix:
    default: mongodb-replica
    description: App label / StatefulSet name of the replica set members.
  replica_set_name:
    default: mongodb-replica
    description: MongoDB replica set _id used when initiating the set.
  admin_username:
    default: admin-user
    description: Username of the MongoDB admin user.
  seed_database:
    default: testdb
    description: Database seeded before the config change.
  seed_collection:
    default: data
    description: Collection seeded before the config change.
  target_journal_compressor:
    default: zlib
    description: Approved WiredTiger journal compression algorithm.

prompt: |
  A 3-member MongoDB replica set is running in the mongodb namespace with auth enabled.
  Apply the platform's updated observability and storage policy:
  - Increase logging verbosity by one level relative to the current setting.
  - Set the slow-operation threshold to 2x the current value.
  - Switch the WiredTiger journal compression to the approved standard ({{params.target_journal_compressor}}).

  Ensure the changes are applied consistently across all members and data remains available.
  No operators or CRDs.

namespace_contract:
  required_roles: []

metrics:
  - time_to_first_mutation

preconditionUnits:
  - name: mongo_env_ready
    on_probe_fail: skip
    probe:
      # AUTHORITATIVE skip-if-running probe (P32): succeed when the canonical
      # StatefulSet exists OR any pod is Running, so the destructive namespace
      # rebuild below is skipped on an inherited cluster even if its pods are
      # momentarily not Running (mid-restart from a prior stage) -- the
      # StatefulSet persists across that window. The bare `grep -c Running`
      # could miss such a cluster and clobber inherited state.
      - command: "/bin/sh -c 'kubectl -n mongodb get statefulset {{params.cluster_prefix}} >/dev/null 2>&1 || kubectl -n mongodb get pods 2>/dev/null | grep -q Running'"
        timeout_sec: 10
    apply:
      - command: |
          /bin/sh -c '
          kubectl delete namespace mongodb --ignore-not-found=true; kubectl wait --for=delete namespace/mongodb --timeout=120s || true
          '
        sleep: 2
      - command: "kubectl create namespace mongodb"
        sleep: 1
      - command: "kubectl -n mongodb apply -f cases/mongodb/mongod-config-update/resource/secrets.yaml"
        sleep: 1
      - command: "kubectl -n mongodb apply -f cases/mongodb/mongod-config-update/resource/configmap.yaml"
        sleep: 1
      - command: "kubectl -n mongodb apply -f cases/mongodb/mongod-config-update/resource/services.yaml"
        sleep: 1
      - command: "kubectl -n mongodb apply -f cases/mongodb/mongod-config-update/resource/statefulset.yaml"
        sleep: 5
      - command: |
          for i in 0 1 2; do
            for t in $(seq 1 110); do
              phase=$(kubectl -n mongodb get pod mongodb-replica-$i -o jsonpath='{.status.phase}' 2>/dev/null)
              if [ "${phase}" = "Running" ]; then
                break
              fi
              sleep 5
            done
          done
        timeout_sec: 600
        sleep: 2
      - command: |
          for i in 0 1 2; do
            for t in $(seq 1 60); do
              if kubectl -n mongodb exec mongodb-replica-$i -- \
                   mongosh --quiet --eval 'db.runCommand({ping:1}).ok' 2>/dev/null | grep -q 1; then
                break
              fi
              sleep 5
            done
          done
        timeout_sec: 400
        sleep: 2
      - command: |
          kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet --eval '
          rs.initiate({_id:"{{params.replica_set_name}}",members:[
            {_id:0,host:"mongodb-replica-0.mongodb-replica-svc.mongodb.svc.cluster.local:27017"},
            {_id:1,host:"mongodb-replica-1.mongodb-replica-svc.mongodb.svc.cluster.local:27017"},
            {_id:2,host:"mongodb-replica-2.mongodb-replica-svc.mongodb.svc.cluster.local:27017"}
          ]})'
        sleep: 5
      - command: |
          for i in $(seq 1 20); do
            kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet --eval 'db.hello().isWritablePrimary' | grep true && exit 0
            sleep 3
          done
          exit 1
        sleep: 2
      - command: |
          kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet --eval '
          db.getSiblingDB("admin").createUser({
            user: "{{params.admin_username}}",
            pwd: "admin123password",
            roles: [
              {role: "clusterAdmin", db: "admin"},
              {role: "userAdminAnyDatabase", db: "admin"},
              {role: "readWriteAnyDatabase", db: "admin"}
            ]
          })'
        sleep: 2
      - command: |
          kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet \
          "mongodb://{{params.admin_username}}:admin123password@localhost:27017/admin" \
          --eval "db.getSiblingDB('{{params.seed_database}}').{{params.seed_collection}}.insertOne({config:'initial'})"
        sleep: 2
      - command: "kubectl -n mongodb wait --for=condition=ready pod -l app={{params.cluster_prefix}} --timeout=300s"
        sleep: 2
    verify:
      - command: "kubectl -n mongodb get pods 2>/dev/null | grep -c Running"
        timeout_sec: 10

  - name: admin_user_fixture
    # Composition self-sufficiency: this case authenticates as the `admin-user`
    # created at deploy. On an inherited cluster a no-auth/other predecessor may
    # not have created it, and a live user's password is unrecoverable -> the
    # oracle's (and the user fixtures') admin auth fails through no agent fault.
    # Bring our own additively: if admin-user already authenticates, skip; else
    # ensure the secret and create the user. No restart, no data touched,
    # idempotent -> never regresses a cluster where admin already works.
    on_probe_fail: skip
    probe:
      - command: |
          /bin/sh -c '
          t=""; for cca in /etc/tls/ca.crt /etc/mongo-ca/ca.crt; do kubectl -n mongodb exec mongodb-replica-0 -- ls $cca >/dev/null 2>&1 && { t="--tls --tlsAllowInvalidHostnames --tlsAllowInvalidCertificates --tlsCAFile $cca"; break; }; done
          pw=$(kubectl -n mongodb get secret admin-user-password -o jsonpath="{.data.password}" 2>/dev/null | base64 -d 2>/dev/null)
          [ -n "$pw" ] || exit 1
          kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet $t "mongodb://{{params.admin_username}}:$pw@localhost:27017/admin" --eval "db.runCommand({ping:1}).ok" 2>/dev/null | grep -q 1
          '
        timeout_sec: 30
    apply:
      # Ensure the admin secret (idempotent: create only if missing).
      - command: "/bin/sh -c 'kubectl -n mongodb get secret admin-user-password >/dev/null 2>&1 || kubectl -n mongodb create secret generic admin-user-password --from-literal=password=admin123password'"
        sleep: 1
      # Ensure the admin-user MongoDB user. On a no-auth inherited cluster this
      # runs unauthenticated and succeeds; where it already exists it errors and
      # the `|| true` keeps it a no-op. Never drops or alters existing users/data.
      - command: |
          /bin/sh -c '
          t=""; for cca in /etc/tls/ca.crt /etc/mongo-ca/ca.crt; do kubectl -n mongodb exec mongodb-replica-0 -- ls $cca >/dev/null 2>&1 && { t="--tls --tlsAllowInvalidHostnames --tlsAllowInvalidCertificates --tlsCAFile $cca"; break; }; done
          P=""; for _pi in $(seq 1 30); do P=$(kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet $t --eval "rs.hello().primary" 2>/dev/null | cut -d. -f1); [ -n "$P" ] && break; sleep 2; done; P=${P:-mongodb-replica-0}
          kubectl -n mongodb exec "$P" -- mongosh --quiet $t --eval "db.getSiblingDB(\"admin\").createUser({user:\"{{params.admin_username}}\",pwd:\"admin123password\",roles:[{role:\"root\",db:\"admin\"}]})" 2>/dev/null || true
          '
        sleep: 2
    verify:
      # P38: read the write back -- authenticate AS the admin user just created and
      # ping (bounded poll to tolerate election/replication lag), not merely assert
      # the companion secret exists.
      - command: |
          /bin/sh -c '
          t=""; for cca in /etc/tls/ca.crt /etc/mongo-ca/ca.crt; do kubectl -n mongodb exec mongodb-replica-0 -- ls $cca >/dev/null 2>&1 && { t="--tls --tlsAllowInvalidHostnames --tlsAllowInvalidCertificates --tlsCAFile $cca"; break; }; done
          pw=$(kubectl -n mongodb get secret admin-user-password -o jsonpath="{.data.password}" 2>/dev/null | base64 -d 2>/dev/null); pw=${pw:-admin123password}
          for _vi in $(seq 1 20); do
            kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet $t "mongodb://{{params.admin_username}}:$pw@localhost:27017/admin?directConnection=true" --eval "db.runCommand({ping:1}).ok" 2>/dev/null | grep -q 1 && exit 0
            sleep 3
          done
          exit 1
          '
        timeout_sec: 90

  # C1 additive seed (composition safety): the oracle's check_data requires >= 1
  # doc in {{params.seed_database}}.{{params.seed_collection}}. That seed is planted
  # ONLY inside the destructive mongo_env_ready.apply, which is SKIPPED on an
  # inherited cluster -> a predecessor that seeded a DIFFERENT collection (e.g.
  # app.test) leaves {{params.seed_database}}.{{params.seed_collection}} empty and
  # the oracle false-fails a correct config change. This unit re-establishes JUST
  # that seed ADDITIVELY and idempotently, authenticated as admin (P37: declared
  # after admin_user_fixture), writing to the DETECTED PRIMARY (P38). No
  # namespace/pod touched. Standalone it is a no-op: the build already seeded >= 1,
  # so the probe passes and this apply is skipped.
  - name: mongo_seed_fixture
    on_probe_fail: skip
    probe:
      # Pass (skip) only when the seed collection already holds >= 1 doc, read from
      # the detected primary as admin.
      - command: |
          /bin/sh -c '
          t=""; for cca in /etc/tls/ca.crt /etc/mongo-ca/ca.crt; do kubectl -n mongodb exec {{params.cluster_prefix}}-0 -- ls $cca >/dev/null 2>&1 && { t="--tls --tlsAllowInvalidHostnames --tlsAllowInvalidCertificates --tlsCAFile $cca"; break; }; done
          pw=$(kubectl -n mongodb get secret admin-user-password -o jsonpath="{.data.password}" 2>/dev/null | base64 -d 2>/dev/null); pw=${pw:-admin123password}
          P=""; for _pi in $(seq 1 30); do P=$(kubectl -n mongodb exec {{params.cluster_prefix}}-0 -- mongosh --quiet $t "mongodb://{{params.admin_username}}:$pw@localhost:27017/admin?directConnection=true" --eval "rs.hello().primary" 2>/dev/null | cut -d. -f1); [ -n "$P" ] && break; sleep 2; done; P=${P:-{{params.cluster_prefix}}-0}
          n=$(kubectl -n mongodb exec "$P" -- mongosh --quiet $t "mongodb://{{params.admin_username}}:$pw@localhost:27017/admin" --eval "db.getSiblingDB(\"{{params.seed_database}}\").{{params.seed_collection}}.countDocuments({})" 2>/dev/null | tr -dc 0-9)
          [ "${n:-0}" -ge 1 ]
          '
        timeout_sec: 60
    apply:
      # Insert the seed doc on the detected primary, authenticated as admin, only
      # when the collection is short (idempotent). Never drops or resets data.
      - command: |
          /bin/sh -c '
          t=""; for cca in /etc/tls/ca.crt /etc/mongo-ca/ca.crt; do kubectl -n mongodb exec {{params.cluster_prefix}}-0 -- ls $cca >/dev/null 2>&1 && { t="--tls --tlsAllowInvalidHostnames --tlsAllowInvalidCertificates --tlsCAFile $cca"; break; }; done
          pw=$(kubectl -n mongodb get secret admin-user-password -o jsonpath="{.data.password}" 2>/dev/null | base64 -d 2>/dev/null); pw=${pw:-admin123password}
          P=""; for _pi in $(seq 1 30); do P=$(kubectl -n mongodb exec {{params.cluster_prefix}}-0 -- mongosh --quiet $t "mongodb://{{params.admin_username}}:$pw@localhost:27017/admin?directConnection=true" --eval "rs.hello().primary" 2>/dev/null | cut -d. -f1); [ -n "$P" ] && break; sleep 2; done; P=${P:-{{params.cluster_prefix}}-0}
          kubectl -n mongodb exec "$P" -- mongosh --quiet $t "mongodb://{{params.admin_username}}:$pw@localhost:27017/admin" --eval "var c=db.getSiblingDB(\"{{params.seed_database}}\").{{params.seed_collection}}; if(c.countDocuments({})<1){c.insertOne({config:\"initial\"});}" 2>/dev/null || true
          '
        sleep: 2
    verify:
      # P38 read-back: confirm the seed doc now reads back (>= 1) on the detected
      # primary as admin -- not merely that a secret exists.
      - command: |
          /bin/sh -c '
          t=""; for cca in /etc/tls/ca.crt /etc/mongo-ca/ca.crt; do kubectl -n mongodb exec {{params.cluster_prefix}}-0 -- ls $cca >/dev/null 2>&1 && { t="--tls --tlsAllowInvalidHostnames --tlsAllowInvalidCertificates --tlsCAFile $cca"; break; }; done
          pw=$(kubectl -n mongodb get secret admin-user-password -o jsonpath="{.data.password}" 2>/dev/null | base64 -d 2>/dev/null); pw=${pw:-admin123password}
          P=""; for _pi in $(seq 1 30); do P=$(kubectl -n mongodb exec {{params.cluster_prefix}}-0 -- mongosh --quiet $t "mongodb://{{params.admin_username}}:$pw@localhost:27017/admin?directConnection=true" --eval "rs.hello().primary" 2>/dev/null | cut -d. -f1); [ -n "$P" ] && break; sleep 2; done; P=${P:-{{params.cluster_prefix}}-0}
          n=$(kubectl -n mongodb exec "$P" -- mongosh --quiet $t "mongodb://{{params.admin_username}}:$pw@localhost:27017/admin" --eval "db.getSiblingDB(\"{{params.seed_database}}\").{{params.seed_collection}}.countDocuments({})" 2>/dev/null | tr -dc 0-9)
          [ "${n:-0}" -ge 1 ]
          '
        timeout_sec: 60

  # O5 relative-change grading (PREFERRED option): the prompt asks for a change
  # RELATIVE to the current setting (verbosity +1, slowOpThresholdMs x2). Grade
  # that delta against a RECORDED pre-agent value -- NO reset, NO restart. This
  # unit RECORDS the live pre-agent verbosity + slowms into a durable in-cluster
  # store (ConfigMap mongod-config-prevalue) the oracle reads. A fixed
  # baseline+1/baseline*2 oracle is only correct on a case's FIRST application;
  # when a sweep schedules this relative-change case more than once (see the
  # config-tune-sweep workflows) the 2nd+ run legitimately advances the value
  # again, and a fixed oracle false-fails the correct agent (O5). Recording the
  # actual starting value per stage makes the delta grade correctly however many
  # times the case runs, with NO compounding and NO restart budget -- the old
  # reset-the-baseline strategy (rollout-restart + configmap sed-patch + a
  # restart-settle read-back poll) consumed the whole precondition phase budget
  # on a fresh cluster and timed the first mongod stage out; this replaces it.
  # Runs LAST (after the cluster is up and admin_user_fixture authenticates), so
  # it captures exactly the value the agent starts from. OVERWRITES every run so
  # the store is never stale from a prior stage.
  - name: mongo_config_prevalue_record
    on_probe_fail: skip
    probe:
      # Deliberately ALWAYS "not present" -> apply always re-records. The live
      # starting value differs per stage (each inherits the prior stage's
      # result), so the record must be refreshed every run; never skip it.
      - command: "/bin/sh -c 'exit 1'"
        timeout_sec: 5
    apply:
      # Read verbosity + slowms from the SAME dual source the oracle grades
      # (O5/O38): start-up config getCmdLineOpts.parsed FIRST
      # (systemLog.verbosity / operationProfiling.slowOpThresholdMs), else the
      # live runtime (getParameter:logLevel / getProfilingStatus().slowms). Read
      # from member 0 -- members agree at rest. Write both into the durable
      # ConfigMap mongod-config-prevalue (create|apply fully overwrites the data
      # map, so no stale key survives). Poll the read briefly to tolerate
      # election/exec lag; if no valid numeric value can be read, exit non-zero
      # so this precondition fails LOUDLY rather than let the oracle grade
      # against a stale record. This is a fast read+write -- NO restart.
      - command: |
          /bin/sh -c '
          t=""; for cca in /etc/tls/ca.crt /etc/mongo-ca/ca.crt; do kubectl -n mongodb exec {{params.cluster_prefix}}-0 -- ls $cca >/dev/null 2>&1 && { t="--tls --tlsAllowInvalidHostnames --tlsAllowInvalidCertificates --tlsCAFile $cca"; break; }; done
          pw=$(kubectl -n mongodb get secret admin-user-password -o jsonpath="{.data.password}" 2>/dev/null | base64 -d 2>/dev/null); pw=${pw:-admin123password}
          v=""; s=""
          for _pi in $(seq 1 30); do
            out=$(kubectl -n mongodb exec {{params.cluster_prefix}}-0 -- mongosh --quiet $t "mongodb://{{params.admin_username}}:$pw@localhost:27017/admin?directConnection=true" --eval "var o=db.adminCommand({getCmdLineOpts:1}).parsed||{}; var v=(o.systemLog&&o.systemLog.verbosity!=null)?o.systemLog.verbosity:db.adminCommand({getParameter:1,logLevel:1}).logLevel; var s=(o.operationProfiling&&o.operationProfiling.slowOpThresholdMs!=null)?o.operationProfiling.slowOpThresholdMs:db.getProfilingStatus().slowms; print(v+\"|\"+s)" 2>/dev/null)
            v=$(echo "$out" | cut -d"|" -f1 | tr -dc 0-9); s=$(echo "$out" | cut -d"|" -f2 | tr -dc 0-9)
            [ -n "$v" ] && [ -n "$s" ] && break
            sleep 2
          done
          [ -n "$v" ] && [ -n "$s" ] || exit 1
          kubectl -n mongodb create configmap mongod-config-prevalue --from-literal=verbosity="$v" --from-literal=slowms="$s" --dry-run=client -o yaml | kubectl -n mongodb apply -f -
          '
        timeout_sec: 120
        sleep: 1
    verify:
      # P38 read-back: confirm THIS stage's record is durably present and numeric.
      - command: |
          /bin/sh -c '
          v=$(kubectl -n mongodb get configmap mongod-config-prevalue -o jsonpath="{.data.verbosity}" 2>/dev/null | tr -dc 0-9)
          s=$(kubectl -n mongodb get configmap mongod-config-prevalue -o jsonpath="{.data.slowms}" 2>/dev/null | tr -dc 0-9)
          [ -n "$v" ] && [ -n "$s" ]
          '
        timeout_sec: 15

oracle:
  verify:
    commands:
      # O21/O14: the "all" run now executes the two ~120s convergence loops
      # (workload + topology) BEFORE the single-pass runtime/data reads, so the
      # budget must exceed their SUM plus the per-member bounded execs.
      - command: "python3 cases/mongodb/mongod-config-update/oracle/oracle.py"
        timeout_sec: 420
