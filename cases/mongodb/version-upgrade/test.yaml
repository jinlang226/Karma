# mongodb/version-upgrade
# Upgrade a MongoDB 5.0 replica set to 6.0.5 and finalize feature compatibility

params:
  cluster_prefix:
    default: mongodb-replica
    description: StatefulSet name of the replica set members.
  replica_set_name:
    default: mongodb-replica
    description: MongoDB replica set _id used when initiating the set.
  admin_username:
    default: admin-user
    description: Username of the MongoDB admin user.
  app_database:
    default: testdb
    description: Application database seeded with data.
  app_collection:
    default: data
    description: Application collection seeded with data.
  from_fcv:
    default: "5.0"
    description: Feature compatibility version of the source MongoDB release.

prompt: |
  A 3-member MongoDB replica set is running in the mongodb namespace on MongoDB 5.0.x.
  Upgrade to MongoDB 6.0.5 and finalize feature compatibility.
  Preserve replica set health and existing data.
  Do not use operators or CRDs.

namespace_contract:
  required_roles: []

metrics:
  - time_to_first_mutation

preconditionUnits:
  - name: mongo_env_ready
    on_probe_fail: skip
    probe:
      - command: "kubectl -n mongodb get pod {{params.cluster_prefix}}-0 2>/dev/null | grep -c Running"
        timeout_sec: 10
    apply:
      - command: "/bin/sh -c 'kubectl delete namespace mongodb --ignore-not-found=true; kubectl wait --for=delete namespace/mongodb --timeout=120s || true'"
        sleep: 2
      - command: "kubectl create namespace mongodb"
        sleep: 1
      - command: "kubectl -n mongodb apply -f cases/mongodb/version-upgrade/resource/secrets.yaml"
        sleep: 1
      - command: "kubectl -n mongodb apply -f cases/mongodb/version-upgrade/resource/services.yaml"
        sleep: 1
      - command: "kubectl -n mongodb apply -f cases/mongodb/version-upgrade/resource/statefulset.yaml"
        sleep: 5
      - command: |
          /bin/sh -c 'for i in $(seq 1 120); do ready=$(kubectl -n mongodb get sts {{params.cluster_prefix}} -o jsonpath='\''{.status.readyReplicas}'\'' 2>/dev/null); if [ "${ready:-0}" -ge 3 ]; then exit 0; fi; sleep 5; done; exit 1'
        sleep: 2
      - command: |
          /bin/sh -c 'kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet --eval '\''rs.initiate({_id:"{{params.replica_set_name}}",members:[{_id:0,host:"mongodb-replica-0.mongodb-replica-svc.mongodb.svc.cluster.local:27017"},{_id:1,host:"mongodb-replica-1.mongodb-replica-svc.mongodb.svc.cluster.local:27017"},{_id:2,host:"mongodb-replica-2.mongodb-replica-svc.mongodb.svc.cluster.local:27017"}]})'\'''
        sleep: 5
      - command: |
          /bin/sh -c 'for i in $(seq 1 20); do kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet --eval '\''db.hello().isWritablePrimary'\'' | grep true && exit 0; sleep 3; done; exit 1'
        sleep: 2
      - command: |
          /bin/sh -c 'kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet --eval '\''db.getSiblingDB("admin").createUser({user:"{{params.admin_username}}",pwd:"admin123password",roles:[{role:"clusterAdmin",db:"admin"},{role:"userAdminAnyDatabase",db:"admin"},{role:"readWriteAnyDatabase",db:"admin"}]})'\'''
        sleep: 2
      - command: |
          /bin/sh -c 'kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet "mongodb://{{params.admin_username}}:admin123password@localhost:27017/admin" --eval '\''db.adminCommand({setFeatureCompatibilityVersion:"{{params.from_fcv}}"})'\'''
        sleep: 2
      - command: |
          /bin/sh -c 'kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet "mongodb://{{params.admin_username}}:admin123password@localhost:27017/admin" --eval '\''db.getSiblingDB("{{params.app_database}}").{{params.app_collection}}.insertOne({version:"{{params.from_fcv}}",timestamp:new Date()})'\'''
        sleep: 2
    verify:
      - command: "kubectl -n mongodb get pods 2>/dev/null | grep -c Running"
        timeout_sec: 10

  # Additive data fixture (composition safety): the oracle requires >= 1 docs in
  # {{params.app_database}}.{{params.app_collection}}. When this case runs chained on an inherited cluster the
  # destructive `apply` above is skipped, so a prior stage may have left the
  # collection short. This unit tops it up ADDITIVELY to the required count WITHOUT
  # dropping/recreating the collection or touching the namespace/cluster.
  # It authenticates as the stable admin user (password from the admin
  # secret, like the case/oracle). The probe gates on the DATA COUNT (not "pods Running"), so it runs
  # whenever the collection is short; standalone (where `apply` already seeded 1)
  # it sees the required count and skips -> identical behaviour. Idempotent: inserts
  # only the deficit (required - current).
  - name: mongo_seed_fixture
    on_probe_fail: skip
    probe:
      - command: |
          /bin/sh -c 't=""; for cca in /etc/tls/ca.crt /etc/mongo-ca/ca.crt; do kubectl -n mongodb exec mongodb-replica-0 -- ls $cca >/dev/null 2>&1 && { t="--tls --tlsAllowInvalidHostnames --tlsAllowInvalidCertificates --tlsCAFile $cca"; break; }; done; pw=$(kubectl -n mongodb get secret admin-user-password -o jsonpath="{.data.password}" 2>/dev/null | base64 -d 2>/dev/null); pw=${pw:-admin123password}; n=$(P=""; for _pi in $(seq 1 30); do P=$(kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet $t "mongodb://{{params.admin_username}}:$pw@localhost:27017/admin?directConnection=true" --eval '\''rs.hello().primary'\'' 2>/dev/null | cut -d. -f1); [ -n "$P" ] && break; sleep 2; done; P=${P:-mongodb-replica-0}; kubectl -n mongodb exec "$P" -- mongosh --quiet $t "mongodb://{{params.admin_username}}:$pw@localhost:27017/admin" --eval '\''db.getSiblingDB("{{params.app_database}}").{{params.app_collection}}.countDocuments({})'\'' 2>/dev/null | tr -dc 0-9); [ "${n:-0}" -ge 1 ] && echo ok | grep -c ok'
        timeout_sec: 30
    apply:
      - command: |
          /bin/sh -c 'pw=$(kubectl -n mongodb get secret admin-user-password -o jsonpath="{.data.password}" 2>/dev/null | base64 -d 2>/dev/null); pw=${pw:-admin123password}; P=""; for _pi in $(seq 1 30); do P=$(kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet "mongodb://{{params.admin_username}}:$pw@localhost:27017/admin?directConnection=true" --eval '\''rs.hello().primary'\'' 2>/dev/null | cut -d. -f1); [ -n "$P" ] && break; sleep 2; done; P=${P:-mongodb-replica-0}; kubectl -n mongodb exec "$P" -- mongosh --quiet "mongodb://{{params.admin_username}}:$pw@localhost:27017/admin" --eval '\''var c=db.getSiblingDB("{{params.app_database}}").{{params.app_collection}}; var need=1-c.countDocuments({}); var docs=[]; for(var i=0;i<need;i++){docs.push({seed:"fixture",ts:new Date()});} if(docs.length>0){c.insertMany(docs,{writeConcern:{w:1}});}'\'''
        sleep: 2
    verify:
      - command: |
          /bin/sh -c 't=""; for cca in /etc/tls/ca.crt /etc/mongo-ca/ca.crt; do kubectl -n mongodb exec mongodb-replica-0 -- ls $cca >/dev/null 2>&1 && { t="--tls --tlsAllowInvalidHostnames --tlsAllowInvalidCertificates --tlsCAFile $cca"; break; }; done; pw=$(kubectl -n mongodb get secret admin-user-password -o jsonpath="{.data.password}" 2>/dev/null | base64 -d 2>/dev/null); pw=${pw:-admin123password}; n=$(P=""; for _pi in $(seq 1 30); do P=$(kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet $t "mongodb://{{params.admin_username}}:$pw@localhost:27017/admin?directConnection=true" --eval '\''rs.hello().primary'\'' 2>/dev/null | cut -d. -f1); [ -n "$P" ] && break; sleep 2; done; P=${P:-mongodb-replica-0}; kubectl -n mongodb exec "$P" -- mongosh --quiet $t "mongodb://{{params.admin_username}}:$pw@localhost:27017/admin" --eval '\''db.getSiblingDB("{{params.app_database}}").{{params.app_collection}}.countDocuments({})'\'' 2>/dev/null | tr -dc 0-9); [ "${n:-0}" -ge 1 ]'
        timeout_sec: 30

oracle:
  verify:
    commands:
      - command: "python3 cases/mongodb/version-upgrade/oracle/oracle.py"
        timeout_sec: 60
