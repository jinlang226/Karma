# mongodb/user-management
# Manage MongoDB users and roles with proper permissions

params:
  cluster_prefix:
    default: mongodb-replica
    description: StatefulSet name of the replica set members.
  replica_set_name:
    default: mongodb-replica
    description: MongoDB replica set _id used when initiating the set.
  admin_secret_name:
    default: admin-user-password
    description: Kubernetes Secret holding the admin user's password.
  app_secret_name:
    default: app-user-password
    description: Kubernetes Secret holding the app user's password.
  readonly_secret_name:
    default: readonly-user-password
    description: Kubernetes Secret holding the readonly user's password.
  admin_username:
    default: admin-user
    description: Username of the MongoDB admin user.
  app_username:
    default: app-user
    description: Username of the application user.
  readonly_username:
    default: readonly-user
    description: Username of the read-only user.
  app_database:
    default: appdb
    description: Application database used by the users.
  reports_collection:
    default: reports
    description: Collection that the reporting role must read.
  reporting_role_name:
    default: reportingRole
    description: Custom role granting read access to the reports collection.

prompt: |
  A 3-member MongoDB replica set is running in the mongodb namespace.
  Authentication is enabled. Passwords are stored in these Secrets:
  - {{params.admin_secret_name}}
  - {{params.app_secret_name}}
  - {{params.readonly_secret_name}}

  Task:
  - {{params.app_username}} must have readWrite on {{params.app_database}}.
  - {{params.readonly_username}} must have read on {{params.app_database}} and a custom role {{params.reporting_role_name}}.
  - {{params.reporting_role_name}} must allow read access to {{params.app_database}}.{{params.reports_collection}} (aggregate should succeed).
  - Do not break admin access or existing data.

  Notes:
  - Do not use operators or CRDs.

namespace_contract:
  required_roles: []

metrics:
  - time_to_first_mutation

preconditionUnits:
  - name: mongo_env_ready
    on_probe_fail: skip
    probe:
      # AUTHORITATIVE skip-if-running probe (P32): succeed when the canonical
      # StatefulSet exists OR any pod is Running, so the destructive namespace
      # rebuild below is skipped on an inherited cluster even if its pods are
      # momentarily not Running (mid-restart from a prior stage) -- the
      # StatefulSet persists across that window. The bare `grep -c Running`
      # could miss such a cluster and clobber inherited state.
      - command: "/bin/sh -c 'kubectl -n mongodb get statefulset {{params.cluster_prefix}} >/dev/null 2>&1 || kubectl -n mongodb get pods 2>/dev/null | grep -q Running'"
        timeout_sec: 10
    apply:
      - command: "/bin/sh -c 'kubectl delete namespace mongodb --ignore-not-found=true; kubectl wait --for=delete namespace/mongodb --timeout=120s || true'"
        sleep: 2
      - command: "kubectl create namespace mongodb"
        sleep: 1
      - command: "kubectl -n mongodb apply -f cases/mongodb/user-management/resource/secrets.yaml"
        sleep: 1
      - command: "kubectl -n mongodb apply -f cases/mongodb/user-management/resource/services.yaml"
        sleep: 1
      - command: "kubectl -n mongodb apply -f cases/mongodb/user-management/resource/statefulset.yaml"
        sleep: 5
      - command: |
          /bin/sh -c 'for i in $(seq 1 120); do ready=$(kubectl -n mongodb get sts {{params.cluster_prefix}} -o jsonpath='\''{.status.readyReplicas}'\'' 2>/dev/null); if [ "${ready:-0}" -ge 3 ]; then exit 0; fi; sleep 5; done; exit 1'
        sleep: 2
      # Pod-Ready != mongod accepting TCP (§1.10): ping-until-ok before rs.initiate.
      - command: |
          /bin/sh -c 'for i in $(seq 1 30); do kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet --eval '\''db.runCommand({ping:1}).ok'\'' 2>/dev/null | grep -q 1 && exit 0; sleep 3; done; exit 1'
        sleep: 2
      - command: |
          /bin/sh -c 'kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet --eval '\''rs.initiate({_id:"{{params.replica_set_name}}",members:[{_id:0,host:"mongodb-replica-0.mongodb-replica-svc.mongodb.svc.cluster.local:27017"},{_id:1,host:"mongodb-replica-1.mongodb-replica-svc.mongodb.svc.cluster.local:27017"},{_id:2,host:"mongodb-replica-2.mongodb-replica-svc.mongodb.svc.cluster.local:27017"}]})'\'''
        sleep: 5
      - command: |
          /bin/sh -c 'for i in $(seq 1 20); do kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet --eval '\''db.hello().isWritablePrimary'\'' | grep true && exit 0; sleep 3; done; exit 1'
        sleep: 2
      - command: |
          /bin/sh -c 'kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet --eval '\''db.getSiblingDB("admin").createUser({user:"{{params.admin_username}}",pwd:"admin123password",roles:[{role:"clusterAdmin",db:"admin"},{role:"userAdminAnyDatabase",db:"admin"},{role:"readWriteAnyDatabase",db:"admin"}]})'\'''
        sleep: 2
      - command: |
          /bin/sh -c 'kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet "mongodb://{{params.admin_username}}:admin123password@localhost:27017/admin" --eval '\''db.getSiblingDB("admin").createUser({user:"{{params.app_username}}",pwd:"app123password",roles:[{role:"read",db:"{{params.app_database}}"}]})'\'''
        sleep: 2
      - command: |
          /bin/sh -c 'kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet "mongodb://{{params.admin_username}}:admin123password@localhost:27017/admin" --eval '\''db.getSiblingDB("admin").createUser({user:"{{params.readonly_username}}",pwd:"readonly123password",roles:[{role:"read",db:"{{params.app_database}}"}]})'\'''
        sleep: 2
      - command: |
          /bin/sh -c 'kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet "mongodb://{{params.admin_username}}:admin123password@localhost:27017/admin" --eval '\''db.getSiblingDB("{{params.app_database}}").{{params.reports_collection}}.insertMany([{x:1},{x:2},{x:3}],{writeConcern:{w:1}})'\'''
        sleep: 2
    verify:
      - command: "kubectl -n mongodb get pods 2>/dev/null | grep -c Running"
        timeout_sec: 10

  - name: admin_user_fixture
    # Composition self-sufficiency: this case authenticates as the `admin-user`
    # created at deploy. On an inherited cluster a no-auth/other predecessor may
    # not have created it, and a live user's password is unrecoverable -> the
    # oracle's (and the user fixtures') admin auth fails through no agent fault.
    # Bring our own additively: if admin-user already authenticates, skip; else
    # ensure the secret and create the user. No restart, no data touched,
    # idempotent -> never regresses a cluster where admin already works.
    on_probe_fail: skip
    probe:
      - command: |
          /bin/sh -c '
          t=""; for cca in /etc/tls/ca.crt /etc/mongo-ca/ca.crt; do kubectl -n mongodb exec mongodb-replica-0 -- ls $cca >/dev/null 2>&1 && { t="--tls --tlsAllowInvalidHostnames --tlsAllowInvalidCertificates --tlsCAFile $cca"; break; }; done
          pw=$(kubectl -n mongodb get secret admin-user-password -o jsonpath="{.data.password}" 2>/dev/null | base64 -d 2>/dev/null)
          [ -n "$pw" ] || exit 1
          kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet $t "mongodb://{{params.admin_username}}:$pw@localhost:27017/admin" --eval "db.runCommand({ping:1}).ok" 2>/dev/null | grep -q 1
          '
        timeout_sec: 30
    apply:
      # Ensure the admin secret (idempotent: create only if missing).
      - command: "/bin/sh -c 'kubectl -n mongodb get secret admin-user-password >/dev/null 2>&1 || kubectl -n mongodb create secret generic admin-user-password --from-literal=password=admin123password'"
        sleep: 1
      # Ensure the admin-user MongoDB user. On a no-auth inherited cluster this
      # runs unauthenticated and succeeds; where it already exists it errors and
      # the `|| true` keeps it a no-op. Never drops or alters existing users/data.
      - command: |
          /bin/sh -c '
          t=""; for cca in /etc/tls/ca.crt /etc/mongo-ca/ca.crt; do kubectl -n mongodb exec mongodb-replica-0 -- ls $cca >/dev/null 2>&1 && { t="--tls --tlsAllowInvalidHostnames --tlsAllowInvalidCertificates --tlsCAFile $cca"; break; }; done
          kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet $t --eval "db.getSiblingDB(\"admin\").createUser({user:\"{{params.admin_username}}\",pwd:\"admin123password\",roles:[{role:\"root\",db:\"admin\"}]})" 2>/dev/null || true
          '
        sleep: 2
    verify:
      - command: "/bin/sh -c 'kubectl -n mongodb get secret admin-user-password >/dev/null 2>&1 && echo ok'"
        timeout_sec: 15

  # Additive data fixture (composition safety): the oracle requires >= 3 docs in
  # {{params.app_database}}.{{params.reports_collection}}. When this case runs chained on an inherited cluster the
  # destructive `apply` above is skipped, so a prior stage may have left the
  # collection short. This unit tops it up ADDITIVELY to the required count WITHOUT
  # dropping/recreating the collection or touching the namespace/cluster.
  # It authenticates as the stable admin user (password from the admin
  # secret, like the case/oracle). The probe gates on the DATA COUNT (not "pods Running"), so it runs
  # whenever the collection is short; standalone (where `apply` already seeded 3)
  # it sees the required count and skips -> identical behaviour. Idempotent: inserts
  # only the deficit (required - current).
  - name: mongo_seed_fixture
    on_probe_fail: skip
    probe:
      - command: |
          /bin/sh -c 't=""; for cca in /etc/tls/ca.crt /etc/mongo-ca/ca.crt; do kubectl -n mongodb exec mongodb-replica-0 -- ls $cca >/dev/null 2>&1 && { t="--tls --tlsAllowInvalidHostnames --tlsAllowInvalidCertificates --tlsCAFile $cca"; break; }; done; pw=$(kubectl -n mongodb get secret admin-user-password -o jsonpath="{.data.password}" 2>/dev/null | base64 -d 2>/dev/null); pw=${pw:-admin123password}; n=$(P=""; for _pi in $(seq 1 30); do P=$(kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet $t "mongodb://{{params.admin_username}}:$pw@localhost:27017/admin?directConnection=true" --eval '\''rs.hello().primary'\'' 2>/dev/null | cut -d. -f1); [ -n "$P" ] && break; sleep 2; done; P=${P:-mongodb-replica-0}; kubectl -n mongodb exec "$P" -- mongosh --quiet $t "mongodb://{{params.admin_username}}:$pw@localhost:27017/admin" --eval '\''db.getSiblingDB("{{params.app_database}}").{{params.reports_collection}}.countDocuments({})'\'' 2>/dev/null | tr -dc 0-9); [ "${n:-0}" -ge 3 ] && echo ok | grep -c ok'
        timeout_sec: 30
    apply:
      - command: |
          /bin/sh -c 'pw=$(kubectl -n mongodb get secret admin-user-password -o jsonpath="{.data.password}" 2>/dev/null | base64 -d 2>/dev/null); pw=${pw:-admin123password}; P=""; for _pi in $(seq 1 30); do P=$(kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet "mongodb://{{params.admin_username}}:$pw@localhost:27017/admin?directConnection=true" --eval '\''rs.hello().primary'\'' 2>/dev/null | cut -d. -f1); [ -n "$P" ] && break; sleep 2; done; P=${P:-mongodb-replica-0}; kubectl -n mongodb exec "$P" -- mongosh --quiet "mongodb://{{params.admin_username}}:$pw@localhost:27017/admin" --eval '\''var c=db.getSiblingDB("{{params.app_database}}").{{params.reports_collection}}; var need=3-c.countDocuments({}); var docs=[]; for(var i=0;i<need;i++){docs.push({seed:"fixture",ts:new Date()});} if(docs.length>0){c.insertMany(docs,{writeConcern:{w:1}});}'\'''
        sleep: 2
    verify:
      - command: |
          /bin/sh -c 't=""; for cca in /etc/tls/ca.crt /etc/mongo-ca/ca.crt; do kubectl -n mongodb exec mongodb-replica-0 -- ls $cca >/dev/null 2>&1 && { t="--tls --tlsAllowInvalidHostnames --tlsAllowInvalidCertificates --tlsCAFile $cca"; break; }; done; pw=$(kubectl -n mongodb get secret admin-user-password -o jsonpath="{.data.password}" 2>/dev/null | base64 -d 2>/dev/null); pw=${pw:-admin123password}; n=$(P=""; for _pi in $(seq 1 30); do P=$(kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet $t "mongodb://{{params.admin_username}}:$pw@localhost:27017/admin?directConnection=true" --eval '\''rs.hello().primary'\'' 2>/dev/null | cut -d. -f1); [ -n "$P" ] && break; sleep 2; done; P=${P:-mongodb-replica-0}; kubectl -n mongodb exec "$P" -- mongosh --quiet $t "mongodb://{{params.admin_username}}:$pw@localhost:27017/admin" --eval '\''db.getSiblingDB("{{params.app_database}}").{{params.reports_collection}}.countDocuments({})'\'' 2>/dev/null | tr -dc 0-9); [ "${n:-0}" -ge 3 ]'
        timeout_sec: 30

  # Additive credential fixture (composition safety): standalone the build above
  # creates the readonly-user + its secret. Chained on an INHERITED cluster that
  # build is skipped, so the oracle (which authenticates as readonly-user to read
  # the reports collection) fails. Ensure the secret + readonly-user additively
  # when missing, as the LIVE admin on the current primary. Never drops/alters
  # existing users; standalone the probe finds it present and skips.
  - name: readonly_user_fixture
    on_probe_fail: skip
    probe:
      - command: |
          /bin/sh -c 't=""; for cca in /etc/tls/ca.crt /etc/mongo-ca/ca.crt; do kubectl -n mongodb exec mongodb-replica-0 -- ls $cca >/dev/null 2>&1 && { t="--tls --tlsAllowInvalidHostnames --tlsAllowInvalidCertificates --tlsCAFile $cca"; break; }; done; kubectl -n mongodb get secret {{params.readonly_secret_name}} >/dev/null 2>&1 || exit 1; pw=$(kubectl -n mongodb get secret {{params.admin_secret_name}} -o jsonpath="{.data.password}" 2>/dev/null | base64 -d 2>/dev/null); pw=${pw:-admin123password}; P=""; for _pi in $(seq 1 30); do P=$(kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet $t "mongodb://{{params.admin_username}}:$pw@localhost:27017/admin?directConnection=true" --eval '\''rs.hello().primary'\'' 2>/dev/null | cut -d. -f1); [ -n "$P" ] && break; sleep 2; done; P=${P:-mongodb-replica-0}; kubectl -n mongodb exec "$P" -- mongosh --quiet $t "mongodb://{{params.admin_username}}:$pw@localhost:27017/admin" --eval '\''db.getSiblingDB("admin").getUser("{{params.readonly_username}}")?quit(0):quit(1)'\'' >/dev/null 2>&1'
        timeout_sec: 30
    apply:
      - command: "kubectl -n mongodb apply -f cases/mongodb/user-management/resource/secrets.yaml"
        sleep: 1
      - command: |
          /bin/sh -c 'pw=$(kubectl -n mongodb get secret {{params.admin_secret_name}} -o jsonpath="{.data.password}" 2>/dev/null | base64 -d 2>/dev/null); pw=${pw:-admin123password}; P=""; for _pi in $(seq 1 30); do P=$(kubectl -n mongodb exec mongodb-replica-0 -- mongosh --quiet "mongodb://{{params.admin_username}}:$pw@localhost:27017/admin?directConnection=true" --eval '\''rs.hello().primary'\'' 2>/dev/null | cut -d. -f1); [ -n "$P" ] && break; sleep 2; done; P=${P:-mongodb-replica-0}; kubectl -n mongodb exec "$P" -- mongosh --quiet "mongodb://{{params.admin_username}}:$pw@localhost:27017/admin" --eval '\''if(!db.getSiblingDB("admin").getUser("{{params.readonly_username}}")){db.getSiblingDB("admin").createUser({user:"{{params.readonly_username}}",pwd:"readonly123password",roles:[{role:"read",db:"{{params.app_database}}"}]});}'\'' 2>&1 || true'
        sleep: 2
    verify:
      - command: |
          /bin/sh -c 'kubectl -n mongodb get secret {{params.readonly_secret_name}} >/dev/null 2>&1; true'
        timeout_sec: 30

oracle:
  verify:
    commands:
      - command: "python3 cases/mongodb/user-management/oracle/oracle.py"
        timeout_sec: 180
