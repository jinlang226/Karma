# mongodb/certificate-rotation
# MongoDB certificate-rotation task

params:
  cluster_prefix:
    default: mongo-rs
    description: StatefulSet name / cert CN of the replica set members.
  replica_set_name:
    default: rs0
    description: MongoDB replica set _id used when initiating the set.
  openssl_pod_name:
    default: openssl-toolbox
    description: Helper pod used to generate TLS certificates.
  tls_ca_secret_name:
    default: mongodb-tls-ca
    description: Secret holding the CA certificate and key.
  tls_cert_secret_name:
    default: mongodb-tls-cert
    description: Secret holding the server certificate bundle.
  old_tls_configmap_name:
    default: mongodb-tls-old
    description: ConfigMap recording fingerprints of the pre-rotation certs.
  old_cert_valid_days:
    default: 2
    description: Validity in days of the nearly-expired server certificate.

prompt: |
  MongoDB is already running with TLS. Its current server certificates are nearing
  expiry. Rotate the server certificates without downtime, keep the existing CA
  trust unchanged, and ensure the new server certificates are valid for about one year.

  Notes:
  - The CA cert and key are stored in the secret {{params.tls_ca_secret_name}}.
  - The current server cert is stored in {{params.tls_cert_secret_name}}.
  - The {{params.openssl_pod_name}} pod is available to generate new certificates.

namespace_contract:
  required_roles: []

metrics:
  - time_to_first_mutation

preconditionUnits:
  - name: mongo_env_ready
    on_probe_fail: skip
    probe:
      # AUTHORITATIVE skip-if-running probe (P32): succeed when the canonical
      # StatefulSet exists OR any pod is Running, so the destructive namespace
      # rebuild below is skipped on an inherited cluster even if its pods are
      # momentarily not Running (mid-restart from a prior stage) -- the
      # StatefulSet persists across that window. The bare `grep -c Running`
      # could miss such a cluster and clobber inherited state.
      - command: "/bin/sh -c 'kubectl -n mongodb get statefulset {{params.cluster_prefix}} >/dev/null 2>&1 || kubectl -n mongodb get pods 2>/dev/null | grep -q Running'"
        timeout_sec: 10
    apply:
      - command: |
          /bin/sh -c '
          kubectl delete namespace mongodb --ignore-not-found=true; kubectl wait --for=delete namespace/mongodb --timeout=120s || true
          '
        sleep: 2
      - command: "kubectl create namespace mongodb"
        sleep: 1
      - command: "kubectl -n mongodb apply -f cases/mongodb/certificate-rotation/resource/services.yaml"
        sleep: 2
      - command: "/bin/sh -c 'kubectl -n mongodb get pod openssl-toolbox >/dev/null 2>&1 || kubectl -n mongodb apply -f cases/mongodb/certificate-rotation/resource/openssl-toolbox.yaml'"
        sleep: 2
      - command: "kubectl -n mongodb wait --for=condition=ready pod {{params.openssl_pod_name}} --timeout=300s"
        sleep: 2
      - command: |
          set -e
          TMP_DIR=$(mktemp -d)
          kubectl -n mongodb exec {{params.openssl_pod_name}} -- /bin/sh -c '
          set -e
          mkdir -p /tmp/certs
          cat > /tmp/certs/openssl.cnf <<EOF
          distinguished_name=req_distinguished_name
          req_extensions=v3_req
          prompt=no
          [req_distinguished_name]
          CN={{params.cluster_prefix}}
          [v3_req]
          keyUsage=critical,digitalSignature,keyEncipherment
          extendedKeyUsage=serverAuth,clientAuth
          subjectAltName=@alt_names
          [alt_names]
          DNS.1=localhost
          DNS.2=mongo
          DNS.3=mongo.mongodb
          DNS.4=mongo.mongodb.svc
          DNS.5=mongo.mongodb.svc.cluster.local
          DNS.6=mongo-rs-0.mongo.mongodb.svc.cluster.local
          DNS.7=mongo-rs-1.mongo.mongodb.svc.cluster.local
          DNS.8=mongo-rs-2.mongo.mongodb.svc.cluster.local
          EOF
          openssl genrsa -out /tmp/certs/ca.key 2048
          openssl req -x509 -new -nodes -key /tmp/certs/ca.key -sha256 -days 3650 -subj "/CN=mongo-ca" -out /tmp/certs/ca.crt
          openssl genrsa -out /tmp/certs/server.key 2048
          openssl req -new -key /tmp/certs/server.key -out /tmp/certs/server.csr -config /tmp/certs/openssl.cnf
          openssl x509 -req -in /tmp/certs/server.csr -CA /tmp/certs/ca.crt -CAkey /tmp/certs/ca.key -CAcreateserial -out /tmp/certs/server.crt -days {{params.old_cert_valid_days}} -extensions v3_req -extfile /tmp/certs/openssl.cnf
          cat /tmp/certs/server.crt /tmp/certs/server.key > /tmp/certs/server.pem
          '
          kubectl -n mongodb cp {{params.openssl_pod_name}}:/tmp/certs "${TMP_DIR}/certs"
          kubectl -n mongodb create secret generic {{params.tls_ca_secret_name}} \
            --from-file=ca.crt="${TMP_DIR}/certs/ca.crt" \
            --from-file=ca.key="${TMP_DIR}/certs/ca.key" \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n mongodb create secret generic {{params.tls_cert_secret_name}} \
            --from-file=server.pem="${TMP_DIR}/certs/server.pem" \
            --dry-run=client -o yaml | kubectl apply -f -
          SERVER_FP=$(openssl x509 -noout -fingerprint -sha256 -in "${TMP_DIR}/certs/server.crt" | cut -d= -f2)
          CA_FP=$(openssl x509 -noout -fingerprint -sha256 -in "${TMP_DIR}/certs/ca.crt" | cut -d= -f2)
          kubectl -n mongodb create configmap {{params.old_tls_configmap_name}} \
            --from-literal=server_fingerprint_sha256="${SERVER_FP}" \
            --from-literal=ca_fingerprint_sha256="${CA_FP}" \
            --dry-run=client -o yaml | kubectl apply -f -
        sleep: 2
      - command: "kubectl -n mongodb apply -f cases/mongodb/certificate-rotation/resource/statefulset.yaml"
        sleep: 5
      - command: |
          for i in $(seq 1 60); do
            ready=$(kubectl -n mongodb get sts {{params.cluster_prefix}} -o jsonpath='{.status.readyReplicas}' 2>/dev/null)
            if [ "${ready:-0}" -ge 3 ]; then
              exit 0
            fi
            sleep 5
          done
          exit 1
        sleep: 2
      # Pod-Ready != mongod accepting TLS connections (§1.10): ping-until-ok first.
      - command: |
          for i in $(seq 1 30); do
            kubectl -n mongodb exec mongo-rs-0 -- mongosh --quiet \
              "mongodb://mongo-rs-0.mongo.mongodb.svc.cluster.local:27017/?directConnection=true" \
              --tls --tlsCAFile /etc/mongo-ca/ca.crt \
              --eval 'db.runCommand({ping:1}).ok' 2>/dev/null | grep -q 1 && exit 0
            sleep 3
          done
          exit 1
        sleep: 2
      - command: |
          kubectl -n mongodb exec mongo-rs-0 -- mongosh --quiet \
          "mongodb://mongo-rs-0.mongo.mongodb.svc.cluster.local:27017/?directConnection=true" \
          --tls --tlsCAFile /etc/mongo-ca/ca.crt \
          --eval '
          rs.initiate({_id:"{{params.replica_set_name}}",members:[
            {_id:0,host:"mongo-rs-0.mongo.mongodb.svc.cluster.local:27017"},
            {_id:1,host:"mongo-rs-1.mongo.mongodb.svc.cluster.local:27017"},
            {_id:2,host:"mongo-rs-2.mongo.mongodb.svc.cluster.local:27017"}
          ]})'
        sleep: 5
      - command: |
          for i in $(seq 1 20); do
            kubectl -n mongodb exec mongo-rs-0 -- mongosh --quiet \
              "mongodb://mongo-rs-0.mongo.mongodb.svc.cluster.local:27017/?directConnection=true" \
              --tls --tlsCAFile /etc/mongo-ca/ca.crt \
              --eval 'db.hello().isWritablePrimary' | grep true && exit 0
            sleep 3
          done
          exit 1
        sleep: 2
    verify:
      - command: "kubectl -n mongodb get pods 2>/dev/null | grep -c Running"
        timeout_sec: 10

  # Self-contained TLS layer (composition safety): the prompt assumes mongod is
  # ALREADY running with TLS, its CA+key in {{params.tls_ca_secret_name}}, its server
  # cert in {{params.tls_cert_secret_name}}, and the openssl pod present. Standalone,
  # mongo_env_ready (above) builds all of that on its destructive fresh-build path.
  # Chained on an INHERITED cluster (e.g. after tls-setup, which leaves TLS under a
  # DIFFERENT layout: certs at /etc/tls under agent-named secrets), that path is
  # SKIPPED -> cert-rotation's own CA/cert/secrets and its /etc/mongo-cert + /etc/mongo-ca
  # mongod TLS config are absent, so the baseline capture and oracle fail. This unit
  # establishes cert-rotation's OWN TLS layer additively, gated on its server-cert
  # secret: it generates a self-signed CA + server cert, stores them in the expected
  # secrets + records the pre-rotation fingerprints, then re-applies the StatefulSet so
  # mongod serves THIS cert (requireTLS, CA at /etc/mongo-ca). It NEVER deletes the
  # namespace or the data PVCs -- the StatefulSet name and volumeClaimTemplate match the
  # inherited cluster, so kubectl apply patches it in place (rolling restart, data
  # preserved). Standalone the secret already exists so the probe matches and this unit
  # skips -> byte-identical standalone behaviour.
  - name: mongo_tls_self_contained
    on_probe_fail: skip
    probe:
      - command: "kubectl -n mongodb get secret {{params.tls_cert_secret_name}}"
        timeout_sec: 10
    apply:
      - command: "kubectl -n mongodb apply -f cases/mongodb/certificate-rotation/resource/services.yaml"
        sleep: 2
      - command: "/bin/sh -c 'kubectl -n mongodb get pod openssl-toolbox >/dev/null 2>&1 || kubectl -n mongodb apply -f cases/mongodb/certificate-rotation/resource/openssl-toolbox.yaml'"
        sleep: 2
      - command: "kubectl -n mongodb wait --for=condition=ready pod {{params.openssl_pod_name}} --timeout=300s"
        sleep: 2
      - command: |
          set -e
          TMP_DIR=$(mktemp -d)
          kubectl -n mongodb exec {{params.openssl_pod_name}} -- /bin/sh -c '
          set -e
          mkdir -p /tmp/certs
          cat > /tmp/certs/openssl.cnf <<EOF
          distinguished_name=req_distinguished_name
          req_extensions=v3_req
          prompt=no
          [req_distinguished_name]
          CN={{params.cluster_prefix}}
          [v3_req]
          keyUsage=critical,digitalSignature,keyEncipherment
          extendedKeyUsage=serverAuth,clientAuth
          subjectAltName=@alt_names
          [alt_names]
          DNS.1=localhost
          DNS.2=mongo
          DNS.3=mongo.mongodb
          DNS.4=mongo.mongodb.svc
          DNS.5=mongo.mongodb.svc.cluster.local
          DNS.6=mongo-rs-0.mongo.mongodb.svc.cluster.local
          DNS.7=mongo-rs-1.mongo.mongodb.svc.cluster.local
          DNS.8=mongo-rs-2.mongo.mongodb.svc.cluster.local
          EOF
          openssl genrsa -out /tmp/certs/ca.key 2048
          openssl req -x509 -new -nodes -key /tmp/certs/ca.key -sha256 -days 3650 -subj "/CN=mongo-ca" -out /tmp/certs/ca.crt
          openssl genrsa -out /tmp/certs/server.key 2048
          openssl req -new -key /tmp/certs/server.key -out /tmp/certs/server.csr -config /tmp/certs/openssl.cnf
          openssl x509 -req -in /tmp/certs/server.csr -CA /tmp/certs/ca.crt -CAkey /tmp/certs/ca.key -CAcreateserial -out /tmp/certs/server.crt -days {{params.old_cert_valid_days}} -extensions v3_req -extfile /tmp/certs/openssl.cnf
          cat /tmp/certs/server.crt /tmp/certs/server.key > /tmp/certs/server.pem
          '
          kubectl -n mongodb cp {{params.openssl_pod_name}}:/tmp/certs "${TMP_DIR}/certs"
          kubectl -n mongodb create secret generic {{params.tls_ca_secret_name}} \
            --from-file=ca.crt="${TMP_DIR}/certs/ca.crt" \
            --from-file=ca.key="${TMP_DIR}/certs/ca.key" \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n mongodb create secret generic {{params.tls_cert_secret_name}} \
            --from-file=server.pem="${TMP_DIR}/certs/server.pem" \
            --dry-run=client -o yaml | kubectl apply -f -
          SERVER_FP=$(openssl x509 -noout -fingerprint -sha256 -in "${TMP_DIR}/certs/server.crt" | cut -d= -f2)
          CA_FP=$(openssl x509 -noout -fingerprint -sha256 -in "${TMP_DIR}/certs/ca.crt" | cut -d= -f2)
          kubectl -n mongodb create configmap {{params.old_tls_configmap_name}} \
            --from-literal=server_fingerprint_sha256="${SERVER_FP}" \
            --from-literal=ca_fingerprint_sha256="${CA_FP}" \
            --dry-run=client -o yaml | kubectl apply -f -
        sleep: 2
      # P16: this re-applies the FULL TLS statefulset onto a possibly-inherited
      # STS (this unit is gated on the TLS cert secret, NOT a namespace recreate),
      # so an inherited STS whose immutable fields a prior stage mutated fails
      # `updates to statefulset spec ... are forbidden` and aborts the precondition.
      # Orphan-delete first (preserving live pods + data PVCs) then re-apply, so
      # the TLS-enabled spec is established cleanly regardless of the inherited
      # shape. Standalone the STS was just built by mongo_env_ready with the same
      # base spec, so the orphan-delete + re-apply is a clean no-op rebuild.
      - command: "kubectl -n mongodb delete statefulset {{params.cluster_prefix}} --cascade=orphan --ignore-not-found=true"
        sleep: 2
      - command: "kubectl -n mongodb apply -f cases/mongodb/certificate-rotation/resource/statefulset.yaml"
        sleep: 5
      - command: |
          kubectl -n mongodb rollout status sts {{params.cluster_prefix}} --timeout=300s || true
          for i in $(seq 1 60); do
            ready=$(kubectl -n mongodb get sts {{params.cluster_prefix}} -o jsonpath='{.status.readyReplicas}' 2>/dev/null)
            if [ "${ready:-0}" -ge 3 ]; then
              exit 0
            fi
            sleep 5
          done
          exit 1
        sleep: 2
    verify:
      - command: |
          /bin/sh -c 'kubectl -n mongodb get secret {{params.tls_cert_secret_name}} >/dev/null 2>&1; true'
        timeout_sec: 10

  # Additive baseline capture (composition safety): the oracle proves rotation by
  # comparing the rotated server cert against the PRE-rotation fingerprints stored
  # in configmap {{params.old_tls_configmap_name}}. The unit above only writes that
  # configmap on the destructive fresh-build path, which is SKIPPED when this case
  # runs chained on an inherited (already-running) cluster -> the baseline is never
  # captured and the oracle fails "configmap {{params.old_tls_configmap_name}} not found".
  # This unit gates on the CONFIGMAP ITSELF (not "pods Running"), so it runs whenever
  # the baseline is missing regardless of how the cluster came to exist, and captures
  # the CURRENT LIVE server/CA cert fingerprints (read from the same secrets the oracle
  # later compares) into the configmap get-or-create. It runs in the precondition, i.e.
  # BEFORE the agent rotates, so it records the genuine pre-rotation certs. It NEVER
  # rotates/replaces the live cert, drops the configmap, or touches the namespace/cluster.
  # Standalone the configmap already exists (written above) so the probe matches and this
  # unit skips -> identical behaviour. Idempotent: writes only when the configmap is absent.
  - name: mongo_tls_baseline_capture
    on_probe_fail: skip
    probe:
      - command: "kubectl -n mongodb get configmap {{params.old_tls_configmap_name}}"
        timeout_sec: 10
    apply:
      - command: |
          set -e
          TMP_DIR=$(mktemp -d)
          kubectl -n mongodb get secret {{params.tls_cert_secret_name}} -o jsonpath='{.data.server\.pem}' | base64 -d > "${TMP_DIR}/server.pem"
          kubectl -n mongodb get secret {{params.tls_ca_secret_name}} -o jsonpath='{.data.ca\.crt}' | base64 -d > "${TMP_DIR}/ca.crt"
          SERVER_FP=$(kubectl -n mongodb exec -i {{params.openssl_pod_name}} -- openssl x509 -noout -fingerprint -sha256 < "${TMP_DIR}/server.pem" | cut -d= -f2)
          CA_FP=$(kubectl -n mongodb exec -i {{params.openssl_pod_name}} -- openssl x509 -noout -fingerprint -sha256 < "${TMP_DIR}/ca.crt" | cut -d= -f2)
          kubectl -n mongodb create configmap {{params.old_tls_configmap_name}} \
            --from-literal=server_fingerprint_sha256="${SERVER_FP}" \
            --from-literal=ca_fingerprint_sha256="${CA_FP}" \
            --dry-run=client -o yaml | kubectl apply -f -
        sleep: 2
    verify:
      - command: "kubectl -n mongodb get configmap {{params.old_tls_configmap_name}} -o jsonpath='{.data.server_fingerprint_sha256}'"
        timeout_sec: 10

oracle:
  verify:
    commands:
      # O21/M5: the oracle's added served-cert handshakes (O37: 3 members x
      # bounded s_client reads) plus the TLS + negative plain probes no longer
      # fit a 60s budget; size it for the bounded worst case.
      - command: "python3 cases/mongodb/certificate-rotation/oracle/oracle.py"
        timeout_sec: 240
