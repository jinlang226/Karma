apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo-arb
  labels:
    app: mongo-arb
spec:
  serviceName: mongo-arb
  replicas: 1
  selector:
    matchLabels:
      app: mongo-arb
  template:
    metadata:
      labels:
        app: mongo-arb
    spec:
      containers:
      - name: mongod
        image: mongo:6.0
        ports:
        - containerPort: 27017
          name: mongo
        command:
        - mongod
        - --replSet
        - rs0
        - --bind_ip_all
        volumeMounts:
        - name: datadir
          mountPath: /data/db
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 250m
            memory: 512Mi
      volumes:
      - name: datadir
        emptyDir: {}
