apiVersion: v1
kind: Service
metadata:
  name: mongo
  labels:
    app: mongo-rs
spec:
  clusterIP: None
  ports:
  - name: mongo
    port: 27017
    targetPort: 27017
  selector:
    app: mongo-rs
---
apiVersion: v1
kind: Service
metadata:
  name: mongo-arb
  labels:
    app: mongo-arb
spec:
  clusterIP: None
  ports:
  - name: mongo
    port: 27017
    targetPort: 27017
  selector:
    app: mongo-arb
