# mongodb/arbiters
# MongoDB operator-add-arbiters task

params:
  data_cluster_prefix:
    default: mongo-rs
    description: StatefulSet name of the data-bearing replica set members.
  replica_set_name:
    default: rs0
    description: MongoDB replica set _id used when initiating the set.
  app_database:
    default: app
    description: Application database that must remain intact.
  app_collection:
    default: test
    description: Application collection seeded with data.

prompt: |
  The MongoDB replica set has two data-bearing members and a running arbiter pod.
  Elections are unstable unless you add a voting member without increasing storage cost.

  Task:
  - Stabilize elections without adding a data-bearing member.
  - Data in the app database must remain intact.

namespace_contract:
  required_roles: []

metrics:
  - time_to_first_mutation

preconditionUnits:
  - name: mongo_env_ready
    on_probe_fail: skip
    probe:
      - command: "kubectl -n mongodb get pod {{params.data_cluster_prefix}}-0 2>/dev/null | grep -c Running"
        timeout_sec: 10
    apply:
      - command: |
          /bin/sh -c '
          kubectl delete namespace mongodb --ignore-not-found=true; kubectl wait --for=delete namespace/mongodb --timeout=120s || true
          '
        sleep: 2
      - command: "kubectl create namespace mongodb"
        sleep: 1
      - command: "kubectl -n mongodb apply -f cases/mongodb/arbiters/resource/services.yaml"
        sleep: 2
      - command: "kubectl -n mongodb apply -f cases/mongodb/arbiters/resource/statefulset-data.yaml"
        sleep: 5
      - command: "kubectl -n mongodb apply -f cases/mongodb/arbiters/resource/statefulset-arbiter.yaml"
        sleep: 5
      - command: |
          for i in $(seq 1 60); do
            ready=$(kubectl -n mongodb get sts {{params.data_cluster_prefix}} -o jsonpath='{.status.readyReplicas}' 2>/dev/null)
            if [ "${ready:-0}" -ge 2 ]; then
              exit 0
            fi
            sleep 5
          done
          exit 1
        sleep: 5
      - command: "kubectl -n mongodb wait --for=condition=ready pod -l app=mongo-arb --timeout=300s"
        sleep: 5
      - command: |
          kubectl -n mongodb exec mongo-rs-0 -- mongosh --quiet --eval '
          rs.initiate({_id:"{{params.replica_set_name}}",members:[
            {_id:0,host:"mongo-rs-0.mongo.mongodb.svc.cluster.local:27017"},
            {_id:1,host:"mongo-rs-1.mongo.mongodb.svc.cluster.local:27017"}
          ]})'
        sleep: 5
      - command: |
          for i in $(seq 1 20); do
            kubectl -n mongodb exec mongo-rs-0 -- mongosh --quiet --eval 'db.hello().isWritablePrimary' | grep true && exit 0
            sleep 3
          done
          exit 1
        sleep: 2
      - command: "kubectl -n mongodb exec mongo-rs-0 -- mongosh --quiet --eval 'db.getSiblingDB(\"{{params.app_database}}\").{{params.app_collection}}.insertMany([{x:1},{x:2},{x:3}], {writeConcern:{w:1}}); db.getSiblingDB(\"{{params.app_database}}\").{{params.app_collection}}.countDocuments({});'"
        sleep: 2
    verify:
      - command: "kubectl -n mongodb get pods 2>/dev/null | grep -c Running"
        timeout_sec: 10

oracle:
  verify:
    commands:
      - command: "python3 cases/mongodb/arbiters/oracle/oracle.py"
        timeout_sec: 60
