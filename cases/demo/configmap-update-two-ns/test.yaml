# demo/configmap-update-two-ns
#
# Verifies that the agent can locate and patch a ConfigMap value in two
# distinct namespaces in a single task. The precondition seeds demo-config
# in both namespaces if absent. The oracle checks that source and target
# namespaces are distinct and that each ConfigMap carries the expected value.

prompt: |
  Update ConfigMap `demo-config` in both assigned namespaces.

  Requirements:
  - In the source namespace, set `data.value` to `{{params.source_value}}`.
  - In the target namespace, set `data.value` to `{{params.target_value}}`.
  - Do not create or delete the ConfigMap; only patch its value.

  Cluster context:
    Source namespace: ${BENCH_NS_SOURCE}
    Target namespace: ${BENCH_NS_TARGET}
    kubectl -n ${BENCH_NS_SOURCE} get configmap demo-config -o yaml
    kubectl -n ${BENCH_NS_TARGET} get configmap demo-config -o yaml

params:
  source_value:
    default: left
  target_value:
    default: right

namespace_contract:
  required_roles:
    - source
    - target

preconditionUnits:
  - name: configmap_ready
    # Skip if demo-config exists in both namespaces; apply seeds from resource/config.yaml.
    on_probe_fail: skip
    probe:
      - command: "kubectl -n ${BENCH_NS_SOURCE} get configmap demo-config"
        timeout_sec: 20
      - command: "kubectl -n ${BENCH_NS_TARGET} get configmap demo-config"
        timeout_sec: 20
    apply:
      - command: "kubectl -n ${BENCH_NS_SOURCE} apply -f cases/demo/configmap-update-two-ns/resource/config.yaml"
        timeout_sec: 20
      - command: "kubectl -n ${BENCH_NS_TARGET} apply -f cases/demo/configmap-update-two-ns/resource/config.yaml"
        timeout_sec: 20
    verify:
      - command: "kubectl -n ${BENCH_NS_SOURCE} get configmap demo-config"
        timeout_sec: 20
      - command: "kubectl -n ${BENCH_NS_TARGET} get configmap demo-config"
        timeout_sec: 20

oracle:
  verify:
    commands:
      - command: "python3 cases/demo/configmap-update-two-ns/oracle/oracle.py check-distinct --source-namespace ${BENCH_NS_SOURCE} --target-namespace ${BENCH_NS_TARGET}"
        timeout_sec: 20
      - command: "python3 cases/demo/configmap-update-two-ns/oracle/oracle.py check-value --role source --expected-value {{params.source_value}} --namespace ${BENCH_NS_SOURCE}"
        timeout_sec: 20
      - command: "python3 cases/demo/configmap-update-two-ns/oracle/oracle.py check-value --role target --expected-value {{params.target_value}} --namespace ${BENCH_NS_TARGET}"
        timeout_sec: 20
    retries: 5
    interval_sec: 2
