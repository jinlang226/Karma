apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: demo-app-alt
  namespace: demo
  labels:
    benchmark.decoy: "true"
    benchmark.case: class_only_upgrade
spec:
  ingressClassName: ingress-1
  rules:
  - host: class-alt.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: demo-app
            port:
              number: 80
