# Decoy Ingress. Lives in its OWN namespace (class-decoy) so the
# decoy_integrity metric — which keys on the decoy's namespace — can score
# mutations (Trap paragraph, guideline §X). It carries class ingress-1 to bait
# the agent toward the WRONG controller; its backend Service intentionally does
# not exist in class-decoy (a decoy is bait, not a serving path — controller #1
# just reports a missing backend for it).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: demo-app-alt
  namespace: class-decoy
  labels:
    benchmark.decoy: "true"
    benchmark.case: class_only_upgrade
spec:
  ingressClassName: ingress-1
  rules:
  - host: class-alt.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: demo-app
            port:
              number: 80
