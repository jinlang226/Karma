# Case-owned cluster-scoped IngressClasses (unique names, grep-verified: no
# other case/adversary/workflow references ingress-1/ingress-2; the shared
# "nginx" IngressClass is never touched — P26/C16). spec.controller is
# immutable, so the precondition deletes these before re-applying.
apiVersion: networking.k8s.io/v1
kind: IngressClass
metadata:
  name: ingress-1
spec:
  controller: k8s.io/ingress-nginx-1
---
apiVersion: networking.k8s.io/v1
kind: IngressClass
metadata:
  name: ingress-2
spec:
  controller: k8s.io/ingress-nginx-2
