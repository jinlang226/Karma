# Case gateway: an ExternalName alias in the case's private app namespace that
# forwards to private controller instance #2 (class-ingress-nginx-2). The
# oracle and the agent's test command curl this Service, so the CORRECT class
# for the demo Ingress is ingress-2 (instance #1 / ingress-1 is the wrong
# choice the decoy nudges toward).
apiVersion: v1
kind: Service
metadata:
  name: ingress-gateway
  namespace: class-demo
spec:
  type: ExternalName
  externalName: ingress-nginx-controller.class-ingress-nginx-2.svc.cluster.local.
  ports:
    - name: http
      port: 80
