# The planted fault: the demo Ingress ships with NO ingressClassName (and no
# legacy kubernetes.io/ingress.class annotation), so neither private controller
# picks it up. The agent must point it at the correct class. Re-planted
# additively by the classless_fault_replanted precondition unit (C8).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: demo-app
  namespace: class-demo
spec:
  rules:
    - host: class.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: demo-app
                port:
                  number: 80
