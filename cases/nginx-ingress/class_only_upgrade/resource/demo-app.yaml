apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  namespace: demo
  labels:
    app: demo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
    spec:
      containers:
      - name: demo-app
        image: busybox:1.36
        command:
          - sh
          - -c
          - |
            mkdir -p /www
            echo hello > /www/index.html
            httpd -f -p 5678 -h /www
        ports:
          - containerPort: 5678
            name: http
---
apiVersion: v1
kind: Service
metadata:
  name: demo-app
  namespace: demo
spec:
  selector:
    app: demo-app
  ports:
    - name: http
      port: 80
      targetPort: 5678
