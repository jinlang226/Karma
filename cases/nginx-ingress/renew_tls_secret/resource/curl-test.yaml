apiVersion: v1
kind: Pod
metadata:
  name: curl-test
  namespace: demo
spec:
  restartPolicy: Never
  containers:
  - name: curl
    image: curlimages/curl:8.5.0
    command:
      - sh
      - -c
      - |
        echo "curl test pod ready"
        echo "Mounted certs:"
        ls -l /tmp/tls || true
        sleep infinity
    volumeMounts:
    - name: test-ca
      mountPath: /tmp/tls
      readOnly: true
  volumes:
  - name: test-ca
    configMap:
      name: test-ca
      items:
      - key: ca.crt
        path: ca.crt