apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rate-api-alt-hard
  namespace: demo
  labels:
    benchmark.decoy: "true"
    benchmark.case: rate_limit_replica_hard
spec:
  ingressClassName: nginx
  rules:
  - host: rate-alt-hard.example.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: rate-echo
            port:
              number: 80
