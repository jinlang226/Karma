apiVersion: v1
kind: Service
metadata:
  name: es-cluster
  namespace: elasticsearch
  labels:
    app: es-cluster
spec:
  clusterIP: None
  selector:
    app: es-cluster
  ports:
    - name: transport
      port: 9300
      targetPort: 9300
---
apiVersion: v1
kind: Service
metadata:
  name: es-http
  namespace: elasticsearch
  labels:
    app: es-cluster
spec:
  selector:
    app: es-cluster
  ports:
    - name: http
      port: 9200
      targetPort: 9200
