apiVersion: v1
kind: Service
metadata:
  name: es-cluster
  labels:
    app: es-cluster
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: es-cluster
  ports:
    - name: transport
      port: 9300
      targetPort: 9300
---
apiVersion: v1
kind: Service
metadata:
  name: es-http
  labels:
    app: es-cluster
spec:
  type: ClusterIP
  selector:
    app: es-cluster
  ports:
    - name: http
      port: 9200
      targetPort: 9200
