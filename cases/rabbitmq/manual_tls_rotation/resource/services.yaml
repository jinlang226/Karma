apiVersion: v1
kind: Service
metadata:
  name: ${BENCH_PARAM_CLUSTER_PREFIX}
  labels:
    app: ${BENCH_PARAM_CLUSTER_PREFIX}
spec:
  ports:
  - port: 5672
    name: amqp
  - port: 5671
    name: amqps
  - port: 15672
    name: management
  selector:
    app: ${BENCH_PARAM_CLUSTER_PREFIX}
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: ${BENCH_PARAM_CLUSTER_PREFIX}-headless
spec:
  clusterIP: None
  selector:
    app: ${BENCH_PARAM_CLUSTER_PREFIX}
  ports:
  - port: 5672
    name: amqp
  - port: 5671
    name: amqps
  - port: 15672
    name: management
