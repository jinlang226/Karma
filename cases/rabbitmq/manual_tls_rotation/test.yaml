# rabbitmq/manual_tls_rotation
#
# A 3-node RabbitMQ cluster runs with TLS enabled and a near-expiry leaf
# certificate. The agent must rotate only the leaf certificate (keeping the
# CA unchanged) so all nodes reconnect with a cert valid for at least
# min_rotated_leaf_validity_days days.

prompt: |
  A 3-node RabbitMQ cluster is running in the ${BENCH_NAMESPACE} namespace
  with TLS enabled. The current leaf certificate expires soon (near-expiry
  baseline). Rotate only the leaf certificate (keep the CA unchanged).

  The new leaf certificate must be valid for at least
  {{params.min_rotated_leaf_validity_days}} days.

  Requirements:
  - Use only native Kubernetes resources. Do not use any CRD, Operator, or
    third-party controller.
  - Keep the CA unchanged.
  - Apply the new leaf certificate to all nodes.

  Goal:
  - All nodes remain in a healthy cluster.
  - TLS connections still succeed.
  - The leaf certificate is rotated and valid for at least
    {{params.min_rotated_leaf_validity_days}} days.

  The CA private key needed to re-sign the leaf under the same CA is available
  in the {{params.cluster_prefix}}-tls-ca secret (key ca.key).

  Cluster context:
    Namespace: ${BENCH_NAMESPACE}
    kubectl -n ${BENCH_NAMESPACE} get pods
    kubectl -n ${BENCH_NAMESPACE} get svc
    kubectl -n ${BENCH_NAMESPACE} logs <pod>
    kubectl -n ${BENCH_NAMESPACE} exec {{params.cluster_prefix}}-0 -- rabbitmqctl cluster_status

params:
  cluster_prefix:
    default: rabbitmq
  baseline_max_leaf_validity_days:
    default: 10
  min_rotated_leaf_validity_days:
    default: 300

namespace_contract:
  required_roles:
    - default

metrics:
  - time_to_first_mutation
  - read_write_ratio
  - blast_radius
  - destructive_ops
  - decoy_integrity
  - residual_drift

preconditionUnits:
  - name: rabbitmq_secrets_ready
    on_probe_fail: skip
    probe:
      - command: "/bin/sh -c 'set -e; kubectl -n ${BENCH_NAMESPACE} get secret {{params.cluster_prefix}}-erlang-cookie >/dev/null; kubectl -n ${BENCH_NAMESPACE} get secret {{params.cluster_prefix}}-admin >/dev/null'"
        timeout_sec: 20
    apply:
      - command: "/bin/sh -c 'kubectl -n ${BENCH_NAMESPACE} create secret generic {{params.cluster_prefix}}-erlang-cookie --from-literal=cookie=supersecretcookie --dry-run=client -o yaml | kubectl apply -f -'"
        sleep: 1
      - command: "/bin/sh -c 'kubectl -n ${BENCH_NAMESPACE} create secret generic {{params.cluster_prefix}}-admin --from-literal=username=admin --from-literal=password=adminpass --dry-run=client -o yaml | kubectl apply -f -'"
        sleep: 1
    verify:
      - command: "/bin/sh -c 'set -e; kubectl -n ${BENCH_NAMESPACE} get secret {{params.cluster_prefix}}-erlang-cookie >/dev/null; kubectl -n ${BENCH_NAMESPACE} get secret {{params.cluster_prefix}}-admin >/dev/null'"
        timeout_sec: 20

  - name: rbac_ready
    on_probe_fail: skip
    probe:
      - command: "kubectl -n ${BENCH_NAMESPACE} get sa {{params.cluster_prefix}}"
        timeout_sec: 10
    apply:
      - command: "envsubst '$BENCH_NAMESPACE $BENCH_NS_SOURCE $BENCH_NS_TARGET $BENCH_PARAM_CLUSTER_PREFIX $BENCH_PARAM_BLUE_CLUSTER_PREFIX $BENCH_PARAM_GREEN_CLUSTER_PREFIX $BENCH_PARAM_FROM_VERSION' < cases/rabbitmq/manual_tls_rotation/resource/rbac.yaml | kubectl -n ${BENCH_NAMESPACE} apply -f -"
        sleep: 1
    verify:
      - command: "kubectl -n ${BENCH_NAMESPACE} get sa {{params.cluster_prefix}}"
        timeout_sec: 10

  - name: config_ready
    on_probe_fail: skip
    probe:
      - command: "kubectl -n ${BENCH_NAMESPACE} get configmap {{params.cluster_prefix}}-config"
        timeout_sec: 10
    apply:
      - command: "envsubst '$BENCH_NAMESPACE $BENCH_NS_SOURCE $BENCH_NS_TARGET $BENCH_PARAM_CLUSTER_PREFIX $BENCH_PARAM_BLUE_CLUSTER_PREFIX $BENCH_PARAM_GREEN_CLUSTER_PREFIX $BENCH_PARAM_FROM_VERSION' < cases/rabbitmq/manual_tls_rotation/resource/configmap.yaml | kubectl -n ${BENCH_NAMESPACE} apply -f -"
        sleep: 1
    verify:
      - command: "kubectl -n ${BENCH_NAMESPACE} get configmap {{params.cluster_prefix}}-config"
        timeout_sec: 10

  - name: services_ready
    on_probe_fail: skip
    probe:
      - command: "/bin/sh -c 'set -e; kubectl -n ${BENCH_NAMESPACE} get svc {{params.cluster_prefix}} >/dev/null; kubectl -n ${BENCH_NAMESPACE} get svc {{params.cluster_prefix}}-headless >/dev/null'"
        timeout_sec: 20
    apply:
      - command: "envsubst '$BENCH_NAMESPACE $BENCH_NS_SOURCE $BENCH_NS_TARGET $BENCH_PARAM_CLUSTER_PREFIX $BENCH_PARAM_BLUE_CLUSTER_PREFIX $BENCH_PARAM_GREEN_CLUSTER_PREFIX $BENCH_PARAM_FROM_VERSION' < cases/rabbitmq/manual_tls_rotation/resource/services.yaml | kubectl -n ${BENCH_NAMESPACE} apply -f -"
        sleep: 1
    verify:
      - command: "/bin/sh -c 'set -e; kubectl -n ${BENCH_NAMESPACE} get svc {{params.cluster_prefix}} >/dev/null; kubectl -n ${BENCH_NAMESPACE} get svc {{params.cluster_prefix}}-headless >/dev/null'"
        timeout_sec: 20

  - name: openssl_toolbox_ready
    on_probe_fail: skip
    probe:
      - command: "kubectl -n ${BENCH_NAMESPACE} wait --for=condition=ready pod -l app=openssl-toolbox --timeout=3s"
        timeout_sec: 10
    apply:
      - command: "envsubst '$BENCH_NAMESPACE $BENCH_NS_SOURCE $BENCH_NS_TARGET $BENCH_PARAM_CLUSTER_PREFIX $BENCH_PARAM_BLUE_CLUSTER_PREFIX $BENCH_PARAM_GREEN_CLUSTER_PREFIX $BENCH_PARAM_FROM_VERSION' < cases/rabbitmq/manual_tls_rotation/resource/openssl-toolbox.yaml | kubectl -n ${BENCH_NAMESPACE} apply -f -"
        sleep: 1
      - command: "kubectl -n ${BENCH_NAMESPACE} wait --for=condition=ready pod -l app=openssl-toolbox --timeout=120s"
        sleep: 1
    verify:
      - command: "kubectl -n ${BENCH_NAMESPACE} wait --for=condition=ready pod -l app=openssl-toolbox --timeout=3s"
        timeout_sec: 10

  - name: tls_material_ready
    on_probe_fail: skip
    probe:
      - command: "python3 cases/rabbitmq/manual_tls_rotation/setup_precondition_check.py --namespace ${BENCH_NAMESPACE} --baseline-max-leaf-validity-days {{params.baseline_max_leaf_validity_days}} --tls-material-only"
        timeout_sec: 60
    apply:
      - command: "kubectl -n ${BENCH_NAMESPACE} exec -i openssl-toolbox -- sh -s {{params.cluster_prefix}} ${BENCH_NAMESPACE} < cases/rabbitmq/manual_tls_rotation/resource/gen-tls-material.sh"
        timeout_sec: 120
        sleep: 1
      - command: "/bin/sh -c 'rm -rf /tmp/rmq-tls-certs; kubectl -n ${BENCH_NAMESPACE} cp openssl-toolbox:/tmp/certs /tmp/rmq-tls-certs'"
        sleep: 1
      - command: "/bin/sh -c 'kubectl -n ${BENCH_NAMESPACE} create secret generic {{params.cluster_prefix}}-tls --from-file=ca.crt=/tmp/rmq-tls-certs/ca.crt --from-file=tls.crt=/tmp/rmq-tls-certs/tls.crt --from-file=tls.key=/tmp/rmq-tls-certs/tls.key --dry-run=client -o yaml | kubectl -n ${BENCH_NAMESPACE} apply -f -'"
        sleep: 1
      # Durably persist the CA private key so the agent can always re-sign the
      # leaf under the SAME CA. gen-tls-material.sh produces ca.key only inside
      # the ephemeral toolbox; without this secret an inherited path (toolbox
      # gone) leaves ca.key unrecoverable and the same-CA rotation un-passable.
      - command: "/bin/sh -c 'kubectl -n ${BENCH_NAMESPACE} create secret generic {{params.cluster_prefix}}-tls-ca --from-file=ca.key=/tmp/rmq-tls-certs/ca.key --dry-run=client -o yaml | kubectl -n ${BENCH_NAMESPACE} apply -f -'"
        sleep: 1
      - command: "/bin/sh -c 'ca_fp=$(openssl x509 -noout -fingerprint -sha256 -in /tmp/rmq-tls-certs/ca.crt | sed \"s/.*=//\"); leaf_fp=$(openssl x509 -noout -fingerprint -sha256 -in /tmp/rmq-tls-certs/tls.crt | sed \"s/.*=//\"); kubectl -n ${BENCH_NAMESPACE} create configmap {{params.cluster_prefix}}-tls-old --from-literal=ca_fingerprint_sha256=\"$ca_fp\" --from-literal=leaf_fingerprint_sha256=\"$leaf_fp\" --dry-run=client -o yaml | kubectl -n ${BENCH_NAMESPACE} apply -f -'"
        sleep: 1
    verify:
      - command: "python3 cases/rabbitmq/manual_tls_rotation/setup_precondition_check.py --namespace ${BENCH_NAMESPACE} --baseline-max-leaf-validity-days {{params.baseline_max_leaf_validity_days}} --tls-material-only"
        timeout_sec: 60

  - name: tls_ca_key_ready
    # Additive net guaranteeing the CA private key is durably available so the
    # agent can re-sign the leaf under the SAME CA the baseline used. Standalone,
    # tls_material_ready's apply already created the {{params.cluster_prefix}}-tls-ca
    # secret, so the probe below skips. On an INHERITED re-entry tls_material_ready
    # is skipped; if a prior stage's openssl-toolbox still holds /tmp/certs/ca.key
    # we recover it into the durable secret here. RabbitMQ uses emptyDir storage,
    # so this NEVER restarts a pod or re-bootstraps broker state -- it only writes
    # a Secret. If ca.key is genuinely unrecoverable (toolbox gone AND secret
    # absent) the apply can only no-op; that is an acceptable residual.
    on_probe_fail: skip
    probe:
      - command: "kubectl -n ${BENCH_NAMESPACE} get secret {{params.cluster_prefix}}-tls-ca"
        timeout_sec: 10
    apply:
      - command: "/bin/sh -c 'if kubectl -n ${BENCH_NAMESPACE} get pod openssl-toolbox >/dev/null 2>&1 && kubectl -n ${BENCH_NAMESPACE} exec openssl-toolbox -- test -f /tmp/certs/ca.key 2>/dev/null; then rm -rf /tmp/rmq-tls-ca; kubectl -n ${BENCH_NAMESPACE} cp openssl-toolbox:/tmp/certs/ca.key /tmp/rmq-tls-ca/ca.key && kubectl -n ${BENCH_NAMESPACE} create secret generic {{params.cluster_prefix}}-tls-ca --from-file=ca.key=/tmp/rmq-tls-ca/ca.key --dry-run=client -o yaml | kubectl -n ${BENCH_NAMESPACE} apply -f -; else echo \"ca.key not recoverable (toolbox gone); leaving durable secret as-is\"; fi'"
        timeout_sec: 60
        sleep: 1
    verify:
      - command: "/bin/sh -c true"
        timeout_sec: 5

  - name: rabbitmq_statefulset_present
    on_probe_fail: skip
    probe:
      - command: "kubectl -n ${BENCH_NAMESPACE} get sts {{params.cluster_prefix}}"
        timeout_sec: 20
    apply:
      - command: "envsubst '$BENCH_NAMESPACE $BENCH_NS_SOURCE $BENCH_NS_TARGET $BENCH_PARAM_CLUSTER_PREFIX $BENCH_PARAM_BLUE_CLUSTER_PREFIX $BENCH_PARAM_GREEN_CLUSTER_PREFIX $BENCH_PARAM_FROM_VERSION' < cases/rabbitmq/manual_tls_rotation/resource/statefulset.yaml | kubectl -n ${BENCH_NAMESPACE} apply -f -"
        sleep: 1
    verify:
      - command: "kubectl -n ${BENCH_NAMESPACE} get sts {{params.cluster_prefix}}"
        timeout_sec: 20

  - name: rabbitmq_cluster_ready
    on_probe_fail: skip
    probe:
      - command: "/bin/sh -c 'set -e; [ \"$(kubectl -n ${BENCH_NAMESPACE} get sts {{params.cluster_prefix}} -o jsonpath=\"{.status.readyReplicas}\")\" = \"3\" ]'"
        timeout_sec: 20
    apply:
      - command: "kubectl -n ${BENCH_NAMESPACE} rollout status statefulset/{{params.cluster_prefix}} --timeout=600s"
        sleep: 1
    verify:
      - command: "/bin/sh -c 'set -e; [ \"$(kubectl -n ${BENCH_NAMESPACE} get sts {{params.cluster_prefix}} -o jsonpath=\"{.status.readyReplicas}\")\" = \"3\" ]'"
        timeout_sec: 20

  - name: tls_rotation_baseline_ready
    on_probe_fail: error
    probe:
      - command: "python3 cases/rabbitmq/manual_tls_rotation/setup_precondition_check.py --namespace ${BENCH_NAMESPACE} --min-ready 3 --baseline-max-leaf-validity-days {{params.baseline_max_leaf_validity_days}}"
        timeout_sec: 40
    apply:
      - command: "/bin/sh -c true"
        timeout_sec: 5
    verify:
      - command: "python3 cases/rabbitmq/manual_tls_rotation/setup_precondition_check.py --namespace ${BENCH_NAMESPACE} --min-ready 3 --baseline-max-leaf-validity-days {{params.baseline_max_leaf_validity_days}}"
        timeout_sec: 40

oracle:
  verify:
    before_commands:
      - command: "envsubst '$BENCH_NAMESPACE $BENCH_NS_SOURCE $BENCH_NS_TARGET $BENCH_PARAM_CLUSTER_PREFIX $BENCH_PARAM_BLUE_CLUSTER_PREFIX $BENCH_PARAM_GREEN_CLUSTER_PREFIX $BENCH_PARAM_FROM_VERSION' < cases/rabbitmq/common/oracle-client.yaml | kubectl -n ${BENCH_NAMESPACE} apply -f -"
        timeout_sec: 30
      - command: "kubectl -n ${BENCH_NAMESPACE} wait --for=condition=ready pod/oracle-client --timeout=60s"
        timeout_sec: 70
    after_commands:
      - command: "kubectl -n ${BENCH_NAMESPACE} delete -f cases/rabbitmq/common/oracle-client.yaml --ignore-not-found=true"
        timeout_sec: 30
    after_failure_mode: warn
    commands:
      - command: "python3 cases/rabbitmq/manual_tls_rotation/oracle/oracle.py --min-rotated-leaf-validity-days {{params.min_rotated_leaf_validity_days}}"
        timeout_sec: 200
