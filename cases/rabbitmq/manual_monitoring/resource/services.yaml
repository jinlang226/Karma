apiVersion: v1
kind: Service
metadata:
  name: ${BENCH_PARAM_CLUSTER_PREFIX}-headless
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: ${BENCH_PARAM_CLUSTER_PREFIX}
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
    - name: metrics
      port: 15692
      targetPort: 15692
---
apiVersion: v1
kind: Service
metadata:
  name: ${BENCH_PARAM_CLUSTER_PREFIX}
spec:
  selector:
    app: ${BENCH_PARAM_CLUSTER_PREFIX}
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
    - name: metrics
      port: 15692
      targetPort: 15692
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  labels:
    app: prometheus
spec:
  selector:
    app: prometheus
  ports:
    - name: http
      port: 8000
      targetPort: 9090
