apiVersion: batch/v1
kind: Job
metadata:
  name: ${BENCH_PARAM_CLUSTER_PREFIX}-setup
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: setup
          image: curlimages/curl:8.6.0
          env:
            - name: RABBITMQ_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: ${BENCH_PARAM_CLUSTER_PREFIX}-admin
                  key: username
            - name: RABBITMQ_ADMIN_PASS
              valueFrom:
                secretKeyRef:
                  name: ${BENCH_PARAM_CLUSTER_PREFIX}-admin
                  key: password
            - name: RABBITMQ_APP_USER
              valueFrom:
                secretKeyRef:
                  name: ${BENCH_PARAM_CLUSTER_PREFIX}-app
                  key: username
            - name: RABBITMQ_APP_PASS
              valueFrom:
                secretKeyRef:
                  name: ${BENCH_PARAM_CLUSTER_PREFIX}-app
                  key: password
          command:
            - /bin/sh
            - -c
            - |
              set -e
              base="http://${BENCH_PARAM_CLUSTER_PREFIX}:15672/api"
              auth="${RABBITMQ_ADMIN_USER}:${RABBITMQ_ADMIN_PASS}"
              curl -s -u "$auth" -XPUT "$base/vhosts/%2Fapp" >/dev/null
              curl -s -u "$auth" -H "content-type: application/json" \
                -XPUT "$base/users/${RABBITMQ_APP_USER}" \
                -d '{"password":"'"${RABBITMQ_APP_PASS}"'","tags":""}' >/dev/null
              curl -s -u "$auth" -H "content-type: application/json" \
                -XPUT "$base/permissions/%2Fapp/${RABBITMQ_APP_USER}" \
                -d '{"configure":".*","write":".*","read":".*"}' >/dev/null
              # C-typereconcile: app-queue must be a CLASSIC queue for this case's
              # ha-all policy baseline. A prior workflow stage (e.g. an upgrade to
              # RabbitMQ 4.x, where classic mirroring is removed and the default
              # queue type may be quorum) can leave app-queue as quorum. Queue type
              # is IMMUTABLE, so a plain PUT cannot reconcile it -- delete a
              # wrong-typed queue first, then recreate with an EXPLICIT classic type.
              qtype=$(curl -s -u "$auth" "$base/queues/%2Fapp/app-queue" 2>/dev/null | grep -o '"type":"[a-z]*"' | head -1 | cut -d'"' -f4)
              if [ -n "$qtype" ] && [ "$qtype" != "classic" ]; then
                curl -s -u "$auth" -XDELETE "$base/queues/%2Fapp/app-queue" >/dev/null
              fi
              curl -s -u "$auth" -H "content-type: application/json" \
                -XPUT "$base/queues/%2Fapp/app-queue" \
                -d '{"durable":true,"auto_delete":false,"arguments":{"x-queue-type":"classic"}}' >/dev/null
