apiVersion: v1
kind: ServiceAccount
metadata:
  name: ${BENCH_PARAM_CLUSTER_PREFIX}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: rabbitmq-peer-discovery
rules:
  - apiGroups: [""]
    resources: ["endpoints", "pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rabbitmq-peer-discovery
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: rabbitmq-peer-discovery
subjects:
  - kind: ServiceAccount
    name: ${BENCH_PARAM_CLUSTER_PREFIX}
