# rabbitmq/manual_user_permission
#
# A 3-node RabbitMQ cluster has two vhosts (/app and /ops) with mis-configured
# permissions: app-user's configure on /app is broken, ops-user has no access
# to its own vhost /ops, and ops-user has been wrongly granted full permissions
# on /app. app-client and ops-client deployments are crashing as a result.
# The agent must converge each user to least-privilege on its own vhost only,
# so both clients come up healthy and cross-vhost access is removed.

prompt: |
  A 3-node RabbitMQ cluster is running in the ${BENCH_NAMESPACE} namespace.
  Two vhosts (/app and /ops) exist, but their user permissions are
  mis-configured. The configure permission for app-user on /app and the
  permissions for ops-user on /ops are broken, so the app-client and
  ops-client deployments cannot connect and are crashing. The permission
  grants are also not correctly scoped: a user may currently hold access on
  a vhost it should have nothing to do with.

  Fix the RabbitMQ user permissions so both client deployments become
  healthy AND each user is scoped to only its own vhost. Use only native
  Kubernetes resources or RabbitMQ CLI/API. Do not use any CRD, Operator,
  or third-party controller.

  Required end state:
  - app-user has full configure/write/read permissions on /app, and NO
    permissions on /ops.
  - ops-user has full configure/write/read permissions on /ops, and NO
    permissions on /app.
  - app-client and ops-client deployments are running and healthy.
  - The cluster remains healthy with 3 nodes.

  Inspect the current per-vhost permissions (commands below) before fixing,
  and remove any grant that violates the required end state.

  Cluster context:
    Namespace: ${BENCH_NAMESPACE}
    kubectl -n ${BENCH_NAMESPACE} get pods
    kubectl -n ${BENCH_NAMESPACE} get svc
    kubectl -n ${BENCH_NAMESPACE} exec {{params.cluster_prefix}}-0 -- rabbitmqctl list_users
    kubectl -n ${BENCH_NAMESPACE} exec {{params.cluster_prefix}}-0 -- rabbitmqctl list_permissions -p /app
    kubectl -n ${BENCH_NAMESPACE} exec {{params.cluster_prefix}}-0 -- rabbitmqctl list_permissions -p /ops

params:
  cluster_prefix:
    default: rabbitmq

namespace_contract:
  required_roles:
    - default

metrics:
  - time_to_first_mutation
  - read_write_ratio
  - blast_radius
  - destructive_ops
  - decoy_integrity
  - residual_drift

preconditionUnits:
  - name: rabbitmq_secrets_ready
    on_probe_fail: skip
    probe:
      - command: "/bin/sh -c 'set -e; kubectl -n ${BENCH_NAMESPACE} get secret {{params.cluster_prefix}}-erlang-cookie >/dev/null; kubectl -n ${BENCH_NAMESPACE} get secret {{params.cluster_prefix}}-admin >/dev/null; kubectl -n ${BENCH_NAMESPACE} get secret {{params.cluster_prefix}}-app >/dev/null; kubectl -n ${BENCH_NAMESPACE} get secret {{params.cluster_prefix}}-ops >/dev/null'"
        timeout_sec: 20
    apply:
      - command: "/bin/sh -c 'kubectl -n ${BENCH_NAMESPACE} create secret generic {{params.cluster_prefix}}-erlang-cookie --from-literal=cookie=supersecretcookie --dry-run=client -o yaml | kubectl apply -f -'"
        sleep: 1
      - command: "/bin/sh -c 'kubectl -n ${BENCH_NAMESPACE} create secret generic {{params.cluster_prefix}}-admin --from-literal=username=admin --from-literal=password=adminpass --dry-run=client -o yaml | kubectl apply -f -'"
        sleep: 1
      - command: "/bin/sh -c 'kubectl -n ${BENCH_NAMESPACE} create secret generic {{params.cluster_prefix}}-app --from-literal=username=app-user --from-literal=password=apppass --dry-run=client -o yaml | kubectl apply -f -'"
        sleep: 1
      - command: "/bin/sh -c 'kubectl -n ${BENCH_NAMESPACE} create secret generic {{params.cluster_prefix}}-ops --from-literal=username=ops-user --from-literal=password=opspass --dry-run=client -o yaml | kubectl apply -f -'"
        sleep: 1
    verify:
      - command: "/bin/sh -c 'set -e; kubectl -n ${BENCH_NAMESPACE} get secret {{params.cluster_prefix}}-erlang-cookie >/dev/null; kubectl -n ${BENCH_NAMESPACE} get secret {{params.cluster_prefix}}-admin >/dev/null; kubectl -n ${BENCH_NAMESPACE} get secret {{params.cluster_prefix}}-app >/dev/null; kubectl -n ${BENCH_NAMESPACE} get secret {{params.cluster_prefix}}-ops >/dev/null'"
        timeout_sec: 20

  - name: rbac_ready
    on_probe_fail: skip
    probe:
      - command: "kubectl -n ${BENCH_NAMESPACE} get sa {{params.cluster_prefix}}"
        timeout_sec: 10
    apply:
      - command: "envsubst '$BENCH_NAMESPACE $BENCH_NS_SOURCE $BENCH_NS_TARGET $BENCH_PARAM_CLUSTER_PREFIX $BENCH_PARAM_BLUE_CLUSTER_PREFIX $BENCH_PARAM_GREEN_CLUSTER_PREFIX $BENCH_PARAM_FROM_VERSION' < cases/rabbitmq/manual_user_permission/resource/rbac.yaml | kubectl -n ${BENCH_NAMESPACE} apply -f -"
        sleep: 1
    verify:
      - command: "kubectl -n ${BENCH_NAMESPACE} get sa {{params.cluster_prefix}}"
        timeout_sec: 10

  - name: config_ready
    on_probe_fail: skip
    probe:
      - command: "kubectl -n ${BENCH_NAMESPACE} get configmap {{params.cluster_prefix}}-config"
        timeout_sec: 10
    apply:
      - command: "envsubst '$BENCH_NAMESPACE $BENCH_NS_SOURCE $BENCH_NS_TARGET $BENCH_PARAM_CLUSTER_PREFIX $BENCH_PARAM_BLUE_CLUSTER_PREFIX $BENCH_PARAM_GREEN_CLUSTER_PREFIX $BENCH_PARAM_FROM_VERSION' < cases/rabbitmq/manual_user_permission/resource/configmap.yaml | kubectl -n ${BENCH_NAMESPACE} apply -f -"
        sleep: 1
    verify:
      - command: "kubectl -n ${BENCH_NAMESPACE} get configmap {{params.cluster_prefix}}-config"
        timeout_sec: 10

  - name: services_ready
    on_probe_fail: skip
    probe:
      - command: "/bin/sh -c 'set -e; kubectl -n ${BENCH_NAMESPACE} get svc {{params.cluster_prefix}} >/dev/null; kubectl -n ${BENCH_NAMESPACE} get svc {{params.cluster_prefix}}-headless >/dev/null'"
        timeout_sec: 20
    apply:
      - command: "envsubst '$BENCH_NAMESPACE $BENCH_NS_SOURCE $BENCH_NS_TARGET $BENCH_PARAM_CLUSTER_PREFIX $BENCH_PARAM_BLUE_CLUSTER_PREFIX $BENCH_PARAM_GREEN_CLUSTER_PREFIX $BENCH_PARAM_FROM_VERSION' < cases/rabbitmq/manual_user_permission/resource/services.yaml | kubectl -n ${BENCH_NAMESPACE} apply -f -"
        sleep: 1
    verify:
      - command: "/bin/sh -c 'set -e; kubectl -n ${BENCH_NAMESPACE} get svc {{params.cluster_prefix}} >/dev/null; kubectl -n ${BENCH_NAMESPACE} get svc {{params.cluster_prefix}}-headless >/dev/null'"
        timeout_sec: 20

  - name: rabbitmq_statefulset_present
    on_probe_fail: skip
    probe:
      - command: "kubectl -n ${BENCH_NAMESPACE} get sts {{params.cluster_prefix}}"
        timeout_sec: 20
    apply:
      - command: "envsubst '$BENCH_NAMESPACE $BENCH_NS_SOURCE $BENCH_NS_TARGET $BENCH_PARAM_CLUSTER_PREFIX $BENCH_PARAM_BLUE_CLUSTER_PREFIX $BENCH_PARAM_GREEN_CLUSTER_PREFIX $BENCH_PARAM_FROM_VERSION' < cases/rabbitmq/manual_user_permission/resource/statefulset.yaml | kubectl -n ${BENCH_NAMESPACE} apply -f -"
        sleep: 1
    verify:
      - command: "kubectl -n ${BENCH_NAMESPACE} get sts {{params.cluster_prefix}}"
        timeout_sec: 20

  - name: rabbitmq_cluster_ready
    on_probe_fail: skip
    probe:
      - command: "/bin/sh -c 'set -e; [ \"$(kubectl -n ${BENCH_NAMESPACE} get sts {{params.cluster_prefix}} -o jsonpath=\"{.status.readyReplicas}\")\" = \"3\" ]'"
        timeout_sec: 20
    apply:
      - command: "kubectl -n ${BENCH_NAMESPACE} rollout status statefulset/{{params.cluster_prefix}} --timeout=600s"
        sleep: 1
    verify:
      - command: "/bin/sh -c 'set -e; [ \"$(kubectl -n ${BENCH_NAMESPACE} get sts {{params.cluster_prefix}} -o jsonpath=\"{.status.readyReplicas}\")\" = \"3\" ]'"
        timeout_sec: 20

  - name: setup_job_completed
    on_probe_fail: skip
    probe:
      - command: "python3 cases/rabbitmq/manual_user_permission/setup_precondition_check.py --namespace ${BENCH_NAMESPACE} --bootstrap-only"
        timeout_sec: 30
    apply:
      - command: "kubectl -n ${BENCH_NAMESPACE} delete job {{params.cluster_prefix}}-setup --ignore-not-found=true"
        sleep: 1
      - command: "envsubst '$BENCH_NAMESPACE $BENCH_NS_SOURCE $BENCH_NS_TARGET $BENCH_PARAM_CLUSTER_PREFIX $BENCH_PARAM_BLUE_CLUSTER_PREFIX $BENCH_PARAM_GREEN_CLUSTER_PREFIX $BENCH_PARAM_FROM_VERSION' < cases/rabbitmq/manual_user_permission/resource/setup-job.yaml | kubectl -n ${BENCH_NAMESPACE} apply -f -"
        sleep: 1
      - command: "kubectl -n ${BENCH_NAMESPACE} wait --for=condition=complete job/{{params.cluster_prefix}}-setup --timeout=300s"
        sleep: 1
    verify:
      - command: "python3 cases/rabbitmq/manual_user_permission/setup_precondition_check.py --namespace ${BENCH_NAMESPACE} --bootstrap-only"
        timeout_sec: 30

  - name: app_client_deployed
    on_probe_fail: skip
    probe:
      - command: "kubectl -n ${BENCH_NAMESPACE} get deploy app-client"
        timeout_sec: 10
    apply:
      - command: "envsubst '$BENCH_NAMESPACE $BENCH_NS_SOURCE $BENCH_NS_TARGET $BENCH_PARAM_CLUSTER_PREFIX $BENCH_PARAM_BLUE_CLUSTER_PREFIX $BENCH_PARAM_GREEN_CLUSTER_PREFIX $BENCH_PARAM_FROM_VERSION' < cases/rabbitmq/manual_user_permission/resource/app-client.yaml | kubectl -n ${BENCH_NAMESPACE} apply -f -"
        sleep: 2
    verify:
      - command: "kubectl -n ${BENCH_NAMESPACE} get deploy app-client"
        timeout_sec: 10

  - name: ops_client_deployed
    on_probe_fail: skip
    probe:
      - command: "kubectl -n ${BENCH_NAMESPACE} get deploy ops-client"
        timeout_sec: 10
    apply:
      - command: "envsubst '$BENCH_NAMESPACE $BENCH_NS_SOURCE $BENCH_NS_TARGET $BENCH_PARAM_CLUSTER_PREFIX $BENCH_PARAM_BLUE_CLUSTER_PREFIX $BENCH_PARAM_GREEN_CLUSTER_PREFIX $BENCH_PARAM_FROM_VERSION' < cases/rabbitmq/manual_user_permission/resource/ops-client.yaml | kubectl -n ${BENCH_NAMESPACE} apply -f -"
        sleep: 2
    verify:
      - command: "kubectl -n ${BENCH_NAMESPACE} get deploy ops-client"
        timeout_sec: 10

  - name: curl_test_ready
    on_probe_fail: skip
    probe:
      - command: "kubectl -n ${BENCH_NAMESPACE} wait --for=condition=ready pod -l app=curl-test --timeout=3s"
        timeout_sec: 10
    apply:
      - command: "envsubst '$BENCH_NAMESPACE $BENCH_NS_SOURCE $BENCH_NS_TARGET $BENCH_PARAM_CLUSTER_PREFIX $BENCH_PARAM_BLUE_CLUSTER_PREFIX $BENCH_PARAM_GREEN_CLUSTER_PREFIX $BENCH_PARAM_FROM_VERSION' < cases/rabbitmq/manual_user_permission/resource/curl-test.yaml | kubectl -n ${BENCH_NAMESPACE} apply -f -"
        sleep: 1
      - command: "kubectl -n ${BENCH_NAMESPACE} wait --for=condition=ready pod -l app=curl-test --timeout=300s"
        sleep: 1
    verify:
      - command: "kubectl -n ${BENCH_NAMESPACE} wait --for=condition=ready pod -l app=curl-test --timeout=3s"
        timeout_sec: 10

  - name: user_permission_baseline_ready
    on_probe_fail: error
    probe:
      - command: "python3 cases/rabbitmq/manual_user_permission/setup_precondition_check.py --namespace ${BENCH_NAMESPACE} --min-ready 3"
        timeout_sec: 40
    apply:
      - command: "/bin/sh -c true"
        timeout_sec: 5
    verify:
      - command: "python3 cases/rabbitmq/manual_user_permission/setup_precondition_check.py --namespace ${BENCH_NAMESPACE} --min-ready 3"
        timeout_sec: 40

oracle:
  verify:
    before_commands:
      - command: "envsubst '$BENCH_NAMESPACE $BENCH_NS_SOURCE $BENCH_NS_TARGET $BENCH_PARAM_CLUSTER_PREFIX $BENCH_PARAM_BLUE_CLUSTER_PREFIX $BENCH_PARAM_GREEN_CLUSTER_PREFIX $BENCH_PARAM_FROM_VERSION' < cases/rabbitmq/common/oracle-client.yaml | kubectl -n ${BENCH_NAMESPACE} apply -f -"
        timeout_sec: 30
      - command: "kubectl -n ${BENCH_NAMESPACE} wait --for=condition=ready pod/oracle-client --timeout=60s"
        timeout_sec: 70
    after_commands:
      - command: "kubectl -n ${BENCH_NAMESPACE} delete -f cases/rabbitmq/common/oracle-client.yaml --ignore-not-found=true"
        timeout_sec: 30
    after_failure_mode: warn
    commands:
      - command: "python3 cases/rabbitmq/manual_user_permission/oracle/oracle.py"
        timeout_sec: 120
