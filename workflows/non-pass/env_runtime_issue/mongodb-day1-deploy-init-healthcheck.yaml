# workflows/suite/mongodb-day1-deploy-init-healthcheck
#
# MongoDB day-1 bring-up: deploy, fix init, and verify health

metadata:
  id: mongodb-day1-deploy-init-healthcheck
  label: 'MongoDB day-1 bring-up: deploy, fix init, and verify health'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: deploy
    retries: 0
  - id: stage_02
    service: mongodb
    case: initialize
    retries: 0
  - id: stage_03
    service: mongodb
    case: health-check-recovery
    retries: 0
