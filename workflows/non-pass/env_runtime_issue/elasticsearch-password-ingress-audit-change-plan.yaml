# workflows/error-prone/elasticsearch-password-ingress-audit-change-plan
#
# Elasticsearch — rotate password + ingress, audit then write upgrade plan

metadata:
  id: elasticsearch-password-ingress-audit-change-plan
  label: Elasticsearch — rotate password + ingress, audit then write upgrade plan
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
  - id: stage_02
    service: elasticsearch
    case: rotate-elastic-password
    retries: 0
  - id: stage_03
    service: elasticsearch
    case: secure-http-ingress
    retries: 0
  - id: stage_04
    service: elasticsearch
    case: readonly-audit
    retries: 0
  - id: stage_05
    service: elasticsearch
    case: change-plan-only
    retries: 0
