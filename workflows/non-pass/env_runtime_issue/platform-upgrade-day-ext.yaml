# workflows/long/platform-long-upgrade-day
#
# Platform — coordinated upgrade day across the data tier

metadata:
  id: platform-upgrade-day-ext
  label: Platform — coordinated upgrade day across the data tier
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: deploy
    retries: 0
  - id: stage_02
    service: cockroachdb
    case: initialize
    retries: 0
  - id: stage_03
    service: cockroachdb
    case: partitioned-update
    retries: 0
  - id: stage_04
    service: cockroachdb
    case: major-upgrade-finalize
    retries: 0
  - id: stage_05
    service: mongodb
    case: deploy
    retries: 0
  - id: stage_06
    service: mongodb
    case: initialize
    retries: 0
  - id: stage_07
    service: mongodb
    case: version-upgrade
    retries: 0
  - id: stage_08
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
