    retries: 0
  - id: stage_04
    service: mongodb
    case: tls-setup
    retries: 0
  - id: stage_05
    service: cockroachdb
    case: deploy
    retries: 0
  - id: stage_06
    service: cockroachdb
    case: initialize
    retries: 0
  - id: stage_07
    service: cockroachdb
    case: generate-cert
    retries: 0
  - id: stage_08
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
  - id: stage_09
    service: elasticsearch
    case: file-realm-user-roles-merge
    retries: 0
