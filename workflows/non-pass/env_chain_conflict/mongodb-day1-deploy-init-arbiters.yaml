# workflows/suite/mongodb-day1-deploy-init-arbiters
#
# MongoDB day-1 bring-up: deploy, initialize, and add arbiters

metadata:
  id: mongodb-day1-deploy-init-arbiters
  label: 'MongoDB day-1 bring-up: deploy, initialize, and add arbiters'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: deploy
    retries: 0
  - id: stage_02
    service: mongodb
    case: initialize
    retries: 0
  - id: stage_03
    service: mongodb
    case: arbiters
    retries: 0
