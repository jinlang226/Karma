# workflows/rabbitmq-blue-green-migration-single
#
# Single-stage blue-green migration of a RabbitMQ cluster (source -> target).
#
# Ported from the legacy workflow schema (apiVersion/kind/namespace_binding)
# to the current schema; converted and validated against this branch.

metadata:
  id: rabbitmq-blue-green-migration-single
spec:
  prompt_mode: concat_blind
  stages:
  - id: stage_1_migrate_source_to_target
    service: rabbitmq-experiments
    case: blue_green_migration
    namespaces:
    - cluster_source
    - cluster_target
    retries: 2
    param_overrides:
      blue_cluster_prefix: rabbitmq
      green_cluster_prefix: rabbitmq
