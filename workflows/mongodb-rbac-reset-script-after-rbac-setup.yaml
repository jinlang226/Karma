apiVersion: benchmark/v1alpha1
kind: Workflow
metadata:
  name: mongodb-rbac-reset-script-after-rbac-drift-setup
spec:
  prompt_mode: concat_blind
  namespaces:
    - cluster_a
  stages:
    - id: stage_1_setup_rbac_drift_app
      service: mongodb
      case: setup-rbac-drift-app
      namespaces:
        - cluster_a
      namespace_binding:
        default: cluster_a
      max_attempts: 3

    - id: stage_2_setup_rbac_drift_reporting
      service: mongodb
      case: setup-rbac-drift-reporting
      namespaces:
        - cluster_a
      namespace_binding:
        default: cluster_a
      max_attempts: 3

    - id: stage_3_reset_script_only
      service: mongodb
      case: manual-rbac-reset
      namespaces:
        - cluster_a
      namespace_binding:
        default: cluster_a
      max_attempts: 3
