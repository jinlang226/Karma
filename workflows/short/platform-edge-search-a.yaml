metadata:
  id: platform-edge-search-a
  label: Platform edge-fronted search A
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: create_ingress
    retries: 0
    param_overrides:
      host: search.generated.example.com
  - id: stage_02
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
  - id: stage_03
    service: elasticsearch
    case: secure-http-ingress
    retries: 0
    param_overrides:
      ingress_host: search.generated.example.com
  - id: stage_04
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 0
    param_overrides:
      host: search.generated.example.com
