# workflows/suite/cockroachdb-day1-bringup-adversary
#
# CockroachDB day-1: deploy cluster then initialize — with adversary injection

metadata:
  id: cockroachdb-day1-bringup-adversary
  label: 'CockroachDB day-1: deploy cluster then initialize — with adversary injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: scale_down_node
    inject_at_stage: stage_02
    lift_at_stage: stage_03
  stages:
  - id: stage_01
    service: cockroachdb
    case: deploy
    retries: 0
  - id: stage_02
    service: cockroachdb
    case: initialize
    retries: 0
  - id: stage_03
    service: cockroachdb
    case: version-check
    retries: 0
  - id: stage_04
    service: cockroachdb
    case: cluster-settings
    retries: 0
