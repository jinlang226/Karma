# workflows/suite/platform-search-etl-fault
#
# Platform — search ETL under cluster fault: Spark + Elasticsearch

metadata:
  id: platform-search-etl-fault
  label: 'Platform — search ETL under cluster fault: Spark + Elasticsearch'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: spark
    case: deploy_spark_pi
    retries: 1
  - id: stage_03
    service: spark
    case: spark_data_skew
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: seed-hosts-repair
    retries: 1
