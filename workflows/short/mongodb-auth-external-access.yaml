# workflows/suite/mongodb-auth-external-access
#
# MongoDB auth and external access: custom roles, user management, split-horizon

metadata:
  id: mongodb-auth-external-access
  label: 'MongoDB auth and external access: custom roles, user management, split-horizon'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: custom-roles
    retries: 0
  - id: stage_02
    service: mongodb
    case: user-management
    retries: 0
  - id: stage_03
    service: mongodb
    case: external-access-horizons
    retries: 0
