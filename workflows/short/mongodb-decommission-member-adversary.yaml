# workflows/suite/mongodb-decommission-member-adversary
#
# MongoDB decommission: bring up replica set then safely remove a member — with adversary injection

metadata:
  id: mongodb-decommission-member-adversary
  label: 'MongoDB decommission: bring up replica set then safely remove a member — with adversary injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: scale_down_replica
    inject_at_stage: stage_02
    lift_at_stage: stage_03
  stages:
  - id: stage_01
    service: mongodb
    case: deploy
    retries: 0
  - id: stage_02
    service: mongodb
    case: initialize
    retries: 0
  - id: stage_03
    service: mongodb
    case: decommission
    retries: 0
