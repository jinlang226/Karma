# workflows/suite/nginx-ingress-13-create-tls-otel-ratelimit-adversary
#
# nginx-ingress: expose app, add TLS, enable OTel, then rate limit — with adversary injection

metadata:
  id: nginx-ingress-13-create-tls-otel-ratelimit-adversary
  label: 'nginx-ingress: expose app, add TLS, enable OTel, then rate limit — with adversary injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: strip_rate_limit_annotation
    inject_at_stage: stage_04
    lift_at_stage: stage_04
    param_overrides:
      ingress_name: rate-api
      limit_rps: '2'
  stages:
  - id: stage_01
    service: nginx-ingress
    case: create_ingress
    retries: 1
    param_overrides:
      host: secure.example.com
      path: /api
  - id: stage_02
    service: nginx-ingress
    case: renew_tls_secret
    retries: 1
  - id: stage_03
    service: nginx-ingress
    case: otel_log_format
    retries: 1
  - id: stage_04
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 1
    param_overrides:
      limit_rps: '2'
