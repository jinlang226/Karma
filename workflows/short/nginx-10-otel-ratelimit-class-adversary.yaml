# workflows/suite/nginx-10-otel-ratelimit-class-adversary
#
# nginx-ingress: OTel logging, rate limit, then class-only controller upgrade — with adversary injection

metadata:
  id: nginx-10-otel-ratelimit-class-adversary
  label: 'nginx-ingress: OTel logging, rate limit, then class-only controller upgrade — with adversary
    injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: corrupt_ingress_nginx_configmap
    inject_at_stage: stage_01
    lift_at_stage: stage_02
  stages:
  - id: stage_01
    service: nginx-ingress
    case: otel_log_format
    retries: 1
  - id: stage_02
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 1
    param_overrides:
      limit_rps: '1'
  - id: stage_03
    service: nginx-ingress
    case: class_only_upgrade
    retries: 1
