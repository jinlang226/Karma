# workflows/suite/elasticsearch-incident-network-and-shards
#
# ES: incident response chain — network repair, shard allocation fix, safe downscale

metadata:
  id: elasticsearch-incident-network-and-shards
  label: 'ES: incident response chain — network repair, shard allocation fix, safe downscale'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: seed-hosts-repair
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: internal-http-service-drift
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: safe-downscale-with-shard-migration
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 1
