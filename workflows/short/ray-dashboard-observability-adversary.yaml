# workflows/suite/ray-dashboard-observability-adversary
#
# Ray dashboard observability: expose and verify cluster status endpoint — with adversary injection

metadata:
  id: ray-dashboard-observability-adversary
  label: 'Ray dashboard observability: expose and verify cluster status endpoint — with adversary injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: worker_image_drift
    inject_at_stage: stage_03
    lift_at_stage: stage_04
    param_overrides:
      wrong_image: rayproject/ray:2.8.0
      correct_image: rayproject/ray:2.9.0
  stages:
  - id: stage_01
    service: ray
    case: deploy_cluster
    retries: 1
    param_overrides:
      worker_replicas: '2'
  - id: stage_02
    service: ray
    case: dashboard_exposure
    retries: 1
    param_overrides:
      dashboard_port: '8265'
  - id: stage_03
    service: ray
    case: scale_workers
    retries: 1
    param_overrides:
      source_worker_replicas: '2'
      target_worker_replicas: '3'
  - id: stage_04
    service: ray
    case: dashboard_exposure
    retries: 1
    param_overrides:
      dashboard_port: '8265'
