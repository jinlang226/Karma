metadata:
  id: cockroachdb-deploy-init-settings-audit-concat-stateful
  label: CockroachDB deploy, initialize, settings, and audit (concat_stateful)
spec:
  prompt_mode: concat_stateful
  stages:
  - id: stage_01
    service: cockroachdb
    case: deploy
    retries: 0
  - id: stage_02
    service: cockroachdb
    case: initialize
    retries: 0
  - id: stage_03
    service: cockroachdb
    case: cluster-settings
    retries: 0
  - id: stage_04
    service: cockroachdb
    case: readonly-audit
    retries: 0
