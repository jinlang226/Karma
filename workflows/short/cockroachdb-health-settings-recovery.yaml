metadata:
  id: cockroachdb-health-settings-recovery
  label: CockroachDB health recovery and settings sweep
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: deploy
    retries: 0
  - id: stage_02
    service: cockroachdb
    case: initialize
    retries: 0
  - id: stage_03
    service: cockroachdb
    case: health-check-recovery
    retries: 0
  - id: stage_04
    service: cockroachdb
    case: cluster-settings
    retries: 0
    param_overrides:
      setting_value: 64MiB
  - id: stage_05
    service: cockroachdb
    case: rollback-rehearsal
    retries: 0
