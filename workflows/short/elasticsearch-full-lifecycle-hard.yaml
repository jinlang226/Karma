# workflows/long/elasticsearch-long-full-lifecycle-hard
#
# Elasticsearch full lifecycle hard: bootstrap, security, upgrade hard, monitoring

metadata:
  id: elasticsearch-full-lifecycle-hard
  label: 'Elasticsearch full lifecycle hard: bootstrap, security, upgrade hard, monitoring'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: statefulset-scaled-down
    inject_at_stage: stage_05
    lift_at_stage: stage_07
  stages:
  - id: stage_01
    service: elasticsearch
    case: bootstrap-initial-master-nodes
    retries: 0
  - id: stage_02
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
  - id: stage_03
    service: elasticsearch
    case: rotate-elastic-password
    retries: 0
  - id: stage_04
    service: elasticsearch
    case: rotate-http-certs
    retries: 0
  - id: stage_05
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 0
  - id: stage_06
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 0
  - id: stage_07
    service: elasticsearch
    case: full-restart-upgrade-ha-hard
    retries: 0
  - id: stage_08
    service: elasticsearch
    case: stack-monitoring-sidecars
    retries: 0
