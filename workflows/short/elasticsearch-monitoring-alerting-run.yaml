# workflows/long/elasticsearch-long-monitoring-alerting-run
#
# Elasticsearch monitoring and alerting long run across scale and upgrade events

metadata:
  id: elasticsearch-monitoring-alerting-run
  label: Elasticsearch monitoring and alerting long run across scale and upgrade events
spec:
  prompt_mode: progressive
  adversary:
  - scenario: statefulset-scaled-down
    inject_at_stage: stage_05
    lift_at_stage: stage_07
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
    param_overrides:
      target_image: docker.elastic.co/elasticsearch/elasticsearch:8.10.4
  - id: stage_02
    service: elasticsearch
    case: stack-monitoring-sidecars
    retries: 0
  - id: stage_03
    service: elasticsearch
    case: rotate-elastic-password
    retries: 0
  - id: stage_04
    service: elasticsearch
    case: stack-monitoring-sidecars
    retries: 0
  - id: stage_05
    service: elasticsearch
    case: full-restart-upgrade-ha
    retries: 0
    param_overrides:
      to_version: '8.11.0'
  - id: stage_06
    service: elasticsearch
    case: stack-monitoring-sidecars
    retries: 0
  - id: stage_07
    service: elasticsearch
    case: full-restart-upgrade-ha-hard
    retries: 0
  - id: stage_08
    service: elasticsearch
    case: stack-monitoring-sidecars
    retries: 0
  - id: stage_09
    service: elasticsearch
    case: rotate-http-certs
    retries: 0
  - id: stage_10
    service: elasticsearch
    case: stack-monitoring-sidecars
    retries: 0
