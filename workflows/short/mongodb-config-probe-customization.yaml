# workflows/suite/mongodb-config-probe-customization
#
# MongoDB config tuning, probe optimization, and StatefulSet customization

metadata:
  id: mongodb-config-probe-customization
  label: MongoDB config tuning, probe optimization, and StatefulSet customization
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: mongod-config-update
    retries: 0
    param_overrides:
      target_journal_compressor: zstd
  - id: stage_02
    service: mongodb
    case: readiness-probe-tuning
    retries: 0
  - id: stage_03
    service: mongodb
    case: statefulset-customization
    retries: 0
