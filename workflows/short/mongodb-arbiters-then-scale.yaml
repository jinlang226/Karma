# workflows/suite/mongodb-arbiters-then-scale
#
# MongoDB add arbiters for quorum then scale data-bearing replica members

metadata:
  id: mongodb-arbiters-then-scale
  label: MongoDB add arbiters for quorum then scale data-bearing replica members
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: arbiters
    retries: 0
  - id: stage_02
    service: mongodb
    case: replica-scaling
    retries: 0
    param_overrides:
      target_replicas: 5
