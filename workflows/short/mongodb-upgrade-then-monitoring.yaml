# workflows/suite/mongodb-upgrade-then-monitoring
#
# MongoDB upgrade to 6.0 then enable monitoring integration

metadata:
  id: mongodb-upgrade-then-monitoring
  label: MongoDB upgrade to 6.0 then enable monitoring integration
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: version-upgrade
    retries: 0
  - id: stage_02
    service: mongodb
    case: monitoring-integration
    retries: 0
