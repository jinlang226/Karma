# workflows/suite/nginx-05-ratelimit-sweep-easy
#
# nginx-ingress: progressive rate-limit tightening (5 → 3 → 1 QPS)

metadata:
  id: nginx-05-ratelimit-sweep-easy
  label: 'nginx-ingress: progressive rate-limit tightening (5 → 3 → 1 QPS)'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 1
    param_overrides:
      limit_rps: '5'
  - id: stage_02
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 1
    param_overrides:
      limit_rps: '3'
  - id: stage_03
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 1
    param_overrides:
      limit_rps: '1'
