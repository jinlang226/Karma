# workflows/suite/cockroachdb-upgrade-lifecycle
#
# CockroachDB full upgrade lifecycle: rolling update then major finalize

metadata:
  id: cockroachdb-upgrade-lifecycle
  label: 'CockroachDB full upgrade lifecycle: rolling update then major finalize'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: version-check
    retries: 0
    param_overrides:
      from_version: '23.2'
      to_version: 23.2.3
  - id: stage_02
    service: cockroachdb
    case: partitioned-update
    retries: 0
    param_overrides:
      to_version: 23.2.7
  - id: stage_03
    service: cockroachdb
    case: major-upgrade-finalize
    retries: 0
    param_overrides:
      from_version: '23.2'
      to_version: 24.1.0
  - id: stage_04
    service: cockroachdb
    case: cluster-settings
    retries: 0
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 128MiB
  - id: stage_05
    service: cockroachdb
    case: zone-config
    retries: 0
