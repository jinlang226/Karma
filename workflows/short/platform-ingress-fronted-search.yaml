# workflows/suite/platform-ingress-fronted-search
#
# Platform — expose search behind an ingress: Elasticsearch + NGINX

metadata:
  id: platform-ingress-fronted-search
  label: 'Platform — expose search behind an ingress: Elasticsearch + NGINX'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
  - id: stage_02
    service: elasticsearch
    case: secure-http-ingress
    retries: 0
  - id: stage_03
    service: nginx-ingress
    case: create_ingress
    retries: 0
  - id: stage_04
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 0
