# workflows/suite/nginx-18-canary-tls-class
#
# nginx-ingress: canary split, TLS renewal, then ingress-class upgrade

metadata:
  id: nginx-18-canary-tls-class
  label: 'nginx-ingress: canary split, TLS renewal, then ingress-class upgrade'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: ingress_canary
    retries: 1
  - id: stage_02
    service: nginx-ingress
    case: renew_tls_secret
    retries: 1
  - id: stage_03
    service: nginx-ingress
    case: class_only_upgrade
    retries: 1
