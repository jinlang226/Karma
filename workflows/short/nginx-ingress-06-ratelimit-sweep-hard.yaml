# workflows/suite/nginx-ingress-06-ratelimit-sweep-hard
#
# nginx-ingress: progressive rate-limit tightening on 3-replica controller

metadata:
  id: nginx-ingress-06-ratelimit-sweep-hard
  label: 'nginx-ingress: progressive rate-limit tightening on 3-replica controller'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: rate_limit_replica_hard
    retries: 0
    param_overrides:
      limit_rps: '5'
  - id: stage_02
    service: nginx-ingress
    case: rate_limit_replica_hard
    retries: 0
    param_overrides:
      limit_rps: '2'
  - id: stage_03
    service: nginx-ingress
    case: rate_limit_replica_hard
    retries: 0
    param_overrides:
      limit_rps: '1'
