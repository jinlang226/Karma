# workflows/long/elasticsearch-long-hard-upgrade-transport-monitoring
#
# Elasticsearch hard upgrade, transport CA hardening, and monitoring integration

metadata:
  id: elasticsearch-hard-upgrade-transport-monitoring
  label: Elasticsearch hard upgrade, transport CA hardening, and monitoring integration
spec:
  prompt_mode: progressive
  adversary:
  - scenario: statefulset-scaled-down
    inject_at_stage: stage_02
    lift_at_stage: stage_04
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
    param_overrides:
      target_image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
  - id: stage_02
    service: elasticsearch
    case: full-restart-upgrade-ha-hard
    retries: 0
  - id: stage_03
    service: elasticsearch
    case: stack-monitoring-sidecars
    retries: 0
  - id: stage_04
    service: elasticsearch
    case: seed-hosts-repair
    retries: 0
  - id: stage_05
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 0
  - id: stage_06
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 0
  - id: stage_07
    service: elasticsearch
    case: transform-job-recovery
    retries: 0
