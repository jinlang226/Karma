metadata:
  id: cockroachdb-throttle-rebalance-adversary
  label: CockroachDB rebalance throttle incident
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: deploy
    retries: 0
  - id: stage_02
    service: cockroachdb
    case: initialize
    retries: 0
  - id: stage_03
    service: cockroachdb
    case: cluster-settings
    retries: 0
  - id: stage_04
    service: cockroachdb
    case: zone-config
    retries: 0
  - id: stage_05
    service: cockroachdb
    case: readonly-audit
    retries: 0
  adversary:
  - scenario: throttle_rebalance_rate
    inject_at_stage: stage_03
    lift_at_stage: stage_05
