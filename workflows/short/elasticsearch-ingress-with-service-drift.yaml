# workflows/suite/elasticsearch-ingress-with-service-drift
#
# ES: deploy cluster, expose via secure ingress, then repair service selector drift

metadata:
  id: elasticsearch-ingress-with-service-drift
  label: 'ES: deploy cluster, expose via secure ingress, then repair service selector drift'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
  - id: stage_02
    service: elasticsearch
    case: secure-http-ingress
    retries: 0
  - id: stage_03
    service: elasticsearch
    case: internal-http-service-drift
    retries: 0
  - id: stage_04
    service: elasticsearch
    case: seed-hosts-repair
    retries: 0
