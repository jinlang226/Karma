# workflows/suite/elasticsearch-creds-and-ingress-adversary
#
# ES: deploy, rotate password and HTTP certs, then expose via secure ingress — with adversary injection

metadata:
  id: elasticsearch-creds-and-ingress-adversary
  label: 'ES: deploy, rotate password and HTTP certs, then expose via secure ingress — with adversary
    injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: elastic-password-corrupted
    inject_at_stage: stage_02
    lift_at_stage: stage_04
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
  - id: stage_02
    service: elasticsearch
    case: rotate-elastic-password
    retries: 0
  - id: stage_03
    service: elasticsearch
    case: rotate-http-certs
    retries: 0
  - id: stage_04
    service: elasticsearch
    case: secure-http-ingress
    retries: 0
