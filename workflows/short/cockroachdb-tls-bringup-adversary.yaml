# workflows/suite/cockroachdb-tls-bringup-adversary
#
# CockroachDB TLS bring-up: deploy, initialize, enable TLS — with adversary injection

metadata:
  id: cockroachdb-tls-bringup-adversary
  label: 'CockroachDB TLS bring-up: deploy, initialize, enable TLS — with adversary injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: scale_down_node
    inject_at_stage: stage_02
    lift_at_stage: stage_03
  stages:
  - id: stage_01
    service: cockroachdb
    case: deploy
    retries: 1
  - id: stage_02
    service: cockroachdb
    case: initialize
    retries: 1
  - id: stage_03
    service: cockroachdb
    case: generate-cert
    retries: 1
