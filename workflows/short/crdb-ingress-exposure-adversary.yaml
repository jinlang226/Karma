# workflows/suite/crdb-ingress-exposure-adversary
#
# CockroachDB ingress: expose DB Console HTTPS + SQL TCP — with adversary injection

metadata:
  id: crdb-ingress-exposure-adversary
  label: 'CockroachDB ingress: expose DB Console HTTPS + SQL TCP — with adversary injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: block_sql_port
    inject_at_stage: stage_02
    lift_at_stage: stage_03
  stages:
  - id: stage_01
    service: cockroachdb
    case: expose-ingress
    retries: 1
  - id: stage_02
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 128MiB
  - id: stage_03
    service: cockroachdb
    case: version-check
    retries: 1
