# workflows/suite/platform-store-ingress-ratelimit
#
# Platform — fronted operational store: MongoDB + NGINX ingress + rate limit

metadata:
  id: platform-store-ingress-ratelimit
  label: 'Platform — fronted operational store: MongoDB + NGINX ingress + rate limit'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: deploy
    retries: 1
  - id: stage_02
    service: nginx-ingress
    case: create_ingress
    retries: 1
  - id: stage_03
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 1
  - id: stage_04
    service: nginx-ingress
    case: renew_tls_secret
    retries: 1
