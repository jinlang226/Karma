metadata:
  id: nginx-create-tls-canary-concat-blind
  label: Nginx ingress create, TLS, and canary chain (concat_blind)
spec:
  prompt_mode: concat_blind
  stages:
  - id: stage_01
    service: nginx-ingress
    case: create_ingress
    retries: 0
    param_overrides:
      host: generated-app.example.com
      path: /app
  - id: stage_02
    service: nginx-ingress
    case: renew_tls_secret
    retries: 0
    param_overrides:
      host: generated-app.example.com
  - id: stage_03
    service: nginx-ingress
    case: ingress_canary
    retries: 0
