# workflows/suite/nginx-ingress-13-create-tls-otel-ratelimit
#
# nginx-ingress: expose app, add TLS, enable OTel, then rate limit

metadata:
  id: nginx-ingress-13-create-tls-otel-ratelimit
  label: 'nginx-ingress: expose app, add TLS, enable OTel, then rate limit'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: create_ingress
    retries: 0
    param_overrides:
      host: secure.example.com
      path: /api
  - id: stage_02
    service: nginx-ingress
    case: renew_tls_secret
    retries: 0
  - id: stage_03
    service: nginx-ingress
    case: otel_log_format
    retries: 0
  - id: stage_04
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 0
    param_overrides:
      limit_rps: '2'
