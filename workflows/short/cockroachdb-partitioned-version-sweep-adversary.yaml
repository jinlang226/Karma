# workflows/long/cockroachdb-long-partitioned-version-sweep-adversary
#
# CockroachDB partitioned-update sweep with node scale-down adversary mid-upgrade

metadata:
  id: cockroachdb-partitioned-version-sweep-adversary
  label: CockroachDB partitioned-update sweep with node scale-down adversary mid-upgrade
spec:
  prompt_mode: progressive
  adversary:
  - scenario: scale_down_node
    inject_at_stage: stage_05
    lift_at_stage: stage_06
  stages:
  - id: stage_01
    service: cockroachdb
    case: deploy
    retries: 0
    param_overrides:
      to_version: 23.2.0
  - id: stage_02
    service: cockroachdb
    case: initialize
    retries: 0
  - id: stage_03
    service: cockroachdb
    case: partitioned-update
    retries: 0
    param_overrides:
      to_version: 23.2.3
  - id: stage_04
    service: cockroachdb
    case: version-check
    retries: 0
    param_overrides:
      from_version: '23.2'
      to_version: 23.2.3
      report_key: v23_2_3
  - id: stage_05
    service: cockroachdb
    case: partitioned-update
    retries: 0
    param_overrides:
      to_version: 23.2.7
  - id: stage_06
    service: cockroachdb
    case: version-check
    retries: 0
    param_overrides:
      from_version: '23.2'
      to_version: 23.2.7
      report_key: v23_2_7
  - id: stage_07
    service: cockroachdb
    case: major-upgrade-finalize
    retries: 0
  - id: stage_08
    service: cockroachdb
    case: version-check
    retries: 0
    param_overrides:
      from_version: '23.2'
      to_version: 24.1.0
      report_key: v24_1_0
  - id: stage_09
    service: cockroachdb
    case: cluster-settings
    retries: 0
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 128MiB
  - id: stage_10
    service: cockroachdb
    case: monitoring-integration
    retries: 0
