# workflows/suite/mongodb-incident-response-chain-adversary
#
# MongoDB incident response: health recovery, probe tuning, and StatefulSet fix — with adversary injection

metadata:
  id: mongodb-incident-response-chain-adversary
  label: 'MongoDB incident response: health recovery, probe tuning, and StatefulSet fix — with adversary
    injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: primary_stepdown
    inject_at_stage: stage_01
    lift_at_stage: stage_02
  stages:
  - id: stage_01
    service: mongodb
    case: health-check-recovery
    retries: 0
  - id: stage_02
    service: mongodb
    case: readiness-probe-tuning
    retries: 0
  - id: stage_03
    service: mongodb
    case: statefulset-customization
    retries: 0
