# workflows/suite/mongodb-config-then-monitoring
#
# MongoDB config tuning followed by Prometheus monitoring integration

metadata:
  id: mongodb-config-then-monitoring
  label: MongoDB config tuning followed by Prometheus monitoring integration
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: mongod-config-update
    retries: 0
  - id: stage_02
    service: mongodb
    case: monitoring-integration
    retries: 0
