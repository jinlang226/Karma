# workflows/long/elasticsearch-long-network-incident-recovery
#
# Elasticsearch networking incident and recovery: transport block, seed drift, service drift

metadata:
  id: elasticsearch-network-incident-recovery
  label: 'Elasticsearch networking incident and recovery: transport block, seed drift, service drift'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: es-config-seed-hosts-drift
    inject_at_stage: stage_02
    lift_at_stage: stage_04
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
  - id: stage_02
    service: elasticsearch
    case: seed-hosts-repair
    retries: 0
  - id: stage_03
    service: elasticsearch
    case: seed-hosts-repair
    retries: 0
  - id: stage_04
    service: elasticsearch
    case: secure-http-ingress
    retries: 0
  - id: stage_05
    service: elasticsearch
    case: seed-hosts-repair
    retries: 0