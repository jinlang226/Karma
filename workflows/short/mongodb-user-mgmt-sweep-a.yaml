# workflows/long/mongodb-long-user-mgmt-sweep-a
#
# MongoDB identity & access hardening A: deploy → init → users → custom-roles → password-rotation → TLS → cert-rotate → config → scale → monitor → decomm

metadata:
  id: mongodb-user-mgmt-sweep-a
  label: 'MongoDB identity & access hardening A: deploy → init → users → custom-roles → password-rotation
    → TLS → cert-rotate → config → scale → monitor → decomm'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: deploy
    retries: 0
  - id: stage_02
    service: mongodb
    case: initialize
    retries: 0
  - id: stage_03
    service: mongodb
    case: user-management
    retries: 0
  - id: stage_04
    service: mongodb
    case: custom-roles
    retries: 0
  - id: stage_05
    service: mongodb
    case: password-rotation
    retries: 0
  - id: stage_06
    service: mongodb
    case: tls-setup
    retries: 0
  - id: stage_07
    service: mongodb
    case: certificate-rotation
    retries: 0
  - id: stage_08
    service: mongodb
    case: mongod-config-update
    retries: 0
    param_overrides:
      target_journal_compressor: zlib
  - id: stage_09
    service: mongodb
    case: replica-scaling
    retries: 0
    param_overrides:
      target_replicas: '5'
  - id: stage_10
    service: mongodb
    case: monitoring-integration
    retries: 0
