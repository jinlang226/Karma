metadata:
  id: platform-change-plan-compliance
  label: Platform change-plan compliance sweep
spec:
  prompt_mode: concat_stateful
  stages:
  - id: stage_01
    service: rabbitmq
    case: change-plan-only
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_02
    service: mongodb
    case: change-plan-only
    retries: 0
  - id: stage_03
    service: cockroachdb
    case: change-plan-only
    retries: 0
  - id: stage_04
    service: elasticsearch
    case: change-plan-only
    retries: 0
  - id: stage_05
    service: nginx-ingress
    case: change-plan-only
    retries: 0
  - id: stage_06
    service: ray
    case: change-plan-only
    retries: 0
  - id: stage_07
    service: spark
    case: change-plan-only
    retries: 0
