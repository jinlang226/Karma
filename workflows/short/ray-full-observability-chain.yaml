metadata:
  id: ray-full-observability-chain
  label: Ray full observability and recovery chain
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: ray
    case: deploy_cluster
    retries: 0
    param_overrides:
      worker_replicas: 3
  - id: stage_02
    service: ray
    case: dashboard_exposure
    retries: 0
  - id: stage_03
    service: ray
    case: job_submission
    retries: 0
  - id: stage_04
    service: ray
    case: scale_workers
    retries: 0
    param_overrides:
      target_worker_replicas: 5
  - id: stage_05
    service: ray
    case: worker_recovery
    retries: 0
  - id: stage_06
    service: ray
    case: upgrade_version
    retries: 0
  - id: stage_07
    service: ray
    case: readonly-audit
    retries: 0
