# workflows/suite/mongodb-replica-scaling-sweep-adversary
#
# MongoDB replica scaling sweep: progressively scale from 3 to 4 to 5 to 7 members — with adversary injection

metadata:
  id: mongodb-replica-scaling-sweep-adversary
  label: 'MongoDB replica scaling sweep: progressively scale from 3 to 4 to 5 to 7 members — with adversary
    injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: param_drift
    inject_at_stage: stage_02
    lift_at_stage: stage_03
    param_overrides:
      drift_replicas: '6'
      restore_replicas: '5'
  stages:
  - id: stage_01
    service: mongodb
    case: replica-scaling
    retries: 1
    param_overrides:
      target_replicas: 4
  - id: stage_02
    service: mongodb
    case: replica-scaling
    retries: 1
    param_overrides:
      target_replicas: 5
  - id: stage_03
    service: mongodb
    case: replica-scaling
    retries: 1
    param_overrides:
      target_replicas: 7
