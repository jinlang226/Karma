metadata:
  id: nginx-scale-down-backend-adversary
  label: Nginx ingress backend scale-down recovery
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: create_ingress
    retries: 0
  - id: stage_02
    service: nginx-ingress
    case: ingress_canary
    retries: 0
  - id: stage_03
    service: nginx-ingress
    case: rate_limit_replica_hard
    retries: 0
  - id: stage_04
    service: nginx-ingress
    case: readonly-audit
    retries: 0
  adversary:
  - scenario: scale_down_backend
    inject_at_stage: stage_02
    lift_at_stage: stage_04
