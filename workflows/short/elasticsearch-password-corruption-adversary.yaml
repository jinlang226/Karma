metadata:
  id: elasticsearch-password-corruption-adversary
  label: Elasticsearch corrupted elastic password recovery
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
  - id: stage_02
    service: elasticsearch
    case: rotate-elastic-password
    retries: 0
  - id: stage_03
    service: elasticsearch
    case: file-realm-user-roles-merge
    retries: 0
  - id: stage_04
    service: elasticsearch
    case: readonly-audit
    retries: 0
  adversary:
  - scenario: elastic-password-corrupted
    inject_at_stage: stage_02
    lift_at_stage: stage_04
