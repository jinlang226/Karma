# workflows/suite/platform-ingress-fronted-search-adversary
#
# Platform — expose search behind an ingress: Elasticsearch + NGINX — with adversary injection

metadata:
  id: platform-ingress-fronted-search-adversary
  label: 'Platform — expose search behind an ingress: Elasticsearch + NGINX — with adversary injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: strip_rate_limit_annotation
    inject_at_stage: stage_04
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
  - id: stage_02
    service: elasticsearch
    case: secure-http-ingress
    retries: 0
  - id: stage_03
    service: nginx-ingress
    case: create_ingress
    retries: 0
  - id: stage_04
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 0
