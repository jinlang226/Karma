metadata:
  id: spark-runtime-multitenant-streaming
  label: Spark runtime, multi-tenant, and streaming chain
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: spark
    case: deploy_spark_pi
    retries: 0
  - id: stage_02
    service: spark
    case: spark_runtime_ops
    retries: 0
  - id: stage_03
    service: spark
    case: spark_multi_tenant
    retries: 0
  - id: stage_04
    service: spark
    case: spark_streaming_autoscale
    retries: 0
