# workflows/suite/cockroachdb-monitoring
#
# CockroachDB monitoring integration: Prometheus scraping

metadata:
  id: cockroachdb-monitoring
  label: 'CockroachDB monitoring integration: Prometheus scraping'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: monitoring-integration
    retries: 0
  - id: stage_02
    service: cockroachdb
    case: cluster-settings
    retries: 0
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 128MiB
  - id: stage_03
    service: cockroachdb
    case: version-check
    retries: 0
