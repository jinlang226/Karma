# workflows/suite/elasticsearch-snapshot-secret-recovery-adversary
#
# ES: snapshot repo setup with MinIO secret wipe adversary mid-operation — with adversary injection

metadata:
  id: elasticsearch-snapshot-secret-recovery-adversary
  label: 'ES: snapshot repo setup with MinIO secret wipe adversary mid-operation — with adversary injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: snapshot-secret-wiped
    inject_at_stage: stage_02
    lift_at_stage: stage_03
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: transform-job-recovery
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: safe-downscale-with-shard-migration
    retries: 1
