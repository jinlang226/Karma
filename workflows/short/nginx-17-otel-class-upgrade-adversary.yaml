# workflows/suite/nginx-17-otel-class-upgrade-adversary
#
# nginx-ingress: enable OTel logging then migrate to new ingress class — with adversary injection

metadata:
  id: nginx-17-otel-class-upgrade-adversary
  label: 'nginx-ingress: enable OTel logging then migrate to new ingress class — with adversary injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: corrupt_ingress_nginx_configmap
    inject_at_stage: stage_01
    lift_at_stage: stage_02
  stages:
  - id: stage_01
    service: nginx-ingress
    case: otel_log_format
    retries: 1
  - id: stage_02
    service: nginx-ingress
    case: class_only_upgrade
    retries: 1
