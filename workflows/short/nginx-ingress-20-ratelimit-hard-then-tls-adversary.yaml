# workflows/suite/nginx-ingress-20-ratelimit-hard-then-tls-adversary
#
# nginx-ingress: incident response — hard rate limit then TLS cert renewal — with adversary injection

metadata:
  id: nginx-ingress-20-ratelimit-hard-then-tls-adversary
  label: 'nginx-ingress: incident response — hard rate limit then TLS cert renewal — with adversary injection'
spec:
  prompt_mode: progressive
  adversary:
  # Inject at the TLS stage (which grades echo-server) and target rate-echo
  # (planted by stage_01 rate_limit_replica_hard, persists) so the fault is a
  # benign background disruption that never grades through an oracle (§3.3).
  - scenario: scale_down_backend
    inject_at_stage: stage_02
    lift_at_stage: stage_02
    param_overrides:
      deployment_name: rate-echo
      restore_replicas: '1'
  stages:
  - id: stage_01
    service: nginx-ingress
    case: rate_limit_replica_hard
    retries: 0
    param_overrides:
      limit_rps: '1'
  - id: stage_02
    service: nginx-ingress
    case: renew_tls_secret
    retries: 0
