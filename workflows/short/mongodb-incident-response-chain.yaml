# workflows/suite/mongodb-incident-response-chain
#
# MongoDB incident response: health recovery, probe tuning, and StatefulSet fix

metadata:
  id: mongodb-incident-response-chain
  label: 'MongoDB incident response: health recovery, probe tuning, and StatefulSet fix'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: health-check-recovery
    retries: 1
  - id: stage_02
    service: mongodb
    case: readiness-probe-tuning
    retries: 1
  - id: stage_03
    service: mongodb
    case: statefulset-customization
    retries: 1
