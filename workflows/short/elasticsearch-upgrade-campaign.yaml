# workflows/long/elasticsearch-long-upgrade-campaign
#
# Elasticsearch HA upgrade campaign: rolling and full-restart upgrade sequences

metadata:
  id: elasticsearch-upgrade-campaign
  label: 'Elasticsearch HA upgrade campaign: rolling and full-restart upgrade sequences'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: snapshot-secret-wiped
    inject_at_stage: stage_06
    lift_at_stage: stage_07
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
    param_overrides:
      target_image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
  - id: stage_02
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 0
  - id: stage_03
    service: elasticsearch
    case: rotate-elastic-password
    retries: 0
  - id: stage_04
    service: elasticsearch
    case: rotate-http-certs
    retries: 0
  - id: stage_05
    service: elasticsearch
    case: stack-monitoring-sidecars
    retries: 0
  - id: stage_06
    service: elasticsearch
    case: full-restart-upgrade-ha-hard
    retries: 0
  - id: stage_07
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 0
