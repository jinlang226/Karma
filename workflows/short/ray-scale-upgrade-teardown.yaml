metadata:
  id: ray-scale-upgrade-teardown
  label: Ray scale, upgrade, and teardown chain
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: ray
    case: deploy_cluster
    retries: 0
  - id: stage_02
    service: ray
    case: scale_workers
    retries: 0
    param_overrides:
      target_worker_replicas: 4
  - id: stage_03
    service: ray
    case: upgrade_version
    retries: 0
  - id: stage_04
    service: ray
    case: teardown_cluster
    retries: 0
