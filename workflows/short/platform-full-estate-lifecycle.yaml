# workflows/long/platform-long-full-estate-lifecycle
#
# Platform — full estate lifecycle: deploy, secure, scale, observe, recover

metadata:
  id: platform-full-estate-lifecycle
  label: 'Platform — full estate lifecycle: deploy, secure, scale, observe, recover'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: deploy
    retries: 0
  - id: stage_02
    service: cockroachdb
    case: initialize
    retries: 0
  - id: stage_03
    service: cockroachdb
    case: generate-cert
    retries: 0
  - id: stage_04
    service: mongodb
    case: deploy
    retries: 0
  - id: stage_05
    service: mongodb
    case: initialize
    retries: 0
  - id: stage_06
    service: mongodb
    case: user-management
    retries: 0
  - id: stage_07
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
  - id: stage_08
    service: elasticsearch
    case: file-realm-user-roles-merge
    retries: 0
  - id: stage_09
    service: ray
    case: deploy_cluster
    retries: 0
  - id: stage_10
    service: ray
    case: dashboard_exposure
    retries: 0
