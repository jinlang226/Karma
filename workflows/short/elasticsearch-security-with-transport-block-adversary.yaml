# workflows/suite/elasticsearch-security-with-transport-block-adversary
#
# ES: security hardening with transport NetworkPolicy block adversary — with adversary injection

metadata:
  id: elasticsearch-security-with-transport-block-adversary
  label: 'ES: security hardening with transport NetworkPolicy block adversary — with adversary injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: transport-networkpolicy-block
    inject_at_stage: stage_02
    lift_at_stage: stage_03
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
  - id: stage_02
    service: elasticsearch
    case: transport-additional-ca-trust
    retries: 0
  - id: stage_03
    service: elasticsearch
    case: rotate-http-certs
    retries: 0
  - id: stage_04
    service: elasticsearch
    case: rotate-elastic-password
    retries: 0
  - id: stage_05
    service: elasticsearch
    case: secure-http-ingress
    retries: 0
