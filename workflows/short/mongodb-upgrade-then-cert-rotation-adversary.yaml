# workflows/suite/mongodb-upgrade-then-cert-rotation-adversary
#
# MongoDB upgrade to 6.0 then TLS certificate rotation — with adversary injection

metadata:
  id: mongodb-upgrade-then-cert-rotation-adversary
  label: MongoDB upgrade to 6.0 then TLS certificate rotation — with adversary injection
spec:
  prompt_mode: progressive
  adversary:
  - scenario: configmap_key_delete
    inject_at_stage: stage_02
  stages:
  - id: stage_01
    service: mongodb
    case: version-upgrade
    retries: 1
  - id: stage_02
    service: mongodb
    case: certificate-rotation
    retries: 1
