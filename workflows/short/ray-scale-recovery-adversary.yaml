# workflows/suite/ray-scale-recovery-adversary
#
# Ray worker scale-up with adversarial scale-down interference — with adversary injection

metadata:
  id: ray-scale-recovery-adversary
  label: Ray worker scale-up with adversarial scale-down interference — with adversary injection
spec:
  prompt_mode: progressive
  adversary:
  - scenario: scale_down_workers
    inject_at_stage: stage_02
    lift_at_stage: stage_03
    param_overrides:
      wrong_replicas: '1'
      restore_replicas: '4'
  stages:
  - id: stage_01
    service: ray
    case: deploy_cluster
    retries: 0
    param_overrides:
      worker_replicas: '2'
  - id: stage_02
    service: ray
    case: scale_workers
    retries: 0
    param_overrides:
      source_worker_replicas: '2'
      target_worker_replicas: '4'
  - id: stage_03
    service: ray
    case: scale_workers
    retries: 0
    param_overrides:
      source_worker_replicas: '4'
      target_worker_replicas: '4'
  - id: stage_04
    service: ray
    case: job_submission
    retries: 0
    param_overrides:
      expected_output: pong
