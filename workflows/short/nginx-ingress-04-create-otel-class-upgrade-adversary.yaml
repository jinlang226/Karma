# workflows/suite/nginx-ingress-04-create-otel-class-upgrade-adversary
#
# nginx-ingress: expose app, enable OTel logging, then upgrade ingress class — with adversary injection

metadata:
  id: nginx-ingress-04-create-otel-class-upgrade-adversary
  label: 'nginx-ingress: expose app, enable OTel logging, then upgrade ingress class — with adversary
    injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: corrupt_ingress_nginx_configmap
    inject_at_stage: stage_02
    lift_at_stage: stage_03
  stages:
  - id: stage_01
    service: nginx-ingress
    case: create_ingress
    retries: 0
    param_overrides:
      host: demo.example.com
      path: /api
  - id: stage_02
    service: nginx-ingress
    case: otel_log_format
    retries: 0
  - id: stage_03
    service: nginx-ingress
    case: class_only_upgrade
    retries: 0
