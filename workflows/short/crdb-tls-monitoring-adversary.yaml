# workflows/suite/crdb-tls-monitoring-adversary
#
# CockroachDB TLS cluster with monitoring integration — with adversary injection

metadata:
  id: crdb-tls-monitoring-adversary
  label: CockroachDB TLS cluster with monitoring integration — with adversary injection
spec:
  prompt_mode: progressive
  adversary:
  - scenario: delete_cert_secret
    inject_at_stage: stage_01
    lift_at_stage: stage_02
  stages:
  - id: stage_01
    service: cockroachdb
    case: generate-cert
    retries: 1
  - id: stage_02
    service: cockroachdb
    case: monitoring-integration
    retries: 1
  - id: stage_03
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 128MiB
  - id: stage_04
    service: cockroachdb
    case: version-check
    retries: 1
