# workflows/suite/cockroachdb-recovery-settings-sweep
#
# CockroachDB cluster-settings sweep: recovery and lease timeouts

metadata:
  id: cockroachdb-recovery-settings-sweep
  label: 'CockroachDB cluster-settings sweep: recovery and lease timeouts'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: cluster-settings
    retries: 0
    param_overrides:
      setting_name: server.time_until_store_dead
      setting_value: 1m30s
  - id: stage_02
    service: cockroachdb
    case: cluster-settings
    retries: 0
    param_overrides:
      setting_name: kv.closed_timestamp.target_duration
      setting_value: 3s
  - id: stage_03
    service: cockroachdb
    case: cluster-settings
    retries: 0
    param_overrides:
      setting_name: kv.range_merge.queue_enabled
      setting_value: 'true'
  - id: stage_04
    service: cockroachdb
    case: version-check
    retries: 0
