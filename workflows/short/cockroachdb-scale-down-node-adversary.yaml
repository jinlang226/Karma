metadata:
  id: cockroachdb-scale-down-node-adversary
  label: CockroachDB scaled-down node recovery
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: deploy
    retries: 0
  - id: stage_02
    service: cockroachdb
    case: initialize
    retries: 0
  - id: stage_03
    service: cockroachdb
    case: health-check-recovery
    retries: 0
  - id: stage_04
    service: cockroachdb
    case: rollback-rehearsal
    retries: 0
  adversary:
  - scenario: scale_down_node
    inject_at_stage: stage_03
    lift_at_stage: stage_04
