# workflows/suite/es-upgrade-ha
#
# ES: deploy cluster then perform full-restart HA upgrade

metadata:
  id: es-upgrade-ha
  label: 'ES: deploy cluster then perform full-restart HA upgrade'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: full-restart-upgrade-ha
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: rotate-http-certs
    retries: 1
