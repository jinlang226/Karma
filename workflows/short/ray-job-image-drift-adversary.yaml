# workflows/suite/ray-job-image-drift-adversary
#
# Ray job submission under worker image drift — with adversary injection

metadata:
  id: ray-job-image-drift-adversary
  label: Ray job submission under worker image drift — with adversary injection
spec:
  prompt_mode: progressive
  adversary:
  - scenario: worker_image_drift
    inject_at_stage: stage_02
    lift_at_stage: stage_03
    param_overrides:
      wrong_image: rayproject/ray:2.8.0
      correct_image: rayproject/ray:2.9.0
  stages:
  - id: stage_01
    service: ray
    case: deploy_cluster
    retries: 0
    param_overrides:
      worker_replicas: '2'
  - id: stage_02
    service: ray
    case: job_submission
    retries: 0
    param_overrides:
      expected_output: pong
  - id: stage_03
    service: ray
    case: upgrade_version
    retries: 0
    param_overrides:
      from_image: rayproject/ray:2.8.0
      to_image: rayproject/ray:2.9.0
  - id: stage_04
    service: ray
    case: scale_workers
    retries: 0
    param_overrides:
      source_worker_replicas: '2'
      target_worker_replicas: '3'
