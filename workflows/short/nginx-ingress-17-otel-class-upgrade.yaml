# workflows/suite/nginx-ingress-17-otel-class-upgrade
#
# nginx-ingress: enable OTel logging then migrate to new ingress class

metadata:
  id: nginx-ingress-17-otel-class-upgrade
  label: 'nginx-ingress: enable OTel logging then migrate to new ingress class'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: otel_log_format
    retries: 1
  - id: stage_02
    service: nginx-ingress
    case: class_only_upgrade
    retries: 1
