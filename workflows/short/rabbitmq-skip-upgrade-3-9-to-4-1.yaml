# workflows/suite/rabbitmq-skip-upgrade-3-9-to-4-1
#
# RabbitMQ: Rolling Skip-Version Upgrade 3.9 → 4.1

metadata:
  id: rabbitmq-skip-upgrade-3-9-to-4-1
  label: 'RabbitMQ: Rolling Skip-Version Upgrade 3.9 → 4.1'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: rabbitmq
    case: classic_queue
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      image_tag: 3.9-management
      cluster_prefix: rabbitmq
  - id: stage_02
    service: rabbitmq
    case: manual_skip_upgrade
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
      from_version: '3.9'
      to_version: '4.1'
