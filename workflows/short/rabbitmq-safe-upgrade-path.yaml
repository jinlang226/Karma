# workflows/suite/rabbitmq-safe-upgrade-path
#
# RabbitMQ: Safe Upgrade Path with Policy Sync and Backup-Restore Drill
# (backup/restore runs LAST as a DR finale, per Law 1 — its PVC wipe must not
# destroy an upstream stage's state)

metadata:
  id: rabbitmq-safe-upgrade-path
  label: 'RabbitMQ: Safe Upgrade Path with Policy Sync and Backup-Restore Drill'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: rabbitmq
    case: classic_queue
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_02
    service: rabbitmq
    case: manual_policy_sync
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_03
    service: rabbitmq
    case: manual_skip_upgrade
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
      from_version: '3.12'
      to_version: '4.1'
  - id: stage_04
    service: rabbitmq
    case: manual_backup_restore
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
