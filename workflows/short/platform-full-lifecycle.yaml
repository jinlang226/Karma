# workflows/suite/platform-full-lifecycle
#
# Platform — full multi-service lifecycle: deploy, secure, scale, observe

metadata:
  id: platform-full-lifecycle
  label: 'Platform — full multi-service lifecycle: deploy, secure, scale, observe'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: deploy
    retries: 0
  - id: stage_02
    service: cockroachdb
    case: generate-cert
    retries: 0
  - id: stage_03
    service: mongodb
    case: deploy
    retries: 0
  - id: stage_04
    service: mongodb
    case: tls-setup
    retries: 0
  - id: stage_05
    service: mongodb
    case: replica-scaling
    retries: 0
    param_overrides:
      target_replicas: 5
  - id: stage_06
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
  - id: stage_07
    service: elasticsearch
    case: stack-monitoring-sidecars
    retries: 0
