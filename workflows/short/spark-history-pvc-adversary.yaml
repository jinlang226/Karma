metadata:
  id: spark-history-pvc-adversary
  label: Spark history server PVC break recovery
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: spark
    case: deploy_spark_pi
    retries: 0
  - id: stage_02
    service: spark
    case: spark_multi_tenant
    retries: 0
  - id: stage_03
    service: spark
    case: spark_runtime_ops
    retries: 0
  - id: stage_04
    service: spark
    case: readonly-audit
    retries: 0
  adversary:
  - scenario: history_server_pvc_break
    inject_at_stage: stage_02
    lift_at_stage: stage_04
