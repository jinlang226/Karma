metadata:
  id: rabbitmq-blue-green-audit
  label: RabbitMQ blue-green migration followed by audit
spec:
  prompt_mode: concat_blind
  stages:
  - id: stage_01
    service: rabbitmq
    case: blue_green_migration
    retries: 0
    namespaces:
    - cluster_source
    - cluster_target
    namespace_binding:
      source: cluster_source
      target: cluster_target
      default: cluster_target
    param_overrides:
      blue_cluster_prefix: rabbitmq-blue
      green_cluster_prefix: rabbitmq-green
  - id: stage_02
    service: rabbitmq
    case: readonly-audit
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
