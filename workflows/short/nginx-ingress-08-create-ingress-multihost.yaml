# workflows/suite/nginx-ingress-08-create-ingress-multihost
#
# nginx-ingress: create ingress for three successive host/path combinations

metadata:
  id: nginx-ingress-08-create-ingress-multihost
  label: 'nginx-ingress: create ingress for three successive host/path combinations'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: create_ingress
    retries: 0
    param_overrides:
      host: app-a.example.com
      path: /api
  - id: stage_02
    service: nginx-ingress
    case: create_ingress
    retries: 0
    param_overrides:
      host: app-b.example.com
      path: /v1
  - id: stage_03
    service: nginx-ingress
    case: create_ingress
    retries: 0
    param_overrides:
      host: app-c.example.com
      path: /v2
