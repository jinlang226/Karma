# workflows/suite/platform-tls-hardening-day
#
# Platform — TLS hardening day: MongoDB + CockroachDB + Elasticsearch certs

metadata:
  id: platform-tls-hardening-day
  label: 'Platform — TLS hardening day: MongoDB + CockroachDB + Elasticsearch certs'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: deploy
    retries: 0
  - id: stage_02
    service: mongodb
    case: tls-setup
    retries: 0
  - id: stage_03
    service: cockroachdb
    case: generate-cert
    retries: 0
  - id: stage_04
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
  - id: stage_05
    service: elasticsearch
    case: rotate-http-certs
    retries: 0
