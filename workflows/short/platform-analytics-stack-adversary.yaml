# workflows/suite/platform-analytics-stack-adversary
#
# Platform — analytics stack: Ray + Spark batch + Spark streaming — with adversary injection

metadata:
  id: platform-analytics-stack-adversary
  label: 'Platform — analytics stack: Ray + Spark batch + Spark streaming — with adversary injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: rbac_role_revoke
    inject_at_stage: stage_03
  stages:
  - id: stage_01
    service: ray
    case: deploy_cluster
    retries: 0
  - id: stage_02
    service: ray
    case: job_submission
    retries: 0
  - id: stage_03
    service: spark
    case: deploy_spark_pi
    retries: 0
  - id: stage_04
    service: spark
    case: spark_streaming_autoscale
    retries: 0
