metadata:
  id: platform-incident-response-b
  label: Platform incident response B
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: deploy
    retries: 0
  - id: stage_02
    service: mongodb
    case: deploy
    retries: 0
  - id: stage_03
    service: rabbitmq
    case: classic_queue
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_04
    service: nginx-ingress
    case: create_ingress
    retries: 0
  - id: stage_05
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
  adversary:
  - scenario: delete_cert_secret
    inject_at_stage: stage_01
    lift_at_stage: stage_05
