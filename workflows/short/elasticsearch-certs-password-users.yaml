metadata:
  id: elasticsearch-certs-password-users
  label: Elasticsearch certs, password rotation, and file realm users
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
  - id: stage_02
    service: elasticsearch
    case: rotate-http-certs
    retries: 0
  - id: stage_03
    service: elasticsearch
    case: rotate-elastic-password
    retries: 0
  - id: stage_04
    service: elasticsearch
    case: file-realm-user-roles-merge
    retries: 0
