# workflows/suite/platform-tls-hardening-day-adversary
#
# Platform — TLS hardening day: MongoDB + CockroachDB + Elasticsearch certs — with adversary injection

metadata:
  id: platform-tls-hardening-day-adversary
  label: 'Platform — TLS hardening day: MongoDB + CockroachDB + Elasticsearch certs — with adversary injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: http-service-selector-drift
    inject_at_stage: stage_05
  stages:
  - id: stage_01
    service: mongodb
    case: deploy
    retries: 1
  - id: stage_02
    service: mongodb
    case: tls-setup
    retries: 1
  - id: stage_03
    service: cockroachdb
    case: generate-cert
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_05
    service: elasticsearch
    case: rotate-http-certs
    retries: 1
