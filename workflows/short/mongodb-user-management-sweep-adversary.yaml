# workflows/suite/mongodb-user-management-sweep-adversary
#
# MongoDB user management sweep: create users, assign roles, rotate passwords — with adversary injection

metadata:
  id: mongodb-user-management-sweep-adversary
  label: 'MongoDB user management sweep: create users, assign roles, rotate passwords — with adversary
    injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: secret_corruption
    inject_at_stage: stage_03
  stages:
  - id: stage_01
    service: mongodb
    case: user-management
    retries: 1
  - id: stage_02
    service: mongodb
    case: custom-roles
    retries: 1
  - id: stage_03
    service: mongodb
    case: password-rotation
    retries: 1
