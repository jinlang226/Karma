# workflows/suite/ray-worker-recovery
#
# Ray worker crash-loop incident response

metadata:
  id: ray-worker-recovery
  label: Ray worker crash-loop incident response
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: ray
    case: deploy_cluster
    retries: 0
    param_overrides:
      worker_replicas: '2'
  - id: stage_02
    service: ray
    case: worker_recovery
    retries: 0
  - id: stage_03
    service: ray
    case: scale_workers
    retries: 0
    param_overrides:
      source_worker_replicas: '2'
      target_worker_replicas: '3'
  - id: stage_04
    service: ray
    case: job_submission
    retries: 0
    param_overrides:
      expected_output: pong
