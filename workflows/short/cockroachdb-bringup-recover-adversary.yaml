# workflows/suite/cockroachdb-bringup-recover-adversary
#
# CockroachDB bring-up then simulate and recover from health failure — with adversary injection

metadata:
  id: cockroachdb-bringup-recover-adversary
  label: CockroachDB bring-up then simulate and recover from health failure — with adversary injection
spec:
  prompt_mode: progressive
  adversary:
  - scenario: block_sql_port
    inject_at_stage: stage_03
    lift_at_stage: stage_04
  stages:
  - id: stage_01
    service: cockroachdb
    case: deploy
    retries: 0
  - id: stage_02
    service: cockroachdb
    case: initialize
    retries: 0
  - id: stage_03
    service: cockroachdb
    case: health-check-recovery
    retries: 0
  - id: stage_04
    service: cockroachdb
    case: cluster-settings
    retries: 0
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 128MiB
  - id: stage_05
    service: cockroachdb
    case: version-check
    retries: 0
