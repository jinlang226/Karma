# workflows/suite/elasticsearch-incident-network-and-shards-adversary
#
# ES: incident response chain — network repair, shard allocation fix, safe downscale — with adversary injection

metadata:
  id: elasticsearch-incident-network-and-shards-adversary
  label: 'ES: incident response chain — network repair, shard allocation fix, safe downscale — with adversary
    injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: transport-networkpolicy-block
    inject_at_stage: stage_01
    lift_at_stage: stage_02
  stages:
  - id: stage_01
    service: elasticsearch
    case: seed-hosts-repair
    retries: 0
  - id: stage_02
    service: elasticsearch
    case: internal-http-service-drift
    retries: 0
  - id: stage_03
    service: elasticsearch
    case: safe-downscale-with-shard-migration
    retries: 0
  - id: stage_04
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 0
