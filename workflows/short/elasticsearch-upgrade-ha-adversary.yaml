# workflows/suite/elasticsearch-upgrade-ha-adversary
#
# ES: deploy cluster then perform full-restart HA upgrade — with adversary injection

metadata:
  id: elasticsearch-upgrade-ha-adversary
  label: 'ES: deploy cluster then perform full-restart HA upgrade — with adversary injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: shard-allocation-disabled
    inject_at_stage: stage_02
    lift_at_stage: stage_03
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
  - id: stage_02
    service: elasticsearch
    case: full-restart-upgrade-ha
    retries: 0
  - id: stage_03
    service: elasticsearch
    case: rotate-http-certs
    retries: 0
