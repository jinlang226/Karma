# workflows/suite/cockroachdb-security-lifecycle
#
# CockroachDB security lifecycle: TLS enable then cert rotation

metadata:
  id: cockroachdb-security-lifecycle
  label: 'CockroachDB security lifecycle: TLS enable then cert rotation'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: deploy
    retries: 0
  - id: stage_02
    service: cockroachdb
    case: initialize
    retries: 0
  - id: stage_03
    service: cockroachdb
    case: generate-cert
    retries: 0
  - id: stage_04
    service: cockroachdb
    case: certificate-rotation
    retries: 0
