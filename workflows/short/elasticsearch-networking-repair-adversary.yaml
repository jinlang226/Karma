# workflows/suite/elasticsearch-networking-repair-adversary
#
# ES: fix internal HTTP service drift then repair seed hosts — with adversary injection

metadata:
  id: elasticsearch-networking-repair-adversary
  label: 'ES: fix internal HTTP service drift then repair seed hosts — with adversary injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: es-config-seed-hosts-drift
    inject_at_stage: stage_02
    lift_at_stage: stage_03
  stages:
  - id: stage_01
    service: elasticsearch
    case: internal-http-service-drift
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: seed-hosts-repair
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: rotate-http-certs
    retries: 1
