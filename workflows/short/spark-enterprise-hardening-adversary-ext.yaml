# workflows/long/spark-long-enterprise-hardening-adversary
#
# Enterprise security hardening with an adversarial credential expiry injected
# during the runtime-ops rotation window — the agent must detect the EXPIRED
# api-key in the spark-credentials Secret and restore a valid value.

metadata:
  id: spark-enterprise-hardening-adversary-ext
  label: Enterprise security hardening with adversarial credential expiry during the runtime-ops rotation
spec:
  prompt_mode: progressive
  adversary:
  - scenario: secret_credential_expire
    inject_at_stage: stage_05
    lift_at_stage: stage_06
  stages:
  - id: stage_01
    service: spark
    case: deploy_spark_pi
    retries: 0
  - id: stage_02
    service: spark
    case: spark_multi_tenant
    retries: 0
  - id: stage_03
    service: spark
    case: spark_runtime_ops
    retries: 0
  - id: stage_04
    service: spark
    case: spark_multi_tenant
    retries: 0
  - id: stage_05
    service: spark
    case: spark_runtime_ops
    retries: 0
  - id: stage_06
    service: spark
    case: spark_streaming_autoscale
    retries: 0
  - id: stage_07
    service: spark
    case: spark_etl_skew_oom
    retries: 0
  - id: stage_08
    service: spark
    case: spark_data_skew
    retries: 0
  - id: stage_09
    service: spark
    case: spark_multi_tenant
    retries: 0
  - id: stage_10
    service: spark
    case: deploy_spark_pi
    retries: 0
