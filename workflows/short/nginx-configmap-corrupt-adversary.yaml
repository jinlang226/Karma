metadata:
  id: nginx-configmap-corrupt-adversary
  label: Nginx ingress controller configmap corruption recovery
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: create_ingress
    retries: 0
  - id: stage_02
    service: nginx-ingress
    case: otel_log_format
    retries: 0
  - id: stage_03
    service: nginx-ingress
    case: class_only_upgrade
    retries: 0
  - id: stage_04
    service: nginx-ingress
    case: readonly-audit
    retries: 0
  adversary:
  - scenario: corrupt_ingress_nginx_configmap
    inject_at_stage: stage_02
    lift_at_stage: stage_04
