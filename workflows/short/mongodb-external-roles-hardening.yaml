metadata:
  id: mongodb-external-roles-hardening
  label: MongoDB external access and custom roles hardening
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: deploy
    retries: 0
  - id: stage_02
    service: mongodb
    case: initialize
    retries: 0
  - id: stage_03
    service: mongodb
    case: external-access-horizons
    retries: 0
  - id: stage_04
    service: mongodb
    case: custom-roles
    retries: 0
  - id: stage_05
    service: mongodb
    case: user-management
    retries: 0
