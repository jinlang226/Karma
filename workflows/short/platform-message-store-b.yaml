metadata:
  id: platform-message-store-b
  label: Platform message and store workflow B
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: deploy
    retries: 0
  - id: stage_02
    service: mongodb
    case: replica-scaling
    retries: 0
    param_overrides:
      target_replicas: 5
  - id: stage_03
    service: rabbitmq
    case: classic_queue
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_04
    service: rabbitmq
    case: manual_policy_sync
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_05
    service: rabbitmq
    case: manual_monitoring
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
