# workflows/suite/mongodb-upgrade-then-harden
#
# MongoDB upgrade to 6.0 then security hardening: custom roles and password rotation

metadata:
  id: mongodb-upgrade-then-harden
  label: 'MongoDB upgrade to 6.0 then security hardening: custom roles and password rotation'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: version-upgrade
    retries: 0
  - id: stage_02
    service: mongodb
    case: custom-roles
    retries: 0
  - id: stage_03
    service: mongodb
    case: password-rotation
    retries: 0
