# workflows/suite/es-full-lifecycle
#
# ES: complete lifecycle — bootstrap, security, scale, upgrade, snapshot, monitoring

metadata:
  id: es-full-lifecycle
  label: 'ES: complete lifecycle — bootstrap, security, scale, upgrade, snapshot, monitoring'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: bootstrap-initial-master-nodes
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: file-realm-user-roles-merge
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: rotate-elastic-password
    retries: 1
  - id: stage_05
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 1
  - id: stage_06
    service: elasticsearch
    case: full-restart-upgrade-ha
    retries: 1
  - id: stage_07
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 1
  - id: stage_08
    service: elasticsearch
    case: stack-monitoring-sidecars
    retries: 1
