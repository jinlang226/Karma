# workflows/suite/rabbitmq-upgrade-failover
#
# RabbitMQ: Rolling Upgrade 3.9 → 4.1 then Failover Resilience Test

metadata:
  id: rabbitmq-upgrade-failover
  label: 'RabbitMQ: Rolling Upgrade 3.9 → 4.1 then Failover Resilience Test'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: rabbitmq
    case: classic_queue
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_02
    service: rabbitmq
    case: manual_skip_upgrade
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
      from_version: '3.12'
      to_version: '4.1'
  - id: stage_03
    service: rabbitmq
    case: failover
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
