# workflows/long/mongodb-long-probe-sweep-a
#
# MongoDB probe sweep A: deploy → init → probe-tune → config → probe-tune → config → probe-tune → scale → users → monitor → decomm

metadata:
  id: mongodb-probe-sweep-a
  label: 'MongoDB probe sweep A: deploy → init → probe-tune → config → probe-tune → config → probe-tune
    → scale → users → monitor → decomm'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: deploy
    retries: 0
  - id: stage_02
    service: mongodb
    case: initialize
    retries: 0
  - id: stage_03
    service: mongodb
    case: readiness-probe-tuning
    retries: 0
  - id: stage_04
    service: mongodb
    case: mongod-config-update
    retries: 0
    param_overrides:
      target_journal_compressor: zlib
  - id: stage_05
    service: mongodb
    case: readiness-probe-tuning
    retries: 0
  - id: stage_06
    service: mongodb
    case: mongod-config-update
    retries: 0
    param_overrides:
      target_journal_compressor: snappy
  - id: stage_07
    service: mongodb
    case: readiness-probe-tuning
    retries: 0
  - id: stage_08
    service: mongodb
    case: replica-scaling
    retries: 0
    param_overrides:
      target_replicas: '5'
  - id: stage_09
    service: mongodb
    case: user-management
    retries: 0
  - id: stage_10
    service: mongodb
    case: monitoring-integration
    retries: 0
