metadata:
  id: mongodb-readiness-adversary
  label: MongoDB readiness probe break and recovery
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: deploy
    retries: 0
  - id: stage_02
    service: mongodb
    case: initialize
    retries: 0
  - id: stage_03
    service: mongodb
    case: readiness-probe-tuning
    retries: 0
  - id: stage_04
    service: mongodb
    case: health-check-recovery
    retries: 0
  adversary:
  - scenario: readiness_probe_break
    inject_at_stage: stage_03
    lift_at_stage: stage_04
