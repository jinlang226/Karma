# workflows/suite/crdb-health-recovery
#
# CockroachDB health-check recovery incident response

metadata:
  id: crdb-health-recovery
  label: CockroachDB health-check recovery incident response
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: health-check-recovery
    retries: 1
  - id: stage_02
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 128MiB
  - id: stage_03
    service: cockroachdb
    case: version-check
    retries: 1
