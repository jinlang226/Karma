# workflows/suite/ray-recovery-first
#
# Ray incident-first: fix workers then scale and submit jobs

metadata:
  id: ray-recovery-first
  label: 'Ray incident-first: fix workers then scale and submit jobs'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: ray
    case: deploy_cluster
    retries: 0
    param_overrides:
      worker_replicas: '2'
  - id: stage_02
    service: ray
    case: worker_recovery
    retries: 0
  - id: stage_03
    service: ray
    case: scale_workers
    retries: 0
    param_overrides:
      source_worker_replicas: '2'
      target_worker_replicas: '4'
  - id: stage_04
    service: ray
    case: job_submission
    retries: 0
    param_overrides:
      expected_output: pong
  - id: stage_05
    service: ray
    case: teardown_cluster
    retries: 0
