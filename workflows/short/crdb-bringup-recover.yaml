# workflows/suite/crdb-bringup-recover
#
# CockroachDB bring-up then simulate and recover from health failure

metadata:
  id: crdb-bringup-recover
  label: CockroachDB bring-up then simulate and recover from health failure
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: deploy
    retries: 1
  - id: stage_02
    service: cockroachdb
    case: initialize
    retries: 1
  - id: stage_03
    service: cockroachdb
    case: health-check-recovery
    retries: 1
  - id: stage_04
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 128MiB
  - id: stage_05
    service: cockroachdb
    case: version-check
    retries: 1
