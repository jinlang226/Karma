# workflows/suite/ray-dashboard-job-adversary
#
# Ray dashboard exposure then job submission — with adversary injection

metadata:
  id: ray-dashboard-job-adversary
  label: Ray dashboard exposure then job submission — with adversary injection
spec:
  prompt_mode: progressive
  adversary:
  - scenario: delete_head_service
    inject_at_stage: stage_02
    lift_at_stage: stage_03
  stages:
  - id: stage_01
    service: ray
    case: deploy_cluster
    retries: 1
    param_overrides:
      worker_replicas: '2'
  - id: stage_02
    service: ray
    case: dashboard_exposure
    retries: 1
    param_overrides:
      dashboard_port: '8265'
  - id: stage_03
    service: ray
    case: job_submission
    retries: 1
    param_overrides:
      expected_output: pong
  - id: stage_04
    service: ray
    case: teardown_cluster
    retries: 1
