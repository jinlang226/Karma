# workflows/suite/nginx-ingress-16-ratelimit-sweep-coarse-to-fine
#
# nginx-ingress: coarse-to-fine rate limit tuning (10 → 5 → 2 QPS)

metadata:
  id: nginx-ingress-16-ratelimit-sweep-coarse-to-fine
  label: 'nginx-ingress: coarse-to-fine rate limit tuning (10 → 5 → 2 QPS)'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 0
    param_overrides:
      limit_rps: '10'
  - id: stage_02
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 0
    param_overrides:
      limit_rps: '5'
  - id: stage_03
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 0
    param_overrides:
      limit_rps: '2'
