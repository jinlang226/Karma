metadata:
  id: elasticsearch-snapshot-secret-adversary
  label: Elasticsearch snapshot secret wipe recovery
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
  - id: stage_02
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 0
  - id: stage_03
    service: elasticsearch
    case: transform-job-recovery
    retries: 0
  - id: stage_04
    service: elasticsearch
    case: readonly-audit
    retries: 0
  adversary:
  - scenario: snapshot-secret-wiped
    inject_at_stage: stage_02
    lift_at_stage: stage_04
