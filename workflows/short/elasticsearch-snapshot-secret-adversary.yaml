metadata:
  id: elasticsearch-snapshot-secret-adversary
  label: Elasticsearch snapshot secret wipe recovery
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 0
  - id: stage_02
    service: elasticsearch
    case: readonly-audit
    retries: 0
  - id: stage_03
    service: elasticsearch
    case: rollback-rehearsal
    retries: 0
  adversary:
  - scenario: snapshot-secret-wiped
    inject_at_stage: stage_01
    lift_at_stage: stage_03
