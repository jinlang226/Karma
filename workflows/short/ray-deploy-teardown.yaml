# workflows/suite/ray-deploy-teardown
#
# Ray minimal deploy and teardown

metadata:
  id: ray-deploy-teardown
  label: Ray minimal deploy and teardown
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: ray
    case: deploy_cluster
    retries: 0
    param_overrides:
      worker_replicas: '2'
  - id: stage_02
    service: ray
    case: job_submission
    retries: 0
    param_overrides:
      expected_output: pong
  - id: stage_03
    service: ray
    case: teardown_cluster
    retries: 0
