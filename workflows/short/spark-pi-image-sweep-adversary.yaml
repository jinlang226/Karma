# workflows/suite/spark-pi-image-sweep-adversary
#
# SparkPi image version sweep — deploy and validate across successive patch releases — with adversary injection

metadata:
  id: spark-pi-image-sweep-adversary
  label: SparkPi image version sweep — deploy and validate across successive patch releases — with adversary
    injection
spec:
  prompt_mode: progressive
  adversary:
  - scenario: rbac_role_revoke
    inject_at_stage: stage_02
    lift_at_stage: stage_04
  stages:
  - id: stage_01
    service: spark
    case: deploy_spark_pi
    retries: 1
    param_overrides:
      spark_image: apache/spark:3.5.1
  - id: stage_02
    service: spark
    case: deploy_spark_pi
    retries: 1
    param_overrides:
      spark_image: apache/spark:3.5.2
  - id: stage_03
    service: spark
    case: deploy_spark_pi
    retries: 1
    param_overrides:
      spark_image: apache/spark:3.5.3
  - id: stage_04
    service: spark
    case: deploy_spark_pi
    retries: 1
    param_overrides:
      spark_image: apache/spark:3.5.4
