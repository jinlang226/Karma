metadata:
  id: mongodb-network-scale-incident
  label: MongoDB network block and replica recovery incident
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: deploy
    retries: 0
  - id: stage_02
    service: mongodb
    case: initialize
    retries: 0
  - id: stage_03
    service: mongodb
    case: replica-scaling
    retries: 0
    param_overrides:
      target_replicas: 5
  - id: stage_04
    service: mongodb
    case: health-check-recovery
    retries: 0
  adversary:
  - scenario: network_policy_block
    inject_at_stage: stage_03
    lift_at_stage: stage_04
