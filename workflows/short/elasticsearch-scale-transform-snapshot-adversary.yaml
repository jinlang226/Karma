# workflows/suite/elasticsearch-scale-transform-snapshot-adversary
#
# ES: scale up new nodeset then run transform job and set up snapshot backup — with adversary injection

metadata:
  id: elasticsearch-scale-transform-snapshot-adversary
  label: 'ES: scale up new nodeset then run transform job and set up snapshot backup — with adversary
    injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: shard-allocation-disabled
    inject_at_stage: stage_02
    lift_at_stage: stage_04
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: transform-job-recovery
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 1
