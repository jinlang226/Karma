metadata:
  id: mongodb-scale-monitor-decommission
  label: MongoDB scale, monitor, and decommission path
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: deploy
    retries: 0
  - id: stage_02
    service: mongodb
    case: initialize
    retries: 0
  - id: stage_03
    service: mongodb
    case: replica-scaling
    retries: 0
    param_overrides:
      target_replicas: 5
  - id: stage_04
    service: mongodb
    case: monitoring-integration
    retries: 0
  - id: stage_05
    service: mongodb
    case: decommission
    retries: 0
