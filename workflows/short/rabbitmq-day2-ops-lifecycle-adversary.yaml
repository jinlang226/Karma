# workflows/suite/rabbitmq-day2-ops-lifecycle-adversary
#
# RabbitMQ: Full Day-2 Ops — Permissions, Policy, Monitoring, Backup — with adversary injection

metadata:
  id: rabbitmq-day2-ops-lifecycle-adversary
  label: 'RabbitMQ: Full Day-2 Ops — Permissions, Policy, Monitoring, Backup — with adversary injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: scale_down_cluster
    inject_at_stage: stage_02
    lift_at_stage: stage_03
  stages:
  - id: stage_01
    service: rabbitmq
    case: classic_queue
    retries: 1
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_02
    service: rabbitmq
    case: manual_user_permission
    retries: 1
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_03
    service: rabbitmq
    case: manual_policy_sync
    retries: 1
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_04
    service: rabbitmq
    case: manual_monitoring
    retries: 1
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_05
    service: rabbitmq
    case: manual_backup_restore
    retries: 1
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
