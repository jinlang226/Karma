metadata:
  id: spark-worker-scale-down-adversary
  label: Spark worker scale-down recovery
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: spark
    case: deploy_spark_pi
    retries: 0
  - id: stage_02
    service: spark
    case: spark_streaming_autoscale
    retries: 0
  - id: stage_03
    service: spark
    case: spark_data_skew
    retries: 0
  - id: stage_04
    service: spark
    case: readonly-audit
    retries: 0
  adversary:
  - scenario: worker_scale_down
    inject_at_stage: stage_02
    lift_at_stage: stage_04
