metadata:
  id: platform-incident-response-a
  label: Platform incident response A
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: create_ingress
    retries: 0
  - id: stage_02
    service: rabbitmq
    case: classic_queue
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_03
    service: mongodb
    case: deploy
    retries: 0
  - id: stage_04
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
  - id: stage_05
    service: ray
    case: deploy_cluster
    retries: 0
  - id: stage_06
    service: spark
    case: deploy_spark_pi
    retries: 0
