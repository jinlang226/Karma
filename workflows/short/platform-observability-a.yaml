metadata:
  id: platform-observability-a
  label: Platform observability sweep A
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: rabbitmq
    case: manual_monitoring
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_02
    service: mongodb
    case: monitoring-integration
    retries: 0
  - id: stage_03
    service: cockroachdb
    case: monitoring-integration
    retries: 0
  - id: stage_04
    service: elasticsearch
    case: stack-monitoring-sidecars
    retries: 0
  - id: stage_05
    service: spark
    case: spark_runtime_ops
    retries: 0
