metadata:
  id: mongodb-tls-cert-password
  label: MongoDB TLS setup, certificate rotation, and password rotation
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: deploy
    retries: 0
  - id: stage_02
    service: mongodb
    case: initialize
    retries: 0
  - id: stage_03
    service: mongodb
    case: tls-setup
    retries: 0
  - id: stage_04
    service: mongodb
    case: certificate-rotation
    retries: 0
  - id: stage_05
    service: mongodb
    case: password-rotation
    retries: 0
