# workflows/suite/rabbitmq-compliance-sweep-adversary
#
# RabbitMQ: TLS Rotation, Permission Audit, Policy Compliance Sweep — with adversary injection

metadata:
  id: rabbitmq-compliance-sweep-adversary
  label: 'RabbitMQ: TLS Rotation, Permission Audit, Policy Compliance Sweep — with adversary injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: scale_down_cluster
    inject_at_stage: stage_02
    lift_at_stage: stage_03
  stages:
  - id: stage_01
    service: rabbitmq
    case: classic_queue
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_02
    service: rabbitmq
    case: manual_tls_rotation
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
      min_rotated_leaf_validity_days: '30'
  - id: stage_03
    service: rabbitmq
    case: manual_user_permission
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_04
    service: rabbitmq
    case: manual_policy_sync
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
