# workflows/suite/rabbitmq-tls-rotation
#
# RabbitMQ: Leaf TLS Certificate Rotation

metadata:
  id: rabbitmq-tls-rotation
  label: 'RabbitMQ: Leaf TLS Certificate Rotation'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: rabbitmq
    case: classic_queue
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_02
    service: rabbitmq
    case: manual_tls_rotation
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
      min_rotated_leaf_validity_days: '30'
