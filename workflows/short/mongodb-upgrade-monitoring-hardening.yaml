metadata:
  id: mongodb-upgrade-monitoring-hardening
  label: MongoDB upgrade and monitoring hardening
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: deploy
    retries: 0
  - id: stage_02
    service: mongodb
    case: initialize
    retries: 0
  - id: stage_03
    service: mongodb
    case: version-upgrade
    retries: 0
  - id: stage_04
    service: mongodb
    case: monitoring-integration
    retries: 0
  - id: stage_05
    service: mongodb
    case: readonly-audit
    retries: 0
