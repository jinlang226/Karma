# workflows/suite/cockroachdb-decommission
#
# CockroachDB node decommission: safely reduce 5-node cluster to 3

metadata:
  id: cockroachdb-decommission
  label: 'CockroachDB node decommission: safely reduce 5-node cluster to 3'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: decommission
    retries: 1
  - id: stage_02
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 128MiB
  - id: stage_03
    service: cockroachdb
    case: version-check
    retries: 1
