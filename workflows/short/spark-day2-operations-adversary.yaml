# workflows/long/spark-long-day2-operations-adversary
#
# Day-2 operations with adversarial worker scale-down during the streaming
# maintenance window — the agent must detect the under-provisioned workers and
# scale back up while servicing the load spikes.

metadata:
  id: spark-day2-operations-adversary
  label: Day-2 operations with adversarial worker scale-down during streaming maintenance window
spec:
  prompt_mode: progressive
  adversary:
  - scenario: worker_scale_down
    inject_at_stage: stage_06
    lift_at_stage: stage_07
    param_overrides:
      namespace: spark-streaming
      wrong_replicas: '1'
      restore_replicas: '5'
  stages:
  - id: stage_01
    service: spark
    case: spark_runtime_ops
    retries: 0
  - id: stage_02
    service: spark
    case: spark_data_skew
    retries: 0
  - id: stage_03
    service: spark
    case: spark_etl_skew_oom
    retries: 0
  - id: stage_04
    service: spark
    case: spark_multi_tenant
    retries: 0
  - id: stage_05
    service: spark
    case: spark_runtime_ops
    retries: 0
  - id: stage_06
    service: spark
    case: spark_streaming_autoscale
    retries: 0
  - id: stage_07
    service: spark
    case: spark_streaming_autoscale
    retries: 0
  - id: stage_08
    service: spark
    case: spark_data_skew
    retries: 0
  - id: stage_09
    service: spark
    case: spark_runtime_ops
    retries: 0
  - id: stage_10
    service: spark
    case: deploy_spark_pi
    retries: 0
