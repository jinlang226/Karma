# workflows/suite/nginx-ingress-03-canary-ratelimit-tls
#
# nginx-ingress: canary split, rate limit, then TLS renewal

metadata:
  id: nginx-ingress-03-canary-ratelimit-tls
  label: 'nginx-ingress: canary split, rate limit, then TLS renewal'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: ingress_canary
    retries: 1
  - id: stage_02
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 1
    param_overrides:
      limit_rps: '2'
  - id: stage_03
    service: nginx-ingress
    case: renew_tls_secret
    retries: 1
