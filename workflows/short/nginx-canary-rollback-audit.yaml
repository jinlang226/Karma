metadata:
  id: nginx-canary-rollback-audit
  label: Nginx ingress canary, rollback, and audit
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: create_ingress
    retries: 0
  - id: stage_02
    service: nginx-ingress
    case: ingress_canary
    retries: 0
  - id: stage_03
    service: nginx-ingress
    case: rollback-rehearsal
    retries: 0
  - id: stage_04
    service: nginx-ingress
    case: readonly-audit
    retries: 0
