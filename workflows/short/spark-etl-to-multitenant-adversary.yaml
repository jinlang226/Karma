    inject_at_stage: stage_05
    lift_at_stage: stage_06
  stages:
  - id: stage_01
    service: spark
    case: deploy_spark_pi
    retries: 1
  - id: stage_02
    service: spark
    case: spark_etl_skew_oom
    retries: 1
  - id: stage_03
    service: spark
    case: spark_etl_skew_oom
    retries: 1
  - id: stage_04
    service: spark
    case: spark_multi_tenant
    retries: 1
  - id: stage_05
    service: spark
    case: spark_multi_tenant
    retries: 1
  - id: stage_06
    service: spark
    case: spark_runtime_ops
    retries: 1
