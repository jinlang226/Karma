# workflows/suite/cockroachdb-security-lifecycle-adversary
#
# CockroachDB security lifecycle: TLS enable then cert rotation — with adversary injection

metadata:
  id: cockroachdb-security-lifecycle-adversary
  label: 'CockroachDB security lifecycle: TLS enable then cert rotation — with adversary injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: delete_cert_secret
    inject_at_stage: stage_04
    lift_at_stage: stage_04
  stages:
  - id: stage_01
    service: cockroachdb
    case: deploy
    retries: 1
  - id: stage_02
    service: cockroachdb
    case: initialize
    retries: 1
  - id: stage_03
    service: cockroachdb
    case: generate-cert
    retries: 1
  - id: stage_04
    service: cockroachdb
    case: certificate-rotation
    retries: 1
