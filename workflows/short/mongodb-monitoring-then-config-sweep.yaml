# workflows/suite/mongodb-monitoring-then-config-sweep
#
# MongoDB Prometheus monitoring then mongod config tuning sweep

metadata:
  id: mongodb-monitoring-then-config-sweep
  label: MongoDB Prometheus monitoring then mongod config tuning sweep
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: monitoring-integration
    retries: 0
  - id: stage_02
    service: mongodb
    case: mongod-config-update
    retries: 0
    param_overrides:
      target_journal_compressor: zlib
  - id: stage_03
    service: mongodb
    case: mongod-config-update
    retries: 0
    param_overrides:
      target_journal_compressor: zstd
