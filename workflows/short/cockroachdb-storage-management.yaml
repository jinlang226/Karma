# workflows/long/cockroachdb-long-storage-management
#
# CockroachDB storage management: GC TTL and range-size zone-config sweeps

metadata:
  id: cockroachdb-storage-management
  label: 'CockroachDB storage management: GC TTL and range-size zone-config sweeps'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: deploy
    retries: 0
  - id: stage_02
    service: cockroachdb
    case: initialize
    retries: 0
  - id: stage_03
    service: cockroachdb
    case: zone-config
    retries: 0
    param_overrides:
      gc_ttl_seconds: 604800
      range_max_bytes: 536870912
  - id: stage_04
    service: cockroachdb
    case: zone-config
    retries: 0
    param_overrides:
      gc_ttl_seconds: 86400
      range_max_bytes: 268435456
  - id: stage_05
    service: cockroachdb
    case: zone-config
    retries: 0
    param_overrides:
      gc_ttl_seconds: 43200
      range_max_bytes: 134217728
  - id: stage_06
    service: cockroachdb
    case: zone-config
    retries: 0
    param_overrides:
      gc_ttl_seconds: 14400
      range_max_bytes: 67108864
  - id: stage_07
    service: cockroachdb
    case: zone-config
    retries: 0
    param_overrides:
      gc_ttl_seconds: 3600
      range_max_bytes: 67108864
  - id: stage_08
    service: cockroachdb
    case: cluster-settings
    retries: 0
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 128MiB
  - id: stage_09
    service: cockroachdb
    case: monitoring-integration
    retries: 0
  - id: stage_10
    service: cockroachdb
    case: version-check
    retries: 0
    param_overrides:
      report_key: storage_mgmt_version
