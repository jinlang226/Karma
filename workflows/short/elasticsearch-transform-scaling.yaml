# workflows/long/elasticsearch-long-transform-scaling
#
# Elasticsearch transform job recovery with cluster scaling

metadata:
  id: elasticsearch-transform-scaling
  label: Elasticsearch transform job recovery with cluster scaling
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
  - id: stage_02
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 0
  - id: stage_03
    service: elasticsearch
    case: transform-job-recovery
    retries: 0
  - id: stage_04
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 0
  - id: stage_05
    service: elasticsearch
    case: transform-job-recovery
    retries: 0
  - id: stage_06
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 0
    param_overrides:
      expected_nodes: '7'
      original_replicas: '5'
  - id: stage_07
    service: elasticsearch
    case: transform-job-recovery
    retries: 0
  - id: stage_08
    service: elasticsearch
    case: transform-job-recovery
    retries: 0
  - id: stage_09
    service: elasticsearch
    case: stack-monitoring-sidecars
    retries: 0
