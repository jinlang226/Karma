metadata:
  id: nginx-ratelimit-otel-hard
  label: Nginx ingress rate limit and OTel hardening
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: create_ingress
    retries: 0
  - id: stage_02
    service: nginx-ingress
    case: rate_limit_replica_hard
    retries: 0
    param_overrides:
      limit_rps: '2'
  - id: stage_03
    service: nginx-ingress
    case: otel_log_format
    retries: 0
  - id: stage_04
    service: nginx-ingress
    case: readonly-audit
    retries: 0
