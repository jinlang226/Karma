metadata:
  id: spark-skew-etl-oom-recovery
  label: Spark skew and ETL OOM recovery chain
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: spark
    case: deploy_spark_pi
    retries: 0
  - id: stage_02
    service: spark
    case: spark_data_skew
    retries: 0
  - id: stage_03
    service: spark
    case: spark_etl_skew_oom
    retries: 0
  - id: stage_04
    service: spark
    case: rollback-rehearsal
    retries: 0
