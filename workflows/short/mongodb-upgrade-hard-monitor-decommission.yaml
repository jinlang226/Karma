# workflows/suite/mongodb-upgrade-hard-monitor-decommission
#
# MongoDB major upgrade 5.0→7.0, monitoring integration, then decommission

metadata:
  id: mongodb-upgrade-hard-monitor-decommission
  label: MongoDB major upgrade 5.0→7.0, monitoring integration, then decommission
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: version-upgrade-hard
    retries: 1
  - id: stage_02
    service: mongodb
    case: monitoring-integration
    retries: 1
  - id: stage_03
    service: mongodb
    case: decommission
    retries: 1
