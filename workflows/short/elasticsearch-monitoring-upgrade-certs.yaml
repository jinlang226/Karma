# workflows/suite/elasticsearch-monitoring-upgrade-certs
#
# ES: enable monitoring sidecars then upgrade cluster and rotate HTTP certs

metadata:
  id: elasticsearch-monitoring-upgrade-certs
  label: 'ES: enable monitoring sidecars then upgrade cluster and rotate HTTP certs'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: stack-monitoring-sidecars
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: full-restart-upgrade-ha
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: rotate-http-certs
    retries: 1
  - id: stage_05
    service: elasticsearch
    case: rotate-elastic-password
    retries: 1
