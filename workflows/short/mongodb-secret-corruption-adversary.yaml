metadata:
  id: mongodb-secret-corruption-adversary
  label: MongoDB secret corruption during password rotation
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: deploy
    retries: 0
  - id: stage_02
    service: mongodb
    case: initialize
    retries: 0
  - id: stage_03
    service: mongodb
    case: password-rotation
    retries: 0
  - id: stage_04
    service: mongodb
    case: readonly-audit
    retries: 0
  adversary:
  - scenario: secret_corruption
    inject_at_stage: stage_03
    lift_at_stage: stage_04
