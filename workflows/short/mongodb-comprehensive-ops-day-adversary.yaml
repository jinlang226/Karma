# workflows/suite/mongodb-comprehensive-ops-day-adversary
#
# MongoDB comprehensive ops day: init, scale, config, TLS, cert rotation, decommission — with adversary injection

metadata:
  id: mongodb-comprehensive-ops-day-adversary
  label: 'MongoDB comprehensive ops day: init, scale, config, TLS, cert rotation, decommission — with
    adversary injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: readiness_probe_break
    inject_at_stage: stage_03
    lift_at_stage: stage_04
  stages:
  - id: stage_01
    service: mongodb
    case: initialize
    retries: 1
  - id: stage_02
    service: mongodb
    case: replica-scaling
    retries: 1
    param_overrides:
      target_replicas: 5
  - id: stage_03
    service: mongodb
    case: mongod-config-update
    retries: 1
    param_overrides:
      target_journal_compressor: zlib
  - id: stage_04
    service: mongodb
    case: tls-setup
    retries: 1
  - id: stage_05
    service: mongodb
    case: certificate-rotation
    retries: 1
  - id: stage_06
    service: mongodb
    case: decommission
    retries: 1
