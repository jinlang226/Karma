# workflows/suite/mongodb-password-rotation-sweep-adversary
#
# MongoDB password rotation sweep: rotate app-user then reporting-user credentials — with adversary injection

metadata:
  id: mongodb-password-rotation-sweep-adversary
  label: 'MongoDB password rotation sweep: rotate app-user then reporting-user credentials — with adversary
    injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: secret_corruption
    inject_at_stage: stage_01
    lift_at_stage: stage_02
  stages:
  - id: stage_01
    service: mongodb
    case: password-rotation
    retries: 1
  - id: stage_02
    service: mongodb
    case: password-rotation
    retries: 1
    param_overrides:
      app_username: reporting-user
      app_secret_name: reporting-user-password
      app_next_secret_name: reporting-user-password-next
