# workflows/suite/mongodb-password-rotation-sweep-adversary
#
# MongoDB credential hygiene: rotate the app-user password then restore reporting-user RBAC — with adversary injection

metadata:
  id: mongodb-password-rotation-sweep-adversary
  label: 'MongoDB credential hygiene: rotate app-user password then restore reporting-user RBAC — with
    adversary injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: secret_corruption
    inject_at_stage: stage_01
    lift_at_stage: stage_02
  stages:
  - id: stage_01
    service: mongodb
    case: password-rotation
    retries: 0
  - id: stage_02
    service: mongodb
    case: custom-roles
    retries: 0
