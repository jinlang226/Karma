metadata:
  id: platform-ingress-rabbit-dual-adversary
  label: Platform ingress and RabbitMQ dual adversary chain
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: create_ingress
    retries: 0
  - id: stage_02
    service: nginx-ingress
    case: rate_limit_replica_hard
    retries: 0
  - id: stage_03
    service: rabbitmq
    case: classic_queue
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_04
    service: rabbitmq
    case: manual_policy_sync
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_05
    service: rabbitmq
    case: failover
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  adversary:
  - scenario: strip_rate_limit_annotation
    inject_at_stage: stage_02
    lift_at_stage: stage_03
  - scenario: clear_ha_policy
    inject_at_stage: stage_04
    lift_at_stage: stage_05
