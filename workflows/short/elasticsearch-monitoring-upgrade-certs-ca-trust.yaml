metadata:
  id: elasticsearch-monitoring-upgrade-certs-ca-trust
  label: Elasticsearch monitoring and certificate hardening chain
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: stack-monitoring-sidecars
    retries: 0
  - id: stage_02
    service: elasticsearch
    case: rotate-http-certs
    retries: 0
  - id: stage_03
    service: elasticsearch
    case: transport-additional-ca-trust
    retries: 0
  - id: stage_04
    service: elasticsearch
    case: readonly-audit
    retries: 0
