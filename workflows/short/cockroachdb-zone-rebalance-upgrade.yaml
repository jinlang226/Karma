metadata:
  id: cockroachdb-zone-rebalance-upgrade
  label: CockroachDB zone config, rebalance, and upgrade
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: deploy
    retries: 0
  - id: stage_02
    service: cockroachdb
    case: initialize
    retries: 0
  - id: stage_03
    service: cockroachdb
    case: zone-config
    retries: 0
    param_overrides:
      gc_ttl_seconds: 7200
  - id: stage_04
    service: cockroachdb
    case: partitioned-update
    retries: 0
  - id: stage_05
    service: cockroachdb
    case: major-upgrade-finalize
    retries: 0
