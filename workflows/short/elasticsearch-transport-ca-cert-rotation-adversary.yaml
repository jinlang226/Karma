# workflows/suite/elasticsearch-transport-ca-cert-rotation-adversary
#
# ES: add additional transport CA trust then rotate HTTP certs — with adversary injection

metadata:
  id: elasticsearch-transport-ca-cert-rotation-adversary
  label: 'ES: add additional transport CA trust then rotate HTTP certs — with adversary injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: transport-networkpolicy-block
    inject_at_stage: stage_02
    lift_at_stage: stage_03
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: transport-additional-ca-trust
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: rotate-http-certs
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: rotate-elastic-password
    retries: 1
