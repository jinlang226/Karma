# workflows/suite/rabbitmq-backup-restore
#
# RabbitMQ: Backup and Restore after Primary Data Loss

metadata:
  id: rabbitmq-backup-restore
  label: 'RabbitMQ: Backup and Restore after Primary Data Loss'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: rabbitmq
    case: classic_queue
    retries: 1
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_02
    service: rabbitmq
    case: manual_backup_restore
    retries: 1
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
