# workflows/suite/elasticsearch-incident-response-chain-adversary
#
# ES: incident response — repair seed hosts, recover transform, migrate shards — with adversary injection

metadata:
  id: elasticsearch-incident-response-chain-adversary
  label: 'ES: incident response — repair seed hosts, recover transform, migrate shards — with adversary
    injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: shard-allocation-disabled
    inject_at_stage: stage_03
    lift_at_stage: stage_04
  stages:
  - id: stage_01
    service: elasticsearch
    case: seed-hosts-repair
    retries: 0
  - id: stage_02
    service: elasticsearch
    case: transform-job-recovery
    retries: 0
  - id: stage_03
    service: elasticsearch
    case: safe-downscale-with-shard-migration
    retries: 0
  - id: stage_04
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 0
