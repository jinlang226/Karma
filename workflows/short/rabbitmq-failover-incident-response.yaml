# workflows/suite/rabbitmq-failover-incident-response
#
# RabbitMQ: Node Failover and Cluster Membership Restore

metadata:
  id: rabbitmq-failover-incident-response
  label: 'RabbitMQ: Node Failover and Cluster Membership Restore'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: rabbitmq
    case: classic_queue
    retries: 1
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_02
    service: rabbitmq
    case: failover
    retries: 1
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
