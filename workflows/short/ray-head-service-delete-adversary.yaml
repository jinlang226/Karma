metadata:
  id: ray-head-service-delete-adversary
  label: Ray deleted head service recovery
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: ray
    case: deploy_cluster
    retries: 0
  - id: stage_02
    service: ray
    case: dashboard_exposure
    retries: 0
  - id: stage_03
    service: ray
    case: job_submission
    retries: 0
  - id: stage_04
    service: ray
    case: readonly-audit
    retries: 0
  adversary:
  - scenario: delete_head_service
    inject_at_stage: stage_02
    lift_at_stage: stage_04
