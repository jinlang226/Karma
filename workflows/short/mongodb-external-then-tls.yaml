# workflows/suite/mongodb-external-then-tls
#
# MongoDB external access configuration then TLS enablement

metadata:
  id: mongodb-external-then-tls
  label: MongoDB external access configuration then TLS enablement
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: external-access-horizons
    retries: 1
  - id: stage_02
    service: mongodb
    case: tls-setup
    retries: 1
