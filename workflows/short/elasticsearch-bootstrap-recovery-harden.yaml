# workflows/long/elasticsearch-long-bootstrap-recovery-harden
#
# Elasticsearch bootstrap recovery and production hardening campaign

metadata:
  id: elasticsearch-bootstrap-recovery-harden
  label: Elasticsearch bootstrap recovery and production hardening campaign
spec:
  prompt_mode: progressive
  adversary:
  - scenario: es-config-seed-hosts-drift
    inject_at_stage: stage_02
    lift_at_stage: stage_04
  stages:
  - id: stage_01
    service: elasticsearch
    case: bootstrap-initial-master-nodes
    retries: 0
  - id: stage_02
    service: elasticsearch
    case: seed-hosts-repair
    retries: 0
  - id: stage_03
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
  - id: stage_04
    service: elasticsearch
    case: file-realm-user-roles-merge
    retries: 0
  - id: stage_05
    service: elasticsearch
    case: rotate-elastic-password
    retries: 0
  - id: stage_06
    service: elasticsearch
    case: rotate-http-certs
    retries: 0
  - id: stage_07
    service: elasticsearch
    case: transport-additional-ca-trust
    retries: 0
  - id: stage_08
    service: elasticsearch
    case: secure-http-ingress
    retries: 0
  - id: stage_09
    service: elasticsearch
    case: stack-monitoring-sidecars
    retries: 0
