# workflows/suite/nginx-ingress-11-tls-canary-ratelimit-hard
#
# nginx-ingress: renew TLS, canary split, then hard multi-replica rate limit

metadata:
  id: nginx-ingress-11-tls-canary-ratelimit-hard
  label: 'nginx-ingress: renew TLS, canary split, then hard multi-replica rate limit'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: renew_tls_secret
    retries: 0
  - id: stage_02
    service: nginx-ingress
    case: ingress_canary
    retries: 0
  - id: stage_03
    service: nginx-ingress
    case: rate_limit_replica_hard
    retries: 0
    param_overrides:
      limit_rps: '1'
