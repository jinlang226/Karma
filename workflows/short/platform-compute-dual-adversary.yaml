metadata:
  id: platform-compute-dual-adversary
  label: Platform compute dual adversary chain
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: ray
    case: deploy_cluster
    retries: 0
  - id: stage_02
    service: ray
    case: scale_workers
    retries: 0
  - id: stage_03
    service: ray
    case: job_submission
    retries: 0
  - id: stage_04
    service: spark
    case: deploy_spark_pi
    retries: 0
  - id: stage_05
    service: spark
    case: spark_runtime_ops
    retries: 0
  - id: stage_06
    service: spark
    case: spark_streaming_autoscale
    retries: 0
  adversary:
  - scenario: scale_down_workers
    inject_at_stage: stage_02
    lift_at_stage: stage_03
  - scenario: configmap_executor_memory_drop
    inject_at_stage: stage_05
    lift_at_stage: stage_06
