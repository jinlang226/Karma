metadata:
  id: platform-data-dual-adversary
  label: Platform data dual adversary chain
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: deploy
    retries: 0
  - id: stage_02
    service: cockroachdb
    case: initialize
    retries: 0
  - id: stage_03
    service: cockroachdb
    case: cluster-settings
    retries: 0
  - id: stage_04
    service: mongodb
    case: deploy
    retries: 0
  - id: stage_05
    service: mongodb
    case: initialize
    retries: 0
  - id: stage_06
    service: mongodb
    case: replica-scaling
    retries: 0
  adversary:
  - scenario: throttle_rebalance_rate
    inject_at_stage: stage_03
    lift_at_stage: stage_04
  - scenario: scale_down_replica
    inject_at_stage: stage_06
