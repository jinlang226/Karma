# workflows/suite/elasticsearch-service-and-network-repair
#
# ES: fix service selector drift, repair seed hosts, then add transport CA trust

metadata:
  id: elasticsearch-service-and-network-repair
  label: 'ES: fix service selector drift, repair seed hosts, then add transport CA trust'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: internal-http-service-drift
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: seed-hosts-repair
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: transport-additional-ca-trust
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: secure-http-ingress
    retries: 1
