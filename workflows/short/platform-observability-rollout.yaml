# workflows/suite/platform-observability-rollout
#
# Platform — observability rollout across CockroachDB + MongoDB + Elasticsearch

metadata:
  id: platform-observability-rollout
  label: Platform — observability rollout across CockroachDB + MongoDB + Elasticsearch
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: deploy
    retries: 1
  - id: stage_02
    service: cockroachdb
    case: monitoring-integration
    retries: 1
  - id: stage_03
    service: mongodb
    case: deploy
    retries: 1
  - id: stage_04
    service: mongodb
    case: monitoring-integration
    retries: 1
  - id: stage_05
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_06
    service: elasticsearch
    case: stack-monitoring-sidecars
    retries: 1
