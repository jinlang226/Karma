# workflows/suite/cockroachdb-settings-zone-harden
#
# CockroachDB settings and zone configuration hardening

metadata:
  id: cockroachdb-settings-zone-harden
  label: CockroachDB settings and zone configuration hardening
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 128MiB
  - id: stage_02
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: server.time_until_store_dead
      setting_value: 1m30s
  - id: stage_03
    service: cockroachdb
    case: zone-config
    retries: 1
    param_overrides:
      gc_ttl_seconds: '7200'
      num_replicas: '3'
  - id: stage_04
    service: cockroachdb
    case: zone-config
    retries: 1
    param_overrides:
      gc_ttl_seconds: '14400'
      num_replicas: '3'
  - id: stage_05
    service: cockroachdb
    case: version-check
    retries: 1
