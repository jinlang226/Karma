# workflows/suite/elasticsearch-snapshot-secret-recovery
#
# ES: snapshot repo setup, transform-job recovery, then safe shard-migration downscale

metadata:
  id: elasticsearch-snapshot-secret-recovery
  label: 'ES: snapshot repo setup, transform-job recovery, then safe shard-migration downscale'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: transform-job-recovery
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: safe-downscale-with-shard-migration
    retries: 1
