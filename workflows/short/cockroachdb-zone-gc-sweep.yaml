# workflows/suite/cockroachdb-zone-gc-sweep
#
# CockroachDB tenant-B data governance: apply zone config, tune rebalance, enable metrics

metadata:
  id: cockroachdb-zone-gc-sweep
  label: 'CockroachDB tenant-B governance: zone config, rebalance tuning, metrics'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: zone-config
    retries: 1
    param_overrides:
      gc_ttl_seconds: '14400'
  - id: stage_02
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 128MiB
  - id: stage_03
    service: cockroachdb
    case: monitoring-integration
    retries: 1
