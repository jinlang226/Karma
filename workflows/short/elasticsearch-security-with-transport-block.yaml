# workflows/suite/elasticsearch-security-with-transport-block
#
# ES: security hardening with transport NetworkPolicy block adversary

metadata:
  id: elasticsearch-security-with-transport-block
  label: 'ES: security hardening with transport NetworkPolicy block adversary'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
  - id: stage_02
    service: elasticsearch
    case: transport-additional-ca-trust
    retries: 0
  - id: stage_03
    service: elasticsearch
    case: rotate-http-certs
    retries: 0
  - id: stage_04
    service: elasticsearch
    case: rotate-elastic-password
    retries: 0
  - id: stage_05
    service: elasticsearch
    case: secure-http-ingress
    retries: 0
