# workflows/suite/es-scaling-sweep-adversary
#
# ES: scaling sweep — scale up new nodeset then safely downscale with shard migration — with adversary injection

metadata:
  id: es-scaling-sweep-adversary
  label: 'ES: scaling sweep — scale up new nodeset then safely downscale with shard migration — with adversary
    injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: statefulset-scaled-down
    inject_at_stage: stage_02
    lift_at_stage: stage_03
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: master-downscale-voting-exclusions
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: safe-downscale-with-shard-migration
    retries: 1
