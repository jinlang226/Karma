# workflows/suite/es-security-networking-snapshot
#
# ES: full security + networking chain with transport block and snapshot verification

metadata:
  id: es-security-networking-snapshot
  label: 'ES: full security + networking chain with transport block and snapshot verification'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: file-realm-user-roles-merge
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: transport-additional-ca-trust
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: seed-hosts-repair
    retries: 1
  - id: stage_05
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 1
