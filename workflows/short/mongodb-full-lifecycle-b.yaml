# workflows/suite/mongodb-full-lifecycle-b
#
# MongoDB full lifecycle B: deploy, auth, scaling, config tuning, monitoring, decommission

metadata:
  id: mongodb-full-lifecycle-b
  label: 'MongoDB full lifecycle B: deploy, auth, scaling, config tuning, monitoring, decommission'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: deploy
    retries: 0
  - id: stage_02
    service: mongodb
    case: password-rotation
    retries: 0
  - id: stage_03
    service: mongodb
    case: replica-scaling
    retries: 0
    param_overrides:
      target_replicas: 5
  - id: stage_04
    service: mongodb
    case: mongod-config-update
    retries: 0
  - id: stage_05
    service: mongodb
    case: monitoring-integration
    retries: 0
  - id: stage_06
    service: mongodb
    case: decommission
    retries: 0
