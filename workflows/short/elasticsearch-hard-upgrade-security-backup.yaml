# workflows/suite/elasticsearch-hard-upgrade-security-backup
#
# ES: hard HA upgrade then apply file realm and set up snapshot backup

metadata:
  id: elasticsearch-hard-upgrade-security-backup
  label: 'ES: hard HA upgrade then apply file realm and set up snapshot backup'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: full-restart-upgrade-ha-hard
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: file-realm-user-roles-merge
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 1
