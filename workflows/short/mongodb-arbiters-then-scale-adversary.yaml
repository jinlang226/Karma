# workflows/suite/mongodb-arbiters-then-scale-adversary
#
# MongoDB add arbiters for quorum then scale data-bearing replica members — with adversary injection

metadata:
  id: mongodb-arbiters-then-scale-adversary
  label: MongoDB add arbiters for quorum then scale data-bearing replica members — with adversary injection
spec:
  prompt_mode: progressive
  adversary:
  - scenario: param_drift
    inject_at_stage: stage_02
    param_overrides:
      drift_replicas: '4'
      restore_replicas: '5'
  stages:
  - id: stage_01
    service: mongodb
    case: arbiters
    retries: 1
  - id: stage_02
    service: mongodb
    case: replica-scaling
    retries: 1
    param_overrides:
      target_replicas: 5
