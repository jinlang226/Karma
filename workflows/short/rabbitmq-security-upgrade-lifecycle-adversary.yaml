# workflows/suite/rabbitmq-security-upgrade-lifecycle-adversary
#
# RabbitMQ: Security Hardening, TLS Rotation, and Rolling Upgrade — with adversary injection

metadata:
  id: rabbitmq-security-upgrade-lifecycle-adversary
  label: 'RabbitMQ: Security Hardening, TLS Rotation, and Rolling Upgrade — with adversary injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: block_amqp_network_policy
    inject_at_stage: stage_03
    lift_at_stage: stage_04
  stages:
  - id: stage_01
    service: rabbitmq
    case: classic_queue
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_02
    service: rabbitmq
    case: manual_user_permission
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_03
    service: rabbitmq
    case: manual_policy_sync
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_04
    service: rabbitmq
    case: manual_tls_rotation
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
      min_rotated_leaf_validity_days: '30'
  - id: stage_05
    service: rabbitmq
    case: manual_skip_upgrade
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
      from_version: '3.9'
      to_version: '4.1'
  - id: stage_06
    service: rabbitmq
    case: failover
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
