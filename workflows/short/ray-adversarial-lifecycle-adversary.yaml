# workflows/suite/ray-adversarial-lifecycle-adversary
#
# Ray full lifecycle under head-Service deletion fault — with adversary injection

metadata:
  id: ray-adversarial-lifecycle-adversary
  label: Ray full lifecycle under head-Service deletion fault — with adversary injection
spec:
  prompt_mode: progressive
  adversary:
  - scenario: delete_head_service
    inject_at_stage: stage_04
    lift_at_stage: stage_05
  stages:
  - id: stage_01
    service: ray
    case: deploy_cluster
    retries: 1
    param_overrides:
      worker_replicas: '2'
  - id: stage_02
    service: ray
    case: scale_workers
    retries: 1
    param_overrides:
      source_worker_replicas: '2'
      target_worker_replicas: '3'
  - id: stage_03
    service: ray
    case: dashboard_exposure
    retries: 1
    param_overrides:
      dashboard_port: '8265'
  - id: stage_04
    service: ray
    case: upgrade_version
    retries: 1
    param_overrides:
      from_image: rayproject/ray:2.8.0
      to_image: rayproject/ray:2.9.0
  - id: stage_05
    service: ray
    case: job_submission
    retries: 1
    param_overrides:
      expected_output: pong
  - id: stage_06
    service: ray
    case: teardown_cluster
    retries: 1
