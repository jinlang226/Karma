metadata:
  id: nginx-multihost-security-sweep
  label: Nginx ingress multi-host security sweep
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: create_ingress
    retries: 0
    param_overrides:
      host: api.generated.example.com
      path: /api
  - id: stage_02
    service: nginx-ingress
    case: renew_tls_secret
    retries: 0
    param_overrides:
      host: api.generated.example.com
  - id: stage_03
    service: nginx-ingress
    case: rate_limit_replica_hard
    retries: 0
    param_overrides:
      host: api.generated.example.com
      limit_rps: '1'
  - id: stage_04
    service: nginx-ingress
    case: otel_log_format
    retries: 0
    param_overrides:
      host: otel.generated.example.com
