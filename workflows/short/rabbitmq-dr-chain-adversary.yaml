# workflows/suite/rabbitmq-dr-chain-adversary
#
# RabbitMQ: Disaster Recovery — Failover, Policy Re-Sync, Backup — with adversary injection

metadata:
  id: rabbitmq-dr-chain-adversary
  label: 'RabbitMQ: Disaster Recovery — Failover, Policy Re-Sync, Backup — with adversary injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: delete_app_queue
    inject_at_stage: stage_02
    lift_at_stage: stage_03
  stages:
  - id: stage_01
    service: rabbitmq
    case: classic_queue
    retries: 1
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_02
    service: rabbitmq
    case: failover
    retries: 1
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_03
    service: rabbitmq
    case: manual_policy_sync
    retries: 1
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_04
    service: rabbitmq
    case: manual_backup_restore
    retries: 1
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
