metadata:
  id: elasticsearch-ingress-service-drift
  label: Elasticsearch ingress and internal service drift repair
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
  - id: stage_02
    service: elasticsearch
    case: secure-http-ingress
    retries: 0
  - id: stage_03
    service: elasticsearch
    case: internal-http-service-drift
    retries: 0
  - id: stage_04
    service: elasticsearch
    case: readonly-audit
    retries: 0
