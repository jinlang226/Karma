metadata:
  id: elasticsearch-ingress-service-drift
  label: Elasticsearch ingress hardening and audit chain
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: secure-http-ingress
    retries: 0
  - id: stage_02
    service: elasticsearch
    case: readonly-audit
    retries: 0
  - id: stage_03
    service: elasticsearch
    case: rollback-rehearsal
    retries: 0
