# workflows/suite/es-snapshot-backup-lifecycle
#
# ES: deploy cluster, configure MinIO snapshot repo, then verify backup

metadata:
  id: es-snapshot-backup-lifecycle
  label: 'ES: deploy cluster, configure MinIO snapshot repo, then verify backup'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: transform-job-recovery
    retries: 1
