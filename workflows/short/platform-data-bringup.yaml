# workflows/suite/platform-data-bringup
#
# Platform — data-tier bring-up: CockroachDB + MongoDB + Elasticsearch

metadata:
  id: platform-data-bringup
  label: 'Platform — data-tier bring-up: CockroachDB + MongoDB + Elasticsearch'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: deploy
    retries: 0
  - id: stage_02
    service: cockroachdb
    case: initialize
    retries: 0
  - id: stage_03
    service: mongodb
    case: deploy
    retries: 0
  - id: stage_04
    service: mongodb
    case: initialize
    retries: 0
  - id: stage_05
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
