metadata:
  id: ray-worker-image-drift-adversary
  label: Ray worker image drift recovery
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: ray
    case: deploy_cluster
    retries: 0
  - id: stage_02
    service: ray
    case: upgrade_version
    retries: 0
  - id: stage_03
    service: ray
    case: worker_recovery
    retries: 0
  - id: stage_04
    service: ray
    case: readonly-audit
    retries: 0
  adversary:
  - scenario: worker_image_drift
    inject_at_stage: stage_02
    lift_at_stage: stage_04
