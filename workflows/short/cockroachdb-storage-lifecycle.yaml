metadata:
  id: cockroachdb-storage-lifecycle
  label: CockroachDB decommission, storage, and lifecycle campaign
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: decommission
    retries: 0
  - id: stage_02
    service: cockroachdb
    case: partitioned-update
    retries: 0
  - id: stage_03
    service: cockroachdb
    case: monitoring-integration
    retries: 0
  - id: stage_04
    service: cockroachdb
    case: zone-config
    retries: 0
  - id: stage_05
    service: cockroachdb
    case: version-check
    retries: 0
    param_overrides:
      to_version: 24.1.1
