metadata:
  id: cockroachdb-storage-lifecycle
  label: CockroachDB storage and lifecycle campaign
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: deploy
    retries: 0
    param_overrides:
      storage_size_gi: 20
  - id: stage_02
    service: cockroachdb
    case: initialize
    retries: 0
    param_overrides:
      replica_count: 3
  - id: stage_03
    service: cockroachdb
    case: partitioned-update
    retries: 0
  - id: stage_04
    service: cockroachdb
    case: monitoring-integration
    retries: 0
  - id: stage_05
    service: cockroachdb
    case: decommission
    retries: 0
