# workflows/suite/cockroachdb-full-secure-lifecycle-adversary
#
# CockroachDB full secure lifecycle: TLS bring-up through cert rotation — with adversary injection

metadata:
  id: cockroachdb-full-secure-lifecycle-adversary
  label: 'CockroachDB full secure lifecycle: TLS bring-up through cert rotation — with adversary injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: delete_cert_secret
    inject_at_stage: stage_04
    lift_at_stage: stage_05
  stages:
  - id: stage_01
    service: cockroachdb
    case: deploy
    retries: 1
  - id: stage_02
    service: cockroachdb
    case: initialize
    retries: 1
  - id: stage_03
    service: cockroachdb
    case: generate-cert
    retries: 1
  - id: stage_04
    service: cockroachdb
    case: certificate-rotation
    retries: 1
  - id: stage_05
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 128MiB
  - id: stage_06
    service: cockroachdb
    case: zone-config
    retries: 1
  - id: stage_07
    service: cockroachdb
    case: version-check
    retries: 1
