# workflows/suite/rabbitmq-user-permission-management
#
# RabbitMQ: User Permission Setup and Security Hardening

metadata:
  id: rabbitmq-user-permission-management
  label: 'RabbitMQ: User Permission Setup and Security Hardening'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: rabbitmq
    case: classic_queue
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_02
    service: rabbitmq
    case: manual_user_permission
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
