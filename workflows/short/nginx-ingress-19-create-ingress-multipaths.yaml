# workflows/suite/nginx-ingress-19-create-ingress-multipaths
#
# nginx-ingress: create ingress for three successive path routes on the same host

metadata:
  id: nginx-ingress-19-create-ingress-multipaths
  label: 'nginx-ingress: create ingress for three successive path routes on the same host'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: create_ingress
    retries: 0
    param_overrides:
      host: api.example.com
      path: /api
  - id: stage_02
    service: nginx-ingress
    case: create_ingress
    retries: 0
    param_overrides:
      host: api.example.com
      path: /health
  - id: stage_03
    service: nginx-ingress
    case: create_ingress
    retries: 0
    param_overrides:
      host: api.example.com
      path: /admin
