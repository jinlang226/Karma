# workflows/suite/es-downscale-with-fault-adversary
#
# ES: master downscale with unexpected StatefulSet scale-down adversary — with adversary injection

metadata:
  id: es-downscale-with-fault-adversary
  label: 'ES: master downscale with unexpected StatefulSet scale-down adversary — with adversary injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: statefulset-scaled-down
    inject_at_stage: stage_02
    lift_at_stage: stage_03
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: master-downscale-voting-exclusions
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: safe-downscale-with-shard-migration
    retries: 1
