# workflows/suite/mongodb-tls-lifecycle-adversary
#
# MongoDB TLS lifecycle: enable TLS then rotate certificates — with adversary injection

metadata:
  id: mongodb-tls-lifecycle-adversary
  label: 'MongoDB TLS lifecycle: enable TLS then rotate certificates — with adversary injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: network_policy_block
    inject_at_stage: stage_02
  stages:
  - id: stage_01
    service: mongodb
    case: tls-setup
    retries: 1
  - id: stage_02
    service: mongodb
    case: certificate-rotation
    retries: 1
