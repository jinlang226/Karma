# workflows/long/platform-long-edge-ingress-platform
#
# Platform — edge ingress + backend store: NGINX + MongoDB + Elasticsearch

metadata:
  id: platform-edge-ingress-platform
  label: 'Platform — edge ingress + backend store: NGINX + MongoDB + Elasticsearch'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: create_ingress
    retries: 0
  - id: stage_02
    service: nginx-ingress
    case: ingress_canary
    retries: 0
  - id: stage_03
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 0
  - id: stage_04
    service: nginx-ingress
    case: renew_tls_secret
    retries: 0
  - id: stage_05
    service: nginx-ingress
    case: otel_log_format
    retries: 0
  - id: stage_06
    service: mongodb
    case: deploy
    retries: 0
  - id: stage_07
    service: mongodb
    case: initialize
    retries: 0
  - id: stage_08
    service: mongodb
    case: user-management
    retries: 0
  - id: stage_09
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
  - id: stage_10
    service: elasticsearch
    case: file-realm-user-roles-merge
    retries: 0
