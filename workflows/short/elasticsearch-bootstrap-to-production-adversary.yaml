# workflows/suite/elasticsearch-bootstrap-to-production-adversary
#
# ES: full production bring-up — bootstrap, file realm, monitoring, snapshot repo — with adversary injection

metadata:
  id: elasticsearch-bootstrap-to-production-adversary
  label: 'ES: full production bring-up — bootstrap, file realm, monitoring, snapshot repo — with adversary
    injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: snapshot-secret-wiped
    inject_at_stage: stage_04
    lift_at_stage: stage_05
  stages:
  - id: stage_01
    service: elasticsearch
    case: bootstrap-initial-master-nodes
    retries: 0
  - id: stage_02
    service: elasticsearch
    case: file-realm-user-roles-merge
    retries: 0
  - id: stage_03
    service: elasticsearch
    case: stack-monitoring-sidecars
    retries: 0
  - id: stage_04
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 0
  - id: stage_05
    service: elasticsearch
    case: rotate-http-certs
    retries: 0
