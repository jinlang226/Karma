metadata:
  id: elasticsearch-transport-block-adversary
  label: Elasticsearch transport network policy block recovery
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: transport-additional-ca-trust
    retries: 0
  - id: stage_02
    service: elasticsearch
    case: readonly-audit
    retries: 0
  - id: stage_03
    service: elasticsearch
    case: rollback-rehearsal
    retries: 0
  adversary:
  - scenario: transport-networkpolicy-block
    inject_at_stage: stage_01
    lift_at_stage: stage_03
