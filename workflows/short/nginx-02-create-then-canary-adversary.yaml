# workflows/suite/nginx-02-create-then-canary-adversary
#
# nginx-ingress: expose app then introduce canary split — with adversary injection

metadata:
  id: nginx-02-create-then-canary-adversary
  label: 'nginx-ingress: expose app then introduce canary split — with adversary injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: scale_down_backend
    inject_at_stage: stage_01
    lift_at_stage: stage_02
    param_overrides:
      deployment_name: demo-app
      restore_replicas: '1'
  stages:
  - id: stage_01
    service: nginx-ingress
    case: create_ingress
    retries: 1
    param_overrides:
      host: demo.example.com
      path: /app
  - id: stage_02
    service: nginx-ingress
    case: ingress_canary
    retries: 1
