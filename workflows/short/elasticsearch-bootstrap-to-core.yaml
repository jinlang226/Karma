# workflows/suite/elasticsearch-bootstrap-to-core
#
# ES: bootstrap master nodes then deploy a full secured cluster

metadata:
  id: elasticsearch-bootstrap-to-core
  label: 'ES: bootstrap master nodes then deploy a full secured cluster'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: bootstrap-initial-master-nodes
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: seed-hosts-repair
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: rotate-http-certs
    retries: 1
