metadata:
  id: elasticsearch-deploy-scale-transform-snapshot-concat-blind
  label: Elasticsearch deploy, scale, transform, and snapshot (concat_blind)
spec:
  prompt_mode: concat_blind
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
  - id: stage_02
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 0
  - id: stage_03
    service: elasticsearch
    case: transform-job-recovery
    retries: 0
  - id: stage_04
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 0
