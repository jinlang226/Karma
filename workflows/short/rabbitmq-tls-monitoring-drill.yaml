metadata:
  id: rabbitmq-tls-monitoring-drill
  label: RabbitMQ TLS rotation and monitoring drill
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: rabbitmq
    case: classic_queue
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_02
    service: rabbitmq
    case: manual_tls_rotation
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
      baseline_max_leaf_validity_days: 7
      min_rotated_leaf_validity_days: 45
  - id: stage_03
    service: rabbitmq
    case: manual_monitoring
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_04
    service: rabbitmq
    case: rollback-rehearsal
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
