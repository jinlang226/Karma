# workflows/suite/cockroachdb-incident-then-upgrade-adversary
#
# CockroachDB incident recovery then major version upgrade — with adversary injection

metadata:
  id: cockroachdb-incident-then-upgrade-adversary
  label: CockroachDB incident recovery then major version upgrade — with adversary injection
spec:
  prompt_mode: progressive
  adversary:
  - scenario: throttle_rebalance_rate
    inject_at_stage: stage_03
    lift_at_stage: stage_05
  stages:
  - id: stage_01
    service: cockroachdb
    case: health-check-recovery
    retries: 1
  - id: stage_02
    service: cockroachdb
    case: partitioned-update
    retries: 1
    param_overrides:
      to_version: 24.1.0
  - id: stage_03
    service: cockroachdb
    case: major-upgrade-finalize
    retries: 1
    param_overrides:
      from_version: '23.2'
      to_version: 24.1.0
  - id: stage_04
    service: cockroachdb
    case: version-check
    retries: 1
  - id: stage_05
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 128MiB
