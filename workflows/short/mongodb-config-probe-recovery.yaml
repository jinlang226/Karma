metadata:
  id: mongodb-config-probe-recovery
  label: MongoDB config update and probe recovery chain
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: deploy
    retries: 0
  - id: stage_02
    service: mongodb
    case: initialize
    retries: 0
  - id: stage_03
    service: mongodb
    case: mongod-config-update
    retries: 0
    param_overrides:
      target_journal_compressor: zlib
  - id: stage_04
    service: mongodb
    case: readiness-probe-tuning
    retries: 0
  - id: stage_05
    service: mongodb
    case: health-check-recovery
    retries: 0
