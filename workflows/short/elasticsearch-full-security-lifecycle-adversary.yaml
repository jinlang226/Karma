# workflows/suite/elasticsearch-full-security-lifecycle-adversary
#
# ES: full security lifecycle — file realm, password rotation, HTTP certs, ingress — with adversary injection

metadata:
  id: elasticsearch-full-security-lifecycle-adversary
  label: 'ES: full security lifecycle — file realm, password rotation, HTTP certs, ingress — with adversary
    injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: elastic-password-corrupted
    inject_at_stage: stage_03
    lift_at_stage: stage_04
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
  - id: stage_02
    service: elasticsearch
    case: file-realm-user-roles-merge
    retries: 0
  - id: stage_03
    service: elasticsearch
    case: rotate-elastic-password
    retries: 0
  - id: stage_04
    service: elasticsearch
    case: rotate-http-certs
    retries: 0
  - id: stage_05
    service: elasticsearch
    case: secure-http-ingress
    retries: 0
