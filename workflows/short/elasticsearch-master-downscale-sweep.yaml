metadata:
  id: elasticsearch-master-downscale-sweep
  label: Elasticsearch master downscale and voting exclusion sweep
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
  - id: stage_02
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 0
  - id: stage_03
    service: elasticsearch
    case: master-downscale-voting-exclusions
    retries: 0
  - id: stage_04
    service: elasticsearch
    case: safe-downscale-with-shard-migration
    retries: 0
