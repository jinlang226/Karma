metadata:
  id: cockroachdb-cert-ingress-monitor
  label: CockroachDB certs, ingress, and monitoring
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: deploy
    retries: 0
  - id: stage_02
    service: cockroachdb
    case: generate-cert
    retries: 0
  - id: stage_03
    service: cockroachdb
    case: certificate-rotation
    retries: 0
  - id: stage_04
    service: cockroachdb
    case: expose-ingress
    retries: 0
  - id: stage_05
    service: cockroachdb
    case: monitoring-integration
    retries: 0
