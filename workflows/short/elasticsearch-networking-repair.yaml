# workflows/suite/elasticsearch-networking-repair
#
# ES: fix internal HTTP service drift then repair seed hosts

metadata:
  id: elasticsearch-networking-repair
  label: 'ES: fix internal HTTP service drift then repair seed hosts'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: internal-http-service-drift
    retries: 0
  - id: stage_02
    service: elasticsearch
    case: seed-hosts-repair
    retries: 0
  - id: stage_03
    service: elasticsearch
    case: rotate-http-certs
    retries: 0
