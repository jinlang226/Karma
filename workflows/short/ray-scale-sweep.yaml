# workflows/suite/ray-scale-sweep
#
# Ray worker scaling sweep: 1 → 2 → 3 → 4 replicas

metadata:
  id: ray-scale-sweep
  label: 'Ray worker scaling sweep: 1 → 2 → 3 → 4 replicas'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: ray
    case: deploy_cluster
    retries: 0
    param_overrides:
      worker_replicas: '1'
  - id: stage_02
    service: ray
    case: scale_workers
    retries: 0
    param_overrides:
      source_worker_replicas: '1'
      target_worker_replicas: '2'
  - id: stage_03
    service: ray
    case: scale_workers
    retries: 0
    param_overrides:
      source_worker_replicas: '2'
      target_worker_replicas: '3'
  - id: stage_04
    service: ray
    case: scale_workers
    retries: 0
    param_overrides:
      source_worker_replicas: '3'
      target_worker_replicas: '4'
