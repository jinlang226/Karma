# workflows/long/spark-long-etl-oom-incident-response
#
# ETL OOM incident response drill: reproduce the OOM failure → tune runtime memory →
# apply skew/AQE optimizations → re-run ETL → validate streaming under load →
# production-readiness smoke deploy.

metadata:
  id: spark-etl-oom-incident-response
  label: 'ETL OOM incident response drill: OOM repro → memory tuning → AQE/skew → ETL re-run → streaming validation → production readiness'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: spark
    case: spark_etl_skew_oom
    retries: 0
  - id: stage_02
    service: spark
    case: spark_runtime_ops
    retries: 0
  - id: stage_03
    service: spark
    case: spark_data_skew
    retries: 0
  - id: stage_04
    service: spark
    case: spark_etl_skew_oom
    retries: 0
  - id: stage_05
    service: spark
    case: spark_runtime_ops
    retries: 0
  - id: stage_06
    service: spark
    case: spark_data_skew
    retries: 0
  - id: stage_07
    service: spark
    case: spark_etl_skew_oom
    retries: 0
  - id: stage_08
    service: spark
    case: spark_streaming_autoscale
    retries: 0
  - id: stage_09
    service: spark
    case: spark_runtime_ops
    retries: 0
  - id: stage_10
    service: spark
    case: deploy_spark_pi
    retries: 0
