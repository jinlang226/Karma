# workflows/long/rabbitmq-long-day3-hardening-01
#
# RabbitMQ: Day-3 Hardening — Post-upgrade All-controls Validation

metadata:
  id: rabbitmq-day3-hardening-01
  label: 'RabbitMQ: Day-3 Hardening — Post-upgrade All-controls Validation'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: scale_down_cluster
    inject_at_stage: stage_07
    lift_at_stage: stage_09
  stages:
  - id: stage_01
    service: rabbitmq
    case: failover
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_02
    service: rabbitmq
    case: classic_queue
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_03
    service: rabbitmq
    case: manual_skip_upgrade
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
      from_version: '3.12'
      to_version: '4.1'
  - id: stage_04
    service: rabbitmq
    case: manual_user_permission
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_05
    service: rabbitmq
    case: manual_policy_sync
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_06
    service: rabbitmq
    case: manual_monitoring
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_07
    service: rabbitmq
    case: manual_user_permission
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_08
    service: rabbitmq
    case: manual_policy_sync
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_09
    service: rabbitmq
    case: manual_monitoring
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq