# workflows/suite/elasticsearch-monitoring-upgrade-certs-adversary
#
# ES: enable monitoring sidecars then upgrade cluster and rotate HTTP certs — with adversary injection

metadata:
  id: elasticsearch-monitoring-upgrade-certs-adversary
  label: 'ES: enable monitoring sidecars then upgrade cluster and rotate HTTP certs — with adversary injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: http-service-selector-drift
    inject_at_stage: stage_02
    lift_at_stage: stage_04
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
  - id: stage_02
    service: elasticsearch
    case: stack-monitoring-sidecars
    retries: 0
  - id: stage_03
    service: elasticsearch
    case: full-restart-upgrade-ha
    retries: 0
  - id: stage_04
    service: elasticsearch
    case: rotate-http-certs
    retries: 0
  - id: stage_05
    service: elasticsearch
    case: rotate-elastic-password
    retries: 0
