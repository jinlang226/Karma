# workflows/suite/elasticsearch-bootstrap-to-production
#
# ES: full production bring-up — bootstrap, file realm, monitoring, snapshot repo

metadata:
  id: elasticsearch-bootstrap-to-production
  label: 'ES: full production bring-up — bootstrap, file realm, monitoring, snapshot repo'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: bootstrap-initial-master-nodes
    retries: 0
  - id: stage_02
    service: elasticsearch
    case: file-realm-user-roles-merge
    retries: 0
  - id: stage_03
    service: elasticsearch
    case: stack-monitoring-sidecars
    retries: 0
  - id: stage_04
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 0
  - id: stage_05
    service: elasticsearch
    case: rotate-http-certs
    retries: 0
