# workflows/suite/spark-pi-image-sweep
#
# SparkPi image version sweep — deploy and validate across successive patch releases

metadata:
  id: spark-pi-image-sweep
  label: SparkPi image version sweep — deploy and validate across successive patch releases
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: spark
    case: deploy_spark_pi
    retries: 1
    param_overrides:
      spark_image: apache/spark:3.5.1
  - id: stage_02
    service: spark
    case: deploy_spark_pi
    retries: 1
    param_overrides:
      spark_image: apache/spark:3.5.2
  - id: stage_03
    service: spark
    case: deploy_spark_pi
    retries: 1
    param_overrides:
      spark_image: apache/spark:3.5.3
  - id: stage_04
    service: spark
    case: deploy_spark_pi
    retries: 1
    param_overrides:
      spark_image: apache/spark:4.0.0
