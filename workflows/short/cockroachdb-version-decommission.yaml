metadata:
  id: cockroachdb-version-decommission
  label: CockroachDB version check and decommission chain
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: deploy
    retries: 0
  - id: stage_02
    service: cockroachdb
    case: initialize
    retries: 0
  - id: stage_03
    service: cockroachdb
    case: version-check
    retries: 0
  - id: stage_04
    service: cockroachdb
    case: decommission
    retries: 0
