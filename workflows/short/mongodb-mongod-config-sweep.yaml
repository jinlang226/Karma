# workflows/suite/mongodb-mongod-config-sweep
#
# MongoDB mongod config tuning sweep: cycle journal compressors

metadata:
  id: mongodb-mongod-config-sweep
  label: 'MongoDB mongod config tuning sweep: cycle journal compressors'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: mongod-config-update
    retries: 1
    param_overrides:
      target_journal_compressor: zlib
  - id: stage_02
    service: mongodb
    case: mongod-config-update
    retries: 1
    param_overrides:
      target_journal_compressor: zstd
  - id: stage_03
    service: mongodb
    case: mongod-config-update
    retries: 1
    param_overrides:
      target_journal_compressor: snappy
