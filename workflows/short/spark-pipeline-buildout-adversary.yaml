# workflows/suite/spark-pipeline-buildout-adversary
#
# Spark pipeline build-out — deploy batch job, diagnose data skew, tune ETL OOM — with adversary injection

metadata:
  id: spark-pipeline-buildout-adversary
  label: Spark pipeline build-out — deploy batch job, diagnose data skew, tune ETL OOM — with adversary
    injection
spec:
  prompt_mode: progressive
  adversary:
  - scenario: worker_scale_down
    inject_at_stage: stage_05
    lift_at_stage: stage_06
    param_overrides:
      namespace: spark-etl
  stages:
  - id: stage_01
    service: spark
    case: deploy_spark_pi
    retries: 0
  - id: stage_02
    service: spark
    case: deploy_spark_pi
    retries: 0
  - id: stage_03
    service: spark
    case: spark_data_skew
    retries: 0
  - id: stage_04
    service: spark
    case: spark_data_skew
    retries: 0
  - id: stage_05
    service: spark
    case: spark_etl_skew_oom
    retries: 0
  - id: stage_06
    service: spark
    case: spark_etl_skew_oom
    retries: 0
