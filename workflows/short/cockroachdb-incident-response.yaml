# workflows/long/cockroachdb-long-incident-response
#
# CockroachDB incident response drill: health failure recovery, cert rotation, and post-incident hardening

metadata:
  id: cockroachdb-incident-response
  label: 'CockroachDB incident response drill: health failure recovery, cert rotation, and post-incident
    hardening'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: deploy
    retries: 0
  - id: stage_02
    service: cockroachdb
    case: initialize
    retries: 0
  - id: stage_03
    service: cockroachdb
    case: generate-cert
    retries: 0
  - id: stage_04
    service: cockroachdb
    case: certificate-rotation
    retries: 0
  - id: stage_05
    service: cockroachdb
    case: cluster-settings
    retries: 0
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 64MiB
  - id: stage_06
    service: cockroachdb
    case: cluster-settings
    retries: 0
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 128MiB
  - id: stage_07
    service: cockroachdb
    case: zone-config
    retries: 0
    param_overrides:
      gc_ttl_seconds: 14400
  - id: stage_08
    service: cockroachdb
    case: monitoring-integration
    retries: 0
  - id: stage_09
    service: cockroachdb
    case: expose-ingress
    retries: 0
  - id: stage_10
    service: cockroachdb
    case: version-check
    retries: 0
    param_overrides:
      report_key: post_incident_version
