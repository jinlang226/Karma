# workflows/suite/mongodb-deploy-arbiters-roles-adversary
#
# MongoDB bring-up with arbiters for election stability and custom role RBAC — with adversary injection

metadata:
  id: mongodb-deploy-arbiters-roles-adversary
  label: MongoDB bring-up with arbiters for election stability and custom role RBAC — with adversary injection
spec:
  prompt_mode: progressive
  adversary:
  - scenario: scale_down_replica
    inject_at_stage: stage_02
    lift_at_stage: stage_03
  stages:
  - id: stage_01
    service: mongodb
    case: deploy
    retries: 1
  - id: stage_02
    service: mongodb
    case: arbiters
    retries: 1
  - id: stage_03
    service: mongodb
    case: custom-roles
    retries: 1
  - id: stage_04
    service: mongodb
    case: user-management
    retries: 1
