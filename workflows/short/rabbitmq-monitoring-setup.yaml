# workflows/suite/rabbitmq-monitoring-setup
#
# RabbitMQ: Cluster Setup then Prometheus Monitoring Wiring

metadata:
  id: rabbitmq-monitoring-setup
  label: 'RabbitMQ: Cluster Setup then Prometheus Monitoring Wiring'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: rabbitmq
    case: classic_queue
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_02
    service: rabbitmq
    case: manual_monitoring
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
