# workflows/suite/platform-polyglot-persistence
#
# Platform — polyglot persistence day-1: MongoDB + CockroachDB

metadata:
  id: platform-polyglot-persistence
  label: 'Platform — polyglot persistence day-1: MongoDB + CockroachDB'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: deploy
    retries: 1
  - id: stage_02
    service: mongodb
    case: initialize
    retries: 1
  - id: stage_03
    service: cockroachdb
    case: deploy
    retries: 1
  - id: stage_04
    service: cockroachdb
    case: initialize
    retries: 1
