# workflows/suite/cockroachdb-upgrade-decommission
#
# CockroachDB upgrade then decommission: major upgrade, rolling update, then scale to 3

metadata:
  id: cockroachdb-upgrade-decommission
  label: 'CockroachDB upgrade then decommission: major upgrade, rolling update, then scale to 3'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: major-upgrade-finalize
    retries: 1
    param_overrides:
      from_version: '23.2'
      to_version: 24.1.0
  - id: stage_02
    service: cockroachdb
    case: partitioned-update
    retries: 1
    param_overrides:
      to_version: 24.1.1
  - id: stage_03
    service: cockroachdb
    case: version-check
    retries: 1
  - id: stage_04
    service: cockroachdb
    case: decommission
    retries: 1
  - id: stage_05
    service: cockroachdb
    case: zone-config
    retries: 1
    param_overrides:
      num_replicas: '3'
      gc_ttl_seconds: '14400'
