# workflows/long/mongodb-long-full-lifecycle-d
#
# MongoDB full lifecycle D: deploy → init → statefulset-custom → external-access → scale → custom-roles → TLS → monitor → cert-rotate → password-rotation → decomm (secret-corruption adversary)

metadata:
  id: mongodb-full-lifecycle-d
  label: 'MongoDB full lifecycle D: deploy → init → statefulset-custom → external-access → scale → custom-roles
    → TLS → monitor → cert-rotate → password-rotation → decomm (secret-corruption adversary)'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: secret_corruption
    inject_at_stage: stage_06
    lift_at_stage: stage_08
  stages:
  - id: stage_01
    service: mongodb
    case: deploy
    retries: 0
  - id: stage_02
    service: mongodb
    case: initialize
    retries: 0
  - id: stage_03
    service: mongodb
    case: statefulset-customization
    retries: 0
  - id: stage_04
    service: mongodb
    case: external-access-horizons
    retries: 0
  - id: stage_05
    service: mongodb
    case: replica-scaling
    retries: 0
    param_overrides:
      target_replicas: '5'
  - id: stage_06
    service: mongodb
    case: custom-roles
    retries: 0
  - id: stage_07
    service: mongodb
    case: tls-setup
    retries: 0
  - id: stage_08
    service: mongodb
    case: monitoring-integration
    retries: 0
  - id: stage_09
    service: mongodb
    case: certificate-rotation
    retries: 0
  - id: stage_10
    service: mongodb
    case: password-rotation
    retries: 0
