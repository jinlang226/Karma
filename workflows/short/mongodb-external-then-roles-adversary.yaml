# workflows/suite/mongodb-external-then-roles-adversary
#
# MongoDB external access horizons then custom roles — with adversary injection

metadata:
  id: mongodb-external-then-roles-adversary
  label: MongoDB external access horizons then custom roles — with adversary injection
spec:
  prompt_mode: progressive
  adversary:
  - scenario: network_policy_block
    inject_at_stage: stage_01
    lift_at_stage: stage_02
  stages:
  - id: stage_01
    service: mongodb
    case: external-access-horizons
    retries: 0
  - id: stage_02
    service: mongodb
    case: custom-roles
    retries: 0
