# workflows/suite/elasticsearch-upgrade-and-observability
#
# ES: HA upgrade then enable monitoring sidecars and snapshot backup

metadata:
  id: elasticsearch-upgrade-and-observability
  label: 'ES: HA upgrade then enable monitoring sidecars and snapshot backup'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: full-restart-upgrade-ha
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: stack-monitoring-sidecars
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 1
  - id: stage_05
    service: elasticsearch
    case: transform-job-recovery
    retries: 1
