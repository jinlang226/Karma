# workflows/long/elasticsearch-long-security-campaign
#
# Elasticsearch security hardening campaign: auth, TLS, transport, ingress

metadata:
  id: elasticsearch-security-campaign
  label: 'Elasticsearch security hardening campaign: auth, TLS, transport, ingress'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: statefulset-scaled-down
    inject_at_stage: stage_04
    lift_at_stage: stage_05
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
  - id: stage_02
    service: elasticsearch
    case: file-realm-user-roles-merge
    retries: 0
  - id: stage_03
    service: elasticsearch
    case: rotate-elastic-password
    retries: 0
  - id: stage_04
    service: elasticsearch
    case: rotate-http-certs
    retries: 0
  - id: stage_05
    service: elasticsearch
    case: secure-http-ingress
    retries: 0
  - id: stage_06
    service: elasticsearch
    case: file-realm-user-roles-merge
    retries: 0
  - id: stage_07
    service: elasticsearch
    case: rotate-elastic-password
    retries: 0
  - id: stage_08
    service: elasticsearch
    case: rotate-http-certs
    retries: 0
  - id: stage_09
    service: elasticsearch
    case: secure-http-ingress
    retries: 0
