# workflows/suite/elasticsearch-config-drift-recovery
#
# ES: seed-hosts ConfigMap drift recovery followed by transform job recovery

metadata:
  id: elasticsearch-config-drift-recovery
  label: 'ES: seed-hosts ConfigMap drift recovery followed by transform job recovery'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: seed-hosts-repair
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: transform-job-recovery
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: rotate-http-certs
    retries: 1
