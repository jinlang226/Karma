metadata:
  id: ray-recovery-after-scale
  label: Ray worker recovery after scaling
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: ray
    case: deploy_cluster
    retries: 0
  - id: stage_02
    service: ray
    case: scale_workers
    retries: 0
  - id: stage_03
    service: ray
    case: worker_recovery
    retries: 0
  - id: stage_04
    service: ray
    case: rollback-rehearsal
    retries: 0
