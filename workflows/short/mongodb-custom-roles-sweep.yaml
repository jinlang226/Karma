# workflows/suite/mongodb-custom-roles-sweep
#
# MongoDB custom roles progressive sweep: tighten role from rawRead to reportsRead

metadata:
  id: mongodb-custom-roles-sweep
  label: 'MongoDB custom roles progressive sweep: tighten role from rawRead to reportsRead'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: custom-roles
    retries: 0
  - id: stage_02
    service: mongodb
    case: custom-roles
    retries: 0
    param_overrides:
      bad_role_name: overReadRole
  - id: stage_03
    service: mongodb
    case: custom-roles
    retries: 0
    param_overrides:
      bad_role_name: dbAdminRole
