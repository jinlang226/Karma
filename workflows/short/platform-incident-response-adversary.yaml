# workflows/suite/platform-incident-response-adversary
#
# Platform — multi-system incident response: MongoDB + CockroachDB recovery — with adversary injection

metadata:
  id: platform-incident-response-adversary
  label: 'Platform — multi-system incident response: MongoDB + CockroachDB recovery — with adversary injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: primary_stepdown
    inject_at_stage: stage_02
  stages:
  - id: stage_01
    service: mongodb
    case: deploy
    retries: 0
  - id: stage_02
    service: mongodb
    case: health-check-recovery
    retries: 0
  - id: stage_03
    service: cockroachdb
    case: deploy
    retries: 0
  - id: stage_04
    service: cockroachdb
    case: health-check-recovery
    retries: 0
