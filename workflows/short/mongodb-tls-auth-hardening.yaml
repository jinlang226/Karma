# workflows/suite/mongodb-tls-auth-hardening
#
# MongoDB TLS and auth hardening: deploy, enable TLS, configure custom roles

metadata:
  id: mongodb-tls-auth-hardening
  label: 'MongoDB TLS and auth hardening: deploy, enable TLS, configure custom roles'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: deploy
    retries: 0
  - id: stage_02
    service: mongodb
    case: tls-setup
    retries: 0
  - id: stage_03
    service: mongodb
    case: custom-roles
    retries: 0
  - id: stage_04
    service: mongodb
    case: user-management
    retries: 0
