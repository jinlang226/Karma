# workflows/suite/crdb-upgrade-lifecycle-adversary
#
# CockroachDB full upgrade lifecycle: rolling update then major finalize — with adversary injection

metadata:
  id: crdb-upgrade-lifecycle-adversary
  label: 'CockroachDB full upgrade lifecycle: rolling update then major finalize — with adversary injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: scale_down_node
    inject_at_stage: stage_02
    lift_at_stage: stage_03
  stages:
  - id: stage_01
    service: cockroachdb
    case: version-check
    retries: 1
    param_overrides:
      from_version: '23.2'
      to_version: 24.1.0
  - id: stage_02
    service: cockroachdb
    case: partitioned-update
    retries: 1
    param_overrides:
      to_version: 24.1.0
  - id: stage_03
    service: cockroachdb
    case: major-upgrade-finalize
    retries: 1
    param_overrides:
      from_version: '23.2'
      to_version: 24.1.0
  - id: stage_04
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 128MiB
  - id: stage_05
    service: cockroachdb
    case: zone-config
    retries: 1
