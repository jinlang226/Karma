# workflows/suite/rabbitmq-upgrade-then-tls-adversary
#
# RabbitMQ: Rolling Upgrade 3.9 → 4.1 then TLS Certificate Rotation — with adversary injection

metadata:
  id: rabbitmq-upgrade-then-tls-adversary
  label: 'RabbitMQ: Rolling Upgrade 3.9 → 4.1 then TLS Certificate Rotation — with adversary injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: clear_ha_policy
    inject_at_stage: stage_01
    lift_at_stage: stage_02
  stages:
  - id: stage_01
    service: rabbitmq
    case: classic_queue
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_02
    service: rabbitmq
    case: manual_skip_upgrade
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
      from_version: '3.12'
      to_version: '4.1'
  - id: stage_03
    service: rabbitmq
    case: manual_tls_rotation
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
      min_rotated_leaf_validity_days: '30'
