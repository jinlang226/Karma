metadata:
  id: ray-dashboard-job-chain-concat-stateful
  label: Ray dashboard and job submission chain (concat_stateful)
spec:
  prompt_mode: concat_stateful
  stages:
  - id: stage_01
    service: ray
    case: deploy_cluster
    retries: 0
    param_overrides:
      worker_replicas: 2
  - id: stage_02
    service: ray
    case: dashboard_exposure
    retries: 0
  - id: stage_03
    service: ray
    case: job_submission
    retries: 0
  - id: stage_04
    service: ray
    case: readonly-audit
    retries: 0
