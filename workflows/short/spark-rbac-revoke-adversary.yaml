metadata:
  id: spark-rbac-revoke-adversary
  label: Spark RBAC revoke recovery
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: spark
    case: deploy_spark_pi
    retries: 0
  - id: stage_02
    service: spark
    case: spark_runtime_ops
    retries: 0
  - id: stage_03
    service: spark
    case: rollback-rehearsal
    retries: 0
  adversary:
  - scenario: rbac_role_revoke
    inject_at_stage: stage_02
    lift_at_stage: stage_03
