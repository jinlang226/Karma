# workflows/suite/nginx-20-ratelimit-hard-then-tls
#
# nginx-ingress: incident response — hard rate limit then TLS cert renewal

metadata:
  id: nginx-20-ratelimit-hard-then-tls
  label: 'nginx-ingress: incident response — hard rate limit then TLS cert renewal'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: rate_limit_replica_hard
    retries: 1
    param_overrides:
      limit_rps: '1'
  - id: stage_02
    service: nginx-ingress
    case: renew_tls_secret
    retries: 1
