# workflows/long/elasticsearch-long-zero-downtime-maintenance
#
# Elasticsearch zero-downtime maintenance window: rotation, upgrade, scaling

metadata:
  id: elasticsearch-zero-downtime-maintenance
  label: 'Elasticsearch zero-downtime maintenance window: rotation, upgrade, scaling'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
  - id: stage_02
    service: elasticsearch
    case: rotate-elastic-password
    retries: 0
  - id: stage_03
    service: elasticsearch
    case: rotate-http-certs
    retries: 0
  - id: stage_04
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 0
  - id: stage_05
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 0
  - id: stage_06
    service: elasticsearch
    case: rotate-elastic-password
    retries: 0
  - id: stage_07
    service: elasticsearch
    case: rotate-http-certs
    retries: 0
  - id: stage_08
    service: elasticsearch
    case: stack-monitoring-sidecars
    retries: 0
