# workflows/suite/mongodb-decommission-member
#
# MongoDB decommission: bring up replica set then safely remove a member

metadata:
  id: mongodb-decommission-member
  label: 'MongoDB decommission: bring up replica set then safely remove a member'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: deploy
    retries: 1
  - id: stage_02
    service: mongodb
    case: initialize
    retries: 1
  - id: stage_03
    service: mongodb
    case: decommission
    retries: 1
