# workflows/suite/cockroachdb-decommission-zone-adversary
#
# CockroachDB node decommission then zone-config rebalance — with adversary injection

metadata:
  id: cockroachdb-decommission-zone-adversary
  label: CockroachDB node decommission then zone-config rebalance — with adversary injection
spec:
  prompt_mode: progressive
  adversary:
  - scenario: throttle_rebalance_rate
    inject_at_stage: stage_02
    lift_at_stage: stage_04
  stages:
  - id: stage_01
    service: cockroachdb
    case: decommission
    retries: 1
  - id: stage_02
    service: cockroachdb
    case: zone-config
    retries: 1
    param_overrides:
      num_replicas: '3'
      gc_ttl_seconds: '7200'
  - id: stage_03
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 128MiB
  - id: stage_04
    service: cockroachdb
    case: version-check
    retries: 1
