# workflows/suite/mongodb-scale-then-probe-hardening-adversary
#
# MongoDB scale-up then readiness probe hardening for larger replica set — with adversary injection

metadata:
  id: mongodb-scale-then-probe-hardening-adversary
  label: MongoDB scale-up then readiness probe hardening for larger replica set — with adversary injection
spec:
  prompt_mode: progressive
  adversary:
  - scenario: scale_down_replica
    inject_at_stage: stage_01
    param_overrides:
      wrong_replicas: '1'
      restore_replicas: '5'
  stages:
  - id: stage_01
    service: mongodb
    case: replica-scaling
    retries: 0
    param_overrides:
      target_replicas: 5
  - id: stage_02
    service: mongodb
    case: readiness-probe-tuning
    retries: 0
