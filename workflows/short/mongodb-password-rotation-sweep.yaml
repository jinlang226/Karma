# workflows/suite/mongodb-password-rotation-sweep
#
# MongoDB password rotation sweep: rotate app-user then reporting-user credentials

metadata:
  id: mongodb-password-rotation-sweep
  label: 'MongoDB password rotation sweep: rotate app-user then reporting-user credentials'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: password-rotation
    retries: 1
  - id: stage_02
    service: mongodb
    case: password-rotation
    retries: 1
    param_overrides:
      app_username: reporting-user
      app_secret_name: reporting-user-password
      app_next_secret_name: reporting-user-password-next
