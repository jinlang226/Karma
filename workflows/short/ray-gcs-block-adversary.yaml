metadata:
  id: ray-gcs-block-adversary
  label: Ray GCS network block recovery
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: ray
    case: deploy_cluster
    retries: 0
  - id: stage_02
    service: ray
    case: scale_workers
    retries: 0
  - id: stage_03
    service: ray
    case: worker_recovery
    retries: 0
  - id: stage_04
    service: ray
    case: rollback-rehearsal
    retries: 0
  adversary:
  - scenario: block_gcs_port
    inject_at_stage: stage_02
    lift_at_stage: stage_04
