# workflows/suite/elasticsearch-scaling-sweep
#
# ES: scaling sweep — scale up new nodeset then safely downscale with shard migration

metadata:
  id: elasticsearch-scaling-sweep
  label: 'ES: scaling sweep — scale up new nodeset then safely downscale with shard migration'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
  - id: stage_02
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 0
  - id: stage_03
    service: elasticsearch
    case: master-downscale-voting-exclusions
    retries: 0
  - id: stage_04
    service: elasticsearch
    case: safe-downscale-with-shard-migration
    retries: 0
