# workflows/suite/elasticsearch-incident-response-chain
#
# ES: incident response — repair seed hosts, recover transform, migrate shards

metadata:
  id: elasticsearch-incident-response-chain
  label: 'ES: incident response — repair seed hosts, recover transform, migrate shards'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: seed-hosts-repair
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: transform-job-recovery
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: safe-downscale-with-shard-migration
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 1
