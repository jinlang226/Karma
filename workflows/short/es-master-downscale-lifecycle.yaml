# workflows/suite/es-master-downscale-lifecycle
#
# ES: deploy cluster then perform master downscale with voting exclusions

metadata:
  id: es-master-downscale-lifecycle
  label: 'ES: deploy cluster then perform master downscale with voting exclusions'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: seed-hosts-repair
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: master-downscale-voting-exclusions
    retries: 1
