metadata:
  id: elasticsearch-discovery-drift-adversary
  label: Elasticsearch seed host drift recovery
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
  - id: stage_02
    service: elasticsearch
    case: seed-hosts-repair
    retries: 0
  - id: stage_03
    service: elasticsearch
    case: full-restart-upgrade-ha
    retries: 0
  - id: stage_04
    service: elasticsearch
    case: readonly-audit
    retries: 0
  adversary:
  - scenario: es-config-seed-hosts-drift
    inject_at_stage: stage_02
    lift_at_stage: stage_04
