metadata:
  id: nginx-delete-tls-adversary
  label: Nginx ingress deleted TLS secret recovery
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: create_ingress
    retries: 0
  - id: stage_02
    service: nginx-ingress
    case: renew_tls_secret
    retries: 0
  - id: stage_03
    service: nginx-ingress
    case: readonly-audit
    retries: 0
  adversary:
  - scenario: delete_tls_secret
    inject_at_stage: stage_02
    lift_at_stage: stage_03
