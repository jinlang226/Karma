# workflows/suite/ray-scale-down-sweep
#
# Ray worker scale-down sweep: 5 → 3 → 1 replicas (decommission ramp)

metadata:
  id: ray-scale-down-sweep
  label: 'Ray worker scale-down sweep: 5 → 3 → 1 replicas (decommission ramp)'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: ray
    case: deploy_cluster
    retries: 1
    param_overrides:
      worker_replicas: '5'
  - id: stage_02
    service: ray
    case: scale_workers
    retries: 1
    param_overrides:
      source_worker_replicas: '5'
      target_worker_replicas: '3'
  - id: stage_03
    service: ray
    case: scale_workers
    retries: 1
    param_overrides:
      source_worker_replicas: '3'
      target_worker_replicas: '1'
  - id: stage_04
    service: ray
    case: teardown_cluster
    retries: 1
