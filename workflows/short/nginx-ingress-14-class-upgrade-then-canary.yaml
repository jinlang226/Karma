# workflows/suite/nginx-ingress-14-class-upgrade-then-canary
#
# nginx-ingress: class-only controller upgrade then canary traffic split

metadata:
  id: nginx-ingress-14-class-upgrade-then-canary
  label: 'nginx-ingress: class-only controller upgrade then canary traffic split'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: class_only_upgrade
    retries: 1
  - id: stage_02
    service: nginx-ingress
    case: ingress_canary
    retries: 1
