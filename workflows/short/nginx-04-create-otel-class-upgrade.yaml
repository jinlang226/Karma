# workflows/suite/nginx-04-create-otel-class-upgrade
#
# nginx-ingress: expose app, enable OTel logging, then upgrade ingress class

metadata:
  id: nginx-04-create-otel-class-upgrade
  label: 'nginx-ingress: expose app, enable OTel logging, then upgrade ingress class'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: create_ingress
    retries: 1
    param_overrides:
      host: demo.example.com
      path: /api
  - id: stage_02
    service: nginx-ingress
    case: otel_log_format
    retries: 1
  - id: stage_03
    service: nginx-ingress
    case: class_only_upgrade
    retries: 1
