# workflows/long/elasticsearch-long-day2-operations
#
# Elasticsearch day-2 operations marathon: config tuning and maintenance

metadata:
  id: elasticsearch-day2-operations
  label: 'Elasticsearch day-2 operations marathon: config tuning and maintenance'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
  - id: stage_02
    service: elasticsearch
    case: seed-hosts-repair
    retries: 0
  - id: stage_03
    service: elasticsearch
    case: rotate-elastic-password
    retries: 0
  - id: stage_04
    service: elasticsearch
    case: file-realm-user-roles-merge
    retries: 0
  - id: stage_05
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 0
  - id: stage_06
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 0
  - id: stage_07
    service: elasticsearch
    case: rotate-http-certs
    retries: 0
  - id: stage_08
    service: elasticsearch
    case: transform-job-recovery
    retries: 0
  - id: stage_09
    service: elasticsearch
    case: stack-monitoring-sidecars
    retries: 0
