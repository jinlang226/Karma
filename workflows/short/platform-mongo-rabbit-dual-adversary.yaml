metadata:
  id: platform-mongo-rabbit-dual-adversary
  label: Platform MongoDB and RabbitMQ dual adversary chain
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: deploy
    retries: 0
  - id: stage_02
    service: mongodb
    case: initialize
    retries: 0
  - id: stage_03
    service: mongodb
    case: password-rotation
    retries: 0
  - id: stage_04
    service: rabbitmq
    case: classic_queue
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_05
    service: rabbitmq
    case: manual_user_permission
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_06
    service: rabbitmq
    case: manual_monitoring
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  adversary:
  - scenario: secret_corruption
    inject_at_stage: stage_03
    lift_at_stage: stage_04
  - scenario: revoke_app_user_permissions
    inject_at_stage: stage_05
    lift_at_stage: stage_06
