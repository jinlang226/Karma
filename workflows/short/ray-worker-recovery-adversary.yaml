# workflows/suite/ray-worker-recovery-adversary
#
# Ray worker crash-loop incident response — with adversary injection

metadata:
  id: ray-worker-recovery-adversary
  label: Ray worker crash-loop incident response — with adversary injection
spec:
  prompt_mode: progressive
  adversary:
  - scenario: scale_down_workers
    inject_at_stage: stage_03
    lift_at_stage: stage_04
    param_overrides:
      wrong_replicas: '1'
      restore_replicas: '3'
  stages:
  - id: stage_01
    service: ray
    case: deploy_cluster
    retries: 0
    param_overrides:
      worker_replicas: '2'
  - id: stage_02
    service: ray
    case: worker_recovery
    retries: 0
  - id: stage_03
    service: ray
    case: scale_workers
    retries: 0
    param_overrides:
      source_worker_replicas: '2'
      target_worker_replicas: '3'
  - id: stage_04
    service: ray
    case: job_submission
    retries: 0
    param_overrides:
      expected_output: pong
