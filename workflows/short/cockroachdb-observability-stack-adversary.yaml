# workflows/suite/cockroachdb-observability-stack-adversary
#
# CockroachDB observability: monitoring integration + zone config + version check — with adversary injection

metadata:
  id: cockroachdb-observability-stack-adversary
  label: 'CockroachDB observability: monitoring integration + zone config + version check — with adversary
    injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: throttle_rebalance_rate
    inject_at_stage: stage_03
    lift_at_stage: stage_04
  stages:
  - id: stage_01
    service: cockroachdb
    case: monitoring-integration
    retries: 1
  - id: stage_02
    service: cockroachdb
    case: zone-config
    retries: 1
    param_overrides:
      gc_ttl_seconds: '7200'
  - id: stage_03
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 128MiB
  - id: stage_04
    service: cockroachdb
    case: version-check
    retries: 1
