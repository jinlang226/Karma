# workflows/suite/nginx-ingress-12-ratelimit-otel-tls
#
# nginx-ingress: rate limit, add OTel tracing, then renew TLS

metadata:
  id: nginx-ingress-12-ratelimit-otel-tls
  label: 'nginx-ingress: rate limit, add OTel tracing, then renew TLS'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 1
    param_overrides:
      limit_rps: '3'
  - id: stage_02
    service: nginx-ingress
    case: otel_log_format
    retries: 1
  - id: stage_03
    service: nginx-ingress
    case: renew_tls_secret
    retries: 1
