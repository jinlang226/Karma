metadata:
  id: nginx-class-upgrade-ratelimit
  label: Nginx ingress class upgrade and rate limit sweep
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: class_only_upgrade
    retries: 0
  - id: stage_02
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 0
    param_overrides:
      limit_rps: '3'
  - id: stage_03
    service: nginx-ingress
    case: rollback-rehearsal
    retries: 0
