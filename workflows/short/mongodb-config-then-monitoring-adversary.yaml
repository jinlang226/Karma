# workflows/suite/mongodb-config-then-monitoring-adversary
#
# MongoDB config tuning followed by Prometheus monitoring integration — with adversary injection

metadata:
  id: mongodb-config-then-monitoring-adversary
  label: MongoDB config tuning followed by Prometheus monitoring integration — with adversary injection
spec:
  prompt_mode: progressive
  adversary:
  - scenario: primary_stepdown
    inject_at_stage: stage_02
  stages:
  - id: stage_01
    service: mongodb
    case: mongod-config-update
    retries: 1
  - id: stage_02
    service: mongodb
    case: monitoring-integration
    retries: 1
