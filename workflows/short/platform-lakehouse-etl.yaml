# workflows/suite/platform-lakehouse-etl
#
# Platform — lakehouse ETL: Spark transforms feeding Elasticsearch

metadata:
  id: platform-lakehouse-etl
  label: 'Platform — lakehouse ETL: Spark transforms feeding Elasticsearch'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
  - id: stage_02
    service: spark
    case: deploy_spark_pi
    retries: 0
  - id: stage_03
    service: spark
    case: spark_etl_skew_oom
    retries: 0
  - id: stage_04
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 0
