# workflows/suite/mongodb-full-lifecycle-a-adversary
#
# MongoDB full lifecycle A: deploy, init, TLS, custom roles, upgrade, decommission — with adversary injection

metadata:
  id: mongodb-full-lifecycle-a-adversary
  label: 'MongoDB full lifecycle A: deploy, init, TLS, custom roles, upgrade, decommission — with adversary
    injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: network_policy_block
    inject_at_stage: stage_04
    lift_at_stage: stage_05
  stages:
  - id: stage_01
    service: mongodb
    case: version-upgrade
    retries: 0
  - id: stage_02
    service: mongodb
    case: deploy
    retries: 0
  - id: stage_03
    service: mongodb
    case: initialize
    retries: 0
  - id: stage_04
    service: mongodb
    case: tls-setup
    retries: 0
  - id: stage_05
    service: mongodb
    case: custom-roles
    retries: 0
  - id: stage_06
    service: mongodb
    case: decommission
    retries: 0
