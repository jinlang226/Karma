# workflows/suite/ray-recovery-upgrade-dashboard-adversary
#
# Ray worker recovery → version upgrade → dashboard exposure — with adversary injection

metadata:
  id: ray-recovery-upgrade-dashboard-adversary
  label: Ray worker recovery → version upgrade → dashboard exposure — with adversary injection
spec:
  prompt_mode: progressive
  adversary:
  - scenario: block_gcs_port
    inject_at_stage: stage_03
    lift_at_stage: stage_04
  stages:
  - id: stage_01
    service: ray
    case: deploy_cluster
    retries: 1
    param_overrides:
      worker_replicas: '2'
  - id: stage_02
    service: ray
    case: worker_recovery
    retries: 1
  - id: stage_03
    service: ray
    case: upgrade_version
    retries: 1
    param_overrides:
      from_image: rayproject/ray:2.8.0
      to_image: rayproject/ray:2.9.0
  - id: stage_04
    service: ray
    case: dashboard_exposure
    retries: 1
    param_overrides:
      dashboard_port: '8265'
  - id: stage_05
    service: ray
    case: job_submission
    retries: 1
    param_overrides:
      expected_output: pong
