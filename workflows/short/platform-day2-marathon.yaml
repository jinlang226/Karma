    case: generate-cert
    retries: 0
  - id: stage_04
    service: mongodb
    case: deploy
    retries: 0
  - id: stage_05
    service: mongodb
    case: initialize
    retries: 0
  - id: stage_06
    service: mongodb
    case: user-management
    retries: 0
  - id: stage_07
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
  - id: stage_08
    service: elasticsearch
    case: file-realm-user-roles-merge
    retries: 0
  - id: stage_09
    service: spark
    case: deploy_spark_pi
    retries: 0
