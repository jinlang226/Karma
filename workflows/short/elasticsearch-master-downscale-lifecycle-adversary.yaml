# workflows/suite/elasticsearch-master-downscale-lifecycle-adversary
#
# ES: deploy cluster then perform master downscale with voting exclusions — with adversary injection

metadata:
  id: elasticsearch-master-downscale-lifecycle-adversary
  label: 'ES: deploy cluster then perform master downscale with voting exclusions — with adversary injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: statefulset-scaled-down
    inject_at_stage: stage_02
    lift_at_stage: stage_03
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: seed-hosts-repair
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: master-downscale-voting-exclusions
    retries: 1
