# workflows/long/spark-long-full-lifecycle
#
# Spark data-platform full lifecycle: deploy and bump across image versions →
# data-skew tuning → ETL-OOM remediation → runtime ops → multi-tenant governance →
# streaming validation under load.

metadata:
  id: spark-full-lifecycle-ext
  label: 'Spark data-platform full lifecycle: deploy → image bump → skew → ETL-OOM → runtime-ops → multi-tenant → streaming'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: spark
    case: deploy_spark_pi
    retries: 0
  - id: stage_02
    service: spark
    case: deploy_spark_pi
    retries: 0
    param_overrides:
      spark_image: apache/spark:3.5.1
  - id: stage_03
    service: spark
    case: deploy_spark_pi
    retries: 0
    param_overrides:
      spark_image: apache/spark:3.5.3
  - id: stage_04
    service: spark
    case: spark_data_skew
    retries: 0
  - id: stage_05
    service: spark
    case: spark_etl_skew_oom
    retries: 0
    param_overrides:
      data_mount: /data
  - id: stage_06
    service: spark
    case: spark_runtime_ops
    retries: 0
  - id: stage_07
    service: spark
    case: spark_multi_tenant
    retries: 0
  - id: stage_08
    service: spark
    case: spark_data_skew
    retries: 0
  - id: stage_09
    service: spark
    case: spark_etl_skew_oom
    retries: 0
  - id: stage_10
    service: spark
    case: spark_streaming_autoscale
    retries: 0
