# workflows/suite/ray-deploy-dashboard
#
# Ray day-1 bring-up and dashboard exposure

metadata:
  id: ray-deploy-dashboard
  label: Ray day-1 bring-up and dashboard exposure
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: ray
    case: deploy_cluster
    retries: 1
    param_overrides:
      worker_replicas: '2'
  - id: stage_02
    service: ray
    case: dashboard_exposure
    retries: 1
    param_overrides:
      dashboard_port: '8265'
  - id: stage_03
    service: ray
    case: scale_workers
    retries: 1
    param_overrides:
      source_worker_replicas: '2'
      target_worker_replicas: '3'
