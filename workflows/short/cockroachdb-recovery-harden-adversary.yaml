# workflows/suite/cockroachdb-recovery-harden-adversary
#
# CockroachDB incident recovery then zone-config hardening — with adversary injection

metadata:
  id: cockroachdb-recovery-harden-adversary
  label: CockroachDB incident recovery then zone-config hardening — with adversary injection
spec:
  prompt_mode: progressive
  adversary:
  - scenario: block_sql_port
    inject_at_stage: stage_01
    lift_at_stage: stage_02
  stages:
  - id: stage_01
    service: cockroachdb
    case: health-check-recovery
    retries: 1
  - id: stage_02
    service: cockroachdb
    case: zone-config
    retries: 1
    param_overrides:
      gc_ttl_seconds: '7200'
  - id: stage_03
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 128MiB
  - id: stage_04
    service: cockroachdb
    case: monitoring-integration
    retries: 1
  - id: stage_05
    service: cockroachdb
    case: version-check
    retries: 1
