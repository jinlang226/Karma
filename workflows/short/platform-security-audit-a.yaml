metadata:
  id: platform-security-audit-a
  label: Platform security audit A
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: rabbitmq
    case: manual_tls_rotation
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_02
    service: mongodb
    case: certificate-rotation
    retries: 0
  - id: stage_03
    service: cockroachdb
    case: certificate-rotation
    retries: 0
  - id: stage_04
    service: elasticsearch
    case: rotate-http-certs
    retries: 0
  - id: stage_05
    service: nginx-ingress
    case: renew_tls_secret
    retries: 0
