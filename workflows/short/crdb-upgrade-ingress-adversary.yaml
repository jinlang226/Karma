# workflows/suite/crdb-upgrade-ingress-adversary
#
# CockroachDB major upgrade then ingress exposure — with adversary injection

metadata:
  id: crdb-upgrade-ingress-adversary
  label: CockroachDB major upgrade then ingress exposure — with adversary injection
spec:
  prompt_mode: progressive
  adversary:
  - scenario: block_sql_port
    inject_at_stage: stage_03
    lift_at_stage: stage_04
  stages:
  - id: stage_01
    service: cockroachdb
    case: major-upgrade-finalize
    retries: 1
    param_overrides:
      from_version: '23.2'
      to_version: 24.1.0
  - id: stage_02
    service: cockroachdb
    case: version-check
    retries: 1
  - id: stage_03
    service: cockroachdb
    case: expose-ingress
    retries: 1
  - id: stage_04
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 128MiB
