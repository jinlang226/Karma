# workflows/suite/nginx-ingress-03-canary-ratelimit-tls-adversary
#
# nginx-ingress: canary split, rate limit, then TLS renewal — with adversary injection

metadata:
  id: nginx-ingress-03-canary-ratelimit-tls-adversary
  label: 'nginx-ingress: canary split, rate limit, then TLS renewal — with adversary injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: strip_rate_limit_annotation
    inject_at_stage: stage_02
    lift_at_stage: stage_03
    param_overrides:
      ingress_name: rate-api
      limit_rps: '2'
  stages:
  - id: stage_01
    service: nginx-ingress
    case: ingress_canary
    retries: 1
  - id: stage_02
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 1
    param_overrides:
      limit_rps: '2'
  - id: stage_03
    service: nginx-ingress
    case: renew_tls_secret
    retries: 1
