# workflows/suite/elasticsearch-monitoring-and-transforms-adversary
#
# ES: deploy cluster, enable stack monitoring sidecars, then recover transform job — with adversary injection

metadata:
  id: elasticsearch-monitoring-and-transforms-adversary
  label: 'ES: deploy cluster, enable stack monitoring sidecars, then recover transform job — with adversary
    injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: http-service-selector-drift
    inject_at_stage: stage_02
    lift_at_stage: stage_04
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
  - id: stage_02
    service: elasticsearch
    case: stack-monitoring-sidecars
    retries: 0
  - id: stage_03
    service: elasticsearch
    case: transform-job-recovery
    retries: 0
  - id: stage_04
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 0
