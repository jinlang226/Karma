# workflows/suite/crdb-monitoring-adversary
#
# CockroachDB monitoring integration: Prometheus scraping — with adversary injection

metadata:
  id: crdb-monitoring-adversary
  label: 'CockroachDB monitoring integration: Prometheus scraping — with adversary injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: block_sql_port
    inject_at_stage: stage_02
    lift_at_stage: stage_03
  stages:
  - id: stage_01
    service: cockroachdb
    case: monitoring-integration
    retries: 1
  - id: stage_02
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 128MiB
  - id: stage_03
    service: cockroachdb
    case: version-check
    retries: 1
