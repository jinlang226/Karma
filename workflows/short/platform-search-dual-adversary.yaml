metadata:
  id: platform-search-dual-adversary
  label: Platform search dual adversary chain
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 0
  - id: stage_02
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 0
  - id: stage_03
    service: elasticsearch
    case: secure-http-ingress
    retries: 0
  - id: stage_04
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 0
  adversary:
  - scenario: snapshot-secret-wiped
    inject_at_stage: stage_01
    lift_at_stage: stage_03
  - scenario: statefulset-scaled-down
    inject_at_stage: stage_02
    lift_at_stage: stage_03
