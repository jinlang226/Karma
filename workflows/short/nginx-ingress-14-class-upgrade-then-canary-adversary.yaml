# workflows/suite/nginx-ingress-14-class-upgrade-then-canary-adversary
#
# nginx-ingress: class-only controller upgrade then canary traffic split — with adversary injection

metadata:
  id: nginx-ingress-14-class-upgrade-then-canary-adversary
  label: 'nginx-ingress: class-only controller upgrade then canary traffic split — with adversary injection'
spec:
  prompt_mode: progressive
  adversary:
  # Target demo-app (planted by stage_01 class_only_upgrade, persists), NOT the
  # canary backend stage_02 grades (stable-echo/canary-echo) -> benign
  # background disruption that never grades through the oracle (§3.3).
  - scenario: scale_down_backend
    inject_at_stage: stage_02
    lift_at_stage: stage_02
    param_overrides:
      deployment_name: demo-app
      restore_replicas: '1'
  stages:
  - id: stage_01
    service: nginx-ingress
    case: class_only_upgrade
    retries: 0
  - id: stage_02
    service: nginx-ingress
    case: ingress_canary
    retries: 0
