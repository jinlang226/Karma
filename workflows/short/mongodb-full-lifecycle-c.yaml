# workflows/suite/mongodb-full-lifecycle-c
#
# MongoDB full lifecycle C: deploy, TLS, cert rotation, scaling, major version upgrade

metadata:
  id: mongodb-full-lifecycle-c
  label: 'MongoDB full lifecycle C: deploy, TLS, cert rotation, scaling, major version upgrade'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: version-upgrade-hard
    retries: 0
  - id: stage_02
    service: mongodb
    case: deploy
    retries: 0
  - id: stage_03
    service: mongodb
    case: tls-setup
    retries: 0
  - id: stage_04
    service: mongodb
    case: certificate-rotation
    retries: 0
  - id: stage_05
    service: mongodb
    case: replica-scaling
    retries: 0
    param_overrides:
      target_replicas: 5
