# workflows/long/spark-long-ci-cd-pipeline-smoke
#
# CI/CD pipeline smoke test: gate a baseline image through every Spark capability,
# bump the image, then re-gate the data/streaming paths as a regression round

metadata:
  id: spark-ci-cd-pipeline-smoke
  label: 'CI/CD pipeline smoke test: gate baseline image through every capability, bump image, re-gate data/streaming'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: spark
    case: deploy_spark_pi
    retries: 0
    param_overrides:
      spark_image: apache/spark:3.5.1
  - id: stage_02
    service: spark
    case: spark_data_skew
    retries: 0
  - id: stage_03
    service: spark
    case: spark_etl_skew_oom
    retries: 0
  - id: stage_04
    service: spark
    case: spark_runtime_ops
    retries: 0
  - id: stage_05
    service: spark
    case: spark_multi_tenant
    retries: 0
  - id: stage_06
    service: spark
    case: spark_streaming_autoscale
    retries: 0
  - id: stage_07
    service: spark
    case: deploy_spark_pi
    retries: 0
    param_overrides:
      spark_image: apache/spark:3.5.3
  - id: stage_08
    service: spark
    case: spark_data_skew
    retries: 0
  - id: stage_09
    service: spark
    case: spark_etl_skew_oom
    retries: 0
  - id: stage_10
    service: spark
    case: spark_streaming_autoscale
    retries: 0
