# workflows/suite/platform-scaling-day
#
# Platform — capacity scaling day: MongoDB + Elasticsearch + Ray

metadata:
  id: platform-scaling-day
  label: 'Platform — capacity scaling day: MongoDB + Elasticsearch + Ray'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: deploy
    retries: 0
  - id: stage_02
    service: mongodb
    case: replica-scaling
    retries: 0
    param_overrides:
      target_replicas: 5
  - id: stage_03
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
  - id: stage_04
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 0
  - id: stage_05
    service: ray
    case: deploy_cluster
    retries: 0
  - id: stage_06
    service: ray
    case: scale_workers
    retries: 0
