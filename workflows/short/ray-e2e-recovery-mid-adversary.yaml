# workflows/suite/ray-e2e-recovery-mid-adversary
#
# Ray end-to-end with mid-chain worker recovery — with adversary injection

metadata:
  id: ray-e2e-recovery-mid-adversary
  label: Ray end-to-end with mid-chain worker recovery — with adversary injection
spec:
  prompt_mode: progressive
  adversary:
  - scenario: scale_down_workers
    inject_at_stage: stage_03
    lift_at_stage: stage_04
    param_overrides:
      wrong_replicas: '1'
      restore_replicas: '3'
  stages:
  - id: stage_01
    service: ray
    case: deploy_cluster
    retries: 0
    param_overrides:
      worker_replicas: '2'
  - id: stage_02
    service: ray
    case: dashboard_exposure
    retries: 0
    param_overrides:
      dashboard_port: '8265'
  - id: stage_03
    service: ray
    case: worker_recovery
    retries: 0
  - id: stage_04
    service: ray
    case: scale_workers
    retries: 0
    param_overrides:
      source_worker_replicas: '2'
      target_worker_replicas: '3'
  - id: stage_05
    service: ray
    case: upgrade_version
    retries: 0
    param_overrides:
      from_image: rayproject/ray:2.8.0
      to_image: rayproject/ray:2.9.0
  - id: stage_06
    service: ray
    case: job_submission
    retries: 0
    param_overrides:
      expected_output: pong
  - id: stage_07
    service: ray
    case: teardown_cluster
    retries: 0
