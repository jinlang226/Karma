metadata:
  id: mongodb-deploy-init-users-audit-concat-blind
  label: MongoDB deploy, initialize, users, and audit (concat_blind)
spec:
  prompt_mode: concat_blind
  stages:
  - id: stage_01
    service: mongodb
    case: deploy
    retries: 0
  - id: stage_02
    service: mongodb
    case: initialize
    retries: 0
  - id: stage_03
    service: mongodb
    case: user-management
    retries: 0
  - id: stage_04
    service: mongodb
    case: readonly-audit
    retries: 0
