# workflows/suite/crdb-major-upgrade
#
# CockroachDB major upgrade finalize: 23.2 -> 24.1

metadata:
  id: crdb-major-upgrade
  label: 'CockroachDB major upgrade finalize: 23.2 -> 24.1'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: major-upgrade-finalize
    retries: 1
    param_overrides:
      from_version: '23.2'
      to_version: 24.1.0
  - id: stage_02
    service: cockroachdb
    case: version-check
    retries: 1
    param_overrides:
      from_version: '23.2'
      to_version: 24.1.0
      report_key: db_version
  - id: stage_03
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 128MiB
