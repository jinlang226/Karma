# workflows/suite/mongodb-tls-auth-hardening-adversary
#
# MongoDB TLS and auth hardening: deploy, enable TLS, configure custom roles — with adversary injection

metadata:
  id: mongodb-tls-auth-hardening-adversary
  label: 'MongoDB TLS and auth hardening: deploy, enable TLS, configure custom roles — with adversary
    injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: network_policy_block
    inject_at_stage: stage_03
    lift_at_stage: stage_04
  stages:
  - id: stage_01
    service: mongodb
    case: deploy
    retries: 0
  - id: stage_02
    service: mongodb
    case: tls-setup
    retries: 0
  - id: stage_03
    service: mongodb
    case: custom-roles
    retries: 0
  - id: stage_04
    service: mongodb
    case: user-management
    retries: 0
