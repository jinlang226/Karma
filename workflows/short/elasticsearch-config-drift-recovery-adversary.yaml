# workflows/suite/elasticsearch-config-drift-recovery-adversary
#
# ES: seed-hosts ConfigMap drift recovery followed by transform job recovery — with adversary injection

metadata:
  id: elasticsearch-config-drift-recovery-adversary
  label: 'ES: seed-hosts ConfigMap drift recovery followed by transform job recovery — with adversary
    injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: es-config-seed-hosts-drift
    inject_at_stage: stage_01
    lift_at_stage: stage_02
  stages:
  - id: stage_01
    service: elasticsearch
    case: seed-hosts-repair
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: transform-job-recovery
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: rotate-http-certs
    retries: 1
