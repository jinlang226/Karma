metadata:
  id: elasticsearch-seed-hosts-shard-recovery
  label: Elasticsearch seed hosts and shard recovery chain
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: seed-hosts-repair
    retries: 0
  - id: stage_02
    service: elasticsearch
    case: safe-downscale-with-shard-migration
    retries: 0
  - id: stage_03
    service: elasticsearch
    case: rollback-rehearsal
    retries: 0
