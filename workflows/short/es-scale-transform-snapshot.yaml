# workflows/suite/es-scale-transform-snapshot
#
# ES: scale up new nodeset then run transform job and set up snapshot backup

metadata:
  id: es-scale-transform-snapshot
  label: 'ES: scale up new nodeset then run transform job and set up snapshot backup'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: transform-job-recovery
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 1
