metadata:
  id: elasticsearch-http-selector-adversary
  label: Elasticsearch HTTP selector drift recovery
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: secure-http-ingress
    retries: 0
  - id: stage_02
    service: elasticsearch
    case: readonly-audit
    retries: 0
  - id: stage_03
    service: elasticsearch
    case: rollback-rehearsal
    retries: 0
  adversary:
  - scenario: http-service-selector-drift
    inject_at_stage: stage_01
    lift_at_stage: stage_03
