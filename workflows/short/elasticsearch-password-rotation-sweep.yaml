# workflows/suite/elasticsearch-password-rotation-sweep
#
# ES: repeated elastic password rotations with different target secret names

metadata:
  id: elasticsearch-password-rotation-sweep
  label: 'ES: repeated elastic password rotations with different target secret names'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: rotate-elastic-password
    retries: 1
    param_overrides:
      next_password_secret_name: elastic-password-next
  - id: stage_03
    service: elasticsearch
    case: rotate-elastic-password
    retries: 1
    param_overrides:
      next_password_secret_name: elastic-password-v2
  - id: stage_04
    service: elasticsearch
    case: rotate-elastic-password
    retries: 1
    param_overrides:
      next_password_secret_name: elastic-password-v3
