# workflows/suite/nginx-ingress-11-tls-canary-ratelimit-hard-adversary
#
# nginx-ingress: renew TLS, canary split, then hard multi-replica rate limit — with adversary injection

metadata:
  id: nginx-ingress-11-tls-canary-ratelimit-hard-adversary
  label: 'nginx-ingress: renew TLS, canary split, then hard multi-replica rate limit — with adversary
    injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: delete_tls_secret
    inject_at_stage: stage_01
    lift_at_stage: stage_02
  stages:
  - id: stage_01
    service: nginx-ingress
    case: renew_tls_secret
    retries: 1
  - id: stage_02
    service: nginx-ingress
    case: ingress_canary
    retries: 1
  - id: stage_03
    service: nginx-ingress
    case: rate_limit_replica_hard
    retries: 1
    param_overrides:
      limit_rps: '1'
