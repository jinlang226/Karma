# workflows/suite/ray-scale-recovery
#
# Ray worker progressive scale-up: 2 → 4 → 6 replicas, then submit a job

metadata:
  id: ray-scale-recovery
  label: 'Ray worker progressive scale-up: 2 → 4 → 6 replicas, then submit a job'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: ray
    case: deploy_cluster
    retries: 0
    param_overrides:
      worker_replicas: '2'
  - id: stage_02
    service: ray
    case: scale_workers
    retries: 0
    param_overrides:
      source_worker_replicas: '2'
      target_worker_replicas: '4'
  - id: stage_03
    service: ray
    case: scale_workers
    retries: 0
    param_overrides:
      source_worker_replicas: '4'
      target_worker_replicas: '6'
  - id: stage_04
    service: ray
    case: job_submission
    retries: 0
    param_overrides:
      expected_output: pong
