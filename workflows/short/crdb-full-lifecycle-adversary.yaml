# workflows/suite/crdb-full-lifecycle-adversary
#
# CockroachDB full operational lifecycle: bring-up through monitoring — with adversary injection

metadata:
  id: crdb-full-lifecycle-adversary
  label: 'CockroachDB full operational lifecycle: bring-up through monitoring — with adversary injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: scale_down_node
    inject_at_stage: stage_02
    lift_at_stage: stage_04
  stages:
  - id: stage_01
    service: cockroachdb
    case: deploy
    retries: 1
  - id: stage_02
    service: cockroachdb
    case: initialize
    retries: 1
  - id: stage_03
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 128MiB
  - id: stage_04
    service: cockroachdb
    case: zone-config
    retries: 1
  - id: stage_05
    service: cockroachdb
    case: version-check
    retries: 1
  - id: stage_06
    service: cockroachdb
    case: monitoring-integration
    retries: 1
