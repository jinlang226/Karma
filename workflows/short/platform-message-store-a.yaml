metadata:
  id: platform-message-store-a
  label: Platform message and store workflow A
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: rabbitmq
    case: classic_queue
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_02
    service: rabbitmq
    case: manual_user_permission
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_03
    service: mongodb
    case: deploy
    retries: 0
  - id: stage_04
    service: mongodb
    case: initialize
    retries: 0
  - id: stage_05
    service: mongodb
    case: user-management
    retries: 0
