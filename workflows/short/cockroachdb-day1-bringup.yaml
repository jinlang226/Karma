# workflows/suite/cockroachdb-day1-bringup
#
# CockroachDB day-1: deploy cluster then initialize

metadata:
  id: cockroachdb-day1-bringup
  label: 'CockroachDB day-1: deploy cluster then initialize'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: deploy
    retries: 1
  - id: stage_02
    service: cockroachdb
    case: initialize
    retries: 1
  - id: stage_03
    service: cockroachdb
    case: version-check
    retries: 1
  - id: stage_04
    service: cockroachdb
    case: cluster-settings
    retries: 1
