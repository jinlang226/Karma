# workflows/suite/cockroachdb-decommission-zone
#
# CockroachDB node decommission then zone-config rebalance

metadata:
  id: cockroachdb-decommission-zone
  label: CockroachDB node decommission then zone-config rebalance
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: decommission
    retries: 0
  - id: stage_02
    service: cockroachdb
    case: zone-config
    retries: 0
    param_overrides:
      num_replicas: '3'
      gc_ttl_seconds: '7200'
  - id: stage_03
    service: cockroachdb
    case: cluster-settings
    retries: 0
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 128MiB
  - id: stage_04
    service: cockroachdb
    case: version-check
    retries: 0
