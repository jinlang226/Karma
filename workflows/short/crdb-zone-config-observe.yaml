# workflows/suite/crdb-zone-config-observe
#
# CockroachDB zone config apply, rebalance tuning, and metrics observation

metadata:
  id: crdb-zone-config-observe
  label: CockroachDB zone config apply, rebalance tuning, and metrics observation
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: zone-config
    retries: 1
  - id: stage_02
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 128MiB
  - id: stage_03
    service: cockroachdb
    case: monitoring-integration
    retries: 1
