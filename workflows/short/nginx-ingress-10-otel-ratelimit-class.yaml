# workflows/suite/nginx-ingress-10-otel-ratelimit-class
#
# nginx-ingress: OTel logging, rate limit, then class-only controller upgrade

metadata:
  id: nginx-ingress-10-otel-ratelimit-class
  label: 'nginx-ingress: OTel logging, rate limit, then class-only controller upgrade'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: otel_log_format
    retries: 1
  - id: stage_02
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 1
    param_overrides:
      limit_rps: '1'
  - id: stage_03
    service: nginx-ingress
    case: class_only_upgrade
    retries: 1
