# workflows/suite/mongodb-scale-then-probe-hardening
#
# MongoDB scale-up then readiness probe hardening for larger replica set

metadata:
  id: mongodb-scale-then-probe-hardening
  label: MongoDB scale-up then readiness probe hardening for larger replica set
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: replica-scaling
    retries: 1
    param_overrides:
      target_replicas: 5
  - id: stage_02
    service: mongodb
    case: readiness-probe-tuning
    retries: 1
