# workflows/long/rabbitmq-long-amqp-block-upgrade-01
#
# RabbitMQ: AMQP Block During Upgrade — Network Fault and Version Jump

metadata:
  id: rabbitmq-amqp-block-upgrade-01
  label: 'RabbitMQ: AMQP Block During Upgrade — Network Fault and Version Jump'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: block_amqp_network_policy
    inject_at_stage: stage_05
    lift_at_stage: stage_07
  stages:
  - id: stage_01
    service: rabbitmq
    case: classic_queue
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_02
    service: rabbitmq
    case: manual_user_permission
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_03
    service: rabbitmq
    case: manual_policy_sync
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_04
    service: rabbitmq
    case: manual_monitoring
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_05
    service: rabbitmq
    case: manual_skip_upgrade
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
      from_version: '3.9'
      to_version: '4.1'
  - id: stage_06
    service: rabbitmq
    case: manual_policy_sync
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_07
    service: rabbitmq
    case: manual_user_permission
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_08
    service: rabbitmq
    case: manual_monitoring
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq