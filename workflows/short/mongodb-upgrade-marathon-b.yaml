# workflows/long/mongodb-long-upgrade-marathon-b
#
# MongoDB upgrade marathon B: deploy → init → scale → config × 2 → upgrade-5-to-6 → TLS → cert-rotate → monitor → probe-tune → decomm (param-drift adversary)

metadata:
  id: mongodb-upgrade-marathon-b
  label: 'MongoDB upgrade marathon B: deploy → init → scale → config × 2 → upgrade-5-to-6 → TLS → cert-rotate
    → monitor → probe-tune → decomm (param-drift adversary)'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: param_drift
    inject_at_stage: stage_04
    lift_at_stage: stage_06
  stages:
  - id: stage_01
    service: mongodb
    case: version-upgrade
    retries: 0
  - id: stage_02
    service: mongodb
    case: deploy
    retries: 0
  - id: stage_03
    service: mongodb
    case: initialize
    retries: 0
  - id: stage_04
    service: mongodb
    case: replica-scaling
    retries: 0
    param_overrides:
      target_replicas: '5'
  - id: stage_05
    service: mongodb
    case: mongod-config-update
    retries: 0
    param_overrides:
      target_journal_compressor: zlib
  - id: stage_06
    service: mongodb
    case: mongod-config-update
    retries: 0
    param_overrides:
      target_journal_compressor: snappy
  - id: stage_07
    service: mongodb
    case: tls-setup
    retries: 0
  - id: stage_08
    service: mongodb
    case: certificate-rotation
    retries: 0
  - id: stage_09
    service: mongodb
    case: monitoring-integration
    retries: 0
  - id: stage_10
    service: mongodb
    case: readiness-probe-tuning
    retries: 0
