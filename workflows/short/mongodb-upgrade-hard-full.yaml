# workflows/long/mongodb-long-upgrade-hard-full
#
# MongoDB hard upgrade + full hardening: deploy → init → scale → upgrade-hard → TLS → cert-rotate → custom-roles → monitor → config × 2 → decomm (readiness-probe-break adversary)

metadata:
  id: mongodb-upgrade-hard-full
  label: 'MongoDB hard upgrade + full hardening: deploy → init → scale → upgrade-hard → TLS → cert-rotate
    → custom-roles → monitor → config × 2 → decomm (readiness-probe-break adversary)'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: readiness_probe_break
    inject_at_stage: stage_05
    lift_at_stage: stage_08
  stages:
  - id: stage_01
    service: mongodb
    case: version-upgrade-hard
    retries: 0
  - id: stage_02
    service: mongodb
    case: deploy
    retries: 0
  - id: stage_03
    service: mongodb
    case: initialize
    retries: 0
  - id: stage_04
    service: mongodb
    case: replica-scaling
    retries: 0
    param_overrides:
      target_replicas: '5'
  - id: stage_05
    service: mongodb
    case: tls-setup
    retries: 0
  - id: stage_06
    service: mongodb
    case: certificate-rotation
    retries: 0
  - id: stage_07
    service: mongodb
    case: custom-roles
    retries: 0
  - id: stage_08
    service: mongodb
    case: monitoring-integration
    retries: 0
  - id: stage_09
    service: mongodb
    case: mongod-config-update
    retries: 0
    param_overrides:
      target_journal_compressor: zlib
  - id: stage_10
    service: mongodb
    case: mongod-config-update
    retries: 0
    param_overrides:
      target_journal_compressor: snappy
