metadata:
  id: elasticsearch-statefulset-down-adversary
  label: Elasticsearch StatefulSet scaled-down recovery
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
  - id: stage_02
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 0
  - id: stage_03
    service: elasticsearch
    case: stack-monitoring-sidecars
    retries: 0
  - id: stage_04
    service: elasticsearch
    case: readonly-audit
    retries: 0
  adversary:
  - scenario: statefulset-scaled-down
    inject_at_stage: stage_02
    lift_at_stage: stage_04
