# workflows/suite/cockroachdb-tls-monitoring
#
# CockroachDB TLS cluster with monitoring integration

metadata:
  id: cockroachdb-tls-monitoring
  label: CockroachDB TLS cluster with monitoring integration
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: cluster-settings
    retries: 0
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 128MiB
  - id: stage_02
    service: cockroachdb
    case: version-check
    retries: 0
  - id: stage_03
    service: cockroachdb
    case: generate-cert
    retries: 0
  - id: stage_04
    service: cockroachdb
    case: monitoring-integration
    retries: 0
