metadata:
  id: mongodb-statefulset-scaling-sweep
  label: MongoDB StatefulSet customization and scaling sweep
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: deploy
    retries: 0
  - id: stage_02
    service: mongodb
    case: initialize
    retries: 0
  - id: stage_03
    service: mongodb
    case: statefulset-customization
    retries: 0
  - id: stage_04
    service: mongodb
    case: replica-scaling
    retries: 0
    param_overrides:
      target_replicas: 7
  - id: stage_05
    service: mongodb
    case: readiness-probe-tuning
    retries: 0
