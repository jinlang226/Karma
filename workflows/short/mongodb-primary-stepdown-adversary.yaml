metadata:
  id: mongodb-primary-stepdown-adversary
  label: MongoDB primary stepdown during user operations
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: deploy
    retries: 0
  - id: stage_02
    service: mongodb
    case: initialize
    retries: 0
  - id: stage_03
    service: mongodb
    case: user-management
    retries: 0
  - id: stage_04
    service: mongodb
    case: monitoring-integration
    retries: 0
  adversary:
  - scenario: primary_stepdown
    inject_at_stage: stage_03
    lift_at_stage: stage_04
