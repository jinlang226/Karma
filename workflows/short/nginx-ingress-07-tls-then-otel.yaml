# workflows/suite/nginx-ingress-07-tls-then-otel
#
# nginx-ingress: renew TLS cert then enable OTel structured logging

metadata:
  id: nginx-ingress-07-tls-then-otel
  label: 'nginx-ingress: renew TLS cert then enable OTel structured logging'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: renew_tls_secret
    retries: 0
  - id: stage_02
    service: nginx-ingress
    case: otel_log_format
    retries: 0
