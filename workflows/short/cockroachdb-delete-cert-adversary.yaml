metadata:
  id: cockroachdb-delete-cert-adversary
  label: CockroachDB deleted certificate secret recovery
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: deploy
    retries: 0
  - id: stage_02
    service: cockroachdb
    case: generate-cert
    retries: 0
  - id: stage_03
    service: cockroachdb
    case: certificate-rotation
    retries: 0
  - id: stage_04
    service: cockroachdb
    case: readonly-audit
    retries: 0
  adversary:
  - scenario: delete_cert_secret
    inject_at_stage: stage_03
    lift_at_stage: stage_04
