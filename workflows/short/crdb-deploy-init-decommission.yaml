# workflows/suite/crdb-deploy-init-decommission
#
# CockroachDB compact lifecycle: deploy, initialize, then decommission to 3

metadata:
  id: crdb-deploy-init-decommission
  label: 'CockroachDB compact lifecycle: deploy, initialize, then decommission to 3'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: deploy
    retries: 1
  - id: stage_02
    service: cockroachdb
    case: initialize
    retries: 1
  - id: stage_03
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 128MiB
  - id: stage_04
    service: cockroachdb
    case: decommission
    retries: 1
  - id: stage_05
    service: cockroachdb
    case: version-check
    retries: 1
