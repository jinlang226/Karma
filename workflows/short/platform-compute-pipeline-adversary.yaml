# workflows/suite/platform-compute-pipeline-adversary
#
# Platform — compute pipeline: Ray cluster + Spark batch job — with adversary injection

metadata:
  id: platform-compute-pipeline-adversary
  label: 'Platform — compute pipeline: Ray cluster + Spark batch job — with adversary injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: scale_down_workers
    inject_at_stage: stage_02
  stages:
  - id: stage_01
    service: ray
    case: deploy_cluster
    retries: 1
  - id: stage_02
    service: ray
    case: job_submission
    retries: 1
  - id: stage_03
    service: spark
    case: deploy_spark_pi
    retries: 1
  - id: stage_04
    service: spark
    case: spark_runtime_ops
    retries: 1
