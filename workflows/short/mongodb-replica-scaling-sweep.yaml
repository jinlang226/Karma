# workflows/suite/mongodb-replica-scaling-sweep
#
# MongoDB replica scaling sweep: progressively scale from 3 to 4 to 5 to 7 members

metadata:
  id: mongodb-replica-scaling-sweep
  label: 'MongoDB replica scaling sweep: progressively scale from 3 to 4 to 5 to 7 members'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: replica-scaling
    retries: 0
    param_overrides:
      target_replicas: 4
  - id: stage_02
    service: mongodb
    case: replica-scaling
    retries: 0
    param_overrides:
      target_replicas: 5
  - id: stage_03
    service: mongodb
    case: replica-scaling
    retries: 0
    param_overrides:
      target_replicas: 7
