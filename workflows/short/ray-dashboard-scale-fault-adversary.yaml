# workflows/suite/ray-dashboard-scale-fault-adversary
#
# Ray dashboard exposure under worker scale-down interference — with adversary injection

metadata:
  id: ray-dashboard-scale-fault-adversary
  label: Ray dashboard exposure under worker scale-down interference — with adversary injection
spec:
  prompt_mode: progressive
  adversary:
  - scenario: scale_down_workers
    inject_at_stage: stage_02
    lift_at_stage: stage_03
    param_overrides:
      wrong_replicas: '1'
      restore_replicas: '3'
  stages:
  - id: stage_01
    service: ray
    case: deploy_cluster
    retries: 0
    param_overrides:
      worker_replicas: '3'
  - id: stage_02
    service: ray
    case: dashboard_exposure
    retries: 0
    param_overrides:
      dashboard_port: '8265'
  - id: stage_03
    service: ray
    case: scale_workers
    retries: 0
    param_overrides:
      source_worker_replicas: '3'
      target_worker_replicas: '3'
  - id: stage_04
    service: ray
    case: job_submission
    retries: 0
    param_overrides:
      expected_output: pong
