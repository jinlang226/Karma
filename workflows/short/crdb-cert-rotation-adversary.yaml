# workflows/suite/crdb-cert-rotation-adversary
#
# CockroachDB certificate rotation on a running TLS cluster — with adversary injection

metadata:
  id: crdb-cert-rotation-adversary
  label: CockroachDB certificate rotation on a running TLS cluster — with adversary injection
spec:
  prompt_mode: progressive
  adversary:
  - scenario: delete_cert_secret
    inject_at_stage: stage_01
    lift_at_stage: stage_02
  stages:
  - id: stage_01
    service: cockroachdb
    case: certificate-rotation
    retries: 1
  - id: stage_02
    service: cockroachdb
    case: cluster-settings
    retries: 1
  - id: stage_03
    service: cockroachdb
    case: version-check
    retries: 1
