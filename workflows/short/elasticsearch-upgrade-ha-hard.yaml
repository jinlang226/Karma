# workflows/suite/elasticsearch-upgrade-ha-hard
#
# ES: deploy cluster then perform full-restart HA upgrade (hard variant)

metadata:
  id: elasticsearch-upgrade-ha-hard
  label: 'ES: deploy cluster then perform full-restart HA upgrade (hard variant)'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
  - id: stage_02
    service: elasticsearch
    case: full-restart-upgrade-ha-hard
    retries: 0
  - id: stage_03
    service: elasticsearch
    case: seed-hosts-repair
    retries: 0
