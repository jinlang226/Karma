metadata:
  id: elasticsearch-deploy-scale-transform-snapshot
  label: Elasticsearch snapshot, scale, audit, and rollback rehearsal
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 0
  - id: stage_02
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 0
  - id: stage_03
    service: elasticsearch
    case: readonly-audit
    retries: 0
  - id: stage_04
    service: elasticsearch
    case: rollback-rehearsal
    retries: 0
