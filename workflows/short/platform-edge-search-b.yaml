metadata:
  id: platform-edge-search-b
  label: Platform edge-fronted search B
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
  - id: stage_02
    service: elasticsearch
    case: rotate-elastic-password
    retries: 0
  - id: stage_03
    service: nginx-ingress
    case: create_ingress
    retries: 0
    param_overrides:
      host: secure-search.generated.example.com
  - id: stage_04
    service: nginx-ingress
    case: renew_tls_secret
    retries: 0
    param_overrides:
      host: secure-search.generated.example.com
  - id: stage_05
    service: elasticsearch
    case: readonly-audit
    retries: 0
