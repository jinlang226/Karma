# workflows/suite/elasticsearch-service-and-network-repair-adversary
#
# ES: fix service selector drift, repair seed hosts, then add transport CA trust — with adversary injection

metadata:
  id: elasticsearch-service-and-network-repair-adversary
  label: 'ES: fix service selector drift, repair seed hosts, then add transport CA trust — with adversary
    injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: transport-networkpolicy-block
    inject_at_stage: stage_02
    lift_at_stage: stage_03
  stages:
  - id: stage_01
    service: elasticsearch
    case: internal-http-service-drift
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: seed-hosts-repair
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: transport-additional-ca-trust
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: secure-http-ingress
    retries: 1
