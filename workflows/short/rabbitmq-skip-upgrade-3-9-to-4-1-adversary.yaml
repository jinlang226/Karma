# workflows/suite/rabbitmq-skip-upgrade-3-9-to-4-1-adversary
#
# RabbitMQ: Rolling Skip-Version Upgrade 3.9 → 4.1 — with adversary injection

metadata:
  id: rabbitmq-skip-upgrade-3-9-to-4-1-adversary
  label: 'RabbitMQ: Rolling Skip-Version Upgrade 3.9 → 4.1 — with adversary injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: scale_down_cluster
    inject_at_stage: stage_01
    lift_at_stage: stage_02
  stages:
  - id: stage_01
    service: rabbitmq
    case: classic_queue
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_02
    service: rabbitmq
    case: manual_skip_upgrade
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
      from_version: '3.9'
      to_version: '4.1'
