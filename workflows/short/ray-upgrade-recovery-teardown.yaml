# workflows/suite/ray-upgrade-recovery-teardown
#
# Ray upgrade → worker recovery → teardown

metadata:
  id: ray-upgrade-recovery-teardown
  label: Ray upgrade → worker recovery → teardown
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: ray
    case: deploy_cluster
    retries: 1
    param_overrides:
      worker_replicas: '2'
  - id: stage_02
    service: ray
    case: upgrade_version
    retries: 1
    param_overrides:
      from_image: rayproject/ray:2.8.0
      to_image: rayproject/ray:2.9.0
  - id: stage_03
    service: ray
    case: worker_recovery
    retries: 1
  - id: stage_04
    service: ray
    case: job_submission
    retries: 1
    param_overrides:
      expected_output: pong
  - id: stage_05
    service: ray
    case: teardown_cluster
    retries: 1
