# workflows/suite/mongodb-user-management-sweep
#
# MongoDB user management sweep: create users, assign roles, rotate passwords

metadata:
  id: mongodb-user-management-sweep
  label: 'MongoDB user management sweep: create users, assign roles, rotate passwords'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: user-management
    retries: 1
  - id: stage_02
    service: mongodb
    case: custom-roles
    retries: 1
  - id: stage_03
    service: mongodb
    case: password-rotation
    retries: 1
