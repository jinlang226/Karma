# workflows/suite/cockroachdb-zone-gc-sweep-adversary
#
# CockroachDB tenant-B governance: zone config, rebalance tuning, metrics — with adversary injection

metadata:
  id: cockroachdb-zone-gc-sweep-adversary
  label: 'CockroachDB tenant-B governance: zone config, rebalance tuning, metrics — with adversary injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: throttle_rebalance_rate
    inject_at_stage: stage_02
    lift_at_stage: stage_03
  stages:
  - id: stage_01
    service: cockroachdb
    case: zone-config
    retries: 1
    param_overrides:
      gc_ttl_seconds: '14400'
  - id: stage_02
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 128MiB
  - id: stage_03
    service: cockroachdb
    case: monitoring-integration
    retries: 1
