# workflows/suite/elasticsearch-ingress-with-service-drift-adversary
#
# ES: deploy cluster, expose via secure ingress, then repair service selector drift — with adversary injection

metadata:
  id: elasticsearch-ingress-with-service-drift-adversary
  label: 'ES: deploy cluster, expose via secure ingress, then repair service selector drift — with adversary
    injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: http-service-selector-drift
    inject_at_stage: stage_02
    lift_at_stage: stage_03
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: secure-http-ingress
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: internal-http-service-drift
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: seed-hosts-repair
    retries: 1
