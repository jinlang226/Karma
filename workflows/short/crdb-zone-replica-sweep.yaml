# workflows/suite/crdb-zone-replica-sweep
#
# CockroachDB zone config replication factor sweep

metadata:
  id: crdb-zone-replica-sweep
  label: CockroachDB zone config replication factor sweep
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: zone-config
    retries: 1
    param_overrides:
      num_replicas: '3'
      gc_ttl_seconds: '3600'
  - id: stage_02
    service: cockroachdb
    case: zone-config
    retries: 1
    param_overrides:
      num_replicas: '3'
      gc_ttl_seconds: '14400'
  - id: stage_03
    service: cockroachdb
    case: zone-config
    retries: 1
    param_overrides:
      num_replicas: '3'
      gc_ttl_seconds: '86400'
  - id: stage_04
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 128MiB
  - id: stage_05
    service: cockroachdb
    case: version-check
    retries: 1
