# workflows/suite/nginx-ingress-02-create-then-canary
#
# nginx-ingress: expose app then introduce canary split

metadata:
  id: nginx-ingress-02-create-then-canary
  label: 'nginx-ingress: expose app then introduce canary split'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: create_ingress
    retries: 1
    param_overrides:
      host: demo.example.com
      path: /app
  - id: stage_02
    service: nginx-ingress
    case: ingress_canary
    retries: 1
