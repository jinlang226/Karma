metadata:
  id: cockroachdb-block-sql-adversary
  label: CockroachDB blocked SQL port recovery
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: deploy
    retries: 0
  - id: stage_02
    service: cockroachdb
    case: initialize
    retries: 0
  - id: stage_03
    service: cockroachdb
    case: health-check-recovery
    retries: 0
  - id: stage_04
    service: cockroachdb
    case: monitoring-integration
    retries: 0
  adversary:
  - scenario: block_sql_port
    inject_at_stage: stage_03
    lift_at_stage: stage_04
