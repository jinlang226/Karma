# workflows/suite/mongodb-scale-then-arbiters
#
# MongoDB scale-up then add arbiters for election stability

metadata:
  id: mongodb-scale-then-arbiters
  label: MongoDB scale-up then add arbiters for election stability
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: replica-scaling
    retries: 0
    param_overrides:
      target_replicas: 4
  - id: stage_02
    service: mongodb
    case: arbiters
    retries: 0
