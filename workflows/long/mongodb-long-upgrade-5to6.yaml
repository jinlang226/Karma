# workflows/long/mongodb-long-upgrade-5to6
#
# MongoDB upgrade campaign 5→6: deploy → init → TLS → cert-rotate → scale → config → upgrade → monitor → probe-tune → password-rotation → decomm

metadata:
  id: mongodb-long-upgrade-5to6
  label: 'MongoDB upgrade campaign 5→6: deploy → init → TLS → cert-rotate → scale → config → upgrade →
    monitor → probe-tune → password-rotation → decomm'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: deploy
    retries: 1
  - id: stage_02
    service: mongodb
    case: initialize
    retries: 1
  - id: stage_03
    service: mongodb
    case: tls-setup
    retries: 1
  - id: stage_04
    service: mongodb
    case: certificate-rotation
    retries: 1
  - id: stage_05
    service: mongodb
    case: replica-scaling
    retries: 1
    param_overrides:
      target_replicas: '5'
  - id: stage_06
    service: mongodb
    case: mongod-config-update
    retries: 1
    param_overrides:
      target_journal_compressor: zlib
  - id: stage_07
    service: mongodb
    case: version-upgrade
    retries: 1
  - id: stage_08
    service: mongodb
    case: monitoring-integration
    retries: 1
  - id: stage_09
    service: mongodb
    case: readiness-probe-tuning
    retries: 1
  - id: stage_10
    service: mongodb
    case: password-rotation
    retries: 1
  - id: stage_11
    service: mongodb
    case: decommission
    retries: 1
