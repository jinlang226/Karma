# workflows/long/cockroachdb-long-settings-deep-sweep
#
# CockroachDB deep cluster-settings sweep across rebalance rates and zone GC TTLs

metadata:
  id: cockroachdb-long-settings-deep-sweep
  label: CockroachDB deep cluster-settings sweep across rebalance rates and zone GC TTLs
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: deploy
    retries: 1
  - id: stage_02
    service: cockroachdb
    case: initialize
    retries: 1
  - id: stage_03
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 64MiB
  - id: stage_04
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 96MiB
  - id: stage_05
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 128MiB
  - id: stage_06
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 192MiB
  - id: stage_07
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 256MiB
  - id: stage_08
    service: cockroachdb
    case: zone-config
    retries: 1
    param_overrides:
      gc_ttl_seconds: 86400
  - id: stage_09
    service: cockroachdb
    case: zone-config
    retries: 1
    param_overrides:
      gc_ttl_seconds: 14400
  - id: stage_10
    service: cockroachdb
    case: monitoring-integration
    retries: 1
  - id: stage_11
    service: cockroachdb
    case: health-check-recovery
    retries: 1
  - id: stage_12
    service: cockroachdb
    case: decommission
    retries: 1
