# workflows/long/nginx-ingress-long-10-tls-delete-fault
#
# nginx-ingress: TLS Campaign — TLS secret deleted mid-rotation

metadata:
  id: nginx-ingress-long-10-tls-delete-fault
  label: 'nginx-ingress: TLS Campaign — TLS secret deleted mid-rotation'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: delete_tls_secret
    inject_at_stage: stage_04
    lift_at_stage: stage_08
  stages:
  - id: stage_01
    service: nginx-ingress
    case: create_ingress
    retries: 0
  - id: stage_02
    service: nginx-ingress
    case: renew_tls_secret
    retries: 0
  - id: stage_03
    service: nginx-ingress
    case: otel_log_format
    retries: 0
  - id: stage_04
    service: nginx-ingress
    case: renew_tls_secret
    retries: 0
    param_overrides:
      host: demo.example.com
  - id: stage_05
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 0
  - id: stage_06
    service: nginx-ingress
    case: renew_tls_secret
    retries: 0
    param_overrides:
      host: demo.example.com
  - id: stage_07
    service: nginx-ingress
    case: ingress_canary
    retries: 0
  - id: stage_08
    service: nginx-ingress
    case: renew_tls_secret
    retries: 0
    param_overrides:
      host: demo.example.com
  - id: stage_09
    service: nginx-ingress
    case: class_only_upgrade
    retries: 0
  - id: stage_10
    service: nginx-ingress
    case: renew_tls_secret
    retries: 0
    param_overrides:
      host: demo.example.com
  - id: stage_11
    service: nginx-ingress
    case: otel_log_format
    retries: 0
    param_overrides:
      path: /post-rotation
