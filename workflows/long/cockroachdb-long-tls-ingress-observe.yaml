# workflows/long/cockroachdb-long-tls-ingress-observe
#
# CockroachDB TLS bring-up, ingress exposure, monitoring, settings tuning, and rolling update

metadata:
  id: cockroachdb-long-tls-ingress-observe
  label: CockroachDB TLS bring-up, ingress exposure, monitoring, settings tuning, and rolling update
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: deploy
    retries: 0
  - id: stage_02
    service: cockroachdb
    case: initialize
    retries: 0
  - id: stage_03
    service: cockroachdb
    case: generate-cert
    retries: 0
  - id: stage_04
    service: cockroachdb
    case: expose-ingress
    retries: 0
  - id: stage_05
    service: cockroachdb
    case: monitoring-integration
    retries: 0
  - id: stage_06
    service: cockroachdb
    case: cluster-settings
    retries: 0
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 32MiB
  - id: stage_07
    service: cockroachdb
    case: cluster-settings
    retries: 0
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 64MiB
  - id: stage_08
    service: cockroachdb
    case: cluster-settings
    retries: 0
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 128MiB
  - id: stage_09
    service: cockroachdb
    case: zone-config
    retries: 0
    param_overrides:
      gc_ttl_seconds: 14400
  - id: stage_10
    service: cockroachdb
    case: partitioned-update
    retries: 0
    param_overrides:
      to_version: 24.1.1
  - id: stage_11
    service: cockroachdb
    case: version-check
    retries: 0
    param_overrides:
      report_key: post_update_version
