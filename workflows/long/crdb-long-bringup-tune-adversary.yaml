# workflows/long/crdb-long-bringup-tune-adversary
#
# CockroachDB bring-up and deep tuning with node scale-down adversary

metadata:
  id: crdb-long-bringup-tune-adversary
  label: CockroachDB bring-up and deep tuning with node scale-down adversary
spec:
  prompt_mode: progressive
  adversary:
  - scenario: scale_down_node
    inject_at_stage: stage_06
    lift_at_stage: stage_07
  stages:
  - id: stage_01
    service: cockroachdb
    case: deploy
    retries: 1
  - id: stage_02
    service: cockroachdb
    case: initialize
    retries: 1
  - id: stage_03
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 32MiB
  - id: stage_04
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 128MiB
  - id: stage_05
    service: cockroachdb
    case: zone-config
    retries: 1
    param_overrides:
      gc_ttl_seconds: 86400
  - id: stage_06
    service: cockroachdb
    case: zone-config
    retries: 1
    param_overrides:
      gc_ttl_seconds: 14400
  - id: stage_07
    service: cockroachdb
    case: zone-config
    retries: 1
    param_overrides:
      gc_ttl_seconds: 3600
  - id: stage_08
    service: cockroachdb
    case: monitoring-integration
    retries: 1
  - id: stage_09
    service: cockroachdb
    case: expose-ingress
    retries: 1
  - id: stage_10
    service: cockroachdb
    case: health-check-recovery
    retries: 1
  - id: stage_11
    service: cockroachdb
    case: version-check
    retries: 1
    param_overrides:
      report_key: bringup_tune_version
  - id: stage_12
    service: cockroachdb
    case: partitioned-update
    retries: 1
    param_overrides:
      to_version: 24.1.1
