# workflows/long/nginx-long-17-multihost-expansion
#
# nginx-ingress: Multi-Host Expansion — add hosts progressively, then harden

metadata:
  id: nginx-long-17-multihost-expansion
  label: 'nginx-ingress: Multi-Host Expansion — add hosts progressively, then harden'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: create_ingress
    retries: 1
    param_overrides:
      host: app1.example.com
      path: /
  - id: stage_02
    service: nginx-ingress
    case: create_ingress
    retries: 1
    param_overrides:
      host: app2.example.com
      path: /api
  - id: stage_03
    service: nginx-ingress
    case: create_ingress
    retries: 1
    param_overrides:
      host: app3.example.com
      path: /health
  - id: stage_04
    service: nginx-ingress
    case: create_ingress
    retries: 1
    param_overrides:
      host: app4.example.com
      path: /metrics
  - id: stage_05
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 1
  - id: stage_06
    service: nginx-ingress
    case: ingress_canary
    retries: 1
  - id: stage_07
    service: nginx-ingress
    case: renew_tls_secret
    retries: 1
  - id: stage_08
    service: nginx-ingress
    case: otel_log_format
    retries: 1
  - id: stage_09
    service: nginx-ingress
    case: class_only_upgrade
    retries: 1
  - id: stage_10
    service: nginx-ingress
    case: rate_limit_replica_hard
    retries: 1
  - id: stage_11
    service: nginx-ingress
    case: ingress_canary
    retries: 1
    param_overrides:
      header_value: beta
