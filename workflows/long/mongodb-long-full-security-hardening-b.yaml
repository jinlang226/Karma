# workflows/long/mongodb-long-full-security-hardening-b
#
# MongoDB full security hardening B: deploy → init → TLS → cert-rotate × 2 → custom-roles → users → password × 2 → monitor → config → decomm (primary-stepdown adversary)

metadata:
  id: mongodb-long-full-security-hardening-b
  label: 'MongoDB full security hardening B: deploy → init → TLS → cert-rotate × 2 → custom-roles → users
    → password × 2 → monitor → config → decomm (primary-stepdown adversary)'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: primary_stepdown
    inject_at_stage: stage_06
    lift_at_stage: stage_09
  stages:
  - id: stage_01
    service: mongodb
    case: deploy
    retries: 1
  - id: stage_02
    service: mongodb
    case: initialize
    retries: 1
  - id: stage_03
    service: mongodb
    case: tls-setup
    retries: 1
  - id: stage_04
    service: mongodb
    case: certificate-rotation
    retries: 1
  - id: stage_05
    service: mongodb
    case: custom-roles
    retries: 1
  - id: stage_06
    service: mongodb
    case: user-management
    retries: 1
  - id: stage_07
    service: mongodb
    case: certificate-rotation
    retries: 1
  - id: stage_08
    service: mongodb
    case: password-rotation
    retries: 1
  - id: stage_09
    service: mongodb
    case: password-rotation
    retries: 1
  - id: stage_10
    service: mongodb
    case: monitoring-integration
    retries: 1
  - id: stage_11
    service: mongodb
    case: mongod-config-update
    retries: 1
    param_overrides:
      target_journal_compressor: zlib
  - id: stage_12
    service: mongodb
    case: decommission
    retries: 1
