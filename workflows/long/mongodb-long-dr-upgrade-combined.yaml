# workflows/long/mongodb-long-dr-upgrade-combined
#
# MongoDB DR + upgrade combined: deploy → init → TLS → health-recovery → probe-tune → upgrade-5-to-6 → cert-rotate → scale → custom-roles → monitor → password-rotation → decomm (scale-down adversary)

metadata:
  id: mongodb-long-dr-upgrade-combined
  label: 'MongoDB DR + upgrade combined: deploy → init → TLS → health-recovery → probe-tune → upgrade-5-to-6
    → cert-rotate → scale → custom-roles → monitor → password-rotation → decomm (scale-down adversary)'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: scale_down_replica
    inject_at_stage: stage_08
    lift_at_stage: stage_10
  stages:
  - id: stage_01
    service: mongodb
    case: deploy
    retries: 0
  - id: stage_02
    service: mongodb
    case: initialize
    retries: 0
  - id: stage_03
    service: mongodb
    case: tls-setup
    retries: 0
  - id: stage_04
    service: mongodb
    case: health-check-recovery
    retries: 0
  - id: stage_05
    service: mongodb
    case: readiness-probe-tuning
    retries: 0
  - id: stage_06
    service: mongodb
    case: version-upgrade
    retries: 0
  - id: stage_07
    service: mongodb
    case: certificate-rotation
    retries: 0
  - id: stage_08
    service: mongodb
    case: replica-scaling
    retries: 0
    param_overrides:
      target_replicas: '5'
  - id: stage_09
    service: mongodb
    case: custom-roles
    retries: 0
  - id: stage_10
    service: mongodb
    case: monitoring-integration
    retries: 0
  - id: stage_11
    service: mongodb
    case: password-rotation
    retries: 0
  - id: stage_12
    service: mongodb
    case: decommission
    retries: 0
