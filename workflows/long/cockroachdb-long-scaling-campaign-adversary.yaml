# workflows/long/cockroachdb-long-scaling-campaign-adversary
#
# CockroachDB scaling campaign with rebalance-rate throttle adversary mid-sweep

metadata:
  id: cockroachdb-long-scaling-campaign-adversary
  label: CockroachDB scaling campaign with rebalance-rate throttle adversary mid-sweep
spec:
  prompt_mode: progressive
  adversary:
  - scenario: throttle_rebalance_rate
    inject_at_stage: stage_05
    lift_at_stage: stage_06
  stages:
  - id: stage_01
    service: cockroachdb
    case: deploy
    retries: 0
  - id: stage_02
    service: cockroachdb
    case: initialize
    retries: 0
  - id: stage_03
    service: cockroachdb
    case: cluster-settings
    retries: 0
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 64MiB
  - id: stage_04
    service: cockroachdb
    case: cluster-settings
    retries: 0
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 96MiB
  - id: stage_05
    service: cockroachdb
    case: cluster-settings
    retries: 0
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 128MiB
  - id: stage_06
    service: cockroachdb
    case: zone-config
    retries: 0
    param_overrides:
      gc_ttl_seconds: 43200
  - id: stage_07
    service: cockroachdb
    case: zone-config
    retries: 0
    param_overrides:
      gc_ttl_seconds: 14400
  - id: stage_08
    service: cockroachdb
    case: zone-config
    retries: 0
    param_overrides:
      gc_ttl_seconds: 3600
  - id: stage_09
    service: cockroachdb
    case: version-check
    retries: 0
    param_overrides:
      report_key: post_tuning_version
  - id: stage_10
    service: cockroachdb
    case: partitioned-update
    retries: 0
    param_overrides:
      to_version: 24.1.1
  - id: stage_11
    service: cockroachdb
    case: health-check-recovery
    retries: 0
  - id: stage_12
    service: cockroachdb
    case: decommission
    retries: 0
