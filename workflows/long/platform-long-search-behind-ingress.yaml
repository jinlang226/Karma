# workflows/long/platform-long-search-behind-ingress
#
# Platform — search platform behind ingress: Elasticsearch + NGINX

metadata:
  id: platform-long-search-behind-ingress
  label: 'Platform — search platform behind ingress: Elasticsearch + NGINX'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: strip_rate_limit_annotation
    inject_at_stage: stage_08
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
  - id: stage_02
    service: elasticsearch
    case: file-realm-user-roles-merge
    retries: 0
  - id: stage_03
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 0
  - id: stage_04
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 0
  - id: stage_05
    service: elasticsearch
    case: stack-monitoring-sidecars
    retries: 0
  - id: stage_06
    service: nginx-ingress
    case: create_ingress
    retries: 0
  - id: stage_07
    service: nginx-ingress
    case: ingress_canary
    retries: 0
  - id: stage_08
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 0
  - id: stage_09
    service: nginx-ingress
    case: renew_tls_secret
    retries: 0
  - id: stage_10
    service: nginx-ingress
    case: otel_log_format
    retries: 0
