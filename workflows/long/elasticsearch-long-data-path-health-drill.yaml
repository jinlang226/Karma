# workflows/long/elasticsearch-long-data-path-health-drill
#
# Elasticsearch data path health drill: shard allocation, upgrade, downscale

metadata:
  id: elasticsearch-long-data-path-health-drill
  label: 'Elasticsearch data path health drill: shard allocation, upgrade, downscale'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: shard-allocation-disabled
    inject_at_stage: stage_04
    lift_at_stage: stage_06
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
  - id: stage_02
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 0
  - id: stage_03
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 0
  - id: stage_04
    service: elasticsearch
    case: full-restart-upgrade-ha
    retries: 0
  - id: stage_05
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 0
    param_overrides:
      expected_nodes: '5'
      original_replicas: '1'
  - id: stage_06
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 0
  - id: stage_07
    service: elasticsearch
    case: stack-monitoring-sidecars
    retries: 0
