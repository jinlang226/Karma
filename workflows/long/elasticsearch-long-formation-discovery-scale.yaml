# workflows/long/elasticsearch-long-formation-discovery-scale
#
# Elasticsearch cluster formation, discovery repair, and scale combined long run

metadata:
  id: elasticsearch-long-formation-discovery-scale
  label: Elasticsearch cluster formation, discovery repair, and scale combined long run
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: bootstrap-initial-master-nodes
    retries: 0
  - id: stage_02
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
  - id: stage_03
    service: elasticsearch
    case: seed-hosts-repair
    retries: 0
  - id: stage_04
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 0
  - id: stage_05
    service: elasticsearch
    case: seed-hosts-repair
    retries: 0
  - id: stage_06
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 0
    param_overrides:
      expected_nodes: '7'
      original_replicas: '5'
  - id: stage_08
    service: elasticsearch
    case: seed-hosts-repair
    retries: 0
  - id: stage_10
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 0
