# workflows/long/elasticsearch-long-dr-shard-upgrade
#
# Elasticsearch DR rehearsal: shard migration, upgrade, and allocation recovery

metadata:
  id: elasticsearch-long-dr-shard-upgrade
  label: 'Elasticsearch DR rehearsal: shard migration, upgrade, and allocation recovery'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: shard-allocation-disabled
    inject_at_stage: stage_06
    lift_at_stage: stage_08
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
  - id: stage_02
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 0
  - id: stage_04
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 0
  - id: stage_05
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 0
  - id: stage_06
    service: elasticsearch
    case: full-restart-upgrade-ha
    retries: 0
  - id: stage_08
    service: elasticsearch
    case: full-restart-upgrade-ha-hard
    retries: 0
  - id: stage_09
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 0
  - id: stage_10
    service: elasticsearch
    case: stack-monitoring-sidecars
    retries: 0
