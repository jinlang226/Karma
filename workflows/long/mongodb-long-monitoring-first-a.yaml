# workflows/long/mongodb-long-monitoring-first-a
#
# MongoDB monitoring-first A: deploy → init → monitor → config × 3 → scale → probe-tune × 2 → users → password-rotation → decomm

metadata:
  id: mongodb-long-monitoring-first-a
  label: 'MongoDB monitoring-first A: deploy → init → monitor → config × 3 → scale → probe-tune × 2 →
    users → password-rotation → decomm'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: deploy
    retries: 0
  - id: stage_02
    service: mongodb
    case: initialize
    retries: 0
  - id: stage_03
    service: mongodb
    case: monitoring-integration
    retries: 0
  - id: stage_04
    service: mongodb
    case: mongod-config-update
    retries: 0
    param_overrides:
      target_journal_compressor: zlib
  - id: stage_05
    service: mongodb
    case: replica-scaling
    retries: 0
    param_overrides:
      target_replicas: '5'
  - id: stage_06
    service: mongodb
    case: mongod-config-update
    retries: 0
    param_overrides:
      target_journal_compressor: snappy
  - id: stage_07
    service: mongodb
    case: readiness-probe-tuning
    retries: 0
  - id: stage_08
    service: mongodb
    case: mongod-config-update
    retries: 0
    param_overrides:
      target_journal_compressor: zlib
  - id: stage_09
    service: mongodb
    case: readiness-probe-tuning
    retries: 0
  - id: stage_10
    service: mongodb
    case: user-management
    retries: 0
