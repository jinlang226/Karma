# workflows/long/mongodb-long-all-cases-marathon-b
#
# MongoDB all-cases marathon B: all 18 cases in operational order (network-policy-block adversary mid-run)

metadata:
  id: mongodb-long-all-cases-marathon-b
  label: 'MongoDB all-cases marathon B: all 18 cases in operational order (network-policy-block adversary
    mid-run)'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: network_policy_block
    inject_at_stage: stage_08
    lift_at_stage: stage_11
  stages:
  - id: stage_01
    service: mongodb
    case: deploy
    retries: 1
  - id: stage_02
    service: mongodb
    case: initialize
    retries: 1
  - id: stage_03
    service: mongodb
    case: user-management
    retries: 1
  - id: stage_04
    service: mongodb
    case: custom-roles
    retries: 1
  - id: stage_05
    service: mongodb
    case: tls-setup
    retries: 1
  - id: stage_06
    service: mongodb
    case: certificate-rotation
    retries: 1
  - id: stage_07
    service: mongodb
    case: external-access-horizons
    retries: 1
  - id: stage_08
    service: mongodb
    case: replica-scaling
    retries: 1
    param_overrides:
      target_replicas: '5'
  - id: stage_09
    service: mongodb
    case: arbiters
    retries: 1
  - id: stage_10
    service: mongodb
    case: statefulset-customization
    retries: 1
  - id: stage_11
    service: mongodb
    case: health-check-recovery
    retries: 1
  - id: stage_12
    service: mongodb
    case: readiness-probe-tuning
    retries: 1
  - id: stage_13
    service: mongodb
    case: mongod-config-update
    retries: 1
    param_overrides:
      target_journal_compressor: snappy
  - id: stage_14
    service: mongodb
    case: monitoring-integration
    retries: 1
  - id: stage_15
    service: mongodb
    case: password-rotation
    retries: 1
  - id: stage_16
    service: mongodb
    case: version-upgrade
    retries: 1
  - id: stage_17
    service: mongodb
    case: decommission
    retries: 1
