# workflows/long/mongodb-long-incident-response-b
#
# MongoDB incident response chain B: deploy → init → statefulset-custom → health-recovery → probe-tune → health-recovery → scale → TLS → monitor → cert-rotate → decomm (primary-stepdown adversary)

metadata:
  id: mongodb-long-incident-response-b
  label: 'MongoDB incident response chain B: deploy → init → statefulset-custom → health-recovery → probe-tune
    → health-recovery → scale → TLS → monitor → cert-rotate → decomm (primary-stepdown adversary)'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: primary_stepdown
    inject_at_stage: stage_04
    lift_at_stage: stage_06
  stages:
  - id: stage_01
    service: mongodb
    case: deploy
    retries: 0
  - id: stage_02
    service: mongodb
    case: initialize
    retries: 0
  - id: stage_03
    service: mongodb
    case: statefulset-customization
    retries: 0
  - id: stage_04
    service: mongodb
    case: health-check-recovery
    retries: 0
  - id: stage_05
    service: mongodb
    case: readiness-probe-tuning
    retries: 0
  - id: stage_06
    service: mongodb
    case: health-check-recovery
    retries: 0
  - id: stage_07
    service: mongodb
    case: replica-scaling
    retries: 0
    param_overrides:
      target_replicas: '5'
  - id: stage_08
    service: mongodb
    case: tls-setup
    retries: 0
  - id: stage_09
    service: mongodb
    case: monitoring-integration
    retries: 0
  - id: stage_10
    service: mongodb
    case: certificate-rotation
    retries: 0
  - id: stage_11
    service: mongodb
    case: decommission
    retries: 0
