# workflows/long/ray-long-dashboard-svc-delete
#
# Ray dashboard-centric with head-service deletion adversary: dashboard exposed, service deleted mid-scale, agent restores

metadata:
  id: ray-long-dashboard-svc-delete
  label: 'Ray dashboard-centric with head-service deletion adversary: dashboard exposed, service deleted
    mid-scale, agent restores'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: delete_head_service
    inject_at_stage: stage_05
    lift_at_stage: stage_09
  stages:
  - id: stage_01
    service: ray
    case: deploy_cluster
    retries: 0
    param_overrides:
      worker_replicas: '2'
  - id: stage_02
    service: ray
    case: dashboard_exposure
    retries: 0
    param_overrides:
      dashboard_port: '8265'
  - id: stage_03
    service: ray
    case: job_submission
    retries: 0
    param_overrides:
      expected_output: pong
  - id: stage_04
    service: ray
    case: scale_workers
    retries: 0
    param_overrides:
      source_worker_replicas: '2'
      target_worker_replicas: '3'
  - id: stage_05
    service: ray
    case: scale_workers
    retries: 0
    param_overrides:
      source_worker_replicas: '3'
      target_worker_replicas: '4'
  - id: stage_06
    service: ray
    case: scale_workers
    retries: 0
    param_overrides:
      source_worker_replicas: '4'
      target_worker_replicas: '5'
  - id: stage_07
    service: ray
    case: job_submission
    retries: 0
    param_overrides:
      expected_output: pong
  - id: stage_08
    service: ray
    case: upgrade_version
    retries: 0
    param_overrides:
      from_image: rayproject/ray:2.8.0
      to_image: rayproject/ray:2.9.0
  - id: stage_09
    service: ray
    case: worker_recovery
    retries: 0
  - id: stage_10
    service: ray
    case: job_submission
    retries: 0
    param_overrides:
      expected_output: pong
  - id: stage_11
    service: ray
    case: teardown_cluster
    retries: 0
