# workflows/long/elasticsearch-long-security-transform-seed
#
# Elasticsearch security, transform, and seed-hosts combined long run

metadata:
  id: elasticsearch-long-security-transform-seed
  label: Elasticsearch security, transform, and seed-hosts combined long run
spec:
  prompt_mode: progressive
  adversary:
  - scenario: es-config-seed-hosts-drift
    inject_at_stage: stage_03
    lift_at_stage: stage_05
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: file-realm-user-roles-merge
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: seed-hosts-repair
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: rotate-elastic-password
    retries: 1
  - id: stage_05
    service: elasticsearch
    case: transform-job-recovery
    retries: 1
  - id: stage_06
    service: elasticsearch
    case: rotate-http-certs
    retries: 1
  - id: stage_07
    service: elasticsearch
    case: seed-hosts-repair
    retries: 1
  - id: stage_08
    service: elasticsearch
    case: transport-additional-ca-trust
    retries: 1
  - id: stage_09
    service: elasticsearch
    case: transform-job-recovery
    retries: 1
  - id: stage_10
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 1
