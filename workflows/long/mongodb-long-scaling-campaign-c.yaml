# workflows/long/mongodb-long-scaling-campaign-c
#
# MongoDB scaling campaign C: deploy → init → scale 3→5 → probe-tune → scale 5→7 → config → scale 7→5 → monitor → scale 5→3 → password-rotation → decomm (scale-down adversary)

metadata:
  id: mongodb-long-scaling-campaign-c
  label: 'MongoDB scaling campaign C: deploy → init → scale 3→5 → probe-tune → scale 5→7 → config → scale
    7→5 → monitor → scale 5→3 → password-rotation → decomm (scale-down adversary)'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: scale_down_replica
    inject_at_stage: stage_05
    lift_at_stage: stage_07
  stages:
  - id: stage_01
    service: mongodb
    case: deploy
    retries: 0
  - id: stage_02
    service: mongodb
    case: initialize
    retries: 0
  - id: stage_03
    service: mongodb
    case: replica-scaling
    retries: 0
    param_overrides:
      target_replicas: '5'
  - id: stage_04
    service: mongodb
    case: readiness-probe-tuning
    retries: 0
  - id: stage_05
    service: mongodb
    case: replica-scaling
    retries: 0
    param_overrides:
      target_replicas: '7'
  - id: stage_06
    service: mongodb
    case: mongod-config-update
    retries: 0
    param_overrides:
      target_journal_compressor: snappy
  - id: stage_07
    service: mongodb
    case: replica-scaling
    retries: 0
    param_overrides:
      target_replicas: '5'
  - id: stage_08
    service: mongodb
    case: monitoring-integration
    retries: 0
  - id: stage_09
    service: mongodb
    case: replica-scaling
    retries: 0
    param_overrides:
      target_replicas: '3'
  - id: stage_10
    service: mongodb
    case: password-rotation
    retries: 0
  - id: stage_11
    service: mongodb
    case: decommission
    retries: 0
