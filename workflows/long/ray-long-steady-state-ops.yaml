# workflows/long/ray-long-steady-state-ops
#
# Ray steady-state operations: deploy, 3 job runs, scale 2→4→5→3, recovery, re-expose dashboard, 2 more jobs

metadata:
  id: ray-long-steady-state-ops
  label: 'Ray steady-state operations: deploy, 3 job runs, scale 2→4→5→3, recovery, re-expose dashboard,
    2 more jobs'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: ray
    case: deploy_cluster
    retries: 1
    param_overrides:
      worker_replicas: '2'
  - id: stage_02
    service: ray
    case: job_submission
    retries: 1
    param_overrides:
      expected_output: pong
  - id: stage_03
    service: ray
    case: scale_workers
    retries: 1
    param_overrides:
      source_worker_replicas: '2'
      target_worker_replicas: '4'
  - id: stage_04
    service: ray
    case: job_submission
    retries: 1
    param_overrides:
      expected_output: pong
  - id: stage_05
    service: ray
    case: scale_workers
    retries: 1
    param_overrides:
      source_worker_replicas: '4'
      target_worker_replicas: '5'
  - id: stage_06
    service: ray
    case: worker_recovery
    retries: 1
  - id: stage_07
    service: ray
    case: job_submission
    retries: 1
    param_overrides:
      expected_output: pong
  - id: stage_08
    service: ray
    case: scale_workers
    retries: 1
    param_overrides:
      source_worker_replicas: '5'
      target_worker_replicas: '3'
  - id: stage_09
    service: ray
    case: dashboard_exposure
    retries: 1
    param_overrides:
      dashboard_port: '8265'
  - id: stage_10
    service: ray
    case: job_submission
    retries: 1
    param_overrides:
      expected_output: pong
  - id: stage_11
    service: ray
    case: teardown_cluster
    retries: 1
