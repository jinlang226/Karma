# workflows/long/es-long-disaster-recovery-drill
#
# Elasticsearch disaster recovery drill: snapshot backup then fault + restore

metadata:
  id: es-long-disaster-recovery-drill
  label: 'Elasticsearch disaster recovery drill: snapshot backup then fault + restore'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: snapshot-secret-wiped
    inject_at_stage: stage_05
    lift_at_stage: stage_07
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: file-realm-user-roles-merge
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: rotate-elastic-password
    retries: 1
  - id: stage_05
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 1
  - id: stage_06
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 1
  - id: stage_07
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 1
  - id: stage_08
    service: elasticsearch
    case: safe-downscale-with-shard-migration
    retries: 1
  - id: stage_09
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 1
  - id: stage_10
    service: elasticsearch
    case: full-restart-upgrade-ha
    retries: 1
  - id: stage_11
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 1
