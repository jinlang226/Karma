# workflows/long/elasticsearch-long-large-cluster-scale-sweep
#
# Elasticsearch large cluster scale-up sweep to high node counts

metadata:
  id: elasticsearch-long-large-cluster-scale-sweep
  label: Elasticsearch large cluster scale-up sweep to high node counts
spec:
  prompt_mode: progressive
  adversary:
  - scenario: shard-allocation-disabled
    inject_at_stage: stage_05
    lift_at_stage: stage_07
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
  - id: stage_02
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 0
  - id: stage_03
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 0
    param_overrides:
      expected_nodes: '7'
      original_replicas: '5'
  - id: stage_04
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 0
  - id: stage_05
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 0
    param_overrides:
      expected_nodes: '9'
      original_replicas: '7'
  - id: stage_06
    service: elasticsearch
    case: stack-monitoring-sidecars
    retries: 0
  - id: stage_07
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 0
    param_overrides:
      expected_nodes: '11'
      original_replicas: '9'
  - id: stage_08
    service: elasticsearch
    case: safe-downscale-with-shard-migration
    retries: 0
    param_overrides:
      target_replicas: '5'
  - id: stage_09
    service: elasticsearch
    case: safe-downscale-with-shard-migration
    retries: 0
    param_overrides:
      target_replicas: '3'
  - id: stage_10
    service: elasticsearch
    case: seed-hosts-repair
    retries: 0
