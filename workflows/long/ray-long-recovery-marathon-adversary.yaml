# workflows/long/ray-long-recovery-marathon-adversary
#
# Ray recovery marathon with scale-down adversary: multiple recovery checks, adversary shrinks workers between recoveries

metadata:
  id: ray-long-recovery-marathon-adversary
  label: 'Ray recovery marathon with scale-down adversary: multiple recovery checks, adversary shrinks
    workers between recoveries'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: scale_down_workers
    inject_at_stage: stage_05
    lift_at_stage: stage_07
    param_overrides:
      wrong_replicas: '2'
      restore_replicas: '5'
  stages:
  - id: stage_01
    service: ray
    case: deploy_cluster
    retries: 1
    param_overrides:
      worker_replicas: '2'
  - id: stage_02
    service: ray
    case: worker_recovery
    retries: 1
  - id: stage_03
    service: ray
    case: scale_workers
    retries: 1
    param_overrides:
      source_worker_replicas: '2'
      target_worker_replicas: '4'
  - id: stage_04
    service: ray
    case: job_submission
    retries: 1
    param_overrides:
      expected_output: pong
  - id: stage_05
    service: ray
    case: scale_workers
    retries: 1
    param_overrides:
      source_worker_replicas: '4'
      target_worker_replicas: '5'
  - id: stage_06
    service: ray
    case: job_submission
    retries: 1
    param_overrides:
      expected_output: pong
  - id: stage_07
    service: ray
    case: worker_recovery
    retries: 1
  - id: stage_08
    service: ray
    case: upgrade_version
    retries: 1
    param_overrides:
      from_image: rayproject/ray:2.8.0
      to_image: rayproject/ray:2.9.0
  - id: stage_09
    service: ray
    case: scale_workers
    retries: 1
    param_overrides:
      source_worker_replicas: '5'
      target_worker_replicas: '3'
  - id: stage_10
    service: ray
    case: job_submission
    retries: 1
    param_overrides:
      expected_output: pong
  - id: stage_11
    service: ray
    case: teardown_cluster
    retries: 1
