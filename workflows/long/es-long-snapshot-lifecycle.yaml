# workflows/long/es-long-snapshot-lifecycle
#
# Elasticsearch snapshot repository lifecycle and backup schedule marathon

metadata:
  id: es-long-snapshot-lifecycle
  label: Elasticsearch snapshot repository lifecycle and backup schedule marathon
spec:
  prompt_mode: progressive
  adversary:
  - scenario: snapshot-secret-wiped
    inject_at_stage: stage_03
    lift_at_stage: stage_05
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: rotate-elastic-password
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 1
  - id: stage_05
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 1
  - id: stage_06
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 1
  - id: stage_07
    service: elasticsearch
    case: full-restart-upgrade-ha
    retries: 1
  - id: stage_08
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 1
  - id: stage_09
    service: elasticsearch
    case: stack-monitoring-sidecars
    retries: 1
  - id: stage_10
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 1
