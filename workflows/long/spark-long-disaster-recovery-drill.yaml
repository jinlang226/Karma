# workflows/long/spark-long-disaster-recovery-drill
#
# Disaster recovery drill: triage a worker outage, recover the runtime config and
# credentials, restore the ETL/skew data paths, validate streaming under load,
# bring tenants back, and finish with a full smoke deploy.

metadata:
  id: spark-long-disaster-recovery-drill
  label: 'Disaster recovery drill: triage worker outage, runtime/credential recovery, ETL restore, streaming validation, tenant recovery, smoke test'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: spark
    case: spark_streaming_autoscale
    retries: 0
  - id: stage_02
    service: spark
    case: spark_runtime_ops
    retries: 0
  - id: stage_03
    service: spark
    case: spark_etl_skew_oom
    retries: 0
  - id: stage_04
    service: spark
    case: spark_data_skew
    retries: 0
  - id: stage_05
    service: spark
    case: spark_multi_tenant
    retries: 0
  - id: stage_06
    service: spark
    case: spark_runtime_ops
    retries: 0
  - id: stage_07
    service: spark
    case: spark_streaming_autoscale
    retries: 0
  - id: stage_08
    service: spark
    case: spark_etl_skew_oom
    retries: 0
  - id: stage_09
    service: spark
    case: spark_data_skew
    retries: 0
  - id: stage_10
    service: spark
    case: deploy_spark_pi
    retries: 0
