# workflows/long/nginx-ingress-long-08-otel-configmap-fault
#
# nginx-ingress: OTel Rollout — corrupt ConfigMap injected during trace enable

metadata:
  id: nginx-ingress-long-08-otel-configmap-fault
  label: 'nginx-ingress: OTel Rollout — corrupt ConfigMap injected during trace enable'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: corrupt_ingress_nginx_configmap
    inject_at_stage: stage_03
    lift_at_stage: stage_06
  stages:
  - id: stage_01
    service: nginx-ingress
    case: create_ingress
    retries: 1
  - id: stage_02
    service: nginx-ingress
    case: otel_log_format
    retries: 1
  - id: stage_03
    service: nginx-ingress
    case: otel_log_format
    retries: 1
    param_overrides:
      path: /check2
  - id: stage_04
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 1
  - id: stage_05
    service: nginx-ingress
    case: otel_log_format
    retries: 1
    param_overrides:
      path: /rate-trace
  - id: stage_06
    service: nginx-ingress
    case: ingress_canary
    retries: 1
  - id: stage_07
    service: nginx-ingress
    case: otel_log_format
    retries: 1
    param_overrides:
      path: /canary-trace
  - id: stage_08
    service: nginx-ingress
    case: renew_tls_secret
    retries: 1
  - id: stage_09
    service: nginx-ingress
    case: otel_log_format
    retries: 1
    param_overrides:
      path: /tls-trace
  - id: stage_10
    service: nginx-ingress
    case: class_only_upgrade
    retries: 1
  - id: stage_11
    service: nginx-ingress
    case: otel_log_format
    retries: 1
    param_overrides:
      path: /final-trace
