# workflows/long/elasticsearch-long-observability-rollout
#
# Elasticsearch observability and monitoring rollout campaign

metadata:
  id: elasticsearch-long-observability-rollout
  label: Elasticsearch observability and monitoring rollout campaign
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: stack-monitoring-sidecars
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: stack-monitoring-sidecars
    retries: 1
  - id: stage_05
    service: elasticsearch
    case: full-restart-upgrade-ha
    retries: 1
  - id: stage_06
    service: elasticsearch
    case: stack-monitoring-sidecars
    retries: 1
  - id: stage_07
    service: elasticsearch
    case: rotate-elastic-password
    retries: 1
  - id: stage_08
    service: elasticsearch
    case: stack-monitoring-sidecars
    retries: 1
  - id: stage_09
    service: elasticsearch
    case: safe-downscale-with-shard-migration
    retries: 1
  - id: stage_10
    service: elasticsearch
    case: stack-monitoring-sidecars
    retries: 1
