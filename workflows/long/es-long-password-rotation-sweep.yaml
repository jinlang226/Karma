# workflows/long/es-long-password-rotation-sweep
#
# Elasticsearch progressive password rotation and auth hardening sweep

metadata:
  id: es-long-password-rotation-sweep
  label: Elasticsearch progressive password rotation and auth hardening sweep
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: rotate-elastic-password
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: file-realm-user-roles-merge
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: rotate-elastic-password
    retries: 1
  - id: stage_05
    service: elasticsearch
    case: rotate-http-certs
    retries: 1
  - id: stage_06
    service: elasticsearch
    case: file-realm-user-roles-merge
    retries: 1
  - id: stage_07
    service: elasticsearch
    case: rotate-elastic-password
    retries: 1
  - id: stage_08
    service: elasticsearch
    case: transport-additional-ca-trust
    retries: 1
  - id: stage_09
    service: elasticsearch
    case: file-realm-user-roles-merge
    retries: 1
  - id: stage_10
    service: elasticsearch
    case: rotate-elastic-password
    retries: 1
