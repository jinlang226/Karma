# workflows/long/cockroachdb-long-full-secure-lifecycle
#
# CockroachDB full secure lifecycle: TLS from day-1 through decommission

metadata:
  id: cockroachdb-long-full-secure-lifecycle
  label: 'CockroachDB full secure lifecycle: TLS from day-1 through decommission'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: deploy
    retries: 0
  - id: stage_02
    service: cockroachdb
    case: initialize
    retries: 0
  - id: stage_03
    service: cockroachdb
    case: generate-cert
    retries: 0
  - id: stage_04
    service: cockroachdb
    case: certificate-rotation
    retries: 0
  - id: stage_05
    service: cockroachdb
    case: certificate-rotation
    retries: 0
  - id: stage_06
    service: cockroachdb
    case: certificate-rotation
    retries: 0
  - id: stage_07
    service: cockroachdb
    case: zone-config
    retries: 0
    param_overrides:
      gc_ttl_seconds: 43200
  - id: stage_08
    service: cockroachdb
    case: zone-config
    retries: 0
    param_overrides:
      gc_ttl_seconds: 14400
  - id: stage_09
    service: cockroachdb
    case: monitoring-integration
    retries: 0
  - id: stage_10
    service: cockroachdb
    case: expose-ingress
    retries: 0
  - id: stage_11
    service: cockroachdb
    case: partitioned-update
    retries: 0
    param_overrides:
      to_version: 24.1.1
  - id: stage_12
    service: cockroachdb
    case: major-upgrade-finalize
    retries: 0
  - id: stage_13
    service: cockroachdb
    case: decommission
    retries: 0
