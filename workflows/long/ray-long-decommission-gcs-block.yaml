# workflows/long/ray-long-decommission-gcs-block
#
# Ray decommission with GCS block adversary: scale-down campaign, adversary blocks GCS mid-decom, agent recovers

metadata:
  id: ray-long-decommission-gcs-block
  label: 'Ray decommission with GCS block adversary: scale-down campaign, adversary blocks GCS mid-decom,
    agent recovers'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: block_gcs_port
    inject_at_stage: stage_04
    lift_at_stage: stage_08
  stages:
  - id: stage_01
    service: ray
    case: deploy_cluster
    retries: 1
    param_overrides:
      worker_replicas: '5'
  - id: stage_02
    service: ray
    case: job_submission
    retries: 1
    param_overrides:
      expected_output: pong
  - id: stage_03
    service: ray
    case: scale_workers
    retries: 1
    param_overrides:
      source_worker_replicas: '5'
      target_worker_replicas: '4'
  - id: stage_04
    service: ray
    case: scale_workers
    retries: 1
    param_overrides:
      source_worker_replicas: '4'
      target_worker_replicas: '3'
  - id: stage_05
    service: ray
    case: job_submission
    retries: 1
    param_overrides:
      expected_output: pong
  - id: stage_06
    service: ray
    case: dashboard_exposure
    retries: 1
    param_overrides:
      dashboard_port: '8265'
  - id: stage_07
    service: ray
    case: scale_workers
    retries: 1
    param_overrides:
      source_worker_replicas: '3'
      target_worker_replicas: '2'
  - id: stage_08
    service: ray
    case: worker_recovery
    retries: 1
  - id: stage_09
    service: ray
    case: job_submission
    retries: 1
    param_overrides:
      expected_output: pong
  - id: stage_10
    service: ray
    case: scale_workers
    retries: 1
    param_overrides:
      source_worker_replicas: '2'
      target_worker_replicas: '3'
  - id: stage_11
    service: ray
    case: teardown_cluster
    retries: 1
