# workflows/long/spark-long-runtime-ops-marathon-adversary
#
# Runtime-ops marathon (progressive executor-memory hardening) with an adversarial
# secret-credential expiry injected mid-campaign while the agent tunes config.

metadata:
  id: spark-long-runtime-ops-marathon-adversary
  label: Runtime-ops marathon with progressive executor-memory hardening and adversarial secret expiry injected mid-campaign
spec:
  prompt_mode: progressive
  adversary:
  - scenario: secret_credential_expire
    inject_at_stage: stage_03
    lift_at_stage: stage_06
  stages:
  - id: stage_01
    service: spark
    case: spark_runtime_ops
    retries: 0
    param_overrides:
      executor_memory: 512m
  - id: stage_02
    service: spark
    case: spark_runtime_ops
    retries: 0
    param_overrides:
      executor_memory: 768m
  - id: stage_03
    service: spark
    case: spark_runtime_ops
    retries: 0
    param_overrides:
      executor_memory: 1g
  - id: stage_04
    service: spark
    case: spark_runtime_ops
    retries: 0
    param_overrides:
      executor_memory: 1280m
  - id: stage_05
    service: spark
    case: spark_runtime_ops
    retries: 0
    param_overrides:
      executor_memory: 1536m
  - id: stage_06
    service: spark
    case: spark_streaming_autoscale
    retries: 0
  - id: stage_07
    service: spark
    case: spark_data_skew
    retries: 0
  - id: stage_08
    service: spark
    case: spark_runtime_ops
    retries: 0
    param_overrides:
      executor_memory: 1792m
  - id: stage_09
    service: spark
    case: spark_runtime_ops
    retries: 0
    param_overrides:
      executor_memory: 2g
  - id: stage_10
    service: spark
    case: spark_runtime_ops
    retries: 0
    param_overrides:
      executor_memory: 2560m
  - id: stage_11
    service: spark
    case: spark_data_skew
    retries: 0
  - id: stage_12
    service: spark
    case: spark_multi_tenant
    retries: 0
