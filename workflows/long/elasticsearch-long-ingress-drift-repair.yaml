# workflows/long/elasticsearch-long-ingress-drift-repair
#
# Elasticsearch ingress and internal service drift combined repair marathon

metadata:
  id: elasticsearch-long-ingress-drift-repair
  label: Elasticsearch ingress and internal service drift combined repair marathon
spec:
  prompt_mode: progressive
  adversary:
  - scenario: http-service-selector-drift
    inject_at_stage: stage_02
    lift_at_stage: stage_04
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
  - id: stage_02
    service: elasticsearch
    case: internal-http-service-drift
    retries: 0
  - id: stage_03
    service: elasticsearch
    case: secure-http-ingress
    retries: 0
  - id: stage_04
    service: elasticsearch
    case: internal-http-service-drift
    retries: 0
  - id: stage_05
    service: elasticsearch
    case: rotate-http-certs
    retries: 0
  - id: stage_06
    service: elasticsearch
    case: secure-http-ingress
    retries: 0
  - id: stage_07
    service: elasticsearch
    case: rotate-elastic-password
    retries: 0
  - id: stage_08
    service: elasticsearch
    case: secure-http-ingress
    retries: 0
  - id: stage_09
    service: elasticsearch
    case: stack-monitoring-sidecars
    retries: 0
