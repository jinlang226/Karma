# workflows/long/es-long-discovery-repair-marathon
#
# Elasticsearch discovery and seed-hosts repair marathon

metadata:
  id: es-long-discovery-repair-marathon
  label: Elasticsearch discovery and seed-hosts repair marathon
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: seed-hosts-repair
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: transport-additional-ca-trust
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 1
  - id: stage_05
    service: elasticsearch
    case: bootstrap-initial-master-nodes
    retries: 1
  - id: stage_06
    service: elasticsearch
    case: seed-hosts-repair
    retries: 1
  - id: stage_07
    service: elasticsearch
    case: internal-http-service-drift
    retries: 1
  - id: stage_08
    service: elasticsearch
    case: master-downscale-voting-exclusions
    retries: 1
  - id: stage_09
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 1
  - id: stage_10
    service: elasticsearch
    case: stack-monitoring-sidecars
    retries: 1
