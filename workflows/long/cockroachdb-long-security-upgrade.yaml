# workflows/long/cockroachdb-long-security-upgrade
#
# CockroachDB security hardening then upgrade: TLS, certs, settings, and major version finalization

metadata:
  id: cockroachdb-long-security-upgrade
  label: 'CockroachDB security hardening then upgrade: TLS, certs, settings, and major version finalization'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: deploy
    retries: 0
    param_overrides:
      to_version: 23.2.0
  - id: stage_02
    service: cockroachdb
    case: initialize
    retries: 0
    param_overrides:
      crdb_version: '23.2.0'
  - id: stage_03
    service: cockroachdb
    case: generate-cert
    retries: 0
  - id: stage_04
    service: cockroachdb
    case: certificate-rotation
    retries: 0
  - id: stage_05
    service: cockroachdb
    case: certificate-rotation
    retries: 0
  - id: stage_06
    service: cockroachdb
    case: cluster-settings
    retries: 0
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 128MiB
  - id: stage_07
    service: cockroachdb
    case: zone-config
    retries: 0
    param_overrides:
      gc_ttl_seconds: 14400
  - id: stage_08
    service: cockroachdb
    case: partitioned-update
    retries: 0
    param_overrides:
      to_version: 23.2.7
  - id: stage_09
    service: cockroachdb
    case: major-upgrade-finalize
    retries: 0
    # Pin to 24.1.1 to match stage_08's partitioned-update; otherwise this stage
    # defaults to 24.1.0 and DOWNGRADES below the upgrade target (C10).
    param_overrides:
      to_version: 24.1.1
  - id: stage_10
    service: cockroachdb
    case: version-check
    retries: 0
    param_overrides:
      report_key: security_upgrade_version
      # Pin to the LAST upstream mutator (stage_09) declaratively (C10/C10b).
      to_version: ${stages.stage_09.params.to_version}
  - id: stage_11
    service: cockroachdb
    case: monitoring-integration
    retries: 0
