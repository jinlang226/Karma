# workflows/long/mongodb-long-tls-external-hardening-a
#
# MongoDB TLS + external-access hardening A: deploy → init → TLS → external-access → cert-rotate → custom-roles → users → scale → monitor → config → decomm

metadata:
  id: mongodb-long-tls-external-hardening-a
  label: 'MongoDB TLS + external-access hardening A: deploy → init → TLS → external-access → cert-rotate
    → custom-roles → users → scale → monitor → config → decomm'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: deploy
    retries: 0
  - id: stage_02
    service: mongodb
    case: initialize
    retries: 0
  - id: stage_03
    service: mongodb
    case: tls-setup
    retries: 0
  - id: stage_04
    service: mongodb
    case: external-access-horizons
    retries: 0
  - id: stage_05
    service: mongodb
    case: certificate-rotation
    retries: 0
  - id: stage_06
    service: mongodb
    case: custom-roles
    retries: 0
  - id: stage_07
    service: mongodb
    case: user-management
    retries: 0
  - id: stage_08
    service: mongodb
    case: replica-scaling
    retries: 0
    param_overrides:
      target_replicas: '5'
  - id: stage_09
    service: mongodb
    case: monitoring-integration
    retries: 0
  - id: stage_10
    service: mongodb
    case: mongod-config-update
    retries: 0
    param_overrides:
      target_journal_compressor: zlib
