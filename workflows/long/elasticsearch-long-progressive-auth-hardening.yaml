    service: elasticsearch
    case: file-realm-user-roles-merge
    retries: 0
  - id: stage_03
    service: elasticsearch
    case: rotate-elastic-password
    retries: 0
  - id: stage_04
    service: elasticsearch
    case: file-realm-user-roles-merge
    retries: 0
  - id: stage_05
    service: elasticsearch
    case: rotate-elastic-password
    retries: 0
  - id: stage_06
    service: elasticsearch
    case: rotate-http-certs
    retries: 0
  - id: stage_07
    service: elasticsearch
    case: file-realm-user-roles-merge
    retries: 0
  - id: stage_08
    service: elasticsearch
    case: rotate-elastic-password
    retries: 0
  - id: stage_09
    service: elasticsearch
    case: transport-additional-ca-trust
    retries: 0
  - id: stage_10
    service: elasticsearch
    case: rotate-elastic-password
    retries: 0
