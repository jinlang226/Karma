# workflows/long/nginx-ingress-long-27-decommission
#
# nginx-ingress: Multi-Host Build-Out — expose two hosts, then layer limits, canary, TLS, OTel

metadata:
  id: nginx-ingress-long-27-decommission
  label: 'nginx-ingress: Multi-Host Build-Out — expose two hosts, then layer limits, canary, TLS, OTel'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: create_ingress
    retries: 1
    param_overrides:
      host: app1.example.com
      path: /
  - id: stage_02
    service: nginx-ingress
    case: create_ingress
    retries: 1
    param_overrides:
      host: app2.example.com
      path: /api
  - id: stage_03
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 1
  - id: stage_04
    service: nginx-ingress
    case: ingress_canary
    retries: 1
  - id: stage_05
    service: nginx-ingress
    case: renew_tls_secret
    retries: 1
  - id: stage_06
    service: nginx-ingress
    case: otel_log_format
    retries: 1
  - id: stage_07
    service: nginx-ingress
    case: class_only_upgrade
    retries: 1
  - id: stage_08
    service: nginx-ingress
    case: ingress_canary
    retries: 1
    param_overrides:
      header_value: beta
  - id: stage_09
    service: nginx-ingress
    case: rate_limit_replica_hard
    retries: 1
  - id: stage_10
    service: nginx-ingress
    case: otel_log_format
    retries: 1
    param_overrides:
      path: /shutdown-trace
  - id: stage_11
    service: nginx-ingress
    case: renew_tls_secret
    retries: 1
    param_overrides:
      host: demo.example.com
