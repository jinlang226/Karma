# workflows/long/cockroachdb-long-decommission-saga
#
# CockroachDB decommission saga: settings tuning, zone config, upgrade, then graceful decommission

metadata:
  id: cockroachdb-long-decommission-saga
  label: 'CockroachDB decommission saga: settings tuning, zone config, upgrade, then graceful decommission'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: deploy
    retries: 0
  - id: stage_02
    service: cockroachdb
    case: initialize
    retries: 0
  - id: stage_03
    service: cockroachdb
    case: cluster-settings
    retries: 0
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 64MiB
  - id: stage_04
    service: cockroachdb
    case: cluster-settings
    retries: 0
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 128MiB
  - id: stage_05
    service: cockroachdb
    case: zone-config
    retries: 0
    param_overrides:
      gc_ttl_seconds: 14400
  - id: stage_06
    service: cockroachdb
    case: monitoring-integration
    retries: 0
  - id: stage_07
    service: cockroachdb
    case: version-check
    retries: 0
    param_overrides:
      report_key: pre_decom_version
  - id: stage_08
    service: cockroachdb
    case: partitioned-update
    retries: 0
    param_overrides:
      to_version: 24.1.1
  - id: stage_09
    service: cockroachdb
    case: major-upgrade-finalize
    retries: 0
  - id: stage_10
    service: cockroachdb
    case: version-check
    retries: 0
    param_overrides:
      report_key: post_upgrade_version
      to_version: 24.1.1
  - id: stage_11
    service: cockroachdb
    case: health-check-recovery
    retries: 0
  - id: stage_12
    service: cockroachdb
    case: decommission
    retries: 0
