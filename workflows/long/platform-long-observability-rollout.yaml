# workflows/long/platform-long-observability-rollout
#
# Platform — observability rollout across the whole estate

metadata:
  id: platform-long-observability-rollout
  label: Platform — observability rollout across the whole estate
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: deploy
    retries: 1
  - id: stage_02
    service: cockroachdb
    case: monitoring-integration
    retries: 1
  - id: stage_03
    service: mongodb
    case: deploy
    retries: 1
  - id: stage_04
    service: mongodb
    case: monitoring-integration
    retries: 1
  - id: stage_05
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_06
    service: elasticsearch
    case: stack-monitoring-sidecars
    retries: 1
  - id: stage_07
    service: ray
    case: deploy_cluster
    retries: 1
  - id: stage_08
    service: ray
    case: dashboard_exposure
    retries: 1
  - id: stage_09
    service: spark
    case: deploy_spark_pi
    retries: 1
  - id: stage_10
    service: spark
    case: spark_runtime_ops
    retries: 1
