# workflows/long/spark-long-upgrade-migration-adversary
#
# Version upgrade migration with adversarial worker image drift during the post-3.5 ETL run

metadata:
  id: spark-long-upgrade-migration-adversary
  label: Version upgrade migration with adversarial worker image drift during the post-3.5 ETL run
spec:
  prompt_mode: progressive
  adversary:
  - scenario: spark_image_drift
    inject_at_stage: stage_07
    lift_at_stage: stage_09
    param_overrides:
      namespace: spark-etl
  stages:
  - id: stage_01
    service: spark
    case: deploy_spark_pi
    retries: 1
    param_overrides:
      spark_image: apache/spark:3.4.0
  - id: stage_02
    service: spark
    case: deploy_spark_pi
    retries: 1
    param_overrides:
      spark_image: apache/spark:3.4.3
  - id: stage_03
    service: spark
    case: spark_data_skew
    retries: 1
  - id: stage_04
    service: spark
    case: deploy_spark_pi
    retries: 1
    param_overrides:
      spark_image: apache/spark:3.5.0
  - id: stage_05
    service: spark
    case: deploy_spark_pi
    retries: 1
    param_overrides:
      spark_image: apache/spark:3.5.1
  - id: stage_06
    service: spark
    case: spark_data_skew
    retries: 1
  - id: stage_07
    service: spark
    case: spark_etl_skew_oom
    retries: 1
  - id: stage_08
    service: spark
    case: deploy_spark_pi
    retries: 1
    param_overrides:
      spark_image: apache/spark:3.5.3
  - id: stage_09
    service: spark
    case: spark_runtime_ops
    retries: 1
  - id: stage_10
    service: spark
    case: spark_streaming_autoscale
    retries: 1
  - id: stage_11
    service: spark
    case: spark_multi_tenant
    retries: 1
  - id: stage_12
    service: spark
    case: deploy_spark_pi
    retries: 1
    param_overrides:
      spark_image: apache/spark:3.5.3
