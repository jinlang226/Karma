# workflows/long/elasticsearch-long-mega-combined
#
# Elasticsearch mega combined: every case type in a single long run

metadata:
  id: elasticsearch-long-mega-combined
  label: 'Elasticsearch mega combined: every case type in a single long run'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: shard-allocation-disabled
    inject_at_stage: stage_08
    lift_at_stage: stage_10
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
    param_overrides:
      target_image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
  - id: stage_02
    service: elasticsearch
    case: file-realm-user-roles-merge
    retries: 0
  - id: stage_03
    service: elasticsearch
    case: rotate-elastic-password
    retries: 0
  - id: stage_04
    service: elasticsearch
    case: rotate-http-certs
    retries: 0
  - id: stage_05
    service: elasticsearch
    case: transport-additional-ca-trust
    retries: 0
  - id: stage_06
    service: elasticsearch
    case: secure-http-ingress
    retries: 0
  - id: stage_07
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 0
  - id: stage_08
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 0
  - id: stage_09
    service: elasticsearch
    case: full-restart-upgrade-ha
    retries: 0
  - id: stage_10
    service: elasticsearch
    case: stack-monitoring-sidecars
    retries: 0
  - id: stage_11
    service: elasticsearch
    case: transform-job-recovery
    retries: 0
  - id: stage_12
    service: elasticsearch
    case: seed-hosts-repair
    retries: 0
