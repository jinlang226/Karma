    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: internal-http-service-drift
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: stack-monitoring-sidecars
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: seed-hosts-repair
    retries: 1
  - id: stage_05
    service: elasticsearch
    case: internal-http-service-drift
    retries: 1
  - id: stage_06
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 1
  - id: stage_07
    service: elasticsearch
    case: seed-hosts-repair
    retries: 1
  - id: stage_08
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 1
  - id: stage_09
    service: elasticsearch
    case: transport-additional-ca-trust
    retries: 1
  - id: stage_10
    service: elasticsearch
    case: stack-monitoring-sidecars
    retries: 1
