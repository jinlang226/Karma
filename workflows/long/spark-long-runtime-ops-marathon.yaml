# workflows/long/spark-long-runtime-ops-marathon
#
# Runtime-ops marathon: progressive executor-memory hardening rounds (512m -> 2560m)
# interleaved with streaming load, then skew + multi-tenant validation.

metadata:
  id: spark-long-runtime-ops-marathon
  label: 'Runtime-ops marathon: progressive executor-memory hardening (512m->2560m) with streaming load, skew, and multi-tenant checks'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: spark
    case: spark_runtime_ops
    retries: 0
    param_overrides:
      executor_memory: 512m
  - id: stage_02
    service: spark
    case: spark_runtime_ops
    retries: 0
    param_overrides:
      executor_memory: 768m
  - id: stage_03
    service: spark
    case: spark_runtime_ops
    retries: 0
    param_overrides:
      executor_memory: 1g
  - id: stage_04
    service: spark
    case: spark_runtime_ops
    retries: 0
    param_overrides:
      executor_memory: 1280m
  - id: stage_05
    service: spark
    case: spark_runtime_ops
    retries: 0
    param_overrides:
      executor_memory: 1536m
  - id: stage_06
    service: spark
    case: spark_streaming_autoscale
    retries: 0
  - id: stage_07
    service: spark
    case: spark_data_skew
    retries: 0
  - id: stage_08
    service: spark
    case: spark_runtime_ops
    retries: 0
    param_overrides:
      executor_memory: 1792m
  - id: stage_09
    service: spark
    case: spark_runtime_ops
    retries: 0
    param_overrides:
      executor_memory: 2g
  - id: stage_10
    service: spark
    case: spark_runtime_ops
    retries: 0
    param_overrides:
      executor_memory: 2560m
  - id: stage_11
    service: spark
    case: spark_data_skew
    retries: 0
  - id: stage_12
    service: spark
    case: spark_multi_tenant
    retries: 0
