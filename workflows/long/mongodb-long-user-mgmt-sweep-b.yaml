# workflows/long/mongodb-long-user-mgmt-sweep-b
#
# MongoDB user management sweep B: deploy → init → custom-roles × 2 → users × 3 → password × 2 → config → decomm (network-policy-block adversary)

metadata:
  id: mongodb-long-user-mgmt-sweep-b
  label: 'MongoDB user management sweep B: deploy → init → custom-roles × 2 → users × 3 → password × 2
    → config → decomm (network-policy-block adversary)'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: network_policy_block
    inject_at_stage: stage_04
    lift_at_stage: stage_07
  stages:
  - id: stage_01
    service: mongodb
    case: deploy
    retries: 1
  - id: stage_02
    service: mongodb
    case: initialize
    retries: 1
  - id: stage_03
    service: mongodb
    case: custom-roles
    retries: 1
  - id: stage_04
    service: mongodb
    case: user-management
    retries: 1
  - id: stage_05
    service: mongodb
    case: custom-roles
    retries: 1
  - id: stage_06
    service: mongodb
    case: user-management
    retries: 1
  - id: stage_07
    service: mongodb
    case: password-rotation
    retries: 1
  - id: stage_08
    service: mongodb
    case: user-management
    retries: 1
  - id: stage_09
    service: mongodb
    case: password-rotation
    retries: 1
  - id: stage_10
    service: mongodb
    case: mongod-config-update
    retries: 1
    param_overrides:
      target_journal_compressor: zlib
  - id: stage_11
    service: mongodb
    case: decommission
    retries: 1
