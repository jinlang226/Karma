# workflows/long/mongodb-long-user-mgmt-sweep-b
#
# MongoDB identity & access hardening B: deploy → init → custom-roles → users → password-rotation → TLS → cert-rotate → config → probe-tune → monitor → decomm (network-policy-block adversary)

metadata:
  id: mongodb-long-user-mgmt-sweep-b
  label: 'MongoDB identity & access hardening B: deploy → init → custom-roles → users → password-rotation
    → TLS → cert-rotate → config → probe-tune → monitor → decomm (network-policy-block adversary)'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: network_policy_block
    inject_at_stage: stage_04
    lift_at_stage: stage_06
  stages:
  - id: stage_01
    service: mongodb
    case: deploy
    retries: 1
  - id: stage_02
    service: mongodb
    case: initialize
    retries: 1
  - id: stage_03
    service: mongodb
    case: custom-roles
    retries: 1
  - id: stage_04
    service: mongodb
    case: user-management
    retries: 1
  - id: stage_05
    service: mongodb
    case: password-rotation
    retries: 1
  - id: stage_06
    service: mongodb
    case: tls-setup
    retries: 1
  - id: stage_07
    service: mongodb
    case: certificate-rotation
    retries: 1
  - id: stage_08
    service: mongodb
    case: mongod-config-update
    retries: 1
    param_overrides:
      target_journal_compressor: zlib
  - id: stage_09
    service: mongodb
    case: readiness-probe-tuning
    retries: 1
  - id: stage_10
    service: mongodb
    case: monitoring-integration
    retries: 1
  - id: stage_11
    service: mongodb
    case: decommission
    retries: 1
