# workflows/long/spark-long-disaster-recovery-drill-adversary
#
# Disaster recovery drill with an adversarial worker scale-down injected during the
# streaming recovery-validation window — the agent must detect the starved worker
# pool and scale it back while validating recovery under load.

metadata:
  id: spark-long-disaster-recovery-drill-adversary
  label: Disaster recovery drill with adversarial worker scale-down during streaming recovery validation
spec:
  prompt_mode: progressive
  adversary:
  - scenario: worker_scale_down
    inject_at_stage: stage_07
    lift_at_stage: stage_08
    param_overrides:
      namespace: spark-streaming
      wrong_replicas: '1'
      restore_replicas: '5'
  stages:
  - id: stage_01
    service: spark
    case: spark_runtime_ops
    retries: 1
  - id: stage_02
    service: spark
    case: spark_etl_skew_oom
    retries: 1
  - id: stage_03
    service: spark
    case: spark_data_skew
    retries: 1
  - id: stage_04
    service: spark
    case: spark_multi_tenant
    retries: 1
  - id: stage_05
    service: spark
    case: spark_runtime_ops
    retries: 1
  - id: stage_06
    service: spark
    case: spark_streaming_autoscale
    retries: 1
  - id: stage_07
    service: spark
    case: spark_streaming_autoscale
    retries: 1
  - id: stage_08
    service: spark
    case: spark_data_skew
    retries: 1
  - id: stage_09
    service: spark
    case: spark_multi_tenant
    retries: 1
  - id: stage_10
    service: spark
    case: deploy_spark_pi
    retries: 1
