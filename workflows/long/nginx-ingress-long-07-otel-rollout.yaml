# workflows/long/nginx-ingress-long-07-otel-rollout
#
# nginx-ingress: OTel Observability Rollout — enable tracing across multiple ingresses

metadata:
  id: nginx-ingress-long-07-otel-rollout
  label: 'nginx-ingress: OTel Observability Rollout — enable tracing across multiple ingresses'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: create_ingress
    retries: 1
  - id: stage_02
    service: nginx-ingress
    case: otel_log_format
    retries: 1
  - id: stage_03
    service: nginx-ingress
    case: otel_log_format
    retries: 1
    param_overrides:
      path: /otel-check2
  - id: stage_04
    service: nginx-ingress
    case: create_ingress
    retries: 1
    param_overrides:
      host: api.example.com
      path: /v1
  - id: stage_05
    service: nginx-ingress
    case: otel_log_format
    retries: 1
    param_overrides:
      path: /api
  - id: stage_06
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 1
  - id: stage_07
    service: nginx-ingress
    case: otel_log_format
    retries: 1
    param_overrides:
      path: /health
  - id: stage_08
    service: nginx-ingress
    case: ingress_canary
    retries: 1
  - id: stage_09
    service: nginx-ingress
    case: otel_log_format
    retries: 1
    param_overrides:
      path: /canary-trace
  - id: stage_10
    service: nginx-ingress
    case: renew_tls_secret
    retries: 1
  - id: stage_11
    service: nginx-ingress
    case: otel_log_format
    retries: 1
    param_overrides:
      path: /secure-trace
  - id: stage_12
    service: nginx-ingress
    case: class_only_upgrade
    retries: 1
