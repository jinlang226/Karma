# workflows/long/platform-long-greenfield-buildout
#
# Platform — greenfield platform build-out: storage, search, compute, ingress

metadata:
  id: platform-long-greenfield-buildout
  label: 'Platform — greenfield platform build-out: storage, search, compute, ingress'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: deploy
    retries: 1
  - id: stage_02
    service: cockroachdb
    case: initialize
    retries: 1
  - id: stage_03
    service: mongodb
    case: deploy
    retries: 1
  - id: stage_04
    service: mongodb
    case: initialize
    retries: 1
  - id: stage_05
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_06
    service: ray
    case: deploy_cluster
    retries: 1
  - id: stage_07
    service: ray
    case: job_submission
    retries: 1
  - id: stage_08
    service: spark
    case: deploy_spark_pi
    retries: 1
  - id: stage_09
    service: nginx-ingress
    case: create_ingress
    retries: 1
  - id: stage_10
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 1
