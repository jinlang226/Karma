# workflows/long/nginx-ingress-long-32-config-tune-configmap-fault
#
# nginx-ingress: Config Tuning Sweep — ConfigMap corrupted during OTel tuning

metadata:
  id: nginx-ingress-long-32-config-tune-configmap-fault
  label: 'nginx-ingress: Config Tuning Sweep — ConfigMap corrupted during OTel tuning'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: corrupt_ingress_nginx_configmap
    inject_at_stage: stage_04
    lift_at_stage: stage_09
  stages:
  - id: stage_01
    service: nginx-ingress
    case: create_ingress
    retries: 1
  - id: stage_02
    service: nginx-ingress
    case: otel_log_format
    retries: 1
  - id: stage_03
    service: nginx-ingress
    case: ingress_canary
    retries: 1
  - id: stage_04
    service: nginx-ingress
    case: otel_log_format
    retries: 1
    param_overrides:
      path: /tune1
  - id: stage_05
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 1
    param_overrides:
      limit_rps: '3'
  - id: stage_06
    service: nginx-ingress
    case: otel_log_format
    retries: 1
    param_overrides:
      path: /tune2
  - id: stage_07
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 1
    param_overrides:
      limit_rps: '1'
  - id: stage_08
    service: nginx-ingress
    case: renew_tls_secret
    retries: 1
  - id: stage_09
    service: nginx-ingress
    case: otel_log_format
    retries: 1
    param_overrides:
      path: /tune3
  - id: stage_10
    service: nginx-ingress
    case: class_only_upgrade
    retries: 1
  - id: stage_11
    service: nginx-ingress
    case: rate_limit_replica_hard
    retries: 1
