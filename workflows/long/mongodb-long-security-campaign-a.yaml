# workflows/long/mongodb-long-security-campaign-a
#
# MongoDB security campaign A: deploy → init → TLS → cert-rotate → custom-roles → users → password-rotation × 2 → external-access → monitor → cert-rotate

metadata:
  id: mongodb-long-security-campaign-a
  label: 'MongoDB security campaign A: deploy → init → TLS → cert-rotate → custom-roles → users → password-rotation
    × 2 → external-access → monitor → cert-rotate'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: deploy
    retries: 1
  - id: stage_02
    service: mongodb
    case: initialize
    retries: 1
  - id: stage_03
    service: mongodb
    case: tls-setup
    retries: 1
  - id: stage_04
    service: mongodb
    case: certificate-rotation
    retries: 1
  - id: stage_05
    service: mongodb
    case: custom-roles
    retries: 1
  - id: stage_06
    service: mongodb
    case: user-management
    retries: 1
  - id: stage_07
    service: mongodb
    case: password-rotation
    retries: 1
  - id: stage_08
    service: mongodb
    case: password-rotation
    retries: 1
  - id: stage_09
    service: mongodb
    case: external-access-horizons
    retries: 1
  - id: stage_10
    service: mongodb
    case: monitoring-integration
    retries: 1
  - id: stage_11
    service: mongodb
    case: certificate-rotation
    retries: 1
