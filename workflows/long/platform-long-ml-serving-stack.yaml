# workflows/long/platform-long-ml-serving-stack
#
# Platform — ML serving stack: Ray compute + Spark prep + MongoDB feature store

metadata:
  id: platform-long-ml-serving-stack
  label: 'Platform — ML serving stack: Ray compute + Spark prep + MongoDB feature store'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: ray
    case: deploy_cluster
    retries: 1
  - id: stage_02
    service: ray
    case: dashboard_exposure
    retries: 1
  - id: stage_03
    service: ray
    case: job_submission
    retries: 1
  - id: stage_04
    service: ray
    case: scale_workers
    retries: 1
  - id: stage_05
    service: spark
    case: deploy_spark_pi
    retries: 1
  - id: stage_06
    service: spark
    case: spark_data_skew
    retries: 1
  - id: stage_07
    service: spark
    case: spark_runtime_ops
    retries: 1
  - id: stage_08
    service: mongodb
    case: deploy
    retries: 1
  - id: stage_09
    service: mongodb
    case: initialize
    retries: 1
  - id: stage_10
    service: mongodb
    case: user-management
    retries: 1
