# workflows/long/elasticsearch-long-all-cases-marathon
#
# Elasticsearch all-cases marathon: broad case coverage in one long run

metadata:
  id: elasticsearch-long-all-cases-marathon
  label: 'Elasticsearch all-cases marathon: broad case coverage in one long run'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: elastic-password-corrupted
    inject_at_stage: stage_04
    lift_at_stage: stage_06
  stages:
  - id: stage_01
    service: elasticsearch
    case: bootstrap-initial-master-nodes
    retries: 0
  - id: stage_02
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
  - id: stage_03
    service: elasticsearch
    case: file-realm-user-roles-merge
    retries: 0
  - id: stage_04
    service: elasticsearch
    case: rotate-elastic-password
    retries: 0
  - id: stage_05
    service: elasticsearch
    case: rotate-http-certs
    retries: 0
  - id: stage_06
    service: elasticsearch
    case: secure-http-ingress
    retries: 0
  - id: stage_07
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 0
  - id: stage_08
    service: elasticsearch
    case: seed-hosts-repair
    retries: 0
  - id: stage_09
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 0
  - id: stage_10
    service: elasticsearch
    case: transform-job-recovery
    retries: 0
