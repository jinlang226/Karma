# workflows/long/mongodb-long-config-tune-sweep-a
#
# MongoDB config tune sweep A: deploy → init → config × 5 (alternating compressors) → probe-tune × 2 → monitor → password-rotation → decomm

metadata:
  id: mongodb-long-config-tune-sweep-a
  label: 'MongoDB config tune sweep A: deploy → init → config × 5 (alternating compressors) → probe-tune
    × 2 → monitor → password-rotation → decomm'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: deploy
    retries: 0
  - id: stage_02
    service: mongodb
    case: initialize
    retries: 0
  - id: stage_03
    service: mongodb
    case: mongod-config-update
    retries: 0
    param_overrides:
      target_journal_compressor: zlib
  - id: stage_04
    service: mongodb
    case: mongod-config-update
    retries: 0
    param_overrides:
      target_journal_compressor: snappy
  - id: stage_05
    service: mongodb
    case: mongod-config-update
    retries: 0
    param_overrides:
      target_journal_compressor: zlib
  - id: stage_06
    service: mongodb
    case: readiness-probe-tuning
    retries: 0
  - id: stage_07
    service: mongodb
    case: mongod-config-update
    retries: 0
    param_overrides:
      target_journal_compressor: snappy
  - id: stage_08
    service: mongodb
    case: readiness-probe-tuning
    retries: 0
  - id: stage_09
    service: mongodb
    case: monitoring-integration
    retries: 0
  - id: stage_10
    service: mongodb
    case: password-rotation
    retries: 0
  - id: stage_11
    service: mongodb
    case: decommission
    retries: 0
