# workflows/long/mongodb-long-monitoring-first-b
#
# MongoDB monitoring-first B: deploy → init → monitor → config × 3 → probe-tune × 2 → custom-roles → password-rotation → decomm (configmap-key-delete adversary)

metadata:
  id: mongodb-long-monitoring-first-b
  label: 'MongoDB monitoring-first B: deploy → init → monitor → config × 3 → probe-tune × 2 → custom-roles
    → password-rotation → decomm (configmap-key-delete adversary)'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: configmap_key_delete
    inject_at_stage: stage_06
    lift_at_stage: stage_08
  stages:
  - id: stage_01
    service: mongodb
    case: deploy
    retries: 1
  - id: stage_02
    service: mongodb
    case: initialize
    retries: 1
  - id: stage_03
    service: mongodb
    case: monitoring-integration
    retries: 1
  - id: stage_04
    service: mongodb
    case: mongod-config-update
    retries: 1
    param_overrides:
      target_journal_compressor: zlib
  - id: stage_05
    service: mongodb
    case: readiness-probe-tuning
    retries: 1
  - id: stage_06
    service: mongodb
    case: mongod-config-update
    retries: 1
    param_overrides:
      target_journal_compressor: snappy
  - id: stage_07
    service: mongodb
    case: readiness-probe-tuning
    retries: 1
  - id: stage_08
    service: mongodb
    case: mongod-config-update
    retries: 1
    param_overrides:
      target_journal_compressor: zlib
  - id: stage_09
    service: mongodb
    case: custom-roles
    retries: 1
  - id: stage_10
    service: mongodb
    case: password-rotation
    retries: 1
  - id: stage_11
    service: mongodb
    case: decommission
    retries: 1
