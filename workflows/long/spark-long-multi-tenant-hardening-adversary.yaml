# workflows/long/spark-long-multi-tenant-hardening-adversary
#
# Multi-tenant hardening with an adversarial History Server PVC break injected just
# before a tenant re-audit — the broken claimName stalls the History Server pod in
# Pending, and the agent must correct it during the multi-tenant validation stage.

metadata:
  id: spark-long-multi-tenant-hardening-adversary
  label: Multi-tenant hardening with adversarial History Server PVC break during tenant re-audit
spec:
  prompt_mode: progressive
  adversary:
  - scenario: history_server_pvc_break
    inject_at_stage: stage_06
    lift_at_stage: stage_07
  stages:
  - id: stage_01
    service: spark
    case: spark_multi_tenant
    retries: 1
  - id: stage_02
    service: spark
    case: spark_runtime_ops
    retries: 1
  - id: stage_03
    service: spark
    case: spark_multi_tenant
    retries: 1
  - id: stage_04
    service: spark
    case: spark_streaming_autoscale
    retries: 1
  - id: stage_05
    service: spark
    case: spark_data_skew
    retries: 1
  - id: stage_06
    service: spark
    case: spark_multi_tenant
    retries: 1
  - id: stage_07
    service: spark
    case: spark_multi_tenant
    retries: 1
  - id: stage_08
    service: spark
    case: spark_streaming_autoscale
    retries: 1
  - id: stage_09
    service: spark
    case: deploy_spark_pi
    retries: 1
  - id: stage_10
    service: spark
    case: spark_runtime_ops
    retries: 1
