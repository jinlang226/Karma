# workflows/long/nginx-ingress-long-26-e2e-configmap-fault
#
# nginx-ingress: End-to-End Hardening — ConfigMap corrupted mid-run

metadata:
  id: nginx-ingress-long-26-e2e-configmap-fault
  label: 'nginx-ingress: End-to-End Hardening — ConfigMap corrupted mid-run'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: corrupt_ingress_nginx_configmap
    inject_at_stage: stage_03
    lift_at_stage: stage_07
  stages:
  - id: stage_01
    service: nginx-ingress
    case: create_ingress
    retries: 1
  - id: stage_02
    service: nginx-ingress
    case: ingress_canary
    retries: 1
  - id: stage_03
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 1
    param_overrides:
      limit_rps: '5'
  - id: stage_04
    service: nginx-ingress
    case: rate_limit_replica_hard
    retries: 1
    param_overrides:
      limit_rps: '2'
  - id: stage_05
    service: nginx-ingress
    case: otel_log_format
    retries: 1
  - id: stage_06
    service: nginx-ingress
    case: renew_tls_secret
    retries: 1
  - id: stage_07
    service: nginx-ingress
    case: class_only_upgrade
    retries: 1
  - id: stage_08
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 1
    param_overrides:
      limit_rps: '1'
  - id: stage_09
    service: nginx-ingress
    case: otel_log_format
    retries: 1
    param_overrides:
      path: /e2e-trace2
  - id: stage_10
    service: nginx-ingress
    case: ingress_canary
    retries: 1
    param_overrides:
      header_value: beta
  - id: stage_11
    service: nginx-ingress
    case: class_only_upgrade
    retries: 1
