# workflows/long/ray-long-scale-sweep-adversary
#
# Ray scaling campaign with worker scale-down adversary: 2→3→4→5→4→3 sweep, adversary at peak

metadata:
  id: ray-long-scale-sweep-adversary
  label: 'Ray scaling campaign with worker scale-down adversary: 2→3→4→5→4→3 sweep, adversary at peak'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: scale_down_workers
    inject_at_stage: stage_05
    lift_at_stage: stage_07
    param_overrides:
      wrong_replicas: '1'
      restore_replicas: '4'
  stages:
  - id: stage_01
    service: ray
    case: deploy_cluster
    retries: 0
    param_overrides:
      worker_replicas: '2'
  - id: stage_02
    service: ray
    case: job_submission
    retries: 0
    param_overrides:
      expected_output: pong
  - id: stage_03
    service: ray
    case: scale_workers
    retries: 0
    param_overrides:
      source_worker_replicas: '2'
      target_worker_replicas: '3'
  - id: stage_04
    service: ray
    case: scale_workers
    retries: 0
    param_overrides:
      source_worker_replicas: '3'
      target_worker_replicas: '4'
  - id: stage_05
    service: ray
    case: scale_workers
    retries: 0
    param_overrides:
      source_worker_replicas: '4'
      target_worker_replicas: '5'
  - id: stage_06
    service: ray
    case: job_submission
    retries: 0
    param_overrides:
      expected_output: pong
  - id: stage_07
    service: ray
    case: scale_workers
    retries: 0
    param_overrides:
      source_worker_replicas: '5'
      target_worker_replicas: '4'
  - id: stage_08
    service: ray
    case: scale_workers
    retries: 0
    param_overrides:
      source_worker_replicas: '4'
      target_worker_replicas: '3'
  - id: stage_09
    service: ray
    case: job_submission
    retries: 0
    param_overrides:
      expected_output: pong
  - id: stage_10
    service: ray
    case: worker_recovery
    retries: 0
  - id: stage_11
    service: ray
    case: teardown_cluster
    retries: 0
