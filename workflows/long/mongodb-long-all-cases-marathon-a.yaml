# workflows/long/mongodb-long-all-cases-marathon-a
#
# MongoDB all-cases marathon A: all 18 cases in full operational order

metadata:
  id: mongodb-long-all-cases-marathon-a
  label: 'MongoDB all-cases marathon A: all 18 cases in full operational order'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: deploy
    retries: 0
  - id: stage_02
    service: mongodb
    case: initialize
    retries: 0
  - id: stage_03
    service: mongodb
    case: arbiters
    retries: 0
  - id: stage_04
    service: mongodb
    case: user-management
    retries: 0
  - id: stage_05
    service: mongodb
    case: custom-roles
    retries: 0
  - id: stage_06
    service: mongodb
    case: tls-setup
    retries: 0
  - id: stage_07
    service: mongodb
    case: certificate-rotation
    retries: 0
  - id: stage_08
    service: mongodb
    case: external-access-horizons
    retries: 0
  - id: stage_09
    service: mongodb
    case: replica-scaling
    retries: 0
    param_overrides:
      target_replicas: '5'
  - id: stage_10
    service: mongodb
    case: statefulset-customization
    retries: 0
  - id: stage_11
    service: mongodb
    case: health-check-recovery
    retries: 0
  - id: stage_12
    service: mongodb
    case: readiness-probe-tuning
    retries: 0
  - id: stage_13
    service: mongodb
    case: mongod-config-update
    retries: 0
    param_overrides:
      target_journal_compressor: zlib
  - id: stage_14
    service: mongodb
    case: monitoring-integration
    retries: 0
  - id: stage_15
    service: mongodb
    case: password-rotation
    retries: 0
  - id: stage_16
    service: mongodb
    case: version-upgrade
    retries: 0
  - id: stage_17
    service: mongodb
    case: version-upgrade-hard
    retries: 0
  - id: stage_18
    service: mongodb
    case: decommission
    retries: 0
