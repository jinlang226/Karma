# workflows/long/spark-long-pipeline-buildout-adversary
#
# Progressive pipeline buildout with adversarial RBAC role revocation mid-build

metadata:
  id: spark-long-pipeline-buildout-adversary
  label: Progressive pipeline buildout with adversarial RBAC role revocation mid-build
spec:
  prompt_mode: progressive
  adversary:
  - scenario: rbac_role_revoke
    inject_at_stage: stage_02
    lift_at_stage: stage_05
  stages:
  - id: stage_01
    service: spark
    case: deploy_spark_pi
    retries: 1
  - id: stage_02
    service: spark
    case: deploy_spark_pi
    retries: 1
    param_overrides:
      spark_image: apache/spark:3.5.3
  - id: stage_03
    service: spark
    case: spark_data_skew
    retries: 1
  - id: stage_04
    service: spark
    case: spark_data_skew
    retries: 1
  - id: stage_05
    service: spark
    case: spark_etl_skew_oom
    retries: 1
  - id: stage_06
    service: spark
    case: spark_etl_skew_oom
    retries: 1
  - id: stage_07
    service: spark
    case: spark_streaming_autoscale
    retries: 1
  - id: stage_08
    service: spark
    case: spark_streaming_autoscale
    retries: 1
  - id: stage_09
    service: spark
    case: spark_runtime_ops
    retries: 1
  - id: stage_10
    service: spark
    case: spark_runtime_ops
    retries: 1
  - id: stage_11
    service: spark
    case: spark_multi_tenant
    retries: 1
  - id: stage_12
    service: spark
    case: spark_multi_tenant
    retries: 1
