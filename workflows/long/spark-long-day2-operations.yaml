# workflows/long/spark-long-day2-operations
#
# Day-2 operations: scheduled maintenance rounds — runtime fixes, streaming scale,
# skew/ETL tuning, tenant check, then a second runtime round and a fresh deploy

metadata:
  id: spark-long-day2-operations
  label: 'Day-2 operations: scheduled maintenance rounds — runtime fixes, streaming scale, skew/ETL tuning, tenant check, redeploy'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: spark
    case: spark_runtime_ops
    retries: 0
  - id: stage_02
    service: spark
    case: spark_streaming_autoscale
    retries: 0
  - id: stage_03
    service: spark
    case: spark_data_skew
    retries: 0
  - id: stage_04
    service: spark
    case: spark_etl_skew_oom
    retries: 0
  - id: stage_05
    service: spark
    case: spark_multi_tenant
    retries: 0
  - id: stage_06
    service: spark
    case: spark_runtime_ops
    retries: 0
  - id: stage_07
    service: spark
    case: spark_streaming_autoscale
    retries: 0
  - id: stage_08
    service: spark
    case: spark_data_skew
    retries: 0
  - id: stage_09
    service: spark
    case: spark_runtime_ops
    retries: 0
  - id: stage_10
    service: spark
    case: deploy_spark_pi
    retries: 0
