# workflows/long/spark-long-etl-oom-incident-response-adversary
#
# ETL OOM incident response with an adversarial ConfigMap memory regression injected
# during the runtime-ops tuning window — the agent must spot the executor memory
# silently dropped to 128m in spark-config and raise it back to a healthy value.

metadata:
  id: spark-long-etl-oom-incident-response-adversary
  label: ETL OOM incident response with adversarial configmap memory regression during runtime tuning
spec:
  prompt_mode: progressive
  adversary:
  - scenario: configmap_executor_memory_drop
    inject_at_stage: stage_05
    lift_at_stage: stage_06
  stages:
  - id: stage_01
    service: spark
    case: spark_etl_skew_oom
    retries: 0
  - id: stage_02
    service: spark
    case: spark_runtime_ops
    retries: 0
  - id: stage_03
    service: spark
    case: spark_data_skew
    retries: 0
  - id: stage_04
    service: spark
    case: spark_etl_skew_oom
    retries: 0
  - id: stage_05
    service: spark
    case: spark_runtime_ops
    retries: 0
  - id: stage_06
    service: spark
    case: spark_data_skew
    retries: 0
  - id: stage_07
    service: spark
    case: spark_etl_skew_oom
    retries: 0
  - id: stage_08
    service: spark
    case: spark_streaming_autoscale
    retries: 0
  - id: stage_09
    service: spark
    case: spark_runtime_ops
    retries: 0
  - id: stage_10
    service: spark
    case: deploy_spark_pi
    retries: 0
