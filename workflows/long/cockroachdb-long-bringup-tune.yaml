# workflows/long/cockroachdb-long-bringup-tune
#
# CockroachDB bring-up and deep tuning: settings sweep, zone sweep, monitoring, and ingress

metadata:
  id: cockroachdb-long-bringup-tune
  label: 'CockroachDB bring-up and deep tuning: settings sweep, zone sweep, monitoring, and ingress'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: deploy
    retries: 0
  - id: stage_02
    service: cockroachdb
    case: initialize
    retries: 0
  - id: stage_03
    service: cockroachdb
    case: cluster-settings
    retries: 0
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 16MiB
  - id: stage_04
    service: cockroachdb
    case: cluster-settings
    retries: 0
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 32MiB
  - id: stage_05
    service: cockroachdb
    case: cluster-settings
    retries: 0
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 64MiB
  - id: stage_06
    service: cockroachdb
    case: cluster-settings
    retries: 0
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 128MiB
  - id: stage_07
    service: cockroachdb
    case: zone-config
    retries: 0
    param_overrides:
      gc_ttl_seconds: 86400
  - id: stage_08
    service: cockroachdb
    case: zone-config
    retries: 0
    param_overrides:
      gc_ttl_seconds: 14400
  - id: stage_09
    service: cockroachdb
    case: zone-config
    retries: 0
    param_overrides:
      gc_ttl_seconds: 3600
  - id: stage_10
    service: cockroachdb
    case: monitoring-integration
    retries: 0
  - id: stage_11
    service: cockroachdb
    case: expose-ingress
    retries: 0
  - id: stage_12
    service: cockroachdb
    case: version-check
    retries: 0
    param_overrides:
      report_key: bringup_tune_version
