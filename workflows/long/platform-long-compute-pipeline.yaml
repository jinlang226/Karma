# workflows/long/platform-long-compute-pipeline
#
# Platform — compute + analytics pipeline: Ray + Spark

metadata:
  id: platform-long-compute-pipeline
  label: 'Platform — compute + analytics pipeline: Ray + Spark'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: scale_down_workers
    inject_at_stage: stage_04
  stages:
  - id: stage_01
    service: ray
    case: deploy_cluster
    retries: 1
  - id: stage_02
    service: ray
    case: dashboard_exposure
    retries: 1
  - id: stage_03
    service: ray
    case: job_submission
    retries: 1
  - id: stage_04
    service: ray
    case: scale_workers
    retries: 1
  - id: stage_05
    service: ray
    case: worker_recovery
    retries: 1
  - id: stage_06
    service: spark
    case: deploy_spark_pi
    retries: 1
  - id: stage_07
    service: spark
    case: spark_data_skew
    retries: 1
  - id: stage_08
    service: spark
    case: spark_runtime_ops
    retries: 1
  - id: stage_09
    service: spark
    case: spark_multi_tenant
    retries: 1
  - id: stage_10
    service: spark
    case: spark_streaming_autoscale
    retries: 1
