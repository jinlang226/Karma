# workflows/long/nginx-ingress-long-18-multihost-configmap-fault
#
# nginx-ingress: Multi-Host Expansion — ConfigMap corrupted during OTel setup

metadata:
  id: nginx-ingress-long-18-multihost-configmap-fault
  label: 'nginx-ingress: Multi-Host Expansion — ConfigMap corrupted during OTel setup'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: corrupt_ingress_nginx_configmap
    inject_at_stage: stage_06
    lift_at_stage: stage_10
  stages:
  - id: stage_01
    service: nginx-ingress
    case: create_ingress
    retries: 0
    param_overrides:
      host: app1.example.com
      path: /
  - id: stage_02
    service: nginx-ingress
    case: create_ingress
    retries: 0
    param_overrides:
      host: app2.example.com
      path: /api
  - id: stage_03
    service: nginx-ingress
    case: create_ingress
    retries: 0
    param_overrides:
      host: app3.example.com
      path: /health
  - id: stage_04
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 0
  - id: stage_05
    service: nginx-ingress
    case: ingress_canary
    retries: 0
  - id: stage_06
    service: nginx-ingress
    case: otel_log_format
    retries: 0
  - id: stage_07
    service: nginx-ingress
    case: renew_tls_secret
    retries: 0
  - id: stage_08
    service: nginx-ingress
    case: class_only_upgrade
    retries: 0
  - id: stage_09
    service: nginx-ingress
    case: rate_limit_replica_hard
    retries: 0
  - id: stage_10
    service: nginx-ingress
    case: otel_log_format
    retries: 0
    param_overrides:
      path: /trace-check
  - id: stage_11
    service: nginx-ingress
    case: ingress_canary
    retries: 0
    param_overrides:
      header_value: beta
