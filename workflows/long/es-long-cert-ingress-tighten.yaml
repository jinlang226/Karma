# workflows/long/es-long-cert-ingress-tighten
#
# Elasticsearch HTTP cert rotation and ingress progressive tightening

metadata:
  id: es-long-cert-ingress-tighten
  label: Elasticsearch HTTP cert rotation and ingress progressive tightening
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: rotate-http-certs
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: secure-http-ingress
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: rotate-http-certs
    retries: 1
  - id: stage_05
    service: elasticsearch
    case: secure-http-ingress
    retries: 1
  - id: stage_06
    service: elasticsearch
    case: rotate-http-certs
    retries: 1
  - id: stage_07
    service: elasticsearch
    case: transport-additional-ca-trust
    retries: 1
  - id: stage_08
    service: elasticsearch
    case: rotate-http-certs
    retries: 1
  - id: stage_09
    service: elasticsearch
    case: secure-http-ingress
    retries: 1
  - id: stage_10
    service: elasticsearch
    case: rotate-http-certs
    retries: 1
