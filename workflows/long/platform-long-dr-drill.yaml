# workflows/long/platform-long-dr-drill
#
# Platform — disaster-recovery drill: backup, fault, recover

metadata:
  id: platform-long-dr-drill
  label: 'Platform — disaster-recovery drill: backup, fault, recover'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: deploy
    retries: 1
  - id: stage_02
    service: cockroachdb
    case: initialize
    retries: 1
  - id: stage_03
    service: cockroachdb
    case: monitoring-integration
    retries: 1
  - id: stage_04
    service: mongodb
    case: deploy
    retries: 1
  - id: stage_05
    service: mongodb
    case: initialize
    retries: 1
  - id: stage_06
    service: mongodb
    case: monitoring-integration
    retries: 1
  - id: stage_07
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_08
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 1
  - id: stage_09
    service: elasticsearch
    case: transform-job-recovery
    retries: 1
  - id: stage_10
    service: elasticsearch
    case: seed-hosts-repair
    retries: 1
