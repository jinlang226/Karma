# workflows/long/platform-long-store-and-search
#
# Platform — operational store + search platform: MongoDB + Elasticsearch

metadata:
  id: platform-long-store-and-search
  label: 'Platform — operational store + search platform: MongoDB + Elasticsearch'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: elastic-password-corrupted
    inject_at_stage: stage_07
    lift_at_stage: stage_09
  stages:
  - id: stage_01
    service: mongodb
    case: deploy
    retries: 0
  - id: stage_02
    service: mongodb
    case: initialize
    retries: 0
  - id: stage_03
    service: mongodb
    case: user-management
    retries: 0
  - id: stage_04
    service: mongodb
    case: tls-setup
    retries: 0
  - id: stage_05
    service: mongodb
    case: replica-scaling
    retries: 0
    param_overrides:
      target_replicas: 5
  - id: stage_06
    service: mongodb
    case: monitoring-integration
    retries: 0
  - id: stage_07
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
  - id: stage_08
    service: elasticsearch
    case: file-realm-user-roles-merge
    retries: 0
  - id: stage_09
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 0
  - id: stage_10
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 0
  - id: stage_11
    service: elasticsearch
    case: stack-monitoring-sidecars
    retries: 0
