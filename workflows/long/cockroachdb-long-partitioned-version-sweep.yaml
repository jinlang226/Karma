# workflows/long/cockroachdb-long-partitioned-version-sweep
#
# CockroachDB partitioned-update sweep: four patch versions with version-check after each

metadata:
  id: cockroachdb-long-partitioned-version-sweep
  label: 'CockroachDB partitioned-update sweep: four patch versions with version-check after each'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: deploy
    retries: 0
    param_overrides:
      to_version: 23.2.0
  - id: stage_02
    service: cockroachdb
    case: initialize
    # Pin initialize to the deploy stage's version baseline. initialize's
    # crdb_version defaults to 24.1.0; if its (now authoritative) skip-probe
    # ever missed the inherited v23.2.0 cluster, a rebuild at the default
    # would clobber the version baseline this upgrade workflow depends on.
    param_overrides:
      crdb_version: '23.2.0'
    retries: 0
  - id: stage_03
    service: cockroachdb
    case: partitioned-update
    retries: 0
    param_overrides:
      to_version: 23.2.3
  - id: stage_04
    service: cockroachdb
    case: version-check
    retries: 0
    param_overrides:
      from_version: '23.2'
      to_version: 23.2.3
      report_key: v23_2_3
  - id: stage_05
    service: cockroachdb
    case: partitioned-update
    retries: 0
    param_overrides:
      to_version: 23.2.7
  - id: stage_06
    service: cockroachdb
    case: version-check
    retries: 0
    param_overrides:
      from_version: '23.2'
      to_version: 23.2.7
      report_key: v23_2_7
  - id: stage_07
    service: cockroachdb
    case: partitioned-update
    retries: 0
    param_overrides:
      to_version: 23.2.10
  - id: stage_08
    service: cockroachdb
    case: version-check
    retries: 0
    param_overrides:
      from_version: '23.2'
      to_version: 23.2.10
      report_key: v23_2_10
  - id: stage_09
    service: cockroachdb
    case: major-upgrade-finalize
    retries: 0
  - id: stage_10
    service: cockroachdb
    case: version-check
    retries: 0
    param_overrides:
      from_version: '23.2'
      to_version: 24.1.0
      report_key: v24_1_0
  - id: stage_11
    service: cockroachdb
    case: cluster-settings
    retries: 0
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 128MiB
