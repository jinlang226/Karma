# workflows/long/rabbitmq-long-decommission-path-01
#
# RabbitMQ: Pre-decommission Checklist — Backup, Upgrade, and Final Validation

metadata:
  id: rabbitmq-long-decommission-path-01
  label: 'RabbitMQ: Pre-decommission Checklist — Backup, Upgrade, and Final Validation'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: rabbitmq
    case: classic_queue
    retries: 1
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_02
    service: rabbitmq
    case: manual_backup_restore
    retries: 1
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_03
    service: rabbitmq
    case: manual_skip_upgrade
    retries: 1
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
      from_version: '3.9'
      to_version: '4.1'
  - id: stage_04
    service: rabbitmq
    case: manual_tls_rotation
    retries: 1
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
      min_rotated_leaf_validity_days: '365'
  - id: stage_05
    service: rabbitmq
    case: manual_policy_sync
    retries: 1
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_06
    service: rabbitmq
    case: manual_user_permission
    retries: 1
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_07
    service: rabbitmq
    case: manual_monitoring
    retries: 1
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_08
    service: rabbitmq
    case: manual_backup_restore
    retries: 1
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_09
    service: rabbitmq
    case: failover
    retries: 1
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_10
    service: rabbitmq
    case: manual_monitoring
    retries: 1
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_11
    service: rabbitmq
    case: manual_backup_restore
    retries: 1
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
