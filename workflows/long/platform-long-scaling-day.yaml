# workflows/long/platform-long-scaling-day
#
# Platform — capacity scaling day across services

metadata:
  id: platform-long-scaling-day
  label: Platform — capacity scaling day across services
spec:
  prompt_mode: progressive
  adversary:
  - scenario: statefulset-scaled-down
    inject_at_stage: stage_04
  stages:
  - id: stage_01
    service: mongodb
    case: deploy
    retries: 0
  - id: stage_02
    service: mongodb
    case: replica-scaling
    retries: 0
    param_overrides:
      target_replicas: 5
  - id: stage_03
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
  - id: stage_04
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 0
  - id: stage_05
    service: elasticsearch
    case: safe-downscale-with-shard-migration
    retries: 0
  - id: stage_06
    service: ray
    case: deploy_cluster
    retries: 0
  - id: stage_07
    service: ray
    case: scale_workers
    retries: 0
  - id: stage_08
    service: ray
    case: worker_recovery
    retries: 0
  - id: stage_09
    service: spark
    case: deploy_spark_pi
    retries: 0
  - id: stage_10
    service: spark
    case: spark_streaming_autoscale
    retries: 0
