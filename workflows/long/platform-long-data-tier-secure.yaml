# workflows/long/platform-long-data-tier-secure
#
# Platform — data-tier security & scaling: CockroachDB + MongoDB + Elasticsearch

metadata:
  id: platform-long-data-tier-secure
  label: 'Platform — data-tier security & scaling: CockroachDB + MongoDB + Elasticsearch'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: delete_cert_secret
    inject_at_stage: stage_03
  stages:
  - id: stage_01
    service: cockroachdb
    case: deploy
    retries: 1
  - id: stage_02
    service: cockroachdb
    case: initialize
    retries: 1
  - id: stage_03
    service: cockroachdb
    case: generate-cert
    retries: 1
  - id: stage_04
    service: cockroachdb
    case: cluster-settings
    retries: 1
  - id: stage_05
    service: mongodb
    case: deploy
    retries: 1
  - id: stage_06
    service: mongodb
    case: initialize
    retries: 1
  - id: stage_07
    service: mongodb
    case: user-management
    retries: 1
  - id: stage_08
    service: mongodb
    case: tls-setup
    retries: 1
  - id: stage_09
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_10
    service: elasticsearch
    case: file-realm-user-roles-merge
    retries: 1
  - id: stage_11
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 1
