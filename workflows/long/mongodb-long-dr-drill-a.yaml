# workflows/long/mongodb-long-dr-drill-a
#
# MongoDB DR drill A: deploy → init → TLS → scale → health-recovery → statefulset-custom → health-recovery → config → monitor → cert-rotate → decomm

metadata:
  id: mongodb-long-dr-drill-a
  label: 'MongoDB DR drill A: deploy → init → TLS → scale → health-recovery → statefulset-custom → health-recovery
    → config → monitor → cert-rotate → decomm'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: deploy
    retries: 0
  - id: stage_02
    service: mongodb
    case: initialize
    retries: 0
  - id: stage_03
    service: mongodb
    case: tls-setup
    retries: 0
  - id: stage_04
    service: mongodb
    case: replica-scaling
    retries: 0
    param_overrides:
      target_replicas: '5'
  - id: stage_05
    service: mongodb
    case: health-check-recovery
    retries: 0
  - id: stage_06
    service: mongodb
    case: statefulset-customization
    retries: 0
  - id: stage_07
    service: mongodb
    case: health-check-recovery
    retries: 0
  - id: stage_08
    service: mongodb
    case: mongod-config-update
    retries: 0
    param_overrides:
      target_journal_compressor: zlib
  - id: stage_09
    service: mongodb
    case: monitoring-integration
    retries: 0
  - id: stage_10
    service: mongodb
    case: certificate-rotation
    retries: 0
  - id: stage_11
    service: mongodb
    case: decommission
    retries: 0
