# workflows/long/spark-long-upgrade-migration
#
# Version upgrade migration: 3.4→3.5 progressive image upgrade with health checks at each step

metadata:
  id: spark-long-upgrade-migration
  label: 'Version upgrade migration: 3.4→3.5 progressive image upgrade with health checks at each step'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: spark
    case: deploy_spark_pi
    retries: 1
    param_overrides:
      spark_image: apache/spark:3.4.0
  - id: stage_02
    service: spark
    case: deploy_spark_pi
    retries: 1
    param_overrides:
      spark_image: apache/spark:3.4.3
  - id: stage_03
    service: spark
    case: spark_data_skew
    retries: 1
  - id: stage_04
    service: spark
    case: deploy_spark_pi
    retries: 1
    param_overrides:
      spark_image: apache/spark:3.5.0
  - id: stage_05
    service: spark
    case: deploy_spark_pi
    retries: 1
    param_overrides:
      spark_image: apache/spark:3.5.1
  - id: stage_06
    service: spark
    case: spark_data_skew
    retries: 1
  - id: stage_07
    service: spark
    case: spark_etl_skew_oom
    retries: 1
  - id: stage_08
    service: spark
    case: deploy_spark_pi
    retries: 1
    param_overrides:
      spark_image: apache/spark:3.5.3
  - id: stage_09
    service: spark
    case: spark_runtime_ops
    retries: 1
  - id: stage_10
    service: spark
    case: spark_streaming_autoscale
    retries: 1
  - id: stage_11
    service: spark
    case: spark_multi_tenant
    retries: 1
  - id: stage_12
    service: spark
    case: deploy_spark_pi
    retries: 1
    param_overrides:
      spark_image: apache/spark:3.5.3
