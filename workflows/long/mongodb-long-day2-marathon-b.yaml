# workflows/long/mongodb-long-day2-marathon-b
#
# MongoDB day-2 marathon B: config × 3 → probe × 2 → password × 2 → users → custom-roles → monitor → decomm (param-drift adversary)

metadata:
  id: mongodb-long-day2-marathon-b
  label: 'MongoDB day-2 marathon B: config × 3 → probe × 2 → password × 2 → users → custom-roles → monitor
    → decomm (param-drift adversary)'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: param_drift
    inject_at_stage: stage_03
    lift_at_stage: stage_06
  stages:
  - id: stage_01
    service: mongodb
    case: mongod-config-update
    retries: 0
    param_overrides:
      target_journal_compressor: zlib
  - id: stage_02
    service: mongodb
    case: readiness-probe-tuning
    retries: 0
  - id: stage_03
    service: mongodb
    case: mongod-config-update
    retries: 0
    param_overrides:
      target_journal_compressor: snappy
  - id: stage_04
    service: mongodb
    case: password-rotation
    retries: 0
  - id: stage_05
    service: mongodb
    case: readiness-probe-tuning
    retries: 0
  - id: stage_06
    service: mongodb
    case: user-management
    retries: 0
  - id: stage_07
    service: mongodb
    case: password-rotation
    retries: 0
  - id: stage_08
    service: mongodb
    case: custom-roles
    retries: 0
  - id: stage_09
    service: mongodb
    case: monitoring-integration
    retries: 0
  - id: stage_10
    service: mongodb
    case: mongod-config-update
    retries: 0
    param_overrides:
      target_journal_compressor: zlib
