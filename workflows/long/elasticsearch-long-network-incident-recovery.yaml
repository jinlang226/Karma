# workflows/long/elasticsearch-long-network-incident-recovery
#
# Elasticsearch networking incident and recovery: transport block, seed drift, service drift

metadata:
  id: elasticsearch-long-network-incident-recovery
  label: 'Elasticsearch networking incident and recovery: transport block, seed drift, service drift'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: es-config-seed-hosts-drift
    inject_at_stage: stage_03
    lift_at_stage: stage_05
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: transport-additional-ca-trust
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: seed-hosts-repair
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: internal-http-service-drift
    retries: 1
  - id: stage_05
    service: elasticsearch
    case: seed-hosts-repair
    retries: 1
  - id: stage_06
    service: elasticsearch
    case: transport-additional-ca-trust
    retries: 1
  - id: stage_07
    service: elasticsearch
    case: internal-http-service-drift
    retries: 1
  - id: stage_08
    service: elasticsearch
    case: secure-http-ingress
    retries: 1
  - id: stage_09
    service: elasticsearch
    case: seed-hosts-repair
    retries: 1
  - id: stage_10
    service: elasticsearch
    case: transport-additional-ca-trust
    retries: 1
