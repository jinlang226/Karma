# workflows/long/nginx-long-20-scaling-ratelimit-fault
#
# nginx-ingress: Controller Scaling Campaign — annotation stripped mid scale-up

metadata:
  id: nginx-long-20-scaling-ratelimit-fault
  label: 'nginx-ingress: Controller Scaling Campaign — annotation stripped mid scale-up'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: strip_rate_limit_annotation
    inject_at_stage: stage_04
    lift_at_stage: stage_07
  stages:
  - id: stage_01
    service: nginx-ingress
    case: create_ingress
    retries: 1
  - id: stage_02
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 1
    param_overrides:
      limit_rps: '5'
  - id: stage_03
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 1
    param_overrides:
      limit_rps: '3'
  - id: stage_04
    service: nginx-ingress
    case: rate_limit_replica_hard
    retries: 1
    param_overrides:
      limit_rps: '3'
  - id: stage_05
    service: nginx-ingress
    case: rate_limit_replica_hard
    retries: 1
    param_overrides:
      limit_rps: '2'
  - id: stage_06
    service: nginx-ingress
    case: rate_limit_replica_hard
    retries: 1
    param_overrides:
      limit_rps: '1'
  - id: stage_07
    service: nginx-ingress
    case: ingress_canary
    retries: 1
  - id: stage_08
    service: nginx-ingress
    case: renew_tls_secret
    retries: 1
  - id: stage_09
    service: nginx-ingress
    case: otel_log_format
    retries: 1
  - id: stage_10
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 1
    param_overrides:
      limit_rps: '1'
  - id: stage_11
    service: nginx-ingress
    case: class_only_upgrade
    retries: 1
