# workflows/long/cockroachdb-long-cert-rotation-campaign-adversary
#
# CockroachDB certificate rotation campaign with cert-secret deletion adversary

metadata:
  id: cockroachdb-long-cert-rotation-campaign-adversary
  label: CockroachDB certificate rotation campaign with cert-secret deletion adversary
spec:
  prompt_mode: progressive
  adversary:
  - scenario: delete_cert_secret
    inject_at_stage: stage_06
    lift_at_stage: stage_07
  stages:
  - id: stage_01
    service: cockroachdb
    case: deploy
    retries: 0
  - id: stage_02
    service: cockroachdb
    case: initialize
    retries: 0
  - id: stage_03
    service: cockroachdb
    case: generate-cert
    retries: 0
  - id: stage_04
    service: cockroachdb
    case: certificate-rotation
    retries: 0
  - id: stage_05
    service: cockroachdb
    case: certificate-rotation
    retries: 0
  - id: stage_06
    service: cockroachdb
    case: certificate-rotation
    retries: 0
  - id: stage_07
    service: cockroachdb
    case: cluster-settings
    retries: 0
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 128MiB
  - id: stage_08
    service: cockroachdb
    case: monitoring-integration
    retries: 0
  - id: stage_09
    service: cockroachdb
    case: health-check-recovery
    retries: 0
  - id: stage_10
    service: cockroachdb
    case: partitioned-update
    retries: 0
    param_overrides:
      to_version: 24.1.1
  - id: stage_11
    service: cockroachdb
    case: version-check
    retries: 0
    param_overrides:
      report_key: cert_rotation_version
      to_version: 24.1.1
