# workflows/long/mongodb-long-dr-drill-b
#
# MongoDB DR drill B: deploy → init → scale → TLS → health-recovery → probe-tune → password-rotation → monitor → config → cert-rotate → decomm (primary-stepdown adversary)

metadata:
  id: mongodb-long-dr-drill-b
  label: 'MongoDB DR drill B: deploy → init → scale → TLS → health-recovery → probe-tune → password-rotation
    → monitor → config → cert-rotate → decomm (primary-stepdown adversary)'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: primary_stepdown
    inject_at_stage: stage_05
    lift_at_stage: stage_07
  stages:
  - id: stage_01
    service: mongodb
    case: deploy
    retries: 0
  - id: stage_02
    service: mongodb
    case: initialize
    retries: 0
  - id: stage_03
    service: mongodb
    case: replica-scaling
    retries: 0
    param_overrides:
      target_replicas: '5'
  - id: stage_04
    service: mongodb
    case: tls-setup
    retries: 0
  - id: stage_05
    service: mongodb
    case: health-check-recovery
    retries: 0
  - id: stage_06
    service: mongodb
    case: readiness-probe-tuning
    retries: 0
  - id: stage_07
    service: mongodb
    case: password-rotation
    retries: 0
  - id: stage_08
    service: mongodb
    case: monitoring-integration
    retries: 0
  - id: stage_09
    service: mongodb
    case: mongod-config-update
    retries: 0
    param_overrides:
      target_journal_compressor: zlib
  - id: stage_10
    service: mongodb
    case: certificate-rotation
    retries: 0
  - id: stage_11
    service: mongodb
    case: decommission
    retries: 0
