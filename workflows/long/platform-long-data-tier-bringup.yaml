# workflows/long/platform-long-data-tier-bringup
#
# Platform — data-tier bring-up & day-1 ops: CockroachDB + MongoDB

metadata:
  id: platform-long-data-tier-bringup
  label: 'Platform — data-tier bring-up & day-1 ops: CockroachDB + MongoDB'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: deploy
    retries: 1
  - id: stage_02
    service: cockroachdb
    case: initialize
    retries: 1
  - id: stage_03
    service: cockroachdb
    case: generate-cert
    retries: 1
  - id: stage_04
    service: cockroachdb
    case: cluster-settings
    retries: 1
  - id: stage_05
    service: cockroachdb
    case: zone-config
    retries: 1
  - id: stage_06
    service: cockroachdb
    case: monitoring-integration
    retries: 1
  - id: stage_07
    service: mongodb
    case: deploy
    retries: 1
  - id: stage_08
    service: mongodb
    case: initialize
    retries: 1
  - id: stage_09
    service: mongodb
    case: user-management
    retries: 1
  - id: stage_10
    service: mongodb
    case: tls-setup
    retries: 1
  - id: stage_11
    service: mongodb
    case: replica-scaling
    retries: 1
    param_overrides:
      target_replicas: 5
  - id: stage_12
    service: mongodb
    case: monitoring-integration
    retries: 1
