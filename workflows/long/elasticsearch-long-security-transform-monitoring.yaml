# workflows/long/elasticsearch-long-security-transform-monitoring
#
# Elasticsearch combined security, transform recovery, and monitoring pipeline

metadata:
  id: elasticsearch-long-security-transform-monitoring
  label: Elasticsearch combined security, transform recovery, and monitoring pipeline
spec:
  prompt_mode: progressive
  adversary:
  - scenario: elastic-password-corrupted
    inject_at_stage: stage_03
    lift_at_stage: stage_05
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
  - id: stage_02
    service: elasticsearch
    case: file-realm-user-roles-merge
    retries: 0
  - id: stage_03
    service: elasticsearch
    case: rotate-elastic-password
    retries: 0
  - id: stage_04
    service: elasticsearch
    case: transform-job-recovery
    retries: 0
  - id: stage_05
    service: elasticsearch
    case: rotate-http-certs
    retries: 0
  - id: stage_06
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 0
  - id: stage_07
    service: elasticsearch
    case: transform-job-recovery
    retries: 0
  - id: stage_08
    service: elasticsearch
    case: transport-additional-ca-trust
    retries: 0
  - id: stage_09
    service: elasticsearch
    case: stack-monitoring-sidecars
    retries: 0
  - id: stage_10
    service: elasticsearch
    case: secure-http-ingress
    retries: 0
