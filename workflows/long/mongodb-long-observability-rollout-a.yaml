# workflows/long/mongodb-long-observability-rollout-a
#
# MongoDB observability rollout A: deploy → init → monitor → config × 3 → probe-tune → health-recovery → password-rotation → users → decomm

metadata:
  id: mongodb-long-observability-rollout-a
  label: 'MongoDB observability rollout A: deploy → init → monitor → config × 3 → probe-tune → health-recovery
    → password-rotation → users → decomm'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: deploy
    retries: 1
  - id: stage_02
    service: mongodb
    case: initialize
    retries: 1
  - id: stage_03
    service: mongodb
    case: monitoring-integration
    retries: 1
  - id: stage_04
    service: mongodb
    case: mongod-config-update
    retries: 1
    param_overrides:
      target_journal_compressor: zlib
  - id: stage_05
    service: mongodb
    case: readiness-probe-tuning
    retries: 1
  - id: stage_06
    service: mongodb
    case: mongod-config-update
    retries: 1
    param_overrides:
      target_journal_compressor: snappy
  - id: stage_07
    service: mongodb
    case: health-check-recovery
    retries: 1
  - id: stage_08
    service: mongodb
    case: password-rotation
    retries: 1
  - id: stage_09
    service: mongodb
    case: user-management
    retries: 1
  - id: stage_10
    service: mongodb
    case: mongod-config-update
    retries: 1
    param_overrides:
      target_journal_compressor: zlib
  - id: stage_11
    service: mongodb
    case: decommission
    retries: 1
