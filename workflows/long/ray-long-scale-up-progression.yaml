# workflows/long/ray-long-scale-up-progression
#
# Ray progressive scale-up 1→2→3→4→5: deploy 1 worker, scale each step, job after each, dashboard, upgrade, teardown

metadata:
  id: ray-long-scale-up-progression
  label: 'Ray progressive scale-up 1→2→3→4→5: deploy 1 worker, scale each step, job after each, dashboard,
    upgrade, teardown'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: ray
    case: deploy_cluster
    retries: 1
    param_overrides:
      worker_replicas: '1'
  - id: stage_02
    service: ray
    case: dashboard_exposure
    retries: 1
    param_overrides:
      dashboard_port: '8265'
  - id: stage_03
    service: ray
    case: scale_workers
    retries: 1
    param_overrides:
      source_worker_replicas: '1'
      target_worker_replicas: '2'
  - id: stage_04
    service: ray
    case: job_submission
    retries: 1
    param_overrides:
      expected_output: pong
  - id: stage_05
    service: ray
    case: scale_workers
    retries: 1
    param_overrides:
      source_worker_replicas: '2'
      target_worker_replicas: '3'
  - id: stage_06
    service: ray
    case: job_submission
    retries: 1
    param_overrides:
      expected_output: pong
  - id: stage_07
    service: ray
    case: scale_workers
    retries: 1
    param_overrides:
      source_worker_replicas: '3'
      target_worker_replicas: '4'
  - id: stage_08
    service: ray
    case: scale_workers
    retries: 1
    param_overrides:
      source_worker_replicas: '4'
      target_worker_replicas: '5'
  - id: stage_09
    service: ray
    case: upgrade_version
    retries: 1
    param_overrides:
      from_image: rayproject/ray:2.8.0
      to_image: rayproject/ray:2.9.0
  - id: stage_10
    service: ray
    case: job_submission
    retries: 1
    param_overrides:
      expected_output: pong
  - id: stage_11
    service: ray
    case: teardown_cluster
    retries: 1
