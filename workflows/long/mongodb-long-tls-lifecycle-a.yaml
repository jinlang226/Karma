# workflows/long/mongodb-long-tls-lifecycle-a
#
# MongoDB TLS lifecycle A: deploy → init → TLS → cert-rotate × 3 → custom-roles → users → monitor → config → decomm

metadata:
  id: mongodb-long-tls-lifecycle-a
  label: 'MongoDB TLS lifecycle A: deploy → init → TLS → cert-rotate × 3 → custom-roles → users → monitor
    → config → decomm'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: deploy
    retries: 1
  - id: stage_02
    service: mongodb
    case: initialize
    retries: 1
  - id: stage_03
    service: mongodb
    case: tls-setup
    retries: 1
  - id: stage_04
    service: mongodb
    case: certificate-rotation
    retries: 1
  - id: stage_05
    service: mongodb
    case: custom-roles
    retries: 1
  - id: stage_06
    service: mongodb
    case: certificate-rotation
    retries: 1
  - id: stage_07
    service: mongodb
    case: user-management
    retries: 1
  - id: stage_08
    service: mongodb
    case: certificate-rotation
    retries: 1
  - id: stage_09
    service: mongodb
    case: monitoring-integration
    retries: 1
  - id: stage_10
    service: mongodb
    case: mongod-config-update
    retries: 1
    param_overrides:
      target_journal_compressor: zlib
  - id: stage_11
    service: mongodb
    case: decommission
    retries: 1
