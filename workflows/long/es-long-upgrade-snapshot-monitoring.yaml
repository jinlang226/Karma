# workflows/long/es-long-upgrade-snapshot-monitoring
#
# Elasticsearch rolling upgrade with snapshot backup and monitoring integration

metadata:
  id: es-long-upgrade-snapshot-monitoring
  label: Elasticsearch rolling upgrade with snapshot backup and monitoring integration
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: full-restart-upgrade-ha
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 1
  - id: stage_05
    service: elasticsearch
    case: stack-monitoring-sidecars
    retries: 1
  - id: stage_06
    service: elasticsearch
    case: full-restart-upgrade-ha
    retries: 1
  - id: stage_07
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 1
  - id: stage_08
    service: elasticsearch
    case: full-restart-upgrade-ha-hard
    retries: 1
  - id: stage_09
    service: elasticsearch
    case: stack-monitoring-sidecars
    retries: 1
  - id: stage_10
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 1
