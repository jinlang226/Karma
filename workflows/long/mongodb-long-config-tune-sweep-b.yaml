# workflows/long/mongodb-long-config-tune-sweep-b
#
# MongoDB config tune sweep B: deploy → init → monitor → config × 4 → probe-tune × 2 → users → custom-roles → decomm (configmap-key-delete adversary)

metadata:
  id: mongodb-long-config-tune-sweep-b
  label: 'MongoDB config tune sweep B: deploy → init → monitor → config × 4 → probe-tune × 2 → users →
    custom-roles → decomm (configmap-key-delete adversary)'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: configmap_key_delete
    inject_at_stage: stage_05
    lift_at_stage: stage_08
  stages:
  - id: stage_01
    service: mongodb
    case: deploy
    retries: 1
  - id: stage_02
    service: mongodb
    case: initialize
    retries: 1
  - id: stage_03
    service: mongodb
    case: monitoring-integration
    retries: 1
  - id: stage_04
    service: mongodb
    case: mongod-config-update
    retries: 1
    param_overrides:
      target_journal_compressor: zlib
  - id: stage_05
    service: mongodb
    case: mongod-config-update
    retries: 1
    param_overrides:
      target_journal_compressor: snappy
  - id: stage_06
    service: mongodb
    case: readiness-probe-tuning
    retries: 1
  - id: stage_07
    service: mongodb
    case: mongod-config-update
    retries: 1
    param_overrides:
      target_journal_compressor: zlib
  - id: stage_08
    service: mongodb
    case: readiness-probe-tuning
    retries: 1
  - id: stage_09
    service: mongodb
    case: user-management
    retries: 1
  - id: stage_10
    service: mongodb
    case: custom-roles
    retries: 1
  - id: stage_11
    service: mongodb
    case: decommission
    retries: 1
