# workflows/long/platform-long-analytics-stack
#
# Platform — analytics stack lifecycle: Ray + Spark + Elasticsearch sink

metadata:
  id: platform-long-analytics-stack
  label: 'Platform — analytics stack lifecycle: Ray + Spark + Elasticsearch sink'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: ray
    case: deploy_cluster
    retries: 1
  - id: stage_02
    service: ray
    case: dashboard_exposure
    retries: 1
  - id: stage_03
    service: ray
    case: job_submission
    retries: 1
  - id: stage_04
    service: ray
    case: scale_workers
    retries: 1
  - id: stage_05
    service: spark
    case: deploy_spark_pi
    retries: 1
  - id: stage_06
    service: spark
    case: spark_data_skew
    retries: 1
  - id: stage_07
    service: spark
    case: spark_runtime_ops
    retries: 1
  - id: stage_08
    service: spark
    case: spark_multi_tenant
    retries: 1
  - id: stage_09
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_10
    service: elasticsearch
    case: file-realm-user-roles-merge
    retries: 1
  - id: stage_11
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 1
