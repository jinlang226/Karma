# workflows/long/nginx-long-05-canary-rollout
#
# nginx-ingress: Progressive Canary Rollout — header-based then weight progression

metadata:
  id: nginx-long-05-canary-rollout
  label: 'nginx-ingress: Progressive Canary Rollout — header-based then weight progression'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: create_ingress
    retries: 1
  - id: stage_02
    service: nginx-ingress
    case: create_ingress
    retries: 1
    param_overrides:
      host: canary.example.com
      path: /stable
  - id: stage_03
    service: nginx-ingress
    case: ingress_canary
    retries: 1
  - id: stage_04
    service: nginx-ingress
    case: ingress_canary
    retries: 1
    param_overrides:
      header_value: beta
  - id: stage_05
    service: nginx-ingress
    case: ingress_canary
    retries: 1
    param_overrides:
      header_name: X-Feature
      header_value: v2
  - id: stage_06
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 1
  - id: stage_07
    service: nginx-ingress
    case: ingress_canary
    retries: 1
    param_overrides:
      header_value: always
  - id: stage_08
    service: nginx-ingress
    case: renew_tls_secret
    retries: 1
  - id: stage_09
    service: nginx-ingress
    case: ingress_canary
    retries: 1
    param_overrides:
      header_name: X-Canary
      header_value: always
  - id: stage_10
    service: nginx-ingress
    case: otel_log_format
    retries: 1
  - id: stage_11
    service: nginx-ingress
    case: ingress_canary
    retries: 1
    param_overrides:
      header_value: beta
  - id: stage_12
    service: nginx-ingress
    case: class_only_upgrade
    retries: 1
