# workflows/long/nginx-long-02-security-campaign
#
# nginx-ingress: Security Hardening Campaign — TLS, class isolation, OTel under fault

metadata:
  id: nginx-long-02-security-campaign
  label: 'nginx-ingress: Security Hardening Campaign — TLS, class isolation, OTel under fault'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: delete_tls_secret
    inject_at_stage: stage_03
    lift_at_stage: stage_06
  stages:
  - id: stage_01
    service: nginx-ingress
    case: create_ingress
    retries: 1
  - id: stage_02
    service: nginx-ingress
    case: renew_tls_secret
    retries: 1
  - id: stage_03
    service: nginx-ingress
    case: renew_tls_secret
    retries: 1
    param_overrides:
      host: secure2.example.com
  - id: stage_04
    service: nginx-ingress
    case: class_only_upgrade
    retries: 1
  - id: stage_05
    service: nginx-ingress
    case: otel_log_format
    retries: 1
  - id: stage_06
    service: nginx-ingress
    case: renew_tls_secret
    retries: 1
    param_overrides:
      host: demo.example.com
  - id: stage_07
    service: nginx-ingress
    case: class_only_upgrade
    retries: 1
  - id: stage_08
    service: nginx-ingress
    case: otel_log_format
    retries: 1
    param_overrides:
      path: /sec-check
  - id: stage_09
    service: nginx-ingress
    case: renew_tls_secret
    retries: 1
    param_overrides:
      host: demo.example.com
  - id: stage_10
    service: nginx-ingress
    case: create_ingress
    retries: 1
    param_overrides:
      host: demo.example.com
      path: /secure
  - id: stage_11
    service: nginx-ingress
    case: otel_log_format
    retries: 1
    param_overrides:
      path: /final-check
