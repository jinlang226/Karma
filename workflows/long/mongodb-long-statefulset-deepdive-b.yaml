# workflows/long/mongodb-long-statefulset-deepdive-b
#
# MongoDB StatefulSet deep-dive B: deploy → init → statefulset-custom → probe-tune → health-recovery → probe-tune → scale → config → users → monitor → decomm (readiness-probe-break adversary)

metadata:
  id: mongodb-long-statefulset-deepdive-b
  label: 'MongoDB StatefulSet deep-dive B: deploy → init → statefulset-custom → probe-tune → health-recovery
    → probe-tune → scale → config → users → monitor → decomm (readiness-probe-break adversary)'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: readiness_probe_break
    inject_at_stage: stage_04
    lift_at_stage: stage_07
  stages:
  - id: stage_01
    service: mongodb
    case: deploy
    retries: 1
  - id: stage_02
    service: mongodb
    case: initialize
    retries: 1
  - id: stage_03
    service: mongodb
    case: statefulset-customization
    retries: 1
  - id: stage_04
    service: mongodb
    case: readiness-probe-tuning
    retries: 1
  - id: stage_05
    service: mongodb
    case: health-check-recovery
    retries: 1
  - id: stage_06
    service: mongodb
    case: readiness-probe-tuning
    retries: 1
  - id: stage_07
    service: mongodb
    case: replica-scaling
    retries: 1
    param_overrides:
      target_replicas: '5'
  - id: stage_08
    service: mongodb
    case: mongod-config-update
    retries: 1
    param_overrides:
      target_journal_compressor: zlib
  - id: stage_09
    service: mongodb
    case: user-management
    retries: 1
  - id: stage_10
    service: mongodb
    case: monitoring-integration
    retries: 1
  - id: stage_11
    service: mongodb
    case: decommission
    retries: 1
