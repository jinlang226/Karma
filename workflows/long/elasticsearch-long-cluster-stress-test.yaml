# workflows/long/elasticsearch-long-cluster-stress-test
#
# Elasticsearch cluster stress test: scale high, transport block incident, recover

metadata:
  id: elasticsearch-long-cluster-stress-test
  label: 'Elasticsearch cluster stress test: scale high, transport block incident, recover'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: transport-networkpolicy-block
    inject_at_stage: stage_05
    lift_at_stage: stage_07
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
  - id: stage_02
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 0
  - id: stage_03
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 0
    param_overrides:
      expected_nodes: '7'
      original_replicas: '5'
  - id: stage_04
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 0
  - id: stage_05
    service: elasticsearch
    case: transport-additional-ca-trust
    retries: 0
  - id: stage_06
    service: elasticsearch
    case: full-restart-upgrade-ha
    retries: 0
  - id: stage_07
    service: elasticsearch
    case: safe-downscale-with-shard-migration
    retries: 0
    param_overrides:
      target_replicas: '3'
  - id: stage_08
    service: elasticsearch
    case: seed-hosts-repair
    retries: 0
  - id: stage_09
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 0
  - id: stage_10
    service: elasticsearch
    case: stack-monitoring-sidecars
    retries: 0
