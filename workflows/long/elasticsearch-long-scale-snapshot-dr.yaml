# workflows/long/elasticsearch-long-scale-snapshot-dr
#
# Elasticsearch scaling, snapshot, and DR rehearsal with secret wipe incident

metadata:
  id: elasticsearch-long-scale-snapshot-dr
  label: Elasticsearch scaling, snapshot, and DR rehearsal with secret wipe incident
spec:
  prompt_mode: progressive
  adversary:
  - scenario: snapshot-secret-wiped
    inject_at_stage: stage_03
    lift_at_stage: stage_05
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
  - id: stage_02
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 0
  - id: stage_03
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 0
  - id: stage_04
    service: elasticsearch
    case: safe-downscale-with-shard-migration
    retries: 0
  - id: stage_05
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 0
  - id: stage_06
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 0
    param_overrides:
      expected_nodes: '5'
      original_replicas: '1'
  - id: stage_07
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 0
  - id: stage_08
    service: elasticsearch
    case: full-restart-upgrade-ha
    retries: 0
  - id: stage_09
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 0
  - id: stage_10
    service: elasticsearch
    case: safe-downscale-with-shard-migration
    retries: 0
    param_overrides:
      target_replicas: '3'
