# workflows/long/cockroachdb-long-zone-gc-deep-sweep
#
# CockroachDB deep zone-config GC TTL sweep with progressive tightening

metadata:
  id: cockroachdb-long-zone-gc-deep-sweep
  label: CockroachDB deep zone-config GC TTL sweep with progressive tightening
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: deploy
    retries: 1
  - id: stage_02
    service: cockroachdb
    case: initialize
    retries: 1
  - id: stage_03
    service: cockroachdb
    case: zone-config
    retries: 1
    param_overrides:
      gc_ttl_seconds: 604800
  - id: stage_04
    service: cockroachdb
    case: zone-config
    retries: 1
    param_overrides:
      gc_ttl_seconds: 86400
  - id: stage_05
    service: cockroachdb
    case: zone-config
    retries: 1
    param_overrides:
      gc_ttl_seconds: 43200
  - id: stage_06
    service: cockroachdb
    case: zone-config
    retries: 1
    param_overrides:
      gc_ttl_seconds: 14400
  - id: stage_07
    service: cockroachdb
    case: zone-config
    retries: 1
    param_overrides:
      gc_ttl_seconds: 7200
  - id: stage_08
    service: cockroachdb
    case: zone-config
    retries: 1
    param_overrides:
      gc_ttl_seconds: 3600
  - id: stage_09
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 128MiB
  - id: stage_10
    service: cockroachdb
    case: monitoring-integration
    retries: 1
  - id: stage_11
    service: cockroachdb
    case: partitioned-update
    retries: 1
    param_overrides:
      to_version: 24.1.1
  - id: stage_12
    service: cockroachdb
    case: version-check
    retries: 1
    param_overrides:
      report_key: gc_sweep_version
