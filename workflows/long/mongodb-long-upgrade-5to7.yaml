# workflows/long/mongodb-long-upgrade-5to7
#
# MongoDB upgrade campaign 5→7 hard path: deploy → init → scale → config → TLS → upgrade-hard → cert-rotate → monitor → probe-tune → password-rotation → decomm (secret-corruption adversary)

metadata:
  id: mongodb-long-upgrade-5to7
  label: 'MongoDB upgrade campaign 5→7 hard path: deploy → init → scale → config → TLS → upgrade-hard
    → cert-rotate → monitor → probe-tune → password-rotation → decomm (secret-corruption adversary)'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: secret_corruption
    inject_at_stage: stage_04
    lift_at_stage: stage_06
  stages:
  - id: stage_01
    service: mongodb
    case: deploy
    retries: 0
  - id: stage_02
    service: mongodb
    case: initialize
    retries: 0
  - id: stage_03
    service: mongodb
    case: replica-scaling
    retries: 0
    param_overrides:
      target_replicas: '5'
  - id: stage_04
    service: mongodb
    case: mongod-config-update
    retries: 0
    param_overrides:
      target_journal_compressor: zlib
  - id: stage_05
    service: mongodb
    case: tls-setup
    retries: 0
  - id: stage_06
    service: mongodb
    case: version-upgrade-hard
    retries: 0
  - id: stage_07
    service: mongodb
    case: certificate-rotation
    retries: 0
  - id: stage_08
    service: mongodb
    case: monitoring-integration
    retries: 0
  - id: stage_09
    service: mongodb
    case: readiness-probe-tuning
    retries: 0
  - id: stage_10
    service: mongodb
    case: password-rotation
    retries: 0
