# workflows/long/cockroachdb-long-full-lifecycle
#
# CockroachDB full operational lifecycle: bring-up through decommission

metadata:
  id: cockroachdb-long-full-lifecycle
  label: 'CockroachDB full operational lifecycle: bring-up through decommission'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: deploy
    retries: 1
  - id: stage_02
    service: cockroachdb
    case: initialize
    retries: 1
  - id: stage_03
    service: cockroachdb
    case: generate-cert
    retries: 1
  - id: stage_04
    service: cockroachdb
    case: certificate-rotation
    retries: 1
  - id: stage_05
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 64MiB
  - id: stage_06
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 128MiB
  - id: stage_07
    service: cockroachdb
    case: zone-config
    retries: 1
    param_overrides:
      gc_ttl_seconds: 14400
  - id: stage_08
    service: cockroachdb
    case: monitoring-integration
    retries: 1
  - id: stage_09
    service: cockroachdb
    case: version-check
    retries: 1
  - id: stage_10
    service: cockroachdb
    case: partitioned-update
    retries: 1
    param_overrides:
      to_version: 24.1.1
  - id: stage_11
    service: cockroachdb
    case: major-upgrade-finalize
    retries: 1
  - id: stage_12
    service: cockroachdb
    case: health-check-recovery
    retries: 1
  - id: stage_13
    service: cockroachdb
    case: decommission
    retries: 1
