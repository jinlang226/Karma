# workflows/long/platform-long-fronted-store
#
# Platform — fronted store with rate limiting: MongoDB + NGINX

metadata:
  id: platform-long-fronted-store
  label: 'Platform — fronted store with rate limiting: MongoDB + NGINX'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: deploy
    retries: 0
  - id: stage_02
    service: mongodb
    case: initialize
    retries: 0
  - id: stage_03
    service: mongodb
    case: user-management
    retries: 0
  - id: stage_04
    service: mongodb
    case: tls-setup
    retries: 0
  - id: stage_05
    service: mongodb
    case: replica-scaling
    retries: 0
    param_overrides:
      target_replicas: 5
  - id: stage_06
    service: mongodb
    case: monitoring-integration
    retries: 0
  - id: stage_07
    service: nginx-ingress
    case: create_ingress
    retries: 0
  - id: stage_08
    service: nginx-ingress
    case: ingress_canary
    retries: 0
  - id: stage_09
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 0
  - id: stage_10
    service: nginx-ingress
    case: renew_tls_secret
    retries: 0
  - id: stage_11
    service: nginx-ingress
    case: otel_log_format
    retries: 0
