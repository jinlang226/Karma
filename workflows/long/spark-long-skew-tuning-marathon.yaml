# workflows/long/spark-long-skew-tuning-marathon
#
# Data skew tuning marathon: baseline → broadcast → AQE rounds → ETL-OOM → runtime config lock-in

metadata:
  id: spark-long-skew-tuning-marathon
  label: 'Data skew tuning marathon: baseline → broadcast → AQE rounds → ETL-OOM → runtime config lock-in'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: spark
    case: spark_data_skew
    retries: 0
  - id: stage_02
    service: spark
    case: spark_etl_skew_oom
    retries: 0
  - id: stage_03
    service: spark
    case: spark_data_skew
    retries: 0
  - id: stage_04
    service: spark
    case: spark_etl_skew_oom
    retries: 0
  - id: stage_05
    service: spark
    case: spark_data_skew
    retries: 0
  - id: stage_06
    service: spark
    case: spark_runtime_ops
    retries: 0
    param_overrides:
      executor_memory: 1g
  - id: stage_07
    service: spark
    case: spark_runtime_ops
    retries: 0
    param_overrides:
      executor_memory: 1536m
  - id: stage_08
    service: spark
    case: spark_runtime_ops
    retries: 0
    param_overrides:
      executor_memory: 2g
  - id: stage_09
    service: spark
    case: spark_data_skew
    retries: 0
  - id: stage_10
    service: spark
    case: spark_etl_skew_oom
    retries: 0
  - id: stage_11
    service: spark
    case: spark_streaming_autoscale
    retries: 0
  - id: stage_12
    service: spark
    case: spark_data_skew
    retries: 0
