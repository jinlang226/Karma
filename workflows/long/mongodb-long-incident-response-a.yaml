# workflows/long/mongodb-long-incident-response-a
#
# MongoDB incident response chain A: deploy → init → health-recovery → statefulset-custom → health-recovery → probe-tune → scale → config → monitor → password-rotation → decomm

metadata:
  id: mongodb-long-incident-response-a
  label: 'MongoDB incident response chain A: deploy → init → health-recovery → statefulset-custom → health-recovery
    → probe-tune → scale → config → monitor → password-rotation → decomm'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: deploy
    retries: 1
  - id: stage_02
    service: mongodb
    case: initialize
    retries: 1
  - id: stage_03
    service: mongodb
    case: health-check-recovery
    retries: 1
  - id: stage_04
    service: mongodb
    case: statefulset-customization
    retries: 1
  - id: stage_05
    service: mongodb
    case: health-check-recovery
    retries: 1
  - id: stage_06
    service: mongodb
    case: readiness-probe-tuning
    retries: 1
  - id: stage_07
    service: mongodb
    case: replica-scaling
    retries: 1
    param_overrides:
      target_replicas: '5'
  - id: stage_08
    service: mongodb
    case: mongod-config-update
    retries: 1
    param_overrides:
      target_journal_compressor: zlib
  - id: stage_09
    service: mongodb
    case: monitoring-integration
    retries: 1
  - id: stage_10
    service: mongodb
    case: password-rotation
    retries: 1
  - id: stage_11
    service: mongodb
    case: decommission
    retries: 1
