# workflows/long/nginx-long-22-upgrade-otel-scale-fault
#
# nginx-ingress: Upgrade + OTel Campaign — backend scaled to zero during class upgrade

metadata:
  id: nginx-long-22-upgrade-otel-scale-fault
  label: 'nginx-ingress: Upgrade + OTel Campaign — backend scaled to zero during class upgrade'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: scale_down_backend
    inject_at_stage: stage_05
    lift_at_stage: stage_08
  stages:
  - id: stage_01
    service: nginx-ingress
    case: create_ingress
    retries: 1
  - id: stage_02
    service: nginx-ingress
    case: class_only_upgrade
    retries: 1
  - id: stage_03
    service: nginx-ingress
    case: otel_log_format
    retries: 1
  - id: stage_04
    service: nginx-ingress
    case: class_only_upgrade
    retries: 1
  - id: stage_05
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 1
  - id: stage_06
    service: nginx-ingress
    case: otel_log_format
    retries: 1
    param_overrides:
      path: /trace2
  - id: stage_07
    service: nginx-ingress
    case: class_only_upgrade
    retries: 1
  - id: stage_08
    service: nginx-ingress
    case: renew_tls_secret
    retries: 1
  - id: stage_09
    service: nginx-ingress
    case: otel_log_format
    retries: 1
    param_overrides:
      path: /trace3
  - id: stage_10
    service: nginx-ingress
    case: ingress_canary
    retries: 1
  - id: stage_11
    service: nginx-ingress
    case: class_only_upgrade
    retries: 1
