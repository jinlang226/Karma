# workflows/long/spark-long-enterprise-hardening
#
# Enterprise security hardening: deploy baseline → RBAC/tenant lockdown → credential
# and runtime config rotation → streaming validation → data-path checks → final
# compliance smoke deploy.

metadata:
  id: spark-long-enterprise-hardening
  label: 'Enterprise security hardening: RBAC/tenant lockdown → credential rotation → runtime config → streaming validation → compliance sweep'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: spark
    case: deploy_spark_pi
    retries: 1
  - id: stage_02
    service: spark
    case: spark_multi_tenant
    retries: 1
  - id: stage_03
    service: spark
    case: spark_runtime_ops
    retries: 1
  - id: stage_04
    service: spark
    case: spark_multi_tenant
    retries: 1
  - id: stage_05
    service: spark
    case: spark_runtime_ops
    retries: 1
  - id: stage_06
    service: spark
    case: spark_streaming_autoscale
    retries: 1
  - id: stage_07
    service: spark
    case: spark_etl_skew_oom
    retries: 1
  - id: stage_08
    service: spark
    case: spark_data_skew
    retries: 1
  - id: stage_09
    service: spark
    case: spark_multi_tenant
    retries: 1
  - id: stage_10
    service: spark
    case: deploy_spark_pi
    retries: 1
