# workflows/long/cockroachdb-long-security-upgrade-adversary
#
# CockroachDB security hardening and upgrade with SQL-port block adversary

metadata:
  id: cockroachdb-long-security-upgrade-adversary
  label: CockroachDB security hardening and upgrade with SQL-port block adversary
spec:
  prompt_mode: progressive
  adversary:
  - scenario: block_sql_port
    inject_at_stage: stage_07
    lift_at_stage: stage_08
  stages:
  - id: stage_01
    service: cockroachdb
    case: deploy
    retries: 0
  - id: stage_02
    service: cockroachdb
    case: initialize
    retries: 0
  - id: stage_03
    service: cockroachdb
    case: generate-cert
    retries: 0
  - id: stage_04
    service: cockroachdb
    case: certificate-rotation
    retries: 0
  - id: stage_05
    service: cockroachdb
    case: cluster-settings
    retries: 0
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 128MiB
  - id: stage_06
    service: cockroachdb
    case: zone-config
    retries: 0
    param_overrides:
      gc_ttl_seconds: 14400
  - id: stage_07
    service: cockroachdb
    case: partitioned-update
    retries: 0
    param_overrides:
      to_version: 24.1.1
  - id: stage_08
    service: cockroachdb
    case: major-upgrade-finalize
    retries: 0
  - id: stage_09
    service: cockroachdb
    case: version-check
    retries: 0
    param_overrides:
      report_key: security_upgrade_version
      # Match the workflow's upgrade target (stage_07/08 go to 24.1.1); without
      # this, version-check defaults to 24.1.0 and rejects the correctly-upgraded
      # v24.1.1 cluster.
      to_version: 24.1.1
  - id: stage_10
    service: cockroachdb
    case: monitoring-integration
    retries: 0
  - id: stage_11
    service: cockroachdb
    case: expose-ingress
    retries: 0
  - id: stage_12
    service: cockroachdb
    case: health-check-recovery
    retries: 0
