# workflows/long/nginx-ingress-long-29-path-sweep
#
# nginx-ingress: Path Sweep — expose many paths, then apply limits and TLS

metadata:
  id: nginx-ingress-long-29-path-sweep
  label: 'nginx-ingress: Path Sweep — expose many paths, then apply limits and TLS'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: create_ingress
    retries: 1
    param_overrides:
      path: /api
  - id: stage_02
    service: nginx-ingress
    case: create_ingress
    retries: 1
    param_overrides:
      path: /health
  - id: stage_03
    service: nginx-ingress
    case: create_ingress
    retries: 1
    param_overrides:
      path: /metrics
  - id: stage_04
    service: nginx-ingress
    case: create_ingress
    retries: 1
    param_overrides:
      path: /status
  - id: stage_05
    service: nginx-ingress
    case: create_ingress
    retries: 1
    param_overrides:
      path: /admin
  - id: stage_06
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 1
  - id: stage_07
    service: nginx-ingress
    case: ingress_canary
    retries: 1
  - id: stage_08
    service: nginx-ingress
    case: renew_tls_secret
    retries: 1
  - id: stage_09
    service: nginx-ingress
    case: otel_log_format
    retries: 1
  - id: stage_10
    service: nginx-ingress
    case: class_only_upgrade
    retries: 1
  - id: stage_11
    service: nginx-ingress
    case: rate_limit_replica_hard
    retries: 1
