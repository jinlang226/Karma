# workflows/long/platform-long-security-hardening-day
#
# Platform — estate-wide TLS/security hardening day

metadata:
  id: platform-long-security-hardening-day
  label: Platform — estate-wide TLS/security hardening day
spec:
  prompt_mode: progressive
  adversary:
  - scenario: delete_cert_secret
    inject_at_stage: stage_03
  stages:
  - id: stage_01
    service: cockroachdb
    case: deploy
    retries: 0
  - id: stage_02
    service: cockroachdb
    case: generate-cert
    retries: 0
  - id: stage_03
    service: cockroachdb
    case: certificate-rotation
    retries: 0
  - id: stage_04
    service: mongodb
    case: deploy
    retries: 0
  - id: stage_05
    service: mongodb
    case: tls-setup
    retries: 0
  - id: stage_06
    service: mongodb
    case: certificate-rotation
    retries: 0
  - id: stage_07
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
  - id: stage_08
    service: elasticsearch
    case: rotate-http-certs
    retries: 0
  - id: stage_09
    service: elasticsearch
    case: transport-additional-ca-trust
    retries: 0
  - id: stage_10
    service: elasticsearch
    case: secure-http-ingress
    retries: 0
