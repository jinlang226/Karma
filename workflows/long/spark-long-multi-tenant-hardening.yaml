# workflows/long/spark-long-multi-tenant-hardening
#
# Multi-tenant RBAC hardening: fix team RBAC and the History Server PVC, settle
# runtime config, validate streaming under load, re-audit tenants, and finish with
# a clean redeploy plus a runtime check.

metadata:
  id: spark-long-multi-tenant-hardening
  label: 'Multi-tenant RBAC hardening: fix teams + History Server PVC → runtime config → streaming validation → tenant re-audit → redeploy'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: spark
    case: spark_multi_tenant
    retries: 0
  - id: stage_02
    service: spark
    case: spark_runtime_ops
    retries: 0
  - id: stage_03
    service: spark
    case: spark_multi_tenant
    retries: 0
  - id: stage_04
    service: spark
    case: spark_streaming_autoscale
    retries: 0
  - id: stage_05
    service: spark
    case: spark_data_skew
    retries: 0
  - id: stage_06
    service: spark
    case: spark_etl_skew_oom
    retries: 0
  - id: stage_07
    service: spark
    case: spark_multi_tenant
    retries: 0
  - id: stage_08
    service: spark
    case: spark_streaming_autoscale
    retries: 0
  - id: stage_09
    service: spark
    case: deploy_spark_pi
    retries: 0
  - id: stage_10
    service: spark
    case: spark_runtime_ops
    retries: 0
