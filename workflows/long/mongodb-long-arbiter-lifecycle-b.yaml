# workflows/long/mongodb-long-arbiter-lifecycle-b
#
# MongoDB arbiter lifecycle B: deploy → init → arbiters → scale × 2 → config × 2 → probe-tune → users → monitor → password-rotation → decomm (scale-down adversary)

metadata:
  id: mongodb-long-arbiter-lifecycle-b
  label: 'MongoDB arbiter lifecycle B: deploy → init → arbiters → scale × 2 → config × 2 → probe-tune
    → users → monitor → password-rotation → decomm (scale-down adversary)'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: scale_down_replica
    inject_at_stage: stage_04
    lift_at_stage: stage_07
  stages:
  - id: stage_01
    service: mongodb
    case: deploy
    retries: 1
  - id: stage_02
    service: mongodb
    case: initialize
    retries: 1
  - id: stage_03
    service: mongodb
    case: arbiters
    retries: 1
  - id: stage_04
    service: mongodb
    case: replica-scaling
    retries: 1
    param_overrides:
      target_replicas: '5'
  - id: stage_05
    service: mongodb
    case: mongod-config-update
    retries: 1
    param_overrides:
      target_journal_compressor: zlib
  - id: stage_06
    service: mongodb
    case: readiness-probe-tuning
    retries: 1
  - id: stage_07
    service: mongodb
    case: replica-scaling
    retries: 1
    param_overrides:
      target_replicas: '3'
  - id: stage_08
    service: mongodb
    case: user-management
    retries: 1
  - id: stage_09
    service: mongodb
    case: monitoring-integration
    retries: 1
  - id: stage_10
    service: mongodb
    case: password-rotation
    retries: 1
  - id: stage_11
    service: mongodb
    case: decommission
    retries: 1
