# workflows/long/es-long-tls-rotation-sweep
#
# Elasticsearch progressive TLS certificate rotation sweep

metadata:
  id: es-long-tls-rotation-sweep
  label: Elasticsearch progressive TLS certificate rotation sweep
spec:
  prompt_mode: progressive
  adversary:
  - scenario: http-service-selector-drift
    inject_at_stage: stage_04
    lift_at_stage: stage_06
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: rotate-http-certs
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: rotate-elastic-password
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: rotate-http-certs
    retries: 1
  - id: stage_05
    service: elasticsearch
    case: transport-additional-ca-trust
    retries: 1
  - id: stage_06
    service: elasticsearch
    case: rotate-http-certs
    retries: 1
  - id: stage_07
    service: elasticsearch
    case: secure-http-ingress
    retries: 1
  - id: stage_08
    service: elasticsearch
    case: rotate-http-certs
    retries: 1
  - id: stage_09
    service: elasticsearch
    case: rotate-elastic-password
    retries: 1
  - id: stage_10
    service: elasticsearch
    case: rotate-http-certs
    retries: 1
