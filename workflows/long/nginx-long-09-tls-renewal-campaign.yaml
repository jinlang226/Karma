# workflows/long/nginx-long-09-tls-renewal-campaign
#
# nginx-ingress: TLS Certificate Renewal Campaign — rotate across multiple hosts

metadata:
  id: nginx-long-09-tls-renewal-campaign
  label: 'nginx-ingress: TLS Certificate Renewal Campaign — rotate across multiple hosts'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: create_ingress
    retries: 1
  - id: stage_02
    service: nginx-ingress
    case: renew_tls_secret
    retries: 1
  - id: stage_03
    service: nginx-ingress
    case: create_ingress
    retries: 1
    param_overrides:
      host: api.example.com
      path: /api
  - id: stage_04
    service: nginx-ingress
    case: renew_tls_secret
    retries: 1
    param_overrides:
      host: demo.example.com
  - id: stage_05
    service: nginx-ingress
    case: create_ingress
    retries: 1
    param_overrides:
      host: admin.example.com
      path: /admin
  - id: stage_06
    service: nginx-ingress
    case: renew_tls_secret
    retries: 1
    param_overrides:
      host: demo.example.com
  - id: stage_07
    service: nginx-ingress
    case: otel_log_format
    retries: 1
  - id: stage_08
    service: nginx-ingress
    case: renew_tls_secret
    retries: 1
    param_overrides:
      host: demo.example.com
  - id: stage_09
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 1
  - id: stage_10
    service: nginx-ingress
    case: renew_tls_secret
    retries: 1
    param_overrides:
      host: demo.example.com
  - id: stage_11
    service: nginx-ingress
    case: class_only_upgrade
    retries: 1
  - id: stage_12
    service: nginx-ingress
    case: renew_tls_secret
    retries: 1
    param_overrides:
      host: demo.example.com
