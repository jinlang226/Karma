# workflows/long/nginx-ingress-long-06-canary-scale-fault
#
# nginx-ingress: Canary Rollout — backend scaled to zero mid-flight

metadata:
  id: nginx-ingress-long-06-canary-scale-fault
  label: 'nginx-ingress: Canary Rollout — backend scaled to zero mid-flight'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: scale_down_backend
    inject_at_stage: stage_04
    lift_at_stage: stage_07
  stages:
  - id: stage_01
    service: nginx-ingress
    case: create_ingress
    retries: 0
  - id: stage_02
    service: nginx-ingress
    case: ingress_canary
    retries: 0
  - id: stage_03
    service: nginx-ingress
    case: ingress_canary
    retries: 0
    param_overrides:
      header_value: beta
  - id: stage_04
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 0
  - id: stage_05
    service: nginx-ingress
    case: ingress_canary
    retries: 0
    param_overrides:
      header_name: X-Feature
      header_value: v2
  - id: stage_06
    service: nginx-ingress
    case: renew_tls_secret
    retries: 0
  - id: stage_07
    service: nginx-ingress
    case: ingress_canary
    retries: 0
    param_overrides:
      header_value: always
  - id: stage_08
    service: nginx-ingress
    case: otel_log_format
    retries: 0
  - id: stage_09
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 0
    param_overrides:
      limit_rps: '2'
  - id: stage_10
    service: nginx-ingress
    case: ingress_canary
    retries: 0
    param_overrides:
      header_name: X-Canary
      header_value: always
  - id: stage_11
    service: nginx-ingress
    case: class_only_upgrade
    retries: 0
