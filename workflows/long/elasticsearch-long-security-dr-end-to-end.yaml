# workflows/long/elasticsearch-long-security-dr-end-to-end
#
# Elasticsearch security and disaster recovery end-to-end with transport block

metadata:
  id: elasticsearch-long-security-dr-end-to-end
  label: Elasticsearch security and disaster recovery end-to-end with transport block
spec:
  prompt_mode: progressive
  adversary:
  - scenario: transport-networkpolicy-block
    inject_at_stage: stage_05
    lift_at_stage: stage_07
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
  - id: stage_02
    service: elasticsearch
    case: file-realm-user-roles-merge
    retries: 0
  - id: stage_03
    service: elasticsearch
    case: rotate-elastic-password
    retries: 0
  - id: stage_04
    service: elasticsearch
    case: rotate-http-certs
    retries: 0
  - id: stage_05
    service: elasticsearch
    case: transport-additional-ca-trust
    retries: 0
  - id: stage_06
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 0
  - id: stage_07
    service: elasticsearch
    case: full-restart-upgrade-ha
    retries: 0
  - id: stage_09
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 0
  - id: stage_10
    service: elasticsearch
    case: seed-hosts-repair
    retries: 0
  - id: stage_11
    service: elasticsearch
    case: stack-monitoring-sidecars
    retries: 0
