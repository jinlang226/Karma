# workflows/long/nginx-ingress-long-14-dr-scale-fault
#
# nginx-ingress: DR Drill — backend scaled to zero during recovery

metadata:
  id: nginx-ingress-long-14-dr-scale-fault
  label: 'nginx-ingress: DR Drill — backend scaled to zero during recovery'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: scale_down_backend
    inject_at_stage: stage_05
    lift_at_stage: stage_09
  stages:
  - id: stage_01
    service: nginx-ingress
    case: create_ingress
    retries: 0
  - id: stage_02
    service: nginx-ingress
    case: renew_tls_secret
    retries: 0
  - id: stage_03
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 0
  - id: stage_04
    service: nginx-ingress
    case: ingress_canary
    retries: 0
  - id: stage_05
    service: nginx-ingress
    case: otel_log_format
    retries: 0
  - id: stage_06
    service: nginx-ingress
    case: class_only_upgrade
    retries: 0
  - id: stage_07
    service: nginx-ingress
    case: create_ingress
    retries: 0
    param_overrides:
      host: api.example.com
      path: /v1
  - id: stage_08
    service: nginx-ingress
    case: rate_limit_replica_hard
    retries: 0
  - id: stage_09
    service: nginx-ingress
    case: renew_tls_secret
    retries: 0
    param_overrides:
      host: demo.example.com
  - id: stage_10
    service: nginx-ingress
    case: ingress_canary
    retries: 0
    param_overrides:
      header_value: beta
  - id: stage_11
    service: nginx-ingress
    case: otel_log_format
    retries: 0
    param_overrides:
      path: /dr-trace
