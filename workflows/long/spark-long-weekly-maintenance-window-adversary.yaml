# workflows/long/spark-long-weekly-maintenance-window-adversary
#
# Weekly maintenance window with adversarial configmap memory revert mid-window

metadata:
  id: spark-long-weekly-maintenance-window-adversary
  label: Weekly maintenance window with adversarial configmap memory revert mid-window
spec:
  prompt_mode: progressive
  adversary:
  - scenario: configmap_executor_memory_drop
    inject_at_stage: stage_01
    lift_at_stage: stage_04
  stages:
  - id: stage_01
    service: spark
    case: spark_runtime_ops
    retries: 0
    param_overrides:
      executor_memory: 512m
  - id: stage_02
    service: spark
    case: spark_runtime_ops
    retries: 0
    param_overrides:
      executor_memory: 768m
  - id: stage_03
    service: spark
    case: spark_runtime_ops
    retries: 0
    param_overrides:
      executor_memory: 1g
  - id: stage_04
    service: spark
    case: spark_runtime_ops
    retries: 0
    param_overrides:
      executor_memory: 1280m
  - id: stage_05
    service: spark
    case: spark_streaming_autoscale
    retries: 0
  - id: stage_06
    service: spark
    case: spark_data_skew
    retries: 0
  - id: stage_07
    service: spark
    case: spark_streaming_autoscale
    retries: 0
  - id: stage_08
    service: spark
    case: spark_etl_skew_oom
    retries: 0
  - id: stage_09
    service: spark
    case: spark_multi_tenant
    retries: 0
  - id: stage_10
    service: spark
    case: spark_etl_skew_oom
    retries: 0
  - id: stage_11
    service: spark
    case: deploy_spark_pi
    retries: 0
  - id: stage_12
    service: spark
    case: spark_runtime_ops
    retries: 0
