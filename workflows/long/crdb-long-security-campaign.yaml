# workflows/long/crdb-long-security-campaign
#
# CockroachDB security hardening campaign: TLS enablement, cert rotation, secure ingress, and tuning

metadata:
  id: crdb-long-security-campaign
  label: 'CockroachDB security hardening campaign: TLS enablement, cert rotation, secure ingress, and tuning'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: deploy
    retries: 1
  - id: stage_02
    service: cockroachdb
    case: initialize
    retries: 1
  - id: stage_03
    service: cockroachdb
    case: generate-cert
    retries: 1
  - id: stage_04
    service: cockroachdb
    case: certificate-rotation
    retries: 1
  - id: stage_05
    service: cockroachdb
    case: expose-ingress
    retries: 1
  - id: stage_06
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 128MiB
  - id: stage_07
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 192MiB
  - id: stage_08
    service: cockroachdb
    case: zone-config
    retries: 1
    param_overrides:
      gc_ttl_seconds: 7200
  - id: stage_09
    service: cockroachdb
    case: monitoring-integration
    retries: 1
  - id: stage_10
    service: cockroachdb
    case: health-check-recovery
    retries: 1
  - id: stage_11
    service: cockroachdb
    case: version-check
    retries: 1
