# workflows/long/spark-long-streaming-autoscale-campaign
#
# Streaming autoscale campaign: load phases interleaved with skew/ETL benchmarks + worker scale-down adversary

metadata:
  id: spark-long-streaming-autoscale-campaign
  label: 'Streaming autoscale campaign: load phases interleaved with skew/ETL benchmarks + worker scale-down adversary'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: worker_scale_down
    inject_at_stage: stage_03
    lift_at_stage: stage_05
    param_overrides:
      namespace: spark-streaming
      wrong_replicas: '1'
      restore_replicas: '5'
  stages:
  - id: stage_01
    service: spark
    case: spark_streaming_autoscale
    retries: 1
  - id: stage_02
    service: spark
    case: spark_data_skew
    retries: 1
  - id: stage_03
    service: spark
    case: spark_streaming_autoscale
    retries: 1
  - id: stage_04
    service: spark
    case: spark_etl_skew_oom
    retries: 1
  - id: stage_05
    service: spark
    case: spark_runtime_ops
    retries: 1
    param_overrides:
      executor_memory: 768m
  - id: stage_06
    service: spark
    case: spark_runtime_ops
    retries: 1
    param_overrides:
      executor_memory: 1g
  - id: stage_07
    service: spark
    case: spark_streaming_autoscale
    retries: 1
  - id: stage_08
    service: spark
    case: spark_data_skew
    retries: 1
  - id: stage_09
    service: spark
    case: spark_runtime_ops
    retries: 1
    param_overrides:
      executor_memory: 1280m
  - id: stage_10
    service: spark
    case: spark_streaming_autoscale
    retries: 1
  - id: stage_11
    service: spark
    case: spark_multi_tenant
    retries: 1
  - id: stage_12
    service: spark
    case: spark_streaming_autoscale
    retries: 1
