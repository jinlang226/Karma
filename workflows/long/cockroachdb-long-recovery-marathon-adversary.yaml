# workflows/long/cockroachdb-long-recovery-marathon-adversary
#
# CockroachDB recovery marathon with SQL-port block adversary during health recovery

metadata:
  id: cockroachdb-long-recovery-marathon-adversary
  label: CockroachDB recovery marathon with SQL-port block adversary during health recovery
spec:
  prompt_mode: progressive
  adversary:
  - scenario: block_sql_port
    inject_at_stage: stage_04
    lift_at_stage: stage_05
  stages:
  - id: stage_01
    service: cockroachdb
    case: deploy
    retries: 0
  - id: stage_02
    service: cockroachdb
    case: initialize
    retries: 0
  - id: stage_03
    service: cockroachdb
    case: generate-cert
    retries: 0
  - id: stage_04
    service: cockroachdb
    case: health-check-recovery
    retries: 0
  - id: stage_05
    service: cockroachdb
    case: cluster-settings
    retries: 0
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 64MiB
  - id: stage_06
    service: cockroachdb
    case: cluster-settings
    retries: 0
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 128MiB
  - id: stage_07
    service: cockroachdb
    case: zone-config
    retries: 0
    param_overrides:
      gc_ttl_seconds: 43200
  - id: stage_08
    service: cockroachdb
    case: zone-config
    retries: 0
    param_overrides:
      gc_ttl_seconds: 14400
  - id: stage_09
    service: cockroachdb
    case: certificate-rotation
    retries: 0
  - id: stage_10
    service: cockroachdb
    case: monitoring-integration
    retries: 0
  - id: stage_11
    service: cockroachdb
    case: partitioned-update
    retries: 0
    param_overrides:
      to_version: 24.1.1
  - id: stage_12
    service: cockroachdb
    case: major-upgrade-finalize
    retries: 0
  - id: stage_13
    service: cockroachdb
    case: version-check
    retries: 0
    param_overrides:
      report_key: recovery_marathon_version
      to_version: 24.1.1
