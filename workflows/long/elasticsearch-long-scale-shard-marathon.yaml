# workflows/long/elasticsearch-long-scale-shard-marathon
#
# Elasticsearch scale and shard management marathon

metadata:
  id: elasticsearch-long-scale-shard-marathon
  label: Elasticsearch scale and shard management marathon
spec:
  prompt_mode: progressive
  adversary:
  - scenario: shard-allocation-disabled
    inject_at_stage: stage_03
    lift_at_stage: stage_05
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
  - id: stage_02
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 0
  - id: stage_03
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 0
    param_overrides:
      expected_nodes: '7'
      original_replicas: '5'
  - id: stage_04
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 0
    param_overrides:
      expected_nodes: '5'
      original_replicas: '2'
  - id: stage_05
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 0
    param_overrides:
      expected_nodes: '4'
      original_replicas: '1'
  - id: stage_06
    service: elasticsearch
    case: seed-hosts-repair
    retries: 0
