# workflows/long/mongodb-long-day2-marathon-a
#
# MongoDB day-2 marathon A: scale 3→5 → scale 5→7 → config × 3 → probe-tune × 2 → scale 7→5 → scale 5→3 → password-rotation → monitor

metadata:
  id: mongodb-long-day2-marathon-a
  label: 'MongoDB day-2 marathon A: scale 3→5 → scale 5→7 → config × 3 → probe-tune × 2 → scale 7→5 →
    scale 5→3 → password-rotation → monitor'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: replica-scaling
    retries: 0
    param_overrides:
      target_replicas: '5'
  - id: stage_02
    service: mongodb
    case: replica-scaling
    retries: 0
    param_overrides:
      target_replicas: '7'
  - id: stage_03
    service: mongodb
    case: mongod-config-update
    retries: 0
    param_overrides:
      target_journal_compressor: zlib
  - id: stage_04
    service: mongodb
    case: readiness-probe-tuning
    retries: 0
  - id: stage_05
    service: mongodb
    case: replica-scaling
    retries: 0
    param_overrides:
      target_replicas: '5'
  - id: stage_06
    service: mongodb
    case: mongod-config-update
    retries: 0
    param_overrides:
      target_journal_compressor: snappy
  - id: stage_07
    service: mongodb
    case: replica-scaling
    retries: 0
    param_overrides:
      target_replicas: '3'
  - id: stage_08
    service: mongodb
    case: readiness-probe-tuning
    retries: 0
  - id: stage_09
    service: mongodb
    case: mongod-config-update
    retries: 0
    param_overrides:
      target_journal_compressor: zlib
  - id: stage_10
    service: mongodb
    case: password-rotation
    retries: 0
  - id: stage_11
    service: mongodb
    case: monitoring-integration
    retries: 0
