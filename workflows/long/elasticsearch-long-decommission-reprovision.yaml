# workflows/long/elasticsearch-long-decommission-reprovision
#
# Elasticsearch decommission and reprovisioning cycle

metadata:
  id: elasticsearch-long-decommission-reprovision
  label: Elasticsearch decommission and reprovisioning cycle
spec:
  prompt_mode: progressive
  adversary:
  - scenario: statefulset-scaled-down
    inject_at_stage: stage_03
    lift_at_stage: stage_05
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
  - id: stage_02
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 0
  - id: stage_03
    service: elasticsearch
    case: safe-downscale-with-shard-migration
    retries: 0
    param_overrides:
      target_replicas: '2'
  - id: stage_04
    service: elasticsearch
    case: master-downscale-voting-exclusions
    retries: 0
  - id: stage_05
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
  - id: stage_06
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 0
  - id: stage_07
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 0
  - id: stage_08
    service: elasticsearch
    case: stack-monitoring-sidecars
    retries: 0
