# workflows/long/mongodb-long-observability-rollout-b
#
# MongoDB observability rollout B: deploy → init → monitor → config × 3 → probe-tune × 2 → password-rotation → custom-roles → decomm (configmap-key-delete adversary)

metadata:
  id: mongodb-long-observability-rollout-b
  label: 'MongoDB observability rollout B: deploy → init → monitor → config × 3 → probe-tune × 2 → password-rotation
    → custom-roles → decomm (configmap-key-delete adversary)'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: configmap_key_delete
    inject_at_stage: stage_04
    lift_at_stage: stage_07
  stages:
  - id: stage_01
    service: mongodb
    case: deploy
    retries: 0
  - id: stage_02
    service: mongodb
    case: initialize
    retries: 0
  - id: stage_03
    service: mongodb
    case: monitoring-integration
    retries: 0
  - id: stage_04
    service: mongodb
    case: mongod-config-update
    retries: 0
    param_overrides:
      target_journal_compressor: zlib
  - id: stage_05
    service: mongodb
    case: readiness-probe-tuning
    retries: 0
  - id: stage_06
    service: mongodb
    case: mongod-config-update
    retries: 0
    param_overrides:
      target_journal_compressor: snappy
  - id: stage_07
    service: mongodb
    case: readiness-probe-tuning
    retries: 0
  - id: stage_08
    service: mongodb
    case: password-rotation
    retries: 0
  - id: stage_09
    service: mongodb
    case: user-management
    retries: 0
  - id: stage_10
    service: mongodb
    case: custom-roles
    retries: 0
