# workflows/long/crdb-long-storage-management-adversary
#
# CockroachDB storage management with node scale-down adversary during health-check recovery

metadata:
  id: crdb-long-storage-management-adversary
  label: CockroachDB storage management with node scale-down adversary during health-check recovery
spec:
  prompt_mode: progressive
  adversary:
  - scenario: scale_down_node
    inject_at_stage: stage_11
    lift_at_stage: stage_12
  stages:
  - id: stage_01
    service: cockroachdb
    case: deploy
    retries: 1
  - id: stage_02
    service: cockroachdb
    case: initialize
    retries: 1
  - id: stage_03
    service: cockroachdb
    case: zone-config
    retries: 1
    param_overrides:
      gc_ttl_seconds: 604800
  - id: stage_04
    service: cockroachdb
    case: zone-config
    retries: 1
    param_overrides:
      gc_ttl_seconds: 86400
  - id: stage_05
    service: cockroachdb
    case: zone-config
    retries: 1
    param_overrides:
      gc_ttl_seconds: 43200
  - id: stage_06
    service: cockroachdb
    case: zone-config
    retries: 1
    param_overrides:
      gc_ttl_seconds: 14400
  - id: stage_07
    service: cockroachdb
    case: zone-config
    retries: 1
    param_overrides:
      gc_ttl_seconds: 3600
  - id: stage_08
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 128MiB
  - id: stage_09
    service: cockroachdb
    case: monitoring-integration
    retries: 1
  - id: stage_10
    service: cockroachdb
    case: version-check
    retries: 1
    param_overrides:
      report_key: storage_mgmt_version
  - id: stage_11
    service: cockroachdb
    case: health-check-recovery
    retries: 1
  - id: stage_12
    service: cockroachdb
    case: decommission
    retries: 1
