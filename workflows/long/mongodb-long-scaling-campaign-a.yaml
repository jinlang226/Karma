# workflows/long/mongodb-long-scaling-campaign-a
#
# MongoDB scaling campaign A: deploy → init → scale 3→5 → scale 5→7 → config → probe-tune → scale 7→5 → monitor → scale 5→3 → password-rotation → decomm

metadata:
  id: mongodb-long-scaling-campaign-a
  label: 'MongoDB scaling campaign A: deploy → init → scale 3→5 → scale 5→7 → config → probe-tune → scale
    7→5 → monitor → scale 5→3 → password-rotation → decomm'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: deploy
    retries: 0
  - id: stage_02
    service: mongodb
    case: initialize
    retries: 0
  - id: stage_03
    service: mongodb
    case: replica-scaling
    retries: 0
    param_overrides:
      target_replicas: '5'
  - id: stage_04
    service: mongodb
    case: replica-scaling
    retries: 0
    param_overrides:
      target_replicas: '7'
  - id: stage_05
    service: mongodb
    case: mongod-config-update
    retries: 0
    param_overrides:
      target_journal_compressor: zlib
  - id: stage_06
    service: mongodb
    case: readiness-probe-tuning
    retries: 0
  - id: stage_07
    service: mongodb
    case: replica-scaling
    retries: 0
    param_overrides:
      target_replicas: '5'
  - id: stage_08
    service: mongodb
    case: monitoring-integration
    retries: 0
  - id: stage_09
    service: mongodb
    case: replica-scaling
    retries: 0
    param_overrides:
      target_replicas: '3'
  - id: stage_10
    service: mongodb
    case: password-rotation
    retries: 0
