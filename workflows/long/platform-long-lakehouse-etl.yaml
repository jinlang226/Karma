# workflows/long/platform-long-lakehouse-etl
#
# Platform — lakehouse ETL platform: Spark transforms into Elasticsearch

metadata:
  id: platform-long-lakehouse-etl
  label: 'Platform — lakehouse ETL platform: Spark transforms into Elasticsearch'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: rbac_role_revoke
    inject_at_stage: stage_01
  stages:
  - id: stage_01
    service: spark
    case: deploy_spark_pi
    retries: 0
  - id: stage_02
    service: spark
    case: spark_data_skew
    retries: 0
  - id: stage_03
    service: spark
    case: spark_runtime_ops
    retries: 0
  - id: stage_04
    service: spark
    case: spark_multi_tenant
    retries: 0
  - id: stage_05
    service: spark
    case: spark_streaming_autoscale
    retries: 0
  - id: stage_06
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
  - id: stage_07
    service: elasticsearch
    case: file-realm-user-roles-merge
    retries: 0
  - id: stage_08
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 0
  - id: stage_09
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 0
  - id: stage_10
    service: elasticsearch
    case: stack-monitoring-sidecars
    retries: 0
