# workflows/long/cockroachdb-long-upgrade-campaign
#
# CockroachDB upgrade campaign: rolling partitioned updates to major-upgrade finalization

metadata:
  id: cockroachdb-long-upgrade-campaign
  label: 'CockroachDB upgrade campaign: rolling partitioned updates to major-upgrade finalization'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: deploy
    retries: 0
    param_overrides:
      to_version: 23.2.0
  - id: stage_02
    service: cockroachdb
    case: initialize
    # Pin initialize to the deploy stage's version baseline. initialize's
    # crdb_version defaults to 24.1.0; if its (now authoritative) skip-probe
    # ever missed the inherited v23.2.0 cluster, a rebuild at the default
    # would clobber the version baseline this upgrade workflow depends on.
    param_overrides:
      crdb_version: '23.2.0'
    retries: 0
  - id: stage_03
    service: cockroachdb
    case: cluster-settings
    retries: 0
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 64MiB
  - id: stage_04
    service: cockroachdb
    case: partitioned-update
    retries: 0
    param_overrides:
      to_version: 23.2.5
  - id: stage_05
    service: cockroachdb
    case: partitioned-update
    retries: 0
    param_overrides:
      to_version: 23.2.10
  - id: stage_06
    service: cockroachdb
    case: version-check
    retries: 0
    param_overrides:
      from_version: '23.2'
      to_version: 23.2.10
      report_key: pre_upgrade_version
  - id: stage_07
    service: cockroachdb
    case: major-upgrade-finalize
    retries: 0
  - id: stage_08
    service: cockroachdb
    case: version-check
    retries: 0
    param_overrides:
      from_version: '23.2'
      to_version: 24.1.0
      report_key: post_upgrade_version
  - id: stage_09
    service: cockroachdb
    case: cluster-settings
    retries: 0
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 128MiB
  - id: stage_10
    service: cockroachdb
    case: zone-config
    retries: 0
    param_overrides:
      gc_ttl_seconds: 14400
  - id: stage_11
    service: cockroachdb
    case: monitoring-integration
    retries: 0
