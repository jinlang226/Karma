# workflows/long/nginx-ingress-long-28-decommission-scale-fault
#
# nginx-ingress: Hardening Sweep — backend scaled to zero during class upgrade

metadata:
  id: nginx-ingress-long-28-decommission-scale-fault
  label: 'nginx-ingress: Hardening Sweep — backend scaled to zero during class upgrade'
spec:
  prompt_mode: progressive
  adversary:
  # Target otel-echo (planted by stage_05 otel_log_format, persists) -- NOT a
  # backend graded in the inject..lift window (stage_06 class -> demo-app,
  # stage_07 canary -> stable/canary-echo, stage_08 rate-hard -> rate-echo,
  # stage_09 TLS -> echo-server) -- so the fault is a benign background
  # disruption that never grades through an oracle (§3.3).
  - scenario: scale_down_backend
    inject_at_stage: stage_06
    lift_at_stage: stage_09
    param_overrides:
      deployment_name: otel-echo
      restore_replicas: '1'
  stages:
  - id: stage_01
    service: nginx-ingress
    case: create_ingress
    retries: 0
  - id: stage_02
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 0
  - id: stage_03
    service: nginx-ingress
    case: ingress_canary
    retries: 0
  - id: stage_04
    service: nginx-ingress
    case: renew_tls_secret
    retries: 0
  - id: stage_05
    service: nginx-ingress
    case: otel_log_format
    retries: 0
  - id: stage_06
    service: nginx-ingress
    case: class_only_upgrade
    retries: 0
  - id: stage_07
    service: nginx-ingress
    case: ingress_canary
    retries: 0
    param_overrides:
      header_value: beta
  - id: stage_08
    service: nginx-ingress
    case: rate_limit_replica_hard
    retries: 0
  - id: stage_09
    service: nginx-ingress
    case: renew_tls_secret
    retries: 0
    param_overrides:
      host: demo.example.com
  - id: stage_10
    service: nginx-ingress
    case: otel_log_format
    retries: 0
    param_overrides:
      path: /shutdown-trace
  - id: stage_11
    service: nginx-ingress
    case: class_only_upgrade
    retries: 0
