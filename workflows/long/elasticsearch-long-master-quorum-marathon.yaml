# workflows/long/elasticsearch-long-master-quorum-marathon
#
# Elasticsearch master quorum management and downscale marathon

metadata:
  id: elasticsearch-long-master-quorum-marathon
  label: Elasticsearch master quorum management and downscale marathon
spec:
  prompt_mode: progressive
  adversary:
  - scenario: transport-networkpolicy-block
    inject_at_stage: stage_04
    lift_at_stage: stage_06
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: master-downscale-voting-exclusions
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: master-downscale-voting-exclusions
    retries: 1
  - id: stage_05
    service: elasticsearch
    case: safe-downscale-with-shard-migration
    retries: 1
  - id: stage_06
    service: elasticsearch
    case: master-downscale-voting-exclusions
    retries: 1
  - id: stage_07
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 1
    param_overrides:
      expected_nodes: '4'
      original_replicas: '1'
  - id: stage_08
    service: elasticsearch
    case: master-downscale-voting-exclusions
    retries: 1
  - id: stage_09
    service: elasticsearch
    case: safe-downscale-with-shard-migration
    retries: 1
    param_overrides:
      target_replicas: '2'
  - id: stage_10
    service: elasticsearch
    case: seed-hosts-repair
    retries: 1
