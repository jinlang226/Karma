# workflows/long/spark-long-security-campaign
#
# Security hardening campaign: RBAC fix → credential rotation → multi-tenant access → streaming

metadata:
  id: spark-long-security-campaign
  label: 'Security hardening campaign: RBAC fix → credential rotation → multi-tenant access → streaming'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: rbac_role_revoke
    inject_at_stage: stage_07
    lift_at_stage: stage_10
  stages:
  - id: stage_01
    service: spark
    case: deploy_spark_pi
    retries: 1
  - id: stage_02
    service: spark
    case: spark_runtime_ops
    retries: 1
  - id: stage_03
    service: spark
    case: spark_runtime_ops
    retries: 1
  - id: stage_04
    service: spark
    case: spark_multi_tenant
    retries: 1
  - id: stage_05
    service: spark
    case: spark_multi_tenant
    retries: 1
  - id: stage_06
    service: spark
    case: spark_runtime_ops
    retries: 1
  - id: stage_07
    service: spark
    case: deploy_spark_pi
    retries: 1
  - id: stage_08
    service: spark
    case: spark_streaming_autoscale
    retries: 1
  - id: stage_09
    service: spark
    case: spark_streaming_autoscale
    retries: 1
  - id: stage_10
    service: spark
    case: spark_multi_tenant
    retries: 1
  - id: stage_11
    service: spark
    case: spark_runtime_ops
    retries: 1
  - id: stage_12
    service: spark
    case: deploy_spark_pi
    retries: 1
