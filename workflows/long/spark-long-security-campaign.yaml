# workflows/long/spark-long-security-campaign
#
# Security hardening campaign: deploy -> runtime secret/RBAC hardening -> multi-tenant
# isolation -> RBAC-revoke adversary on redeploy -> streaming -> final validation.

metadata:
  id: spark-long-security-campaign
  label: 'Security hardening campaign: deploy -> runtime secret/RBAC hardening -> multi-tenant isolation -> RBAC-revoke adversary -> streaming -> validation'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: rbac_role_revoke
    inject_at_stage: stage_07
    lift_at_stage: stage_10
  stages:
  - id: stage_01
    service: spark
    case: deploy_spark_pi
    retries: 1
  - id: stage_02
    service: spark
    case: spark_runtime_ops
    retries: 1
    param_overrides:
      executor_memory: 768m
  - id: stage_03
    service: spark
    case: spark_runtime_ops
    retries: 1
    param_overrides:
      executor_memory: 1g
  - id: stage_04
    service: spark
    case: spark_multi_tenant
    retries: 1
  - id: stage_05
    service: spark
    case: spark_data_skew
    retries: 1
  - id: stage_06
    service: spark
    case: spark_runtime_ops
    retries: 1
  - id: stage_07
    service: spark
    case: deploy_spark_pi
    retries: 1
  - id: stage_08
    service: spark
    case: spark_streaming_autoscale
    retries: 1
  - id: stage_09
    service: spark
    case: spark_data_skew
    retries: 1
  - id: stage_10
    service: spark
    case: spark_multi_tenant
    retries: 1
  - id: stage_11
    service: spark
    case: spark_runtime_ops
    retries: 1
    param_overrides:
      executor_memory: 1280m
  - id: stage_12
    service: spark
    case: deploy_spark_pi
    retries: 1
