# workflows/long/nginx-long-31-config-tune-sweep
#
# nginx-ingress: Config Tuning Sweep — iterate OTel collector, canary header, rate limits

metadata:
  id: nginx-long-31-config-tune-sweep
  label: 'nginx-ingress: Config Tuning Sweep — iterate OTel collector, canary header, rate limits'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: create_ingress
    retries: 1
  - id: stage_02
    service: nginx-ingress
    case: otel_log_format
    retries: 1
    param_overrides:
      collector_port: '4317'
  - id: stage_03
    service: nginx-ingress
    case: otel_log_format
    retries: 1
    param_overrides:
      collector_port: '4317'
      path: /tune1
  - id: stage_04
    service: nginx-ingress
    case: ingress_canary
    retries: 1
    param_overrides:
      header_name: X-Canary
  - id: stage_05
    service: nginx-ingress
    case: ingress_canary
    retries: 1
    param_overrides:
      header_name: X-Feature
      header_value: v2
  - id: stage_06
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 1
    param_overrides:
      limit_rps: '3'
  - id: stage_07
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 1
    param_overrides:
      limit_rps: '1'
  - id: stage_08
    service: nginx-ingress
    case: rate_limit_replica_hard
    retries: 1
    param_overrides:
      limit_rps: '2'
  - id: stage_09
    service: nginx-ingress
    case: renew_tls_secret
    retries: 1
  - id: stage_10
    service: nginx-ingress
    case: class_only_upgrade
    retries: 1
  - id: stage_11
    service: nginx-ingress
    case: otel_log_format
    retries: 1
    param_overrides:
      path: /final-tune
