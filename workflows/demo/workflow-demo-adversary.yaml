# workflows/workflow-demo-adversary
#
# Three-stage progressive workflow that exercises adversary injection against
# the configmap-update case. The stale_configmap_value scenario is deployed
# before stage_2 (while the agent is working) and lifted after stage_3.
#
# prompt_mode: progressive — the agent receives one stage prompt at a time
# and sees the result of each stage before moving to the next.

metadata:
  id: workflow-demo-adversary
  label: Demo — ConfigMap update with adversary injection

spec:
  prompt_mode: progressive

  adversary:
    - scenario: stale_configmap_value
      inject_at_stage: stage_2
      lift_at_stage: stage_3
      param_overrides:
        wrong_value: INJECTED_BAD_VALUE

  stages:
    - id: stage_01
      service: demo
      case: configmap-update
      namespaces:
        - cluster_a
      param_overrides:
        target_value: "1"

    - id: stage_02
      service: demo
      case: configmap-update
      namespaces:
        - cluster_a
      param_overrides:
        target_value: "2"

    - id: stage_03
      service: demo
      case: configmap-update
      namespaces:
        - cluster_a
      param_overrides:
        target_value: "3"
