# workflows/error-prone/cockroachdb-rebalance-recovery-rates-rollback
#
# Set aggressive rebalance and recovery rates, then rehearse a rollback script

metadata:
  id: cockroachdb-rebalance-recovery-rates-rollback
  label: Set aggressive rebalance and recovery rates, then rehearse a rollback script
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: cluster-settings
    retries: 0
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 128MiB
  - id: stage_02
    service: cockroachdb
    case: cluster-settings
    retries: 0
    param_overrides:
      setting_name: kv.snapshot_recovery.max_rate
      setting_value: 64MiB
  - id: stage_03
    service: cockroachdb
    case: rollback-rehearsal
    retries: 0
