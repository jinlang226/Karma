# workflows/long/nginx-ingress-long-16-day2-ratelimit-fault
#
# nginx-ingress: Day-2 Marathon — rate-limit annotation stripped mid-hardening

metadata:
  id: nginx-ingress-long-16-day2-ratelimit-fault
  label: 'nginx-ingress: Day-2 Marathon — rate-limit annotation stripped mid-hardening'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: strip_rate_limit_annotation
    inject_at_stage: stage_05
    lift_at_stage: stage_09
  stages:
  - id: stage_01
    service: nginx-ingress
    case: create_ingress
    retries: 0
  - id: stage_02
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 0
    param_overrides:
      limit_rps: '5'
  - id: stage_03
    service: nginx-ingress
    case: ingress_canary
    retries: 0
  - id: stage_04
    service: nginx-ingress
    case: otel_log_format
    retries: 0
  - id: stage_05
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 0
    param_overrides:
      limit_rps: '3'
  - id: stage_06
    service: nginx-ingress
    case: renew_tls_secret
    retries: 0
  - id: stage_07
    service: nginx-ingress
    case: rate_limit_replica_hard
    retries: 0
    param_overrides:
      limit_rps: '2'
  - id: stage_08
    service: nginx-ingress
    case: class_only_upgrade
    retries: 0
  - id: stage_09
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 0
    param_overrides:
      limit_rps: '1'
  - id: stage_10
    service: nginx-ingress
    case: ingress_canary
    retries: 0
    param_overrides:
      header_value: beta
  - id: stage_11
    service: nginx-ingress
    case: otel_log_format
    retries: 0
    param_overrides:
      path: /day2-trace
