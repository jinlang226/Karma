# workflows/suite/rabbitmq-user-permission-sweep-adversary
#
# RabbitMQ: Repeated User Permission Audit Sweep — with adversary injection

metadata:
  id: rabbitmq-user-permission-sweep-adversary
  label: 'RabbitMQ: Repeated User Permission Audit Sweep — with adversary injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: revoke_app_user_permissions
    inject_at_stage: stage_02
    lift_at_stage: stage_03
  stages:
  - id: stage_01
    service: rabbitmq
    case: classic_queue
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_02
    service: rabbitmq
    case: manual_user_permission
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_03
    service: rabbitmq
    case: manual_user_permission
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
