# workflows/suite/cockroachdb-partitioned-update-sweep
#
# CockroachDB partitioned rolling update version sweep

metadata:
  id: cockroachdb-partitioned-update-sweep
  label: CockroachDB partitioned rolling update version sweep
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: partitioned-update
    retries: 0
    param_overrides:
      to_version: 24.1.0
  - id: stage_02
    service: cockroachdb
    case: partitioned-update
    retries: 0
    param_overrides:
      to_version: 24.1.1
  - id: stage_03
    service: cockroachdb
    case: version-check
    retries: 0
    param_overrides:
      to_version: 24.1.1
  - id: stage_04
    service: cockroachdb
    case: cluster-settings
    retries: 0
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 128MiB
