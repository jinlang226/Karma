# workflows/suite/mongodb-mongod-config-sweep-adversary
#
# MongoDB mongod config tuning sweep: cycle journal compressors — with adversary injection

metadata:
  id: mongodb-mongod-config-sweep-adversary
  label: 'MongoDB mongod config tuning sweep: cycle journal compressors — with adversary injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: configmap_key_delete
    inject_at_stage: stage_02
    lift_at_stage: stage_03
  stages:
  - id: stage_01
    service: mongodb
    case: mongod-config-update
    retries: 0
    param_overrides:
      target_journal_compressor: zlib
  - id: stage_02
    service: mongodb
    case: mongod-config-update
    retries: 0
    param_overrides:
      target_journal_compressor: zstd
  - id: stage_03
    service: mongodb
    case: mongod-config-update
    retries: 0
    param_overrides:
      target_journal_compressor: snappy
