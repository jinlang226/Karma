# workflows/suite/nginx-ingress-15-e2e-five-stage-adversary
#
# nginx-ingress: end-to-end five-stage lifecycle — expose, TLS, canary, rate limit, OTel — with adversary injection

metadata:
  id: nginx-ingress-15-e2e-five-stage-adversary
  label: 'nginx-ingress: end-to-end five-stage lifecycle — expose, TLS, canary, rate limit, OTel — with
    adversary injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: corrupt_ingress_nginx_configmap
    inject_at_stage: stage_05
    lift_at_stage: stage_05
  stages:
  - id: stage_01
    service: nginx-ingress
    case: create_ingress
    retries: 0
    param_overrides:
      host: app.example.com
      path: /svc
  - id: stage_02
    service: nginx-ingress
    case: renew_tls_secret
    retries: 0
  - id: stage_03
    service: nginx-ingress
    case: ingress_canary
    retries: 0
  - id: stage_04
    service: nginx-ingress
    case: rate_limit_replica_hard
    retries: 0
    param_overrides:
      limit_rps: '2'
  - id: stage_05
    service: nginx-ingress
    case: otel_log_format
    retries: 0
