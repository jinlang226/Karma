# workflows/suite/cockroachdb-cert-rotation
#
# CockroachDB certificate rotation on a running TLS cluster

metadata:
  id: cockroachdb-cert-rotation
  label: CockroachDB certificate rotation on a running TLS cluster
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: certificate-rotation
    retries: 0
  - id: stage_02
    service: cockroachdb
    case: cluster-settings
    retries: 0
  - id: stage_03
    service: cockroachdb
    case: version-check
    retries: 0
