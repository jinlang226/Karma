# workflows/error-prone/ray-upgrade-then-scale-audit
#
# Ray: deploy + upgrade + scale to 3, then audit

metadata:
  id: ray-upgrade-then-scale-audit
  label: 'Ray: deploy + upgrade + scale to 3, then audit'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: ray
    case: deploy_cluster
    retries: 0
    param_overrides:
      worker_replicas: '2'
  - id: stage_02
    service: ray
    case: upgrade_version
    retries: 0
    param_overrides:
      from_image: rayproject/ray:2.8.0
      to_image: rayproject/ray:2.9.0
  - id: stage_03
    service: ray
    case: scale_workers
    retries: 0
    param_overrides:
      source_worker_replicas: '2'
      target_worker_replicas: '3'
  - id: stage_04
    service: ray
    case: readonly-audit
    retries: 0
