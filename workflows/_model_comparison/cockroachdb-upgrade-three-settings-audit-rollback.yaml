# workflows/error-prone/cockroachdb-upgrade-three-settings-audit-rollback
#
# Major upgrade followed by four config hardening steps, audit then rollback rehearsal

metadata:
  id: cockroachdb-upgrade-three-settings-audit-rollback
  label: Major upgrade followed by four config hardening steps, audit then rollback rehearsal
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: major-upgrade-finalize
    retries: 0
    param_overrides:
      from_version: '23.2'
      to_version: 24.1.0
  - id: stage_02
    service: cockroachdb
    case: cluster-settings
    retries: 0
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 288MiB
  - id: stage_03
    service: cockroachdb
    case: cluster-settings
    retries: 0
    param_overrides:
      setting_name: kv.snapshot_recovery.max_rate
      setting_value: 144MiB
  - id: stage_04
    service: cockroachdb
    case: cluster-settings
    retries: 0
    param_overrides:
      setting_name: kv.range_merge.queue_enabled
      setting_value: 'false'
  - id: stage_05
    service: cockroachdb
    case: readonly-audit
    retries: 0
  - id: stage_06
    service: cockroachdb
    case: rollback-rehearsal
    retries: 0
