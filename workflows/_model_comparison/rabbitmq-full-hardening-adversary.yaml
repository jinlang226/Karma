# workflows/suite/rabbitmq-full-hardening-adversary
#
# RabbitMQ: Full Cluster Hardening — Policy, Users, Monitoring, TLS — with adversary injection

metadata:
  id: rabbitmq-full-hardening-adversary
  label: 'RabbitMQ: Full Cluster Hardening — Policy, Users, Monitoring, TLS — with adversary injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: block_amqp_network_policy
    inject_at_stage: stage_03
    lift_at_stage: stage_04
  stages:
  - id: stage_01
    service: rabbitmq
    case: classic_queue
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_02
    service: rabbitmq
    case: manual_policy_sync
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_03
    service: rabbitmq
    case: manual_user_permission
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_04
    service: rabbitmq
    case: manual_monitoring
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq