# workflows/suite/rabbitmq-policy-sync-after-setup
#
# RabbitMQ: Classic Queue Setup then HA Policy Sync

metadata:
  id: rabbitmq-policy-sync-after-setup
  label: 'RabbitMQ: Classic Queue Setup then HA Policy Sync'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: rabbitmq
    case: classic_queue
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_02
    service: rabbitmq
    case: manual_policy_sync
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
