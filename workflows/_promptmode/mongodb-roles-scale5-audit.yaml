# workflows/error-prone/mongodb-roles-scale5-audit
#
# MongoDB: tighten custom roles, scale to 5, then audit for compliance

metadata:
  id: mongodb-roles-scale5-audit
  label: 'MongoDB: tighten custom roles, scale to 5, then audit for compliance'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: custom-roles
    retries: 0
  - id: stage_02
    service: mongodb
    case: replica-scaling
    retries: 0
    param_overrides:
      target_replicas: '5'
  - id: stage_03
    service: mongodb
    case: readonly-audit
    retries: 0
