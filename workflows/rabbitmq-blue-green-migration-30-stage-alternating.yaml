# workflows/rabbitmq-blue-green-migration-30-stage-alternating
#
# Stress workflow: 30 alternating blue-green migration stages across two RabbitMQ
# clusters, exercising repeated source/target handoffs.
#
# Ported from the legacy workflow schema (apiVersion/kind/namespace_binding)
# to the current schema; converted and validated against this branch.

metadata:
  id: rabbitmq-blue-green-migration-30-stage-alternating
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01_a_to_b
    service: rabbitmq
    case: blue_green_migration
    namespaces:
    - cluster_a
    - cluster_b
    retries: 2
    param_overrides:
      blue_cluster_prefix: rabbitmq
      green_cluster_prefix: rabbitmq
    namespace_binding:
      default: cluster_b
      source: cluster_a
      target: cluster_b
