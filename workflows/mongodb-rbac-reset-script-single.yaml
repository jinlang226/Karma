apiVersion: benchmark/v1alpha1
kind: Workflow
metadata:
  name: mongodb-rbac-reset-script-single
spec:
  prompt_mode: concat_blind
  namespaces:
    - cluster_a
  stages:
    - id: stage_1_reset_script_only
      service: mongodb
      case: manual-rbac-reset
      namespaces:
        - cluster_a
      namespace_binding:
        default: cluster_a
      max_attempts: 3
