apiVersion: benchmark/v1alpha1
kind: Workflow
metadata:
  name: rabbitmq-two-cycle-xy-rotation
spec:
  prompt_mode: concat_blind
  namespaces:
    - cluster_x
    - cluster_y
  stages:
    - id: c1_policy_x
      service: rabbitmq-experiments
      case: manual_policy_sync
      namespaces:
        - cluster_x
      namespace_binding:
        default: cluster_x
      max_attempts: 3

    - id: c1_user_permission_x
      service: rabbitmq-experiments
      case: manual_user_permission
      namespaces:
        - cluster_x
      namespace_binding:
        default: cluster_x
      max_attempts: 3

    - id: c1_monitoring_x
      service: rabbitmq-experiments
      case: manual_monitoring
      namespaces:
        - cluster_x
      namespace_binding:
        default: cluster_x
      max_attempts: 3

    - id: c1_policy_y
      service: rabbitmq-experiments
      case: manual_policy_sync
      namespaces:
        - cluster_y
      namespace_binding:
        default: cluster_y
      max_attempts: 3

    - id: c1_user_permission_y
      service: rabbitmq-experiments
      case: manual_user_permission
      namespaces:
        - cluster_y
      namespace_binding:
        default: cluster_y
      max_attempts: 3

    - id: c1_monitoring_y
      service: rabbitmq-experiments
      case: manual_monitoring
      namespaces:
        - cluster_y
      namespace_binding:
        default: cluster_y
      max_attempts: 3

    - id: c1_migrate_x_to_y
      service: rabbitmq-experiments
      case: blue_green_migration
      namespaces:
        - cluster_x
        - cluster_y
      namespace_binding:
        default: cluster_y
        source: cluster_x
        target: cluster_y
      max_attempts: 3
      param_overrides:
        blue_cluster_prefix: rabbitmq
        green_cluster_prefix: rabbitmq

    - id: c1_reset_x
      service: rabbitmq-experiments
      case: manual_runtime_reset
      namespaces:
        - cluster_x
      namespace_binding:
        default: cluster_x
      max_attempts: 3

    - id: c1_reset_y
      service: rabbitmq-experiments
      case: manual_runtime_reset
      namespaces:
        - cluster_y
      namespace_binding:
        default: cluster_y
      max_attempts: 3

    - id: c2_policy_y
      service: rabbitmq-experiments
      case: manual_policy_sync
      namespaces:
        - cluster_y
      namespace_binding:
        default: cluster_y
      max_attempts: 3

    - id: c2_user_permission_y
      service: rabbitmq-experiments
      case: manual_user_permission
      namespaces:
        - cluster_y
      namespace_binding:
        default: cluster_y
      max_attempts: 3

    - id: c2_monitoring_y
      service: rabbitmq-experiments
      case: manual_monitoring
      namespaces:
        - cluster_y
      namespace_binding:
        default: cluster_y
      max_attempts: 3

    - id: c2_policy_x
      service: rabbitmq-experiments
      case: manual_policy_sync
      namespaces:
        - cluster_x
      namespace_binding:
        default: cluster_x
      max_attempts: 3

    - id: c2_user_permission_x
      service: rabbitmq-experiments
      case: manual_user_permission
      namespaces:
        - cluster_x
      namespace_binding:
        default: cluster_x
      max_attempts: 3

    - id: c2_monitoring_x
      service: rabbitmq-experiments
      case: manual_monitoring
      namespaces:
        - cluster_x
      namespace_binding:
        default: cluster_x
      max_attempts: 3

    - id: c2_migrate_y_to_x
      service: rabbitmq-experiments
      case: blue_green_migration
      namespaces:
        - cluster_x
        - cluster_y
      namespace_binding:
        default: cluster_x
        source: cluster_y
        target: cluster_x
      max_attempts: 3
      param_overrides:
        blue_cluster_prefix: rabbitmq
        green_cluster_prefix: rabbitmq

    - id: c2_reset_y
      service: rabbitmq-experiments
      case: manual_runtime_reset
      namespaces:
        - cluster_y
      namespace_binding:
        default: cluster_y
      max_attempts: 3

    - id: c2_reset_x
      service: rabbitmq-experiments
      case: manual_runtime_reset
      namespaces:
        - cluster_x
      namespace_binding:
        default: cluster_x
      max_attempts: 3
