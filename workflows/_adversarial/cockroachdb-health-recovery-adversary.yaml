# workflows/suite/cockroachdb-health-recovery-adversary
#
# CockroachDB health-check recovery incident response — with adversary injection

metadata:
  id: cockroachdb-health-recovery-adversary
  label: CockroachDB health-check recovery incident response — with adversary injection
spec:
  prompt_mode: progressive
  adversary:
  - scenario: scale_down_node
    inject_at_stage: stage_01
    lift_at_stage: stage_02
  stages:
  - id: stage_01
    service: cockroachdb
    case: health-check-recovery
    retries: 0
  - id: stage_02
    service: cockroachdb
    case: cluster-settings
    retries: 0
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 128MiB
  - id: stage_03
    service: cockroachdb
    case: version-check
    retries: 0
