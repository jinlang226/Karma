# workflows/suite/ray-deploy-dashboard-adversary
#
# Ray day-1 bring-up and dashboard exposure — with adversary injection

metadata:
  id: ray-deploy-dashboard-adversary
  label: Ray day-1 bring-up and dashboard exposure — with adversary injection
spec:
  prompt_mode: progressive
  adversary:
  - scenario: delete_head_service
    inject_at_stage: stage_02
    lift_at_stage: stage_03
  stages:
  - id: stage_01
    service: ray
    case: deploy_cluster
    retries: 0
    param_overrides:
      worker_replicas: '2'
  - id: stage_02
    service: ray
    case: dashboard_exposure
    retries: 0
    param_overrides:
      dashboard_port: '8265'
  - id: stage_03
    service: ray
    case: scale_workers
    retries: 0
    param_overrides:
      source_worker_replicas: '2'
      target_worker_replicas: '3'
