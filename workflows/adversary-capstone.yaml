# workflows/adversary-capstone
#
# 10-stage progressive workflow that exercises adversary injection TWICE against
# the configmap-update case. Purpose: validate the full pipeline end-to-end in a
# single run -- multi-stage execution, adversary inject/lift (x2 at different
# points), the post-workflow regression sweep (only multi-stage runs trigger
# it), and the LLM judge. Uses demo/configmap-update because it is reliable and
# fast, so the signal is the framework machinery, not agent capability.
#
# The stale_configmap_value adversary patches demo-config with a bad value while
# the agent is working; the agent must notice and set the correct target_value
# anyway. Injected before stage_3 (lifted after stage_4) and again before
# stage_7 (lifted after stage_8).

metadata:
  id: adversary-capstone
  label: Adversary capstone — 10-stage configmap workflow with two injections

spec:
  prompt_mode: progressive

  adversary:
    - scenario: stale_configmap_value
      inject_at_stage: stage_3
      lift_at_stage: stage_4
      param_overrides:
        wrong_value: ADVERSARY_BAD_FIRST
    - scenario: stale_configmap_value
      inject_at_stage: stage_7
      lift_at_stage: stage_8
      param_overrides:
        wrong_value: ADVERSARY_BAD_SECOND

  stages:
    - id: stage_1
      service: demo
      case: configmap-update
      namespaces: [cluster_a]
      param_overrides: { target_value: "v1" }
    - id: stage_2
      service: demo
      case: configmap-update
      namespaces: [cluster_a]
      param_overrides: { target_value: "v2" }
    - id: stage_3
      service: demo
      case: configmap-update
      namespaces: [cluster_a]
      param_overrides: { target_value: "v3" }
    - id: stage_4
      service: demo
      case: configmap-update
      namespaces: [cluster_a]
      param_overrides: { target_value: "v4" }
    - id: stage_5
      service: demo
      case: configmap-update
      namespaces: [cluster_a]
      param_overrides: { target_value: "v5" }
    - id: stage_6
      service: demo
      case: configmap-update
      namespaces: [cluster_a]
      param_overrides: { target_value: "v6" }
    - id: stage_7
      service: demo
      case: configmap-update
      namespaces: [cluster_a]
      param_overrides: { target_value: "v7" }
    - id: stage_8
      service: demo
      case: configmap-update
      namespaces: [cluster_a]
      param_overrides: { target_value: "v8" }
    - id: stage_9
      service: demo
      case: configmap-update
      namespaces: [cluster_a]
      param_overrides: { target_value: "v9" }
    - id: stage_10
      service: demo
      case: configmap-update
      namespaces: [cluster_a]
      param_overrides: { target_value: "v10" }
