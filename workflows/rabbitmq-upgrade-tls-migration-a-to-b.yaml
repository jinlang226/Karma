apiVersion: benchmark/v1alpha1
kind: Workflow
metadata:
  name: rabbitmq-upgrade-tls-migration-a-to-b
spec:
  prompt_mode: concat_blind
  namespaces:
    - cluster_a
    - cluster_b
  stages:
    - id: stage_1_upgrade_a_39_to_310
      service: rabbitmq-experiments
      case: manual_skip_upgrade
      namespaces:
        - cluster_a
      namespace_binding:
        default: cluster_a
      max_attempts: 3
      param_overrides:
        cluster_prefix: rabbitmq-cluster-a
        from_version: "3.9"
        to_version: "3.10"
    - id: stage_2_upgrade_b_39_to_311
      service: rabbitmq-experiments
      case: manual_skip_upgrade
      namespaces:
        - cluster_b
      namespace_binding:
        default: cluster_b
      max_attempts: 3
      param_overrides:
        cluster_prefix: rabbitmq-cluster-b
        from_version: "3.9"
        to_version: "3.11"
    - id: stage_3_rotate_tls_a
      service: rabbitmq-experiments
      case: manual_tls_rotation
      namespaces:
        - cluster_a
      namespace_binding:
        default: cluster_a
      max_attempts: 3
      param_overrides:
        cluster_prefix: rabbitmq-cluster-a
    - id: stage_4_rotate_tls_b
      service: rabbitmq-experiments
      case: manual_tls_rotation
      namespaces:
        - cluster_b
      namespace_binding:
        default: cluster_b
      max_attempts: 3
      param_overrides:
        cluster_prefix: rabbitmq-cluster-b
    - id: stage_5_migrate_a_to_b
      service: rabbitmq-experiments
      case: blue_green_migration
      namespaces:
        - cluster_a
        - cluster_b
      namespace_binding:
        default: cluster_b
        source: cluster_a
        target: cluster_b
      max_attempts: 3
      param_overrides:
        blue_cluster_prefix: rabbitmq-cluster-a
        green_cluster_prefix: rabbitmq-cluster-b
