# workflows/error-prone/nginx-ingress-ratelimit-otel-change-plan
#
# Rate-limit + OTel tracing — then upgrade plan trap

metadata:
  id: nginx-ingress-ratelimit-otel-change-plan
  label: Rate-limit + OTel tracing — then upgrade plan trap
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 0
    param_overrides:
      limit_rps: '5'
  - id: stage_02
    service: nginx-ingress
    case: otel_log_format
    retries: 0
  - id: stage_03
    service: nginx-ingress
    case: change-plan-only
    retries: 0
