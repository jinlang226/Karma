# workflows/suite/crdb-monitoring-ingress-adversary
#
# CockroachDB full observability: monitoring + ingress exposure — with adversary injection

metadata:
  id: crdb-monitoring-ingress-adversary
  label: 'CockroachDB full observability: monitoring + ingress exposure — with adversary injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: block_sql_port
    inject_at_stage: stage_02
    lift_at_stage: stage_04
  stages:
  - id: stage_01
    service: cockroachdb
    case: monitoring-integration
    retries: 1
  - id: stage_02
    service: cockroachdb
    case: expose-ingress
    retries: 1
  - id: stage_03
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: timeseries.storage.resolution_10s.ttl
      setting_value: 240h
  - id: stage_04
    service: cockroachdb
    case: version-check
    retries: 1
