# workflows/suite/crdb-monitoring
#
# CockroachDB monitoring integration: Prometheus scraping

metadata:
  id: crdb-monitoring
  label: 'CockroachDB monitoring integration: Prometheus scraping'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: monitoring-integration
    retries: 1
  - id: stage_02
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: timeseries.storage.resolution_10s.ttl
      setting_value: 240h
  - id: stage_03
    service: cockroachdb
    case: version-check
    retries: 1
