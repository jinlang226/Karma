# workflows/error-prone/cockroachdb-zone-rates-major-upgrade-rollback
#
# Zone GC config, three tunings, major upgrade, then rehearse rollback procedure

metadata:
  id: cockroachdb-zone-rates-major-upgrade-rollback
  label: Zone GC config, three tunings, major upgrade, then rehearse rollback procedure
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: zone-config
    retries: 0
    param_overrides:
      target_schema: tenant_b
      protected_schema: tenant_a
      gc_ttl_seconds: 14400
      num_replicas: 3
      range_min_bytes: 134217728
      range_max_bytes: 536870912
  - id: stage_02
    service: cockroachdb
    case: cluster-settings
    retries: 0
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 176MiB
  - id: stage_03
    service: cockroachdb
    case: cluster-settings
    retries: 0
    param_overrides:
      setting_name: kv.snapshot_recovery.max_rate
      setting_value: 88MiB
  - id: stage_04
    service: cockroachdb
    case: major-upgrade-finalize
    retries: 0
    param_overrides:
      from_version: '24.1'
      to_version: 24.2.0
  - id: stage_05
    service: cockroachdb
    case: rollback-rehearsal
    retries: 0
