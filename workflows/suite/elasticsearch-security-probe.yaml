# workflows/suite/elasticsearch-security-probe
#
# Elasticsearch — security lifecycle (composition probe)
# Generated single-application workflow (CHAIN).

metadata:
  id: elasticsearch-security-probe
  label: "Elasticsearch \u2014 security lifecycle (composition probe)"
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: file-realm-user-roles-merge
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: rotate-elastic-password
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: rotate-http-certs
    retries: 1
  - id: stage_05
    service: elasticsearch
    case: secure-http-ingress
    retries: 1
  - id: stage_06
    service: elasticsearch
    case: transport-additional-ca-trust
    retries: 1
