# workflows/suite/platform-store-and-search-adversary
#
# Platform — operational store + search: MongoDB + Elasticsearch — with adversary injection

metadata:
  id: platform-store-and-search-adversary
  label: 'Platform — operational store + search: MongoDB + Elasticsearch — with adversary injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: elastic-password-corrupted
    inject_at_stage: stage_03
    lift_at_stage: stage_04
  stages:
  - id: stage_01
    service: mongodb
    case: deploy
    retries: 1
  - id: stage_02
    service: mongodb
    case: user-management
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: file-realm-user-roles-merge
    retries: 1
