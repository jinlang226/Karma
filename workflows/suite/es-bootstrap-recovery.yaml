# workflows/suite/es-bootstrap-recovery
#
# ES: bootstrap master node recovery then repair seed hosts and fix service drift

metadata:
  id: es-bootstrap-recovery
  label: 'ES: bootstrap master node recovery then repair seed hosts and fix service drift'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: bootstrap-initial-master-nodes
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: seed-hosts-repair
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: internal-http-service-drift
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: rotate-http-certs
    retries: 1
