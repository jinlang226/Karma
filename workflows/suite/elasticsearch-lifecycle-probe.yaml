# workflows/suite/elasticsearch-lifecycle-probe
#
# Elasticsearch — bring-up to downscale (composition probe)
# Generated single-application workflow (CHAIN).

metadata:
  id: elasticsearch-lifecycle-probe
  label: "Elasticsearch \u2014 bring-up to downscale (composition probe)"
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: bootstrap-initial-master-nodes
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 1
  - id: stage_05
    service: elasticsearch
    case: full-restart-upgrade-ha
    retries: 1
  - id: stage_06
    service: elasticsearch
    case: safe-downscale-with-shard-migration
    retries: 1
