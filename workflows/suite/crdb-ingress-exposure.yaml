# workflows/suite/crdb-ingress-exposure
#
# CockroachDB ingress: expose DB Console HTTPS + SQL TCP

metadata:
  id: crdb-ingress-exposure
  label: 'CockroachDB ingress: expose DB Console HTTPS + SQL TCP'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: expose-ingress
    retries: 1
  - id: stage_02
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 128MiB
  - id: stage_03
    service: cockroachdb
    case: version-check
    retries: 1
