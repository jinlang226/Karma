# workflows/suite/mongodb-upgrade-hard-monitor-decommission-adversary
#
# MongoDB major upgrade 5.0→7.0, monitoring integration, then decommission — with adversary injection

metadata:
  id: mongodb-upgrade-hard-monitor-decommission-adversary
  label: MongoDB major upgrade 5.0→7.0, monitoring integration, then decommission — with adversary injection
spec:
  prompt_mode: progressive
  adversary:
  - scenario: primary_stepdown
    inject_at_stage: stage_01
    lift_at_stage: stage_02
  stages:
  - id: stage_01
    service: mongodb
    case: version-upgrade-hard
    retries: 1
  - id: stage_02
    service: mongodb
    case: monitoring-integration
    retries: 1
  - id: stage_03
    service: mongodb
    case: decommission
    retries: 1
