# workflows/suite/mongodb-security-hardening-adversary
#
# MongoDB security hardening: custom roles, user management, password rotation — with adversary injection

metadata:
  id: mongodb-security-hardening-adversary
  label: 'MongoDB security hardening: custom roles, user management, password rotation — with adversary
    injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: secret_corruption
    inject_at_stage: stage_03
    lift_at_stage: stage_04
  stages:
  - id: stage_01
    service: mongodb
    case: deploy
    retries: 1
  - id: stage_02
    service: mongodb
    case: custom-roles
    retries: 1
  - id: stage_03
    service: mongodb
    case: user-management
    retries: 1
  - id: stage_04
    service: mongodb
    case: password-rotation
    retries: 1
