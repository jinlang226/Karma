# workflows/suite/ray-dashboard-job
#
# Ray dashboard exposure then job submission

metadata:
  id: ray-dashboard-job
  label: Ray dashboard exposure then job submission
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: ray
    case: deploy_cluster
    retries: 1
    param_overrides:
      worker_replicas: '2'
  - id: stage_02
    service: ray
    case: dashboard_exposure
    retries: 1
    param_overrides:
      dashboard_port: '8265'
  - id: stage_03
    service: ray
    case: job_submission
    retries: 1
    param_overrides:
      expected_output: pong
  - id: stage_04
    service: ray
    case: teardown_cluster
    retries: 1
