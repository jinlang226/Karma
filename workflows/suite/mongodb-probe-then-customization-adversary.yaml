# workflows/suite/mongodb-probe-then-customization-adversary
#
# MongoDB readiness probe fix then statefulset resource customization — with adversary injection

metadata:
  id: mongodb-probe-then-customization-adversary
  label: MongoDB readiness probe fix then statefulset resource customization — with adversary injection
spec:
  prompt_mode: progressive
  adversary:
  - scenario: readiness_probe_break
    inject_at_stage: stage_02
  stages:
  - id: stage_01
    service: mongodb
    case: readiness-probe-tuning
    retries: 1
  - id: stage_02
    service: mongodb
    case: statefulset-customization
    retries: 1
