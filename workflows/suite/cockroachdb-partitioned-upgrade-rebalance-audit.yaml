# workflows/error-prone/cockroachdb-partitioned-upgrade-rebalance-audit
#
# Roll a partitioned upgrade and tune rebalance rate, then run a read-only compliance audit

metadata:
  id: cockroachdb-partitioned-upgrade-rebalance-audit
  label: Roll a partitioned upgrade and tune rebalance rate, then run a read-only compliance audit
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: partitioned-update
    retries: 0
    param_overrides:
      to_version: 24.1.1
  - id: stage_02
    service: cockroachdb
    case: cluster-settings
    retries: 0
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 192MiB
  - id: stage_03
    service: cockroachdb
    case: readonly-audit
    retries: 0
