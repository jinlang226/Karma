# workflows/suite/platform-compute-pipeline
#
# Platform — compute pipeline: Ray cluster + Spark batch job

metadata:
  id: platform-compute-pipeline
  label: 'Platform — compute pipeline: Ray cluster + Spark batch job'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: ray
    case: deploy_cluster
    retries: 0
  - id: stage_02
    service: ray
    case: job_submission
    retries: 0
  - id: stage_03
    service: spark
    case: deploy_spark_pi
    retries: 0
  - id: stage_04
    service: spark
    case: spark_runtime_ops
    retries: 0
