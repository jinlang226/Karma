# workflows/suite/mongodb-upgrade-then-cert-rotation
#
# MongoDB upgrade to 6.0 then TLS certificate rotation

metadata:
  id: mongodb-upgrade-then-cert-rotation
  label: MongoDB upgrade to 6.0 then TLS certificate rotation
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: version-upgrade
    retries: 1
  - id: stage_02
    service: mongodb
    case: certificate-rotation
    retries: 1
