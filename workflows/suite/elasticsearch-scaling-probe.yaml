# workflows/suite/elasticsearch-scaling-probe
#
# Elasticsearch — scale up then safe downscale (composition probe)
# Generated single-application workflow (CHAIN).

metadata:
  id: elasticsearch-scaling-probe
  label: "Elasticsearch \u2014 scale up then safe downscale (composition probe)"
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: master-downscale-voting-exclusions
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: safe-downscale-with-shard-migration
    retries: 1
