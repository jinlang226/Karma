# workflows/suite/cockroachdb-rebalance-rate-sweep
#
# CockroachDB — progressive rebalance-rate settings (10)
# Generated single-application workflow (REPEAT).

metadata:
  id: cockroachdb-rebalance-rate-sweep
  label: "CockroachDB \u2014 progressive rebalance-rate settings (10)"
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 2MiB
  - id: stage_02
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
