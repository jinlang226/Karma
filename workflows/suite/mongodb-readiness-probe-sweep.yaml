# workflows/suite/mongodb-readiness-probe-sweep
#
# MongoDB readiness probe tuning sweep: progressively improve probe parameters

metadata:
  id: mongodb-readiness-probe-sweep
  label: 'MongoDB readiness probe tuning sweep: progressively improve probe parameters'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: readiness-probe-tuning
    retries: 1
  - id: stage_02
    service: mongodb
    case: readiness-probe-tuning
    retries: 1
    param_overrides:
      faulty_readiness_initial_delay: 3
      faulty_readiness_timeout: 2
      faulty_readiness_failure_threshold: 3
