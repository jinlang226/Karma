# workflows/suite/cockroachdb-monitoring-probe
#
# CockroachDB — observability lifecycle (composition probe)
# Generated single-application workflow (CHAIN).

metadata:
  id: cockroachdb-monitoring-probe
  label: "CockroachDB \u2014 observability lifecycle (composition probe)"
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: deploy
    retries: 1
  - id: stage_02
    service: cockroachdb
    case: initialize
    retries: 1
  - id: stage_03
    service: cockroachdb
    case: monitoring-integration
    retries: 1
  - id: stage_04
    service: cockroachdb
    case: expose-ingress
    retries: 1
  - id: stage_05
    service: cockroachdb
    case: health-check-recovery
    retries: 1
