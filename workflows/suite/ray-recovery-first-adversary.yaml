# workflows/suite/ray-recovery-first-adversary
#
# Ray incident-first: fix workers then scale and submit jobs — with adversary injection

metadata:
  id: ray-recovery-first-adversary
  label: 'Ray incident-first: fix workers then scale and submit jobs — with adversary injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: block_gcs_port
    inject_at_stage: stage_02
    lift_at_stage: stage_03
  stages:
  - id: stage_01
    service: ray
    case: deploy_cluster
    retries: 1
    param_overrides:
      worker_replicas: '2'
  - id: stage_02
    service: ray
    case: worker_recovery
    retries: 1
  - id: stage_03
    service: ray
    case: scale_workers
    retries: 1
    param_overrides:
      source_worker_replicas: '2'
      target_worker_replicas: '4'
  - id: stage_04
    service: ray
    case: job_submission
    retries: 1
    param_overrides:
      expected_output: pong
  - id: stage_05
    service: ray
    case: teardown_cluster
    retries: 1
