# workflows/suite/rabbitmq-upgrade-migrate-chain
#
# RabbitMQ — upgrade, TLS rotate, blue/green migrate (A→B) (5)
# Generated single-application workflow (ROLE).

metadata:
  id: rabbitmq-upgrade-migrate-chain
  label: "RabbitMQ \u2014 upgrade, TLS rotate, blue/green migrate (A\u2192B) (5)"
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: rabbitmq
    case: manual_skip_upgrade
    retries: 1
    namespaces:
    - cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
      from_version: '3.12'
      to_version: '3.13'
    namespace_binding:
      default: cluster_a
  - id: stage_02
    service: rabbitmq
    case: manual_skip_upgrade
    retries: 1
    namespaces:
    - cluster_b
    param_overrides:
      cluster_prefix: rabbitmq
      from_version: '3.12'
      to_version: '3.13'
    namespace_binding:
      default: cluster_b
  - id: stage_03
    service: rabbitmq
    case: manual_tls_rotation
    retries: 1
    namespaces:
    - cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
    namespace_binding:
      default: cluster_a
  - id: stage_04
    service: rabbitmq
    case: manual_tls_rotation
    retries: 1
    namespaces:
    - cluster_b
    param_overrides:
      cluster_prefix: rabbitmq
    namespace_binding:
      default: cluster_b
  - id: stage_05
    service: rabbitmq
    case: blue_green_migration
    retries: 1
    namespaces:
    - cluster_a
    - cluster_b
    param_overrides:
      blue_cluster_prefix: rabbitmq
      green_cluster_prefix: rabbitmq
    namespace_binding:
      default: cluster_b
      source: cluster_a
      target: cluster_b
