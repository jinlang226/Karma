# workflows/suite/es-password-rotation-sweep-adversary
#
# ES: repeated elastic password rotations with different target secret names — with adversary injection

metadata:
  id: es-password-rotation-sweep-adversary
  label: 'ES: repeated elastic password rotations with different target secret names — with adversary
    injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: elastic-password-corrupted
    inject_at_stage: stage_02
    lift_at_stage: stage_03
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: rotate-elastic-password
    retries: 1
    param_overrides:
      next_password_secret_name: elastic-password-next
  - id: stage_03
    service: elasticsearch
    case: rotate-elastic-password
    retries: 1
    param_overrides:
      next_password_secret_name: elastic-password-v2
  - id: stage_04
    service: elasticsearch
    case: rotate-elastic-password
    retries: 1
    param_overrides:
      next_password_secret_name: elastic-password-v3
