# workflows/suite/crdb-tls-bringup
#
# CockroachDB TLS bring-up: deploy, initialize, enable TLS

metadata:
  id: crdb-tls-bringup
  label: 'CockroachDB TLS bring-up: deploy, initialize, enable TLS'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: deploy
    retries: 1
  - id: stage_02
    service: cockroachdb
    case: initialize
    retries: 1
  - id: stage_03
    service: cockroachdb
    case: generate-cert
    retries: 1
