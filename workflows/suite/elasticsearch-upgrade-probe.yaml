# workflows/suite/elasticsearch-upgrade-probe
#
# Elasticsearch — upgrade track (composition probe)
# Generated single-application workflow (CHAIN).

metadata:
  id: elasticsearch-upgrade-probe
  label: "Elasticsearch \u2014 upgrade track (composition probe)"
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: full-restart-upgrade-ha
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: full-restart-upgrade-ha-hard
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: seed-hosts-repair
    retries: 1
