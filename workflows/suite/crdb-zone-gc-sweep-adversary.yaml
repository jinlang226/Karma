# workflows/suite/crdb-zone-gc-sweep-adversary
#
# CockroachDB zone-config GC TTL tuning sweep for tenant_b — with adversary injection

metadata:
  id: crdb-zone-gc-sweep-adversary
  label: CockroachDB zone-config GC TTL tuning sweep for tenant_b — with adversary injection
spec:
  prompt_mode: progressive
  adversary:
  - scenario: throttle_rebalance_rate
    inject_at_stage: stage_02
    lift_at_stage: stage_04
  stages:
  - id: stage_01
    service: cockroachdb
    case: zone-config
    retries: 1
    param_overrides:
      gc_ttl_seconds: '3600'
  - id: stage_02
    service: cockroachdb
    case: zone-config
    retries: 1
    param_overrides:
      gc_ttl_seconds: '7200'
  - id: stage_03
    service: cockroachdb
    case: zone-config
    retries: 1
    param_overrides:
      gc_ttl_seconds: '14400'
  - id: stage_04
    service: cockroachdb
    case: zone-config
    retries: 1
    param_overrides:
      gc_ttl_seconds: '86400'
