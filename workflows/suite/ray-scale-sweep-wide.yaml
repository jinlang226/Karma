# workflows/suite/ray-scale-sweep-wide
#
# Ray worker scale sweep: 1 → 3 → 5 replicas

metadata:
  id: ray-scale-sweep-wide
  label: 'Ray worker scale sweep: 1 → 3 → 5 replicas'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: ray
    case: deploy_cluster
    retries: 0
    param_overrides:
      worker_replicas: '1'
  - id: stage_02
    service: ray
    case: scale_workers
    retries: 0
    param_overrides:
      source_worker_replicas: '1'
      target_worker_replicas: '3'
  - id: stage_03
    service: ray
    case: scale_workers
    retries: 0
    param_overrides:
      source_worker_replicas: '3'
      target_worker_replicas: '5'
  - id: stage_04
    service: ray
    case: job_submission
    retries: 0
    param_overrides:
      expected_output: pong
