# workflows/long/nginx-ingress-long-23-incident-response
#
# nginx-ingress: Incident Response — restore ingress, TLS, rate-limit, and OTel

metadata:
  id: nginx-ingress-long-23-incident-response
  label: 'nginx-ingress: Incident Response — restore ingress, TLS, rate-limit, and OTel'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: create_ingress
    retries: 0
  - id: stage_02
    service: nginx-ingress
    case: renew_tls_secret
    retries: 0
  - id: stage_03
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 0
  - id: stage_04
    service: nginx-ingress
    case: otel_log_format
    retries: 0
  - id: stage_05
    service: nginx-ingress
    case: ingress_canary
    retries: 0
  - id: stage_06
    service: nginx-ingress
    case: class_only_upgrade
    retries: 0
  - id: stage_07
    service: nginx-ingress
    case: renew_tls_secret
    retries: 0
    param_overrides:
      host: demo.example.com
  - id: stage_08
    service: nginx-ingress
    case: rate_limit_replica_hard
    retries: 0
  - id: stage_09
    service: nginx-ingress
    case: otel_log_format
    retries: 0
    param_overrides:
      path: /incident-trace
  - id: stage_10
    service: nginx-ingress
    case: ingress_canary
    retries: 0
    param_overrides:
      header_value: beta
  - id: stage_11
    service: nginx-ingress
    case: create_ingress
    retries: 0
    param_overrides:
      host: recovery.example.com
      path: /ok
