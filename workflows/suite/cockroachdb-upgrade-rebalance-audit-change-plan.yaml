# workflows/error-prone/cockroachdb-upgrade-rebalance-audit-change-plan
#
# Finalize major upgrade, raise rebalance rate, audit compliance, draft next change plan

metadata:
  id: cockroachdb-upgrade-rebalance-audit-change-plan
  label: Finalize major upgrade, raise rebalance rate, audit compliance, draft next change plan
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: major-upgrade-finalize
    retries: 0
    param_overrides:
      from_version: '23.2'
      to_version: 24.1.0
  - id: stage_02
    service: cockroachdb
    case: cluster-settings
    retries: 0
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 256MiB
  - id: stage_03
    service: cockroachdb
    case: readonly-audit
    retries: 0
  - id: stage_04
    service: cockroachdb
    case: change-plan-only
    retries: 0
