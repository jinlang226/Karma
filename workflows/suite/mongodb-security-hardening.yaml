# workflows/suite/mongodb-security-hardening
#
# MongoDB security hardening: custom roles, user management, password rotation

metadata:
  id: mongodb-security-hardening
  label: 'MongoDB security hardening: custom roles, user management, password rotation'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: deploy
    retries: 1
  - id: stage_02
    service: mongodb
    case: custom-roles
    retries: 1
  - id: stage_03
    service: mongodb
    case: user-management
    retries: 1
  - id: stage_04
    service: mongodb
    case: password-rotation
    retries: 1
