# workflows/suite/nginx-ingress-07-tls-then-otel-adversary
#
# nginx-ingress: renew TLS cert then enable OTel structured logging — with adversary injection

metadata:
  id: nginx-ingress-07-tls-then-otel-adversary
  label: 'nginx-ingress: renew TLS cert then enable OTel structured logging — with adversary injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: delete_tls_secret
    inject_at_stage: stage_01
    lift_at_stage: stage_02
  stages:
  - id: stage_01
    service: nginx-ingress
    case: renew_tls_secret
    retries: 0
  - id: stage_02
    service: nginx-ingress
    case: otel_log_format
    retries: 0
