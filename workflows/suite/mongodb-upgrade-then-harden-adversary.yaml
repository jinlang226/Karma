# workflows/suite/mongodb-upgrade-then-harden-adversary
#
# MongoDB upgrade to 6.0 then security hardening: custom roles and password rotation — with adversary injection

metadata:
  id: mongodb-upgrade-then-harden-adversary
  label: 'MongoDB upgrade to 6.0 then security hardening: custom roles and password rotation — with adversary
    injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: secret_corruption
    inject_at_stage: stage_03
  stages:
  - id: stage_01
    service: mongodb
    case: version-upgrade
    retries: 1
  - id: stage_02
    service: mongodb
    case: custom-roles
    retries: 1
  - id: stage_03
    service: mongodb
    case: password-rotation
    retries: 1
