# workflows/suite/es-deploy-security-hardening-adversary
#
# ES: deploy cluster then harden security (file realm + password + HTTP certs) — with adversary injection

metadata:
  id: es-deploy-security-hardening-adversary
  label: 'ES: deploy cluster then harden security (file realm + password + HTTP certs) — with adversary
    injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: elastic-password-corrupted
    inject_at_stage: stage_03
    lift_at_stage: stage_05
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: file-realm-user-roles-merge
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: rotate-elastic-password
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: rotate-http-certs
    retries: 1
  - id: stage_05
    service: elasticsearch
    case: secure-http-ingress
    retries: 1
