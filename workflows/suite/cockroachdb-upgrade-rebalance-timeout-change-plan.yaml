# workflows/error-prone/cockroachdb-upgrade-rebalance-timeout-change-plan
#
# Finalize upgrade version record, tune two settings, then draft change plan

metadata:
  id: cockroachdb-upgrade-rebalance-timeout-change-plan
  label: Finalize upgrade version record, tune two settings, then draft change plan
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: major-upgrade-finalize
    retries: 0
    param_overrides:
      from_version: '23.2'
      to_version: 24.1.0
  - id: stage_02
    service: cockroachdb
    case: cluster-settings
    retries: 0
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 128MiB
  - id: stage_03
    service: cockroachdb
    case: cluster-settings
    retries: 0
    param_overrides:
      setting_name: sql.defaults.statement_timeout
      setting_value: 30s
  - id: stage_04
    service: cockroachdb
    case: change-plan-only
    retries: 0
