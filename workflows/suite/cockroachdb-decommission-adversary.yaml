# workflows/suite/cockroachdb-decommission-adversary
#
# CockroachDB node decommission: safely reduce 5-node cluster to 3 — with adversary injection

metadata:
  id: cockroachdb-decommission-adversary
  label: 'CockroachDB node decommission: safely reduce 5-node cluster to 3 — with adversary injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: throttle_rebalance_rate
    inject_at_stage: stage_01
    lift_at_stage: stage_02
  stages:
  - id: stage_01
    service: cockroachdb
    case: decommission
    retries: 0
  - id: stage_02
    service: cockroachdb
    case: cluster-settings
    retries: 0
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 128MiB
  - id: stage_03
    service: cockroachdb
    case: version-check
    retries: 0
