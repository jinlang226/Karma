# workflows/suite/nginx-18-canary-tls-class-adversary
#
# nginx-ingress: canary split, TLS renewal, then ingress-class upgrade — with adversary injection

metadata:
  id: nginx-18-canary-tls-class-adversary
  label: 'nginx-ingress: canary split, TLS renewal, then ingress-class upgrade — with adversary injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: delete_tls_secret
    inject_at_stage: stage_02
    lift_at_stage: stage_03
  stages:
  - id: stage_01
    service: nginx-ingress
    case: ingress_canary
    retries: 1
  - id: stage_02
    service: nginx-ingress
    case: renew_tls_secret
    retries: 1
  - id: stage_03
    service: nginx-ingress
    case: class_only_upgrade
    retries: 1
