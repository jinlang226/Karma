# workflows/suite/platform-search-etl-fault-adversary
#
# Platform — search ETL under cluster fault: Spark + Elasticsearch — with adversary injection

metadata:
  id: platform-search-etl-fault-adversary
  label: 'Platform — search ETL under cluster fault: Spark + Elasticsearch — with adversary injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: shard-allocation-disabled
    inject_at_stage: stage_01
    lift_at_stage: stage_04
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
  - id: stage_02
    service: spark
    case: deploy_spark_pi
    retries: 0
  - id: stage_03
    service: spark
    case: spark_data_skew
    retries: 0
  - id: stage_04
    service: elasticsearch
    case: seed-hosts-repair
    retries: 0
