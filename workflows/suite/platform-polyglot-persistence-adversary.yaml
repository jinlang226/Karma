# workflows/suite/platform-polyglot-persistence-adversary
#
# Platform — polyglot persistence day-1: MongoDB + CockroachDB — with adversary injection

metadata:
  id: platform-polyglot-persistence-adversary
  label: 'Platform — polyglot persistence day-1: MongoDB + CockroachDB — with adversary injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: scale_down_replica
    inject_at_stage: stage_02
    lift_at_stage: stage_03
  stages:
  - id: stage_01
    service: mongodb
    case: deploy
    retries: 1
  - id: stage_02
    service: mongodb
    case: initialize
    retries: 1
  - id: stage_03
    service: cockroachdb
    case: deploy
    retries: 1
  - id: stage_04
    service: cockroachdb
    case: initialize
    retries: 1
