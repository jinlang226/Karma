# workflows/suite/mongodb-security-observability-adversary
#
# MongoDB security and observability: user management, password rotation, monitoring — with adversary injection

metadata:
  id: mongodb-security-observability-adversary
  label: 'MongoDB security and observability: user management, password rotation, monitoring — with adversary
    injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: secret_corruption
    inject_at_stage: stage_02
  stages:
  - id: stage_01
    service: mongodb
    case: user-management
    retries: 1
  - id: stage_02
    service: mongodb
    case: password-rotation
    retries: 1
  - id: stage_03
    service: mongodb
    case: monitoring-integration
    retries: 1
