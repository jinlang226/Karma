# workflows/suite/mongodb-deploy-arbiters-roles
#
# MongoDB bring-up with arbiters for election stability and custom role RBAC

metadata:
  id: mongodb-deploy-arbiters-roles
  label: MongoDB bring-up with arbiters for election stability and custom role RBAC
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: deploy
    retries: 1
  - id: stage_02
    service: mongodb
    case: arbiters
    retries: 1
  - id: stage_03
    service: mongodb
    case: custom-roles
    retries: 1
  - id: stage_04
    service: mongodb
    case: user-management
    retries: 1
