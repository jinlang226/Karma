# workflows/suite/rabbitmq-classic-failover
#
# RabbitMQ: Classic Queue Bring-Up then Failover Recovery

metadata:
  id: rabbitmq-classic-failover
  label: 'RabbitMQ: Classic Queue Bring-Up then Failover Recovery'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: rabbitmq
    case: classic_queue
    retries: 1
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_02
    service: rabbitmq
    case: failover
    retries: 1
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
