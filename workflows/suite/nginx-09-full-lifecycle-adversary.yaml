# workflows/suite/nginx-09-full-lifecycle-adversary
#
# nginx-ingress: full lifecycle — expose, canary, rate-limit, class upgrade — with adversary injection

metadata:
  id: nginx-09-full-lifecycle-adversary
  label: 'nginx-ingress: full lifecycle — expose, canary, rate-limit, class upgrade — with adversary injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: scale_down_backend
    inject_at_stage: stage_02
    lift_at_stage: stage_03
    param_overrides:
      deployment_name: stable-echo
      restore_replicas: '1'
  stages:
  - id: stage_01
    service: nginx-ingress
    case: create_ingress
    retries: 1
    param_overrides:
      host: demo.example.com
      path: /app
  - id: stage_02
    service: nginx-ingress
    case: ingress_canary
    retries: 1
  - id: stage_03
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 1
    param_overrides:
      limit_rps: '2'
  - id: stage_04
    service: nginx-ingress
    case: class_only_upgrade
    retries: 1
