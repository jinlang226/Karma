# workflows/suite/rabbitmq-failover-then-monitoring
#
# RabbitMQ: Node Failover Recovery then Monitoring Wiring

metadata:
  id: rabbitmq-failover-then-monitoring
  label: 'RabbitMQ: Node Failover Recovery then Monitoring Wiring'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: rabbitmq
    case: classic_queue
    retries: 1
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_02
    service: rabbitmq
    case: failover
    retries: 1
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_03
    service: rabbitmq
    case: manual_monitoring
    retries: 1
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
