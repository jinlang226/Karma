# workflows/suite/rabbitmq-security-chain
#
# RabbitMQ — users + TLS + policy chain (4)
# Generated single-application workflow (CHAIN).

metadata:
  id: rabbitmq-security-chain
  label: "RabbitMQ \u2014 users + TLS + policy chain (4)"
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: rabbitmq
    case: classic_queue
    retries: 1
    namespaces: &id001
    - cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
    namespace_binding: &id002
      default: cluster_a
  - id: stage_02
    service: rabbitmq
    case: manual_user_permission
    retries: 1
    namespaces: *id001
    param_overrides:
      cluster_prefix: rabbitmq
    namespace_binding: *id002
  - id: stage_03
    service: rabbitmq
    case: manual_tls_rotation
    retries: 1
    namespaces: *id001
    param_overrides:
      cluster_prefix: rabbitmq
    namespace_binding: *id002
  - id: stage_04
    service: rabbitmq
    case: manual_policy_sync
    retries: 1
    namespaces: *id001
    param_overrides:
      cluster_prefix: rabbitmq
    namespace_binding: *id002
