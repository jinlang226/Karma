# workflows/suite/cockroachdb-full-secure-lifecycle
#
# CockroachDB full secure lifecycle: TLS bring-up through cert rotation

metadata:
  id: cockroachdb-full-secure-lifecycle
  label: 'CockroachDB full secure lifecycle: TLS bring-up through cert rotation'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: deploy
    retries: 0
  - id: stage_02
    service: cockroachdb
    case: initialize
    retries: 0
  - id: stage_03
    service: cockroachdb
    case: generate-cert
    retries: 0
  - id: stage_04
    service: cockroachdb
    case: certificate-rotation
    retries: 0
  - id: stage_05
    service: cockroachdb
    case: cluster-settings
    retries: 0
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 128MiB
  - id: stage_06
    service: cockroachdb
    case: zone-config
    retries: 0
  - id: stage_07
    service: cockroachdb
    case: version-check
    retries: 0
