# workflows/suite/rabbitmq-policy-sync-after-setup-adversary
#
# RabbitMQ: Classic Queue Setup then HA Policy Sync — with adversary injection

metadata:
  id: rabbitmq-policy-sync-after-setup-adversary
  label: 'RabbitMQ: Classic Queue Setup then HA Policy Sync — with adversary injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: clear_ha_policy
    inject_at_stage: stage_01
    lift_at_stage: stage_02
  stages:
  - id: stage_01
    service: rabbitmq
    case: classic_queue
    retries: 1
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_02
    service: rabbitmq
    case: manual_policy_sync
    retries: 1
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
