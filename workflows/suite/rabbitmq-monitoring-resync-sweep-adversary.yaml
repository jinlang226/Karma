# workflows/suite/rabbitmq-monitoring-resync-sweep-adversary
#
# RabbitMQ: Repeated Monitoring Re-wiring Sweep — with adversary injection

metadata:
  id: rabbitmq-monitoring-resync-sweep-adversary
  label: 'RabbitMQ: Repeated Monitoring Re-wiring Sweep — with adversary injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: clear_ha_policy
    inject_at_stage: stage_02
    lift_at_stage: stage_03
  stages:
  - id: stage_01
    service: rabbitmq
    case: classic_queue
    retries: 1
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_02
    service: rabbitmq
    case: manual_monitoring
    retries: 1
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_03
    service: rabbitmq
    case: manual_monitoring
    retries: 1
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
