# workflows/suite/mongodb-full-lifecycle-a
#
# MongoDB full lifecycle A: deploy, init, TLS, custom roles, upgrade, decommission

metadata:
  id: mongodb-full-lifecycle-a
  label: 'MongoDB full lifecycle A: deploy, init, TLS, custom roles, upgrade, decommission'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: deploy
    retries: 1
  - id: stage_02
    service: mongodb
    case: initialize
    retries: 1
  - id: stage_03
    service: mongodb
    case: tls-setup
    retries: 1
  - id: stage_04
    service: mongodb
    case: custom-roles
    retries: 1
  - id: stage_05
    service: mongodb
    case: version-upgrade
    retries: 1
  - id: stage_06
    service: mongodb
    case: decommission
    retries: 1
