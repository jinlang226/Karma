# workflows/suite/es-transport-ca-cert-rotation
#
# ES: add additional transport CA trust then rotate HTTP certs

metadata:
  id: es-transport-ca-cert-rotation
  label: 'ES: add additional transport CA trust then rotate HTTP certs'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: transport-additional-ca-trust
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: rotate-http-certs
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: rotate-elastic-password
    retries: 1
