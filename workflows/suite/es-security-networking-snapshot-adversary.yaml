# workflows/suite/es-security-networking-snapshot-adversary
#
# ES: full security + networking chain with transport block and snapshot verification — with adversary injection

metadata:
  id: es-security-networking-snapshot-adversary
  label: 'ES: full security + networking chain with transport block and snapshot verification — with adversary
    injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: transport-networkpolicy-block
    inject_at_stage: stage_03
    lift_at_stage: stage_04
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: file-realm-user-roles-merge
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: transport-additional-ca-trust
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: seed-hosts-repair
    retries: 1
  - id: stage_05
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 1
