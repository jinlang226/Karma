# workflows/suite/rabbitmq-user-permission-management-adversary
#
# RabbitMQ: User Permission Setup and Security Hardening — with adversary injection

metadata:
  id: rabbitmq-user-permission-management-adversary
  label: 'RabbitMQ: User Permission Setup and Security Hardening — with adversary injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: revoke_app_user_permissions
    inject_at_stage: stage_01
    lift_at_stage: stage_02
  stages:
  - id: stage_01
    service: rabbitmq
    case: classic_queue
    retries: 1
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_02
    service: rabbitmq
    case: manual_user_permission
    retries: 1
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
