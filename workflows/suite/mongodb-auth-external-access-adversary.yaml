# workflows/suite/mongodb-auth-external-access-adversary
#
# MongoDB auth and external access: custom roles, user management, split-horizon — with adversary injection

metadata:
  id: mongodb-auth-external-access-adversary
  label: 'MongoDB auth and external access: custom roles, user management, split-horizon — with adversary
    injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: network_policy_block
    inject_at_stage: stage_03
  stages:
  - id: stage_01
    service: mongodb
    case: custom-roles
    retries: 1
  - id: stage_02
    service: mongodb
    case: user-management
    retries: 1
  - id: stage_03
    service: mongodb
    case: external-access-horizons
    retries: 1
