# workflows/workflow-demo
#
# Six-stage blind concat workflow that runs the configmap-update case
# repeatedly across two namespace roles. Stages 1-4 and 6 use the cluster_a
# role; stage 5 uses cluster_b. Each stage sets a distinct target_value so
# the oracle can distinguish per-stage correctness.
#
# prompt_mode: concat_blind — the agent receives all stage prompts at once
# and has no visibility into per-stage results until the run completes.

metadata:
  id: workflow-demo
  label: Demo — ConfigMap update (6 stages, two namespaces)

spec:
  prompt_mode: concat_blind

  stages:
    - id: stage_01
      service: demo
      case: configmap-update
      namespaces:
        - cluster_a
      param_overrides:
        target_value: "1"

    - id: stage_02
      service: demo
      case: configmap-update
      namespaces:
        - cluster_a
      param_overrides:
        target_value: "2"

    - id: stage_03
      service: demo
      case: configmap-update
      namespaces:
        - cluster_a
      param_overrides:
        target_value: "3"

    - id: stage_04
      service: demo
      case: configmap-update
      namespaces:
        - cluster_a
      param_overrides:
        target_value: "4"

    - id: stage_05
      service: demo
      case: configmap-update
      namespaces:
        - cluster_b
      param_overrides:
        target_value: "1"

    - id: stage_06
      service: demo
      case: configmap-update
      namespaces:
        - cluster_a
      param_overrides:
        target_value: "6"
