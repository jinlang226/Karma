# workflows/suite/rabbitmq-classic-failover-adversary
#
# RabbitMQ: Classic Queue Bring-Up then Failover Recovery — with adversary injection

metadata:
  id: rabbitmq-classic-failover-adversary
  label: 'RabbitMQ: Classic Queue Bring-Up then Failover Recovery — with adversary injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: block_amqp_network_policy
    inject_at_stage: stage_01
    lift_at_stage: stage_02
  stages:
  - id: stage_01
    service: rabbitmq
    case: classic_queue
    retries: 1
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_02
    service: rabbitmq
    case: failover
    retries: 1
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
