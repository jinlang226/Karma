# workflows/suite/platform-incident-response
#
# Platform — multi-system incident response: MongoDB + CockroachDB recovery

metadata:
  id: platform-incident-response
  label: 'Platform — multi-system incident response: MongoDB + CockroachDB recovery'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: deploy
    retries: 1
  - id: stage_02
    service: mongodb
    case: health-check-recovery
    retries: 1
  - id: stage_03
    service: cockroachdb
    case: deploy
    retries: 1
  - id: stage_04
    service: cockroachdb
    case: health-check-recovery
    retries: 1
