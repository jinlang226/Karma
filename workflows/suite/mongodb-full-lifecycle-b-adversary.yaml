# workflows/suite/mongodb-full-lifecycle-b-adversary
#
# MongoDB full lifecycle B: deploy, auth, scaling, config tuning, monitoring, decommission — with adversary injection

metadata:
  id: mongodb-full-lifecycle-b-adversary
  label: 'MongoDB full lifecycle B: deploy, auth, scaling, config tuning, monitoring, decommission — with
    adversary injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: secret_corruption
    inject_at_stage: stage_02
    lift_at_stage: stage_03
  stages:
  - id: stage_01
    service: mongodb
    case: deploy
    retries: 1
  - id: stage_02
    service: mongodb
    case: password-rotation
    retries: 1
  - id: stage_03
    service: mongodb
    case: replica-scaling
    retries: 1
    param_overrides:
      target_replicas: 5
  - id: stage_04
    service: mongodb
    case: mongod-config-update
    retries: 1
  - id: stage_05
    service: mongodb
    case: monitoring-integration
    retries: 1
  - id: stage_06
    service: mongodb
    case: decommission
    retries: 1
