# workflows/suite/es-upgrade-and-observability-adversary
#
# ES: HA upgrade then enable monitoring sidecars and snapshot backup — with adversary injection

metadata:
  id: es-upgrade-and-observability-adversary
  label: 'ES: HA upgrade then enable monitoring sidecars and snapshot backup — with adversary injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: shard-allocation-disabled
    inject_at_stage: stage_02
    lift_at_stage: stage_04
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: full-restart-upgrade-ha
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: stack-monitoring-sidecars
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 1
  - id: stage_05
    service: elasticsearch
    case: transform-job-recovery
    retries: 1
