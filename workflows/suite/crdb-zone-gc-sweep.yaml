# workflows/suite/crdb-zone-gc-sweep
#
# CockroachDB zone-config GC TTL tuning sweep for tenant_b

metadata:
  id: crdb-zone-gc-sweep
  label: CockroachDB zone-config GC TTL tuning sweep for tenant_b
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: zone-config
    retries: 1
    param_overrides:
      gc_ttl_seconds: '3600'
  - id: stage_02
    service: cockroachdb
    case: zone-config
    retries: 1
    param_overrides:
      gc_ttl_seconds: '7200'
  - id: stage_03
    service: cockroachdb
    case: zone-config
    retries: 1
    param_overrides:
      gc_ttl_seconds: '14400'
  - id: stage_04
    service: cockroachdb
    case: zone-config
    retries: 1
    param_overrides:
      gc_ttl_seconds: '86400'
