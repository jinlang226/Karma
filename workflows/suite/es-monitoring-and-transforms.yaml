# workflows/suite/es-monitoring-and-transforms
#
# ES: deploy cluster, enable stack monitoring sidecars, then recover transform job

metadata:
  id: es-monitoring-and-transforms
  label: 'ES: deploy cluster, enable stack monitoring sidecars, then recover transform job'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: stack-monitoring-sidecars
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: transform-job-recovery
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 1
