    injection
spec:
  prompt_mode: progressive
  adversary:
  - scenario: configmap_executor_memory_drop
    inject_at_stage: stage_03
    lift_at_stage: stage_05
  stages:
  - id: stage_01
    service: spark
    case: spark_data_skew
    retries: 1
  - id: stage_02
    service: spark
    case: spark_data_skew
    retries: 1
  - id: stage_03
    service: spark
    case: spark_etl_skew_oom
    retries: 1
  - id: stage_04
    service: spark
    case: spark_etl_skew_oom
    retries: 1
  - id: stage_05
    service: spark
    case: spark_etl_skew_oom
    retries: 1
