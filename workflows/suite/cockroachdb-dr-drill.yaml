# workflows/long/cockroachdb-long-dr-drill
#
# CockroachDB DR drill: cert rotation, health recovery, zone tuning, and controlled decommission

metadata:
  id: cockroachdb-dr-drill
  label: 'CockroachDB DR drill: cert rotation, health recovery, zone tuning, and controlled decommission'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: deploy
    retries: 0
  - id: stage_02
    service: cockroachdb
    case: initialize
    retries: 0
  - id: stage_03
    service: cockroachdb
    case: generate-cert
    retries: 0
  - id: stage_04
    service: cockroachdb
    case: certificate-rotation
    retries: 0
  - id: stage_05
    service: cockroachdb
    case: zone-config
    retries: 0
    param_overrides:
      gc_ttl_seconds: 86400
  - id: stage_06
    service: cockroachdb
    case: zone-config
    retries: 0
    param_overrides:
      gc_ttl_seconds: 7200
  - id: stage_07
    service: cockroachdb
    case: cluster-settings
    retries: 0
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 64MiB
  - id: stage_08
    service: cockroachdb
    case: cluster-settings
    retries: 0
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 128MiB
  - id: stage_09
    service: cockroachdb
    case: monitoring-integration
    retries: 0
  - id: stage_10
    service: cockroachdb
    case: version-check
    retries: 0
    param_overrides:
      report_key: dr_baseline_version
