# workflows/suite/mongodb-tls-chain
#
# MongoDB — TLS bring-up + external access (composition probe)
# Generated single-application workflow (CHAIN).

metadata:
  id: mongodb-tls-chain
  label: "MongoDB \u2014 TLS bring-up + external access (composition probe)"
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: deploy
    retries: 1
  - id: stage_02
    service: mongodb
    case: tls-setup
    retries: 1
  - id: stage_03
    service: mongodb
    case: certificate-rotation
    retries: 1
  - id: stage_04
    service: mongodb
    case: external-access-horizons
    retries: 1
