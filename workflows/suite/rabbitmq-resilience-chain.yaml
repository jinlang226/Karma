# workflows/suite/rabbitmq-resilience-chain
#
# RabbitMQ — resilience + recovery chain (5)
# Generated single-application workflow (CHAIN).

metadata:
  id: rabbitmq-resilience-chain
  label: "RabbitMQ \u2014 resilience + recovery chain (5)"
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: rabbitmq
    case: classic_queue
    retries: 1
    namespaces: &id001
    - cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
    namespace_binding: &id002
      default: cluster_a
  - id: stage_02
    service: rabbitmq
    case: failover
    retries: 1
    namespaces: *id001
    param_overrides:
      cluster_prefix: rabbitmq
    namespace_binding: *id002
  - id: stage_03
    service: rabbitmq
    case: manual_backup_restore
    retries: 1
    namespaces: *id001
    param_overrides:
      cluster_prefix: rabbitmq
    namespace_binding: *id002
  - id: stage_04
    service: rabbitmq
    case: manual_monitoring
    retries: 1
    namespaces: *id001
    param_overrides:
      cluster_prefix: rabbitmq
    namespace_binding: *id002
  - id: stage_05
    service: rabbitmq
    case: manual_policy_sync
    retries: 1
    namespaces: *id001
    param_overrides:
      cluster_prefix: rabbitmq
    namespace_binding: *id002
