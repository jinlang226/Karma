# workflows/error-prone/cockroachdb-upgrade-zone-rebalance-audit-rollback
#
# Upgrade cluster, tune zones and settings, audit compliance, rehearse rollback

metadata:
  id: cockroachdb-upgrade-zone-rebalance-audit-rollback
  label: Upgrade cluster, tune zones and settings, audit compliance, rehearse rollback
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: partitioned-update
    retries: 0
    param_overrides:
      to_version: 24.1.1
  - id: stage_02
    service: cockroachdb
    case: zone-config
    retries: 0
    param_overrides:
      target_schema: tenant_b
      protected_schema: tenant_a
      gc_ttl_seconds: 14400
      num_replicas: 3
      range_min_bytes: 134217728
      range_max_bytes: 536870912
  - id: stage_03
    service: cockroachdb
    case: cluster-settings
    retries: 0
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 80MiB
  - id: stage_04
    service: cockroachdb
    case: readonly-audit
    retries: 0
  - id: stage_05
    service: cockroachdb
    case: rollback-rehearsal
    retries: 0
