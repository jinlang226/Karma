# workflows/suite/cockroachdb-zone-replica-sweep
#
# CockroachDB tenant zone configuration, rebalance tuning, and metrics integration

metadata:
  id: cockroachdb-zone-replica-sweep
  label: CockroachDB tenant zone configuration, rebalance tuning, and metrics integration
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: zone-config
    retries: 0
    param_overrides:
      num_replicas: '3'
      gc_ttl_seconds: '14400'
  - id: stage_02
    service: cockroachdb
    case: cluster-settings
    retries: 0
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 128MiB
  - id: stage_03
    service: cockroachdb
    case: monitoring-integration
    retries: 0
