# workflows/error-prone/cockroachdb-tighten-rebalance-recovery-rollback
#
# Tighten rebalance rate and recovery throughput, then rehearse rollback

metadata:
  id: cockroachdb-tighten-rebalance-recovery-rollback
  label: Tighten rebalance rate and recovery throughput, then rehearse rollback
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: cluster-settings
    retries: 0
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 64MiB
  - id: stage_02
    service: cockroachdb
    case: cluster-settings
    retries: 0
    param_overrides:
      setting_name: kv.snapshot_recovery.max_rate
      setting_value: 32MiB
  - id: stage_03
    service: cockroachdb
    case: rollback-rehearsal
    retries: 0
