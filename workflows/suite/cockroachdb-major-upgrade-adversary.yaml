# workflows/suite/cockroachdb-major-upgrade-adversary
#
# CockroachDB major upgrade finalize: 23.2 -> 24.1 — with adversary injection

metadata:
  id: cockroachdb-major-upgrade-adversary
  label: 'CockroachDB major upgrade finalize: 23.2 -> 24.1 — with adversary injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: throttle_rebalance_rate
    inject_at_stage: stage_02
    lift_at_stage: stage_03
  stages:
  - id: stage_01
    service: cockroachdb
    case: major-upgrade-finalize
    retries: 0
    param_overrides:
      from_version: '23.2'
      to_version: 24.1.0
  - id: stage_02
    service: cockroachdb
    case: version-check
    retries: 0
    param_overrides:
      from_version: '23.2'
      to_version: 24.1.0
      report_key: db_version
  - id: stage_03
    service: cockroachdb
    case: cluster-settings
    retries: 0
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 128MiB
