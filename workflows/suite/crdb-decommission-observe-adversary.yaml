# workflows/suite/crdb-decommission-observe-adversary
#
# CockroachDB node decommission then observability hardening — with adversary injection

metadata:
  id: crdb-decommission-observe-adversary
  label: CockroachDB node decommission then observability hardening — with adversary injection
spec:
  prompt_mode: progressive
  adversary:
  - scenario: scale_down_node
    inject_at_stage: stage_01
    lift_at_stage: stage_03
  stages:
  - id: stage_01
    service: cockroachdb
    case: decommission
    retries: 1
  - id: stage_02
    service: cockroachdb
    case: zone-config
    retries: 1
    param_overrides:
      num_replicas: '3'
      gc_ttl_seconds: '7200'
  - id: stage_03
    service: cockroachdb
    case: monitoring-integration
    retries: 1
  - id: stage_04
    service: cockroachdb
    case: expose-ingress
    retries: 1
  - id: stage_05
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 128MiB
  - id: stage_06
    service: cockroachdb
    case: version-check
    retries: 1
