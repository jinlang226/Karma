# workflows/suite/cockroachdb-version-check-sweep
#
# CockroachDB post-upgrade: record version, tune rebalance rate, set zone config

metadata:
  id: cockroachdb-version-check-sweep
  label: 'CockroachDB post-upgrade: record version, tune rebalance, set zone config'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: version-check
    retries: 0
    param_overrides:
      report_key: db_version
  - id: stage_02
    service: cockroachdb
    case: cluster-settings
    retries: 0
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 128MiB
  - id: stage_03
    service: cockroachdb
    case: zone-config
    retries: 0
    param_overrides:
      gc_ttl_seconds: '14400'
