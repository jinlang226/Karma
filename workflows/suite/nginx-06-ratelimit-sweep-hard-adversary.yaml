# workflows/suite/nginx-06-ratelimit-sweep-hard-adversary
#
# nginx-ingress: progressive rate-limit tightening on 3-replica controller — with adversary injection

metadata:
  id: nginx-06-ratelimit-sweep-hard-adversary
  label: 'nginx-ingress: progressive rate-limit tightening on 3-replica controller — with adversary injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: strip_rate_limit_annotation
    inject_at_stage: stage_02
    lift_at_stage: stage_03
    param_overrides:
      ingress_name: rate-api
      limit_rps: '2'
  stages:
  - id: stage_01
    service: nginx-ingress
    case: rate_limit_replica_hard
    retries: 1
    param_overrides:
      limit_rps: '5'
  - id: stage_02
    service: nginx-ingress
    case: rate_limit_replica_hard
    retries: 1
    param_overrides:
      limit_rps: '2'
  - id: stage_03
    service: nginx-ingress
    case: rate_limit_replica_hard
    retries: 1
    param_overrides:
      limit_rps: '1'
