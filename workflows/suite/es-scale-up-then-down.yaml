# workflows/suite/es-scale-up-then-down
#
# ES: deploy cluster, expand to new nodeset, then safely downscale with shard migration

metadata:
  id: es-scale-up-then-down
  label: 'ES: deploy cluster, expand to new nodeset, then safely downscale with shard migration'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: safe-downscale-with-shard-migration
    retries: 1
