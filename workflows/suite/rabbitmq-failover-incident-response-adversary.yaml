# workflows/suite/rabbitmq-failover-incident-response-adversary
#
# RabbitMQ: Node Failover and Cluster Membership Restore — with adversary injection

metadata:
  id: rabbitmq-failover-incident-response-adversary
  label: 'RabbitMQ: Node Failover and Cluster Membership Restore — with adversary injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: scale_down_cluster
    inject_at_stage: stage_01
    lift_at_stage: stage_02
  stages:
  - id: stage_01
    service: rabbitmq
    case: classic_queue
    retries: 1
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_02
    service: rabbitmq
    case: failover
    retries: 1
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
