# workflows/suite/elasticsearch-snapshot-backup-lifecycle-adversary
#
# ES: deploy cluster, configure MinIO snapshot repo, then verify backup — with adversary injection

metadata:
  id: elasticsearch-snapshot-backup-lifecycle-adversary
  label: 'ES: deploy cluster, configure MinIO snapshot repo, then verify backup — with adversary injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: snapshot-secret-wiped
    inject_at_stage: stage_02
    lift_at_stage: stage_03
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
  - id: stage_02
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 0
  - id: stage_03
    service: elasticsearch
    case: transform-job-recovery
    retries: 0
