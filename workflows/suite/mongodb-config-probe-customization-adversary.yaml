# workflows/suite/mongodb-config-probe-customization-adversary
#
# MongoDB config tuning, probe optimization, and StatefulSet customization — with adversary injection

metadata:
  id: mongodb-config-probe-customization-adversary
  label: MongoDB config tuning, probe optimization, and StatefulSet customization — with adversary injection
spec:
  prompt_mode: progressive
  adversary:
  - scenario: configmap_key_delete
    inject_at_stage: stage_01
    lift_at_stage: stage_02
  stages:
  - id: stage_01
    service: mongodb
    case: mongod-config-update
    retries: 1
    param_overrides:
      target_journal_compressor: zstd
  - id: stage_02
    service: mongodb
    case: readiness-probe-tuning
    retries: 1
  - id: stage_03
    service: mongodb
    case: statefulset-customization
    retries: 1
