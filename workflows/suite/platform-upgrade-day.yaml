# workflows/suite/platform-upgrade-day
#
# Platform — coordinated upgrade day: CockroachDB + MongoDB + Elasticsearch

metadata:
  id: platform-upgrade-day
  label: 'Platform — coordinated upgrade day: CockroachDB + MongoDB + Elasticsearch'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: deploy
    retries: 1
  - id: stage_02
    service: cockroachdb
    case: partitioned-update
    retries: 1
  - id: stage_03
    service: mongodb
    case: deploy
    retries: 1
  - id: stage_04
    service: mongodb
    case: version-upgrade
    retries: 1
  - id: stage_05
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_06
    service: elasticsearch
    case: full-restart-upgrade-ha
    retries: 1
