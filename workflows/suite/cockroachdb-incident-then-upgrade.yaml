# workflows/suite/cockroachdb-incident-then-upgrade
#
# CockroachDB incident recovery then major version upgrade

metadata:
  id: cockroachdb-incident-then-upgrade
  label: CockroachDB incident recovery then major version upgrade
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: health-check-recovery
    retries: 0
  - id: stage_02
    service: cockroachdb
    case: partitioned-update
    retries: 0
    param_overrides:
      to_version: 24.1.1
  - id: stage_03
    service: cockroachdb
    case: major-upgrade-finalize
    retries: 0
    param_overrides:
      from_version: '24.1'
      to_version: 24.2.0
  - id: stage_04
    service: cockroachdb
    case: version-check
    retries: 0
    param_overrides:
      from_version: '24.1'
      to_version: '${stages.stage_03.params.to_version}'
  - id: stage_05
    service: cockroachdb
    case: cluster-settings
    retries: 0
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 128MiB
