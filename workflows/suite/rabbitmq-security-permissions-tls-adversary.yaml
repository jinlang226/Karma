# workflows/suite/rabbitmq-security-permissions-tls-adversary
#
# RabbitMQ: User Permission Hardening then TLS Rotation — with adversary injection

metadata:
  id: rabbitmq-security-permissions-tls-adversary
  label: 'RabbitMQ: User Permission Hardening then TLS Rotation — with adversary injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: revoke_app_user_permissions
    inject_at_stage: stage_02
    lift_at_stage: stage_03
  stages:
  - id: stage_01
    service: rabbitmq
    case: classic_queue
    retries: 1
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_02
    service: rabbitmq
    case: manual_user_permission
    retries: 1
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_03
    service: rabbitmq
    case: manual_tls_rotation
    retries: 1
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
      min_rotated_leaf_validity_days: '30'
