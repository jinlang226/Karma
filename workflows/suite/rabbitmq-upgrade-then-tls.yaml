# workflows/suite/rabbitmq-upgrade-then-tls
#
# RabbitMQ: Rolling Upgrade 3.9 → 4.1 then TLS Certificate Rotation

metadata:
  id: rabbitmq-upgrade-then-tls
  label: 'RabbitMQ: Rolling Upgrade 3.9 → 4.1 then TLS Certificate Rotation'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: rabbitmq
    case: classic_queue
    retries: 1
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_02
    service: rabbitmq
    case: manual_skip_upgrade
    retries: 1
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
      from_version: '3.9'
      to_version: '4.1'
  - id: stage_03
    service: rabbitmq
    case: manual_tls_rotation
    retries: 1
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
      min_rotated_leaf_validity_days: '30'
