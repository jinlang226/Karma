# workflows/suite/mongodb-customization-then-monitoring-adversary
#
# MongoDB StatefulSet customization then monitoring integration — with adversary injection

metadata:
  id: mongodb-customization-then-monitoring-adversary
  label: MongoDB StatefulSet customization then monitoring integration — with adversary injection
spec:
  prompt_mode: progressive
  adversary:
  - scenario: param_drift
    inject_at_stage: stage_01
    lift_at_stage: stage_02
    param_overrides:
      drift_replicas: '2'
      restore_replicas: '3'
  stages:
  - id: stage_01
    service: mongodb
    case: statefulset-customization
    retries: 1
  - id: stage_02
    service: mongodb
    case: monitoring-integration
    retries: 1
