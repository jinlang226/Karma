# workflows/suite/cockroachdb-lifecycle-probe
#
# CockroachDB — full lifecycle (composition probe)
# Generated single-application workflow (CHAIN).

metadata:
  id: cockroachdb-lifecycle-probe
  label: "CockroachDB \u2014 full lifecycle (composition probe)"
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: deploy
    retries: 1
  - id: stage_02
    service: cockroachdb
    case: initialize
    retries: 1
  - id: stage_03
    service: cockroachdb
    case: cluster-settings
    retries: 1
  - id: stage_04
    service: cockroachdb
    case: zone-config
    retries: 1
  - id: stage_05
    service: cockroachdb
    case: monitoring-integration
    retries: 1
  - id: stage_06
    service: cockroachdb
    case: version-check
    retries: 1
  - id: stage_07
    service: cockroachdb
    case: major-upgrade-finalize
    retries: 1
  - id: stage_08
    service: cockroachdb
    case: partitioned-update
    retries: 1
  - id: stage_09
    service: cockroachdb
    case: health-check-recovery
    retries: 1
  - id: stage_10
    service: cockroachdb
    case: decommission
    retries: 1
