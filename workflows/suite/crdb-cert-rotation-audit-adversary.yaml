# workflows/suite/crdb-cert-rotation-audit-adversary
#
# CockroachDB cert rotation with version audit trail — with adversary injection

metadata:
  id: crdb-cert-rotation-audit-adversary
  label: CockroachDB cert rotation with version audit trail — with adversary injection
spec:
  prompt_mode: progressive
  adversary:
  - scenario: delete_cert_secret
    inject_at_stage: stage_01
    lift_at_stage: stage_02
  stages:
  - id: stage_01
    service: cockroachdb
    case: certificate-rotation
    retries: 1
  - id: stage_02
    service: cockroachdb
    case: version-check
    retries: 1
    param_overrides:
      report_key: db_version
  - id: stage_03
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 128MiB
  - id: stage_04
    service: cockroachdb
    case: zone-config
    retries: 1
    param_overrides:
      gc_ttl_seconds: '7200'
