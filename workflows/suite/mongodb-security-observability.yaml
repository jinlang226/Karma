# workflows/suite/mongodb-security-observability
#
# MongoDB security and observability: user management, password rotation, monitoring

metadata:
  id: mongodb-security-observability
  label: 'MongoDB security and observability: user management, password rotation, monitoring'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: user-management
    retries: 1
  - id: stage_02
    service: mongodb
    case: password-rotation
    retries: 1
  - id: stage_03
    service: mongodb
    case: monitoring-integration
    retries: 1
