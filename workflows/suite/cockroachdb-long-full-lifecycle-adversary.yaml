# workflows/long/cockroachdb-long-full-lifecycle-adversary
#
# CockroachDB full operational lifecycle with adversary node scale-down

metadata:
  id: cockroachdb-long-full-lifecycle-adversary
  label: CockroachDB full operational lifecycle with adversary node scale-down
spec:
  prompt_mode: progressive
  adversary:
  - scenario: scale_down_node
    inject_at_stage: stage_11
    lift_at_stage: stage_12
  stages:
  - id: stage_01
    service: cockroachdb
    case: deploy
    retries: 0
    param_overrides:
      to_version: 23.2.3
  - id: stage_02
    service: cockroachdb
    case: initialize
    retries: 0
    param_overrides:
      crdb_version: '23.2.3'
  - id: stage_03
    service: cockroachdb
    case: generate-cert
    retries: 0
  - id: stage_04
    service: cockroachdb
    case: certificate-rotation
    retries: 0
  - id: stage_05
    service: cockroachdb
    case: cluster-settings
    retries: 0
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 128MiB
  - id: stage_06
    service: cockroachdb
    case: zone-config
    retries: 0
    param_overrides:
      gc_ttl_seconds: 7200
  - id: stage_07
    service: cockroachdb
    case: monitoring-integration
    retries: 0
  - id: stage_08
    service: cockroachdb
    case: version-check
    retries: 0
    param_overrides:
      to_version: 23.2.3
  - id: stage_09
    service: cockroachdb
    case: partitioned-update
    retries: 0
    param_overrides:
      to_version: 23.2.7
  - id: stage_10
    service: cockroachdb
    case: major-upgrade-finalize
    retries: 0
  - id: stage_11
    service: cockroachdb
    case: health-check-recovery
    retries: 0
  - id: stage_12
    service: cockroachdb
    case: zone-config
    retries: 0
    param_overrides:
      gc_ttl_seconds: 3600
