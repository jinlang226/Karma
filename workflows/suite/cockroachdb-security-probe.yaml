# workflows/suite/cockroachdb-security-probe
#
# CockroachDB — TLS bring-up + rotation (composition probe)
# Generated single-application workflow (CHAIN).

metadata:
  id: cockroachdb-security-probe
  label: "CockroachDB \u2014 TLS bring-up + rotation (composition probe)"
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: generate-cert
    retries: 1
  - id: stage_02
    service: cockroachdb
    case: certificate-rotation
    retries: 1
  - id: stage_03
    service: cockroachdb
    case: expose-ingress
    retries: 1
  - id: stage_04
    service: cockroachdb
    case: monitoring-integration
    retries: 1
