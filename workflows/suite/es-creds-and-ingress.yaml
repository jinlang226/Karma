# workflows/suite/es-creds-and-ingress
#
# ES: deploy, rotate password and HTTP certs, then expose via secure ingress

metadata:
  id: es-creds-and-ingress
  label: 'ES: deploy, rotate password and HTTP certs, then expose via secure ingress'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: rotate-elastic-password
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: rotate-http-certs
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: secure-http-ingress
    retries: 1
