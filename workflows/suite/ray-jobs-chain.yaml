# workflows/suite/ray-jobs-chain
#
# Ray — deploy + job submission + recovery (5)
# Generated single-application workflow (CHAIN).

metadata:
  id: ray-jobs-chain
  label: "Ray \u2014 deploy + job submission + recovery (5)"
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: ray
    case: deploy_cluster
    retries: 1
  - id: stage_02
    service: ray
    case: job_submission
    retries: 1
  - id: stage_03
    service: ray
    case: scale_workers
    retries: 1
  - id: stage_04
    service: ray
    case: worker_recovery
    retries: 1
  - id: stage_05
    service: ray
    case: job_submission
    retries: 1
