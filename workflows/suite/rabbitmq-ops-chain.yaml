# workflows/suite/rabbitmq-ops-chain
#
# RabbitMQ — full day-2 operations chain (8)
# Generated single-application workflow (CHAIN).

metadata:
  id: rabbitmq-ops-chain
  label: "RabbitMQ \u2014 full day-2 operations chain (8)"
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: rabbitmq
    case: classic_queue
    retries: 1
    namespaces: &id001
    - cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
    namespace_binding: &id002
      default: cluster_a
  - id: stage_02
    service: rabbitmq
    case: manual_user_permission
    retries: 1
    namespaces: *id001
    param_overrides:
      cluster_prefix: rabbitmq
    namespace_binding: *id002
  - id: stage_03
    service: rabbitmq
    case: manual_policy_sync
    retries: 1
    namespaces: *id001
    param_overrides:
      cluster_prefix: rabbitmq
    namespace_binding: *id002
  - id: stage_04
    service: rabbitmq
    case: manual_monitoring
    retries: 1
    namespaces: *id001
    param_overrides:
      cluster_prefix: rabbitmq
    namespace_binding: *id002
  - id: stage_05
    service: rabbitmq
    case: manual_tls_rotation
    retries: 1
    namespaces: *id001
    param_overrides:
      cluster_prefix: rabbitmq
    namespace_binding: *id002
  - id: stage_06
    service: rabbitmq
    case: failover
    retries: 1
    namespaces: *id001
    param_overrides:
      cluster_prefix: rabbitmq
    namespace_binding: *id002
  - id: stage_07
    service: rabbitmq
    case: manual_backup_restore
    retries: 1
    namespaces: *id001
    param_overrides:
      cluster_prefix: rabbitmq
    namespace_binding: *id002
  - id: stage_08
    service: rabbitmq
    case: manual_skip_upgrade
    retries: 1
    namespaces: *id001
    param_overrides:
      cluster_prefix: rabbitmq
      from_version: '3.12'
      to_version: '3.13'
    namespace_binding: *id002
