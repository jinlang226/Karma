# workflows/suite/mongodb-lifecycle-probe
#
# MongoDB — deploy-to-decommission (composition probe)
# Generated single-application workflow (CHAIN).

metadata:
  id: mongodb-lifecycle-probe
  label: "MongoDB \u2014 deploy-to-decommission (composition probe)"
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: deploy
    retries: 1
  - id: stage_02
    service: mongodb
    case: initialize
    retries: 1
  - id: stage_03
    service: mongodb
    case: replica-scaling
    retries: 1
  - id: stage_04
    service: mongodb
    case: monitoring-integration
    retries: 1
  - id: stage_05
    service: mongodb
    case: version-upgrade
    retries: 1
  - id: stage_06
    service: mongodb
    case: decommission
    retries: 1
