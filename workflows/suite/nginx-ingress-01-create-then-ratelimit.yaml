# workflows/suite/nginx-ingress-01-create-then-ratelimit
#
# nginx-ingress: create ingress then apply rate limit

metadata:
  id: nginx-ingress-01-create-then-ratelimit
  label: 'nginx-ingress: create ingress then apply rate limit'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: create_ingress
    retries: 0
    param_overrides:
      host: demo.example.com
      path: /app
  - id: stage_02
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 0
    param_overrides:
      limit_rps: '1'
