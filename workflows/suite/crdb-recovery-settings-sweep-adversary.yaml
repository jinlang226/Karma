# workflows/suite/crdb-recovery-settings-sweep-adversary
#
# CockroachDB cluster-settings sweep: recovery and lease timeouts — with adversary injection

metadata:
  id: crdb-recovery-settings-sweep-adversary
  label: 'CockroachDB cluster-settings sweep: recovery and lease timeouts — with adversary injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: throttle_rebalance_rate
    inject_at_stage: stage_01
    lift_at_stage: stage_03
  stages:
  - id: stage_01
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: server.time_until_store_dead
      setting_value: 1m30s
  - id: stage_02
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.closed_timestamp.target_duration
      setting_value: 3s
  - id: stage_03
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.range_merge.queue_enabled
      setting_value: 'true'
  - id: stage_04
    service: cockroachdb
    case: version-check
    retries: 1
