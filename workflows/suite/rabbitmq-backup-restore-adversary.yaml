# workflows/suite/rabbitmq-backup-restore-adversary
#
# RabbitMQ: Backup and Restore after Primary Data Loss — with adversary injection

metadata:
  id: rabbitmq-backup-restore-adversary
  label: 'RabbitMQ: Backup and Restore after Primary Data Loss — with adversary injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: delete_app_queue
    inject_at_stage: stage_01
    lift_at_stage: stage_02
  stages:
  - id: stage_01
    service: rabbitmq
    case: classic_queue
    retries: 1
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_02
    service: rabbitmq
    case: manual_backup_restore
    retries: 1
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
