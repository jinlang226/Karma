# workflows/suite/crdb-version-check-sweep
#
# CockroachDB version check: record multiple report keys

metadata:
  id: crdb-version-check-sweep
  label: 'CockroachDB version check: record multiple report keys'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: version-check
    retries: 1
    param_overrides:
      report_key: db_version
  - id: stage_02
    service: cockroachdb
    case: version-check
    retries: 1
    param_overrides:
      report_key: binary_version
  - id: stage_03
    service: cockroachdb
    case: version-check
    retries: 1
    param_overrides:
      report_key: feature_set
  - id: stage_04
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 128MiB
