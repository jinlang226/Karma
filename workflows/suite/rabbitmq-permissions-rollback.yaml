# workflows/error-prone/rabbitmq-permissions-rollback
#
# RabbitMQ: Cluster Bring-Up and User Permission Hardening then Rollback Rehearsal

metadata:
  id: rabbitmq-permissions-rollback
  label: 'RabbitMQ: Cluster Bring-Up and User Permission Hardening then Rollback Rehearsal'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: rabbitmq
    case: classic_queue
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_02
    service: rabbitmq
    case: manual_user_permission
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_03
    service: rabbitmq
    case: rollback-rehearsal
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
