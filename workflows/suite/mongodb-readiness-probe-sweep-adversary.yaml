# workflows/suite/mongodb-readiness-probe-sweep-adversary
#
# MongoDB readiness probe tuning sweep: progressively improve probe parameters — with adversary injection

metadata:
  id: mongodb-readiness-probe-sweep-adversary
  label: 'MongoDB readiness probe tuning sweep: progressively improve probe parameters — with adversary
    injection'
spec:
  prompt_mode: progressive
  adversary:
  - scenario: readiness_probe_break
    inject_at_stage: stage_01
    lift_at_stage: stage_02
  stages:
  - id: stage_01
    service: mongodb
    case: readiness-probe-tuning
    retries: 0
  - id: stage_02
    service: mongodb
    case: readiness-probe-tuning
    retries: 0
    param_overrides:
      faulty_readiness_initial_delay: 3
      faulty_readiness_timeout: 2
      faulty_readiness_failure_threshold: 3
