# workflows/suite/nginx-lifecycle-chain
#
# NGINX — ingress lifecycle (5)
# Generated single-application workflow (CHAIN).

metadata:
  id: nginx-lifecycle-chain
  label: "NGINX \u2014 ingress lifecycle (5)"
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: create_ingress
    retries: 1
  - id: stage_02
    service: nginx-ingress
    case: class_only_upgrade
    retries: 1
  - id: stage_03
    service: nginx-ingress
    case: renew_tls_secret
    retries: 1
  - id: stage_04
    service: nginx-ingress
    case: otel_log_format
    retries: 1
  - id: stage_05
    service: nginx-ingress
    case: ingress_canary
    retries: 1
