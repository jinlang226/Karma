# workflows/suite/platform-analytics-stack
#
# Platform — analytics stack: Ray + Spark batch + Spark streaming

metadata:
  id: platform-analytics-stack
  label: 'Platform — analytics stack: Ray + Spark batch + Spark streaming'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: ray
    case: deploy_cluster
    retries: 1
  - id: stage_02
    service: ray
    case: job_submission
    retries: 1
  - id: stage_03
    service: spark
    case: deploy_spark_pi
    retries: 1
  - id: stage_04
    service: spark
    case: spark_streaming_autoscale
    retries: 1
