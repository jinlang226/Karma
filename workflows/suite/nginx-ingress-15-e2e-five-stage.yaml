# workflows/suite/nginx-ingress-15-e2e-five-stage
#
# nginx-ingress: end-to-end five-stage lifecycle — expose, TLS, canary, rate limit, OTel

metadata:
  id: nginx-ingress-15-e2e-five-stage
  label: 'nginx-ingress: end-to-end five-stage lifecycle — expose, TLS, canary, rate limit, OTel'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: create_ingress
    retries: 0
    param_overrides:
      host: app.example.com
      path: /svc
  - id: stage_02
    service: nginx-ingress
    case: renew_tls_secret
    retries: 0
  - id: stage_03
    service: nginx-ingress
    case: ingress_canary
    retries: 0
  - id: stage_04
    service: nginx-ingress
    case: rate_limit_replica_hard
    retries: 0
    param_overrides:
      limit_rps: '2'
  - id: stage_05
    service: nginx-ingress
    case: otel_log_format
    retries: 0
