# workflows/error-prone/ray-scale-upgrade-then-plan
#
# Ray: scale to 3 + upgrade to 2.9.0, then write upgrade plan

metadata:
  id: ray-scale-upgrade-then-plan
  label: 'Ray: scale to 3 + upgrade to 2.9.0, then write upgrade plan'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: ray
    case: deploy_cluster
    retries: 0
    param_overrides:
      worker_replicas: '2'
  - id: stage_02
    service: ray
    case: scale_workers
    retries: 0
    param_overrides:
      source_worker_replicas: '2'
      target_worker_replicas: '3'
  - id: stage_03
    service: ray
    case: upgrade_version
    retries: 0
    param_overrides:
      from_image: rayproject/ray:2.8.0
      to_image: rayproject/ray:2.9.0
  - id: stage_04
    service: ray
    case: change-plan-only
    retries: 0
