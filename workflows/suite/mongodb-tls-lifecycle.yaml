# workflows/suite/mongodb-tls-lifecycle
#
# MongoDB TLS lifecycle: enable TLS then rotate certificates

metadata:
  id: mongodb-tls-lifecycle
  label: 'MongoDB TLS lifecycle: enable TLS then rotate certificates'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: tls-setup
    retries: 1
  - id: stage_02
    service: mongodb
    case: certificate-rotation
    retries: 1
