# workflows/suite/mongodb-probe-then-customization
#
# MongoDB readiness probe fix then statefulset resource customization

metadata:
  id: mongodb-probe-then-customization
  label: MongoDB readiness probe fix then statefulset resource customization
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: readiness-probe-tuning
    retries: 1
  - id: stage_02
    service: mongodb
    case: statefulset-customization
    retries: 1
