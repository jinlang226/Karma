# workflows/error-prone/ray-scale-upgrade-job-rollback
#
# Ray: scale + upgrade + submit job, then prepare rollback script

metadata:
  id: ray-scale-upgrade-job-rollback
  label: 'Ray: scale + upgrade + submit job, then prepare rollback script'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: ray
    case: deploy_cluster
    retries: 0
    param_overrides:
      worker_replicas: '2'
  - id: stage_02
    service: ray
    case: scale_workers
    retries: 0
    param_overrides:
      source_worker_replicas: '2'
      target_worker_replicas: '3'
  - id: stage_03
    service: ray
    case: upgrade_version
    retries: 0
    param_overrides:
      from_image: rayproject/ray:2.8.0
      to_image: rayproject/ray:2.9.0
  - id: stage_04
    service: ray
    case: job_submission
    retries: 0
    param_overrides:
      expected_output: pong
  - id: stage_05
    service: ray
    case: rollback-rehearsal
    retries: 0
