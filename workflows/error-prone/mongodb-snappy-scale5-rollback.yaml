# workflows/error-prone/mongodb-snappy-scale5-rollback
#
# MongoDB: set snappy journal compressor, scale to 5, then rehearse rollback

metadata:
  id: mongodb-snappy-scale5-rollback
  label: 'MongoDB: set snappy journal compressor, scale to 5, then rehearse rollback'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: mongod-config-update
    retries: 0
    param_overrides:
      target_journal_compressor: snappy
  - id: stage_02
    service: mongodb
    case: replica-scaling
    retries: 0
    param_overrides:
      target_replicas: '5'
  - id: stage_03
    service: mongodb
    case: rollback-rehearsal
    retries: 0
