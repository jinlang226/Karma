# workflows/error-prone/mongodb-ep-zlib-roles-change-plan
#
# MongoDB: configure zlib, define custom roles, then draft upgrade plan

metadata:
  id: mongodb-ep-zlib-roles-change-plan
  label: 'MongoDB: configure zlib, define custom roles, then draft upgrade plan'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: mongod-config-update
    retries: 1
    param_overrides:
      target_journal_compressor: zlib
  - id: stage_02
    service: mongodb
    case: custom-roles
    retries: 1
  - id: stage_03
    service: mongodb
    case: change-plan-only
    retries: 1
