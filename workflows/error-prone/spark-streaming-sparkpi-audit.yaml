# workflows/error-prone/spark-streaming-sparkpi-audit
#
# Streaming autoscale then SparkPi fix then readonly-audit trap

metadata:
  id: spark-streaming-sparkpi-audit
  label: Streaming autoscale then SparkPi fix then readonly-audit trap
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: spark
    case: spark_streaming_autoscale
    retries: 1
  - id: stage_02
    service: spark
    case: deploy_spark_pi
    retries: 1
  - id: stage_03
    service: spark
    case: readonly-audit
    retries: 1
