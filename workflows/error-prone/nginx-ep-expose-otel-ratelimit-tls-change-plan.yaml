# workflows/error-prone/nginx-ep-expose-otel-ratelimit-tls-change-plan
#
# Expose + OTel + rate-limit + TLS renew — then change-plan trap

metadata:
  id: nginx-ep-expose-otel-ratelimit-tls-change-plan
  label: Expose + OTel + rate-limit + TLS renew — then change-plan trap
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: create_ingress
    retries: 1
  - id: stage_02
    service: nginx-ingress
    case: otel_log_format
    retries: 1
  - id: stage_03
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 1
    param_overrides:
      limit_rps: '2'
  - id: stage_04
    service: nginx-ingress
    case: renew_tls_secret
    retries: 1
  - id: stage_05
    service: nginx-ingress
    case: change-plan-only
    retries: 1
