# workflows/error-prone/ray-ep-interleaved-rollback
#
# Ray: scale + expose dashboard, prepare rollback (trap mid-chain), then submit job

metadata:
  id: ray-ep-interleaved-rollback
  label: 'Ray: scale + expose dashboard, prepare rollback (trap mid-chain), then submit job'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: ray
    case: deploy_cluster
    retries: 1
    param_overrides:
      worker_replicas: '2'
  - id: stage_02
    service: ray
    case: scale_workers
    retries: 1
    param_overrides:
      source_worker_replicas: '2'
      target_worker_replicas: '4'
  - id: stage_03
    service: ray
    case: dashboard_exposure
    retries: 1
    param_overrides:
      dashboard_port: '8265'
  - id: stage_04
    service: ray
    case: rollback-rehearsal
    retries: 1
  - id: stage_05
    service: ray
    case: job_submission
    retries: 1
    param_overrides:
      expected_output: pong
