# workflows/error-prone/nginx-ep-14
#
# Rate-limit + canary — mid-workflow plan trap — then OTel

metadata:
  id: nginx-ep-14
  label: Rate-limit + canary — mid-workflow plan trap — then OTel
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 1
    param_overrides:
      limit_rps: '3'
  - id: stage_02
    service: nginx-ingress
    case: ingress_canary
    retries: 1
  - id: stage_03
    service: nginx-ingress
    case: change-plan-only
    retries: 1
  - id: stage_04
    service: nginx-ingress
    case: otel_log_format
    retries: 1
