# workflows/error-prone/es-ep-ingress-scale6-password-rollback
#
# Elasticsearch — expose ingress, scale to 6, rotate password, then rehearse rollback

metadata:
  id: es-ep-ingress-scale6-password-rollback
  label: Elasticsearch — expose ingress, scale to 6, rotate password, then rehearse rollback
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: secure-http-ingress
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 1
    param_overrides:
      expected_nodes: 6
  - id: stage_04
    service: elasticsearch
    case: rotate-elastic-password
    retries: 1
  - id: stage_05
    service: elasticsearch
    case: rollback-rehearsal
    retries: 1
