# workflows/error-prone/es-ep-password-snapshot-certs-scale-rollback
#
# Elasticsearch — password rotation, snapshot, cert rotation, scale up, then rollback script

metadata:
  id: es-ep-password-snapshot-certs-scale-rollback
  label: Elasticsearch — password rotation, snapshot, cert rotation, scale up, then rollback script
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: rotate-elastic-password
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: rotate-http-certs
    retries: 1
  - id: stage_05
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 1
    param_overrides:
      expected_nodes: 5
  - id: stage_06
    service: elasticsearch
    case: rollback-rehearsal
    retries: 1
