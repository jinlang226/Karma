# workflows/error-prone/elasticsearch-certs-scale-change-plan
#
# Elasticsearch — rotate certs, scale up, then write upgrade migration plan

metadata:
  id: elasticsearch-certs-scale-change-plan
  label: Elasticsearch — rotate certs, scale up, then write upgrade migration plan
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: rotate-http-certs
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 1
    param_overrides:
      expected_nodes: 5
  - id: stage_04
    service: elasticsearch
    case: change-plan-only
    retries: 1
