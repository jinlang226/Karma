# workflows/error-prone/mongodb-ep-scale5-rotate-users-change-plan
#
# MongoDB: scale, rotate passwords, manage users, then plan next change

metadata:
  id: mongodb-ep-scale5-rotate-users-change-plan
  label: 'MongoDB: scale, rotate passwords, manage users, then plan next change'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: replica-scaling
    retries: 1
    param_overrides:
      target_replicas: '5'
  - id: stage_02
    service: mongodb
    case: password-rotation
    retries: 1
  - id: stage_03
    service: mongodb
    case: user-management
    retries: 1
  - id: stage_04
    service: mongodb
    case: change-plan-only
    retries: 1
