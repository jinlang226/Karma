# workflows/error-prone/es-ep-ingress-users-certs-scale-rollback
#
# Elasticsearch — ingress + users + cert rotation + scale, then prepare rollback

metadata:
  id: es-ep-ingress-users-certs-scale-rollback
  label: Elasticsearch — ingress + users + cert rotation + scale, then prepare rollback
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: secure-http-ingress
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: file-realm-user-roles-merge
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: rotate-http-certs
    retries: 1
  - id: stage_05
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 1
    param_overrides:
      expected_nodes: 5
  - id: stage_06
    service: elasticsearch
    case: rollback-rehearsal
    retries: 1
