# workflows/error-prone/crdb-ep-upgrade-five-settings-rollback-change-plan
#
# Major upgrade followed by five config hardening steps, rehearse rollback and draft plan

metadata:
  id: crdb-ep-upgrade-five-settings-rollback-change-plan
  label: Major upgrade followed by five config hardening steps, rehearse rollback and draft plan
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: major-upgrade-finalize
    retries: 1
    param_overrides:
      from_version: '23.2'
      to_version: 24.1.0
  - id: stage_02
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 336MiB
  - id: stage_03
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.snapshot_recovery.max_rate
      setting_value: 168MiB
  - id: stage_04
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.range_merge.queue_enabled
      setting_value: 'false'
  - id: stage_05
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: sql.defaults.statement_timeout
      setting_value: 60s
  - id: stage_06
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.closed_timestamp.target_duration
      setting_value: 3s
  - id: stage_07
    service: cockroachdb
    case: rollback-rehearsal
    retries: 1
  - id: stage_08
    service: cockroachdb
    case: change-plan-only
    retries: 1
