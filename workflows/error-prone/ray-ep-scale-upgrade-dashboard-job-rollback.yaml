# workflows/error-prone/ray-ep-scale-upgrade-dashboard-job-rollback
#
# Ray: deploy + scale to 3 + upgrade + dashboard + job, then rollback-rehearsal

metadata:
  id: ray-ep-scale-upgrade-dashboard-job-rollback
  label: 'Ray: deploy + scale to 3 + upgrade + dashboard + job, then rollback-rehearsal'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: ray
    case: deploy_cluster
    retries: 1
    param_overrides:
      worker_replicas: '2'
  - id: stage_02
    service: ray
    case: scale_workers
    retries: 1
    param_overrides:
      source_worker_replicas: '2'
      target_worker_replicas: '3'
  - id: stage_03
    service: ray
    case: upgrade_version
    retries: 1
    param_overrides:
      from_image: rayproject/ray:2.8.0
      to_image: rayproject/ray:2.9.0
  - id: stage_04
    service: ray
    case: dashboard_exposure
    retries: 1
    param_overrides:
      dashboard_port: '8265'
  - id: stage_05
    service: ray
    case: job_submission
    retries: 1
    param_overrides:
      expected_output: pong
  - id: stage_06
    service: ray
    case: rollback-rehearsal
    retries: 1
