# workflows/error-prone/cockroachdb-three-settings-audit-rollback
#
# Set three config values, audit, then rehearse rollback

metadata:
  id: cockroachdb-three-settings-audit-rollback
  label: Set three config values, audit, then rehearse rollback
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: cluster-settings
    retries: 0
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 160MiB
  - id: stage_02
    service: cockroachdb
    case: cluster-settings
    retries: 0
    param_overrides:
      setting_name: kv.snapshot_recovery.max_rate
      setting_value: 80MiB
  - id: stage_03
    service: cockroachdb
    case: cluster-settings
    retries: 0
    param_overrides:
      setting_name: kv.range_merge.queue_enabled
      setting_value: 'false'
  - id: stage_04
    service: cockroachdb
    case: readonly-audit
    retries: 0
  - id: stage_05
    service: cockroachdb
    case: rollback-rehearsal
    retries: 0
