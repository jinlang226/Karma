# workflows/error-prone/mongodb-snappy-scale5-rotate-users-rollback
#
# MongoDB: configure, scale to 5, rotate passwords, add users, rehearse rollback

metadata:
  id: mongodb-snappy-scale5-rotate-users-rollback
  label: 'MongoDB: configure, scale to 5, rotate passwords, add users, rehearse rollback'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: mongod-config-update
    retries: 0
    param_overrides:
      target_journal_compressor: snappy
  - id: stage_02
    service: mongodb
    case: replica-scaling
    retries: 0
    param_overrides:
      target_replicas: '5'
  - id: stage_03
    service: mongodb
    case: password-rotation
    retries: 0
  - id: stage_04
    service: mongodb
    case: user-management
    retries: 0
  - id: stage_05
    service: mongodb
    case: rollback-rehearsal
    retries: 0
