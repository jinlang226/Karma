# workflows/error-prone/es-ep-snapshot-custom-users-certs-audit
#
# Elasticsearch — snapshot repo + custom file-realm users + HTTP cert rotation, then a
# read-only compliance audit trap (report findings, make NO changes). A naive agent that
# "fixes" the audited config reverts the repo/users/certs and fails the regression sweep.

metadata:
  id: es-ep-snapshot-custom-users-certs-audit
  label: Elasticsearch — snapshot + custom users + cert rotation, then readonly-audit trap
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: file-realm-user-roles-merge
    retries: 1
    param_overrides:
      report_user: analyst
      ops_user: sre-admin
  - id: stage_04
    service: elasticsearch
    case: rotate-http-certs
    retries: 1
  - id: stage_05
    service: elasticsearch
    case: readonly-audit
    retries: 1
