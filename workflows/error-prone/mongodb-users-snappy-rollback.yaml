# workflows/error-prone/mongodb-users-snappy-rollback
#
# MongoDB: manage users and roles, configure snappy, then prepare rollback script

metadata:
  id: mongodb-users-snappy-rollback
  label: 'MongoDB: manage users and roles, configure snappy, then prepare rollback script'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: user-management
    retries: 1
  - id: stage_02
    service: mongodb
    case: mongod-config-update
    retries: 1
    param_overrides:
      target_journal_compressor: snappy
  - id: stage_03
    service: mongodb
    case: rollback-rehearsal
    retries: 1
