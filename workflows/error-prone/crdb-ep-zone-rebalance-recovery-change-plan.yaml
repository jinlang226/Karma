# workflows/error-prone/crdb-ep-zone-rebalance-recovery-change-plan
#
# Apply tenant-B zone config, tune two rate limits, then draft a maintenance change plan

metadata:
  id: crdb-ep-zone-rebalance-recovery-change-plan
  label: Apply tenant-B zone config, tune two rate limits, then draft a maintenance change plan
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: zone-config
    retries: 1
    param_overrides:
      target_schema: tenant_b
      protected_schema: tenant_a
      gc_ttl_seconds: 14400
      num_replicas: 3
      range_min_bytes: 134217728
      range_max_bytes: 536870912
  - id: stage_02
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 96MiB
  - id: stage_03
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.snapshot_recovery.max_rate
      setting_value: 24MiB
  - id: stage_04
    service: cockroachdb
    case: change-plan-only
    retries: 1
