# workflows/error-prone/ep-es-20
#
# Elasticsearch — scale up + snapshot repo, then compliance audit

metadata:
  id: ep-es-20
  label: Elasticsearch — scale up + snapshot repo, then compliance audit
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 1
    param_overrides:
      expected_nodes: 5
  - id: stage_03
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: readonly-audit
    retries: 1
