# workflows/error-prone/elasticsearch-scale-certs-rollback
#
# Elasticsearch — scale up then rotate certs, prepare rollback script

metadata:
  id: elasticsearch-scale-certs-rollback
  label: Elasticsearch — scale up then rotate certs, prepare rollback script
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 1
    param_overrides:
      expected_nodes: 5
  - id: stage_03
    service: elasticsearch
    case: rotate-http-certs
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: rollback-rehearsal
    retries: 1
