# workflows/error-prone/mongodb-ep-rotate-users-snappy-roles-audit
#
# MongoDB: rotate passwords, provision users, configure snappy, tighten roles, then audit

metadata:
  id: mongodb-ep-rotate-users-snappy-roles-audit
  label: 'MongoDB: rotate passwords, provision users, configure snappy, tighten roles, then audit'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: password-rotation
    retries: 1
  - id: stage_02
    service: mongodb
    case: user-management
    retries: 1
  - id: stage_03
    service: mongodb
    case: mongod-config-update
    retries: 1
    param_overrides:
      target_journal_compressor: snappy
  - id: stage_04
    service: mongodb
    case: custom-roles
    retries: 1
  - id: stage_05
    service: mongodb
    case: readonly-audit
    retries: 1
