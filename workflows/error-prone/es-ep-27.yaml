# workflows/error-prone/es-ep-27
#
# Elasticsearch — rotate certs + rollback rehearsal mid-run, then add file-realm users

metadata:
  id: es-ep-27
  label: Elasticsearch — rotate certs + rollback rehearsal mid-run, then add file-realm users
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: rotate-http-certs
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: rollback-rehearsal
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: file-realm-user-roles-merge
    retries: 1
  - id: stage_05
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 1
