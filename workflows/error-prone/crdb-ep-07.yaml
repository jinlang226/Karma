# workflows/error-prone/crdb-ep-07
#
# Enable TLS, harden rebalance rate, then rehearse a rollback

metadata:
  id: crdb-ep-07
  label: Enable TLS, harden rebalance rate, then rehearse a rollback
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: generate-cert
    retries: 1
  - id: stage_02
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 320MiB
  - id: stage_03
    service: cockroachdb
    case: rollback-rehearsal
    retries: 1
