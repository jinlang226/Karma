# workflows/error-prone/es-ep-ingress-password-rollback
#
# Elasticsearch — secure HTTP ingress + rotate password, then rehearse rollback script

metadata:
  id: es-ep-ingress-password-rollback
  label: Elasticsearch — secure HTTP ingress + rotate password, then rehearse rollback script
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: secure-http-ingress
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: rotate-elastic-password
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: rollback-rehearsal
    retries: 1
