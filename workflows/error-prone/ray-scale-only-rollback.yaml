# workflows/error-prone/ray-scale-only-rollback
#
# Ray: scale workers to 3, then prepare (but don't execute) rollback

metadata:
  id: ray-scale-only-rollback
  label: 'Ray: scale workers to 4, then prepare (but don''t execute) rollback'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: ray
    case: deploy_cluster
    retries: 1
    param_overrides:
      worker_replicas: '2'
  - id: stage_02
    service: ray
    case: scale_workers
    retries: 1
    param_overrides:
      source_worker_replicas: '2'
      target_worker_replicas: '3'
  - id: stage_03
    service: ray
    case: rollback-rehearsal
    retries: 1
