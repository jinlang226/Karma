# workflows/error-prone/cockroachdb-rebalance-upgrade-change-plan-rollback
#
# Boost rebalance rate, roll upgrade, plan next upgrade, rehearse rollback

metadata:
  id: cockroachdb-rebalance-upgrade-change-plan-rollback
  label: Boost rebalance rate, roll upgrade, plan next upgrade, rehearse rollback
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: cluster-settings
    retries: 0
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 192MiB
  - id: stage_02
    service: cockroachdb
    case: partitioned-update
    retries: 0
    param_overrides:
      to_version: 24.1.1
  - id: stage_03
    service: cockroachdb
    case: change-plan-only
    retries: 0
  - id: stage_04
    service: cockroachdb
    case: rollback-rehearsal
    retries: 0
