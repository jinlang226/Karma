# workflows/error-prone/nginx-ep-ratelimit-otel-tls-rollback
#
# Rate-limit + OTel + TLS renew — then rollback trap

metadata:
  id: nginx-ep-ratelimit-otel-tls-rollback
  label: Rate-limit + OTel + TLS renew — then rollback trap
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 1
    param_overrides:
      limit_rps: '2'
  - id: stage_02
    service: nginx-ingress
    case: otel_log_format
    retries: 1
  - id: stage_03
    service: nginx-ingress
    case: renew_tls_secret
    retries: 1
  - id: stage_04
    service: nginx-ingress
    case: rollback-rehearsal
    retries: 1
