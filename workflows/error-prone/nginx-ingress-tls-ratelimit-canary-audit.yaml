# workflows/error-prone/nginx-ingress-tls-ratelimit-canary-audit
#
# TLS renew + rate-limit + canary — then audit trap

metadata:
  id: nginx-ingress-tls-ratelimit-canary-audit
  label: TLS renew + rate-limit + canary — then audit trap
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: renew_tls_secret
    retries: 1
  - id: stage_02
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 1
    param_overrides:
      limit_rps: '1'
  - id: stage_03
    service: nginx-ingress
    case: ingress_canary
    retries: 1
  - id: stage_04
    service: nginx-ingress
    case: readonly-audit
    retries: 1
