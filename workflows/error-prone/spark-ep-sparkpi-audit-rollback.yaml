# workflows/error-prone/spark-ep-sparkpi-audit-rollback
#
# SparkPi fix + readonly-audit + rollback-rehearsal double trap

metadata:
  id: spark-ep-sparkpi-audit-rollback
  label: SparkPi fix + readonly-audit + rollback-rehearsal double trap
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: spark
    case: deploy_spark_pi
    retries: 1
  - id: stage_02
    service: spark
    case: readonly-audit
    retries: 1
  - id: stage_03
    service: spark
    case: rollback-rehearsal
    retries: 1
