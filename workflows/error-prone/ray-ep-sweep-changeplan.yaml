# workflows/error-prone/ray-ep-sweep-changeplan
#
# Ray: progressive scale sweep 2→3→5, then write downscale plan

metadata:
  id: ray-ep-sweep-changeplan
  label: 'Ray: progressive scale sweep 2→3→5, then write downscale plan'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: ray
    case: deploy_cluster
    retries: 1
    param_overrides:
      worker_replicas: '2'
  - id: stage_02
    service: ray
    case: scale_workers
    retries: 1
    param_overrides:
      source_worker_replicas: '2'
      target_worker_replicas: '3'
  - id: stage_03
    service: ray
    case: scale_workers
    retries: 1
    param_overrides:
      source_worker_replicas: '3'
      target_worker_replicas: '5'
  - id: stage_04
    service: ray
    case: change-plan-only
    retries: 1
