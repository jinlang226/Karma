# workflows/error-prone/nginx-ep-01
#
# Rate-limit + canary routing — then rollback trap

metadata:
  id: nginx-ep-01
  label: Rate-limit + canary routing — then rollback trap
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 1
    param_overrides:
      limit_rps: '2'
  - id: stage_02
    service: nginx-ingress
    case: ingress_canary
    retries: 1
  - id: stage_03
    service: nginx-ingress
    case: rollback-rehearsal
    retries: 1
