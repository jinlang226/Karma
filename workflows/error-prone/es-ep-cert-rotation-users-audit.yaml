# workflows/error-prone/es-ep-cert-rotation-users-audit
#
# Elasticsearch — cert rotation + file-realm users, then compliance audit

metadata:
  id: es-ep-cert-rotation-users-audit
  label: Elasticsearch — cert rotation + file-realm users, then compliance audit
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: rotate-http-certs
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: file-realm-user-roles-merge
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: readonly-audit
    retries: 1
