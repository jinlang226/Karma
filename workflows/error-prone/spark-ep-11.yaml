# Multi-tenant fix then SparkPi fix then rollback-rehearsal trap

metadata:
  id: spark-ep-11
  label: Multi-tenant fix then SparkPi fix then rollback-rehearsal trap
spec:
  prompt_mode: progressive
  stages:
