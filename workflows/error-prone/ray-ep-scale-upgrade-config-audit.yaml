# workflows/error-prone/ray-ep-scale-upgrade-config-audit
#
# Ray: scale to 3 + upgrade to 2.9.0, then audit configuration

metadata:
  id: ray-ep-scale-upgrade-config-audit
  label: 'Ray: scale to 3 + upgrade to 2.9.0, then audit configuration'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: ray
    case: deploy_cluster
    retries: 1
    param_overrides:
      worker_replicas: '2'
  - id: stage_02
    service: ray
    case: scale_workers
    retries: 1
    param_overrides:
      source_worker_replicas: '2'
      target_worker_replicas: '3'
  - id: stage_03
    service: ray
    case: upgrade_version
    retries: 1
    param_overrides:
      from_image: rayproject/ray:2.8.0
      to_image: rayproject/ray:2.9.0
  - id: stage_04
    service: ray
    case: readonly-audit
    retries: 1
