# workflows/error-prone/rabbitmq-monitoring-change-plan-then-tls
#
# RabbitMQ: Monitoring Wiring then Mid-Plan Trap then TLS Rotation and Permissions

metadata:
  id: rabbitmq-monitoring-change-plan-then-tls
  label: 'RabbitMQ: Monitoring Wiring then Mid-Plan Trap then TLS Rotation and Permissions'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: rabbitmq
    case: classic_queue
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_02
    service: rabbitmq
    case: manual_monitoring
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_03
    service: rabbitmq
    case: change-plan-only
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_04
    service: rabbitmq
    case: manual_tls_rotation
    retries: 0
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
      min_rotated_leaf_validity_days: '30'
