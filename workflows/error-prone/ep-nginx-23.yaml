# workflows/error-prone/ep-nginx-23
#
# Rate-limit — early rollback trap — then canary + OTel

metadata:
  id: ep-nginx-23
  label: Rate-limit — early rollback trap — then canary + OTel
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 1
    param_overrides:
      limit_rps: '4'
  - id: stage_02
    service: nginx-ingress
    case: rollback-rehearsal
    retries: 1
  - id: stage_03
    service: nginx-ingress
    case: ingress_canary
    retries: 1
  - id: stage_04
    service: nginx-ingress
    case: otel_log_format
    retries: 1
