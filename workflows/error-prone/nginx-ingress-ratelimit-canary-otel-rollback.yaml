# workflows/error-prone/nginx-ingress-ratelimit-canary-otel-rollback
#
# Rate-limit + canary + OTel — then rollback trap

metadata:
  id: nginx-ingress-ratelimit-canary-otel-rollback
  label: Rate-limit + canary + OTel — then rollback trap
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 0
    param_overrides:
      limit_rps: '2'
  - id: stage_02
    service: nginx-ingress
    case: ingress_canary
    retries: 0
  - id: stage_03
    service: nginx-ingress
    case: otel_log_format
    retries: 0
  - id: stage_04
    service: nginx-ingress
    case: rollback-rehearsal
    retries: 0
