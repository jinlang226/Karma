# workflows/error-prone/mongodb-users-roles-zlib-rotate-audit
#
# MongoDB: provision users, define roles, configure, rotate, then compliance audit

metadata:
  id: mongodb-users-roles-zlib-rotate-audit
  label: 'MongoDB: provision users, define roles, configure, rotate, then compliance audit'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: user-management
    retries: 1
  - id: stage_02
    service: mongodb
    case: custom-roles
    retries: 1
  - id: stage_03
    service: mongodb
    case: mongod-config-update
    retries: 1
    param_overrides:
      target_journal_compressor: zlib
  - id: stage_04
    service: mongodb
    case: password-rotation
    retries: 1
  - id: stage_05
    service: mongodb
    case: readonly-audit
    retries: 1
