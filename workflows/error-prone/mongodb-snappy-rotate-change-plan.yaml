# workflows/error-prone/mongodb-snappy-rotate-change-plan
#
# MongoDB: set snappy compressor, rotate passwords, then draft upgrade plan

metadata:
  id: mongodb-snappy-rotate-change-plan
  label: 'MongoDB: set snappy compressor, rotate passwords, then draft upgrade plan'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: mongod-config-update
    retries: 0
    param_overrides:
      target_journal_compressor: snappy
  - id: stage_02
    service: mongodb
    case: password-rotation
    retries: 0
  - id: stage_03
    service: mongodb
    case: change-plan-only
    retries: 0
