# workflows/error-prone/mongodb-snappy-users-rotate-rollback
#
# MongoDB: configure compressor, add users, rotate passwords, rehearse rollback

metadata:
  id: mongodb-snappy-users-rotate-rollback
  label: 'MongoDB: configure compressor, add users, rotate passwords, rehearse rollback'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: mongod-config-update
    retries: 0
    param_overrides:
      target_journal_compressor: snappy
  - id: stage_02
    service: mongodb
    case: user-management
    retries: 0
  - id: stage_03
    service: mongodb
    case: password-rotation
    retries: 0
  - id: stage_04
    service: mongodb
    case: rollback-rehearsal
    retries: 0
