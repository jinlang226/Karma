# workflows/error-prone/elasticsearch-certs-password-users-rollback
#
# Elasticsearch — full security hardening (certs + password + file-realm) then rollback script

metadata:
  id: elasticsearch-certs-password-users-rollback
  label: Elasticsearch — full security hardening (certs + password + file-realm) then rollback script
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
  - id: stage_02
    service: elasticsearch
    case: rotate-http-certs
    retries: 0
  - id: stage_03
    service: elasticsearch
    case: rotate-elastic-password
    retries: 0
  - id: stage_04
    service: elasticsearch
    case: file-realm-user-roles-merge
    retries: 0
  - id: stage_05
    service: elasticsearch
    case: rollback-rehearsal
    retries: 0
