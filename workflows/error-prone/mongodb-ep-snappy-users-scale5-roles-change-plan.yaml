# workflows/error-prone/mongodb-ep-snappy-users-scale5-roles-change-plan
#
# MongoDB: configure, manage users, scale to 5, tighten roles, plan next change

metadata:
  id: mongodb-ep-snappy-users-scale5-roles-change-plan
  label: 'MongoDB: configure, manage users, scale to 5, tighten roles, plan next change'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: mongod-config-update
    retries: 1
    param_overrides:
      target_journal_compressor: snappy
  - id: stage_02
    service: mongodb
    case: user-management
    retries: 1
  - id: stage_03
    service: mongodb
    case: replica-scaling
    retries: 1
    param_overrides:
      target_replicas: '5'
  - id: stage_04
    service: mongodb
    case: custom-roles
    retries: 1
  - id: stage_05
    service: mongodb
    case: change-plan-only
    retries: 1
