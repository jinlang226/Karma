# workflows/error-prone/nginx-ep-06
#
# Expose + TLS + canary — then compliance audit trap

metadata:
  id: nginx-ep-06
  label: Expose + TLS + canary — then compliance audit trap
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: create_ingress
    retries: 1
  - id: stage_02
    service: nginx-ingress
    case: renew_tls_secret
    retries: 1
  - id: stage_03
    service: nginx-ingress
    case: ingress_canary
    retries: 1
  - id: stage_04
    service: nginx-ingress
    case: readonly-audit
    retries: 1
