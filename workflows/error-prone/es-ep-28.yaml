# workflows/error-prone/es-ep-28
#
# Elasticsearch — scale up + change-plan mid-run, then rotate password and ingress

metadata:
  id: es-ep-28
  label: Elasticsearch — scale up + change-plan mid-run, then rotate password and ingress
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 1
    param_overrides:
      expected_nodes: 5
  - id: stage_03
    service: elasticsearch
    case: change-plan-only
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: rotate-elastic-password
    retries: 1
  - id: stage_05
    service: elasticsearch
    case: secure-http-ingress
    retries: 1
