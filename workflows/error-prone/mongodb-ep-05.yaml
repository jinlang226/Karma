# workflows/error-prone/mongodb-ep-05
#
# MongoDB: manage users and roles, configure zlib, then prepare rollback script

metadata:
  id: mongodb-ep-05
  label: 'MongoDB: manage users and roles, configure zlib, then prepare rollback script'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: user-management
    retries: 1
  - id: stage_02
    service: mongodb
    case: mongod-config-update
    retries: 1
    param_overrides:
      target_journal_compressor: zlib
  - id: stage_03
    service: mongodb
    case: rollback-rehearsal
    retries: 1
