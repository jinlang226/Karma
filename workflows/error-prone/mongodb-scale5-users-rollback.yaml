# workflows/error-prone/mongodb-scale5-users-rollback
#
# MongoDB: scale to 5, provision users, then rehearse rollback

metadata:
  id: mongodb-scale5-users-rollback
  label: 'MongoDB: scale to 5, provision users, then rehearse rollback'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: replica-scaling
    retries: 0
    param_overrides:
      target_replicas: '5'
  - id: stage_02
    service: mongodb
    case: user-management
    retries: 0
  - id: stage_03
    service: mongodb
    case: rollback-rehearsal
    retries: 0
