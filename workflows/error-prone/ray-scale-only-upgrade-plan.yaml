# workflows/error-prone/ray-scale-only-upgrade-plan
#
# Ray: scale workers to 3, then write upgrade plan without applying

metadata:
  id: ray-scale-only-upgrade-plan
  label: 'Ray: scale workers to 3, then write upgrade plan without applying'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: ray
    case: deploy_cluster
    retries: 1
    param_overrides:
      worker_replicas: '2'
  - id: stage_02
    service: ray
    case: scale_workers
    retries: 1
    param_overrides:
      source_worker_replicas: '2'
      target_worker_replicas: '3'
  - id: stage_03
    service: ray
    case: change-plan-only
    retries: 1
