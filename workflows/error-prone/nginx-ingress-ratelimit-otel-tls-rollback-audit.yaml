# workflows/error-prone/nginx-ingress-ratelimit-otel-tls-rollback-audit
#
# Rate-limit + OTel + TLS — dual rollback+audit trap

metadata:
  id: nginx-ingress-ratelimit-otel-tls-rollback-audit
  label: Rate-limit + OTel + TLS — dual rollback+audit trap
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 1
    param_overrides:
      limit_rps: '4'
  - id: stage_02
    service: nginx-ingress
    case: otel_log_format
    retries: 1
  - id: stage_03
    service: nginx-ingress
    case: renew_tls_secret
    retries: 1
  - id: stage_04
    service: nginx-ingress
    case: rollback-rehearsal
    retries: 1
  - id: stage_05
    service: nginx-ingress
    case: readonly-audit
    retries: 1
