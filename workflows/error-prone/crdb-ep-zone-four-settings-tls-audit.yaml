# workflows/error-prone/crdb-ep-zone-four-settings-tls-audit
#
# Zone config, four rate-limit settings, TLS hardening, then compliance audit

metadata:
  id: crdb-ep-zone-four-settings-tls-audit
  label: Zone config, four rate-limit settings, TLS hardening, then compliance audit
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: zone-config
    retries: 1
    param_overrides:
      target_schema: tenant_b
      protected_schema: tenant_a
      gc_ttl_seconds: 14400
      num_replicas: 3
      range_min_bytes: 134217728
      range_max_bytes: 536870912
  - id: stage_02
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 224MiB
  - id: stage_03
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.snapshot_recovery.max_rate
      setting_value: 112MiB
  - id: stage_04
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.range_merge.queue_enabled
      setting_value: 'false'
  - id: stage_05
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: sql.defaults.statement_timeout
      setting_value: 75s
  - id: stage_06
    service: cockroachdb
    case: generate-cert
    retries: 1
  - id: stage_07
    service: cockroachdb
    case: readonly-audit
    retries: 1
