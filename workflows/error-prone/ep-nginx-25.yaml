# workflows/error-prone/ep-nginx-25
#
# TLS + progressive rate-limit tightening + canary — then audit trap

metadata:
  id: ep-nginx-25
  label: TLS + progressive rate-limit tightening + canary — then audit trap
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: renew_tls_secret
    retries: 1
  - id: stage_02
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 1
    param_overrides:
      limit_rps: '1'
  - id: stage_03
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 1
    param_overrides:
      limit_rps: '3'
  - id: stage_04
    service: nginx-ingress
    case: ingress_canary
    retries: 1
  - id: stage_05
    service: nginx-ingress
    case: readonly-audit
    retries: 1
