# workflows/error-prone/mongodb-ep-10
#
# MongoDB: set snappy compressor, rotate passwords, prepare rollback

metadata:
  id: mongodb-ep-10
  label: 'MongoDB: set snappy compressor, rotate passwords, prepare rollback'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: mongod-config-update
    retries: 1
    param_overrides:
      target_journal_compressor: snappy
  - id: stage_02
    service: mongodb
    case: password-rotation
    retries: 1
  - id: stage_03
    service: mongodb
    case: rollback-rehearsal
    retries: 1
