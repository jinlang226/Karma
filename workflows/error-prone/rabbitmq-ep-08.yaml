# workflows/error-prone/rabbitmq-ep-08
#
# RabbitMQ: Cluster Bring-Up and Prometheus Monitoring then Read-Only Compliance Audit

metadata:
  id: rabbitmq-ep-08
  label: 'RabbitMQ: Cluster Bring-Up and Prometheus Monitoring then Read-Only Compliance Audit'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: rabbitmq
    case: classic_queue
    retries: 1
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_02
    service: rabbitmq
    case: manual_monitoring
    retries: 1
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_03
    service: rabbitmq
    case: readonly-audit
    retries: 1
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
