# workflows/error-prone/nginx-ep-tls-ratelimit-audit
#
# TLS renew + rate-limit — then compliance audit trap

metadata:
  id: nginx-ep-tls-ratelimit-audit
  label: TLS renew + rate-limit — then compliance audit trap
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: renew_tls_secret
    retries: 1
  - id: stage_02
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 1
    param_overrides:
      limit_rps: '1'
  - id: stage_03
    service: nginx-ingress
    case: readonly-audit
    retries: 1
