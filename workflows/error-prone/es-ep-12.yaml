# workflows/error-prone/es-ep-12
#
# Elasticsearch — snapshot repo + password rotation, then write upgrade plan

metadata:
  id: es-ep-12
  label: Elasticsearch — snapshot repo + password rotation, then write upgrade plan
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: rotate-elastic-password
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: change-plan-only
    retries: 1
