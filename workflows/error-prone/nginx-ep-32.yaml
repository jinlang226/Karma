# workflows/error-prone/nginx-ep-32
#
# Security hardening sweep — then dual plan+rollback trap

metadata:
  id: nginx-ep-32
  label: Security hardening sweep — then dual plan+rollback trap
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 1
    param_overrides:
      limit_rps: '1'
  - id: stage_02
    service: nginx-ingress
    case: ingress_canary
    retries: 1
  - id: stage_03
    service: nginx-ingress
    case: renew_tls_secret
    retries: 1
  - id: stage_04
    service: nginx-ingress
    case: otel_log_format
    retries: 1
  - id: stage_05
    service: nginx-ingress
    case: change-plan-only
    retries: 1
  - id: stage_06
    service: nginx-ingress
    case: rollback-rehearsal
    retries: 1
