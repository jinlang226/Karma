# workflows/error-prone/crdb-ep-09
#
# Apply tight GC zone config, roll upgrade, then audit for compliance

metadata:
  id: crdb-ep-09
  label: Apply tight GC zone config, roll upgrade, then audit for compliance
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: zone-config
    retries: 1
    param_overrides:
      target_schema: tenant_b
      protected_schema: tenant_a
      gc_ttl_seconds: 1800
      num_replicas: 3
      range_min_bytes: 134217728
      range_max_bytes: 536870912
  - id: stage_02
    service: cockroachdb
    case: partitioned-update
    retries: 1
    param_overrides:
      to_version: 24.1.1
  - id: stage_03
    service: cockroachdb
    case: readonly-audit
    retries: 1
