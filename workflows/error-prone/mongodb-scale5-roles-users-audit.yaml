# workflows/error-prone/mongodb-scale5-roles-users-audit
#
# MongoDB: scale to 5, define custom roles, manage users, then audit

metadata:
  id: mongodb-scale5-roles-users-audit
  label: 'MongoDB: scale to 5, define custom roles, manage users, then audit'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: replica-scaling
    retries: 0
    param_overrides:
      target_replicas: '5'
  - id: stage_02
    service: mongodb
    case: custom-roles
    retries: 0
  - id: stage_03
    service: mongodb
    case: user-management
    retries: 0
  - id: stage_04
    service: mongodb
    case: readonly-audit
    retries: 0
