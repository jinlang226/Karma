# workflows/error-prone/mongodb-ep-13
#
# MongoDB: configure compressor, add users, rotate passwords, rehearse rollback

metadata:
  id: mongodb-ep-13
  label: 'MongoDB: configure compressor, add users, rotate passwords, rehearse rollback'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: mongod-config-update
    retries: 1
    param_overrides:
      target_journal_compressor: zlib
  - id: stage_02
    service: mongodb
    case: user-management
    retries: 1
  - id: stage_03
    service: mongodb
    case: password-rotation
    retries: 1
  - id: stage_04
    service: mongodb
    case: rollback-rehearsal
    retries: 1
