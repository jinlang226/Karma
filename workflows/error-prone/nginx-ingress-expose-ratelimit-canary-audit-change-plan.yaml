# workflows/error-prone/nginx-ingress-expose-ratelimit-canary-audit-change-plan
#
# Expose + rate-limit + canary — dual audit+plan trap

metadata:
  id: nginx-ingress-expose-ratelimit-canary-audit-change-plan
  label: Expose + rate-limit + canary — dual audit+plan trap
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: create_ingress
    retries: 0
  - id: stage_02
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 0
    param_overrides:
      limit_rps: '2'
  - id: stage_03
    service: nginx-ingress
    case: ingress_canary
    retries: 0
  - id: stage_04
    service: nginx-ingress
    case: readonly-audit
    retries: 0
  - id: stage_05
    service: nginx-ingress
    case: change-plan-only
    retries: 0
