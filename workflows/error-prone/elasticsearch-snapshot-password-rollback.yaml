# workflows/error-prone/elasticsearch-snapshot-password-rollback
#
# Elasticsearch — configure snapshot repository + rotate password, then rehearse rollback script

metadata:
  id: elasticsearch-snapshot-password-rollback
  label: Elasticsearch — configure snapshot repository + rotate password, then rehearse rollback script
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: rotate-elastic-password
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: rollback-rehearsal
    retries: 1
