# workflows/error-prone/elasticsearch-certs-password-rollback
#
# Elasticsearch — rotate HTTP certs + rotate password, then rehearse rollback (do NOT apply)

metadata:
  id: elasticsearch-certs-password-rollback
  label: Elasticsearch — rotate HTTP certs + rotate password, then rehearse rollback (do NOT apply)
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: rotate-http-certs
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: rotate-elastic-password
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: rollback-rehearsal
    retries: 1
