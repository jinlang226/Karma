# workflows/error-prone/mongodb-ep-28
#
# MongoDB: full hardening — configure, scale, provision, secure, plan, audit, rollback

metadata:
  id: mongodb-ep-28
  label: 'MongoDB: full hardening — configure, scale, provision, secure, plan, audit, rollback'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: mongod-config-update
    retries: 1
    param_overrides:
      target_journal_compressor: snappy
  - id: stage_02
    service: mongodb
    case: replica-scaling
    retries: 1
    param_overrides:
      target_replicas: '5'
  - id: stage_03
    service: mongodb
    case: user-management
    retries: 1
  - id: stage_04
    service: mongodb
    case: custom-roles
    retries: 1
  - id: stage_05
    service: mongodb
    case: password-rotation
    retries: 1
  - id: stage_06
    service: mongodb
    case: change-plan-only
    retries: 1
  - id: stage_07
    service: mongodb
    case: readonly-audit
    retries: 1
  - id: stage_08
    service: mongodb
    case: rollback-rehearsal
    retries: 1
