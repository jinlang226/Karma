# workflows/error-prone/mongodb-scale5-snappy-roles-rotate-audit
#
# MongoDB: scale to 5, configure, tighten roles, rotate passwords, then audit

metadata:
  id: mongodb-scale5-snappy-roles-rotate-audit
  label: 'MongoDB: scale to 5, configure, tighten roles, rotate passwords, then audit'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: replica-scaling
    retries: 0
    param_overrides:
      target_replicas: '5'
  - id: stage_02
    service: mongodb
    case: mongod-config-update
    retries: 0
    param_overrides:
      target_journal_compressor: snappy
  - id: stage_03
    service: mongodb
    case: custom-roles
    retries: 0
  - id: stage_04
    service: mongodb
    case: password-rotation
    retries: 0
  - id: stage_05
    service: mongodb
    case: readonly-audit
    retries: 0
