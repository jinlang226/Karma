# workflows/error-prone/ray-ep-scale-upgrade-job-audit
#
# Ray: scale + upgrade + submit job, then compliance audit

metadata:
  id: ray-ep-scale-upgrade-job-audit
  label: 'Ray: scale + upgrade + submit job, then compliance audit'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: ray
    case: deploy_cluster
    retries: 1
    param_overrides:
      worker_replicas: '2'
  - id: stage_02
    service: ray
    case: scale_workers
    retries: 1
    param_overrides:
      source_worker_replicas: '2'
      target_worker_replicas: '4'
  - id: stage_03
    service: ray
    case: upgrade_version
    retries: 1
    param_overrides:
      from_image: rayproject/ray:2.8.0
      to_image: rayproject/ray:2.9.0
  - id: stage_04
    service: ray
    case: job_submission
    retries: 1
    param_overrides:
      expected_output: pong
  - id: stage_05
    service: ray
    case: readonly-audit
    retries: 1
