# workflows/error-prone/mongodb-ep-scale5-snappy-audit
#
# MongoDB: scale to 5 replicas, configure snappy, then read-only compliance audit

metadata:
  id: mongodb-ep-scale5-snappy-audit
  label: 'MongoDB: scale to 5 replicas, configure snappy, then read-only compliance audit'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: replica-scaling
    retries: 1
    param_overrides:
      target_replicas: '5'
  - id: stage_02
    service: mongodb
    case: mongod-config-update
    retries: 1
    param_overrides:
      target_journal_compressor: snappy
  - id: stage_03
    service: mongodb
    case: readonly-audit
    retries: 1
