# workflows/error-prone/mongodb-ep-07
#
# MongoDB: deploy, rotate passwords, then draft upgrade plan

metadata:
  id: mongodb-ep-07
  label: 'MongoDB: deploy, rotate passwords, then draft upgrade plan'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: mongod-config-update
    retries: 1
    param_overrides:
      target_journal_compressor: snappy
  - id: stage_02
    service: mongodb
    case: password-rotation
    retries: 1
  - id: stage_03
    service: mongodb
    case: change-plan-only
    retries: 1
