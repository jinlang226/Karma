# workflows/error-prone/ray-ep-scale-dashboard-job-rollback
#
# Ray: deploy + scale to 3 + expose dashboard + submit job, then prepare rollback

metadata:
  id: ray-ep-scale-dashboard-job-rollback
  label: 'Ray: deploy + scale to 3 + expose dashboard + submit job, then prepare rollback'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: ray
    case: deploy_cluster
    retries: 1
    param_overrides:
      worker_replicas: '2'
  - id: stage_02
    service: ray
    case: scale_workers
    retries: 1
    param_overrides:
      source_worker_replicas: '2'
      target_worker_replicas: '3'
  - id: stage_03
    service: ray
    case: dashboard_exposure
    retries: 1
    param_overrides:
      dashboard_port: '8265'
  - id: stage_04
    service: ray
    case: job_submission
    retries: 1
    param_overrides:
      expected_output: pong
  - id: stage_05
    service: ray
    case: rollback-rehearsal
    retries: 1
