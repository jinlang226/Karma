# workflows/error-prone/ep-es-35
#
# Elasticsearch — snapshot repo + ingress + file-realm users, then rollback script

metadata:
  id: ep-es-35
  label: Elasticsearch — snapshot repo + ingress + file-realm users, then rollback script
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: secure-http-ingress
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: file-realm-user-roles-merge
    retries: 1
  - id: stage_05
    service: elasticsearch
    case: rollback-rehearsal
    retries: 1
