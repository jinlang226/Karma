# workflows/error-prone/nginx-ep-expose-ratelimit-canary-audit
#
# Expose + rate-limit + canary — then compliance audit trap

metadata:
  id: nginx-ep-expose-ratelimit-canary-audit
  label: Expose + rate-limit + canary — then compliance audit trap
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: create_ingress
    retries: 1
  - id: stage_02
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 1
    param_overrides:
      limit_rps: '2'
  - id: stage_03
    service: nginx-ingress
    case: ingress_canary
    retries: 1
  - id: stage_04
    service: nginx-ingress
    case: readonly-audit
    retries: 1
