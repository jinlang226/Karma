# workflows/error-prone/ray-ep-04
#
# Ray: deploy 4 workers + upgrade to 2.9.0, then write migration plan

metadata:
  id: ray-ep-04
  label: 'Ray: deploy 4 workers + upgrade to 2.9.0, then write migration plan'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: ray
    case: deploy_cluster
    retries: 1
    param_overrides:
      worker_replicas: '4'
  - id: stage_02
    service: ray
    case: upgrade_version
    retries: 1
    param_overrides:
      from_image: rayproject/ray:2.8.0
      to_image: rayproject/ray:2.9.0
  - id: stage_03
    service: ray
    case: change-plan-only
    retries: 1
