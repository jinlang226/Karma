# workflows/error-prone/mongodb-ep-39
#
# MongoDB: configure, scale, plan mid-way, rotate passwords, then rollback rehearsal

metadata:
  id: mongodb-ep-39
  label: 'MongoDB: configure, scale, plan mid-way, rotate passwords, then rollback rehearsal'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: mongod-config-update
    retries: 1
    param_overrides:
      target_journal_compressor: zlib
  - id: stage_02
    service: mongodb
    case: replica-scaling
    retries: 1
    param_overrides:
      target_replicas: '5'
  - id: stage_03
    service: mongodb
    case: change-plan-only
    retries: 1
  - id: stage_04
    service: mongodb
    case: password-rotation
    retries: 1
  - id: stage_05
    service: mongodb
    case: rollback-rehearsal
    retries: 1
