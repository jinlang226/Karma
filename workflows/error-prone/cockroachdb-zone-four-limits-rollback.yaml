# workflows/error-prone/cockroachdb-zone-four-limits-rollback
#
# Apply zone GC config and four throughput limits, then rehearse rollback

metadata:
  id: cockroachdb-zone-four-limits-rollback
  label: Apply zone GC config and four throughput limits, then rehearse rollback
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: zone-config
    retries: 0
    param_overrides:
      target_schema: tenant_b
      protected_schema: tenant_a
      gc_ttl_seconds: 14400
      num_replicas: 3
      range_min_bytes: 134217728
      range_max_bytes: 536870912
  - id: stage_02
    service: cockroachdb
    case: cluster-settings
    retries: 0
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 200MiB
  - id: stage_03
    service: cockroachdb
    case: cluster-settings
    retries: 0
    param_overrides:
      setting_name: kv.snapshot_recovery.max_rate
      setting_value: 100MiB
  - id: stage_04
    service: cockroachdb
    case: cluster-settings
    retries: 0
    param_overrides:
      setting_name: kv.range_merge.queue_enabled
      setting_value: 'false'
  - id: stage_05
    service: cockroachdb
    case: cluster-settings
    retries: 0
    param_overrides:
      setting_name: sql.defaults.statement_timeout
      setting_value: 90s
  - id: stage_06
    service: cockroachdb
    case: rollback-rehearsal
    retries: 0
