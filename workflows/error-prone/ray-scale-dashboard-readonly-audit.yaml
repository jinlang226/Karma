# workflows/error-prone/ray-scale-dashboard-readonly-audit
#
# Ray: scale workers to 3 + expose dashboard, then audit configuration without changes

metadata:
  id: ray-scale-dashboard-readonly-audit
  label: 'Ray: scale workers to 3 + expose dashboard, then audit configuration without changes'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: ray
    case: deploy_cluster
    retries: 0
    param_overrides:
      worker_replicas: '2'
  - id: stage_02
    service: ray
    case: scale_workers
    retries: 0
    param_overrides:
      source_worker_replicas: '2'
      target_worker_replicas: '3'
  - id: stage_03
    service: ray
    case: dashboard_exposure
    retries: 0
    param_overrides:
      dashboard_port: '8265'
  - id: stage_04
    service: ray
    case: readonly-audit
    retries: 0
