# workflows/error-prone/mongodb-users-scale7-snappy-audit
#
# MongoDB: provision users, scale to 7, configure snappy, then compliance audit

metadata:
  id: mongodb-users-scale7-snappy-audit
  label: 'MongoDB: provision users, scale to 7, configure snappy, then compliance audit'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: user-management
    retries: 0
  - id: stage_02
    service: mongodb
    case: replica-scaling
    retries: 0
    param_overrides:
      target_replicas: '7'
  - id: stage_03
    service: mongodb
    case: mongod-config-update
    retries: 0
    param_overrides:
      target_journal_compressor: snappy
  - id: stage_04
    service: mongodb
    case: readonly-audit
    retries: 0
