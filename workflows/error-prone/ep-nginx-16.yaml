# workflows/error-prone/ep-nginx-16
#
# Canary + TLS + OTel — dual rollback+plan trap

metadata:
  id: ep-nginx-16
  label: Canary + TLS + OTel — dual rollback+plan trap
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: ingress_canary
    retries: 1
  - id: stage_02
    service: nginx-ingress
    case: renew_tls_secret
    retries: 1
  - id: stage_03
    service: nginx-ingress
    case: otel_log_format
    retries: 1
  - id: stage_04
    service: nginx-ingress
    case: rollback-rehearsal
    retries: 1
  - id: stage_05
    service: nginx-ingress
    case: change-plan-only
    retries: 1
