# workflows/error-prone/cockroachdb-harden-rebalance-recovery-rollback
#
# Harden rebalance and recovery rates, then rehearse a rollback

metadata:
  id: cockroachdb-harden-rebalance-recovery-rollback
  label: Harden rebalance and recovery rates, then rehearse a rollback
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 320MiB
  - id: stage_02
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.snapshot_recovery.max_rate
      setting_value: 160MiB
  - id: stage_03
    service: cockroachdb
    case: rollback-rehearsal
    retries: 1
