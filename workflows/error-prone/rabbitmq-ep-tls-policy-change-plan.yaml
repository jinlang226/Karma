# workflows/error-prone/rabbitmq-ep-tls-policy-change-plan
#
# RabbitMQ: Bring-Up, TLS Rotation, and HA Policy Sync then Change Plan Only

metadata:
  id: rabbitmq-ep-tls-policy-change-plan
  label: 'RabbitMQ: Bring-Up, TLS Rotation, and HA Policy Sync then Change Plan Only'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: rabbitmq
    case: classic_queue
    retries: 1
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_02
    service: rabbitmq
    case: manual_tls_rotation
    retries: 1
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
      min_rotated_leaf_validity_days: '45'
  - id: stage_03
    service: rabbitmq
    case: manual_policy_sync
    retries: 1
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_04
    service: rabbitmq
    case: change-plan-only
    retries: 1
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
