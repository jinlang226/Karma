# workflows/error-prone/crdb-ep-12
#
# Upgrade and apply zone config, then audit compliance and prepare rollback

metadata:
  id: crdb-ep-12
  label: Upgrade and apply zone config, then audit compliance and prepare rollback
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: major-upgrade-finalize
    retries: 1
    param_overrides:
      from_version: '23.2'
      to_version: 24.1.0
  - id: stage_02
    service: cockroachdb
    case: zone-config
    retries: 1
    param_overrides:
      target_schema: tenant_b
      protected_schema: tenant_a
      gc_ttl_seconds: 14400
      num_replicas: 3
      range_min_bytes: 134217728
      range_max_bytes: 536870912
  - id: stage_03
    service: cockroachdb
    case: readonly-audit
    retries: 1
  - id: stage_04
    service: cockroachdb
    case: rollback-rehearsal
    retries: 1
