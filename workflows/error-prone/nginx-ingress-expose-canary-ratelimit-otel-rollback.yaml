# workflows/error-prone/nginx-ingress-expose-canary-ratelimit-otel-rollback
#
# Full bring-up hardening — then rollback trap

metadata:
  id: nginx-ingress-expose-canary-ratelimit-otel-rollback
  label: Full bring-up hardening — then rollback trap
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: create_ingress
    retries: 1
  - id: stage_02
    service: nginx-ingress
    case: ingress_canary
    retries: 1
  - id: stage_03
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 1
    param_overrides:
      limit_rps: '2'
  - id: stage_04
    service: nginx-ingress
    case: otel_log_format
    retries: 1
  - id: stage_05
    service: nginx-ingress
    case: rollback-rehearsal
    retries: 1
