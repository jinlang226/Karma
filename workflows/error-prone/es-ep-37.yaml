# workflows/error-prone/es-ep-37
#
# Elasticsearch — scale to 6, add users, snapshot repo, then audit and change plan

metadata:
  id: es-ep-37
  label: Elasticsearch — scale to 6, add users, snapshot repo, then audit and change plan
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 1
    param_overrides:
      expected_nodes: 6
  - id: stage_03
    service: elasticsearch
    case: file-realm-user-roles-merge
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 1
  - id: stage_05
    service: elasticsearch
    case: readonly-audit
    retries: 1
  - id: stage_06
    service: elasticsearch
    case: change-plan-only
    retries: 1
