# workflows/error-prone/mongodb-zlib-full-hardening-change-plan-audit-rollback
#
# MongoDB: zlib config, scale, users, roles, rotate — then plan, audit, and rollback rehearsal

metadata:
  id: mongodb-zlib-full-hardening-change-plan-audit-rollback
  label: 'MongoDB: zlib config, scale, users, roles, rotate — then plan, audit, and rollback rehearsal'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: mongod-config-update
    retries: 0
    param_overrides:
      target_journal_compressor: zlib
  - id: stage_02
    service: mongodb
    case: replica-scaling
    retries: 0
    param_overrides:
      target_replicas: '5'
  - id: stage_03
    service: mongodb
    case: user-management
    retries: 0
  - id: stage_04
    service: mongodb
    case: custom-roles
    retries: 0
  - id: stage_05
    service: mongodb
    case: password-rotation
    retries: 0
  - id: stage_06
    service: mongodb
    case: change-plan-only
    retries: 0
  - id: stage_07
    service: mongodb
    case: readonly-audit
    retries: 0
  - id: stage_08
    service: mongodb
    case: rollback-rehearsal
    retries: 0
