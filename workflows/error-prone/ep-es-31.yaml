# workflows/error-prone/ep-es-31
#
# Elasticsearch — rotate password + ingress, then write audit and upgrade plan

metadata:
  id: ep-es-31
  label: Elasticsearch — rotate password + ingress, then write audit and upgrade plan
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: rotate-elastic-password
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: secure-http-ingress
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: readonly-audit
    retries: 1
  - id: stage_05
    service: elasticsearch
    case: change-plan-only
    retries: 1
