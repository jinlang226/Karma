# workflows/error-prone/nginx-ingress-class-ratelimit-tls-otel-canary-rollback
#
# Hardening sweep (class+rate-limit+TLS+OTel+canary) — then rollback trap

metadata:
  id: nginx-ingress-class-ratelimit-tls-otel-canary-rollback
  label: Hardening sweep (class+rate-limit+TLS+OTel+canary) — then rollback trap
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: class_only_upgrade
    retries: 0
  - id: stage_02
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 0
    param_overrides:
      limit_rps: '2'
  - id: stage_03
    service: nginx-ingress
    case: renew_tls_secret
    retries: 0
  - id: stage_04
    service: nginx-ingress
    case: otel_log_format
    retries: 0
  - id: stage_05
    service: nginx-ingress
    case: ingress_canary
    retries: 0
  - id: stage_06
    service: nginx-ingress
    case: rollback-rehearsal
    retries: 0
