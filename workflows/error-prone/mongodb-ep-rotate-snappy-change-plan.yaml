# workflows/error-prone/mongodb-ep-rotate-snappy-change-plan
#
# MongoDB: rotate passwords, configure snappy, then draft next-change plan

metadata:
  id: mongodb-ep-rotate-snappy-change-plan
  label: 'MongoDB: rotate passwords, configure snappy, then draft next-change plan'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: password-rotation
    retries: 1
  - id: stage_02
    service: mongodb
    case: mongod-config-update
    retries: 1
    param_overrides:
      target_journal_compressor: snappy
  - id: stage_03
    service: mongodb
    case: change-plan-only
    retries: 1
