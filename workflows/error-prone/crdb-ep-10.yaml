# workflows/error-prone/crdb-ep-10
#
# Harden throughput, configure zones, enable TLS, then rehearse rollback

metadata:
  id: crdb-ep-10
  label: Harden throughput, configure zones, enable TLS, then rehearse rollback
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 512MiB
  - id: stage_02
    service: cockroachdb
    case: zone-config
    retries: 1
    param_overrides:
      target_schema: tenant_b
      protected_schema: tenant_a
      gc_ttl_seconds: 28800
      num_replicas: 3
      range_min_bytes: 67108864
      range_max_bytes: 268435456
  - id: stage_03
    service: cockroachdb
    case: generate-cert
    retries: 1
  - id: stage_04
    service: cockroachdb
    case: rollback-rehearsal
    retries: 1
