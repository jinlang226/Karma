# Elasticsearch — rotate HTTP certs then write compliance audit findings

metadata:
  id: ep-es-08
  label: Elasticsearch — rotate HTTP certs then write compliance audit findings
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: rotate-http-certs
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: readonly-audit
    retries: 1
