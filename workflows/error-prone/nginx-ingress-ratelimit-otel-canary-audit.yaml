# workflows/error-prone/nginx-ingress-ratelimit-otel-canary-audit
#
# Rate-limit + OTel + canary — then audit trap

metadata:
  id: nginx-ingress-ratelimit-otel-canary-audit
  label: Rate-limit + OTel + canary — then audit trap
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 1
    param_overrides:
      limit_rps: '2'
  - id: stage_02
    service: nginx-ingress
    case: otel_log_format
    retries: 1
  - id: stage_03
    service: nginx-ingress
    case: ingress_canary
    retries: 1
  - id: stage_04
    service: nginx-ingress
    case: readonly-audit
    retries: 1
