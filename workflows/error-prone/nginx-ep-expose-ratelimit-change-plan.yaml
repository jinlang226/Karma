# workflows/error-prone/nginx-ep-expose-ratelimit-change-plan
#
# Expose + rate-limit — then upgrade change-plan trap

metadata:
  id: nginx-ep-expose-ratelimit-change-plan
  label: Expose + rate-limit — then upgrade change-plan trap
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: create_ingress
    retries: 1
  - id: stage_02
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 1
    param_overrides:
      limit_rps: '3'
  - id: stage_03
    service: nginx-ingress
    case: change-plan-only
    retries: 1
