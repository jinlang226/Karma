# workflows/error-prone/nginx-ep-ratelimit-tighten-canary-change-plan
#
# Progressive rate-limit tightening + canary — then upgrade plan trap

metadata:
  id: nginx-ep-ratelimit-tighten-canary-change-plan
  label: Progressive rate-limit tightening + canary — then upgrade plan trap
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 1
    param_overrides:
      limit_rps: '5'
  - id: stage_02
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 1
    param_overrides:
      limit_rps: '1'
  - id: stage_03
    service: nginx-ingress
    case: ingress_canary
    retries: 1
  - id: stage_04
    service: nginx-ingress
    case: change-plan-only
    retries: 1
