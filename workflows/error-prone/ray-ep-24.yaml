# workflows/error-prone/ray-ep-24
#
# Ray: scale to 5 + expose dashboard, then write upgrade plan

metadata:
  id: ray-ep-24
  label: 'Ray: scale to 5 + expose dashboard, then write upgrade plan'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: ray
    case: deploy_cluster
    retries: 1
    param_overrides:
      worker_replicas: '2'
  - id: stage_02
    service: ray
    case: scale_workers
    retries: 1
    param_overrides:
      source_worker_replicas: '2'
      target_worker_replicas: '5'
  - id: stage_03
    service: ray
    case: dashboard_exposure
    retries: 1
    param_overrides:
      dashboard_port: '8265'
  - id: stage_04
    service: ray
    case: change-plan-only
    retries: 1
