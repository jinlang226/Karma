# workflows/error-prone/mongodb-ep-08
#
# MongoDB: deploy, define custom roles, then rehearse rollback

metadata:
  id: mongodb-ep-08
  label: 'MongoDB: deploy, define custom roles, then rehearse rollback'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: mongod-config-update
    retries: 1
    param_overrides:
      target_journal_compressor: zlib
  - id: stage_02
    service: mongodb
    case: custom-roles
    retries: 1
  - id: stage_03
    service: mongodb
    case: rollback-rehearsal
    retries: 1
