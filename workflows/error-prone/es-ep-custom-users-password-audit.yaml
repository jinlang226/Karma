# workflows/error-prone/es-ep-custom-users-password-audit
#
# Elasticsearch — add custom file-realm users, rotate password, then compliance audit

metadata:
  id: es-ep-custom-users-password-audit
  label: Elasticsearch — add custom file-realm users, rotate password, then compliance audit
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: file-realm-user-roles-merge
    retries: 1
    param_overrides:
      report_user: monitoring-user
      ops_user: platform-ops
      report_password: m0npass
      ops_password: platpass
  - id: stage_03
    service: elasticsearch
    case: rotate-elastic-password
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: readonly-audit
    retries: 1
