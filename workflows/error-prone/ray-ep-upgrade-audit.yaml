# workflows/error-prone/ray-ep-upgrade-audit
#
# Ray: upgrade to 2.9.0, then audit upgraded configuration

metadata:
  id: ray-ep-upgrade-audit
  label: 'Ray: upgrade to 2.9.0, then audit upgraded configuration'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: ray
    case: deploy_cluster
    retries: 1
    param_overrides:
      worker_replicas: '2'
  - id: stage_02
    service: ray
    case: upgrade_version
    retries: 1
    param_overrides:
      from_image: rayproject/ray:2.8.0
      to_image: rayproject/ray:2.9.0
  - id: stage_03
    service: ray
    case: readonly-audit
    retries: 1
