# workflows/error-prone/rabbitmq-ep-tls-rotation-audit
#
# RabbitMQ: Cluster Bring-Up and TLS Rotation then Read-Only Security Audit

metadata:
  id: rabbitmq-ep-tls-rotation-audit
  label: 'RabbitMQ: Cluster Bring-Up and TLS Rotation then Read-Only Security Audit'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: rabbitmq
    case: classic_queue
    retries: 1
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_02
    service: rabbitmq
    case: manual_tls_rotation
    retries: 1
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
      min_rotated_leaf_validity_days: '45'
  - id: stage_03
    service: rabbitmq
    case: readonly-audit
    retries: 1
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
