# workflows/error-prone/mongodb-ep-06
#
# MongoDB: deploy, scale to 5, then compliance audit

metadata:
  id: mongodb-ep-06
  label: 'MongoDB: deploy, scale to 5, then compliance audit'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: mongod-config-update
    retries: 1
    param_overrides:
      target_journal_compressor: zlib
  - id: stage_02
    service: mongodb
    case: replica-scaling
    retries: 1
    param_overrides:
      target_replicas: '5'
  - id: stage_03
    service: mongodb
    case: readonly-audit
    retries: 1
