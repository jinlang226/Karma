# workflows/error-prone/elasticsearch-password-scale-rollback
#
# Elasticsearch — rotate password + scale to 5 nodes, rehearse rollback script (do NOT run it)

metadata:
  id: elasticsearch-password-scale-rollback
  label: Elasticsearch — rotate password + scale to 5 nodes, rehearse rollback script (do NOT run it)
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
  - id: stage_02
    service: elasticsearch
    case: rotate-elastic-password
    retries: 0
  - id: stage_03
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 0
    param_overrides:
      expected_nodes: 5
  - id: stage_04
    service: elasticsearch
    case: rollback-rehearsal
    retries: 0
