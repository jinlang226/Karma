# workflows/error-prone/crdb-ep-29
#
# Aggressively tune five cluster settings, then rehearse a complete rollback

metadata:
  id: crdb-ep-29
  label: Aggressively tune five cluster settings, then rehearse a complete rollback
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 640MiB
  - id: stage_02
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.snapshot_recovery.max_rate
      setting_value: 320MiB
  - id: stage_03
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.range_merge.queue_enabled
      setting_value: 'false'
  - id: stage_04
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: sql.defaults.statement_timeout
      setting_value: 120s
  - id: stage_05
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.closed_timestamp.target_duration
      setting_value: 1s
  - id: stage_06
    service: cockroachdb
    case: rollback-rehearsal
    retries: 1
