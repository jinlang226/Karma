# workflows/error-prone/nginx-ep-tls-class-canary-ratelimit-change-plan
#
# TLS + class fix + canary + rate-limit — then upgrade plan trap

metadata:
  id: nginx-ep-tls-class-canary-ratelimit-change-plan
  label: TLS + class fix + canary + rate-limit — then upgrade plan trap
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: renew_tls_secret
    retries: 1
  - id: stage_02
    service: nginx-ingress
    case: class_only_upgrade
    retries: 1
  - id: stage_03
    service: nginx-ingress
    case: ingress_canary
    retries: 1
  - id: stage_04
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 1
    param_overrides:
      limit_rps: '2'
  - id: stage_05
    service: nginx-ingress
    case: change-plan-only
    retries: 1
