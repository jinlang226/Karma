# workflows/error-prone/mongodb-ep-09
#
# MongoDB: tune journal compressor, scale to 5, then read-only audit

metadata:
  id: mongodb-ep-09
  label: 'MongoDB: tune journal compressor, scale to 5, then read-only audit'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: mongod-config-update
    retries: 1
    param_overrides:
      target_journal_compressor: zlib
  - id: stage_02
    service: mongodb
    case: replica-scaling
    retries: 1
    param_overrides:
      target_replicas: '5'
  - id: stage_03
    service: mongodb
    case: readonly-audit
    retries: 1
