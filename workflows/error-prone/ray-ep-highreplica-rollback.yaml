# workflows/error-prone/ray-ep-highreplica-rollback
#
# Ray: deploy 5 workers + expose dashboard, then prepare rollback

metadata:
  id: ray-ep-highreplica-rollback
  label: 'Ray: deploy 5 workers + expose dashboard, then prepare rollback'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: ray
    case: deploy_cluster
    retries: 1
    param_overrides:
      worker_replicas: '5'
  - id: stage_02
    service: ray
    case: dashboard_exposure
    retries: 1
    param_overrides:
      dashboard_port: '8265'
  - id: stage_03
    service: ray
    case: rollback-rehearsal
    retries: 1
