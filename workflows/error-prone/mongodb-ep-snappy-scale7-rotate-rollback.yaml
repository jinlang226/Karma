# workflows/error-prone/mongodb-ep-snappy-scale7-rotate-rollback
#
# MongoDB: configure snappy, scale to 7, rotate passwords, then rollback rehearsal

metadata:
  id: mongodb-ep-snappy-scale7-rotate-rollback
  label: 'MongoDB: configure snappy, scale to 7, rotate passwords, then rollback rehearsal'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: mongod-config-update
    retries: 1
    param_overrides:
      target_journal_compressor: snappy
  - id: stage_02
    service: mongodb
    case: replica-scaling
    retries: 1
    param_overrides:
      target_replicas: '7'
  - id: stage_03
    service: mongodb
    case: password-rotation
    retries: 1
  - id: stage_04
    service: mongodb
    case: rollback-rehearsal
    retries: 1
