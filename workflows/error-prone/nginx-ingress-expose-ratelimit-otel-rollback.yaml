# workflows/error-prone/nginx-ingress-expose-ratelimit-otel-rollback
#
# Expose + rate-limit + OTel — then rollback trap

metadata:
  id: nginx-ingress-expose-ratelimit-otel-rollback
  label: Expose + rate-limit + OTel — then rollback trap
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: create_ingress
    retries: 0
  - id: stage_02
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 0
    param_overrides:
      limit_rps: '3'
  - id: stage_03
    service: nginx-ingress
    case: otel_log_format
    retries: 0
  - id: stage_04
    service: nginx-ingress
    case: rollback-rehearsal
    retries: 0
