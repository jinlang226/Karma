# workflows/error-prone/elasticsearch-scale-password-change-plan
#
# Elasticsearch — scale up then rotate password, then write upgrade plan

metadata:
  id: elasticsearch-scale-password-change-plan
  label: Elasticsearch — scale up then rotate password, then write upgrade plan
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
  - id: stage_02
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 0
    param_overrides:
      expected_nodes: 5
  - id: stage_03
    service: elasticsearch
    case: rotate-elastic-password
    retries: 0
  - id: stage_04
    service: elasticsearch
    case: change-plan-only
    retries: 0
