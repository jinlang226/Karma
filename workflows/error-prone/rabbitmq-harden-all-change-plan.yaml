# workflows/error-prone/rabbitmq-harden-all-change-plan
#
# RabbitMQ: Full 4-Step Hardening then Change Plan Only (do NOT apply)

metadata:
  id: rabbitmq-harden-all-change-plan
  label: 'RabbitMQ: Full 4-Step Hardening then Change Plan Only (do NOT apply)'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: rabbitmq
    case: classic_queue
    retries: 1
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_02
    service: rabbitmq
    case: manual_policy_sync
    retries: 1
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_03
    service: rabbitmq
    case: manual_user_permission
    retries: 1
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_04
    service: rabbitmq
    case: manual_monitoring
    retries: 1
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_05
    service: rabbitmq
    case: manual_tls_rotation
    retries: 1
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
      min_rotated_leaf_validity_days: '45'
  - id: stage_06
    service: rabbitmq
    case: change-plan-only
    retries: 1
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
