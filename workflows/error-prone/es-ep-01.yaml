# workflows/error-prone/es-ep-01
#
# Elasticsearch — rotate password + add file-realm users, then compliance audit

metadata:
  id: es-ep-01
  label: Elasticsearch — rotate password + add file-realm users, then compliance audit
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: rotate-elastic-password
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: file-realm-user-roles-merge
    retries: 1
    param_overrides:
      report_user: report-user
      ops_user: ops-user
  - id: stage_04
    service: elasticsearch
    case: readonly-audit
    retries: 1
