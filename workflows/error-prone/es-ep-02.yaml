# workflows/error-prone/es-ep-02
#
# Elasticsearch — rotate password, rehearse rollback script (do NOT run it)

metadata:
  id: es-ep-02
  label: Elasticsearch — rotate password, rehearse rollback script (do NOT run it)
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: rotate-elastic-password
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: rollback-rehearsal
    retries: 1
