# workflows/error-prone/elasticsearch-certs-users-snapshot-rollback
#
# Elasticsearch — rotate certs, add file-realm users, snapshot repo, then rollback rehearsal

metadata:
  id: elasticsearch-certs-users-snapshot-rollback
  label: Elasticsearch — rotate certs, add file-realm users, snapshot repo, then rollback rehearsal
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: rotate-http-certs
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: file-realm-user-roles-merge
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 1
  - id: stage_05
    service: elasticsearch
    case: rollback-rehearsal
    retries: 1
