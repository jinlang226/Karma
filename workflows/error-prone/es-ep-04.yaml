# workflows/error-prone/es-ep-04
#
# Elasticsearch — scale up to 5 nodes then prepare rollback script

metadata:
  id: es-ep-04
  label: Elasticsearch — scale up to 5 nodes then prepare rollback script
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 1
    param_overrides:
      expected_nodes: 5
  - id: stage_03
    service: elasticsearch
    case: rollback-rehearsal
    retries: 1
