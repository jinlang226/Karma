# Full breadth: runtime-ops + streaming + multi-tenant + SparkPi fix + readonly-audit trap

metadata:
  id: spark-ep-runtime-ops-streaming-multi-tenant-sparkpi-audit
  label: 'Full breadth: runtime-ops + streaming + multi-tenant + SparkPi fix + readonly-audit trap'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: spark
    case: spark_runtime_ops
    retries: 1
  - id: stage_02
    service: spark
    case: spark_streaming_autoscale
    retries: 1
  - id: stage_03
    service: spark
    case: spark_multi_tenant
    retries: 1
  - id: stage_04
    service: spark
    case: deploy_spark_pi
    retries: 1
  - id: stage_05
    service: spark
    case: readonly-audit
    retries: 1
