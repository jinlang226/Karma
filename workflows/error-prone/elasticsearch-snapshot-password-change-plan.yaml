# workflows/error-prone/elasticsearch-snapshot-password-change-plan
#
# Elasticsearch — snapshot repo + password rotation, then write upgrade plan

metadata:
  id: elasticsearch-snapshot-password-change-plan
  label: Elasticsearch — snapshot repo + password rotation, then write upgrade plan
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
  - id: stage_02
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 0
  - id: stage_03
    service: elasticsearch
    case: rotate-elastic-password
    retries: 0
  - id: stage_04
    service: elasticsearch
    case: change-plan-only
    retries: 0
