# workflows/error-prone/nginx-ingress-class-canary-rollback
#
# IngressClass fix + canary — then rollback-rehearsal trap

metadata:
  id: nginx-ingress-class-canary-rollback
  label: IngressClass fix + canary — then rollback-rehearsal trap
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: class_only_upgrade
    retries: 1
  - id: stage_02
    service: nginx-ingress
    case: ingress_canary
    retries: 1
  - id: stage_03
    service: nginx-ingress
    case: rollback-rehearsal
    retries: 1
