# workflows/error-prone/ep-es-03
#
# Elasticsearch — rotate password and HTTP certs, then write upgrade plan

metadata:
  id: ep-es-03
  label: Elasticsearch — rotate password and HTTP certs, then write upgrade plan
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: rotate-elastic-password
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: rotate-http-certs
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: change-plan-only
    retries: 1
