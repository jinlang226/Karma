# workflows/error-prone/nginx-ingress-ratelimit-canary-otel-change-plan
#
# Rate-limit + canary + OTel — then upgrade change-plan trap

metadata:
  id: nginx-ingress-ratelimit-canary-otel-change-plan
  label: Rate-limit + canary + OTel — then upgrade change-plan trap
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 1
    param_overrides:
      limit_rps: '3'
  - id: stage_02
    service: nginx-ingress
    case: ingress_canary
    retries: 1
  - id: stage_03
    service: nginx-ingress
    case: otel_log_format
    retries: 1
  - id: stage_04
    service: nginx-ingress
    case: change-plan-only
    retries: 1
