# workflows/error-prone/ray-ep-scale5-changeplan
#
# Ray: scale workers to 5, then write upgrade plan without applying

metadata:
  id: ray-ep-scale5-changeplan
  label: 'Ray: scale workers to 5, then write upgrade plan without applying'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: ray
    case: deploy_cluster
    retries: 1
    param_overrides:
      worker_replicas: '2'
  - id: stage_02
    service: ray
    case: scale_workers
    retries: 1
    param_overrides:
      source_worker_replicas: '2'
      target_worker_replicas: '5'
  - id: stage_03
    service: ray
    case: change-plan-only
    retries: 1
