# workflows/error-prone/nginx-ingress-class-otel-canary-tls-audit
#
# Class fix + OTel + canary + TLS — then audit trap

metadata:
  id: nginx-ingress-class-otel-canary-tls-audit
  label: Class fix + OTel + canary + TLS — then audit trap
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: class_only_upgrade
    retries: 0
  - id: stage_02
    service: nginx-ingress
    case: otel_log_format
    retries: 0
  - id: stage_03
    service: nginx-ingress
    case: ingress_canary
    retries: 0
  - id: stage_04
    service: nginx-ingress
    case: renew_tls_secret
    retries: 0
  - id: stage_05
    service: nginx-ingress
    case: readonly-audit
    retries: 0
