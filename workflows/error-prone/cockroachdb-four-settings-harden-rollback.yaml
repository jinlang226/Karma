# workflows/error-prone/cockroachdb-four-settings-harden-rollback
#
# Apply four config hardening settings, then rehearse a full rollback

metadata:
  id: cockroachdb-four-settings-harden-rollback
  label: Apply four config hardening settings, then rehearse a full rollback
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 256MiB
  - id: stage_02
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.snapshot_recovery.max_rate
      setting_value: 128MiB
  - id: stage_03
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.range_merge.queue_enabled
      setting_value: 'false'
  - id: stage_04
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: sql.defaults.statement_timeout
      setting_value: 60s
  - id: stage_05
    service: cockroachdb
    case: rollback-rehearsal
    retries: 1
