# workflows/error-prone/nginx-ep-30
#
# Class + OTel + canary + rate-limit — triple trap (rollback+audit+plan)

metadata:
  id: nginx-ep-30
  label: Class + OTel + canary + rate-limit — triple trap (rollback+audit+plan)
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: class_only_upgrade
    retries: 1
  - id: stage_02
    service: nginx-ingress
    case: otel_log_format
    retries: 1
  - id: stage_03
    service: nginx-ingress
    case: ingress_canary
    retries: 1
  - id: stage_04
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 1
    param_overrides:
      limit_rps: '3'
  - id: stage_05
    service: nginx-ingress
    case: rollback-rehearsal
    retries: 1
  - id: stage_06
    service: nginx-ingress
    case: readonly-audit
    retries: 1
  - id: stage_07
    service: nginx-ingress
    case: change-plan-only
    retries: 1
