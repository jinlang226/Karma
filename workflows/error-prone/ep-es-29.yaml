# workflows/error-prone/ep-es-29
#
# Elasticsearch — rotate certs + password + file-realm, then audit and change plan

metadata:
  id: ep-es-29
  label: Elasticsearch — rotate certs + password + file-realm, then audit and change plan
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: rotate-http-certs
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: rotate-elastic-password
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: file-realm-user-roles-merge
    retries: 1
  - id: stage_05
    service: elasticsearch
    case: readonly-audit
    retries: 1
  - id: stage_06
    service: elasticsearch
    case: change-plan-only
    retries: 1
