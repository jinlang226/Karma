# workflows/error-prone/ray-ep-scale3-audit
#
# Ray: scale workers to 3, then audit configuration without changes

metadata:
  id: ray-ep-scale3-audit
  label: 'Ray: scale workers to 3, then audit configuration without changes'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: ray
    case: deploy_cluster
    retries: 1
    param_overrides:
      worker_replicas: '2'
  - id: stage_02
    service: ray
    case: scale_workers
    retries: 1
    param_overrides:
      source_worker_replicas: '2'
      target_worker_replicas: '3'
  - id: stage_03
    service: ray
    case: readonly-audit
    retries: 1
