# workflows/error-prone/es-ep-password-scale-certs-audit
#
# Elasticsearch — deploy, rotate password, scale up, rotate certs, then compliance audit

metadata:
  id: es-ep-password-scale-certs-audit
  label: Elasticsearch — deploy, rotate password, scale up, rotate certs, then compliance audit
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: rotate-elastic-password
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 1
    param_overrides:
      expected_nodes: 5
  - id: stage_04
    service: elasticsearch
    case: rotate-http-certs
    retries: 1
  - id: stage_05
    service: elasticsearch
    case: readonly-audit
    retries: 1
