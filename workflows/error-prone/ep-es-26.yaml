# workflows/error-prone/ep-es-26
#
# Elasticsearch — password + audit trap mid-pipeline, then scale and cert rotation

metadata:
  id: ep-es-26
  label: Elasticsearch — password + audit trap mid-pipeline, then scale and cert rotation
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: rotate-elastic-password
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: readonly-audit
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 1
    param_overrides:
      expected_nodes: 5
  - id: stage_05
    service: elasticsearch
    case: rotate-http-certs
    retries: 1
