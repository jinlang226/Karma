# workflows/error-prone/cockroachdb-rebalance-zone-rollback
#
# Harden throughput, configure tenant zones, then rehearse rollback

metadata:
  id: cockroachdb-rebalance-zone-rollback
  label: Harden throughput, configure tenant zones, then rehearse rollback
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 512MiB
  - id: stage_02
    service: cockroachdb
    case: zone-config
    retries: 1
    param_overrides:
      target_schema: tenant_b
      protected_schema: tenant_a
      gc_ttl_seconds: 14400
      num_replicas: 3
      range_min_bytes: 134217728
      range_max_bytes: 536870912
  - id: stage_03
    service: cockroachdb
    case: rollback-rehearsal
    retries: 1
