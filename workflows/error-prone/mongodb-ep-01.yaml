# workflows/error-prone/mongodb-ep-01
#
# MongoDB: set zlib journal compressor, scale to 5, then rehearse rollback

metadata:
  id: mongodb-ep-01
  label: 'MongoDB: set zlib journal compressor, scale to 5, then rehearse rollback'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: mongod-config-update
    retries: 1
    param_overrides:
      target_journal_compressor: zlib
  - id: stage_02
    service: mongodb
    case: replica-scaling
    retries: 1
    param_overrides:
      target_replicas: '5'
  - id: stage_03
    service: mongodb
    case: rollback-rehearsal
    retries: 1
