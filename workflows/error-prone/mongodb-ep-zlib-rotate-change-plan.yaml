# workflows/error-prone/mongodb-ep-zlib-rotate-change-plan
#
# MongoDB: set zlib, rotate passwords, then plan the next change window

metadata:
  id: mongodb-ep-zlib-rotate-change-plan
  label: 'MongoDB: set zlib, rotate passwords, then plan the next change window'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: mongod-config-update
    retries: 1
    param_overrides:
      target_journal_compressor: zlib
  - id: stage_02
    service: mongodb
    case: password-rotation
    retries: 1
  - id: stage_03
    service: mongodb
    case: change-plan-only
    retries: 1
