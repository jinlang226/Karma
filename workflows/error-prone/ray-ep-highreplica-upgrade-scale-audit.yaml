# workflows/error-prone/ray-ep-highreplica-upgrade-scale-audit
#
# Ray: deploy 3 workers + upgrade + scale to 6, then audit

metadata:
  id: ray-ep-highreplica-upgrade-scale-audit
  label: 'Ray: deploy 3 workers + upgrade + scale to 6, then audit'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: ray
    case: deploy_cluster
    retries: 1
    param_overrides:
      worker_replicas: '3'
  - id: stage_02
    service: ray
    case: upgrade_version
    retries: 1
    param_overrides:
      from_image: rayproject/ray:2.8.0
      to_image: rayproject/ray:2.9.0
  - id: stage_03
    service: ray
    case: scale_workers
    retries: 1
    param_overrides:
      source_worker_replicas: '3'
      target_worker_replicas: '6'
  - id: stage_04
    service: ray
    case: readonly-audit
    retries: 1
