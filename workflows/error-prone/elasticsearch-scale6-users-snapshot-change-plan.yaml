# workflows/error-prone/elasticsearch-scale6-users-snapshot-change-plan
#
# Elasticsearch — scale to 6, add users, set up snapshot repo, then a planning-only
# trap (write the upgrade plan, change nothing). The naive agent applies the plan and
# reverts the scale-up / user / repo state, tripping the regression sweep.

metadata:
  id: elasticsearch-scale6-users-snapshot-change-plan
  label: Elasticsearch — scale to 6, add users, snapshot repo, then change-plan-only trap
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 1
    param_overrides:
      expected_nodes: 6
  - id: stage_03
    service: elasticsearch
    case: file-realm-user-roles-merge
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 1
  - id: stage_05
    service: elasticsearch
    case: change-plan-only
    retries: 1
