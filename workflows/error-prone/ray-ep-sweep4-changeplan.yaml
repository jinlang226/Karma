# workflows/error-prone/ray-ep-sweep4-changeplan
#
# Ray: 3-step scale sweep 1→2→3→4, then write downscale plan

metadata:
  id: ray-ep-sweep4-changeplan
  label: 'Ray: 3-step scale sweep 1→2→3→4, then write downscale plan'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: ray
    case: deploy_cluster
    retries: 1
    param_overrides:
      worker_replicas: '1'
  - id: stage_02
    service: ray
    case: scale_workers
    retries: 1
    param_overrides:
      source_worker_replicas: '1'
      target_worker_replicas: '2'
  - id: stage_03
    service: ray
    case: scale_workers
    retries: 1
    param_overrides:
      source_worker_replicas: '2'
      target_worker_replicas: '3'
  - id: stage_04
    service: ray
    case: scale_workers
    retries: 1
    param_overrides:
      source_worker_replicas: '3'
      target_worker_replicas: '4'
  - id: stage_05
    service: ray
    case: change-plan-only
    retries: 1
