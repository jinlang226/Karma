# workflows/error-prone/es-ep-snapshot-password-audit
#
# Elasticsearch — configure snapshot repository + rotate password, then compliance audit

metadata:
  id: es-ep-snapshot-password-audit
  label: Elasticsearch — configure snapshot repository + rotate password, then compliance audit
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: rotate-elastic-password
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: readonly-audit
    retries: 1
