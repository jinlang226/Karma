# workflows/error-prone/ep-es-33
#
# Elasticsearch — scale to 6 nodes, rotate HTTP certs, snapshot, then write upgrade plan

metadata:
  id: ep-es-33
  label: Elasticsearch — scale to 6 nodes, rotate HTTP certs, snapshot, then write upgrade plan
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 1
    param_overrides:
      expected_nodes: 6
  - id: stage_03
    service: elasticsearch
    case: rotate-http-certs
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 1
  - id: stage_05
    service: elasticsearch
    case: change-plan-only
    retries: 1
