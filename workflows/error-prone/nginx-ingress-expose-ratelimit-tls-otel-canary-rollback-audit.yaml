# workflows/error-prone/nginx-ingress-expose-ratelimit-tls-otel-canary-rollback-audit
#
# Complete operational lifecycle — dual rollback+audit trap

metadata:
  id: nginx-ingress-expose-ratelimit-tls-otel-canary-rollback-audit
  label: Complete operational lifecycle — dual rollback+audit trap
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: create_ingress
    retries: 0
  - id: stage_02
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 0
    param_overrides:
      limit_rps: '2'
  - id: stage_03
    service: nginx-ingress
    case: renew_tls_secret
    retries: 0
  - id: stage_04
    service: nginx-ingress
    case: otel_log_format
    retries: 0
  - id: stage_05
    service: nginx-ingress
    case: ingress_canary
    retries: 0
  - id: stage_06
    service: nginx-ingress
    case: rollback-rehearsal
    retries: 0
  - id: stage_07
    service: nginx-ingress
    case: readonly-audit
    retries: 0
