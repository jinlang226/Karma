# workflows/error-prone/crdb-ep-rebalance-recovery-raftlog-rollback
#
# Tune three cluster settings progressively, then rehearse full rollback

metadata:
  id: crdb-ep-rebalance-recovery-raftlog-rollback
  label: Tune three cluster settings progressively, then rehearse full rollback
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 64MiB
  - id: stage_02
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.snapshot_recovery.max_rate
      setting_value: 16MiB
  - id: stage_03
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.raft_log.synchronize
      setting_value: 'false'
  - id: stage_04
    service: cockroachdb
    case: rollback-rehearsal
    retries: 1
