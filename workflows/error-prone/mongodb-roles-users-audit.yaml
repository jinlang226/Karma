# workflows/error-prone/mongodb-roles-users-audit
#
# MongoDB: define custom roles, provision users, then compliance audit

metadata:
  id: mongodb-roles-users-audit
  label: 'MongoDB: define custom roles, provision users, then compliance audit'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: custom-roles
    retries: 0
  - id: stage_02
    service: mongodb
    case: user-management
    retries: 0
  - id: stage_03
    service: mongodb
    case: readonly-audit
    retries: 0
