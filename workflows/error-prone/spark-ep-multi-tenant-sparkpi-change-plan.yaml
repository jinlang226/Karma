# workflows/error-prone/spark-ep-multi-tenant-sparkpi-change-plan
#
# Multi-tenant fix then SparkPi fix then change-plan-only trap

metadata:
  id: spark-ep-multi-tenant-sparkpi-change-plan
  label: Multi-tenant fix then SparkPi fix then change-plan-only trap
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: spark
    case: spark_multi_tenant
    retries: 1
  - id: stage_02
    service: spark
    case: deploy_spark_pi
    retries: 1
  - id: stage_03
    service: spark
    case: change-plan-only
    retries: 1
