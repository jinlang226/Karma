# workflows/error-prone/rabbitmq-permissions-change-plan
#
# RabbitMQ: Cluster Bring-Up and User Permissions then Change Plan Only

metadata:
  id: rabbitmq-permissions-change-plan
  label: 'RabbitMQ: Cluster Bring-Up and User Permissions then Change Plan Only'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: rabbitmq
    case: classic_queue
    retries: 1
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_02
    service: rabbitmq
    case: manual_user_permission
    retries: 1
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
  - id: stage_03
    service: rabbitmq
    case: change-plan-only
    retries: 1
    namespaces:
    - cluster_a
    namespace_binding:
      default: cluster_a
    param_overrides:
      cluster_prefix: rabbitmq
