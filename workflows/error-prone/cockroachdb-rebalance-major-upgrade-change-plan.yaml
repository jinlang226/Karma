# workflows/error-prone/cockroachdb-rebalance-major-upgrade-change-plan
#
# Harden rebalance rate, finalize major upgrade, then prepare the next change plan

metadata:
  id: cockroachdb-rebalance-major-upgrade-change-plan
  label: Harden rebalance rate, finalize major upgrade, then prepare the next change plan
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 256MiB
  - id: stage_02
    service: cockroachdb
    case: major-upgrade-finalize
    retries: 1
    param_overrides:
      from_version: '23.2'
      to_version: 24.1.0
  - id: stage_03
    service: cockroachdb
    case: change-plan-only
    retries: 1
