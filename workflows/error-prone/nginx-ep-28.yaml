# workflows/error-prone/nginx-ep-28
#
# Rate-limit + OTel — mid-flow audit trap — then tighten + canary

metadata:
  id: nginx-ep-28
  label: Rate-limit + OTel — mid-flow audit trap — then tighten + canary
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 1
    param_overrides:
      limit_rps: '2'
  - id: stage_02
    service: nginx-ingress
    case: otel_log_format
    retries: 1
  - id: stage_03
    service: nginx-ingress
    case: readonly-audit
    retries: 1
  - id: stage_04
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 1
    param_overrides:
      limit_rps: '8'
  - id: stage_05
    service: nginx-ingress
    case: ingress_canary
    retries: 1
