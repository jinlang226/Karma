# workflows/error-prone/crdb-ep-24
#
# Rolling upgrade then finalize, audit compliance, draft next change plan

metadata:
  id: crdb-ep-24
  label: Rolling upgrade then finalize, audit compliance, draft next change plan
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: partitioned-update
    retries: 1
    param_overrides:
      to_version: 24.1.1
  - id: stage_02
    service: cockroachdb
    case: major-upgrade-finalize
    retries: 1
    param_overrides:
      from_version: '23.2'
      to_version: 24.1.0
  - id: stage_03
    service: cockroachdb
    case: readonly-audit
    retries: 1
  - id: stage_04
    service: cockroachdb
    case: change-plan-only
    retries: 1
