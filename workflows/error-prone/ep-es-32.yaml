# workflows/error-prone/ep-es-32
#
# Elasticsearch — password rotation, mid-audit, snapshot, then final rollback script

metadata:
  id: ep-es-32
  label: Elasticsearch — password rotation, mid-audit, snapshot, then final rollback script
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: rotate-elastic-password
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: readonly-audit
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 1
  - id: stage_05
    service: elasticsearch
    case: rotate-http-certs
    retries: 1
  - id: stage_06
    service: elasticsearch
    case: rollback-rehearsal
    retries: 1
