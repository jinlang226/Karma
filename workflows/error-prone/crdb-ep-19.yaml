# workflows/error-prone/crdb-ep-19
#
# Finalize major upgrade and harden three cluster settings, then plan next upgrade

metadata:
  id: crdb-ep-19
  label: Finalize major upgrade and harden three cluster settings, then plan next upgrade
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: major-upgrade-finalize
    retries: 1
    param_overrides:
      from_version: '23.2'
      to_version: 24.1.0
  - id: stage_02
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 160MiB
  - id: stage_03
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.snapshot_recovery.max_rate
      setting_value: 80MiB
  - id: stage_04
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: sql.defaults.statement_timeout
      setting_value: 45s
  - id: stage_05
    service: cockroachdb
    case: change-plan-only
    retries: 1
