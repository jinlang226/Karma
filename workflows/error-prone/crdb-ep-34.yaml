# workflows/error-prone/crdb-ep-34
#
# Major upgrade, three zone reconfigurations, two settings, then audit and plan

metadata:
  id: crdb-ep-34
  label: Major upgrade, three zone reconfigurations, two settings, then audit and plan
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: major-upgrade-finalize
    retries: 1
    param_overrides:
      from_version: '23.2'
      to_version: 24.1.0
  - id: stage_02
    service: cockroachdb
    case: zone-config
    retries: 1
    param_overrides:
      target_schema: tenant_b
      protected_schema: tenant_a
      gc_ttl_seconds: 3600
      num_replicas: 3
      range_min_bytes: 67108864
      range_max_bytes: 268435456
  - id: stage_03
    service: cockroachdb
    case: zone-config
    retries: 1
    param_overrides:
      target_schema: tenant_b
      protected_schema: tenant_a
      gc_ttl_seconds: 7200
      num_replicas: 3
      range_min_bytes: 134217728
      range_max_bytes: 536870912
  - id: stage_04
    service: cockroachdb
    case: zone-config
    retries: 1
    param_overrides:
      target_schema: tenant_b
      protected_schema: tenant_a
      gc_ttl_seconds: 14400
      num_replicas: 3
      range_min_bytes: 268435456
      range_max_bytes: 1073741824
  - id: stage_05
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 128MiB
  - id: stage_06
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.snapshot_recovery.max_rate
      setting_value: 64MiB
  - id: stage_07
    service: cockroachdb
    case: readonly-audit
    retries: 1
  - id: stage_08
    service: cockroachdb
    case: change-plan-only
    retries: 1
