# workflows/error-prone/es-ep-ingress-password-audit
#
# Elasticsearch — secure HTTP ingress + rotate password, then run compliance audit

metadata:
  id: es-ep-ingress-password-audit
  label: Elasticsearch — secure HTTP ingress + rotate password, then run compliance audit
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: secure-http-ingress
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: rotate-elastic-password
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: readonly-audit
    retries: 1
