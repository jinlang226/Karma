# workflows/error-prone/nginx-ingress-full-lifecycle-rollback
#
# All-cases lifecycle (createâ†’classâ†’canaryâ†’OTelâ†’TLSâ†’rate-limit) â€” rollback trap

metadata:
  id: nginx-ingress-full-lifecycle-rollback
  label: All-cases lifecycle (createâ†’classâ†’canaryâ†’OTelâ†’TLSâ†’rate-limit) â€” rollback trap
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: create_ingress
    retries: 1
  - id: stage_02
    service: nginx-ingress
    case: class_only_upgrade
    retries: 1
  - id: stage_03
    service: nginx-ingress
    case: ingress_canary
    retries: 1
  - id: stage_04
    service: nginx-ingress
    case: otel_log_format
    retries: 1
  - id: stage_05
    service: nginx-ingress
    case: renew_tls_secret
    retries: 1
  - id: stage_06
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 1
    param_overrides:
      limit_rps: '2'
  - id: stage_07
    service: nginx-ingress
    case: rollback-rehearsal
    retries: 1
