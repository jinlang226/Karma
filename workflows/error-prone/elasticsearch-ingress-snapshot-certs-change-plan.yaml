# workflows/error-prone/elasticsearch-ingress-snapshot-certs-change-plan
#
# Elasticsearch — ingress + snapshot + cert rotation, then write upgrade change plan

metadata:
  id: elasticsearch-ingress-snapshot-certs-change-plan
  label: Elasticsearch — ingress + snapshot + cert rotation, then write upgrade change plan
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
  - id: stage_02
    service: elasticsearch
    case: secure-http-ingress
    retries: 0
  - id: stage_03
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 0
  - id: stage_04
    service: elasticsearch
    case: rotate-http-certs
    retries: 0
  - id: stage_05
    service: elasticsearch
    case: change-plan-only
    retries: 0
