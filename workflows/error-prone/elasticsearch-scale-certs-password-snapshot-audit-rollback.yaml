# workflows/error-prone/elasticsearch-scale-certs-password-snapshot-audit-rollback
#
# Elasticsearch — deploy, scale, rotate certs+password, snapshot repo, then audit and rollback plan

metadata:
  id: elasticsearch-scale-certs-password-snapshot-audit-rollback
  label: Elasticsearch — deploy, scale, rotate certs+password, snapshot repo, then audit and rollback
    plan
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 0
  - id: stage_02
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 0
    param_overrides:
      expected_nodes: 5
  - id: stage_03
    service: elasticsearch
    case: rotate-http-certs
    retries: 0
  - id: stage_04
    service: elasticsearch
    case: rotate-elastic-password
    retries: 0
  - id: stage_05
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 0
  - id: stage_06
    service: elasticsearch
    case: readonly-audit
    retries: 0
  - id: stage_07
    service: elasticsearch
    case: rollback-rehearsal
    retries: 0
