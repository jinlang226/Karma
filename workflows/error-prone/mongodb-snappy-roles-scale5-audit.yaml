# workflows/error-prone/mongodb-snappy-roles-scale5-audit
#
# MongoDB: configure, tighten roles, scale to 5, then audit

metadata:
  id: mongodb-snappy-roles-scale5-audit
  label: 'MongoDB: configure, tighten roles, scale to 5, then audit'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: mongod-config-update
    retries: 1
    param_overrides:
      target_journal_compressor: snappy
  - id: stage_02
    service: mongodb
    case: custom-roles
    retries: 1
  - id: stage_03
    service: mongodb
    case: replica-scaling
    retries: 1
    param_overrides:
      target_replicas: '5'
  - id: stage_04
    service: mongodb
    case: readonly-audit
    retries: 1
