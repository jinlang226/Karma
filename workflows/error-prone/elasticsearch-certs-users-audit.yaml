# workflows/error-prone/elasticsearch-certs-users-audit
#
# Elasticsearch — rotate HTTP certs + add file-realm users, then write compliance audit findings

metadata:
  id: elasticsearch-certs-users-audit
  label: Elasticsearch — rotate HTTP certs + add file-realm users, then write compliance audit findings
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: rotate-http-certs
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: file-realm-user-roles-merge
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: readonly-audit
    retries: 1
