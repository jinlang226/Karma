# workflows/error-prone/cockroachdb-zone-gc-snapshot-change-plan
#
# Configure zone GC TTL and snapshot rate, then prepare a migration plan

metadata:
  id: cockroachdb-zone-gc-snapshot-change-plan
  label: Configure zone GC TTL and snapshot rate, then prepare a migration plan
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: zone-config
    retries: 0
    param_overrides:
      target_schema: tenant_b
      protected_schema: tenant_a
      gc_ttl_seconds: 14400
      num_replicas: 3
      range_min_bytes: 134217728
      range_max_bytes: 536870912
  - id: stage_02
    service: cockroachdb
    case: cluster-settings
    retries: 0
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 256MiB
  - id: stage_03
    service: cockroachdb
    case: change-plan-only
    retries: 0
