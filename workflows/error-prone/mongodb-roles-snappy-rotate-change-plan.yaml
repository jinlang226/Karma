# workflows/error-prone/mongodb-roles-snappy-rotate-change-plan
#
# MongoDB: define roles, configure compressor, rotate passwords, draft change plan

metadata:
  id: mongodb-roles-snappy-rotate-change-plan
  label: 'MongoDB: define roles, configure compressor, rotate passwords, draft change plan'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: custom-roles
    retries: 0
  - id: stage_02
    service: mongodb
    case: mongod-config-update
    retries: 0
    param_overrides:
      target_journal_compressor: snappy
  - id: stage_03
    service: mongodb
    case: password-rotation
    retries: 0
  - id: stage_04
    service: mongodb
    case: change-plan-only
    retries: 0
