# workflows/error-prone/crdb-ep-35
#
# TLS hardening, five cluster settings, zone tuning, then rehearse full rollback

metadata:
  id: crdb-ep-35
  label: TLS hardening, five cluster settings, zone tuning, then rehearse full rollback
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: generate-cert
    retries: 1
  - id: stage_02
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 480MiB
  - id: stage_03
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.snapshot_recovery.max_rate
      setting_value: 240MiB
  - id: stage_04
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.range_merge.queue_enabled
      setting_value: 'false'
  - id: stage_05
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: sql.defaults.statement_timeout
      setting_value: 30s
  - id: stage_06
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.closed_timestamp.target_duration
      setting_value: 2s
  - id: stage_07
    service: cockroachdb
    case: zone-config
    retries: 1
    param_overrides:
      target_schema: tenant_b
      protected_schema: tenant_a
      gc_ttl_seconds: 36000
      num_replicas: 3
      range_min_bytes: 134217728
      range_max_bytes: 536870912
  - id: stage_08
    service: cockroachdb
    case: rollback-rehearsal
    retries: 1
