# workflows/error-prone/cockroachdb-zone-rebalance-audit
#
# Apply tenant-B zone config and snapshot rate, then run compliance audit

metadata:
  id: cockroachdb-zone-rebalance-audit
  label: Apply tenant-B zone config and snapshot rate, then run compliance audit
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: zone-config
    retries: 0
    param_overrides:
      target_schema: tenant_b
      protected_schema: tenant_a
      gc_ttl_seconds: 14400
      num_replicas: 3
      range_min_bytes: 134217728
      range_max_bytes: 536870912
  - id: stage_02
    service: cockroachdb
    case: cluster-settings
    retries: 0
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 96MiB
  - id: stage_03
    service: cockroachdb
    case: readonly-audit
    retries: 0
