# workflows/error-prone/mongodb-ep-snappy-rotate-roles-change-plan
#
# MongoDB: set snappy compressor, rotate passwords, tighten roles, plan upgrade

metadata:
  id: mongodb-ep-snappy-rotate-roles-change-plan
  label: 'MongoDB: set snappy compressor, rotate passwords, tighten roles, plan upgrade'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: mongod-config-update
    retries: 1
    param_overrides:
      target_journal_compressor: snappy
  - id: stage_02
    service: mongodb
    case: password-rotation
    retries: 1
  - id: stage_03
    service: mongodb
    case: custom-roles
    retries: 1
  - id: stage_04
    service: mongodb
    case: change-plan-only
    retries: 1
