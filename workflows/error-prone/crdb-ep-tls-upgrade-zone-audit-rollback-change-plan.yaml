# workflows/error-prone/crdb-ep-tls-upgrade-zone-audit-rollback-change-plan
#
# Full lifecycle hardening: TLS, major upgrade, zone, three settings, audit, rollback, plan

metadata:
  id: crdb-ep-tls-upgrade-zone-audit-rollback-change-plan
  label: 'Full lifecycle hardening: TLS, major upgrade, zone, three settings, audit, rollback, plan'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: generate-cert
    retries: 1
  - id: stage_02
    service: cockroachdb
    case: major-upgrade-finalize
    retries: 1
    param_overrides:
      from_version: '23.2'
      to_version: 24.1.0
  - id: stage_03
    service: cockroachdb
    case: zone-config
    retries: 1
    param_overrides:
      target_schema: tenant_b
      protected_schema: tenant_a
      gc_ttl_seconds: 14400
      num_replicas: 3
      range_min_bytes: 134217728
      range_max_bytes: 536870912
  - id: stage_04
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 416MiB
  - id: stage_05
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.snapshot_recovery.max_rate
      setting_value: 208MiB
  - id: stage_06
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.range_merge.queue_enabled
      setting_value: 'false'
  - id: stage_07
    service: cockroachdb
    case: readonly-audit
    retries: 1
  - id: stage_08
    service: cockroachdb
    case: rollback-rehearsal
    retries: 1
  - id: stage_09
    service: cockroachdb
    case: change-plan-only
    retries: 1
