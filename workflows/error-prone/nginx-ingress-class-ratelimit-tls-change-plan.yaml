# workflows/error-prone/nginx-ingress-class-ratelimit-tls-change-plan
#
# IngressClass fix + rate-limit + TLS — then upgrade plan trap

metadata:
  id: nginx-ingress-class-ratelimit-tls-change-plan
  label: IngressClass fix + rate-limit + TLS — then upgrade plan trap
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: nginx-ingress
    case: class_only_upgrade
    retries: 0
  - id: stage_02
    service: nginx-ingress
    case: rate_limit_ingress_easy
    retries: 0
    param_overrides:
      limit_rps: '4'
  - id: stage_03
    service: nginx-ingress
    case: renew_tls_secret
    retries: 0
  - id: stage_04
    service: nginx-ingress
    case: change-plan-only
    retries: 0
