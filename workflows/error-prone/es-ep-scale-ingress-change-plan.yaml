# workflows/error-prone/es-ep-scale-ingress-change-plan
#
# Elasticsearch — scale up + expose ingress, then write upgrade migration plan

metadata:
  id: es-ep-scale-ingress-change-plan
  label: Elasticsearch — scale up + expose ingress, then write upgrade migration plan
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: scale-up-new-nodeset
    retries: 1
    param_overrides:
      expected_nodes: 5
  - id: stage_03
    service: elasticsearch
    case: secure-http-ingress
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: change-plan-only
    retries: 1
