# workflows/error-prone/crdb-ep-36
#
# Set rate, rehearse rollback mid-workflow, then apply two more config changes

metadata:
  id: crdb-ep-36
  label: Set rate, rehearse rollback mid-workflow, then apply two more config changes
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.snapshot_rebalance.max_rate
      setting_value: 160MiB
  - id: stage_02
    service: cockroachdb
    case: rollback-rehearsal
    retries: 1
  - id: stage_03
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.snapshot_recovery.max_rate
      setting_value: 80MiB
  - id: stage_04
    service: cockroachdb
    case: cluster-settings
    retries: 1
    param_overrides:
      setting_name: kv.range_merge.queue_enabled
      setting_value: 'false'
  - id: stage_05
    service: cockroachdb
    case: readonly-audit
    retries: 1
