# workflows/error-prone/ray-ep-10
#
# Ray: scale + upgrade + job, write plan (trap), then scale further

metadata:
  id: ray-ep-10
  label: 'Ray: scale + upgrade + job, write plan (trap), then scale further'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: ray
    case: deploy_cluster
    retries: 1
    param_overrides:
      worker_replicas: '2'
  - id: stage_02
    service: ray
    case: scale_workers
    retries: 1
    param_overrides:
      source_worker_replicas: '2'
      target_worker_replicas: '3'
  - id: stage_03
    service: ray
    case: upgrade_version
    retries: 1
    param_overrides:
      from_image: rayproject/ray:2.8.0
      to_image: rayproject/ray:2.9.0
  - id: stage_04
    service: ray
    case: job_submission
    retries: 1
    param_overrides:
      expected_output: pong
  - id: stage_05
    service: ray
    case: change-plan-only
    retries: 1
  - id: stage_06
    service: ray
    case: scale_workers
    retries: 1
    param_overrides:
      source_worker_replicas: '3'
      target_worker_replicas: '5'
