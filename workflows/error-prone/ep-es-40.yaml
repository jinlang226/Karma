# workflows/error-prone/ep-es-40
#
# Elasticsearch — snapshot + custom users + cert rotation, then full compliance review

metadata:
  id: ep-es-40
  label: Elasticsearch — snapshot + custom users + cert rotation, then full compliance review
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: snapshot-repo-setup
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: file-realm-user-roles-merge
    retries: 1
    param_overrides:
      report_user: analyst
      ops_user: sre-admin
  - id: stage_04
    service: elasticsearch
    case: rotate-http-certs
    retries: 1
  - id: stage_05
    service: elasticsearch
    case: readonly-audit
    retries: 1
  - id: stage_06
    service: elasticsearch
    case: change-plan-only
    retries: 1
