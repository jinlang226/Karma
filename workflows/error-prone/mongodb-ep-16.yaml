# workflows/error-prone/mongodb-ep-16
#
# MongoDB: configure, scale to 5, rotate passwords, add users, rehearse rollback

metadata:
  id: mongodb-ep-16
  label: 'MongoDB: configure, scale to 5, rotate passwords, add users, rehearse rollback'
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: mongodb
    case: mongod-config-update
    retries: 1
    param_overrides:
      target_journal_compressor: zlib
  - id: stage_02
    service: mongodb
    case: replica-scaling
    retries: 1
    param_overrides:
      target_replicas: '5'
  - id: stage_03
    service: mongodb
    case: password-rotation
    retries: 1
  - id: stage_04
    service: mongodb
    case: user-management
    retries: 1
  - id: stage_05
    service: mongodb
    case: rollback-rehearsal
    retries: 1
