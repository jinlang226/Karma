# workflows/error-prone/elasticsearch-ingress-password-change-plan
#
# Elasticsearch — expose ingress + rotate password, then write upgrade plan

metadata:
  id: elasticsearch-ingress-password-change-plan
  label: Elasticsearch — expose ingress + rotate password, then write upgrade plan
spec:
  prompt_mode: progressive
  stages:
  - id: stage_01
    service: elasticsearch
    case: deploy-core-cluster
    retries: 1
  - id: stage_02
    service: elasticsearch
    case: secure-http-ingress
    retries: 1
  - id: stage_03
    service: elasticsearch
    case: rotate-elastic-password
    retries: 1
  - id: stage_04
    service: elasticsearch
    case: change-plan-only
    retries: 1
