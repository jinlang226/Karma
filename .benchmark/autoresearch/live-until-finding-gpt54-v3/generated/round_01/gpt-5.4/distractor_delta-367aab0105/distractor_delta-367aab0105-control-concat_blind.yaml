apiVersion: benchmark/v1alpha1
kind: Workflow
metadata:
  name: distractor_delta-367aab0105-control-concat_blind
spec:
  prompt_mode: concat_blind
  namespaces:
  - control-cluster_a
  - control-cluster_b
  stages:
  - id: stage_01_rabbitmq-experiments_blue_green_migration
    service: rabbitmq-experiments
    case: blue_green_migration
    namespaces:
    - control-cluster_a
    - control-cluster_b
    namespace_binding:
      default: control-cluster_b
      source: control-cluster_a
      target: control-cluster_b
    param_overrides:
      blue_cluster_prefix: rabbitmq
      green_cluster_prefix: rabbitmq
    max_attempts: 1
