apiVersion: benchmark/v1alpha1
kind: Workflow
metadata:
  name: distractor_delta-b9dcbf4aa6-distractor_mutated-concat_blind
spec:
  prompt_mode: concat_blind
  namespaces:
  - distractor_mutated-cluster_a
  stages:
  - id: stage_01_cockroachdb_deploy
    service: cockroachdb
    case: deploy
    namespaces:
    - distractor_mutated-cluster_a
    namespace_binding:
      default: distractor_mutated-cluster_a
    param_overrides:
      replica_count: 4
    max_attempts: 1
  - id: stage_02_cockroachdb_decommission
    service: cockroachdb
    case: decommission
    namespaces:
    - distractor_mutated-cluster_a
    namespace_binding:
      default: distractor_mutated-cluster_a
    param_overrides:
      from_replica_count: 4
      to_replica_count: 3
    max_attempts: 1
