apiVersion: benchmark/v1alpha1
kind: Workflow
metadata:
  name: history_delta-37c2adb225-history_mutated-concat_blind
spec:
  prompt_mode: concat_blind
  namespaces:
  - history_mutated-cluster_x
  - history_mutated-cluster_y
  stages:
  - id: stage_01_rabbitmq-experiments_manual_policy_sync
    service: rabbitmq-experiments
    case: manual_policy_sync
    namespaces:
    - history_mutated-cluster_x
    namespace_binding:
      default: history_mutated-cluster_x
    param_overrides: {}
    max_attempts: 1
  - id: stage_02_rabbitmq-experiments_blue_green_migration
    service: rabbitmq-experiments
    case: blue_green_migration
    namespaces:
    - history_mutated-cluster_x
    - history_mutated-cluster_y
    namespace_binding:
      default: history_mutated-cluster_y
      source: history_mutated-cluster_x
      target: history_mutated-cluster_y
    param_overrides:
      blue_cluster_prefix: rabbitmq
      green_cluster_prefix: rabbitmq
    max_attempts: 1
