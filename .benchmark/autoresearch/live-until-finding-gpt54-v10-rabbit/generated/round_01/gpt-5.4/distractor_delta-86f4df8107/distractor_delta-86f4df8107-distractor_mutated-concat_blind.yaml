apiVersion: benchmark/v1alpha1
kind: Workflow
metadata:
  name: distractor_delta-86f4df8107-distractor_mutated-concat_blind
spec:
  prompt_mode: concat_blind
  namespaces:
  - distractor_mutated-cluster_x
  - distractor_mutated-cluster_a
  - distractor_mutated-cluster_b
  stages:
  - id: stage_01_rabbitmq-experiments_manual_policy_sync
    service: rabbitmq-experiments
    case: manual_policy_sync
    namespaces:
    - distractor_mutated-cluster_x
    namespace_binding:
      default: distractor_mutated-cluster_x
    param_overrides: {}
    max_attempts: 1
  - id: stage_02_rabbitmq-experiments_blue_green_migration
    service: rabbitmq-experiments
    case: blue_green_migration
    namespaces:
    - distractor_mutated-cluster_a
    - distractor_mutated-cluster_b
    namespace_binding:
      default: distractor_mutated-cluster_b
      source: distractor_mutated-cluster_a
      target: distractor_mutated-cluster_b
    param_overrides:
      blue_cluster_prefix: rabbitmq
      green_cluster_prefix: rabbitmq
    max_attempts: 1
