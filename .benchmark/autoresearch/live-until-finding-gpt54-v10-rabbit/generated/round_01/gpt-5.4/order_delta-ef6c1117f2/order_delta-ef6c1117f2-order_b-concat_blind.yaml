    namespace_binding:
      default: order_b-cluster_b
      source: order_b-cluster_a
      target: order_b-cluster_b
    param_overrides:
      blue_cluster_prefix: rabbitmq
      green_cluster_prefix: rabbitmq
    max_attempts: 1
  - id: stage_03_rabbitmq-experiments_manual_monitoring
    service: rabbitmq-experiments
    case: manual_monitoring
    namespaces:
    - order_b-cluster_x
    namespace_binding:
      default: order_b-cluster_x
    param_overrides: {}
    max_attempts: 1
