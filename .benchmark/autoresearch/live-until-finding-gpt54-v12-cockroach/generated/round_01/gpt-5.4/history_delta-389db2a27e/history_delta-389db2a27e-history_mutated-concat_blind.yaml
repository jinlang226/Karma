apiVersion: benchmark/v1alpha1
kind: Workflow
metadata:
  name: history_delta-389db2a27e-history_mutated-concat_blind
spec:
  prompt_mode: concat_blind
  namespaces:
  - history_mutated-cluster_a
  - history_mutated-monitoring_a
  - history_mutated-ingress_a
  stages:
  - id: stage_01_cockroachdb_monitoring-integration
    service: cockroachdb
    case: monitoring-integration
    namespaces:
    - history_mutated-cluster_a
    - history_mutated-monitoring_a
    namespace_binding:
      default: history_mutated-cluster_a
      monitoring: history_mutated-monitoring_a
    param_overrides: {}
    max_attempts: 1
  - id: stage_02_cockroachdb_expose-ingress
    service: cockroachdb
    case: expose-ingress
    namespaces:
    - history_mutated-cluster_a
    - history_mutated-ingress_a
    namespace_binding:
      default: history_mutated-cluster_a
      ingress: history_mutated-ingress_a
    param_overrides: {}
    max_attempts: 1
