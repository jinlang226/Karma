apiVersion: benchmark/v1alpha1
kind: Workflow
metadata:
  name: distractor_delta-347d360ed6-distractor_mutated-concat_blind
spec:
  prompt_mode: concat_blind
  namespaces:
  - distractor_mutated-cluster_a
  - distractor_mutated-cluster_b
  stages:
  - id: stage_01_rabbitmq-experiments_manual_tls_rotation
    service: rabbitmq-experiments
    case: manual_tls_rotation
    namespaces:
    - distractor_mutated-cluster_a
    namespace_binding:
      default: distractor_mutated-cluster_a
    param_overrides:
      cluster_prefix: rabbitmq-cluster-a
    max_attempts: 1
  - id: stage_02_rabbitmq-experiments_blue_green_migration
    service: rabbitmq-experiments
    case: blue_green_migration
    namespaces:
    - distractor_mutated-cluster_a
    - distractor_mutated-cluster_b
    namespace_binding:
      default: distractor_mutated-cluster_b
      source: distractor_mutated-cluster_a
      target: distractor_mutated-cluster_b
    param_overrides:
      blue_cluster_prefix: rabbitmq-cluster-a
      green_cluster_prefix: rabbitmq-cluster-b
    max_attempts: 1
