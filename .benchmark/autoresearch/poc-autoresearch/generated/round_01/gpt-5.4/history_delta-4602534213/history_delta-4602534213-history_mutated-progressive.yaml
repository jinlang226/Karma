apiVersion: benchmark/v1alpha1
kind: Workflow
metadata:
  name: history_delta-4602534213-history_mutated-progressive
spec:
  prompt_mode: progressive
  namespaces:
  - history_mutated-1-default
  - history_mutated-2-default
  stages:
  - id: stage_01_ray_version_upgrade
    service: ray
    case: version_upgrade
    namespaces:
    - history_mutated-1-default
    namespace_binding:
      default: history_mutated-1-default
    max_attempts: 1
  - id: stage_02_rabbitmq-experiments_manual_user_permission
    service: rabbitmq-experiments
    case: manual_user_permission
    namespaces:
    - history_mutated-2-default
    namespace_binding:
      default: history_mutated-2-default
    max_attempts: 1
