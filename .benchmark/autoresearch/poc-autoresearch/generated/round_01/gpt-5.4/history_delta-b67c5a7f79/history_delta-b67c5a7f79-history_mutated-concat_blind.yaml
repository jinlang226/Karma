apiVersion: benchmark/v1alpha1
kind: Workflow
metadata:
  name: history_delta-b67c5a7f79-history_mutated-concat_blind
spec:
  prompt_mode: concat_blind
  namespaces:
  - history_mutated-1-default
  - history_mutated-2-default
  stages:
  - id: stage_01_spark_spark_pi_job_execution
    service: spark
    case: spark_pi_job_execution
    namespaces:
    - history_mutated-1-default
    namespace_binding:
      default: history_mutated-1-default
    max_attempts: 1
  - id: stage_02_mongodb_readiness-probe-tuning
    service: mongodb
    case: readiness-probe-tuning
    namespaces:
    - history_mutated-2-default
    namespace_binding:
      default: history_mutated-2-default
    max_attempts: 1
