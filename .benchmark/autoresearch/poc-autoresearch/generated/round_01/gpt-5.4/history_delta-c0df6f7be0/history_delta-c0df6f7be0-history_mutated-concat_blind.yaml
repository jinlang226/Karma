apiVersion: benchmark/v1alpha1
kind: Workflow
metadata:
  name: history_delta-c0df6f7be0-history_mutated-concat_blind
spec:
  prompt_mode: concat_blind
  namespaces:
  - history_mutated-1-default
  - history_mutated-2-default
  stages:
  - id: stage_01_spark_spark_runtime_bundle_ready
    service: spark
    case: spark_runtime_bundle_ready
    namespaces:
    - history_mutated-1-default
    namespace_binding:
      default: history_mutated-1-default
    max_attempts: 1
  - id: stage_02_mongodb_custom-roles
    service: mongodb
    case: custom-roles
    namespaces:
    - history_mutated-2-default
    namespace_binding:
      default: history_mutated-2-default
    max_attempts: 1
