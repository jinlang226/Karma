apiVersion: benchmark/v1alpha1
kind: Workflow
metadata:
  name: distractor_delta-1e3df70a21-distractor_mutated-progressive
spec:
  prompt_mode: progressive
  namespaces:
  - distractor_mutated-1-default
  - distractor_mutated-2-default
  stages:
  - id: stage_01_rabbitmq-experiments_classic_queue
