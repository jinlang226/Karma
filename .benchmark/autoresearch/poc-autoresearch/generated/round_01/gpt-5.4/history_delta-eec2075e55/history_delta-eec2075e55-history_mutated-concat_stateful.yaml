apiVersion: benchmark/v1alpha1
kind: Workflow
metadata:
  name: history_delta-eec2075e55-history_mutated-concat_stateful
spec:
  prompt_mode: concat_stateful
  namespaces:
  - history_mutated-1-default
  - history_mutated-2-default
  stages:
  - id: stage_01_cockroachdb_cluster-settings
    service: cockroachdb
    case: cluster-settings
    namespaces:
    - history_mutated-1-default
    namespace_binding:
      default: history_mutated-1-default
    max_attempts: 1
  - id: stage_02_mongodb_statefulset-customization
    service: mongodb
    case: statefulset-customization
    namespaces:
    - history_mutated-2-default
    namespace_binding:
      default: history_mutated-2-default
    max_attempts: 1
