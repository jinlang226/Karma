apiVersion: benchmark/v1alpha1
kind: Workflow
metadata:
  name: history_delta-3313caf236-history_mutated-concat_blind
spec:
  prompt_mode: concat_blind
  namespaces:
  - history_mutated-1-default
  - history_mutated-2-default
  - history_mutated-2-monitoring
  stages:
  - id: stage_01_elasticsearch_rotate-http-certs
    service: elasticsearch
    case: rotate-http-certs
    namespaces:
    - history_mutated-1-default
    namespace_binding:
      default: history_mutated-1-default
    max_attempts: 1
  - id: stage_02_mongodb_monitoring-integration
    service: mongodb
    case: monitoring-integration
    namespaces:
    - history_mutated-2-default
    - history_mutated-2-monitoring
    namespace_binding:
      default: history_mutated-2-default
      monitoring: history_mutated-2-monitoring
    max_attempts: 1
