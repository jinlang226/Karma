apiVersion: benchmark/v1alpha1
kind: Workflow
metadata:
  name: history_delta-5e32596788-history_mutated-concat_stateful
spec:
  prompt_mode: concat_stateful
  namespaces:
  - history_mutated-1-default
  - history_mutated-2-default
  stages:
  - id: stage_01_cockroachdb_zone-config
    service: cockroachdb
    case: zone-config
    namespaces:
    - history_mutated-1-default
    namespace_binding:
      default: history_mutated-1-default
    max_attempts: 1
  - id: stage_02_rabbitmq-experiments_manual_monitoring
    service: rabbitmq-experiments
    case: manual_monitoring
    namespaces:
    - history_mutated-2-default
    namespace_binding:
      default: history_mutated-2-default
    max_attempts: 1
