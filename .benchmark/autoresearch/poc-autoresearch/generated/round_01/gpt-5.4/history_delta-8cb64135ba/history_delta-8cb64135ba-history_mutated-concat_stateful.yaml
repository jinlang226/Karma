apiVersion: benchmark/v1alpha1
kind: Workflow
metadata:
  name: history_delta-8cb64135ba-history_mutated-concat_stateful
spec:
  prompt_mode: concat_stateful
  namespaces:
  - history_mutated-1-default
  - history_mutated-2-default
  stages:
  - id: stage_01_elasticsearch_master-downscale-voting-exclusions
    service: elasticsearch
    case: master-downscale-voting-exclusions
    namespaces:
    - history_mutated-1-default
    namespace_binding:
      default: history_mutated-1-default
    max_attempts: 1
  - id: stage_02_ray_version_upgrade
    service: ray
    case: version_upgrade
    namespaces:
    - history_mutated-2-default
    namespace_binding:
      default: history_mutated-2-default
    max_attempts: 1
