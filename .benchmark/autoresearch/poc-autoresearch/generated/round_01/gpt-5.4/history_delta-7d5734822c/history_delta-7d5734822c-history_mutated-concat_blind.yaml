apiVersion: benchmark/v1alpha1
kind: Workflow
metadata:
  name: history_delta-7d5734822c-history_mutated-concat_blind
spec:
  prompt_mode: concat_blind
  namespaces:
  - history_mutated-1-default
  - history_mutated-2-default
  stages:
  - id: stage_01_cockroachdb_generate-cert
    service: cockroachdb
    case: generate-cert
    namespaces:
    - history_mutated-1-default
    namespace_binding:
      default: history_mutated-1-default
    max_attempts: 1
  - id: stage_02_rabbitmq-experiments_failover
    service: rabbitmq-experiments
    case: failover
    namespaces:
    - history_mutated-2-default
    namespace_binding:
      default: history_mutated-2-default
    max_attempts: 1
