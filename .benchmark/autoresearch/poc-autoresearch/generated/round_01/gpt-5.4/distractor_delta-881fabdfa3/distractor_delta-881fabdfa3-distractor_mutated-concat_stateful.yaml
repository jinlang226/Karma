apiVersion: benchmark/v1alpha1
kind: Workflow
metadata:
  name: distractor_delta-881fabdfa3-distractor_mutated-concat_stateful
spec:
  prompt_mode: concat_stateful
  namespaces:
  - distractor_mutated-1-default
  - distractor_mutated-2-default
  stages:
  - id: stage_01_spark_spark_pi_job_execution
    service: spark
    case: spark_pi_job_execution
    namespaces:
    - distractor_mutated-1-default
    namespace_binding:
      default: distractor_mutated-1-default
    max_attempts: 1
  - id: stage_02_mongodb_arbiters
    service: mongodb
    case: arbiters
    namespaces:
    - distractor_mutated-2-default
    namespace_binding:
      default: distractor_mutated-2-default
    max_attempts: 1
