apiVersion: benchmark/v1alpha1
kind: Workflow
metadata:
  name: distractor_delta-7b42fee1a0-distractor_mutated-concat_stateful
spec:
  prompt_mode: concat_stateful
  namespaces:
  - distractor_mutated-1-default
  - distractor_mutated-2-source
  - distractor_mutated-2-target
  stages:
  - id: stage_01_cockroachdb_partitioned-update
    service: cockroachdb
    case: partitioned-update
    namespaces:
    - distractor_mutated-1-default
    namespace_binding:
      default: distractor_mutated-1-default
    max_attempts: 1
  - id: stage_02_demo_configmap-update-two-ns
    service: demo
    case: configmap-update-two-ns
    namespaces:
    - distractor_mutated-2-source
    - distractor_mutated-2-target
    namespace_binding:
      source: distractor_mutated-2-source
      target: distractor_mutated-2-target
    max_attempts: 1
