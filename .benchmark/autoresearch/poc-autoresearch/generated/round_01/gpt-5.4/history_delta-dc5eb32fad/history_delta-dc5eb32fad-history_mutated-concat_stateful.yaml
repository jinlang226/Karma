apiVersion: benchmark/v1alpha1
kind: Workflow
metadata:
  name: history_delta-dc5eb32fad-history_mutated-concat_stateful
spec:
  prompt_mode: concat_stateful
  namespaces:
  - history_mutated-1-default
  - history_mutated-2-default
  stages:
  - id: stage_01_elasticsearch_full-restart-upgrade-ha
    service: elasticsearch
    case: full-restart-upgrade-ha
    namespaces:
    - history_mutated-1-default
    namespace_binding:
      default: history_mutated-1-default
    max_attempts: 1
  - id: stage_02_rabbitmq-experiments_manual_skip_upgrade
    service: rabbitmq-experiments
    case: manual_skip_upgrade
    namespaces:
    - history_mutated-2-default
    namespace_binding:
      default: history_mutated-2-default
    max_attempts: 1
