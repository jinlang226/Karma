apiVersion: benchmark/v1alpha1
kind: Workflow
metadata:
  name: distractor_delta-a1b1405987-distractor_mutated-progressive
spec:
  prompt_mode: progressive
  namespaces:
  - distractor_mutated-1-default
  - distractor_mutated-2-default
  stages:
  - id: stage_01_spark_spark_sql_job_execution
    service: spark
    case: spark_sql_job_execution
    namespaces:
    - distractor_mutated-1-default
    namespace_binding:
      default: distractor_mutated-1-default
    max_attempts: 1
  - id: stage_02_mongodb_initialize
    service: mongodb
    case: initialize
    namespaces:
    - distractor_mutated-2-default
    namespace_binding:
      default: distractor_mutated-2-default
    max_attempts: 1
