apiVersion: benchmark/v1alpha1
kind: Workflow
metadata:
  name: order_delta-79c8fe52c8-order_a-progressive
spec:
  prompt_mode: progressive
  namespaces:
  - order_a-1-team_a
  - order_a-1-team_b
  - order_a-1-team_c
  - order_a-1-team_d
  - order_a-2-default
  - order_a-3-default
  stages:
  - id: stage_01_spark_spark_multi_tenant_job_execution
    service: spark
    case: spark_multi_tenant_job_execution
    namespaces:
    - order_a-1-team_a
    - order_a-1-team_b
    - order_a-1-team_c
    - order_a-1-team_d
    namespace_binding:
      team_a: order_a-1-team_a
      team_b: order_a-1-team_b
      team_c: order_a-1-team_c
      team_d: order_a-1-team_d
    max_attempts: 1
  - id: stage_02_elasticsearch_full-restart-upgrade-ha
    service: elasticsearch
    case: full-restart-upgrade-ha
    namespaces:
    - order_a-2-default
    namespace_binding:
      default: order_a-2-default
    max_attempts: 1
  - id: stage_03_rabbitmq-experiments_classic_queue
    service: rabbitmq-experiments
    case: classic_queue
    namespaces:
    - order_a-3-default
    namespace_binding:
      default: order_a-3-default
    max_attempts: 1
