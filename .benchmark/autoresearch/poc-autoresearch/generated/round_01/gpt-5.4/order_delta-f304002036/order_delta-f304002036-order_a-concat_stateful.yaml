apiVersion: benchmark/v1alpha1
kind: Workflow
metadata:
  name: order_delta-f304002036-order_a-concat_stateful
spec:
  prompt_mode: concat_stateful
  namespaces:
  - order_a-1-source
  - order_a-1-target
  - order_a-2-default
  - order_a-3-ingress
  - order_a-3-app
  stages:
  - id: stage_01_rabbitmq-experiments_blue_green_migration
    service: rabbitmq-experiments
    case: blue_green_migration
    namespaces:
    - order_a-1-source
    - order_a-1-target
    namespace_binding:
      source: order_a-1-source
      target: order_a-1-target
    max_attempts: 1
  - id: stage_02_mongodb_manual-rbac-reset
    service: mongodb
    case: manual-rbac-reset
    namespaces:
    - order_a-2-default
    namespace_binding:
      default: order_a-2-default
    max_attempts: 1
  - id: stage_03_nginx-ingress_header_canary_routing
    service: nginx-ingress
    case: header_canary_routing
    namespaces:
    - order_a-3-ingress
    - order_a-3-app
    namespace_binding:
      ingress: order_a-3-ingress
      app: order_a-3-app
    max_attempts: 1
