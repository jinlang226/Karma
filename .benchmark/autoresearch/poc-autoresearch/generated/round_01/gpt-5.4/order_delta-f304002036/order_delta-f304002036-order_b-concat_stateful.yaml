apiVersion: benchmark/v1alpha1
kind: Workflow
metadata:
  name: order_delta-f304002036-order_b-concat_stateful
spec:
  prompt_mode: concat_stateful
  namespaces:
  - order_b-1-default
  - order_b-2-source
  - order_b-2-target
  - order_b-3-ingress
  - order_b-3-app
  stages:
  - id: stage_01_mongodb_manual-rbac-reset
    service: mongodb
    case: manual-rbac-reset
    namespaces:
    - order_b-1-default
    namespace_binding:
      default: order_b-1-default
    max_attempts: 1
  - id: stage_02_rabbitmq-experiments_blue_green_migration
    service: rabbitmq-experiments
    case: blue_green_migration
    namespaces:
    - order_b-2-source
    - order_b-2-target
    namespace_binding:
      source: order_b-2-source
      target: order_b-2-target
    max_attempts: 1
  - id: stage_03_nginx-ingress_header_canary_routing
    service: nginx-ingress
    case: header_canary_routing
    namespaces:
    - order_b-3-ingress
    - order_b-3-app
    namespace_binding:
      ingress: order_b-3-ingress
      app: order_b-3-app
    max_attempts: 1
