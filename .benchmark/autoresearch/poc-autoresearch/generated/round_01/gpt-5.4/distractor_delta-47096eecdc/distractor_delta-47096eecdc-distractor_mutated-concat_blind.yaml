apiVersion: benchmark/v1alpha1
kind: Workflow
metadata:
  name: distractor_delta-47096eecdc-distractor_mutated-concat_blind
spec:
  prompt_mode: concat_blind
  namespaces:
  - distractor_mutated-1-default
  - distractor_mutated-2-default
  stages:
  - id: stage_01_rabbitmq-experiments_manual_runtime_reset
    service: rabbitmq-experiments
    case: manual_runtime_reset
    namespaces:
    - distractor_mutated-1-default
    namespace_binding:
      default: distractor_mutated-1-default
    max_attempts: 1
  - id: stage_02_mongodb_external-access-horizons
    service: mongodb
    case: external-access-horizons
    namespaces:
    - distractor_mutated-2-default
    namespace_binding:
      default: distractor_mutated-2-default
    max_attempts: 1
