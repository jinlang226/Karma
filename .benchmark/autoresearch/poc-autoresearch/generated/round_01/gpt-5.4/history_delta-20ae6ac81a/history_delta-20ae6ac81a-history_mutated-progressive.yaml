apiVersion: benchmark/v1alpha1
kind: Workflow
metadata:
  name: history_delta-20ae6ac81a-history_mutated-progressive
spec:
  prompt_mode: progressive
  namespaces:
  - history_mutated-1-source
  - history_mutated-1-target
  - history_mutated-2-default
  stages:
  - id: stage_01_rabbitmq-experiments_blue_green_migration
    service: rabbitmq-experiments
    case: blue_green_migration
    namespaces:
    - history_mutated-1-source
    - history_mutated-1-target
    namespace_binding:
      source: history_mutated-1-source
      target: history_mutated-1-target
    max_attempts: 1
  - id: stage_02_ray_worker_scaling
    service: ray
    case: worker_scaling
    namespaces:
    - history_mutated-2-default
    namespace_binding:
      default: history_mutated-2-default
    max_attempts: 1
