apiVersion: benchmark/v1alpha1
kind: Workflow
metadata:
  name: history_delta-d4cb0ba09d-history_mutated-progressive
spec:
  prompt_mode: progressive
  namespaces:
  - history_mutated-1-ingress
  - history_mutated-1-app
  - history_mutated-2-default
  stages:
  - id: stage_01_nginx-ingress_https_ingress_ready
    service: nginx-ingress
    case: https_ingress_ready
    namespaces:
    - history_mutated-1-ingress
    - history_mutated-1-app
    namespace_binding:
      ingress: history_mutated-1-ingress
      app: history_mutated-1-app
    max_attempts: 1
  - id: stage_02_elasticsearch_internal-http-service-drift
    service: elasticsearch
    case: internal-http-service-drift
    namespaces:
    - history_mutated-2-default
    namespace_binding:
      default: history_mutated-2-default
    max_attempts: 1
