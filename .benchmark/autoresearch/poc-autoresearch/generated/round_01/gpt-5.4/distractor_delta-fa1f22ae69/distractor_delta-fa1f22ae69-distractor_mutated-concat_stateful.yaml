apiVersion: benchmark/v1alpha1
kind: Workflow
metadata:
  name: distractor_delta-fa1f22ae69-distractor_mutated-concat_stateful
spec:
  prompt_mode: concat_stateful
  namespaces:
  - distractor_mutated-1-source
  - distractor_mutated-1-target
  - distractor_mutated-2-default
  stages:
  - id: stage_01_rabbitmq-experiments_blue_green_migration
    service: rabbitmq-experiments
    case: blue_green_migration
    namespaces:
    - distractor_mutated-1-source
    - distractor_mutated-1-target
    namespace_binding:
      source: distractor_mutated-1-source
      target: distractor_mutated-1-target
    max_attempts: 1
  - id: stage_02_mongodb_manual-rbac-reset
    service: mongodb
    case: manual-rbac-reset
    namespaces:
    - distractor_mutated-2-default
    namespace_binding:
      default: distractor_mutated-2-default
    max_attempts: 1
