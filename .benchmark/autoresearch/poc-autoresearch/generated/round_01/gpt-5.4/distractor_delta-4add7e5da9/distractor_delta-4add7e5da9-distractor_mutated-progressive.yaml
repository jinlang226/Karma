apiVersion: benchmark/v1alpha1
kind: Workflow
metadata:
  name: distractor_delta-4add7e5da9-distractor_mutated-progressive
spec:
  prompt_mode: progressive
  namespaces:
  - distractor_mutated-1-team_a
  - distractor_mutated-1-team_b
  - distractor_mutated-1-team_c
  - distractor_mutated-1-team_d
  - distractor_mutated-2-default
  stages:
  - id: stage_01_spark_spark_multi_tenant_job_execution
    service: spark
    case: spark_multi_tenant_job_execution
    namespaces:
    - distractor_mutated-1-team_a
    - distractor_mutated-1-team_b
    - distractor_mutated-1-team_c
    - distractor_mutated-1-team_d
    namespace_binding:
      team_a: distractor_mutated-1-team_a
      team_b: distractor_mutated-1-team_b
      team_c: distractor_mutated-1-team_c
      team_d: distractor_mutated-1-team_d
    max_attempts: 1
  - id: stage_02_ray_job_execution
    service: ray
    case: job_execution
    namespaces:
    - distractor_mutated-2-default
    namespace_binding:
      default: distractor_mutated-2-default
    max_attempts: 1
