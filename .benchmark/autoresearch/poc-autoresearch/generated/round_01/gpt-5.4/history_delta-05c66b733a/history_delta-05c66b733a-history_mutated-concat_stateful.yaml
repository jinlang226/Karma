apiVersion: benchmark/v1alpha1
kind: Workflow
metadata:
  name: history_delta-05c66b733a-history_mutated-concat_stateful
spec:
  prompt_mode: concat_stateful
  namespaces:
  - history_mutated-1-default
  - history_mutated-2-default
  stages:
  - id: stage_01_spark_spark_pi_job_execution
    service: spark
    case: spark_pi_job_execution
    namespaces:
    - history_mutated-1-default
    namespace_binding:
      default: history_mutated-1-default
    max_attempts: 1
  - id: stage_02_cockroachdb_health-check-recovery
    service: cockroachdb
    case: health-check-recovery
    namespaces:
    - history_mutated-2-default
    namespace_binding:
      default: history_mutated-2-default
    max_attempts: 1
