apiVersion: benchmark/v1alpha1
kind: Workflow
metadata:
  name: history_delta-da1607f0bf-history_mutated-progressive
spec:
  prompt_mode: progressive
  namespaces:
  - history_mutated-1-default
  - history_mutated-2-default
  stages:
  - id: stage_01_elasticsearch_safe-downscale-with-shard-migration
    service: elasticsearch
    case: safe-downscale-with-shard-migration
    namespaces:
    - history_mutated-1-default
    namespace_binding:
      default: history_mutated-1-default
    max_attempts: 1
  - id: stage_02_elasticsearch_internal-http-service-drift
    service: elasticsearch
    case: internal-http-service-drift
    namespaces:
    - history_mutated-2-default
    namespace_binding:
      default: history_mutated-2-default
    max_attempts: 1
