      default: order_b-2-default
    max_attempts: 1
  - id: stage_03_nginx-ingress_ingress_route_ready
    service: nginx-ingress
    case: ingress_route_ready
    namespaces:
    - order_b-3-ingress
    - order_b-3-app
    namespace_binding:
      ingress: order_b-3-ingress
      app: order_b-3-app
    max_attempts: 1
