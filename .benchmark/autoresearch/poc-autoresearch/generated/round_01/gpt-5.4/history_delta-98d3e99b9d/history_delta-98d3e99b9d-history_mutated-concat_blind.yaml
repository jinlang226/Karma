apiVersion: benchmark/v1alpha1
kind: Workflow
metadata:
  name: history_delta-98d3e99b9d-history_mutated-concat_blind
spec:
  prompt_mode: concat_blind
  namespaces:
  - history_mutated-1-default
  - history_mutated-2-team_a
  - history_mutated-2-team_b
  - history_mutated-2-team_c
  - history_mutated-2-team_d
  stages:
  - id: stage_01_mongodb_readiness-probe-tuning
    service: mongodb
    case: readiness-probe-tuning
    namespaces:
    - history_mutated-1-default
    namespace_binding:
      default: history_mutated-1-default
    max_attempts: 1
  - id: stage_02_spark_spark_multi_tenant_job_execution
    service: spark
    case: spark_multi_tenant_job_execution
    namespaces:
    - history_mutated-2-team_a
    - history_mutated-2-team_b
    - history_mutated-2-team_c
    - history_mutated-2-team_d
    namespace_binding:
      team_a: history_mutated-2-team_a
      team_b: history_mutated-2-team_b
      team_c: history_mutated-2-team_c
      team_d: history_mutated-2-team_d
    max_attempts: 1
