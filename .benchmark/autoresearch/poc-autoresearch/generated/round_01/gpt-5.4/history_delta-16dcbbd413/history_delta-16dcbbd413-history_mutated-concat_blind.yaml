apiVersion: benchmark/v1alpha1
kind: Workflow
metadata:
  name: history_delta-16dcbbd413-history_mutated-concat_blind
spec:
  prompt_mode: concat_blind
  namespaces:
  - history_mutated-1-default
  - history_mutated-2-default
  stages:
  - id: stage_01_cockroachdb_initialize
    service: cockroachdb
    case: initialize
    namespaces:
    - history_mutated-1-default
    namespace_binding:
      default: history_mutated-1-default
    max_attempts: 1
  - id: stage_02_mongodb_user-management
    service: mongodb
    case: user-management
    namespaces:
    - history_mutated-2-default
    namespace_binding:
      default: history_mutated-2-default
    max_attempts: 1
