apiVersion: benchmark/v1alpha1
kind: Workflow
metadata:
  name: distractor_delta-62bb9bdca3-distractor_mutated-concat_blind
spec:
  prompt_mode: concat_blind
  namespaces:
  - distractor_mutated-1-default
  - distractor_mutated-2-ingress
  - distractor_mutated-2-app
  - distractor_mutated-2-otel
  stages:
  - id: stage_01_elasticsearch_safe-downscale-with-shard-migration
    service: elasticsearch
    case: safe-downscale-with-shard-migration
    namespaces:
    - distractor_mutated-1-default
    namespace_binding:
      default: distractor_mutated-1-default
    max_attempts: 1
  - id: stage_02_nginx-ingress_otel_ingress_logging_ready
    service: nginx-ingress
    case: otel_ingress_logging_ready
    namespaces:
    - distractor_mutated-2-ingress
    - distractor_mutated-2-app
    - distractor_mutated-2-otel
    namespace_binding:
      ingress: distractor_mutated-2-ingress
      app: distractor_mutated-2-app
      otel: distractor_mutated-2-otel
    max_attempts: 1
