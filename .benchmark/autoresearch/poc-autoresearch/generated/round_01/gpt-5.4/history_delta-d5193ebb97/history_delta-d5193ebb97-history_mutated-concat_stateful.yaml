apiVersion: benchmark/v1alpha1
kind: Workflow
metadata:
  name: history_delta-d5193ebb97-history_mutated-concat_stateful
spec:
  prompt_mode: concat_stateful
  namespaces:
  - history_mutated-1-default
  - history_mutated-2-default
  stages:
  - id: stage_01_ray_worker_scaling
    service: ray
    case: worker_scaling
    namespaces:
    - history_mutated-1-default
    namespace_binding:
      default: history_mutated-1-default
    max_attempts: 1
  - id: stage_02_rabbitmq-experiments_manual_backup_restore
    service: rabbitmq-experiments
    case: manual_backup_restore
    namespaces:
    - history_mutated-2-default
    namespace_binding:
      default: history_mutated-2-default
    max_attempts: 1
