apiVersion: benchmark/v1alpha1
kind: Workflow
metadata:
  name: history_delta-029c4a477a-history_mutated-concat_blind
spec:
  prompt_mode: concat_blind
  namespaces:
  - history_mutated-1-default
  - history_mutated-1-ingress
  - history_mutated-2-default
  stages:
  - id: stage_01_elasticsearch_secure-http-ingress
    service: elasticsearch
    case: secure-http-ingress
    namespaces:
    - history_mutated-1-default
    - history_mutated-1-ingress
    namespace_binding:
      default: history_mutated-1-default
      ingress: history_mutated-1-ingress
    max_attempts: 1
  - id: stage_02_demo_configmap-update
    service: demo
    case: configmap-update
    namespaces:
    - history_mutated-2-default
    namespace_binding:
      default: history_mutated-2-default
    max_attempts: 1
