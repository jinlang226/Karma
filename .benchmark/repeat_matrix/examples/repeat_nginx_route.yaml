apiVersion: benchmark/v1alpha1
kind: Workflow
metadata:
  name: repeat-nginx-route
spec:
  prompt_mode: progressive
  namespaces:
    - app
    - ingress
  stages:
    - id: nginx_route_first
      service: nginx-ingress
      case: ingress_route_ready
      namespaces:
        - app
        - ingress
    - id: nginx_route_second
      service: nginx-ingress
      case: ingress_route_ready
      namespaces:
        - app
        - ingress
