apiVersion: benchmark/v1alpha1
kind: Workflow
metadata:
  name: repeat-demo-configmap-value-sweep
spec:
  prompt_mode: progressive
  namespaces:
    - demo
  stages:
    - id: demo_configmap_first
      service: demo
      case: configmap-update
      namespaces:
        - demo
      param_overrides:
        target_value: sweep-value-1
    - id: demo_configmap_second
      service: demo
      case: configmap-update
      namespaces:
        - demo
      param_overrides:
        target_value: sweep-value-1
