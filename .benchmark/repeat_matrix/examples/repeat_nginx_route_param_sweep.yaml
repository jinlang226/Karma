apiVersion: benchmark/v1alpha1
kind: Workflow
metadata:
  name: repeat-nginx-route-param-sweep
spec:
  prompt_mode: progressive
  namespaces:
    - app
    - ingress
  stages:
    - id: nginx_route_first
      service: nginx-ingress
      case: ingress_route_ready
      namespaces:
        - app
        - ingress
      param_overrides:
        service_name: demo-app-ps
        ingress_name: demo-route-ps
        host: demo-ps.example.com
    - id: nginx_route_second
      service: nginx-ingress
      case: ingress_route_ready
      namespaces:
        - app
        - ingress
      param_overrides:
        service_name: demo-app-ps
        ingress_name: demo-route-ps
        host: demo-ps.example.com
