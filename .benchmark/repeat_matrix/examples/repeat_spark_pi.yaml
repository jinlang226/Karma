apiVersion: benchmark/v1alpha1
kind: Workflow
metadata:
  name: repeat-spark-pi
spec:
  prompt_mode: progressive
  namespaces:
    - spark
  stages:
    - id: spark_pi_first
      service: spark
      case: spark_pi_job_execution
      namespaces:
        - spark
    - id: spark_pi_second
      service: spark
      case: spark_pi_job_execution
      namespaces:
        - spark
