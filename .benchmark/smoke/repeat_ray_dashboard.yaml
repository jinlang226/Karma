apiVersion: benchmark/v1alpha1
kind: Workflow
metadata:
  name: repeat-ray-dashboard
spec:
  prompt_mode: progressive
  namespaces:
    - ray
  stages:
    - id: ray_dashboard_first
      service: ray
      case: dashboard_reachable
      namespaces:
        - ray
    - id: ray_dashboard_second
      service: ray
      case: dashboard_reachable
      namespaces:
        - ray
