<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KARMA</title>
  <!-- Favicon: inline SVG "K" monogram in the brand terracotta. To change it,
       edit just this line — swap the letter, the %23c6632d color, or replace the
       whole data: URI with an emoji SVG or a /webui/<file>.png path. -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%23c6632d'/><text x='16' y='24' font-family='Times%20New%20Roman,Times,serif' font-size='22' font-weight='700' fill='%23f5f2ea' text-anchor='middle'>K</text></svg>">
  <link rel="stylesheet" href="/webui/css/styles.css">
</head>
<body>
  <header id="topbar">
    <div class="topleft">
      <div class="brand">KARMA</div>
      <div id="breadcrumb"></div>
    </div>
    <nav id="nav"></nav>
    <div id="cluster-banner" class="banner" role="status" aria-live="polite">checking cluster…</div>
  </header>
  <main id="view"></main>

  <!-- Core: client + shell load before any view module. -->
  <script src="/webui/js/api.js"></script>
  <script src="/webui/js/labels.js"></script>
  <script src="/webui/js/app.js"></script>
  <!-- View modules register themselves with KARMA.registerView(); each is
       added as it is built. -->
  <script src="/webui/js/views/home.js"></script>
  <script src="/webui/js/views/runner.js"></script>
  <script src="/webui/js/views/workflow.js"></script>
  <script src="/webui/js/views/results.js"></script>
</body>
</html>
