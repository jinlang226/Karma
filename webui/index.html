<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KARMA</title>
  <link rel="stylesheet" href="/webui/css/styles.css">
</head>
<body>
  <header id="topbar">
    <div class="topleft">
      <div class="brand">KARMA</div>
      <div id="breadcrumb"></div>
    </div>
    <nav id="nav"></nav>
    <div id="cluster-banner" class="banner" role="status" aria-live="polite">checking cluster…</div>
  </header>
  <main id="view"></main>

  <!-- Core: client + shell load before any view module. -->
  <script src="/webui/js/api.js"></script>
  <script src="/webui/js/labels.js"></script>
  <script src="/webui/js/app.js"></script>
  <!-- View modules register themselves with KARMA.registerView(); each is
       added as it is built. -->
  <script src="/webui/js/views/home.js"></script>
  <script src="/webui/js/views/runner.js"></script>
  <script src="/webui/js/views/workflow.js"></script>
  <script src="/webui/js/views/results.js"></script>
</body>
</html>
